    &lt;TD align=left&gt;&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;
      &lt;P align=right&gt;*光 の 
      雨..01*&lt;/P&gt;&lt;BR&gt;&lt;BR&gt;「セルフィ先輩とスコール先輩ってさぁ」&lt;BR&gt;　ドアを開けようとした途端聞こえてきた声に、スコールはふとその手を止めた。&lt;BR&gt;　いかにも内緒話といった雰囲気の声が、自分の名前を出した事に少なからず驚く。&lt;BR&gt;　声の主は学園祭実行委員である後輩の少女だった。&lt;BR&gt;「つきあってるってホント？」&lt;BR&gt;「えっうそ。やっぱその話ってマジだったの？」&lt;BR&gt;　別の少女の声。最初の声の主とは確か同じクラスだったはずだ。&lt;BR&gt;「マジらしいよ。この間ゼル先輩達の会話聞いちゃったもん」&lt;BR&gt;「えぇ～やっぱそうなんだ！　うわ～ショック」&lt;BR&gt;　……そういえばゼルの声ってでかいよなと、スコールは他人事のように思った。&lt;BR&gt;「ショックって、なぁにあんた、スコール先輩狙いだったわけ？」&lt;BR&gt;「そういえばこの間のSeeD候補生の実地訓練で、班長がスコール先輩だって大騒ぎしてたよね」&lt;BR&gt;「そうなのよ～！　もう近くで見たら遠くで見るより全然カッコいいの！！　眼が合った時なんて、心臓止まるかと思っちゃった」&lt;BR&gt;　力説している少女の声を聞きながら、スコールはどうしたものかとちょっと考える。&lt;BR&gt;　こんなふうに好意的に自分の噂話をされている現場に遭遇してしまうと、どうにもこそばゆいというか、落ち着かないというか……非常に複雑な心境だ。&lt;BR&gt;　中に用があるのだが、しかしこの状況で入室する勇気はスコールにもなかった。&lt;BR&gt;「あ～でもわかるなぁ～。あの人って、なんかすごいオーラあるよね」&lt;BR&gt;「でしょでしょ？　態度はそっけないのに、どうしてもこう惹きつけられるって言うか！！」&lt;BR&gt;「リノアがガルバディア帰った時とかさ、ガーデン中の女子が燃えてたよね」&lt;BR&gt;「そりゃ燃えるよ～！　あーあ、誰が射止めるのかと思ったら、セルフィ先輩だったんだぁ……」&lt;BR&gt;　ガーデン中が燃えていたとは知らなかった……と思わずスコールが胸の中で呟いた時、&lt;BR&gt;「ふ～ん、そうだったんだぁ～」&lt;BR&gt;　突然背後で小さな声が響き、スコールは内心飛び上がるほど驚いて振り返った。&lt;BR&gt;　いつのまにやら後ろにいたセルフィが、何やら感慨深げにドアを眺めている。&lt;BR&gt;「意外だよね、スコール先輩の趣味って、もっと女っぽい人だと思ってたなぁ」&lt;BR&gt;　ぴくりとスコールは眉をひそめ、出しかけた声を止めてしまった。&lt;BR&gt;　よもや当人達が聞いているとは夢にも思わない後輩女生徒三人組の会話は、さらに続いた。&lt;BR&gt;「最初の彼女がリノアだもんね～！　あーこういうのが好みかぁ～って溜息ついたなぁあたし」&lt;BR&gt;「そうそう、美人だしさ、フェロモンばりばりじゃない？　勘違いしてその気にさせた男、けっこういたよね」&lt;BR&gt;　どうでもいいが、何でリノアは呼び捨てなのだろう……とスコールの頭の片隅で、ちらりと疑問が浮かんだ。&lt;BR&gt;　勘違いした男を大量生産…のくだりは、まぁ事実として知ってはいたのだが。&lt;BR&gt;「あ、ってことはさ、スコール先輩はそういう女が好みってことじゃない？」&lt;BR&gt;「え～？　セルフィ先輩にフェロモンなんて全然感じないよ～！」&lt;BR&gt;　……失礼な言い草である。&lt;BR&gt;　確かにリノアやキスティスのように色気がある方ではないかもしれないが。&lt;BR&gt;　セルフィが苦笑を深めてくすくす笑いだし、スコールの方が何となく憮然となった。&lt;BR&gt;「嘘～！　だって、今学園祭実行委員入ってる奴って、９割方セルフィ先輩狙いって話だよ？」&lt;BR&gt;「うわ、それマジで？」&lt;BR&gt;「あ、あたしもその話聞いたことある。なんか、セルフィ先輩と任務で一緒になったことのある奴って、大抵委員に立候補してるって言うよね。最近になって一気に委員数増えたしさぁ……」&lt;BR&gt;　スコールの動作をコントロールする部分が、そこでぴたりと制御不能に陥った。&lt;BR&gt;　なんだか、非常に、ものすごく不機嫌な感じが全身の七割ばかりを占め始めている。&lt;BR&gt;　左頬あたりにセルフィの視線を感じたが、そちらに顔を向ける気にもならなくなっていた。&lt;BR&gt;「あとほらほら、最近有名なのがさ、図書委員長のあれ……名前なんだっけ。ちょっとカッコいい人」&lt;BR&gt;「マルスト・ワーリック？　でもあの人軽くて、眼に付く女の子はみんな声かけてるって話じゃない」&lt;BR&gt;「でもセルフィ先輩にはけっこう特別ぽい感じなんだって。よく二人で一緒にいるとこ見るし、けっこう噂だよ。&lt;BR&gt;　セルフィ先輩って誰にでも無防備だもんね。それにやっぱ可愛いしさ、リノアは勘違いさせまくりだったけど、セルフィ先輩の場合って勘違いしたくなっちゃうって感じなんじゃない？」&lt;BR&gt;「うっわ罪作り～」&lt;BR&gt;　けらけらと明るい笑い声。&lt;BR&gt;　スコールの隣で、ふいにセルフィが軽く息をついた。&lt;BR&gt;　ただそれだけのことにひどく驚き、スコールはセルフィを見下ろす。何を考えているのか、表情の読めない顔。&lt;BR&gt;　つかつかとデコーダーの前に歩み寄り、勢いよく自分のIDカードをスリットに切り落とす。小さな電子音と共にドアが開き、中にいた後輩女生徒三人組が驚いたように振り返り、セルフィとスコールの姿を認めてぎょっと息をのんだ。&lt;BR&gt;「……おはよ～」&lt;BR&gt;　にっこりとセルフィが小首を傾げて微笑む。その笑顔を見て、三人娘がぱきりと凍りつき、スコールは嘆息した。&lt;BR&gt;（怒ってるな……）&lt;BR&gt;　セルフィが怒ることなど滅多にないので、実に珍しい。&lt;BR&gt;　トラビアもここまでというくらい寒風吹きすさぶ室内に入りながら、誰のための怒りだろう、とスコールはふと思った。&lt;BR&gt;　なんとなく、面白くなかった。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;「あっ、そ～だスコール、あのねあのね！」&lt;BR&gt;　入室から数分後、唐突に寒い空気を吹き飛ばすような勢いでセルフィが声を上げた。&lt;BR&gt;　退室する訳にもいかず、息を詰めて黙々と生徒達から集めた企画案を清書していた三人娘が、同時にびくりと肩を震わせたが、セルフィは三人娘のことなど頓着していなかった。&lt;BR&gt;　もともとセルフィは負の感情を継続させられるようなタイプの少女ではない。&lt;BR&gt;「なんだ」&lt;BR&gt;　こちらは未だかすかに残る面白くない気分を引きずりつつ、いつも通りにそっけなくスコールは返事をする。&lt;BR&gt;「あのね、今年ももう終わりでしょ～？　だからだから、毎月のレベル検査終わったら～、ぱーっとなんかやろうよ～！　年越しダンスパーティとか～！」&lt;BR&gt;　毎月のレベル検査というのは、SeeDに毎月課せられているレベル査定試験のことである。&lt;BR&gt;　なるまでが大変だと思われがちなSeeDだが、なってからももちろん大変なのだ。追いつけ追い越せで気を抜けば容赦なくふるい落とされる。戦闘能力以外に求められるものが多すぎるのだ。&lt;BR&gt;　というわけで、セルフィのこの言葉を聞いた瞬間、スコールは顔も上げずにぴしゃりとこう答えた。&lt;BR&gt;「誰が、いつ準備するんだ」&lt;BR&gt;　言外に俺は絶対にごめんだと予防線を張っている。セルフィはにこにこと笑った。&lt;BR&gt;「とりあえずあたしかな～」&lt;BR&gt;「そんな暇がどこにあるんだ？」&lt;BR&gt;　憮然とスコールはセルフィを振り返る。&lt;BR&gt;　ただでさえ学園祭実行委員会の運営やらSeeDの任務やらで忙しいくせに、この少女ときたら頼まれるとホイホイ引き受けてしまう性格らしく、情報処理学科の臨時講師やら幼年学級の初級魔法講座の講師やら、ガーデンネットワークのネットワーク管理者なんて肩書きをいつの間にか保持していたり、存在していたのかも怪しい放送部なんてものにもちゃっかり在籍してガーデン中にその美声を響かせていたりするのだ。&lt;BR&gt;　これだけプライベートのかけらもない生活を送っておいて、一体どうトチ狂えば年越しパーティなんぞを立案実行する時間を捻出できるというのか。&lt;BR&gt;「えへへ～、セフィちゃんは時間の使い方は上手だからだいじょ～ぶ！　で、一応ガーデンいいんちょのスコールに許可もらえたら～、学園長に企画書出したいんだけど。だめ？」&lt;BR&gt;　あっけらかんと笑ってセルフィは答え、スコールは大きく息をついた。……泣く子とセルフィにはとにかく勝てない以上、最終的には頷いてしまうのが自分でもわかっているのだが、素直に承諾するのも面白くなくて。&lt;BR&gt;「……試験終了後というと、何日だ？」&lt;BR&gt;　あぁもう甘いな俺は！　と内心嘆息しながら訊ねてみる。日程によっては……まぁ、進んでやる気はないけれど、ちょっとくらいなら手伝ってやっても良いかな……という考えがある。これで睡眠時間を削られて、戻ったばかりの体力を流出されるのも困りものだし……などと自分に言い訳めいたことをあれこれあれこれ考えていると、&lt;BR&gt;「そうだな～、あたし年末はトラビア行っちゃうから～、25日前後が妥当かな？」&lt;BR&gt;　ものすごく意外な返答が返ってきた。&lt;BR&gt;「…………なんだって？」&lt;BR&gt;　あまりに唐突なその言葉に、ちょうどあれこれ考えていたせいもあって無防備に顔を上げて呟いてしまったスコールに、セルフィはちょっと小首を傾げて困ったように微笑んだ。&lt;BR&gt;「ん？　あ～言ってなかったっけ？　あたし、去年もそうだったんだけど～、年末年始はあっちで過ごすから。ちゃ～んと休暇届も受理されてるし！」&lt;BR&gt;「…………」&lt;BR&gt;　スコールはゆっくりとまばたきを繰り返した。&lt;BR&gt;　ねんまつねんしって何だっけ？　と頭の中は完全に平仮名化している。&lt;BR&gt;「……初耳だが」&lt;BR&gt;　かろうじて脳みその15％ほどがまともに機能し、確認するように呟いてみる。&lt;BR&gt;「うん。だってスコールはんちょ最近ガーデンいなかったし」&lt;BR&gt;　にこにことセルフィが笑顔で応じる。&lt;BR&gt;　実を言うとスコールがこの一ヶ月馬車馬のように忙しかったのは、セルフィの分の依頼まで分捕って仕事をしていたからなのだが、これはスケジュール管理のシュウとスコールだけの秘密事項なので口には出来ない。&lt;BR&gt;「休暇届は一週間だから～、帰ってくるのは三日の夜かな～？　もしかしたら四日の朝になるかもしれないけど、その辺はシュウ先輩にスケジュール確認して決める感じにな」&lt;BR&gt;　がたん。&lt;BR&gt;　セルフィの言葉の途中を分断するような勢いで、スコールが立ち上がった。&lt;BR&gt;　驚いたようにセルフィが声をのみこみ、気の毒な後輩三人娘が声もなく身をすくませた。スコールはセルフィにも後輩娘たちにも視線一つ向けず、無言のままPCをスリープさせて大きなストライドでドアへと向かう。&lt;BR&gt;「スコール？」&lt;BR&gt;　それでもそこで殺気ばりばりの背中に声をかけることができたのは、さすがセルフィと言うべきか。&lt;BR&gt;　シュッと音を立てて開くドアの前で、スコールは数秒立ち止まった。&lt;BR&gt;　別に怒ったって仕方のないことなのに何やってんだ俺バカなんじゃないか？　先ほどからかろうじてまともに機能している脳の15％が至極冷静に自分へ言い聞かせている。&lt;BR&gt;　だが哀しいかな、その瞬間のスコールは残り85％に忠実に動いてしまっていた。&lt;BR&gt;「……あんたは」&lt;BR&gt;　振り返る。真正面から大きな翠の瞳を見てしまって、不覚にも言葉につまった。&lt;BR&gt;　大体なんであんたはガーデンにいる間くらい大人しくしていないんだ。暇さえあれば飛び回って色んな奴と楽しくやっててあんたと俺がガーデンにいる時間内で俺たち一緒にいるのってその何割か考えた事あるか？その上休暇をとってトラビアってなんだよそんなにここにいたくないのかそれとも俺と、&lt;BR&gt;「…………」&lt;BR&gt;　だめだ。何をどう言っても物凄く格好悪い。単なる嫉妬に狂った馬鹿男の与太にしか聞こえない。――実際まさにその通りなのだが、それを露骨に表に出すにはスコールのプライドは少々高すぎた。&lt;BR&gt;　セルフィは何も言わない。制服の胸にそっと手を置いて、静かに言葉を待っている。だがその沈黙が、スコールにはただただ重かった。&lt;BR&gt;「……もういい。勝手にしろ」&lt;BR&gt;　結局自分でも呆れるほど冷たい声で一言告げて、廊下に進み出る。勢いよく背中でドアが閉まった。これが電子制御でよかったと瞬間考える。&lt;BR&gt;　手動のドアだったら、力を入れすぎて壊してしまっただろう自覚があった。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　ずんずんとあてどもなく廊下を進んで、スコールはようやく自分の名を呼ぶ存在に意識を向けた。&lt;BR&gt;　振り向くと、艶やかな黒髪を短く切り揃え、勝気な瞳を持つSeeDの女性が立っていた。&lt;BR&gt;「ずいぶん気づくのが遅いのね。何、考え事？」&lt;BR&gt;　呆れたように肩をすくめるシュウに、スコールは慌てて首を横に振る。現在色々な意味で世話になっているこの先輩SeeDには、まったく頭が上がらないのだ。&lt;BR&gt;「いや……すまない」&lt;BR&gt;「別にかまわないけど、あんたあまり殺気ボロボロ撒き散らしながら歩くのやめた方がいいよ。私らはともかく、子供は怖がるでしょ」&lt;BR&gt;　やれやれと溜息をついてこんなことを言われるほど、自分は殺気に満ちていたのだろうか。複雑な気分で押し黙るスコールにかまわず、シュウは手にしていたモバイルを取り出した。&lt;BR&gt;「さて、それで任務の話なんだけど……あっちに指名が来たけど、どうする？」&lt;BR&gt;　あっち、というのは当然、セルフィを指している。&lt;BR&gt;　ラグナを通して控えてもらうよう頼んであるはずだが、相変わらずエスタの首脳陣は懲りていないらしい。&lt;BR&gt;　セルフィがまたどんな依頼も完璧にこなしてしまうため、日に日に彼らは増長し、彼女の名声を高めるためだけの任務は過激さを増す一方で、ついに堪忍袋の緒が切れたスコールがシュウに事情を説明し、セルフィ指名の任務依頼をスケジュールの都合がつかないとの理由でことごとく、スコール自身が引き受けるようにしてもらっていた。セルフィには個人指名を不可にしている、とだけ説明しているが、察しの良い彼女がどこまで感づいているかはわからない。&lt;BR&gt;　元から世界の注目度は高かったスコールだ。さらに上がっても大差はないし、遺産継承者がスコールであると世界が勘違いを深めてくれるなら文句はない。矢面に立つくらいの覚悟は、とうの昔にできている。&lt;BR&gt;「ってことはエスタか？　今度はなんだ」&lt;BR&gt;「残念。今回はガルバディアよ」&lt;BR&gt;　エスタの依頼とばかり思っていたスコールは、意外な一言に眼をまるくしてシュウの顔を見た。&lt;BR&gt;「何でガルバディアなんだ？」&lt;BR&gt;　さぁ、とシュウは軽く肩をすくめた。&lt;BR&gt;「元々あちらさんはエスタに対して、変にライバル意識持ってるお国柄だからね……どういうルートで情報流れたかは知らないけど、対抗意識燃やしたんじゃない？&lt;BR&gt;　ちなみに依頼内容はドール国境線上に多発するテロの鎮圧。最近多いらしいわよ、テロ活動」&lt;BR&gt;　しかしガルバディアは、あまりSeeDに良い感情を抱いていないお国柄でもあったはずなのだが……カーウェイが大統領に就任したことで、あの国も色々と意識改革が進んでいるのだろうか。&lt;BR&gt;　あれこれ考えながら、スコールは面倒そうに頷いた。&lt;BR&gt;「わかった。俺が行く」&lt;BR&gt;「オッケ。他のパーティは私が決めるから、あとでメールするわ。あともうひとつ、あんた指名で依頼が来てんのよ、ガルバディアの上級将校さんから」&lt;BR&gt;「……俺に？」&lt;BR&gt;　眉をひそめるスコールに、シュウはにっと笑った。&lt;BR&gt;「そ。なんでも将校のお嬢さんに対する脅迫状が届いたそうで、ここはひとつ名高いあんたにガードしてもらいたいってことらしいわ。テロ鎮圧は大がかりの作戦だし、時間かかるだろうから、あんたは先にこっちを片づけて、後から合流する方が効率いいかもね。指揮官にキスティスをあげるから、適当に調整してちょうだい。&lt;BR&gt;　あんたの彼女には、エスタの企業スパイの片づけにでも行ってもらうことにするわ」&lt;BR&gt;　最近多いな、とスコールが苦く呟く。――戦場以外で戦闘員以外の人間を殺すのはいつも後味が悪い。もちろん戦場であろうとなかろうと、人殺しには違いないのだが。&lt;BR&gt;「殺すと限ったわけじゃないし、そんなことであの子は泣かないでしょ。じゃね」&lt;BR&gt;　かすかな呟きにも耳ざとく言葉を返し、シュウはさらりと黒髪を揺らしてスコールの脇を通り過ぎていった。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　シュウからのメールを受け取り、詳細を確認した後スコールがキスティスの部屋を訪ねたのは、もう深夜と呼んで差し支えない時間帯だった。&lt;BR&gt;　こんな時間だと言うのに嫌な顔ひとつせずスコールを迎え入れたキスティスは、スコールに椅子を勧めて自分はベッドに座り、ごくごく事務的にスケジュール調整について確認し、手帳に決定事項を書き留めながらさらりと訊ねた。&lt;BR&gt;「喧嘩したんですって？」&lt;BR&gt;　まるで任務内容の確認でもするような口調だった。&lt;BR&gt;「…………」&lt;BR&gt;　あまりに唐突すぎて、思わず言葉を失ったスコールに、キスティスは手帳に視線を落としたままくすくすと笑い出した。&lt;BR&gt;「あぁ、喧嘩とは違ったわね。あなたが勝手にセルフィに怒ってる――でしょ？」&lt;BR&gt;「……………………セルフィか？」&lt;BR&gt;　たっぷり三十秒ほど沈黙して、スコールはようやくそれだけ訊ねた。&lt;BR&gt;　キスティスのくすくす笑いが本格的な笑い声に変わり、綺麗な青い瞳がスコールを見上げた。&lt;BR&gt;「ばかね、あの子がこんなこと私に言うはずないじゃない」&lt;BR&gt;　彼氏のくせにそんなことも知らないの？　揶揄されて、スコールは面白くなさそうな顔でぷいと横を向いた。そんなことはわかっている――ただ、今日の一件を知っているのは自分とセルフィとあの後輩三人娘で、キスティスと三人娘の接点が思い当たらなかったから消去法で見当をつけただけのことだ。&lt;BR&gt;「あなたたちは本当に……自分たちの噂については何も興味がないのね。もうガーデン中が知ってるわよ」&lt;BR&gt;　呆れたようにキスティスはスコールにとって驚愕の事実を告げ、それにね、と心の中だけでこっそりと呟いた。&lt;BR&gt;（セルフィが私にスコールの話なんてするはずがないのよ）&lt;BR&gt;　キスティスからスコールの話題を振れば答えるが、セルフィからスコールの話題を振ってくることは、まず、ない。&lt;BR&gt;　たとえ話題を振られても、セルフィはさりげなくかつ迅速に話題を変えてしまう。&lt;BR&gt;　キスティスが長年スコールに対して抱いていた、複雑な想いの存在を知っているからこその、彼女なりの気遣いなのだろうとキスティスは思っているのだが。&lt;BR&gt;「……蝶みたいな子よね」&lt;BR&gt;　難しい顔であれやこれやとぐだぐだ考えているらしいスコールを見つめたまま、キスティスはなるべく優しい声でそう話しかけた。スコールが群青の瞳をキスティスに向けてくる。&lt;BR&gt;「あなたみたいに独占欲の強いタイプに、ああいうつかみ所のない子の相手をするのは正直、大変だろうと思うわ。&lt;BR&gt;　でも何でか、あなたってああいう子が好みなのよね。わかりやすいわ」&lt;BR&gt;　ふふっといたずらっぽく笑うと、スコールがちょっと困惑したような表情になる。――彼の動きの少ない表情を読むことにかけては、キスティスには絶対の自信がある。伊達に何年も見つめ続けていない。&lt;BR&gt;「自分で気づいていない？　セルフィとリノアの最大の共通点」&lt;BR&gt;　刺すような胸の痛みはとりあえず無視だ。&lt;BR&gt;「あの子達は、誰の心の中にでも簡単に入り込むことができる才能があるのよ。持って生まれた資質ね」&lt;BR&gt;　そしてそれは絶対にキスティスには不可能なことなのだ。&lt;BR&gt;　何年も何年も傍にいたはずなのに、キスティスはスコールの心の中には最後まで踏み込めず、リノアとセルフィはそれをいともたやすく可能にした。&lt;BR&gt;「そういう子があなたはタイプなんだもの、この手の苦労は予測しておいて然るべきだと私は思うわ。&lt;BR&gt;　ましてリノアはまだ懐に入り込む相手を選んでいたけど、セルフィは誰彼構わずなんですもの。リノアの時よりもっと苦労するのなんて、眼に見えていたはずじゃない？」&lt;BR&gt;　言いながらキスティスはちょっと不思議に思った。どうして自分は口を開けばいつだって、こんなふうに説教じみた言葉をかけてしまうのだろう。&lt;BR&gt;　リノアと自分の違いは育ちの違いから来るものだと思っていた。明らかに苦労知らずのお嬢様育ちである彼女だからこそ、あれほどに開けっぴろげで無邪気にスコールの殻を破り、心の奥まで踏み込めたのだと思っていた。&lt;BR&gt;　だから、エスタのサードパニックを経てスコールがセルフィを選んだと知った時、キスティスは本当に複雑な気持ちになった。自分以上に辛い過去を山のように背負っているはずなのに、なぜセルフィは警戒なく他人の懐に飛び込むことができるのだろう。&lt;BR&gt;　そこまで考えて、そしてキスティスはようやく納得したのだ。育った環境よりも、これはもう個人の資質としか言い様はないのだと。&lt;BR&gt;「……何でもお見通しなんだな、キスティスは」&lt;BR&gt;　その時、ふっと頑なな表情をかすかにゆるめてスコールが呟いた。&lt;BR&gt;　予想と少し違う反応に、キスティスの方が驚く。いつもならこんな時、思考の迷路にはまって憮然としてしまうのがこの青年の常であったはずなのに。&lt;BR&gt;「私は見通すことができるだけよ。それをこうして口にして、あなたの視野をクリアにすることができるだけ。&lt;BR&gt;　それにわかってあげてほしいのよ。今のあの子がどれだけ勇気を出して、バラムガーデンで居場所を作っているか」&lt;BR&gt;　これは本音だ。&lt;BR&gt;　あのセルフィに影響力を持つ数少ない人物として、せめてスコールは理解しておいてほしいと。この複雑すぎて自分でもよくわからない感情を飛び越えた部分で、彼女をわかってやってほしいと、祈りにも似た気持ちで願っている。&lt;BR&gt;「勇気……なのか？」&lt;BR&gt;　複雑な眼差しでキスティスを見つめながらスコールが訊ねる。&lt;BR&gt;　キスティスはわずかな呆れを含んだ微笑でそれに頷いた。&lt;BR&gt;「勇気よ。じゃあ、あなたは、どうしてエスタパニック前に学園祭実行委員になる子がひとりもいなかったと思ってる？」&lt;BR&gt;「……え？」&lt;BR&gt;　意外な言葉を聞いたとでもいうように、スコールは眼をまるくした。&lt;BR&gt;　わずかな沈黙。&lt;BR&gt;「……それは……セルフィがここに……バラムにいなかったせいで……」&lt;BR&gt;「森のフクロウ契約終了後から、トラビアガーデン長期出張が決定するまで何ヶ月あったと思っているの？　それにトラビアに行ってからも、あの子はレベル考査にはバラムに来ていたし、その間に勧誘しようと思えばできたはずよ」&lt;BR&gt;　多忙な任務とリノアとの恋との両立で神経をすり減らしていた、あの頃のスコールは気づかなかっただろう。&lt;BR&gt;　当時のスコールもセルフィも、お互い自分のことだけで精一杯だったのだから。&lt;BR&gt;「私が見る限り、初めのうちはあの子も積極的に委員勧誘をしていたわ。でもみんなに断られて……あの子の誘いに応じたのは、あなただけだった。&lt;BR&gt;　だけどそれは、セルフィが転校して日が浅くて、信頼に足るのかどうかの見極めがみんなつかなかったせいだから、仲良くなっていくにつれて委員会に入ってくれる子はいるはずよって、私はあの子にそう言ったことがあったわ。&lt;BR&gt;　でもね、魔女戦争が終結して世界が元に戻って、森のフクロウの契約も終えてからも、あの子は委員勧誘なんて始めなかったの。何もかも全部ひとりで頑張って、山のような任務を片っ端から引き受けて、……」&lt;BR&gt;　その様子をキスティスはすべて見ていた。セルフィが無邪気な笑顔の奥で少しずつ、静かに壊れていくようで辛かった。壊れていく証左を目の当たりにしたあの時、感じたのは紛れもなく恐怖だった。&lt;BR&gt;　けれど、キスティスには何もできなかった。どうすればいいのかわからなかった。&lt;BR&gt;　スコールの心の内を見抜きながら、結局その殻を破れなかったのと同じように、キスティスはセルフィが自分で覆った笑顔の殻を破ってやることができなかった。&lt;BR&gt;「セルフィがまた、転校初日の頃と同じように活動をはじめたのはね、エスタのサードパニックから帰ってからよ」&lt;BR&gt;　この青年はどうやって、セルフィの笑顔の殻を破ったのだろう。そんな疑問がふとキスティスの脳裏に浮かんだ。&lt;BR&gt;　スコールにはキスティス同様、リノアやセルフィのような才能はなかったはずなのに。&lt;BR&gt;「私はあの事件のことを詳しくは知らないけれど、あの子が他人と繋がりを持つ勇気を出すようになったのは、そのきっかけを作ったのは、あなたなんでしょ？　スコール」&lt;BR&gt;　どういう経緯で、どんなふうに二人が恋に落ちたのか、キスティスは知らない。&lt;BR&gt;　スコールがセルフィを選んだと知らされた瞬間は、やはりどこまでも自分はスコールと縁の重なることはないのだと、思い知らされたような気がした。ショックでなかったと言えば、嘘になる。&lt;BR&gt;　ただ、セルフィが内から壊れる寸前に立ち直り、スコールが以前より意外なほどよく笑顔を見せるようになったという事実が、キスティスにとっては小さな慰めだった。&lt;BR&gt;「俺は……何も……」&lt;BR&gt;　ふるりと首を横に振って、スコールが視線を落とした。&lt;BR&gt;「謙遜なんてしないで。そのくらい見ていればわかるわ。……あの子は今、本当に必死で勇気を絞り出して頑張っている。その勇気の源は、間違いなくあなたなのよ、スコール。それさえわかっていれば、つまらない嫉妬であの子を困らせる必要なんてどこにもないでしょう？」&lt;BR&gt;　その一言で、スコールの鉄面皮が朱に染まった。&lt;BR&gt;　あの魔女戦争の最中、ラグナロクで「ばか」と罵ったキスティスの前で見せたのと、まったく同じ、子供のような顔。&lt;BR&gt;　ふいにキスティスはおかしくなって、笑いをこらえるために必死で頬を引きつらせる羽目になった。&lt;BR&gt;「……ねぇスコール。あなた、リノアがあなたとつき合っていた頃、どうしてあなたが他の女の子と少しでも親しくするとリノアが怒っていたかわかる？」&lt;BR&gt;　ほんの数ヶ月前の出来事なのに、なぜかひどく遠い過去のような気がする思い出を辿りながらキスティスは訊ねた。&lt;BR&gt;　スコールの独占欲の強さは初めからだが、リノアのそれはつき合う期間が長くなれば長くなるほど強くなるものだった。&lt;BR&gt;　恐らく、後半はスコールよりリノアの方が、多く嫉妬心を表に出していたのではないかとさえ思う。&lt;BR&gt;　その理由をよく理解できないままでいるらしいスコールを見つめながら、キスティスは囁くように告げた。&lt;BR&gt;「自分に自信がないから。……自分が相手に好かれるだけの自信が少しもないから、不安で嫉妬するの」&lt;BR&gt;　それを通り越してしまうと、もはや嫉妬する気すら起こらなくなるのだが、キスティスはそのことは言わなかった。&lt;BR&gt;　ずきりと痛い顔をして、スコールがキスティスを見る。無言で視線を受け止めたキスティスと数秒間眼を合わせ、やがてゆるゆると視線が屈折し床に落ちた。&lt;BR&gt;　色々考えているのだろう整った横顔に、キスティスはふと思いついたように訊ねた。&lt;BR&gt;「ねぇ、スコールはセルフィの部屋に入ったことはある？」&lt;BR&gt;　唐突な質問に、床に落ちていたスコールの視線が、不思議そうな光を帯びてキスティスを捉えた。&lt;BR&gt;「いや……」&lt;BR&gt;　八割方予測通りの返答だった。&lt;BR&gt;　やっぱりね、と心の中で嘆息し、キスティスはスコールから視線を外す。&lt;BR&gt;「でしょうね。……知ってる？　あの子、自分の部屋に他人を入れたことって一度もないのよ」&lt;BR&gt;　え？　とかすかに呟く声がキスティスの耳に届いた。&lt;BR&gt;　それ以上は口にする領域ではないと判断し、キスティスはにこりと微笑んで立ち上がった。&lt;BR&gt;「……少し話しすぎたわ。ごめんなさいね、相変わらずのお節介で」&lt;BR&gt;　いいながらスコールの腕にそっと触れて促す。何かを言いたげな眼差しでスコールは立ち上がり、キスティスはその背を押してドアへと誘導しながら静かに続けた。&lt;BR&gt;「……じゃあ、おやすみなさい」&lt;BR&gt;　囁くように告げると、何かを言いたげだったスコールが、ふっと言葉をのみこみ、少しの間視線を空に彷徨わせた。&lt;BR&gt;　数秒の沈黙。&lt;BR&gt;「……あぁ……遅くに、すまなかった」&lt;BR&gt;　のみこまれた言葉の行方をキスティスはぼんやり辿りながら、ふわりと微笑した。&lt;BR&gt;「かまわないわ。じゃあね、スコール」&lt;BR&gt;　囁きながら手はすでにロックを作動させていた。&lt;BR&gt;　まだ言葉を探そうとするスコールの前で、音もなくドアが閉まり、互いの姿を遮断した。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　キスティスの部屋を辞して、スコールは少し迷った末、セルフィの部屋に向かった。&lt;BR&gt;　部屋の位置はもう覚えている。だが――確かにキスティスに言われた通り、部屋の中に入ったことは一度もない。&lt;BR&gt;　スコールとしても、自分から赴くよりは来てもらった方が楽ということもあり、自分の部屋のパスコードは教えてあったが、彼女の部屋のパスコードを教わろうと思ったことは一度もなかった。……もちろん、最近支給された指揮官権限のＩＤがあれば、いつでもどの部屋にでも入ることが可能だったから、というのもあったのだけれど。&lt;BR&gt;　でも、そうだ。言われるまでもない、スコールはこの部屋にセルフィ以外の他人が入っているところなど、一度も見たことがない。リノアの部屋、キスティスの部屋、ゼルやサイファーや――そして自分の部屋にいるセルフィは何度も何度も見ているのに。&lt;BR&gt;　それに。就寝時間以外にセルフィ自身が、この部屋にいること自体数えるほどもない。だからこそ自分はセルフィに会おうと思うとガーデン中を探し回る羽目になり、苛立ちが募って結果昼間の喧嘩に発展したのではなかったか。&lt;BR&gt;　ようやく部屋にたどり着いたが、中は空であることをＩＤデコーダーが示していた。&lt;BR&gt;　留守だといって、勝手に部屋に入るなんてことはできない。主の許可もなく、誰も踏み入れることを許さない部屋に入って、それで一体どうしようというのか。&lt;BR&gt;　いくら独占欲の強さを自他共に認めるスコールだって、好きな女の子の意志はちゃんと尊重するのだ。&lt;BR&gt;（留守だとして……どこに行ったんだ？）&lt;BR&gt;　彼女の任務が今夜からという話は聞かなかった。この時間帯で彼女のＩＤが開くことのできるドアは、眼の前の部屋と、学園祭実行委員用の部屋と、執務室くらいだ。何やら色々企てているみたいだったから、危惧通りに睡眠時間を提供して企画書でもまとめているのか、別の仕事を抱えているのか。&lt;BR&gt;　キスティスに言われた通り、一方的に怒るだけ怒って以降顔も合わさなかったスコールとしては、キスティスと話したことで頭も大分冷え倍増した後味の悪さに、とにかく探すだけ探そうと決心した。これから長期任務に入るのに、喧嘩したままというのはやはり問題がある。&lt;BR&gt;&lt;BR&gt;　いるだろうと見当をつけた実行委員会室にも執務室にも、人の気配は存在しなかった。&lt;BR&gt;　以前かわした会話を思い返しセルフィが知るだろう抜け道とその先の隠れ場所にも足を運んだが、そのどこにも少女の姿は見当たらず、部屋に帰ってくる気配も一切なかった。&lt;BR&gt;　仕方なく自室に戻り、ベッドに潜り込んでもスコールはなかなか眠れず、無意味に寝返りを繰り返した。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　翌朝、スコールは早くに起き出すと、ガルバディアに向かう準備をし、荷造りを終えるとまず最初にセルフィの部屋を訪れた。&lt;BR&gt;　昨夜同様に、ＩＤデコーダーは部屋の主が留守であることを示していた。&lt;BR&gt;　電話の一本もかけてみればいいのでは、と一瞬スコールは思い至ったが、ガーデン内で彼女が携帯を持ち歩いている可能性の低さを思いやめておく。緊急に彼女を呼び出すつもりなら、いつも持ち歩いているモバイルにメールした方が絶対に早い。携帯だと制服に入れっぱなしで部屋に忘れていることがほとんどだからだ。&lt;BR&gt;　スコールは時計に眼を落とす。まだこの時間では食堂も開いてはいない。これから試験間近まで任務やら何やらで忙しくなりそうだし、ガルバディアに持っていく参考書くらい借りておいた方がいいかも知れない。図書室もまだ開いてはいないだろうが、スコールのＩＤなら入り込むことができる。&lt;BR&gt;　考えをまとめると、スコールはその足で図書室に向かった。&lt;BR&gt;　それが間違いだった。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　図書室は思った通りロックされていた。&lt;BR&gt;　ＩＤをスリットに切り落とし、ロックを解除してドアを開く。中に入ってロックシステムを作動させて、そこでようやくスコールは内部に人の気配を感じた。&lt;BR&gt;（誰だ？）&lt;BR&gt;　混乱する。たった今自分はこの図書室のロックを外したばかりだ。それとも自分同様早朝に勉強しにきた図書委員がいたのだろうか。自分がこのまま中に入っていったら、もしかしたら面倒なことになるかもしれない。&lt;BR&gt;　だが、無防備に入室したスコールの気配は、当然相手にも察知されていた。軽やかな足音。&lt;BR&gt;　そして、ふいに鈴のような声が響いた。&lt;BR&gt;「あれ～？　スコールおはよ～」&lt;BR&gt;　……驚いた。&lt;BR&gt;　ものすごく、真剣に、これ以上ないくらいスコールは驚いて、立ちつくした。&lt;BR&gt;　そこにいたのがセルフィだったからだ。&lt;BR&gt;「なに～？　スコールもおべんきょなんだ～？」&lt;BR&gt;　長袖のクリーム色のカットソーに黒のジャンパースカート。形の良い脚にぴったりとしたニーソックスはどう見ても普通の部屋着で、どこかに出かけていたという格好ではない。&lt;BR&gt;「……『も』ってことは……」&lt;BR&gt;　驚きからまだ立ち直れないまま、スコールは無表情に呟く。あぁ、と昨日のことなどかけらも見いだせない笑顔でセルフィが頷いた。&lt;BR&gt;「な～んか任務入っちゃって～！　先に単語帳だけでもまとめとかないと、基礎モンやばいもんね～！」&lt;BR&gt;　基礎モン、とは基礎モンスター生態学の略で、セルフィにとってはもはや鬼門に等しい苦手科目だ。&lt;BR&gt;　セルフィは電子情報戦や魔法分化学だのといった科目が得意で、特に電子情報戦ではトップ常連だったスコールやキスティスを蹴落として首位におさまり、以降一度もトップを譲ったことがないほどの優秀さを誇っているくせに、苦手な科目となると本当にこれがSeeDの成績なのかと頭を抱えたくなるほど成績が低迷する。好きな教科と嫌いな教科で、成績の差が恐ろしく開いているタイプなのだ。&lt;BR&gt;　そして最も苦手なのが単純暗記物で、記憶力は決して悪くはないのだが、興味のない物、覚える必然性を感じないものに関しては感動的に覚えが悪い。基礎モンスター生態学を例に挙げれば、「レベル50パイセージの使用技を上げよ」とか「死霊の息を使用するガルバディア大陸に生息するモンスター名を上げよ」なんて問いがくればセルフィにはまず、答えられない。だが実戦で大塩湖でパイセージにエンカウントすれば「のろいをかけられるかもしれないからエスナを用意して！」と後輩に指示を出したり、ブラットソウルにエンカウントすれば「死霊の息は単体攻撃だから怖くないよ～」などと言っている。――つまるところ、モンスターの顔と名前はまるで一致しないが、顔と特徴はちゃんと一致しているし、それで実戦に支障はないから覚える気になれないという訳なのだ。&lt;BR&gt;　だがそれで毎回基礎モンスター生態学を落とすわけにもいかないので、毎度毎度単語帳に埋もれて無理矢理モンスター名を頭に叩き込まざるを得ないのだ。&lt;BR&gt;　事実、ほらねとセルフィが指さしているテーブルの上は、愛用ノートPCに参考書や教科書、ノートの他に単語帳が山になって積まれている。空気に残る柑橘系の香りが、長く彼女がここにいたことを示していた。&lt;BR&gt;　なるほど勉強していたのは確からしい。だが問題はそこではなくて。&lt;BR&gt;（どうやって入ったんだ？）&lt;BR&gt;　夜中はロックがされる図書室は、図書委員と教官権限のＩＤでしか扉を開くことはできないはずだ。&lt;BR&gt;「そいえばさ～、下旬におっきな作戦があるんだってね～昨日キスティに教えてもらっちゃった。あたしは今回不参加らしいけど、スコールも参加するんでしょ～？」&lt;BR&gt;　にこにこと笑顔をふりまきながらセルフィはテーブルに戻り、椅子に座って話しかけてくる。どう切り出していいものかわからないまま、スコールは曖昧に頷いていた。&lt;BR&gt;「だよね～。久々におっきい作戦だから、SeeD実技試験も行うって話だよ～」&lt;BR&gt;　それは初耳だった。&lt;BR&gt;　SeeD選考のための筆記試験は定期的に行われているが、実地試験は大規模作戦の依頼がこない限り行いようがないし、候補生参加を依頼主に認可してもらうための折衝もあり、スケジュールが決まるのは大抵突然だ。&lt;BR&gt;「もしスコールはんちょの部下になったらよろしくしてあげてね～ひとりガンブレード使いの子がいるから多分配置されるとしたらスコールの下だと思うんだ～」&lt;BR&gt;　例によって顔の広さを発揮して、セルフィは今回のSeeD候補生とあらかた面識があるらしい。SeeD実地試験の話もそこから聞いたのだろう。&lt;BR&gt;「でもスコールそれだけじゃなさそうだね～？　別の任務も入っちゃったとか～？」&lt;BR&gt;　山になった単語帳には眼もくれず、ノートPCのキーボードを凄まじいスピードで叩きながらセルフィが言った。&lt;BR&gt;　画面にいくつもウィンドウが現れ、スクロールに合わせてログが流れていく。&lt;BR&gt;　相変わらず華麗な指さばきに感心していたので、スコールは反応に少し遅れた。&lt;BR&gt;「……あぁ……まぁ……」&lt;BR&gt;　頷いて、ふとそこでいたずら心が芽生えた。&lt;BR&gt;「ガルバディアの令嬢のボディガードらしい」&lt;BR&gt;　普段なら任務内容など絶対に口にしないのに、そんなことを言っていた。&lt;BR&gt;　カタカタと軽快にキーボードの上を踊っていた細い指が、ぴたりと動きを止めた。&lt;BR&gt;　大きな翠の瞳が振り返る。&lt;BR&gt;「リノアになんかあったの？」&lt;BR&gt;　瞳に浮かんだ軽い驚きは、どうやら友人の身に対する心配であったらしい。&lt;BR&gt;　なんとなく面白くない気分で、スコールは首を横に振った。&lt;BR&gt;「……リノアじゃない。ガルバディアの上級将校の令嬢なんて他にもいるだろ」&lt;BR&gt;「あ、そっか～な～んだ」&lt;BR&gt;　ほっとしたようにセルフィが笑い、またノートPCに真向かって何やらキーを叩き出す。&lt;BR&gt;（……それだけか？）&lt;BR&gt;　ますます面白くない気分で、スコールは口を閉じた。&lt;BR&gt;　データディスクをPCに突っ込み、ファイルのコピーをはじめるセルフィはそんなスコールの様子にはまるで気づかない。&lt;BR&gt;　会話が途絶え、やがてスコールは先ほどの疑問が頭の中に戻ってくるのを止めることができなかった。&lt;BR&gt;　一体どうやって、セルフィはこの図書室に入り込んだのか。誰の助けを得て、それを可能にしたのか。&lt;BR&gt;　どうしても図書室に入りたければ、自分に頼めばすむことではないか。自分の持つIDが学園長室他一部の例外を除いたすべてのドアを開くことができるのは、セルフィだって承知のはずだ。そりゃ確かに、昨日はスコールの方がわざとセルフィを避けてしまっていたから、頼むに頼めない状況だったかもしれないけれど――&lt;BR&gt;「あ、そうそう、それでね、あたしがやりたいって言ってたパーティのことなんだけど～」&lt;BR&gt;　またもスコールの思考を分断するように、セルフィが声を上げた。&lt;BR&gt;「な～んかみんな忙しいみたいだし～、やめといた方が無難だよね～？　やるなら新年会にしろって言われちゃったし、お楽しみは来年に持ち越しかな～」&lt;BR&gt;　……誰に言われたのか、なんだかものすごくスコールは引っかかった。&lt;BR&gt;　しかしどう言えばそれが聞けるのかわからず、散々悩んだ末出た言葉は、まったく違うものになってしまった。&lt;BR&gt;「なんで図書室なんだ？」&lt;BR&gt;「え？」&lt;BR&gt;　振り返ったセルフィが小首を傾げる。自分の口下手に自分で苛立ちながら、スコールは広がった単語帳を視線で示して続けた。&lt;BR&gt;「個室なんだから、自分の部屋で勉強すればいいだろ？」&lt;BR&gt;　わざわざ閉館後の図書室に入り込んだりしなくても。&lt;BR&gt;　これがまだ執務室だったり実行委員室だったら、ここまで気にはならなかったかもしれない。&lt;BR&gt;（何を気にしてるんだよ、俺……）&lt;BR&gt;　自分でも意外なほど、昨日の後輩三人娘の会話が気にかかっていたらしいことにようやく気がついて、スコールは自分に少し驚いた。&lt;BR&gt;　そんなスコールの前で、セルフィは無言のまま、視線を床に落としている。&lt;BR&gt;　その表情を眼にとめ、スコールはまた驚いた。&lt;BR&gt;（なんで……）&lt;BR&gt;　なぜこんな顔をしてるのだろう。&lt;BR&gt;　痛いところを突かれてしまったような、触れられたくない部分に触れられたような、そんな表情で。&lt;BR&gt;　こんな顔をセルフィにさせる、一体何があの部屋にあるというのだろう。&lt;BR&gt;「えへへっ、今ちょっと散らかっているのです～」&lt;BR&gt;　ふいにセルフィが顔を上げ、にっこりと邪気なく笑った。無理矢理自分の心から視線を引きはがしたような笑顔。&lt;BR&gt;（なんなんだ？）&lt;BR&gt;　もうこうなるとスコールは気になって仕方がない。あっさりとスコールから視線をそらし、PCのコピー状況を確認している少女の横顔を凝視しながら、どう反応すべきか頭の中であれこれ考える。&lt;BR&gt;　と、その瞬間、背後で小さな電子音と共にドアの開く音が響いた。&lt;BR&gt;「あっ」&lt;BR&gt;　くるりと振り向いたセルフィが、時計に眼を走らせて声を上げる。&lt;BR&gt;「お、やっぱまだいたか」&lt;BR&gt;　声と共に姿を現した長身の青年が、セルフィを見てにっと笑い、手にしていた缶を放り投げた。放物線を描いてきっちりとセルフィの両手に落ちたそれは、買ったばかりの缶コーヒー。&lt;BR&gt;「……紅茶派だったらごめんな。……っと」&lt;BR&gt;　そこでふと青年の瞳がスコールを捉え、意外そうな顔になった。展開について行けずに呆然と青年を眺めていたスコールの頭に、ようやく彼に関する情報が甦ってくる。&lt;BR&gt;　マルスト・ワーリック。キスティスと同年で、ランク30の先輩SeeD。図書委員長。&lt;BR&gt;　昨日の噂の主に、こんな場面で出会うことになるとは思わなかった。&lt;BR&gt;「あれ、彼氏じゃん。なんだお前、結局開けてもらったの？」&lt;BR&gt;　とぼけたことを訊ねるマルストに、セルフィがううんと軽く首を横に振った。&lt;BR&gt;「違うよ～スコールはさっき来たばっかだよ～。あっ、あのねスコール、知ってるかもしんないけどマルスト先輩。次の任務で一緒の班になるんだよ～」&lt;BR&gt;「…………え？」&lt;BR&gt;　三拍ほど遅れてスコールはセルフィを見た。かけらほどの邪気もなく、にこにことセルフィは笑顔で頷く。&lt;BR&gt;「けっこう先輩と一緒の任務って多いんだよ～能力バランスってのが良いんだって～。&lt;BR&gt;　あっ先輩先輩、これ、はい」&lt;BR&gt;　コピーを終え、かしゃっと音を立ててPCから引き抜いたデータディスクを、セルフィは軽い動作で放って渡す。&lt;BR&gt;　少しノーコン気味に投げられたそれを器用に受け止め、マルストは人好きのする笑顔を浮かべた。&lt;BR&gt;「サンキュ。これあるとないとで大違いだからなぁ……お前SeeD辞めてもSEで食っていけるよ」&lt;BR&gt;「そ～かな～？　あっ、それでね、先輩の次の当番なんだけど～」&lt;BR&gt;「あぁ、試験二日前だっけ。好きに使えよ……任務がそれまでに終わったら、だけどな」&lt;BR&gt;「ぶ～。何がなんでも終わらせて帰るのです～」&lt;BR&gt;　むくれるセルフィに軽い笑い声を聞かせながら、マルストは自分用のコーヒーに口をつけ、それから無表情で立ちつくしているスコールに視線を向けると、あぁ、と小さく肩をすくめた。&lt;BR&gt;「悪い悪い、俺、彼氏が一緒と思ってなくてさ、二人分しか買ってこなかったんだよな……なんならこれ、飲むか？」&lt;BR&gt;「…………いえ、けっこうです」&lt;BR&gt;　飲みかけのコーヒーを突き出され、一瞬頭痛すら覚えてスコールは首を振る。&lt;BR&gt;「あっそしたらスコール、こっち飲む～？　えっへへ～間接キス～！」&lt;BR&gt;「いるか！」&lt;BR&gt;　反射的に叫んでしまったスコールに、マルストがぷっと勢いよく吹き出した。&lt;BR&gt;　思わず殺気立って睨んだスコールの眼差しを物ともせず、けらけらと脳天気に笑いながらセルフィを見る。&lt;BR&gt;「いや～お前の彼氏、マジおもしろいのな。意外意外」&lt;BR&gt;「えへへ～そうでしょ～けっこう可愛いでしょ～？　でもあげないからね～」&lt;BR&gt;　ご機嫌に笑いながらセルフィは机の上の教材の山を手早くまとめ、細い両腕に抱え込んだ。&lt;BR&gt;「んじゃ～あたし戻るね。スコールはおべんきょしてくの？」&lt;BR&gt;「え……あ、いや……」&lt;BR&gt;　そのつもりで来たのだが、何となくマルストと二人きりにされてしまうのも居心地が悪いものを覚え、歯切れ悪く返答を濁したスコールに、セルフィは不思議そうに小首を傾げる。&lt;BR&gt;「開館はしてるから、お好きにどうぞ。俺はとりあえずあっちで寝るわ」&lt;BR&gt;　スコールの戸惑いなどお見通しと言わんばかりにそう告げて、蔵書のある別室に身体を向けたマルストに、セルフィがくすくすと笑った。&lt;BR&gt;「もお、先輩、い～っつも寝てばっかって、三つ編みちゃんたちが怒ってたよ～」&lt;BR&gt;「うるせーな、自分の部屋にも帰れないお前に言われたかないねー」&lt;BR&gt;「トラビアから帰ったらちゃんとするもん～ほっといてよ～」&lt;BR&gt;　べーだ、とSeeDらしからぬ一言を最後に、セルフィは荷物をよいしょと抱え直し、じゃあねとスコールに笑いかけると軽い足取りで入口へと向かっていく。スコールは思わず呆然とその背中を見送ってしまっていた。&lt;BR&gt;（部屋に……帰れない？）&lt;BR&gt;　ドアの向こうに華奢な背中が消える。同時に背後でマルストが別室に入る音を聞き、ようやくスコールの足が動き出した。慌てて開いたままの図書室のドアから外に飛び出す。&lt;BR&gt;「……セルフィ！」&lt;BR&gt;　渡り廊下の窓から外を眺めながら、ゆっくり歩いていたセルフィが驚いたように振り返った。&lt;BR&gt;「なに？」&lt;BR&gt;　足早にスコールはセルフィの前まで来ると、立ち止まった。不思議そうな翠の瞳がスコールを見上げている。&lt;BR&gt;　その瞳をまともに見下ろして、スコールの頭がフリーズした。&lt;BR&gt;「部屋に何があるんだよ？　帰れないって……」&lt;BR&gt;　いやもしかしたら、もう随分前から思考回路は凍結していたのかもしれない。&lt;BR&gt;「え？」&lt;BR&gt;「なんであんたは自分の部屋にいたがらない？　誰一人部屋に上げようともしないんだ？」&lt;BR&gt;「え……あの……」&lt;BR&gt;　当惑したように、セルフィが眼をまたたいた。一歩スコールが足を踏み出し、セルフィがびくりと震えて一歩下がる。渡り廊下の壁に背中がどんとぶつかり、抱えていた単語帳がいくつか床に落ちた。&lt;BR&gt;　大きな翠の瞳の中で、様々な感情がいっせいに駆け抜けるのが見えた。&lt;BR&gt;「……どうして」&lt;BR&gt;　かすれた声で呟くように言いながら、スコールは壁に両腕を突いてセルフィを囲った。&lt;BR&gt;　なぜこんな顔をするんだろう。なんで自分は彼女にこんな顔をさせてるんだろう。どうして。&lt;BR&gt;「どうしてあいつやキスティスがそれを知っていて、俺が何も知らないんだ……？」&lt;BR&gt;　うつむきかけていたセルフィが、その言葉でふと顔を上げた。&lt;BR&gt;「……え？　キスティ？」&lt;BR&gt;　幼さの残る頬に朱が走り、瞳に明らかな衝撃が浮かんだ。&lt;BR&gt;　信じられないと言いたげに首をかすかに振る。なんで、とかすれ声の呟きが唇から漏れた。&lt;BR&gt;　それから眉をひそめ、まさか、と言うように図書室の方を見た。&lt;BR&gt;　その動作で完全に、スコールの頭のヒューズは飛び散ってしまった。華奢な肩をつかんで強引に横向いていたセルフィを自分の方へとまっすぐ向かせる。ばさばさと単語帳が残らず床に落ち、びっくり顔のセルフィがスコールを見上げて何かを言いかけ、&lt;BR&gt;　無理矢理キスをした。&lt;BR&gt;　……というより、気がついたらキスしていた。コーヒーの味がした。&lt;BR&gt;　見事なくらい瞬間の記憶が抜け落ちていた。さらにばっさばさとノートやら教科書やらが床に落ち、それでもさすがにノートPCだけはしっかり抱えたまま、セルフィは眼をまんまるに見開いて呆然としていた。&lt;BR&gt;　ようやくフリーズ状態のスコールの頭が再起動してまともに動きだし、唇を外すと、呼吸も忘れていたらしいセルフィが小さく喘いでがくんと膝を折って床に崩れ落ちた。華奢な肩が空気を求めて大きく上下していた。&lt;BR&gt;　呆然としたまま、セルフィは手の甲で唇を拭い、それから顔を上げてスコールを見る。涙目になっていた。何がなんだか全然わからないと翠の瞳に書いてあった。&lt;BR&gt;　なんでわかんないんだよ。&lt;BR&gt;　一瞬ものすごく理不尽な気分が襲ってきた。&lt;BR&gt;　なんでわからないんだろう。好きな女が他の男と仲良くしたり、自分の知らない彼女の秘密を他の奴が知ってたりしたら普通嫌な気持ちになるじゃないか。なんでそんな単純なことがわからないんだろう。&lt;BR&gt;　けれど同時に、途方に暮れているセルフィの顔に、自分自身に対して物凄く腹が立った。&lt;BR&gt;　なんで自分は好きな女にこんな顔させてるんだ？　こんなだからセルフィは何も言ってくれないんじゃないのか？&lt;BR&gt;　もはや怒りの対象があの図書委員長なのか彼女なのか自分なのか、スコールにも良くわからなくなっていた。&lt;BR&gt;&lt;BR&gt;　進歩がない――後になって、そう思った。&lt;BR&gt;　エスタパニックの最中、魔法研究所で無理矢理セルフィにキスして部屋を追い出されたあの日から、自分はどうやら全然進歩も成長もしていなかったらしい。&lt;BR&gt;　結局、何も話せなかった。&lt;BR&gt;　顔も見ないで散らばった教材を彼女の腕の中に放り込んで立ち上がらせてやった途端、自分は自室にさっさと引き返して荷物をまとめてガルバディアに出発してしまったから。&lt;BR&gt;「本当に……」&lt;BR&gt;　ごとんごとんと列車に揺られながら、スコールはどっぷりずっぷり自己嫌悪に陥ってひとりごちた。&lt;BR&gt;「進歩がないな、俺は……」&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;&lt;/TD&gt;&lt;/TR&gt;&lt;/TBODY&gt;&lt;/TABLE&gt;&lt;BR&gt;

<script data-viewer-zoom-script>
(() => {
  const stage = document.querySelector('.viewer-stage-image');
  const image = stage ? stage.querySelector('.viewer-image') : null;
  if (!stage || !image) {
    return;
  }

  const setZoom = (enabled) => {
    stage.classList.toggle('is-zoomed', enabled);
    image.setAttribute('aria-pressed', enabled ? 'true' : 'false');
    if (enabled) {
      const naturalWidth = image.naturalWidth || image.clientWidth || 0;
      const targetWidth = naturalWidth > 0
        ? Math.max(naturalWidth, Math.min(Math.round(stage.clientWidth * 0.92), naturalWidth * 4))
        : Math.round(stage.clientWidth * 0.92);
      image.style.width = `${targetWidth}px`;
      image.style.maxWidth = 'none';
      image.style.maxHeight = 'none';
      requestAnimationFrame(() => {
        stage.scrollTop = 0;
        stage.scrollLeft = Math.max(0, Math.round((image.scrollWidth - stage.clientWidth) / 2));
      });
    } else {
      image.style.removeProperty('width');
      image.style.removeProperty('max-width');
      image.style.removeProperty('max-height');
      stage.scrollTop = 0;
      stage.scrollLeft = 0;
    }
  };

  const toggleZoom = () => {
    setZoom(!stage.classList.contains('is-zoomed'));
  };

  image.setAttribute('tabindex', '0');
  image.setAttribute('role', 'button');
  image.setAttribute('aria-label', '逕ｻ蜒上ｒ諡｡螟ｧ縺ｾ縺溘・邵ｮ蟆・);
  image.setAttribute('aria-pressed', 'false');

  image.addEventListener('click', toggleZoom);
  image.addEventListener('keydown', (event) => {
    if (event.key === 'Enter' || event.key === ' ') {
      event.preventDefault();
      toggleZoom();
    }
  });

  stage.addEventListener('click', (event) => {
    if (event.target === stage && stage.classList.contains('is-zoomed')) {
      setZoom(false);
    }
  });

  window.addEventListener('keydown', (event) => {
    if (event.key === 'Escape' && stage.classList.contains('is-zoomed')) {
      setZoom(false);
    }
  });
})();
</script>
