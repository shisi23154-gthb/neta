      &lt;P align=right&gt;*p o s t s c r i p 
      t*&lt;/P&gt;&lt;BR&gt;&lt;BR&gt;　まずは、読んで下さってありがとうございました。&lt;BR&gt;　書いている間中、「うーん、セルフィにどこまで弱音吐かせてもオッケーかなぁ～？」と悩みっぱなしでした。皆様引かれたりしてませんか？；萌えから遠い話でごめんなさい～～～＞＜&lt;BR&gt;　今回はちょこっとだけ文体改造してますです。目標は「最終話を読んだ後に一話から読み返して、違う発見のできる小説」なんですが、さて達成できているものなのかどうか（笑）体言止めが増えただけという噂も…（アイタタ&lt;BR&gt;&lt;BR&gt;　光の雨は、私が18禁って書けるものかしら～と試しに書いてみた「夜の蝶」ってお話が下敷きになっています。&lt;BR&gt;　本当は夜蝶の非エロ部分だけ引っこ抜いてアプするつもりだったんですが、それじゃーわざわざURL請求して下さった人に悪いかな？と思い立って、リライトすることに。&lt;BR&gt;　てか、セルフィのトラウマ話は「セカンド」の方で実はやろうと思っていて、冒頭にもすごくたくさん伏線張っておいたのですが、「セカンド」はとにかく怒濤の勢いで話が展開してたので、セルフィがフラッシュバック起こす暇もなくて（笑）、伏線回収を今回まで持ち越しにしていたのでした。&lt;BR&gt;&lt;BR&gt;　で、PTSDなんですが。&lt;BR&gt;　阪神大震災とかでわりと有名になった言葉なので、ご存じの方も多いかな？と思いつつ…。&lt;BR&gt;　作中も少し説明入れておいたんですけど、PTSDっていうのは日本語で心的外傷後ストレス障害、本人や親しい人が命に関わるような恐ろしい出来事に遭遇した時に起こる障害、心の病気ですね。震災や戦争体験の他にも、たとえば殺人事件に遭遇してしまったり、身の危険を感じるほどの暴行を受けたりしてもトラウマ体験となります。ちなみに生命の危機を感じない、たとえばデート中に路上で犬のフン踏んで彼に嫌われて以来道路を歩くのが…というのは、PTSDにおけるトラウマ体験には当てはまりません（笑）&lt;BR&gt;　そういったトラウマ体験を起こした上で、&lt;BR&gt;・トラウマに関係する事象をなるべく避けようとする。（回避行動）&lt;BR&gt;　会話中に話題を避けたり、その場所に行かないようにしたり、関連した人を避けてしまったり…ですね。&lt;BR&gt;・トラウマに関係する事象を忘れてしまう。（まるごと忘れたり、一部だけを忘れたり。解離性健忘と言います）&lt;BR&gt;・無気力になったり、人間関係から遠ざかってしまう。物事に悲観的になったりする。&lt;BR&gt;　でもって、&lt;BR&gt;・トラウマとなった出来事を、思い出したくないのに繰り返し思い出してしまう。（侵入的想起、といいます）&lt;BR&gt;　これは起きている時に繰り返し考えちゃったりとか、夢に見たりとか、フラッシュバックしたりとか色々らしいです。&lt;BR&gt;　こういう相反する症状も抱えていて、なおかつ、&lt;BR&gt;・睡眠障害（眠れなかったり、すぐ眼を覚ましてしまったり）。&lt;BR&gt;・情緒不安定、集中力低下&lt;BR&gt;・過剰反応（少しの物音で異常に驚いてしまったり、異常に警戒をしてしまったり）&lt;BR&gt;　という症状を複数抱えていて、これらの症状が一ヶ月以上続くとPTSDと判定されます。発症時期は半年以上経過してから症状の出る人から、一ヶ月くらいで発症する人もいて、色々らしいです。ちなみに一ヶ月以内で症状がおさまるのはPTSDではなくて、急性ストレス障害とか、そんな言い方をするみたいです。&lt;BR&gt;　作中の設定では、侵入的想起と回避行動、解離性健忘、睡眠障害（トラビアにいる間だけ）は自覚症状として持っているんだけど、過剰反応などの症状は持っていないので、マルスト先輩が「医者によってはPTSD判定しないレベル」とスコールに説明しているんですね。つまり、キスティが怯えるほどヤバい状況ではないぞ、と（笑）&lt;BR&gt;　ちなみにこれはめちゃくちゃ簡単な説明なので、実際はもっと色々症状も複雑だったりなんですけどね。&lt;BR&gt;&lt;BR&gt;　ゲーム本編ではサラリと流されていたトラビア爆撃ですが、セルフィにとってはすごく惨い事件だったと思うんですよ。&lt;BR&gt;　FFシリーズではユフィやリュックと並んで元気娘と称されるセルフィですが、私この人が『強い人』だとは思っていないんです。精神的にかなりの柔軟さを持っていて、どうすれば自分が常に元気であれるかもわかっている人なんだけど、ある種の繊細さみたいなものを持ってる人だと思うんですね。多分それはスーにも共通する繊細さなんだけど、彼の場合は柔軟性が足りないので、激しい衝撃にはぽきっと折れるタイプ（笑）で、セルフィはある程度はしなやかに耐えてしまう分、周囲が気づいた時には手遅れぽい感じ。（←こういうこと考えてるから、世間一般のセルフィ像からどんどこ離れてくんだよなぁと思いつつ…）&lt;BR&gt;　…FF8キャラって、何気に周囲に一線引いてる人が多いですね。スーとかキスティスとかサイファーとか（この人は一線引かれてるタイプか）、セルフィもある意味そうだし、前半のアービンもそうだし。ゼルとリノアくらいですかね、そういうのがないのって（笑）&lt;BR&gt;&lt;BR&gt;　あとは何かこう、「SeeDの任務」って感じの話が書いてみたくて。筆力ないので臨場感のへったくれもなかったんですが、セルフィパートの方とか超燃えて書いてました…！&lt;BR&gt;　ちなみにスコールパートの方、実際の事件がモデルケースになっています。まんまにはしてないんですが、もしいつの何の事件かわかっちゃった方は一笑に付して忘れ去って頂けると……あわわ。&lt;BR&gt;　あとですねー、なんかガーデン年中行事からするとSeeD実地試験って春予定になってるんですけど（笑／だからゲーム本編花咲いてたんじゃんねぇ）、これどーしようかと悩んだんですが、まぁほら、予定は未定ってことで☆（…）だって実地試験なんてそういうでかい任務が来ない限りできないんだし、SeeDが戦死しまくったりして人数減ったりすれば臨時試験くらいあると思うんですよね。&lt;BR&gt;　というわけで、今回のレウィンくん達は多分中途採用（っていうのかな）なんですきっと。そういうことにしておいて頂けると幸いです（笑）&lt;BR&gt;&lt;BR&gt;　時系列で行くと、一応簡単な設定としては、ゲーム本編終了後からスコール達は森のフクロウの傭兵に戻って、約三ヶ月後にガルバディアがティンバー独立を宣言、スコール達がバラムに戻って通常のSeeDの任務につくようになって、セルフィがトラビア派遣を命じられるのがそれから約四ヶ月後、そこから約半年トラビアで暮らして、ちょうど本編から一年ちょっとで「セカンド」がはじまる、という感じですね。&lt;BR&gt;　でもって、あの「セカンド」冒頭からエピローグのセルフィがSeeDに復帰するまでが、大体約60日間ちょっとありまして、その一ヶ月後に「星月夜」、さらにその一ヶ月後が「天と地上」で、この時点でバラム－エスタ間とエスタ－トラビア間の路線が開通してるんです（エスタの遊園地には列車で行ってるので）。その後バラムガーデンのセキュリティシステムの総入れ替えがひと月近くかけて行われて、今回の話になり、エピローグまでに約一ヶ月費やしています。システム総入替え云々はちょっと別の話で触れようと思ってるんですけど…まぁエスタが後見に入った絡みで、ってやつですね。ゲーム中はなんかどこでも入れちゃうみたいな感じだったので（笑）&lt;BR&gt;　ゲーム本編が大体5月から6月の間だったと仮定して、「セカンド」がはじまったのが7月下旬くらいを想定していましたので、エピローグ終了時点で9月末か10月頭くらいですね。&lt;BR&gt;　今回のこれが5話にのびちゃったので、なんか未だに年末の話なのがカッコ悪いですが(笑)せっかく季節感合わせてたのにな～ちぇ。&lt;BR&gt;&lt;BR&gt;　あとこう、少し前に&lt;A 
      target=_blank 
      href=&quot;http://www.mahamari.com/story/look.shtml&quot;&gt;「ガクトとスコールの相似点を探る」っつーガクトファンの方の作ったサイト&lt;/A&gt;を見たんですが、それまでスーのモデルはグレイのTERUだと思ってたんですけど、価値観ひっくり返りまして(笑)&lt;BR&gt;　いやもう、ここまでそっくりだったとは…！！（笑）誰がどー見ても、こりゃ双子です。特にファー付きレザージャケット着てる写真なんてヤバすぎ（笑）思わずガクト写真集を買ってこようかと間違ったことを思ってしまうほど…（←ていうか買っちゃったよ写真集…）。&lt;BR&gt;　……というわけで、臆面もなくスーは美人さんという描写を増やしてみました（・ω・）ノ楽しかった…（笑）&lt;BR&gt;&lt;BR&gt;　さてこのお話には、都合上オリキャラさんが二名ほど出た訳なのですが、いらんと思いつつ一応解説。&lt;BR&gt;　マルスト・ワーリック――名前は超適当。おかげで私には全然名前を覚えてもらえず、ついでに頂いた感想でも「マルトス先輩」と勘違いされる率が高かったですね～別に私もどっちでも良かったし（笑）&lt;BR&gt;　トラビアのミサイル爆撃に一切関わらない、まったくの第三者という立場でセルフィに接する人がほしくて作ったキャラクターです。スー以外の既存キャラだとみんなミサイル爆撃の原因の一端を担っちゃってるんで、オリキャラにするしかなかったんですが、実に使い勝手のいい立場の人になったなぁと（笑）&lt;BR&gt;　対ガルバディア戦はムービー見る限り、死人の一人や二人や十人は出たろうなぁ、と思って書きました。翌年の慰霊祭はけっこう大がかりになったんじゃないかな。「セカンド」前の話なのでネタにできないですが。&lt;BR&gt;　ちなみに彼のコンセプトは「男版セルフィ」、モデルはうちの上司でした。おかげでえらくつかみ所のない人に…。&lt;BR&gt;&lt;BR&gt;　レウィン・エルダー――命名は超適当。割と覚えやすくて、オリキャラの名前なんて覚えない私でも覚えた（笑）レインと名前が韻踏んでることには、言われるまで気づきませんでした。えぇもう何の他意もなく…（笑；&lt;BR&gt;　セルフィがでかい「喪失」を抱えてる人なので、バランス取ってスコールの方にも…という発想で作ったキャラですね。頂いた感想を見ると、レウィンではなく、マルストが死ぬと予測されてた方が多かったようで、三話の時点でも「助かりますよね？」って感じでした。助からなくてごめんよ；&lt;BR&gt;&lt;BR&gt;　つーか五話は前半はスラスラ書けたのに、中盤のラブラブモード発動あたりから書きづらくって、一体表ページはどこまで書いていいもんなの？やっぱ朝チュン？？とけっこう悩みました（笑）結局朝チュンにしちゃったので、裏読んだ方はあの間に夜蝶後編部分を適当に差し込んで読んで下さい＞＜&lt;SPAN&gt;一回戦までで…。&lt;/SPAN&gt;&lt;BR&gt;　スーは何と言いますか、素直に「好きだ」とか「愛してる」とか言えなくて遠回しの表現をして、よりこっ恥ずかしいことを口にしてしまうキャラなので……なんかもう書きながら「だーーー砂吐く！！かゆいー！やめれー！」とか七転八倒でしたよ…！なんか、書けば書くほどバカップルになっていくよう…な……。&lt;BR&gt;　ラストはWebのノベルで流行って（？）いるポエミーに挑戦！とか思ってみたけど、恥ずかしくてなんか二行で終わってしまいました…。も、萌えを狙おうとしたのにちょっと気合いが足らなかったよ（笑）&lt;BR&gt;　ちなみにスーは一体寝る時はパジャマなのかシャツか何かなのかと疑問に思い、「スコールのパジャマ」で検索かけたアホは私です…。&lt;BR&gt;&lt;BR&gt;　てか私はスコセルの抱っこがえらい好きみたいですね！気がついたらスーがセルフィ抱っこして運んでるシーン、何度書いてるんだーってくらい書いてますね！えぇもう萌えも萌え、チョー萌えです！！身長差20センチもあれば抱っこも軽いしね☆（セルフィの身長は153センチくらいだとさらに良かったんですが！）今後も多分しつこいくらい姫抱っこも片手抱っこも書きまくると思いますがお気になさらず…（笑）&lt;BR&gt;　おんぶはアービンあたりの方が萌えかもしれません。背高いから気持ちよさそう（笑）&lt;BR&gt;&lt;BR&gt;　なんかラストで予定外にもトラビア行きが決定してしまったので、次は多分トラビア話になるんではないかなーと思います。てかもう2月だっちゅーのにまだ年末年始の話が続くのか…（笑；；&lt;BR&gt;　実はこの話書いてる最中、「セカンド」の方で原作とのどーしようもない、ありえないほどの矛盾点を発見してしまって、うわあしまった～！っていうのがありまして、それもちょっと次の話で理屈つけてごまかそうと思ってます…。&lt;BR&gt;　今回があんまりにも私の趣味に走ってて、なんか申し訳なさ炸裂だったので、次回こそは萌え優先で！（でもトラビア絡むと絶対暗くなる気がするのが…うわーんごめんなさい；；二次創作は萌え優先ってわかってるんだけど；；）&lt;BR&gt;　こ、今回に懲りずまた読んでやって下さると非常に嬉しいです＞＜；これからもよろしくお願いします…！&lt;BR&gt;&lt;BR&gt;---------------------------&lt;BR&gt;＜参考文献＞&lt;BR&gt;&lt;BR&gt;　・SAS戦闘員＜上・下＞…アンディ・マクナブ著&lt;BR&gt;　・心に傷をうけた人の心のケア－PTSDを起こさないために…クラウディア・ハーバート著&lt;BR&gt;　・PTSD　人は傷つくとどうなるか…加藤進昌（編）&lt;BR&gt;&lt;BR&gt;　あとはネットでぐぐったにわか知識です＞＜何か間違ってたらご指摘よろしくです；&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;&lt;/TD&gt;&lt;/TR&gt;&lt;/TBODY&gt;&lt;/TABLE&gt;&lt;BR&gt;

<script data-viewer-zoom-script>
(() => {
  const stage = document.querySelector('.viewer-stage-image');
  const image = stage ? stage.querySelector('.viewer-image') : null;
  if (!stage || !image) {
    return;
  }

  const setZoom = (enabled) => {
    stage.classList.toggle('is-zoomed', enabled);
    image.setAttribute('aria-pressed', enabled ? 'true' : 'false');
    if (enabled) {
      const naturalWidth = image.naturalWidth || image.clientWidth || 0;
      const targetWidth = naturalWidth > 0
        ? Math.max(naturalWidth, Math.min(Math.round(stage.clientWidth * 0.92), naturalWidth * 4))
        : Math.round(stage.clientWidth * 0.92);
      image.style.width = `${targetWidth}px`;
      image.style.maxWidth = 'none';
      image.style.maxHeight = 'none';
      requestAnimationFrame(() => {
        stage.scrollTop = 0;
        stage.scrollLeft = Math.max(0, Math.round((image.scrollWidth - stage.clientWidth) / 2));
      });
    } else {
      image.style.removeProperty('width');
      image.style.removeProperty('max-width');
      image.style.removeProperty('max-height');
      stage.scrollTop = 0;
      stage.scrollLeft = 0;
    }
  };

  const toggleZoom = () => {
    setZoom(!stage.classList.contains('is-zoomed'));
  };

  image.setAttribute('tabindex', '0');
  image.setAttribute('role', 'button');
  image.setAttribute('aria-label', '逕ｻ蜒上ｒ諡｡螟ｧ縺ｾ縺溘・邵ｮ蟆・);
  image.setAttribute('aria-pressed', 'false');

  image.addEventListener('click', toggleZoom);
  image.addEventListener('keydown', (event) => {
    if (event.key === 'Enter' || event.key === ' ') {
      event.preventDefault();
      toggleZoom();
    }
  });

  stage.addEventListener('click', (event) => {
    if (event.target === stage && stage.classList.contains('is-zoomed')) {
      setZoom(false);
    }
  });

  window.addEventListener('keydown', (event) => {
    if (event.key === 'Escape' && stage.classList.contains('is-zoomed')) {
      setZoom(false);
    }
  });
})();
</script>
