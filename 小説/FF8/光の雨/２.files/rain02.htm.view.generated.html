      &lt;P align=right&gt;*光 の 
      雨..02*&lt;/P&gt;&lt;BR&gt;&lt;BR&gt;「マルスト・ワーリック？　……あぁ、あの図書委員長」&lt;BR&gt;　ガーデンを出る間際、食堂で偶然顔を合わせたキスティスに何気なく話を振ると、キスティスは艶めいた仕草で軽く肩をすくめてみせた。&lt;BR&gt;「私の同年ね。でもクラスは違うから、あまり話したことはないわ」&lt;BR&gt;「……そうか」&lt;BR&gt;「最近セルフィとよく同じ班を組むことが多いわね」&lt;BR&gt;　今朝の一件を知らないキスティスは、柔和な微笑であっさりと地雷を踏んでくる。&lt;BR&gt;　スコールは渋面を作ってグラスの水を一気にあおった。&lt;BR&gt;「あら、図星だったの？　まぁ……そうね。彼について良い噂はあまり聞かないわね」&lt;BR&gt;　くすくすとキスティスが笑う。やっぱり彼女は何でもお見通しらしい。&lt;BR&gt;　下手に突っ込まれて今朝のことを白状する羽目になってはたまらない。スコールは無言で立ち上がり、食器の入ったトレーを持ち上げた。&lt;BR&gt;「あら、もう行くの？」&lt;BR&gt;　キスティスはまだくすくす笑いながら、スコールの腕にちょっと指をかけて引き寄せ、少し声を潜めてそっと告げた。&lt;BR&gt;「何を聞いたのか知らないけれど、マルストは大丈夫よ。だって彼、去年亡くした恋人を、未だに忘れていないもの」&lt;BR&gt;　どきりとした。&lt;BR&gt;　思わずキスティスの方を見ると、キスティスは優雅な仕草でぱちんと片目を閉じ、スコールの腕を放した。&lt;BR&gt;「有名な話よ。だから安心なさいな」&lt;BR&gt;　今朝初めて話をした青年の顔が、ふと脳裏に浮かぶ。&lt;BR&gt;　亡くした恋人は、やはり同じSeeDだったのだろうか。&lt;BR&gt;　埒もない疑問が泡のように浮かんではじけた。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　そんなことを思っていたので、荷物を背負ってカードリーダーにさしかかったところで当の本人に遭遇した時は、さすがのスコールもいつもの無表情に驚きを浮かべざるを得なかった。&lt;BR&gt;「あれ、彼氏だ」&lt;BR&gt;　後輩の女生徒に囲まれてちょうど外から帰ってくるところだったらしいマルストは、意外そうに眼をまるくすると、少女達に軽く手を挙げてから少し足早にスコールの前へと歩み寄ってきた。&lt;BR&gt;「……先輩……あの、その『彼氏』とは……」&lt;BR&gt;「セルフィの彼氏なんだろ？　だから彼氏」&lt;BR&gt;　大真面目なのかとぼけているのか、今ひとつ判然としない口調でマルストはそう言い、&lt;BR&gt;「あのさ、すげえ余計なお節介なんだけど。あんた任務行く前に仲直りくらいした方がいいよ」&lt;BR&gt;　あっさりとそう言われ、スコールは思わず眼をむいた。&lt;BR&gt;　なんでこいつがそんなこと知ってるんだ。思い切り顔にそう書いてマルストを見ると、&lt;BR&gt;「だってガーデン中で噂じゃん。なんか今朝も変な空気だったし、見てりゃわかる。&lt;BR&gt;　つーかさ、任務前に恋人と喧嘩は御法度って、先輩とかに習わなかった？　死んだ時後味悪いだろ？」&lt;BR&gt;　淡々としたその言葉に、スコールは少し眼を見はる。&lt;BR&gt;（亡くした恋人を――）&lt;BR&gt;　先ほどキスティスに聞いた言葉が甦ってくる。&lt;BR&gt;　マルストはあくまでも淡泊な表情のままだった。&lt;BR&gt;「まあ、カッコ悪くて簡単に謝罪できないってのはわかるけどな。いやぁ、若いっていいなぁ……」&lt;BR&gt;　変にじじむさい口調でしみじみそう言うと、ぽんと軽くスコールの肩を叩き、唐突にそのまま歩き去って行ってしまう。&lt;BR&gt;「…………」&lt;BR&gt;　スコールは何となく毒気を抜かれて、飄々と去っていく背中をぽかんと見送ってしまった。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　セルフィに与えられた任務は、エスタの某企業に潜入しデータを盗んでくるというものだった。&lt;BR&gt;　それだけなら、ソーシャルハッキングと技術を駆使して、ガーデンにいながらデータを奪うことは可能だ。それだけの技術も自信もセルフィにはある。&lt;BR&gt;　問題はその企業が、某国のテロ組織と繋がりがあるらしい、という点にあった。&lt;BR&gt;　今回セルフィが盗み出すデータも、軍事情報に属する物で――早い話がデータと共に、テロ組織との繋がりを示す何らかの証拠を上げてくるのが今回の任務の目的だった。&lt;BR&gt;「おう、なんか俺今回班長らしいぞ」&lt;BR&gt;　出発日の朝、カードリーダー前で集合と約束したマルストは思い切り三十分も遅刻して、しかも謝罪の前にこんな一言をとぼけた調子で言った。&lt;BR&gt;「……ふ～ん」&lt;BR&gt;　暇だったので携帯端末で、自作の暗号解析プログラムをチェックしていたセルフィが、しゃがみこんだ体勢のまま冷たい応えを返した。&lt;BR&gt;「いやあ、久々に班長かと思ったら緊張してなぁ……あ、そうそう喜べセルフィ、今回はエスタ・ロイヤルホテルに宿泊らしいぞ。良かったなぁ安宿じゃなくて」&lt;BR&gt;「……ふ～ん、良かったね～」&lt;BR&gt;　そっけなく言って携帯端末を落とし、セルフィは立ち上がった。&lt;BR&gt;「とりあえず、行こ。クライアントがカンカンだったら、先輩がなんとかしてね～」&lt;BR&gt;　ひょいと荷物を肩にかけて歩き出す。&lt;BR&gt;　機嫌悪いなぁ……とマルストはちょっと溜息をついた。&lt;BR&gt;　セルフィの『彼氏』が喧嘩別れしたまま任務に立って、一週間が過ぎていた。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　電波障害がなくなって、いっきに普及したのは携帯電話だった。&lt;BR&gt;　スコールの持つそれは衛星を使ったゴツいもので、盗聴防止用プロテクトのなされたSeeD特別製のものだったが、さすがに任務中にかかってきた電話にはそれなりに気を遣う。&lt;BR&gt;「……あと一週間、ってところだな」&lt;BR&gt;　ちょうど取り込み中にかかってきたらしい受電記録を見て、あてがわれた自室に引きこもって折り返しかけ直したスコールは、進行状況を問われ溜息まじりにそう答えた。&lt;BR&gt;「いや、どうも違うらしい……そっちとは無関係だ。俺が見る限り、こいつは単なるストーカーだ。尻尾さえ掴めばどうってことはないさ、素人だ」&lt;BR&gt;　ガルバディアを最近悩ませているドール国境紛争絡みのテロ攻撃。今回脅迫状が届いたのがガルバディアの上級将校の娘だったということもあり、テロリスト関連かと疑惑が持たれていたのだが。&lt;BR&gt;「あぁ……問題ない。来週にはそっちに合流できるはずだ。……え？　なんだって？」&lt;BR&gt;　駐バラムガルバディア大使館で、テロ事件が起きたの。&lt;BR&gt;　すでに現場に入っているキスティスがもたらした意外な情報に、スコールは思わず眉をひそめた。&lt;BR&gt;　思わずドアの外に人の気配がないか伺ってしまう。自然声も低くなった。&lt;BR&gt;「大使館ってことは……要人がいるな？　何人だ」&lt;BR&gt;　訊ねながら、スコールはちょっと苦い笑みが唇にのぼるのを自覚した。要人、なんて言葉を使うと虫酸が走るのを覚えていたのは、一体いくつの頃だったか。&lt;BR&gt;　人数は17名。突入時に1名が射殺されているわ。淡々と感情を排した声でキスティスが答える。&lt;BR&gt;　最近のドール・ガルバディア国境線上で頻発していたテロは、どうやら大使館襲撃のための陽動だったらしい。&lt;BR&gt;　ガルバディアから要請が入り、任務地はバラムにあるガルバディア大使館に変更になったという。&lt;BR&gt;「……そうか」&lt;BR&gt;　呟くように言って、スコールは少し考える。人質を取られている場合、強行突入すれば人質の死亡率も当然上がる。あとで人道的にどうのこうのと叩かれないために、政府の官僚は大抵交渉で投降を呼びかける。運が良ければ突入なしに人質を解放してもらえるし、それでもどうしようもなければ突入することになる。&lt;BR&gt;「SeeDの出番があるかは微妙だな……あぁ、そうだな。……そう願うよ」&lt;BR&gt;　そこでスコールはふと言葉を途切らせた。部屋に近づく人間の気配。――見知った足音。&lt;BR&gt;　ノックの音が響いた。&lt;BR&gt;「レオンハート様、お嬢様がお呼びですわ」&lt;BR&gt;　屋敷に住み込みで働くメイドの声だった。&lt;BR&gt;「……わかった。すぐに行く」&lt;BR&gt;　ドアの向こうに声を投げ、それから受話器に向かって急いで告げる。&lt;BR&gt;「すまないが、もう切る。なるべく早く向かうようにするから――」&lt;BR&gt;　言いかけたスコールの耳に、笑いまじりのキスティスの声が響いた。嫌な顔で、スコールはどっと溜息をつく。&lt;BR&gt;「……勘弁してくれ。俺はもう御免だ」&lt;BR&gt;　受話器の向こうで笑いがはじける。セルフィに会いたくなった？　そんなふうに聞かれた。&lt;BR&gt;　一週間、わがままで思い込みの激しすぎる令嬢にべったりとくっつかれ、脳みその端から端までラブラブ光線で灼かれ続けていたスコールは、瞬間セルフィの無邪気な笑顔を脳裏に思い浮かべてしまい、思わず、本当に思わず素直な感想を口にしていた。&lt;BR&gt;「――禁断症状が出そうだな」&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;「せ～たいへいき？」&lt;BR&gt;　単語帳に埋もれていたセルフィが、きょとんと眼をまるくして顔を上げた。&lt;BR&gt;「え～とそれって～、あれでしょ、細菌撒いたりして病気にさせたりとかっていう……」&lt;BR&gt;「セルフィ違う、それは生物兵器」&lt;BR&gt;　首を横に振ったマルストが、生真面目な顔で訂正した。&lt;BR&gt;　エスタに入って、もう五日。三十分の遅刻のツケを払わされ、今日まで依頼主との折衝のすべてを押しつけられていたマルストだったが、ここに来てようやく潜入作戦は最終プランを詰めるところまで来ていた。&lt;BR&gt;　自分はちゃっかりホテルの一室で試験勉強に励んでいたセルフィが、う？　と小さく首を傾げる。&lt;BR&gt;「生体兵器、だよ。人間とかモンスターとか動物とかを、兵器に見立てて戦争に使う技術のこと。最近出てきたばかりだから、まだお前らは授業でやってないかもしんないけど」&lt;BR&gt;「それをその～、ナントカって会社が作ってるってこと？」&lt;BR&gt;「傘下企業には製薬会社なんかもあるらしいから、研究する環境には事欠かないだろうな」&lt;BR&gt;　あっさりとマルストが頷く。へぇ、とセルフィが間の抜けた声を上げた。&lt;BR&gt;「で、昨日話した潜入プランの確認だけど、開始時刻は午後11時30分でいいか？」&lt;BR&gt;「あ～それね、0時すぎじゃないとダメだよ」&lt;BR&gt;　ぽん、と単語帳を放り出してセルフィが言った。&lt;BR&gt;「あそこの会社のシステムって、24時間おきにログインパスワード変わるんだよ～。日付またがってログインしてると、ユーザーIDとパスワードを再請求されるの～。で～、五分以内に新パスワード入れないと～、侵入してるのがバレちゃうんだよ～。ま～その場合でも侵入場所が特定されることはないと思うけど～、セキュリティサービスが飛んできちゃうから多分色々面倒だよね～？」&lt;BR&gt;「……なんでそんなこと、お前が知ってんだ？」&lt;BR&gt;　マルストがきょとんとした顔で訊ねると、セルフィは何でもないといったようにベッドに放り出してあった、愛用のノートPCを指さして言った。&lt;BR&gt;「暗号解析プログラムの動作チェックついでに入ってみたの～。ついでにいくつかウイルス仕掛けておいたから～、0時スタートで暗号解析して自動ログインして、昨日決めたデータ室到着までのルートのセキュリティシステムはぜ～んぶ、時間差でダウンするようにしてみたんだよ～。時間指定でまた元に戻すから～、多分向こうによ～っぽどの天才さんがいない限り、データ盗んだのがバレるのは時間かかるんじゃないかな～？」&lt;BR&gt;　ほのぼのとセルフィが語った言葉に、マルストは思わず嘆息せずにいられなかった。世界の先端を走っているエスタの企業のシステムに、こうもあっさりとホテルの一室から侵入されたと知ったら、世の中のSEは泣くに違いない。&lt;BR&gt;「了解。ってことは0時きっかりに侵入決行といこう。お前が中央データ室に潜入、データを落としてる間に俺が資料室に潜り込んで書類関係を漁る。うまくテロとの繋がりを示すデータが入ってりゃいいんだけど……」&lt;BR&gt;「金銭の受け渡しとかがあれば、経理情報見てみるとなんかあるかもしれないよね～。経理課とかに置いてあるデータディスク、片っ端からコピってチェックすればなんか出るかな～？　パスワードロックされてても、それごとコピーできるツールあるから、後で渡すね」&lt;BR&gt;　そうしてもう一度綿密にプランの最終確認を取り、仮眠をとるためマルストは立ち上がった。&lt;BR&gt;「じゃ、三時間後に」&lt;BR&gt;「遅刻はなしだよ～」&lt;BR&gt;「……うるせーよお前」&lt;BR&gt;　息をついて同じく立ち上がる少女の華奢な背中を眺めながら、マルストはちょっと苦笑を浮かべた。&lt;BR&gt;「電話でもしてみれば？」&lt;BR&gt;　え？　とセルフィが振り返る。マルストは右手で電話をかけるジェスチャーをしながら言葉を続けた。&lt;BR&gt;「彼氏さ、俺が言うのも変なんだけど、あれ多分嫉妬してるだけだから。お前から電話してやりゃ機嫌も直るよ」&lt;BR&gt;「……嫉妬？」&lt;BR&gt;　エスタに入って今に至るまで、上滑りの笑顔すらままならないセルフィが、不思議そうに眉を寄せて首を傾げた。&lt;BR&gt;「なんで？」&lt;BR&gt;「面白くないんだよ、好きな女の子が他の男と仲良かったり、あまつさえ惚れられたりするってのはさ」&lt;BR&gt;「そんな……」&lt;BR&gt;　本気で訳がわからない、と言いたげに、セルフィはますます眉根を寄せた。&lt;BR&gt;「あのね～先輩、先輩が思うほどスコールってバカじゃないよ。あたしそんな、男の人にモテたりとかするほどフェロモンばりばり～って訳じゃないし～、それはスコールだってぜ～ったいわかってるもん。嫉妬する理由なんてないよ～」&lt;BR&gt;　リノアじゃあるまいし。大真面目に付け加えたセルフィに、マルストは数秒間きょとんとした顔で硬直し、それから景気よく吹き出して声を上げて笑い出した。&lt;BR&gt;「？？」&lt;BR&gt;　肩を揺すって天を仰いで大爆笑をしているマルストを、唖然とした顔でセルフィは眺める。何がそんなにおかしいのかがわからない。&lt;BR&gt;「いやー……悪い、ちょっと面白すぎた……」&lt;BR&gt;　ひーひーと笑いながらそんなことを言われてもちっともわからない。&lt;BR&gt;　顔中クエスチョンマークでいっぱいのセルフィに、まだ笑いの余韻にあるマルストが、どうにか言葉を紡ぎ出した。&lt;BR&gt;「お前さ、要するにコンプレックスあるわけだ。前彼女のリノアって子に。だから彼氏が部屋に誘ったりそういうムードになっても逃げちまってんだろ」&lt;BR&gt;　マルストは直接話したことこそないが、スコールの前彼女のリノアがなかなかの美人で、おまけにスタイルが良くて、仕草がいちいち艶っぽかったことは良く知っていた。悩殺された男どもの何と多かったことか、未だにガーデンでの語りぐさになるほどだ。――もちろん、あのすました顔の指揮官殿が、そのたび独占欲丸出しに機嫌を悪くしていたことも知っている。&lt;BR&gt;　セルフィは、美人というより可愛らしいと形容される顔立ちで、リノアのように女性らしいふくらみに恵まれている訳でもない。折れそうに華奢な肢体も魅力的だが、まぁ一般的にはナイスバディの女性が好まれるのが現実だ。賑やかで元気で明るくて、セルフィの持つ雰囲気に色気の二文字はどうにも当てはまらない。&lt;BR&gt;「で、男どもがお前に惚れたりするわけねーやとばかりに、男女区別なく接してたりするんだろ？　お前、それじゃ、他の男と彼氏との対応に全然、差がないじゃんか。そりゃ男としちゃ、面白くないだろ？」&lt;BR&gt;「……あぁ……うん……そ～かも……」&lt;BR&gt;　言われてみれば納得できるような気がして、セルフィはちょっと考え込む。無意識に服の下のペンダントを探り、なんとなくあの時突然怒りだしたスコールの行動の意味を理解した。&lt;BR&gt;　自分に女性的魅力があるなどとは、本当にかけらすらも考えていないセルフィだったが、確かに対応に明確な差を持たないという点においては返す言葉もない。&lt;BR&gt;「何でもいいから、彼氏になんか特別っぽいことしてやったら？　あーお前から誘惑してみるとかさ。新鮮だろ？」&lt;BR&gt;「ユーワク？」&lt;BR&gt;　セルフィは小首を傾げた。&lt;BR&gt;「ユーワクって～、諜報活動演習２でやった、あれ？」&lt;BR&gt;　確か対象者に近づいてど～のこ～のってやつ。あたしあの実技試験、成績めっちゃ悪かったんだよね～。&lt;BR&gt;　マルストはがくっと本気でコケそうになった。&lt;BR&gt;「いや……あの通りにやったら彼氏泣くと思うけど……」&lt;BR&gt;　あんなセックスアピールを前面に押し出して悩殺なんて、セルフィがやったら何だか犯罪めいてすごく嫌な感じだ。&lt;BR&gt;　大真面目にう～んと考え込んでいるセルフィを、マルストはしばらく無言で眺め、それから唇に皮肉げな微笑を浮かべてあくまで軽く言った。&lt;BR&gt;「夜部屋に誘ってみるなんてどうよ。大胆ぽくていいんじゃねーの？」&lt;BR&gt;　セルフィの表情がとたんに強ばった。&lt;BR&gt;　大きな翠の瞳に非難の色を浮かべ、きっとマルストを睨み上げる。&lt;BR&gt;「できるわけないじゃん、そんなの～！」&lt;BR&gt;　マルストの表情はあくまでも飄々としている。セルフィは一瞬悔しげに唇を噛んだ。&lt;BR&gt;「……ずるいよ、なんでいっつも先輩ばっかりわかってるの！？　なんで……」&lt;BR&gt;　初めからそうだった。&lt;BR&gt;　初めて会って、同じ任務について、その帰り道に突然言われた言葉からずっと。&lt;BR&gt;&lt;BR&gt;　――――お前って、SeeDの任務で死に場所探してるみてえな戦い方すんのな。&lt;BR&gt;&lt;BR&gt;　セルフィは何も言っていない。もちろん部屋なんて、見せてもいない。&lt;BR&gt;　他人に何かを相談するなんて習慣自体、幼い頃から何でも自分で、を基本に生きてきたセルフィには存在しないのに、何も知らない第三者の彼に、相談も愚痴も話したりするはずがない。&lt;BR&gt;　なのに、見透かされる。&lt;BR&gt;　セルフィが見たくない弱い部分も、痛い部分も、飄々とした口調で全部さらけ出してしまう。&lt;BR&gt;「……俺ばっかりがわかってる訳じゃねーよ。ホントはお前だってわかってんだろ？　お前の部屋にいっぱい詰まった嫌なもんを、お前が一年かけて作っちまったあの部屋を、本当に見せたくないのは彼氏じゃなくて、お前自身にだってことくらい」&lt;BR&gt;　セルフィの胸がずきりと音を立てて痛んだ。&lt;BR&gt;　あまりの痛さに顔をしかめ、すくんだ足をどうすることもできずただ立ちつくす。&lt;BR&gt;　動けないのに、頭の半分がいいからこの場を早く逃げろと叫んでいた。考えちゃだめだと思う端から、今のあの部屋の様相がはっきりとした光景となって頭の中を駆けめぐる。伏せた空の写真立て。鍵をかけた小箱。床を埋めつくすコード。開かない引き出し。本。メモ。モニタに表示され高速でスクロールする膨大な、&lt;BR&gt;&lt;BR&gt;　青い青い空の彼方に消えていった黒い影。無数にひび割れ残骸に覆われたコンクリート。半分燃え残った指人形。主を失った瞬間で時を止めたままの、歪んだ腕時計。倒壊し朱く染まった白かったはずの壁。空気にこびりついた肉の焦げる匂い。掘り出した土の下に見えた炭のような、腕――――&lt;BR&gt;&lt;BR&gt;「……！」&lt;BR&gt;　眼の前が真っ白に爆発し、ついでいっきに暗転した。自分が立っているのか座っているのかもわからない。遠くの方で誰かが呼んでいることに気づいたのはずいぶん後だった。誰かの手が背中を上下に撫でている。&lt;BR&gt;「……セルフィ、聞こえるか？」&lt;BR&gt;　今の一連の思考が何であったのか、次の瞬間にはもうセルフィは覚えていなかった。&lt;BR&gt;　ただ、隣にいるのが誰であるのかだけを認識した。&lt;BR&gt;「ゆっくり深呼吸してみろ……大丈夫だから、落ち着いて。ほら、息を吐いて……そう」&lt;BR&gt;　吸って、吐いてと、冷静に指示を出す声に従って深呼吸を繰り返す。&lt;BR&gt;　胸元を彷徨う指がひどく震えていた。何が起きたのか良くわからないまま、セルフィは無意識に何かを探して視線を動かす。求める姿は見つからず、かわりに視界内に入ってきたのは、顔見知りの先輩SeeDだった。&lt;BR&gt;「……大、丈夫……」&lt;BR&gt;　不本意なほどかすれた声で呟いて、それでも何とか笑顔だけは作ることに成功した。&lt;BR&gt;　セルフィの背中を撫で下ろしてくれていたマルストが、注意深げにセルフィの顔をのぞきこんでいる。セルフィは改めて、にっこりと明るく笑ってみせた。&lt;BR&gt;「えへへ、ごめんね～。びっくりした？」&lt;BR&gt;　今度は普通に声が出た。&lt;BR&gt;　今のはなんだったんだろう。そんな疑問が一瞬心に浮かんだが、すぐに心の奥底へと沈み込む。&lt;BR&gt;「立てるか？」&lt;BR&gt;　静かにマルストが訊ね、セルフィはこくりと頷いた。床に座り込んでいることに今さらながらに気づいたが、それは表に出さず、マルストが引き上げる腕に合わせて立ち上がる。立ち上がって、改めて室内を見回した。&lt;BR&gt;（エスタやね……）&lt;BR&gt;　大丈夫。ちゃんと覚えている。ここはエスタ・ロイヤルホテルの一室で、自分は任務で先輩と一緒にここにいる。&lt;BR&gt;　自分にそう再認識させるセルフィを、マルストは無言で促してベッドに腰をおろさせた。&lt;BR&gt;「……セルフィ」&lt;BR&gt;　眼を上げると、なんだかひどく辛そうな顔をしたマルストが自分を見下ろしていた。&lt;BR&gt;　なんでこんな顔をしてるんだろう？&lt;BR&gt;　ぼんやりとした驚きを覚えるセルフィに、ごくごく静かな声で質問が降ってくる。&lt;BR&gt;「今まで、過呼吸やめまいなどのパニック障害を起こしたことはあるか？」&lt;BR&gt;「え？」&lt;BR&gt;　きょとんとセルフィは眼をまるくし、少し考えて首を横に振った。マルストがちょっと息をつく。&lt;BR&gt;「入眠障害や中間覚醒などの睡眠障害の症状が起きたことは？」&lt;BR&gt;　セルフィは、また少し間を置いて首を横に振った。&lt;BR&gt;「……そうか」&lt;BR&gt;　淡々とそれだけ言って、マルストはかがめていた上体を起こすと、ふいとセルフィから視線をそらした。&lt;BR&gt;「ならいいんだ。……さっきは言い過ぎた。ごめんな」&lt;BR&gt;　持ち上がった手が少し乱暴にセルフィの頭を撫で、そのまま驚くほどあっさりとした態度でマルストは部屋を出て行ってしまう。セルフィはぽかんとしたまま、その背中を見送り、閉じるドアの音を聞いた。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　なんだか香水が全身に染みついて取れないような気がする。無理矢理令嬢に着せられた、ダークスーツを脱ぎ捨てていつものレザージャケットに着替えたものの、やっぱり香水の匂いがついてくる。&lt;BR&gt;　ようやく契約終了を迎えることになり、何か激しく勘違いをしまくりすっかりスコールを『運命の恋人』と思い込んだ令嬢に、散々しがみつかれてさめざめ泣かれたせいだ。&lt;BR&gt;　後ろに立つ、全身黒ずくめの令嬢付きボディガードたちが、サングラスの奥から同情めいた眼差しを送っていたのは決して気のせいではないはずだ。&lt;BR&gt;　ほとんどやけくそで、残り一週間の目測を強引に五日に縮め、ストーカー行為を働いていたガルバディア軍少佐を少々荒っぽい方法で捉えて依頼主に引き渡し、永遠の別れに涙する令嬢を振り切って、スコールはバラム国内のガルバディア大使館に向かった。&lt;BR&gt;「……キスティス？」&lt;BR&gt;　作戦本部にようやく到着し、見覚えのある金髪の美女の顔を見て、スコールはほんのわずかほっとした。ようやく日常が帰ってきたという、変な感慨があった。&lt;BR&gt;　それに対し、彼女は思いきり秀麗な顔を歪め、腰に両手を当てた。&lt;BR&gt;「なあに、もう、その匂い……！」&lt;BR&gt;　どうやら香水の匂いはスコールの幻影ではなかったらしい。&lt;BR&gt;　すでに鼻腔がおかしくなって頭の中まで香りが浸透しているので、スコールはほとんど麻痺してしまっている。&lt;BR&gt;「あぁ……一応シャワー浴びたんだが、やっぱり匂うか？」&lt;BR&gt;「匂うか、じゃないわ。あなた、一体ガルバディアで何してきたのよ」&lt;BR&gt;　頭痛がする、と言いたげなポーズで溜息をつくキスティスに、スコールは困った顔で同じく吐息をついた。&lt;BR&gt;「話すと長いんだが……」&lt;BR&gt;「あぁ、やめて、後で聞くわ。……とにかく状況を説明させて」&lt;BR&gt;　長い話をさらにスコールがするとなると、それはもう絶望的に長くなるに決まっている。任務の内容を端的に報告するならともかく、そこにつまらない諸事情が挟まると、とたんに石のように口が重くなるのがこの青年なのだ。&lt;BR&gt;　そうしてキスティスから状況説明を受けたところによると、現在は政府とテロリスト間とで未だ交渉が続けられているらしく、テロリストの要求はドール国境線の拡張と、先の魔女戦争時におけるドール侵略への賠償金額の増額、及び人質に対する身代金、ということらしい。――まぁ妥当な線だな、と冷静にスコールは考えた。&lt;BR&gt;　人質になっている17名のうち、交渉により3名が解放された。1名は高齢のためショックでろくに言葉も話せないが、残る2名の証言により現在テロリスト主犯の照会が行われているという。&lt;BR&gt;「現場指揮官はノーヴィス・ケレディ警視総監代理。まぁ強行突入ってことになれば、指揮権はこちらに移ることになるでしょうけれど、後で挨拶くらいはしておいて。&lt;BR&gt;　それからこれは人質の写真。それから公邸の見取り図。侵入ルートは二本ってところだと思うわ、あとであなたの意見も聞かせてちょうだい。あぁそれから……」&lt;BR&gt;　立て板に水のごとく説明を繰り出すキスティスに、スコールは生真面目に頷きながら、彼女も指揮官の才能があるらしい……とそんなことを思っていた。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　事情が一変したことで、SeeD候補生の実地試験は中止かとスコールは思っていたが、意外なことに候補生の数こそ減らしたが実地試験は行われることになったらしい。&lt;BR&gt;「レ、レウィン・エルダーです。よ、よろしくお願いします……！」&lt;BR&gt;　セルフィが以前言っていた「ガンブレード使いのSeeD候補生」とは、どうやら学園祭実行委員につい最近なったばかりの少年であったらしい。&lt;BR&gt;「あぁ……よろしく頼む」&lt;BR&gt;　蜂蜜色の髪に紫紺の瞳は、どこか甘い印象を少年に与えていて、とてもガンブレードを振り回すようには思えなかったが、候補生として実地試験に送り出されているということは優秀な生徒なのだろう。&lt;BR&gt;　委員会でもセルフィには懐いているが、特別スコールに話しかけてくることはなかったので、スコール自身はこの少年に対し特別印象を抱いていない。単純に――面白くないだけだ。&lt;BR&gt;（自分に自信がないから嫉妬する、だったか？）&lt;BR&gt;　内心自嘲して笑いながらスコールは思い出す。なるほど、至言だ。&lt;BR&gt;　もちろんそんな精神活動はおくびにも出さず、スコールはキスティスと打ち合わせた実行プランを部下達に説明すべく、淡々とした調子で口を開いた。&lt;BR&gt;「状況は変わらない。交渉は現在も継続中だ。テロリストは6名、もしくは7名。内一人は女性だ。人質は14名だが、向こうはどうやら数名と食料を交換するよう要求してきているらしい。&lt;BR&gt;　テロリストのリーダーはシュヴァイン・オヴァラック。俺たちのチームは人質の安全を確保しながら、こいつの身柄確保が最優先命令だ。これがデータバンクから来た写真。不鮮明だが、特徴は覚えておいてくれ。&lt;BR&gt;　敵の武装はハンドガンが主で、オヴァラックだけが9ミリマシンガンを所持しているらしい。隠している可能性もあるから、過信はするな。奴らの入手ルートは今当たらせているが、突入までに判明するかはわからない」&lt;BR&gt;　こんなちゃちな武装で、バラム領内のガルバディア大使館を襲うなどとは正気の沙汰ではない。何かがあるはずだと、スコールの本能が訴えている。果たして自分の求める答えがその時までに得られるのか、嫌な予感が肌を灼くのを覚えながら淡々と言葉を続けた。&lt;BR&gt;「実行プランを説明する。侵入ルートは二本。Aルートは大使館隣の」&lt;BR&gt;　言ってスコールはすいと腕を上げ、隣に立つビルを指した。&lt;BR&gt;「あのビルから屋根に降り、バルコニーから窓を爆破して侵入。Bルートは地上からだ。俺たちはAルートから突入する。サポートにはミレーナチームがついてくれることになっている。&lt;BR&gt;　人質受領ポイントは正面玄関だ。医療担当が状況に応じてここで待機している。人質が負傷している場合、緊急性がなければそのままミレーナチームの奴に渡せ。回復魔法はなるべく温存すること」&lt;BR&gt;　感情を排した声でさらに実行プランの説明と命令をすべて伝えながら、この候補生が足を引っ張るなんて事態にだけはならないでほしいと、スコールは考えていた。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　緊急態勢は一度解かれ、スコール達は簡素な食事を取ることが許された。&lt;BR&gt;「……なんだか不思議な感じです」&lt;BR&gt;　夜の闇の中、外部からのライトに照らされ浮かび上がる公邸を眺めながら、レウィンがぽつりと呟いた。&lt;BR&gt;　飛び込んでくる最新情報をチェックしながら、スコールはその声に意識を留める。&lt;BR&gt;「僕、先輩に憧れて、メイン使用武器にガンブレードを選択したんですよ」&lt;BR&gt;　全体的に小柄な造りのその少年は、しかし二の腕の筋肉を見てもいかに厳しい鍛錬を自身に課したかがよくわかる、良質な筋肉に恵まれた体格を持っていた。&lt;BR&gt;　スコールも少年同様、筋肉のつきにくい体質で少年時代苦労した記憶がある。スコールよりさらに小柄な体格で、ガンブレードを選択するほどがどれほど大変なことかは、想像に余りあった。&lt;BR&gt;「……俺に？」&lt;BR&gt;「はい！」&lt;BR&gt;　頬を上気させて少年が頷く。&lt;BR&gt;「先輩がSeeDになる前から、憧れだったんです！」&lt;BR&gt;　臆面もなくファン宣言をされ、スコールはちょっと片眉を上げてから視線をそらした。こういった手合いを相手にするのは、あまり得意ではない。&lt;BR&gt;　人質の命を巡る綱渡りの交渉が続く夜にしては、妙に緊張感のない会話だった。&lt;BR&gt;　指揮官として現場にいる訳ではないからかも知れない。今回実行部隊の隊長として現場にいるスコールは、いつもの指揮官としての責務を負わない分、少し気楽な立場にいた。&lt;BR&gt;「……セルフィ先輩が」&lt;BR&gt;　突然レウィンが出した名前に、スコールは外した視線をまた戻してしまった。視線を合わせることに成功し、レウィンは年相応より少し幼い笑みをにこりと浮かべて、嬉しそうに言った。&lt;BR&gt;「野戦実習で同じ班になった時、ガンブレードなんて珍しいって言われたんです。僕がスコール先輩に憧れて持ち始めたって言ったら、じゃあ、スコール先輩を好きな者同士の、仲間だねって」&lt;BR&gt;「…………」&lt;BR&gt;　不覚にも完全にスコールは言葉につまってしまっていた。&lt;BR&gt;「で、学園祭実行委員になったらもっと近くでスコール先輩が見られるって言われて。すいません不純な動機で……でも、そういう奴、他にもたくさんいるんですよ。みんな憧れてるんです」&lt;BR&gt;　かすかに頬を上気させて勢いこんでそこまで語ったレウィンは、自分を見つめるスコールの表情に気づいて驚き言葉を切った。&lt;BR&gt;「……スコール先輩？」&lt;BR&gt;　恐る恐る呼びかけると、スコールがはっとしたように眼を上げ、慌てて小さく頭を振る。&lt;BR&gt;「あぁ……いや、すまない」&lt;BR&gt;　あまり脈絡のない返答を呟いて、表情に乏しい端麗な顔をふいと横向けたスコールに、気分を害したかとレウィンは少し不安になった。何しろこのガーデン初代指揮官は、何を考えているのかわからない偏屈な人間として有名だったので。&lt;BR&gt;　だがレウィンの視線にもう一度眼を向けたスコールは、かすかに息をつくと静かに言った。&lt;BR&gt;「……あんたの気持ちは光栄だが、……あまり浮かれていると、怪我をするぞ」&lt;BR&gt;　それだけ言うと、無駄のない動作でその場をさっと離れていく。&lt;BR&gt;　今この場にセルフィがいれば、それが彼特有の照れ隠しであることを察しただろうが、レウィンはまだそこまで見抜けるほどスコールの人となりを知っている訳ではなかった。ただ、光栄だという言葉に悪感情を覚えてはいないのだと、それだけ安堵を覚えたにすぎなかった。&lt;BR&gt;　やっぱカッコいいなぁ……と均整の取れた背中を惚れ惚れ見つめるレウィンの視線から逃れるように、無表情仮面を取り繕って足早に逃げているスコールの心中など、当然誰にもわからないのだった。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　蝶みたいな少女だと、そうスコールに語ったのは確かキスティスだった。&lt;BR&gt;　ふわふわとして捕らえどころがなく、綺麗な翅で多くの者を魅了し、どの花にも翅をおろしながら、決してどの花にも永住することのない気まぐれな蝶。&lt;BR&gt;（言い得て妙だな）&lt;BR&gt;　ふと苦笑が浮かんでしまう。&lt;BR&gt;　あの奔放な翅を自分のものにしたいと、そう願う男はきっと自分以外にもいるはずだ。&lt;BR&gt;　手の内に収めて他のどの花の上にさえその翅を許したくないと誰もが望み、けれどあの翅を引き裂くことを恐れて誰もが触れることもできずに翻弄される。&lt;BR&gt;　――――あたし、スコールが好き。これからもず～っと、大好きだよ。&lt;BR&gt;　ほんの数ヶ月前聞いた言葉。&lt;BR&gt;（なんであんたみたいな女が、俺なんかを選ぶんだろう？）&lt;BR&gt;　あの日から、何ひとつ変わることなく誰に対しても笑顔を振り撒く少女。&lt;BR&gt;　誰に対しても同じ笑顔で傍に来て、温かさを残して、そして違う誰かの傍に行ってしまう。――ほんの一瞬でも視線を外したら、すぐにでも飛び去って消えてしまうような軽やかさで。&lt;BR&gt;　自分の傍にいることで、彼女にどんなメリットがあるのか、わからなかった。&lt;BR&gt;　アーヴァインやあの図書委員長のように、楽しい会話を提供してやれるわけでもない。彼女が嬉しそうに話してくれる、他愛のない会話に耳を傾けて、時折一言二言だけ言葉を返して、笑う回数の増えた自分に気づいてこそばゆい気分になる、それだけの男でしかない。&lt;BR&gt;　抱きしめて、唇を重ねても、それ以上は進めない。彼女が持つ雰囲気はどこまでも少女で、その先に進ませる勇気をスコールに持たせない。無理に彼女に女を押しつけることは、あの綺麗な翅をもぎとるに等しい行為に思えて。&lt;BR&gt;&lt;BR&gt;　銃声が二発、響き渡った。&lt;BR&gt;&lt;BR&gt;　思考を中断し、スコールは司令本部に向かう。その間にも銃声は断続的に数発響き、その場の空気を凍りついたように変えていった。&lt;BR&gt;「状況は？」&lt;BR&gt;　緊張に白い頬を青ざめさせている美女に鋭く声をかけると、彼女は視線を向けることもなくまっすぐ外を指した。&lt;BR&gt;　玄関から放り出されている、人の骸が夜目にもはっきり見える。&lt;BR&gt;「決裂、か」&lt;BR&gt;　静かにスコールが呟く。せめて人質の数を一桁まで減らしてもらいたいところだったが。&lt;BR&gt;「奴らの武器入手ルートは？」&lt;BR&gt;「まだわからないわ……」&lt;BR&gt;　キスティスの返答に、スコールは嫌な予感がじりじりとまた背を這いのぼるのを感じた。&lt;BR&gt;　ガルバディア・ドール国境間でテロ事件を起こし当局の眼を欺きその隙にバラム領内ガルバディア大使館を襲撃するなどという計画を、実行するテロリストたちが、ハンドガンのみしか所持していないなんてことがあるだろうか。&lt;BR&gt;　そうこうしている間にもラウドスピーカーからは、官邸近くに潜伏する狙撃手の情報や、テロリストたちと懸命に交渉を持とうと努力する警視総監代理やらの声が響いている。五分以内に彼らの出す要求の一部を受け入れなければもうひとり殺す、そうにべもなく告げる男の声をスコールははっきり聞いた。&lt;BR&gt;「……全チームに緊急警戒態勢。スタンバイして」&lt;BR&gt;　SeeDに指揮権が移るのは時間の問題だ。キスティスが静かな声で命令を下す。&lt;BR&gt;　今回はチームリーダーとしての権限しか持ち得ないスコールは、それに従うよりない。&lt;BR&gt;　嫌な予感に後押しされるように、スコールはその場を後にした。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　目立たない黒のワンピースに、指紋を残さないよう黒の長手袋をつけ、邪魔にならないように髪をポニーテールにまとめると、セルフィは小さなリュックにノートPCとデータディスクの山を押し込むとホテルを出、マルストの運転する車に乗り込んだ。&lt;BR&gt;　夕食をとっている時から、車内に乗り込みマルストが車を出しても、お互いほとんど何の会話もない。事務的にプランの最終確認を取り、あとはそれぞれ無言で窓の外を見つめるばかりだ。&lt;BR&gt;　車は目的のビルから少し離れた所に、目立たないように停車した。&lt;BR&gt;　月の涙以降、深夜まで社員に仕事をさせる会社はない。あるとするなら、そこには非合法の香りが漂う。&lt;BR&gt;　それでもビルの窓から明かりが漏れないかチェックして、セルフィはリュックから出して膝上に乗せたノートPCを睨み、軽快にキーを叩く。ワイヤレスで回線に接続し、いくつもの通信衛星を経由し、回りくどい形で勝手知ったるその場所に到達する。データディスクを突っ込んでプログラムを起動。&lt;BR&gt;「よし、行こっか！」&lt;BR&gt;　0時ジャストにセルフィが声を上げる。マルストが頷き、二人は素早く車から降りるとビルの非常口に向かった。隠しカメラを警戒してロックシステムが作動している扉から少し離れた位置に立ち止まり、セルフィはノートPCの画面を見る。数秒の沈黙の後、&lt;BR&gt;「ゲット」&lt;BR&gt;　画面に現れる単語と数字の羅列を眼で追いながら呟くように言った。&lt;BR&gt;　同時にシュッと扉が開く。マルストが短く口笛を吹いた。&lt;BR&gt;　時計に眼を走らせる。これから数分刻みでセキュリティシステムを騙しながら内部に入り込むのだ、無駄な時間は一秒もない。&lt;BR&gt;　もう頭の中に入っている見取り図を思い出しながら、マルストとセルフィは二手に分かれて内部に潜入した。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　プログラムは順調に動いている。沈黙したセキュリティシステムのおかげで、廊下を走るセルフィの足を止める者は誰も現れなかった。&lt;BR&gt;　IDデコーダーもメインシステムの命令権を握るセルフィの前には無力だった。&lt;BR&gt;（う～ん……）&lt;BR&gt;　見る限り普通のオフィスといった様子のそれに、セルフィは小首を傾げながらエレベータに乗る。いくらなんでも、データセンターのある25階まで階段を使うなんて馬鹿な真似はしたくない。もちろん、エレベータはちゃんと待たせておく。&lt;BR&gt;（なんやろな～、ふっつ～なんやねんな……）&lt;BR&gt;　これのどこが生体兵器だのテロリストだのに結びつくのだろう。よくわからない。&lt;BR&gt;　動き出したエレベータ内で、ノートPCを眺める。メインシステム内を少し探り、社内にID登録がされた人間が残っていないかをもう一度確認した。だが完全に安心はしない。エレベータが目的の階に近づいたのを見、セルフィは24口径の拳銃を取り出し、壁にぴったり張り付いた。&lt;BR&gt;「やだな～」&lt;BR&gt;　小さく溜息をこぼす。右耳に取り付けられたピアス型通信機は、マルストに繋がっているはずだった。&lt;BR&gt;「射撃苦手なのに～」&lt;BR&gt;『……検定2級所持者が何言ってんだ』&lt;BR&gt;　くすりと、いつも通りの声が返ってきた。少しだけセルフィは安心する。&lt;BR&gt;　エレベータが停止した。ドアが開く。一瞬緊張しながら気配を伺うが、特別何も感じない。&lt;BR&gt;　一歩外に出る。あとはまっすぐに進むだけだった。時間を確認する。予定より少し早いくらいの、順調な進み具合。&lt;BR&gt;「25階到達、っと。先輩無事？」&lt;BR&gt;『俺を誰だと思ってやがる……もう到達してるよ。沈黙してるセキュリティシステムってのも、なんか間抜けだよな』&lt;BR&gt;　声と共に作業をしているらしい、がさがさという音が響いてくる。&lt;BR&gt;　セルフィは慎重に足を進めながら、小さく笑う。特殊加工を施してあるショートブーツは、エスタ製の透明な廊下を歩いても足音一つ響かせない。&lt;BR&gt;　いくつかのポイントを越え、まっすぐ進む。データセンター到着までにくぐるポイントはあと３つ――&lt;BR&gt;&lt;BR&gt;『……えっ？』&lt;BR&gt;&lt;BR&gt;　ふいにマルストの息をのむ声を聞き、セルフィは驚いて足を止めた。&lt;BR&gt;「なに？　先輩ど～したの？」&lt;BR&gt;　慌てて訊ねながら反射的にノートPCを見る。&lt;BR&gt;（えっ！？）&lt;BR&gt;　信じられない事態をそこに見つけ、セルフィは一瞬心臓が止まりそうに驚いた。&lt;BR&gt;　システムの命令権はセルフィが握っている。それは間違いない。&lt;BR&gt;　だが、そのシステムに割り込んでいる緊急アクセスが優先実行されている――！&lt;BR&gt;「先輩！　先輩聞こえる！？　今どういう状況なの！？」&lt;BR&gt;　どうにか命令の優先順位を変えようと悪戦苦闘しながらセルフィは叫ぶ。聞こえてくるのは荒い息づかいと――機械の駆動音。そして。&lt;BR&gt;（何やのこれ……咆吼……！？）&lt;BR&gt;　五指をほとんどアクロバットのように動かしながら、セルフィは同時に自分の状況を思い出す。時間がない……！&lt;BR&gt;「ねぇ！　先輩ってばっ！」&lt;BR&gt;　こちらまでセキュリティシステムに引っかかる訳にはいかない。セルフィは何とかシステムが動き出す前にポイントを走り抜け、どう対処するか必死で考えながらマルストに呼びかけた。&lt;BR&gt;『……ッ！　ってーなこのっ！』&lt;BR&gt;　銃声。断末魔の叫び声。何かに転がり込んだらしい物音。&lt;BR&gt;　少しして、荒い呼吸音の間からマルストの声が響いた。&lt;BR&gt;『……あぁ、最悪だな。よくわからんが、セキュリティシステムが作動したらしい。EMFC（機械警備兵）がモンスター連れで大量にご登場だ』&lt;BR&gt;「モンスター！？」&lt;BR&gt;　セルフィは眼をむいて立ちつくす。こんなところで何でモンスターが出てくるのか。&lt;BR&gt;　マルストがかすれた笑い声を聞かせた。&lt;BR&gt;『なんか、見たこともねぇモンスターばっかりだぜ……。俺基礎モンの成績、良かったはずなんだがなぁ……』&lt;BR&gt;「じょ～だん言ってる場合じゃな～い！！」&lt;BR&gt;　セルフィは地団駄を踏む。またポイント通過までの刻限が迫っている。どうしたらいいんだろう。どうすれば。&lt;BR&gt;『冗談じゃねぇよなぁ。エスタじゃモンスターもセキュリティのために飼ってるんのかな。……ッ！』&lt;BR&gt;　うなり声と共にマルストが苦痛をこらえるような呻き声を上げた。激しい咆吼と銃声が交錯する。&lt;BR&gt;「先輩！？」&lt;BR&gt;　セルフィは混乱する。眼の前に並んでいる文字と数式、耳から届くマルストの窮地、そして眼の前でシステム再起動を開始しているポイント、どれに集中すればいいのかもわからない。&lt;BR&gt;　どうしよう！？&lt;BR&gt;　焦りすぎて動きが止まるセルフィの耳に、また乾いた銃声と新たなうなり声が届く。&lt;BR&gt;　もうセルフィには我慢ができなかった。&lt;BR&gt;「先輩！　先輩待ってて、今そっちにあたし行くから、だから」&lt;BR&gt;『来るな！！』&lt;BR&gt;　この辺りのセキュリティシステムだったら動かせる。来た道を引き返すのは命令の優先順位を変えるよりは簡単だ。&lt;BR&gt;　しかし思いがけないマルストの激しい声に、セルフィはびくんと震えて手の動きを止めた。&lt;BR&gt;『いいか、お前はデータセンターにとにかく向かうんだ。それからお前が動かせる範囲でかまわない、俺のいる階の隔壁を操作しろ。俺はE-1ポイントから7に向かう。そっちとは逆位置のルートを確保するように動いてみるから、上手く操作すればお前の方には』&lt;BR&gt;「いつからこれが囮作戦になったの！？」&lt;BR&gt;　叩きつけるようにセルフィは叫ぶ。冗談ではなかった。&lt;BR&gt;「違うでしょ～！？　あたしこんなの聞いてない！　大量殲滅ならあたしの方が得意だもん、今からあたしの方に引きつけるから先輩が」&lt;BR&gt;『ばーか』&lt;BR&gt;　銃声にかぶって聞きづらかったが、マルストは確かにそう言ってかすかに苦笑した。&lt;BR&gt;『俺はお前ほどハックの腕は良くねーんだよ。お前が行かなくてどーすんだ？　……ほら、そろそろポイント通過時刻の期限だろ』&lt;BR&gt;　あと20秒でシステムが動き出す。セルフィは息をのんだ。&lt;BR&gt;「……でも先輩っ！」&lt;BR&gt;『いいから行け！！　これは班長命令だ！！』&lt;BR&gt;&lt;BR&gt;　残り3秒でセルフィは最終ポイントを通過し、そのままの勢いでデータセンター入口のIDデコーダーをキー操作ひとつで沈黙させると中に飛び込み、何台も並んでいるモニタ前のコンソールのキーボードを叩き始めた。耳に届く息づかいや駆動音や銃声やうなり声や悲鳴をすべて脳からシャットアウトして、高速でスクロールする文字と数字の羅列を追いかけはじめる。早く目的のデータを探しだしてデータを落として、一刻も早くマルストの救助に向かわなくてはならなかった。&lt;BR&gt;「はやく……！」&lt;BR&gt;　苛立ちながらセルフィは必死でキーボードを叩き続ける。&lt;BR&gt;（イヤや……）&lt;BR&gt;　噛みしめた唇から血が滲んだことにも気づかず、必死でデータを検索する。&lt;BR&gt;（あんなのは二度とイヤ……！！）&lt;BR&gt;　助けられるはずの仲間を救えず置いて行かれるのは。&lt;BR&gt;　もう二度と。&lt;BR&gt;「あった……！！」&lt;BR&gt;　目的のデータをようやく引きずり出すまでの数分が、セルフィには永劫にも等しい時間に思えた。&lt;BR&gt;　データの内容にざっと眼を走らせ確認する。確かにそのデータは驚くべきものだったが、今はそれを読んでいる場合ではなかった。すぐさまデータ転送の準備をしながら、セルフィは通信機の向こうの音に意識を向ける。&lt;BR&gt;&lt;BR&gt;　銃声は止まない。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;&lt;/TD&gt;&lt;/TR&gt;&lt;/TBODY&gt;&lt;/TABLE&gt;&lt;BR&gt;

<script data-viewer-zoom-script>
(() => {
  const stage = document.querySelector('.viewer-stage-image');
  const image = stage ? stage.querySelector('.viewer-image') : null;
  if (!stage || !image) {
    return;
  }

  const setZoom = (enabled) => {
    stage.classList.toggle('is-zoomed', enabled);
    image.setAttribute('aria-pressed', enabled ? 'true' : 'false');
    if (enabled) {
      const naturalWidth = image.naturalWidth || image.clientWidth || 0;
      const targetWidth = naturalWidth > 0
        ? Math.max(naturalWidth, Math.min(Math.round(stage.clientWidth * 0.92), naturalWidth * 4))
        : Math.round(stage.clientWidth * 0.92);
      image.style.width = `${targetWidth}px`;
      image.style.maxWidth = 'none';
      image.style.maxHeight = 'none';
      requestAnimationFrame(() => {
        stage.scrollTop = 0;
        stage.scrollLeft = Math.max(0, Math.round((image.scrollWidth - stage.clientWidth) / 2));
      });
    } else {
      image.style.removeProperty('width');
      image.style.removeProperty('max-width');
      image.style.removeProperty('max-height');
      stage.scrollTop = 0;
      stage.scrollLeft = 0;
    }
  };

  const toggleZoom = () => {
    setZoom(!stage.classList.contains('is-zoomed'));
  };

  image.setAttribute('tabindex', '0');
  image.setAttribute('role', 'button');
  image.setAttribute('aria-label', '逕ｻ蜒上ｒ諡｡螟ｧ縺ｾ縺溘・邵ｮ蟆・);
  image.setAttribute('aria-pressed', 'false');

  image.addEventListener('click', toggleZoom);
  image.addEventListener('keydown', (event) => {
    if (event.key === 'Enter' || event.key === ' ') {
      event.preventDefault();
      toggleZoom();
    }
  });

  stage.addEventListener('click', (event) => {
    if (event.target === stage && stage.classList.contains('is-zoomed')) {
      setZoom(false);
    }
  });

  window.addEventListener('keydown', (event) => {
    if (event.key === 'Escape' && stage.classList.contains('is-zoomed')) {
      setZoom(false);
    }
  });
})();
</script>
</body>
</html>
