      e*&lt;/P&gt;&lt;BR&gt;&lt;BR&gt;「……雪合戦をするんだ」&lt;BR&gt;　窓の外を流れる景色に眼を向けて、セルフィは鈴の音のような声で静かに語る。&lt;BR&gt;「はじめはね、いたずらだったんだと思うんだけど～……帰省してた子達が帰ってきて、待ってた子達の誰かが雪をぶつけて、そのまんま雪合戦になっちゃって」&lt;BR&gt;　スコールが一緒に来るならラグナロク使う？と訊ねたセルフィに、スコールはごく簡潔に列車でいい、と答えた。&lt;BR&gt;「それがいつの間にか定着しちゃって～、帰省組が帰ってくる日はもう、み～んなで朝から待ち伏せして、こ～んなにいっぱい雪玉つくって」&lt;BR&gt;　バラム－エスタ間の列車で終点まで乗り、そこからトラビア方面の列車に乗り換えてかなり長い間揺られなくてはトラビアには着かない。ほぼ半日がかりだ。&lt;BR&gt;　山ほど買い込んだ弁当と菓子の山を積み上げて、気持ちのいいスピードでそれらを空にしながら、セルフィはゆっくりゆっくりトラビアの思い出を口にする。&lt;BR&gt;「スコール雪玉つくったことある～？　トラビアの雪ってパウダースノーだから、も～めっちゃ力こめないと、す～ぐバラバラになっちゃうのね。で、ぎゅうぎゅう力入れて作ると、50個もつくったら腕がめっちゃ痛くなるんだよね～」&lt;BR&gt;「……全部でどのくらい作るんだ？」&lt;BR&gt;「ん～そうだな～、用意するのは100個くらいかな～？」&lt;BR&gt;「……100？　そんなに作るのか？」&lt;BR&gt;「そうだよ～！　奇襲攻撃かけるんだもん、ちょっとしかなかったらすぐなくなっちゃうじゃん～」&lt;BR&gt;　今までスコールにも誰にも話したことのない、いつもはただ「楽しかった」の一言ですませてしまっていた具体的な思い出を、セルフィは大切そうにゆっくりと、少し楽しそうに話して聞かせる。&lt;BR&gt;「で～、奇襲組と待ち伏せ組に分かれて～、奇襲組が持ってるのぜ～んぶぶつけて待ち伏せ組に誘導して、みんなでどか～んってぶつけて、雪玉なくなっちゃうから後ろで年少さんがつくってて」&lt;BR&gt;「セルフィはどっちだったんだ？」&lt;BR&gt;　相槌を打つのは苦手なスコールだったが、そんなふうに時折言葉をはさんでやって。&lt;BR&gt;「もっちろん奇襲組だよ～！　だっておもしろいじゃん。大体メンバーはいつも決まってて……」&lt;BR&gt;　そして時折、ふつりと沈黙が訪れると、ずっと触れ合わせていた指先に軽く力をこめた。&lt;BR&gt;　自分のこの手は、彼女のそれと同じように癒す力などは持たないけれど。&lt;BR&gt;「…………」&lt;BR&gt;　窓の外を見つめていた翠の瞳が、その時だけゆっくり向いて、にっこりと笑う。&lt;BR&gt;　かすめた哀しい記憶を瞳の奥にそっと沈めて、セルフィはまたゆっくりと、とりとめのない思い出を語り出す。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　ゆっくりでいい。&lt;BR&gt;　そんな弱さも含めて愛しているから。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　窓の外の雨は、もうすぐ雪に変わろうとしていた。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;&lt;/TD&gt;&lt;/TR&gt;&lt;/TBODY&gt;&lt;/TABLE&gt;&lt;BR&gt;
