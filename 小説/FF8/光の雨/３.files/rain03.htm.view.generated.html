    &lt;TD align=left&gt;&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;
      &lt;P align=right&gt;*光 の 
      雨..03*&lt;/P&gt;&lt;BR&gt;&lt;BR&gt;　その決定が下されたのは、公邸の玄関に死体が転がった十分後だった。&lt;BR&gt;「……全チームに通達。これより私が統制することになります」&lt;BR&gt;　静かな、どこか凛としたキスティスの声が耳につけた通信機から響いてくる。&lt;BR&gt;　スコールはチームを率いて隣のビルの屋上に待機していた。ロープ一本に命を託して屋根の上まで高速降下するのだ。さすがに緊張しているSeeD候補生・レウィンが蒼白な顔で公邸までの距離を目算している。&lt;BR&gt;　スコールは唇を噛みしめ、その時を待ちながら、いやましに膨れあがる一方の嫌な予感をどうすることもできずにいた。こんな時は絶対に何かが起こる、そんな気がする。&lt;BR&gt;　キスティスからの指示を聞きながら、スコールはもう一度チーム全員の装備を確認させ、万全の対応を取れる状態であることを確認した。&lt;BR&gt;「――第一班突入！」&lt;BR&gt;　キスティスがゴーサインを出し、スコールはチームの面々を振り返り、抑えた声で叫んだ。&lt;BR&gt;「行くぞ！」&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　ロープで屋根の上に降下し、素早く周囲を伺い狙撃がないか確認しながら、侵入に適した窓枠に走り寄り、窓を爆破した。&lt;BR&gt;　地上で閃光弾が炸裂するのを感知する。地上でも突入が開始されたのだろう。&lt;BR&gt;　同じように中に放り込んだ閃光弾を追うようにして、破壊した窓から中に飛び込む。あちこちで炸裂する爆音に、公邸がぐらぐらと地震のように揺れた。&lt;BR&gt;　廊下を駆け抜け、ドアを蹴破る。サンダガを唱えようとして、スコールはぎくりと顔色を変え、とっさに手榴弾を投げ込んだ。&lt;BR&gt;　爆音と爆風に部屋の中にいた者がひるんだ隙に、ガンブレードを握って中に飛び込み、入口に最も近かった男の懐深くに潜り込む。どん、と引き金をひく衝撃が腕に伝わった。&lt;BR&gt;　恐らくどのタイミングで自分が斬られたかも理解しなかっただろう、男がそのままくずれ落ちる。&lt;BR&gt;「魔法はだめだ！　武器のみを使え！！」&lt;BR&gt;　スコールは男の身柄を後から来た部下に放り渡して大声で叫ぶ。&lt;BR&gt;　魔法抑制シールドが発生していた。ガルバディアD地区収容所でも使われていた技術を、そのままセキュリティシステムに応用しているのだ。&lt;BR&gt;　いくつもの銃声が鳴り響く。混乱している中では人質なのかテロリストなのかも判然としないので、とにかく片っ端から床に引き倒しながら身柄を確保する。&lt;BR&gt;「……畜生逃がしたっ！　そっちだ！」&lt;BR&gt;　ここにいたテロリストはスコールが倒した男と、もうひとりしかいなかったらしい。一名が逃走し、それを追ってサポートチームのSeeDが走っていく音が響く。ふいにレウィンが倒れていた人質と思しき初老の男性の横にひざまずき、慌てたようにスコールを呼んだ。&lt;BR&gt;「見てください、これ……！」&lt;BR&gt;　初めての戦場にパニックを起こしている訳でもないその様子に、スコールは無駄のない動作で素早く寄る。レウィンが抱き起こす男性を見て、すぐにレウィンの言わんとするところがわかった。&lt;BR&gt;（なんだ、これは……！？）&lt;BR&gt;　もう事切れているその男性の皮膚は、青黒く変色して膨れあがり、人の形態すら危うい姿になっている。&lt;BR&gt;　一体どんな魔法を使えばこうなるのか、スコールはこんな死体を見たことなど一度もない。だが見回しても、彼が受けている外傷は右胸――と思しき、としか言いようがないが――に丸く開いた銃弾一発のみなのだ。&lt;BR&gt;「キスティス！」&lt;BR&gt;　スコールは通信機に向かってどなりつけるように呼びかけた。&lt;BR&gt;「キスティス、さっき玄関に転がった死体の死因はなんだ！？」&lt;BR&gt;　数秒の雑音の後、キスティスの声が返る。&lt;BR&gt;『胸と頭に被弾して即死よ。それが何？』&lt;BR&gt;「銃弾は？　普通の物か！？」&lt;BR&gt;『え？　えぇ……普通の357マグナムよ。どうしたの？』&lt;BR&gt;　スコールはレウィンから離れ、先ほど倒した男が握っていた拳銃を取り上げると、中の銃弾を確認する。&lt;BR&gt;　そして、大きく舌打ちをした。&lt;BR&gt;「……キスティス、こいつは罠だ。全部署に通達しろ。相手が発砲してきたら、とにかく当たるなと」&lt;BR&gt;『なんですって？』&lt;BR&gt;　銃のシリンダーを戻しながら、スコールは吐き捨てるように言った。&lt;BR&gt;「銃弾に毒が仕込まれている。しかも、魔法抑制シールドが発生しているからエスナはほとんど効力を持たない」&lt;BR&gt;　瞬間、絶妙のタイミングで無線が入った。&lt;BR&gt;『こちら第三班。人質一名負傷、毒物を使用されている可能性があります！　医療担当の応援を要請します』&lt;BR&gt;『了解……今向かわせます。毒消しは？』&lt;BR&gt;『汎用毒消しは一切効きません……新種の毒物と思われます。エスナで今治療をしていますが、抑制シールドの影響もあり解毒には至りません』&lt;BR&gt;　スコールは素早くチームの面々を振り返った。&lt;BR&gt;「聞いたとおりだ。誰か今ので被弾した奴はいるか？」&lt;BR&gt;　その場にいた全員が首を振る。人質もどうやら被弾したのは一名だけだったらしい。&lt;BR&gt;　嫌な予感が的中した苦さを噛みしめながら、スコールは頭の中で公邸の見取り図を思い浮かべて訊ねる。&lt;BR&gt;「……キスティス、セキュリティシステムを操作するのはどこだ？」&lt;BR&gt;　数秒の沈黙の後、キスティスからコントロールルームの場所が告げられる。ここからさほど遠くはない。&lt;BR&gt;「わかった。俺たちが行こう」&lt;BR&gt;　短くそう請け負うと、スコールは人質をサポートの人質受領担当者たちに引き渡す。やや乱暴に人質を連れて去っていく彼らを見送り、早口でチームメンバーに指示を出した。&lt;BR&gt;「作戦変更だ。リーダーのオヴァラックを探しつつコントロールルームに向かう。魔法抑制シールドを発生させているセキュリティシステムを停止させるのが目的だ。ポイントD-3からC-5に抜ける。何か質問は」&lt;BR&gt;「了解」&lt;BR&gt;　被弾すれば死が待っている。たかが拳銃がこれほど脅威に思えることもないだろう――百戦錬磨のSeeDたちでさえ表情をこわばらせていた。候補生のレウィンに至っては何をかいわんやだ。&lt;BR&gt;「よし、行くぞ」&lt;BR&gt;　やはり感情を浮かべない声でそう告げて、スコールは走り出した。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;『やっぱりね～、カッコいいよね～スコールってさ～』&lt;BR&gt;　爆煙うずまく廊下を駆け抜けながら、スコールの背を見つめるレウィンの脳裏にふと、仲の良い先輩SeeDである少女の声がよみがえってきた。&lt;BR&gt;　銃声が響くたび全身が縮み上がり、歯がカチカチ鳴るほどの恐怖を覚える一方で、ひどく頭の片隅が冴えていた。&lt;BR&gt;『あたしには絶対ムリ～！　って思うようなこともさ、こう、ばしーって決めてくれちゃうし』&lt;BR&gt;　なぜか彼女はたくさんいる友人とこういう会話はしないらしく、レウィンと会うとよくスコールの話をした。レウィンも自分の知らないスコールの話を聞けるのは嬉しくて、寄ると触るとミーハーな女生徒よろしくスコールの話ばかりをしていたような気がする。&lt;BR&gt;『でもね～、いっちば～んカッコいいな～って思うのは～、戦ってる時かなぁ、やっぱ』&lt;BR&gt;　こんな顔をしてる彼女を見たら、ガーデン中の男が骨抜きになるんじゃないかと思うような可愛い表情で、彼女はふわふわと嬉しそうに笑ってそう言った。&lt;BR&gt;『辛い思いもい～っぱいしてるんだろうけどね～、でもやっぱり、だからこそなのかな。すご～くカッコいいよ』&lt;BR&gt;　ストイックに戦いの場に身を置く美しい指揮官の姿を思い浮かべ、いいなぁとうっとりしながら、レウィンはそんな風に想い人を誇りに思える彼女が少し、うらやましかった。&lt;BR&gt;　彼女にこんな風に、誇らしく語られる彼のことが、うらやましいと思った。&lt;BR&gt;　実際に眼にする『戦う彼』に魅入られながら、レウィンはあの時の彼女の気持ちが少し、わかったような気がした。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　目的のデータをFTPで片っ端から自室のサーバに飛ばしながら、セルフィは懸命に端末を操作していた。&lt;BR&gt;　まず隔壁を動かし、マルストが対峙しなくてはならないモンスターと機械兵の数を減らす。その上で、マルストを窮地に追い込んでいるセキュリティシステムを停止させるために、緊急アクセスの優先順位を変更させようと試みる。&lt;BR&gt;　耳に届く呼吸音から判断して、決して浅くはない傷を負っていることがわかり、セルフィはますます焦りながら、それでもどうにかセキュリティシステムそのものを吹っ飛ばすことに成功した。おかげで形跡を残さず撤退とは行かなくなったが、背に腹はかえられない。&lt;BR&gt;「先輩、今そっちのシステムを吹っ飛ばしたから！　これ以上モンスターとか増えないからね、あたしが行くまで頑張って～！」&lt;BR&gt;　データ転送状況を確認する。98％転送完了の文字に少しほっとした。これで後は痕跡を完全に消し去ればセルフィの任務は完了だ。リュックに放り込んであるデータディスクの一枚を選んでドライブに素早く突っ込んだ。&lt;BR&gt;『……バカ、俺のことなんざ放っておけっての……』&lt;BR&gt;　かすれた声が耳に届き、セルフィは眉根を寄せた。&lt;BR&gt;『この隔壁開けねーと、お前ここに来られねーだろーが……第一、俺がここに引っかかった時点で、警備会社の連中が向かってるんじゃねーの？　助けに来てる、場合かよ……』&lt;BR&gt;「だから先輩置いて逃げろってゆ～わけ！？」&lt;BR&gt;　転送完了。セルフィの十指がまた踊るようにキーボードの上を跳ねた。&lt;BR&gt;「なんで先輩そんな弱気なの！？　も～ちょっと助かろうって気になってよ！！」&lt;BR&gt;　こっちが必死に現状打破につとめているというのに――！&lt;BR&gt;　怒りにも似た感情を覚えながら、セルフィは最後の仕上げも終え、PCを抱えて走り出した。隠密行動がダメになった以上、面倒な小細工は不要とばかりに、セキュリティシステムは完全に沈黙させている。&lt;BR&gt;&lt;BR&gt;　――――お前って、SeeDの任務で死に場所探してるみてえな戦い方すんのな。&lt;BR&gt;&lt;BR&gt;　ふいに、その言葉は閃光のようにセルフィの脳を貫き、灼いていった。&lt;BR&gt;　転がるように飛び込んだエレベータの中で、セルフィは愕然と眼を見開く。&lt;BR&gt;　いつか聞いた、マルストの言葉。&lt;BR&gt;『……お前、さ……』&lt;BR&gt;　耳がマルストの声を拾っている。もしかしたらずっと前から何かを話していたのかもしれない。セルフィは呆然とエレベータの床に座り込み、それを聞いた。&lt;BR&gt;『もーちっと、彼氏のこと、考えてやったら？　お前死んだら、あの彼氏、すげー辛い思いすんじゃねーの？』&lt;BR&gt;　エレベータがゆっくり下降していく。&lt;BR&gt;　無意識に服の下のペンダントを探りながら、セルフィは全身が小刻みに震えだした。&lt;BR&gt;　マルストが一年と数ヶ月前、恋人を亡くしたことは知っていた。&lt;BR&gt;　それ以外の彼に関することは何も知らない。けれど、ひとつだけ――誰よりも知っていることがひとつある。&lt;BR&gt;　大切な大切な、大好きな誰かが死んでしまうということ。&lt;BR&gt;『お前、あの彼氏を俺みてーになんて、したかねーだろ？　彼氏の部屋、お前の部屋みてえに、したかねーだろ？　だったらお前は……生きねーとだめだろ？』&lt;BR&gt;　いつだって何だって、セルフィのことを見透かしていたマルスト。&lt;BR&gt;　あれがもし――もし、見透かしていたのではなかったとしたら？&lt;BR&gt;　マルストはただ、自分のことを当てはめて語っていただけなのだとしたら？&lt;BR&gt;「じゃあ、先輩は！？」&lt;BR&gt;　立ち上がり、セルフィは声を限りに叫んだ。&lt;BR&gt;「先輩だって！　ちゃんと生きなくちゃダメだよ！！」&lt;BR&gt;　今この通信機の向こうにいるのは、セルフィと同じ痛みを知る人だった。&lt;BR&gt;　同じ痛みを知り、同じ苦しみを経験し、そして今もなおそれに捕らわれている人――&lt;BR&gt;「先輩……先輩聞いて。先輩聞いて！」&lt;BR&gt;　エレベータは下降を続けている。&lt;BR&gt;　なんでこんなに遅いんだろう。セルフィは焦って地団駄を踏みながら声を張り上げた。抱えたPCに、警備会社の人間が到着していることを示すデータが表示されていたが、構わなかった。&lt;BR&gt;「先輩前に言ったよね、あたしに言ったよね、死に場所探すみたいに戦ってるって。&lt;BR&gt;　そうだよ……あたし、あの頃いつもいつもず～っと、この戦場で終わりにできるかなって、今度こそそうなのかなって、任務のたびに思ってたよ。先輩とおんなじに、たくさんたくさん、考えてたよ～！」&lt;BR&gt;　到着した警備兵がシステムの入力を拒まれ入口で立ち往生している。まだ大丈夫。時間は、ある。&lt;BR&gt;　必死にそう自分に言い聞かせながら、セルフィは恐怖を忘れようとするかのように言葉を紡ぎ続けた。&lt;BR&gt;「ずっとず～っと、苦しくて……死んだ人達のこと、忘れたいのか忘れたくないのかもわかんなくって、なんであたしだけ無事だったんだろうって、なんであたし助けられなかったのかなって、何度も何度も思って、もう一生、ず～っと、あたしこんなふうなのかなって、一生こうやって、苦しかったり悲しいまんまなのかなって、思ったりしたよ……！」&lt;BR&gt;　エレベータのドアが開いた。&lt;BR&gt;　セルフィは外に飛び出し、周囲を見回し危険のないことを確認する。最短距離で、なるべく最小限の隔壁を開いてマルストの所に到達するために一番良いルートを確認して、走り出した。&lt;BR&gt;「だけどね、先輩……！」&lt;BR&gt;　胸が急につまって泣き出しそうになりながら、セルフィは必死で声を張り上げる。マルストからの返答はない。&lt;BR&gt;　それでも必死で言葉を続けた。&lt;BR&gt;「だけどね、もし、もしあたしがあの時死んだ先輩の恋人さんで……先輩が、スコールだったら……あたしは、それでも、スコールには生きててほしいって、すごく思うよ！」&lt;BR&gt;　隔壁にぶち当たり、セルフィは足を止めて壁に取り付けられたパネルを操作する。書き換え済みのパスワードを入力し、開いていく隔壁。みたこともないモンスター達が、わずかに開いたそこから一斉に飛び出してくる。&lt;BR&gt;「――ジエンド！！」&lt;BR&gt;　大きくバックステップしながらセルフィは叫ぶ。左手にはまっているオダインバングルが抑制するのはハインの力のみなので、セルフィ固有の魔法は自在に使うことができる。隔壁の向こうに効果は及ぼさないので、第一群を退けてもすべてのモンスターを屠るのには何度もそれを唱えなくてはならなかった。&lt;BR&gt;　動く物が何一つなくなったそこで、セルフィは額に浮かんだ脂汗を乱暴に拭い、少し呼吸を整えてまた走り出した。&lt;BR&gt;　通信機の向こうで銃声がまた響く。マルストはまだ生きている。それがセルフィを少し勇気づけた。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　テロリストの数は7名だったが、大人数で突入したSeeDたちは思わぬ苦戦を強いられていた。&lt;BR&gt;　たった一発銃弾を当てさえすれば、それが腕であろうと足であろうと、そこから即効性の毒が回り戦闘不能になってしまうのだ。魔法抑制シールドが発生しているおかげで、エスナをいくつも重ねがけする必要が生じ、撃たれた人質ひとりに消費されるエスナの量は膨大で、あっという間に底をついてしまう始末だった。&lt;BR&gt;「よし、この上だ！」&lt;BR&gt;　階段までようやくたどり着き、スコールがさらに上に登ろうとしたその瞬間。&lt;BR&gt;「！」&lt;BR&gt;　乾いた銃声が響いた。&lt;BR&gt;　とっさに身をかがめ、スコールはガンブレードを握る手に力をこめる。タン、タン、という乾いた音が断続的に響いた。&lt;BR&gt;（敵は一人か……）&lt;BR&gt;　眼を細めてスコールは状況を把握し、閃光弾を手に取る。一体何発の弾を持っているのかは知らないが、いつまでもここでのんびりしている訳にはいかない。階下では今も阿鼻叫喚の地獄絵図が展開されているのだ。&lt;BR&gt;　肩越しに振り返り、副班長を任じられているSeeDの青年に眼で合図を送る。頷き返した青年が臨戦態勢に入るのを見届けて、スコールは相手が一発撃つのと同時に閃光弾を放り投げた。&lt;BR&gt;　爆音と同時に激しい光が炸裂する。&lt;BR&gt;　だがそんな閃光にもひるむことなく、スコールと副班長の青年が同時に地面を蹴った。恐慌を起こしているらしい敵が、てんで見当違いの方に発砲するのをやり過ごしながら階段を駆け上がる。副班長の青年が投じた鎖に首を絞められ、踊り場に引きずり出されてきたその敵が、暴れながら拳銃を突き出そうとする。躊躇なく空を飛んだスコールのガンブレードが、敵が引き金をひくより先に一閃した。&lt;BR&gt;　重い衝撃。&lt;BR&gt;　綺麗に右肘から先を飛ばされてしまった敵が、数秒間眼を見開いたままそれを凝視し、それから何かに絞め殺されるような悲鳴を上げ、そのまま眼をむいて失神する。&lt;BR&gt;　ぶん、とガンブレードを振って血を落とし、スコールはちょっと息をついて副班長の青年を見た。&lt;BR&gt;「当たってないな？」&lt;BR&gt;「大丈夫です。……あーあ、派手にやりましたね」&lt;BR&gt;　呆れたように笑いながら長い鎖を回収する青年に、スコールは肩をすくめる。綺麗に切断してあるし、早いとこ治療すれば元にもくっつくはずだ。殺さなかっただけ、マシだと思ってもらいたい。&lt;BR&gt;　だがそんな安堵に満ちた空気も、次の瞬間かき消された。&lt;BR&gt;「班長っ！！」&lt;BR&gt;　階段下で響いた悲痛な声に、スコールと青年は一瞬眼を見合わせ、それから振り返る。光の収まりつつあるその空間、銃痕刻まれた床に倒れている、ひとりの少年――&lt;BR&gt;「――レウィン！！」&lt;BR&gt;　怒号のような叫び声と共に、スコールは転がる勢いで階段を駆け下りた。&lt;BR&gt;&lt;BR&gt;　閃光弾に眼をくらませた敵がめちゃくちゃに撃った銃弾のひとつが、右上腕部に当たった。&lt;BR&gt;　倒れた少年を抱きとめたSeeDの少女が、ナイフで衣服を切り裂き傷口を検分する。銃弾自体は貫通しているが、銃弾に仕込まれていた毒物が恐ろしいスピードで周辺の組織に浸食し、気味の悪い色に肌が変色していくのがわかった。エスナの残りもほとんど尽きている今の状態ではどうすることもできない。&lt;BR&gt;　それでも傷口より上の部分を布で縛り上げ、ありったけのエスナでなんとか毒の進行を食い止める。&lt;BR&gt;（くそっ……）&lt;BR&gt;　エスナが最後のひとつとなり、スコールは唇を噛んだ。これを唱えたところで、時間稼ぎにしかならない。&lt;BR&gt;「……せ…輩……」&lt;BR&gt;　土気色の顔に脂汗をびっしりと浮かべて、それでもレウィンが囁くような声で言った。&lt;BR&gt;「すみ……ませ……」&lt;BR&gt;「話すな」&lt;BR&gt;　短く答え、スコールは辺りを見回す。こんな場所に置いていく訳にもいかないし、今から医療班の元に連れて行ったのでは間に合わない。&lt;BR&gt;　この上にあるセキュリティシステムを停止させることさえできれば、エスナですぐにでも治してやれるのだ。&lt;BR&gt;「このまま進む。魔法さえ使えるようになれば治療できる。少しだけ頑張ってくれ」&lt;BR&gt;「い……です、僕……置いて……」&lt;BR&gt;「バカを言うな」&lt;BR&gt;　あっさりと申し出を却下し、レウィンを抱え上げようとしたスコールを、メンバーのSeeDが止めた。代わりに背負ってくれるという彼にレウィンを預け、スコールは表情を引き締める。&lt;BR&gt;　一刻の猶予も許されなかった。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　……実のところ、あの日のことをセルフィは、あまりよく覚えていない。&lt;BR&gt;　バスケットコートで、皆と孤児院時代の話をしたことは覚えている。その後、トラビアガーデンで一泊したことも。&lt;BR&gt;　だが、実際にトラビアガーデンに行った瞬間とその周辺の記憶は、驚くほど曖昧であやふやだ。&lt;BR&gt;　多分あの壊れ果てた瓦礫の山を見た途端に、セルフィの頭の回路は強制切断して、脳の一部がフリーズしてクラッシュして、再起動もかからずそのままになったのだ。人はそんなに簡単には狂わない。&lt;BR&gt;　だからセルフィは、笑うことが少しも苦痛ではなかった。&lt;BR&gt;　そしてそんな自分を、誰もが歓迎してくれた。同情よりも、強くて偉いねと言われることの方が嬉しかったから、セルフィは笑顔であり続けた。思い出されることもないあの日の記憶は、何をあの瞬間自分が思ったかもわからないまま、凍結されて今も機能を停止し続けている。&lt;BR&gt;　そんなセルフィの笑顔を歓迎しなかったのは、たった一人だけしかいなかった。&lt;BR&gt;「先輩……あたし……」&lt;BR&gt;　荒い息から必死で声を絞り出しながら、セルフィはその時、遠い国で戦っているだろうスコールを思い出した。&lt;BR&gt;　不器用で優しくて、そしてセルフィを救ってくれた、誰より大好きな人を。&lt;BR&gt;「あたしね……もし、あたしが死んだら、スコールにあたしのこと、覚えててほしいって、思うけど……」&lt;BR&gt;　どうして気づかなかったんだろう。今なら痛いほどわかるのに。&lt;BR&gt;　通信機の向こうにいる彼は、スコールのいなかった頃の自分自身、そのままなのに。&lt;BR&gt;「でも……でもね！　それでスコールの心が生きる気力をなくしちゃうんなら、だったらあたし、スコールに忘れられてもいい。忘れてほしいって、本気で思うよ！」&lt;BR&gt;　自分のせいで大好きな人が苦しい思いをするのなんて、見たくない。&lt;BR&gt;　忘れられてしまうのは悲しいけれど、胸が潰れてしまうほど寂しくて辛いけれど、それでも。&lt;BR&gt;「忘れてくれることで、それで生きててくれるんなら……生きようって思ってくれるんなら……あたしはあたしのことなんて忘れてって、届くまで何度も叫ぶよ！！」&lt;BR&gt;　二つ目の隔壁に到達する。同じように開いて飛び出してくるモンスターを魔法と手にした拳銃とですべて倒し、先に進む。時間を確認。あまり猶予はないが、あともう少しで、マルストのいる場所にたどり着けるはずだった。&lt;BR&gt;　銃声は断続的に響いている。&lt;BR&gt;「だって……だって、好きな人には、幸せでいてほしいでしょ！？　幸せに生きてほしいもん！」&lt;BR&gt;　幸せになる資格が自分にあるなんて、きっとマルストは思っていない。&lt;BR&gt;　セルフィにはその想いもわかりすぎるほどわかってしまう。同じように思った自分だから、わかってしまう。&lt;BR&gt;　けれどそれでも、マルストの恋人は絶対に、幸せを願っているはずだとセルフィは信じた。&lt;BR&gt;「ねぇ、先輩だってそうでしょ！？　先輩だって、立場が逆なら、きっとそう思うでしょ！？&lt;BR&gt;　あたしはスコールが今の先輩みたいになったら、すごくすご～く悲しいよ！&lt;BR&gt;　あたしのせいでスコールが悲しい思いをしたり、死に場所探すような生き方したりするなんて、あたしはそんなの、そんなの絶対に嫌だもん……！！」&lt;BR&gt;　マルストはどこにいるのだろう。耳に届く銃声に自分を励ましながら、セルフィは必死で走る。場所としてはこの辺のはずだった。&lt;BR&gt;「先輩……あたしだって、生きようって、本気で思えるようになれたんだよ」&lt;BR&gt;　何も喪失することなどなかった、あの日以前の自分に戻ることはできないけれど。&lt;BR&gt;　それでも、絶望ばかりではないことをセルフィは知ったし、何かを夢見て望むことが無駄ではないことを知った。&lt;BR&gt;　夢を見ることは罪悪ではないのだと、教わった。&lt;BR&gt;「絶対絶対、ぜ～ったい、叶わないって思ってた夢だって、もしかしたら叶うかもしれない。先輩のことを救ってくれる誰かが、先輩しか救ってあげられない誰かが、先輩が生きてくこの先に、ちゃんと待ってるかも知れないんだよ！？」&lt;BR&gt;　生き残ってしまったことに対する罪悪感が、どれほど身を苛んでも。&lt;BR&gt;　生きてさえいれば、誰かの力になれることだってあるかもしれないのだ。&lt;BR&gt;「だから、ねぇ、先輩……先輩もちゃんと生きて！　生きようって、本気でちゃんと思って！」&lt;BR&gt;　ロックシステムの作動している部屋の前にたどりつき、セルフィはPCのキーボードを叩きながら必死で叫んだ。&lt;BR&gt;「生きて、ちゃんと前に進んで！　前に進むのに思い出が邪魔なら、忘れてもかまわないって、きっと彼女は言ってくれるから！　絶対絶対そう言ってくれるから！　だから――」&lt;BR&gt;　ロックシステムが解除される。扉が開く。銃声がひときわ大きく耳に飛び込んだ。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　最初は、ただの興味だった。&lt;BR&gt;　恋人を喪い、抜け殻のようになって部屋に閉じこもって、無為な時間を過ごし続けて、そして何気なくのぞいたガーデンネットワーク上の一ページに載っていた日記。&lt;BR&gt;　世界の称賛を浴びるSeeDたちの中で、最も多くの犠牲を払わされた者がいるとしたら、それは彼女だったはずだ。&lt;BR&gt;　弱音は、書いてあった。けれどその文章のほとんどが、彼女の強さを示すもので占められていた。&lt;BR&gt;　どういう精神構造を持っていれば、こんなにも強くあれるのかと興味を覚えた。出口の見えないトンネルの中に放り込まれたような思いだったマルストは、彼女に救いを求めたようなものだった。&lt;BR&gt;　初めて任務で顔を合わせて、その無謀すぎる戦いぶりを目の当たりにして、マルストは彼女に自分を見た。&lt;BR&gt;　結局表に出すか出さないかの違いでしかない。彼女だって、喪失の重荷に押しつぶされそうになりながら、懸命に自己を保つことに必死なだけだった。&lt;BR&gt;　自分の現状を言葉にしてぶつければ、そのことごとくが図星だと彼女の表情が伝えた。まるで鏡の中の自分を見ているような気分で、彼女を分析しながら自分を分析した。&lt;BR&gt;（俺のことを救ってくれる人間、だって？）&lt;BR&gt;　そんな人間がどこにいるのだろう。マルストは苦笑せざるを得なかった。&lt;BR&gt;（俺はお前とは違うよ、セルフィ）&lt;BR&gt;　莫大な喪失に息も絶え絶えになりながら、それでも他人を気遣うことのできる、あんな毅さは自分にはない。&lt;BR&gt;　喪失を恐れながら、それでも一途な瞳でひとりを想う、そんな勇気はどこにもない。&lt;BR&gt;　だからこそ、彼女はエスタパニックを境に変化を遂げ、自らの力で救い主を手に入れたのだ。&lt;BR&gt;（それでも生きろって？）&lt;BR&gt;　まるで機械にでもなったように手が動く。死んでもよかったはずなのに、襲い来るモンスターに向けて鉛の弾を撃ち込み魔法を唱えて懸命に。&lt;BR&gt;　なぜ自分は立っていられるのだろう。全身あちこちに浅くはない傷を負って、視界すら流れ落ちる血で染まっているような有様で、なぜ自分はそれでも自ら倒れることなく戦っているのだろう。今も。&lt;BR&gt;　――――ちゃんと生きて！&lt;BR&gt;　耳元に取り付けた通信機から響く声が、遠い昔亡くしたあの声とかぶって聞こえる。&lt;BR&gt;　こんな、屍同然の自分に。それでも懸命に、生きろと――&lt;BR&gt;&lt;BR&gt;「先輩！！」&lt;BR&gt;&lt;BR&gt;　一匹を倒しその巨体の陰に隠れて飛び出してきたモンスターに全身をこわばらせた瞬間、耳元とすぐ真横から甲高い悲鳴が聞こえた。反応の遅れた自分の身体に飛びついてくる華奢な腕。&lt;BR&gt;　そして、光がはじけた。&lt;BR&gt;　しがみついてきた少女の肩の向こうに広がる、広大な花園をマルストは確かに見た。&lt;BR&gt;（これが……）&lt;BR&gt;　何度となく任務を共にしたマルストも初めて見る。セルフィだけが所有する、絶対無比の死の魔法。&lt;BR&gt;　あまりにも現実離れしたその幻を見ていたのはどれほどの時間だったのか。&lt;BR&gt;　ドウッ、と鈍い音を立てて、その場にひしめきあっていたモンスターの一頭がふいに倒れ、それを皮切りに一斉にモンスター達や機械が床に崩れ落ちた。&lt;BR&gt;「先輩……だいじょぶ？」&lt;BR&gt;　抱きしめていた腕をゆるめて身を離し、セルフィが問いかける。眼を向ければ、暗い照明の下だからなのか、蝋人形のように青ざめた少女が心配そうに見つめていた。&lt;BR&gt;「……死に損ねたな」&lt;BR&gt;　こめかみから流れ落ちる鮮血を拭ってそんなふうに答えると、セルフィはむっとしたように唇をとがらせ、それから細い手首にはまった腕時計に眼を落とすと、慌てたように声を上げた。&lt;BR&gt;「あ～大変！！　早くしなくっちゃ～！」&lt;BR&gt;　突然叫ばれ驚くマルストを後目に、セルフィは壁に背を預けていたマルストの腕を引っ張って立たせると、手早くリュックの中にPCを放り込み、拳銃を取ってマルストに叫んだ。&lt;BR&gt;「先輩、ちゃんと立って！　それ持ってそれ！」&lt;BR&gt;「そ、それ？」&lt;BR&gt;　指さされたものは、セルフィが魔法で屠ったモンスターだった。こんな死体をどうする気なのかと眼で問うと、セルフィは苛々と地団駄を踏む。&lt;BR&gt;「も～こんなのこれ以上ない重要な『証拠』でしょ～！？　いいから急いで担ぐ！　走る！！」&lt;BR&gt;　テロに繋がる証拠とはいかないが、すでに生体兵器が軍事レベルで完成を見ているという、確かな証拠――&lt;BR&gt;　マルストは息をのんで転がっている、見たこともないモンスターを見つめた。そうだ、確かにこんなモンスターは見たことがない。見たことがないというのは……&lt;BR&gt;「ほら時間ないってば、早く早く～！」&lt;BR&gt;　叫ばれてマルストは慌てて、傷だらけの身体にむち打って一体を担ぎ上げ、走り出す少女の後を追う。開け放してあるドアから外に出た途端、何か叫ぶ声が聞こえた。&lt;BR&gt;「！」&lt;BR&gt;　ようやくここまでたどり着いたセキュリティサービスの警備兵だった。あっと息をのむ間もなく、先に外に飛び出していたセルフィの両腕がバネのように跳ね上がって手にした拳銃の引き金を引いた。&lt;BR&gt;　ぱん、ぱん、ぱんと三回連続で乾いた音が響く。小口拳銃ではあったが、正確な狙いを定めたそれは飛び込んできた三人の警備兵の心臓を次々に打ち抜いた。後ろにいた男達が息をのんだ瞬間、頭上の隔壁が音を立てて落ちてくる。同時にセルフィ達の背後の隔壁も動き始め、セルフィはマルストの腕をひっつかむと床を蹴って走り出し、隔壁が落ちる寸前に滑り込むようにして向こう側に抜けた。&lt;BR&gt;　足を挟まれそうになりながら抱えたモンスターごと床に転がって抜けたマルストは、しかし早く早くとセルフィに急かされ慌てふためいて立ち上がると廊下を走り出す。進んだ先で、また隔壁が動き出す音が響いた。&lt;BR&gt;「……誰が射撃苦手だって！？」&lt;BR&gt;　見事な射撃の腕を披露した少女に、呆れながらマルストが声をかける。&lt;BR&gt;「だからっ……」&lt;BR&gt;　振り向きもしないセルフィの足取りは、一切の迷いがなかった。&lt;BR&gt;「真ん中にしか当たんないのっ！！」&lt;BR&gt;　的の真ん中に当てるのは得意なので成績はいいが、なぜか隅を狙うと途端に当たらない。相手の銃を狙ったり足を狙っても絶対に当たらない。変なムラのある性質なのだ。&lt;BR&gt;「とにかく黙って走るの～！！」&lt;BR&gt;　迷いなく走っていく少女に、抗う理由はどこにもなかった。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　こんな時、彼女ならどうするだろうと考える癖が、いつの間にか定着していた。&lt;BR&gt;&lt;BR&gt;　階段を駆け上り、入口前に立つ女性テロリストが発砲する一瞬前に地面を蹴り上げ空を飛び、着地と同時に肩から斬りつける。吹き上がる鮮血が視界を塞がないよう頭を傾けながらさらにガンブレードを振るい、女が握りしめるハンドガンを強打する。跳ね飛んだそれを左手に収めるのと同時に、素早く横に飛んで身を伏せた。&lt;BR&gt;　コントロールルームのドアの一部が、小規模の爆発により吹き飛んだ。&lt;BR&gt;　ロックシステムが破壊され開くドアから、乾いた音と共に無数の銃弾が飛んでくる。マシンガンの弾丸も毒が仕込まれている可能性は高いので、SeeDたちは必死に壁際に身を潜めた。&lt;BR&gt;　どうしますかと部下が視線で問うのを感じ、スコールは下がっているように仕草で示す。&lt;BR&gt;　スコールは血塗れの女性テロリストの身体を引き起こしながら閃光弾を部屋に放り投げ、炸裂した光に銃弾の雨が止まった瞬間に中に飛び込んだ。部下が慌てる声が背後で聞こえたが、構いはしなかった。&lt;BR&gt;「――動くな！」&lt;BR&gt;　光が強すぎてスコールにも部屋の内部はよく見えない。スコールは抱えた女の身体を部屋の奥に向けながら声を上げた。&lt;BR&gt;「見えないかもしれないが、俺は今そちらの捕虜をひとり抱えている。仲間を蜂の巣にする気がないなら、撃たない方がいい」&lt;BR&gt;　ハッ、と小さく笑う声が響いた。スコールは声の位置を慎重に探りながらそちらに身体を向ける。&lt;BR&gt;「天下のSeeD様が人質か」&lt;BR&gt;「……別にSeeDは正義の味方って訳じゃない」&lt;BR&gt;　徐々に視界が戻ってくる。意識のない女を抱える左手に握られたハンドガンは、相手にも見えているはずだ。&lt;BR&gt;　マシンガンを抱えて立ちつくす男の顔をスコールは静かに確認した。&lt;BR&gt;「シュヴァイン・オヴァラックはあんただな」&lt;BR&gt;　セピア色のきつい眼差しでそれに応えたオヴァラックに、さらに静かな声で先を続ける。&lt;BR&gt;「……これ以上何をしても無駄だ。たとえあんたが俺に撃っても、俺の一発があんたに当たればそれで終わりだ」&lt;BR&gt;「だが少なくとも、お前は殺せる。後ろにいるお前さんの部下が俺を殺したところで、お前も道連れだ」&lt;BR&gt;　マシンガンの冷たい銃口を向けながら、引きつった笑みをオヴァラックは浮かべた。&lt;BR&gt;　スコールは形の良い眉を少し引き上げ、少しの間言葉を探す。&lt;BR&gt;「……あんたの目的は、あの要求だけじゃなかったのか」&lt;BR&gt;「無論、要求の通りだ」&lt;BR&gt;　ぞろりとした不快な響きを帯びた声で、オヴァラックは告げて笑う。だがその瞳に浮かぶのは――明らかな憎悪。&lt;BR&gt;　スコールは記憶を辿る。かつて任務中にでも、この男に出会ったことはないだろうか。この男から個人的に憎まれるようなことは。&lt;BR&gt;「だがまさか、俺たちを鎮圧しに来たのがSeeDだったとはな……結局は金次第でガルバディアにだって尻尾を振る犬野郎ってわけか？」&lt;BR&gt;　無表情を保ちながら、スコールは引き金にかけた指に緊張を走らせる。&lt;BR&gt;　背後にいるはずの部下の気配にも意識を集中させる。SeeDの肩書きに恥じることのない動きを、きっと彼らは見せてくれるに違いないという信頼を持って。&lt;BR&gt;「俺たちは正義の基に戦ってるんだ！　てめえらみたいな金だけで戦うクズを見ると、吐き気がするんだよ！」&lt;BR&gt;　スコールの群青の瞳が、すうっと細められた。&lt;BR&gt;　研ぎ澄まされた刃を思わせる鋭い殺気に、テロリストのリーダーにまで登り詰めた男が一瞬明らかに息をのんだ。&lt;BR&gt;　年齢差は十はあるだろう青年に、百戦錬磨の男が呑まれている。&lt;BR&gt;「――なるほどな」&lt;BR&gt;　刃の美貌に氷のような微笑を浮かべ、響きの良い声でスコールが静かに言った。&lt;BR&gt;「あんた、ガーデンに依頼を蹴られたことがあるんだろう？」&lt;BR&gt;　嘲りの色濃い声が放った揶揄の言葉に、セピアの瞳がたちまち殺気を取り戻す。&lt;BR&gt;　これ以上時間をかける訳にもいかないスコールもまた、ぎりっと眦を険しくした。&lt;BR&gt;　そして。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　かすんだ視界の向こうに、憧れ続けたかの人が立っている。&lt;BR&gt;　どちらかと言えば細身で線の細い、およそ兵隊と呼ぶには似合わない体躯を持つ青年は、しかしマシンガンの銃口の前に立ちながらレウィンの瞳にひどく大きく映っていた。&lt;BR&gt;　少しだけ見える横顔に浮かぶ冷たい笑みが、凄絶に美しい。少し灰がかった群青の瞳は、今や研磨された宝石のような鮮やかさを帯びて剣呑に輝いている。&lt;BR&gt;　戦っている時が一番カッコいいと、嬉しそうに笑う少女の言葉をまた思い出した。&lt;BR&gt;（あぁ、本当に……）&lt;BR&gt;　確かにこの人は戦うために生まれてきたのだろうと、レウィンは訳もなく思う。薄闇に支配された屋敷内であっても、熱く静かに存在を主張し、他者の血にまみれていてさえも毅く光を放つような。&lt;BR&gt;　だからこそあの少女は彼に惹かれたのだし、自分もまたそうなのだ。&lt;BR&gt;「！」&lt;BR&gt;　ふいの銃声が薄闇を切り裂く。スコールが女を突き飛ばすと同時に、重さなどないような軽さで床を蹴り高く跳んだ。マシンガンからはじき出される無数の銃弾が女の身体から血霧をあげ、まるでダンスでもするように翻弄された華奢な身体がぐるりと一回転した。その身が床に崩れ落ちるより早くマシンガンの銃口が天を向き、その手首に銀の鎖が巻き付いて動きを封じ、スコールの身体が男の懐深くに飛び込んだ。&lt;BR&gt;「――――」&lt;BR&gt;　腹と手首の両方から血を吹き出し、男が崩れ落ちる。&lt;BR&gt;　スコールは身を起こし、男の手元のマシンガンを入口付近に蹴り飛ばした。男の手首に巻き付いた鎖を放った副班長の青年がそれを受け止める。スコールは倒れた男の顔をのぞきこんで、皮肉げに笑った。&lt;BR&gt;「……味方を殺して、得る正義か」&lt;BR&gt;　凄絶な微笑と共に告げられた一言に、床に這いつくばったままの男が一瞬かっと眼を見開いた。&lt;BR&gt;　そんな男を一瞥し、ゆっくり部屋を見回して歩き出そうとしたその身体が、ふっと揺らいだ。&lt;BR&gt;「班長！」&lt;BR&gt;　突然がくりとバランスを崩して膝をついた青年に、全員が声を上げる。脇腹を押さえる手の間から、ぼたぼたと床に鮮血が落ちた。&lt;BR&gt;「……かすった、だけだ。心配ない」&lt;BR&gt;　低い声でそれに応え、駆け寄ろうとするSeeDたちを手で制してゆっくり立ち上がる。壁に取り付けられた大きな装置の前に歩み寄る足取りは、普段の彼からは考えつかないほど、重い。&lt;BR&gt;「キスティス、片づいたぞ。セキュリティシステムの解除方法を教えてくれ」&lt;BR&gt;　指揮官であるキスティスに通信を取る彼は、何者の干渉をも拒む気配に満ちている。&lt;BR&gt;　レウィンはうまく見えない眼をこらすようにして、蒼白な額にびっしり浮かんだ汗を認め、愕然となった。&lt;BR&gt;「――あぁ、ある。……このスイッチか？」&lt;BR&gt;　淡々とした声。だがその奥に苦痛を噛み殺す気配は消しようもない。&lt;BR&gt;　もう疑いの余地はなかった。スコールをかすめた銃弾にもやはり毒は使われている。&lt;BR&gt;　レウィンの四肢を痺れさせ、全身に激痛を走らせるこの即効性の毒がスコールを蝕んでいる。&lt;BR&gt;　ぱちん、と軽い音をいくつか立てて、スコールが装置を操作する。&lt;BR&gt;『対侵入者用魔法抑止フィールドを解除します』&lt;BR&gt;　機械の音声が無機質に告げると同時に、セキュリティシステムが次々に解除されていった。&lt;BR&gt;　スコールが振り返り、視線で何かを探し、やがてレウィンにまっすぐ群青の瞳を向けた。&lt;BR&gt;　モノクロになった視界内で、その瞳だけがはっきり色を持ってレウィンの脳内に焼き付いた。&lt;BR&gt;　今この場にいる者で、エスナの魔法をただひとつだけストックしているのは、スコールだけだ。&lt;BR&gt;　そのエスナで何をするつもりなのか、レウィンは瞬時に理解した。頭で考えるより先に全感覚で察知していた。&lt;BR&gt;（どうして）&lt;BR&gt;　浅い呼吸が止まるほどの衝撃を覚えながら、レウィンは小さくかぶりを振る。信じられない――こんな、たかがSeeD候補生にすぎない自分を救おうとするなんて。&lt;BR&gt;　眼を閉じると、陽溜りのような笑顔の少女が浮かんだ。&lt;BR&gt;（先輩――）&lt;BR&gt;　こんなところで彼に死なれてしまったら、自分は彼女に何て言えばいいのだろう。&lt;BR&gt;（僕は……そんなの……）&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　彼女ならどうするのだろうと、考える癖ができていた。&lt;BR&gt;　だからこの時も、同じように考えた。&lt;BR&gt;　自分本位な行動をするようでいて、実は誰より他人を気遣う彼女は、人の上に立った時は最大限以上にその責任を果たそうとする少女だった。&lt;BR&gt;　全身が冷たく凍え、傷口から見る間に皮膚が侵され激痛が走るのを感じながらも、なぜか自分が死ぬという発想は浮かばなかった。ただ、あの少女ならこうするだろうと、それだけを思っていた。&lt;BR&gt;　恐らくもう数分と持たないはずの後輩を救う。&lt;BR&gt;　自分は、まだ、撃たれたばかりだ。運が良ければ助かるとも思った。優先順位は明らかだった。&lt;BR&gt;　視線の先で、ふいに部下のSeeDに抱えられている少年がぱちりと眼を開いた。&lt;BR&gt;　毒素に膨れあがったその顔の中、そこだけは変わらない紫紺の瞳がまっすぐスコールを見る。&lt;BR&gt;　その瞳が何故か愛しい翠の瞳と重なった気がして、一瞬スコールが動きを止めたその時、動くはずのない少年の唇が弱々しくかすかに動いた。&lt;BR&gt;　ぱちんと淡い光が弾ける。魔法を使用した時の、かすかな光。&lt;BR&gt;「！！」&lt;BR&gt;　自分の内にあったはずのエスナの魔法が、突然少年に吸い取られるのをスコールは確かに感じた。&lt;BR&gt;「……よせ！！」&lt;BR&gt;　叫んだ時には間に合わなかった。&lt;BR&gt;　ドローしたエスナの魔法を、少年は最後の力でスコールに振り向ける。強烈な毒の痛みが、一瞬にして浄化され消え去っていく。&lt;BR&gt;　スコールは激痛と不快感が拭われるように消えていく間、馬鹿みたいに立ちつくしていることしかできなかった。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　マルストの腕をつかんだまま、いくつもの廊下を駆け抜け階段を駆け下り時にはエレベータも使って、セルフィは非常に複雑なルートを辿りながらついに非常口にたどりついた。&lt;BR&gt;　面白いほどのタイミングの良さで隔壁が閉じていく音が、背中で聞こえる。&lt;BR&gt;「……お前、こんなん、いつ仕込んだわけ？」&lt;BR&gt;　開きかけたドアを蹴り飛ばす勢いで外に飛び出し、目立たない場所に停めてある車の後部座席にモンスターの死体を放り込むようジェスチャーで示しながらセルフィが口を開いた。&lt;BR&gt;「データ転送してる間だよ～」&lt;BR&gt;　あの場からマルストのいる場所についてモンスターを一掃するまでの時間を予測し、逃走ルートを決定して時限式で次々に隔壁を落とすような仕掛けを残す。あの短時間でそんなことをやってのけたのかと、マルストは半ば呆れてしまいながら運転席に飛び込み、セルフィが助手席に滑り込むのを確認するや否やアクセルを踏み込んだ。&lt;BR&gt;　追跡者がいると厄介なので、あちこちの路地をジグザグに走って大幅な遠回りをし、大通りに入る。&lt;BR&gt;　バックミラーで変な車がついてないかを確認し、ようやくマルストは安堵の溜息をついた。&lt;BR&gt;　今さらながら、全身に刻みつけられた傷跡が痛み出す。魔法をかけようとして、そういえばセルフィにフルケアをかけてもらえばすむ話ではないかと思い出し、視線を助手席に向けた。&lt;BR&gt;「セルフィ？」&lt;BR&gt;　眠っているのかと一瞬思った。&lt;BR&gt;　ドアに小さな頭をもたせかけて眼を閉じている少女の顔が、テールランプに照らされているのに蒼白であることに、一瞬後に気づいた。明るい栗色の髪に隠された額は、汗でびっしりになっている。呼吸もひどく浅い。&lt;BR&gt;「……おい？」&lt;BR&gt;　異様なその様子に、マルストは道路の端に車を寄せて停め、改めてセルフィを見てぎょっとした。&lt;BR&gt;「っ……お、前……っ！」&lt;BR&gt;　ビル内は暗かったし、セルフィが着ているのも黒のワンピースに黒のニーソックスだったおかげでまるでわからなかったが、背から脇にかけてかなりの深手を負っていた。助手席のシートにこぼれ落ちた血の量が半端じゃない。&lt;BR&gt;　慌てふためいてとにかくケアルガをかける。傷は二度のケアルガで完全にふさがったが、失った血液はどうしようもない。後部座席に放り出した死体もどうにかしたかったマルストは、少し考えてから連絡用のプリペイド携帯を取り上げ依頼主に連絡をする。&lt;BR&gt;　交渉は数分で終了した。&lt;BR&gt;　携帯の電源を切ったマルストは、貧血状態で人事不省のセルフィを助手席に眠らせたまま、思い切りアクセルを踏み込んで車を走らせた。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　眼を覚ますと、見慣れない天井が視界内に飛び込んできた。&lt;BR&gt;「眼ぇ覚めたか？」&lt;BR&gt;　ぼんやりしていると、横から声が降ってきた。&lt;BR&gt;　セルフィはまだ少しぼんやりしたまま、顔を横向ける。呆れ顔のマルストと眼が合った。&lt;BR&gt;「…………あれ、先輩……？　あ、あれ？」&lt;BR&gt;　前後の記憶がうまく繋がらず、セルフィは慌てて身を起こそうとして、途端にくらくらと視界が回転する。真後ろにひっくり返ったセルフィに、マルストがあきれ果てたように叱りつけた。&lt;BR&gt;「ったく、バカかお前は！　彼氏でもねー男かばってんじゃねーよ！」&lt;BR&gt;　うきゅ～と眼を回していたセルフィが、大声を耳にしてう～んと呻きながら眼を開けた。&lt;BR&gt;　何かを言おうとして、ふと右腕に感じた違和感に視線を向ける。点滴の針が突き刺さっていた。&lt;BR&gt;「……これなに～？」&lt;BR&gt;「鉄材。ったく、自分の怪我くらい治せってんだよ」&lt;BR&gt;「ううぅ仕方ないやないのよう～」&lt;BR&gt;　マルストをかばった際に、背中から脇にかけて爪で抉られたのはわかっていたのだが、何しろうっかりしていると隔壁が落ちてしまうので、治癒魔法をかけることも思いつかなかったのだ。&lt;BR&gt;「ったく、なんだったんだよあのシステムは？　なんであんなとこで止めたシステムが動き出したりした？」&lt;BR&gt;　やれやれと溜息をついたマルストに視線を向け、セルフィはちょっと息をついた。&lt;BR&gt;「テストプログラムだと思ってたから見逃しちゃったんだよね～……たぶん、先輩がいじってたデータのどれかに不正アクセスがあったら、メインシステムに緊急アクセスして、あの『試作品』を使ったセキュリティシステムが作動するようになってたんじゃないかな～？」&lt;BR&gt;　二重に仕掛けられていたセキュリティ。なるほどエスタの最先端を行く企業ということか。&lt;BR&gt;「あ、あのモンスターは？」&lt;BR&gt;「……ここ、クライアントが経営してる病院だから。もう引き渡し済み」&lt;BR&gt;　怒っていたのは一瞬で、飄々とした調子を取り戻したマルストが説明した。&lt;BR&gt;　ふうん、とセルフィが肩をすくめる。&lt;BR&gt;「あ～そうなんだ～。脳のチップから何か出るといいよねぇ～」&lt;BR&gt;「え？」&lt;BR&gt;「落としたデータの一部見たんだけど、人とかモンスターの脳いじって痛覚神経潰して、絶対服従のロボットにしてるみたいなんだよね～。だから、命令者にそのテロリストさんの情報とかがチップに記録されてれば～」&lt;BR&gt;「あーだから脚撃ってもしつこく跳んできたわけか～……って、それえらくヤバい技術なんじゃねーの？」&lt;BR&gt;　ぽんと拳で平手を打って、それからマルストが顔をしかめる。&lt;BR&gt;「ヤバいよね～。でも、それはここで考えても仕方ないよ」&lt;BR&gt;　あっけらかんとセルフィが笑う。それからふいに心の底まで射抜くような眼差しでマルストを見た。&lt;BR&gt;「迷惑だった？」&lt;BR&gt;　強く振った鈴の音を思わせる、凛とした澄んだ声が静かに訊ねた。&lt;BR&gt;「先輩助けたの、迷惑だった？　……彼女さんに、会いたかった？」&lt;BR&gt;　かすかにマルストは眼を見はって、少女の視線を受け止めた。&lt;BR&gt;　今まで見たこともない眼差し。&lt;BR&gt;　彼女が、真正面から他人と向かう時はこれほどに強く鮮烈な瞳を向けるのだと、マルストは初めて知った。&lt;BR&gt;「俺は……会えねぇよ」&lt;BR&gt;　そらすこともできない翠の瞳を見すえながら、マルストは唇に自嘲的な微笑を浮かべてそう答えた。&lt;BR&gt;「彼女は単なるガーデン生で、人殺しなんてしたこともなかったからな。俺とは死んでも行く場所が違うだろ」&lt;BR&gt;「……ガーデン生……？」&lt;BR&gt;　それで何故死ぬようなことになるのだろう。訓練中の事故だろうか。&lt;BR&gt;　眉をひそめるセルフィに、マルストはずっとセルフィには告げずにいた事実を静かに唇に乗せた。&lt;BR&gt;「対ガルバディア戦で死んだんだ」&lt;BR&gt;　セルフィの瞳が大きく見開かれた。&lt;BR&gt;　一年と数ヶ月前の、魔女戦争。その中でも熾烈を極めた、バラムガーデンとガルバディア軍の直接対決。&lt;BR&gt;　あの時、戦死した生徒がひとりや二人ではなかったのは、知っていた。バラムガーデンに来て日も浅いセルフィは、当然あの時点でバラムガーデンに友人などほとんどおらず、誰が死んだのかなんて知るよしもなかったのだが。&lt;BR&gt;「……じゃあ、先輩は」&lt;BR&gt;　呟くように言いながら、セルフィはぼんやりと自分の部屋を思った。&lt;BR&gt;　この人の部屋はどんな後悔に彩られているのだろう。&lt;BR&gt;「先輩が言ってたのは、あたしのことじゃないんだよね？　先輩のこと、だったんでしょ？」&lt;BR&gt;　直接自分自身を見つめるのは痛いから、セルフィを通して自分を見つめていた。&lt;BR&gt;　同じように自分自身と向き直ることのできずにいたセルフィには、それがわかる。&lt;BR&gt;「今のお前はもう、俺とは全然違うよ」&lt;BR&gt;　静かに笑んでマルストが囁く。セルフィが少しだけ、哀しそうな瞳になった。&lt;BR&gt;「ちゃんと、勇気出して、前に向いてんだろ。あの彼氏のお陰にしろ何にしろ、お前はちゃんと前がどっちか見えて、そっちに向かって一歩踏み出してんだよ。だから部屋に帰れなくなったりしてんだろ？」&lt;BR&gt;　喪失や後悔や憎悪などの様々な痛みに翻弄されている間は、自分が前を向いているのか後ろを向いているのかさえ見えなくなる。そんな暗闇に似た混乱を、マルストはよく知っている。&lt;BR&gt;「……多分、もうちょっとなんだよ。もうちょっとで前に進んでいけるって、お前のどっかがわかってんだよ。でなきゃ部屋に拒絶反応なんて出るわけがない。拒否してんのはお前が、立ち直りかけてる証拠なんだよ」&lt;BR&gt;　あとほんの少しの、立ち直るきっかけさえあれば。&lt;BR&gt;　大きすぎた痛みも越えて、その先に進んでいける。&lt;BR&gt;「彼氏にさ、お前、ちゃんと話してみろよ。あの日から今までの一年ちょっとで、お前がどうやって頑張ってきたのかとか、どんな逃げ道作っちまってたかとか、全部話してみりゃいいじゃん。恋人なんてもんは、カッコ悪いとこ見せ合ってなんぼだろ？　好きな相手はさ、カッコ悪いとこまで全部知って自分のもんにしてえもんじゃねーの？&lt;BR&gt;　そういう話せる相手がお前にはいるんだからさ。そうやってお前がいつまでも救われねーまんまじゃ、彼氏の方が可哀想じゃねえの？」&lt;BR&gt;　セルフィは、ぎゅっと唇を噛んだ。&lt;BR&gt;　セルフィ自身にも底の見えない、こんな冥くて重たいものをさらけ出して共有させてしまってもいいんだろうか。&lt;BR&gt;　たった数ヶ月前まで背中と横顔を追うだけだった存在の彼が、『それ』ごと全部セルフィを受け止めようとしてくれるなんて、セルフィは今の今まで想像もしていなかった。&lt;BR&gt;「……先輩は？」&lt;BR&gt;　囁くと、マルストは眼を伏せて小さく笑う。かすかに首を横に振る仕草に、セルフィはふいに哀しくなった。&lt;BR&gt;「先輩にだって、現れるよ。絶対叶わないって思った奇跡が叶うことだって、この世界にはいっぱいあるよ」&lt;BR&gt;　リノアしか見ていなかった彼が、セルフィを振り向いてくれたように。&lt;BR&gt;　絶対に絶対に叶わないと思った夢が、望むことさえあきらめた夢が現実になることだって、きっとある。&lt;BR&gt;「だから、絶望しないでよ。未来を望むことは罪じゃないし……強く願うことは無意味なんかじゃないよ」&lt;BR&gt;「……お前が彼女だったら、そう思う？」&lt;BR&gt;　ふ、と小さく笑ってマルストがセルフィを見た。&lt;BR&gt;「思うよ」&lt;BR&gt;　まっすぐ視線を返して、セルフィはにこりと笑う。&lt;BR&gt;「……未来に進むのに思い出が邪魔なら、きっと彼女さんは忘れていいよ～って言うと思うの。あたしでもきっと、おんなじだと思うの。でも……もし、先輩が未来に行くのに邪魔じゃないんなら……」&lt;BR&gt;　セルフィは先ほど最後まで言えなかった言葉を、ゆっくりと口にした。&lt;BR&gt;「先輩が、未来にちゃんと行けるなら……思い出と一緒に、彼女さんを未来に連れて行ってあげて」&lt;BR&gt;　マルストは、セルフィから視線を外し、少しだけうつむいた。&lt;BR&gt;　何かを耐えるようなその表情を見つめて、セルフィは鈴を振るような声で、囁いた。&lt;BR&gt;「……あたしは、そうするって決めたから……」&lt;BR&gt;　前へ前へと、すべてを抱きしめて進んでいこうと決めたのだ。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　朝日が病室に差し込むまで、それから二人は、一言も話さずじっとしていた。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;&lt;/TD&gt;&lt;/TR&gt;&lt;/TBODY&gt;&lt;/TABLE&gt;&lt;BR&gt;

<script data-viewer-zoom-script>
(() => {
  const stage = document.querySelector('.viewer-stage-image');
  const image = stage ? stage.querySelector('.viewer-image') : null;
  if (!stage || !image) {
    return;
  }

  const setZoom = (enabled) => {
    stage.classList.toggle('is-zoomed', enabled);
    image.setAttribute('aria-pressed', enabled ? 'true' : 'false');
    if (enabled) {
      const naturalWidth = image.naturalWidth || image.clientWidth || 0;
      const targetWidth = naturalWidth > 0
        ? Math.max(naturalWidth, Math.min(Math.round(stage.clientWidth * 0.92), naturalWidth * 4))
        : Math.round(stage.clientWidth * 0.92);
      image.style.width = `${targetWidth}px`;
      image.style.maxWidth = 'none';
      image.style.maxHeight = 'none';
      requestAnimationFrame(() => {
        stage.scrollTop = 0;
        stage.scrollLeft = Math.max(0, Math.round((image.scrollWidth - stage.clientWidth) / 2));
      });
    } else {
      image.style.removeProperty('width');
      image.style.removeProperty('max-width');
      image.style.removeProperty('max-height');
      stage.scrollTop = 0;
      stage.scrollLeft = 0;
    }
  };

  const toggleZoom = () => {
    setZoom(!stage.classList.contains('is-zoomed'));
  };

  image.setAttribute('tabindex', '0');
  image.setAttribute('role', 'button');
  image.setAttribute('aria-label', '逕ｻ蜒上ｒ諡｡螟ｧ縺ｾ縺溘・邵ｮ蟆・);
  image.setAttribute('aria-pressed', 'false');

  image.addEventListener('click', toggleZoom);
  image.addEventListener('keydown', (event) => {
    if (event.key === 'Enter' || event.key === ' ') {
      event.preventDefault();
      toggleZoom();
    }
  });

  stage.addEventListener('click', (event) => {
    if (event.target === stage && stage.classList.contains('is-zoomed')) {
      setZoom(false);
    }
  });

  window.addEventListener('keydown', (event) => {
    if (event.key === 'Escape' && stage.classList.contains('is-zoomed')) {
      setZoom(false);
    }
  });
})();
</script>
