    &lt;TD align=left&gt;&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;
      &lt;P align=right&gt;*光 の 
      雨..04*&lt;/P&gt;&lt;BR&gt;&lt;BR&gt;　一晩病院に泊まる羽目になったセルフィは、翌朝FTPで自室のサーバに飛ばした例のデータをディスクに落とし、依頼主に渡して、これで完全に任務完了となり、その足ですぐガーデンに戻った。&lt;BR&gt;　予定よりやや帰還予定がずれ、ガーデンが設定したSeeDレベル考査日は過ぎていたため、セルフィとマルストは同時に帰還してきたガルバディア任務組と一緒に追試という形で試験を受ける。&lt;BR&gt;　ミッショントラブルがあったとかで、キスティスとスコールを含めた一部のSeeDは、帰還していなかった。&lt;BR&gt;　相変わらず部屋にいづらいセルフィは、仲の良い友人の部屋を泊まり歩いてスコールの帰りを待ったが、一向に帰ってくる気配もなく、ついにトラビアガーデンに帰る日がきてしまった。&lt;BR&gt;&lt;BR&gt;「……待たなくていーの？　彼氏」&lt;BR&gt;　バラム駅まで見送りに来てくれたマルストが、いつも通りの飄々とした口調でそう訊ねる。&lt;BR&gt;　結局帰還してから今日までの数日間で、セルフィが自室に戻ったのは数えるほどしかなかったことを、大して会話もかわしていないのにやっぱり見透かされているようだった。&lt;BR&gt;　それを不思議に思う気持ちはすでにない。きっと、いつかマルストも自分と同じように進んでいくだろうことが、セルフィにはわかる。&lt;BR&gt;　そう、自分たちはいつかまた立ち上がれるはずなのだ。ただ今は少しだけ、生きることに疲れてしまっているだけで。&lt;BR&gt;「待ちたいのは山々なんだけどね～、今日から帰省が始まっちゃうから」&lt;BR&gt;　肩をすくめてセルフィは笑った。&lt;BR&gt;　両親が健在で帰る家のある子供達は、夏期休暇と冬期休暇の間は寮を離れ自宅に帰省することになっている。&lt;BR&gt;　バラムガーデンは孤児が多いが、それでも幼年学級の子は大半が帰省組だし、トラビアガーデンに至っては国が徴兵制をとっている関係上、孤児でない子供の比率はかなり高い。&lt;BR&gt;　恐らく今日一日で、トラビアガーデンの人口はがたっと減る。一年半前のミサイル爆撃で、ただでさえ生徒数が減少している上に、だ。それを考えると、やはり今日にはトラビアに行かなくてはならなかった。&lt;BR&gt;　それにもうひとつの心配事に、現在ガルバディアとトラビア間で調整が難航している賠償問題のことがあった。&lt;BR&gt;　復興支援に多額の賠償金を要求しているトラビア政府と、意固地になって支援を拒む一部のトラビアガーデン生たちとの間で亀裂が生じ、足並みが揃わないため具体的な交渉に移れずに時間ばかりがかかっているのだ。&lt;BR&gt;　支援を拒んでいるのはトラビアガーデンで育った、家のない子供達。――この時期になっても帰省する家のない、恐らくセルフィと同年代の戦災孤児達だ。彼らは『家』でもあるトラビアガーデンに深い愛着と誇りを持っている。セルフィがこの時期トラビアに行くのは、残る彼らを説得するという意味合いも多く含んでいるのだ。&lt;BR&gt;　エスタの開国を機にはじまった新線工事が先月終了し、バラムとエスタ間、そしてエスタとトラビア間が列車で行き来できるようになっていた。列車でトラビアに行くとなると途中で乗り換えが発生する。その乗り換え列車の最終に接続するバラム発の列車の時刻を調べてギリギリまで待ったが、もうタイムリミットになってしまった。&lt;BR&gt;「でも、へ～きだよ～！　帰ってからゆ～っくりお話、すればいいんだし。ね！」&lt;BR&gt;　発車のベルが鳴る。&lt;BR&gt;　何かを言いかけたマルストが、結局何も言わずに小さく笑んでセルフィの頭をくしゃりとなでた。&lt;BR&gt;「気ぃつけろよ」&lt;BR&gt;　セルフィは笑顔で頷き、小さなトランクとバッグを抱え上げて列車の中に乗り込んだ。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　しばらくはデッキで景色を楽しんでいたセルフィだったが、雲行きが怪しくなって雨になってしまったのを機に、車両内に戻って空いている座席に腰をおろした。&lt;BR&gt;　もうすっかり日も暮れて、窓の外は雲のせいで真っ暗になっている。&lt;BR&gt;　駅弁を二つ買い、それを綺麗に食べ尽くす頃、携帯電話がふいに鳴った。&lt;BR&gt;　振動に切り替えておかなかったことをうかつに思いながら、慌ててバッグの中に放り込んである携帯を取り出し、相手次第では切ってやろうと心に誓いながら液晶画面を見ると、意外な人物の名が表示されている。&lt;BR&gt;　セルフィはますます慌てて通話ボタンを押した。&lt;BR&gt;「もしもし？」&lt;BR&gt;『セルフィ？　今大丈夫？』&lt;BR&gt;　美しい響きの声が耳に届く。頷こうとして、周囲の乗客に迷惑であることを思い出したセルフィは、急いで立ち上がってデッキに向かった。&lt;BR&gt;「うん、いいよ～。キスティが電話してくるなんて、めずらしいね～」&lt;BR&gt;　車両を抜けてデッキに出ると、少し気楽になって声を大きくする。&lt;BR&gt;　ふう、とキスティスが小さく溜息をついた。&lt;BR&gt;『……あなたが今日トラビアに発ったって聞いて、やっぱりこれだけは伝えておこうと思ったの』&lt;BR&gt;　え？　とセルフィはいささか間の抜けた声を上げた。&lt;BR&gt;「キスティ、今ガーデンなの～？　いつ帰ってきたの～？」&lt;BR&gt;　本当はスコールも一緒なのかと聞きたかったのだが、相手がキスティスなので言葉を止める。&lt;BR&gt;『ほんのついさっき。全員帰還したわ』&lt;BR&gt;「なんだ～じゃあ、思いっきりすれ違いだね～」&lt;BR&gt;　軽く笑いながらセルフィはがっくりと肩を落とした。なんてタイミングの悪さだろう。&lt;BR&gt;『そのようね。……ところで、レウィン・エルダーはあなたと知り合いだったわね？』&lt;BR&gt;「え？　あ、うん……そうだけど」&lt;BR&gt;　力が抜けてずるずるとしゃがみ込んでしまいながら、セルフィはぼんやりと返事をする。ガンブレード使いのスコールファンな後輩は、上手くSeeDに合格できるだろうかと頭の隅で考えた。&lt;BR&gt;『彼ね、亡くなったわ』&lt;BR&gt;「――――え？」&lt;BR&gt;　頭の中が一瞬空白になった。&lt;BR&gt;　言うべき言葉をすべて失ってしまったかのように、セルフィは顔を上げて虚空を見つめる。&lt;BR&gt;（なくなった……って？）&lt;BR&gt;　しゃがんでいた足の力すら抜けて、セルフィは腰を床に落としてしまう。&lt;BR&gt;　脳裏に蜂蜜色の髪に紫紺の瞳持つ後輩の姿がよぎる。&lt;BR&gt;『スコール班として実行部隊に出たんだけれど、ミッショントラブルが発生して……蘇生魔法も施してみたんだけれど、もうどうにもならなかったの。他にも重傷者が何名か出たし……』&lt;BR&gt;　静かなキスティスの言葉を、頭が理解するのにかなりの時間を要した。&lt;BR&gt;　ゆっくりと数回まばたきを繰り返す。&lt;BR&gt;「ミッション……トラブル……？」&lt;BR&gt;　スコールの班で。&lt;BR&gt;　突然、セルフィの背中を悪寒にも似た感覚が走り抜けた。&lt;BR&gt;　後頭部から両眼を冥く鋭い何かが貫いていき、心臓が飛び出すのではないかと思うほど大きく跳ねた。&lt;BR&gt;「キスティ……それで」&lt;BR&gt;　わななく唇が辛うじてそこまで声を押し出したが、その先は言葉にならなかった。聞くのが恐ろしくて。&lt;BR&gt;　だが、そのセルフィの心の声は、キスティスにも雄弁に伝わっていた。&lt;BR&gt;『スコール班の犠牲者はレウィンだけよ』&lt;BR&gt;　優しい声がなだめるように告げてくれる。&lt;BR&gt;　セルフィは思わず安堵の溜息をつき、次の瞬間心の奥底から自己嫌悪に陥った。&lt;BR&gt;　仲の良い後輩が死んだというのに、スコールの無事に安堵している自分があまりにも醜く思えたせいだ。&lt;BR&gt;　レウィンの死は確かにショックで、哀しい。けれどスコールに何かあったかもしれないと思った瞬間の衝撃は、あまりにも強烈で底知れない恐怖を伴っていた。こんな恐怖を感じたのは、生まれて初めてだった。&lt;BR&gt;　キスティスが電話の向こうで何か言っている。セルフィは曖昧に頷きながら、耳に届く言葉が心を上滑りしてこぼれていくのを感じていた。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　次の停車駅が近づいているらしく、列車が減速をはじめた。&lt;BR&gt;　座席に戻って、セルフィは呆然としたまま窓を眺める。雨がずいぶん強くなっているらしく、減速しているのに窓を激しく雨粒が叩いていた。&lt;BR&gt;（スコール、実行部隊やったんや……）&lt;BR&gt;　今さらながらにそのことに気づく。任務内容によってはレベルが下のSeeDがリーダーを任されることもあるので、別に珍しくもなんともないのだが、スコールが指揮官ではない状態というのは、少し不思議な感じがする。&lt;BR&gt;　ガンブレード使いの後輩は、だからこそスコールの班に配置されたのだろう。&lt;BR&gt;（ちゃんと話せたんかな……？）&lt;BR&gt;　誰よりもスコールを尊敬していて憧れていて、スコールの前になるといつも緊張して何も話せなかった後輩。&lt;BR&gt;　少しでも言葉を交わせていたらいい。せめてもの救いにそう思って、だがそのことがスコールにとって辛い記憶にならないだろうかと思いを巡らせる。&lt;BR&gt;　スコールは指揮官ではなかったけれど、パーティの班長だった。部下の命を両肩に背負って戦っていた。&lt;BR&gt;（……いっつもそんなんばっかやね、スコールは……）&lt;BR&gt;　スコールだって、他人の命を背負うことが辛くないわけがないことを、セルフィは良く知っている。喪われた命に対し、面には出さずにそれでも痛みを覚えていることも。&lt;BR&gt;　それなのに、スコールはSeeDになってから立て続けに、数え切れないほどの命を背負わされてきたのだ。初任務でリノアとセルフィとゼルの命を、次の任務ではそれにアーヴァインとキスティスの命が加わり、さらに次はバラムガーデンに所属する、幼年学級の子供達から学園長に至るすべての者の命を背負い、最後に至っては今の時間に生きるすべての人間の命を背負わされた。&lt;BR&gt;　自分には耐えられないかもしれない、とセルフィは思う。&lt;BR&gt;　ガルバディアのミサイル基地に潜入して、機械兵器の中に閉じこめられたあの数日間、自分の行動でバラムガーデンが助かったのか破壊されたのかもわからなかったあの時の重圧は本当に苦しかった。だからこそF・Hでスコールと再会し「おかえり」と言われたことが心にあれほど響いたのだ。&lt;BR&gt;　思えばあれが、セルフィが初めて他人の生命を背負った瞬間だったのかもしれない。&lt;BR&gt;　想像するよりもずっとずっと、それは重いものだった。――他人の命を、背負うということは。&lt;BR&gt;　けれどスコールはもうずっと、SeeDになったその日から、この重圧に耐えてきたのだ。&lt;BR&gt;「……あ」&lt;BR&gt;　いつの間にか停車駅に着いていた列車が止まっていて、発車のベルが鳴っていることに気づき、セルフィは慌てて顔を上げた。&lt;BR&gt;「あ、あ～待って！　降ります～！！」&lt;BR&gt;　叫びながら網棚に放り込んであるトランクを取ろうと飛び跳ねていると、前に座っている初老の男性が苦笑まじりに下ろしてくれた。礼を告げている間にドアが閉まる音が聞こえる。セルフィは焦った。&lt;BR&gt;「ごめんなさ～い、開けます～！」&lt;BR&gt;　すぐ眼の前の窓を全開にすると、みぞれ混じりの冷たい雨が一気に吹き込んでくる。ぺこぺこと周囲に謝って、セルフィはトランクとバッグを両腕にしっかり抱え込んだ。&lt;BR&gt;　がたん、と列車が動き出す。&lt;BR&gt;「あ、あぶな――」&lt;BR&gt;　トランクを取ってくれた男性が声を上げるのに振り返って笑顔で応え、セルフィは窓枠に飛び乗るとためらいなく細い足場を蹴りつけて宙に飛び出した。&lt;BR&gt;　走りはじめた列車から飛び出したセルフィの身体は、強風と雨に打たれながら軽やかに空を跳んでホームに着地する。重い荷物に一瞬着地の足がよろめいたが、どうにか尻餅をつくことだけは避けた。&lt;BR&gt;「っとと……」&lt;BR&gt;　トランクにすがりついて身体を支え、ほっと息をつく。始終何もないところで蹴つまずいて転んでいる自分にしては上出来だった。&lt;BR&gt;　転ぶたびに呆れ顔で、ちょっとだけ乱暴に引き起こしてくれる青年をふと思い出し、セルフィは少し吐息をつく。&lt;BR&gt;「お客さん！　危ないじゃないの走ってる列車から飛び降りるなんて！」&lt;BR&gt;　血相を変えて飛んできた駅員に、セルフィは慌てて思考を遮断して顔を上げ、ごめんなさ～いと謝り訊ねた。&lt;BR&gt;「あの～、バラムに戻りたいんですけど、何番線ですか～？」&lt;BR&gt;「え？　バラム？」&lt;BR&gt;　中年の駅員は人の良さそうな顔を少し曇らせて、発車予定時刻表を指さしながら告げる。&lt;BR&gt;「この時間帯だとね、バラム東駅までしか出ないんだよ」&lt;BR&gt;「へ？」&lt;BR&gt;　終着駅であるバラムのひとつ手前の駅で止まってしまうと聞き、セルフィはぽかんと眼をまるくした。&lt;BR&gt;「なんで？」&lt;BR&gt;「バラム東の方が土地が広い分車庫も多くてね、深夜の電車はそのまま車庫入れする関係上、バラム東までで終わっちゃうんだよ」&lt;BR&gt;「えぇ～！？」&lt;BR&gt;　セルフィは素っ頓狂な声を上げ、やむ気配のない冷たい雨を呆然と眺める。&lt;BR&gt;　傘を持ち歩くような習慣はないし、この時間では売店も閉まっているしタクシーもない。&lt;BR&gt;（……歩くしか……あらへんなぁ……）&lt;BR&gt;　寒さに耐性のあるセルフィでも、この冷たい雨にはちょっと気分が挫けないでもなかったが、このままトラビアに向かうことも考えられなかった。&lt;BR&gt;　親切な駅員に発車ホームに案内されながら、セルフィは携帯を取り出しトラビアガーデンの友人に、今日の到着が無理であることを告げるべく通話ボタンを押した。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　半分ほどいないだろうと思っていたセルフィは、やはりすでにトラビアに発った後だった。&lt;BR&gt;　病院からガーデンの安置室に移されたレウィンの遺体には一度会いに行ったが、その後も山ほど溜まっている事務処理やレベル考査やらに追われて自室に戻る暇もなく、また自分自身思考する時間を持ちたくなかったこともあって、今日手をつける必要のない仕事まで片づけていたスコールだったが、時計の針が日付を越えた現在、執務室を離れて非常階段の途中に立っていた。&lt;BR&gt;「…………」&lt;BR&gt;　滅多に吸わない煙草に手を出したのは、あまりにも混乱してそのままの思考をひとつずつほどくためだ。&lt;BR&gt;　煙を吐くと、冷たい空気に白い息と混ざり合って闇に紛れていく。&lt;BR&gt;　鉄柵にもたれかかり、降り注ぐ雨を眺めながら、スコールは先ほどのことを思い返していた。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;「よう彼氏。相変わらず忙しそうだなぁ」&lt;BR&gt;　飄々とした調子でマルスト・ワーリックが執務室に入ってきたのは、寮の消灯時間をとうに過ぎた頃だった。&lt;BR&gt;「俺明日もう帰省しちまうからさ、今いいか？」&lt;BR&gt;　どうやらマルストは帰る家のある帰省組だったらしい。&lt;BR&gt;　スコールは頷き、執務室の椅子を勧めて、積まれた書類を脇に追いやった。何も今日やらなくてはならない仕事というわけでもない。&lt;BR&gt;「あのさ、セルフィのことなんだけど」&lt;BR&gt;　その名を出すことでスコールの表情が硬くなることを知ってか知らずか、淡々とマルストは言葉を続ける。&lt;BR&gt;「PTSDの疑いがある。あいつが帰ってきたら、一度カドワキ先生に相談しに行った方がいい」&lt;BR&gt;「…………え？」&lt;BR&gt;　思いがけない一言に、スコールは思考が空白になった。&lt;BR&gt;（PTSD？）&lt;BR&gt;　心的外傷後ストレス障害。授業でやったことはもちろんある。悲惨な戦場を体験した兵士などがよく起こす精神症状で、戦争神経症と呼ばれることもある。自分や、自分に最も身近な家族・友人が生命の危機に晒されるようなショッキングな出来事を体験し、心的外傷（トラウマ）を受けた際に起きる心理的変化とそれによって引き起こされる様々な障害を、PTSDと呼ぶ。&lt;BR&gt;（セルフィが？）&lt;BR&gt;　確かにトラウマとなりうる体験は、している。だがそんな兆候なんて見せたことは一度も――&lt;BR&gt;（ないと、言い切れるか？）&lt;BR&gt;　スコールは苦い気分を噛みしめる。&lt;BR&gt;　PTSDの主な症状は、トラウマとなりうる体験を繰り返し思い出す侵入的想起や解離性フラッシュバック、トラウマに関連した場所・事象に対する回避行動やトラウマ体験に関する出来事を忘れてしまう解離性健忘、人間関係からの孤立、自律神経系の興奮による物事に対する過剰反応、睡眠障害だ。&lt;BR&gt;　スコールの眼の前でセルフィがそれらの症状を起こしたことは一度もないが、何しろPTSDには遅延性のものがあり、出来事から六ヶ月以上が経過して症状の出る者もいるし、軽度から重度まである――&lt;BR&gt;「一応、根拠はある。この間、解離性フラッシュバックを起こした」&lt;BR&gt;　淡々としたその言葉に、スコールはただ眼を見はるばかりだった。&lt;BR&gt;「……たぶん、トリガーになったのは俺の言葉だろうが、他にどんなものがトリガーになるかはわからない」&lt;BR&gt;　スコールの内心など意にも介せず、マルストはさらさらと言葉を続ける。&lt;BR&gt;「でも、社会生活に支障は出てねえし、医者によってはPTSD判定出さないくらいの軽度なレベルだと思う。でも悪化したりしたら、SeeDとしては致命的だろ？　そうであってもなくても、やっぱ一度専門家に見てもらった方がいい。&lt;BR&gt;　……一度やらかしてる俺が言うんだから、間違いねーよ」&lt;BR&gt;「え……？」&lt;BR&gt;　ふっと苦笑してみせたマルストに、スコールはかすれた声を上げる。&lt;BR&gt;　マルストはひょいと肩をすくめた。&lt;BR&gt;「俺な、ガルバディア戦で彼女死なせてるんだわ」&lt;BR&gt;　初耳だった。&lt;BR&gt;　愕然とするスコールの表情に、セルフィと同じ顔するんだなぁとマルストはそんな感想を抱きながら、あくまでも淡々と言葉を続ける。&lt;BR&gt;「その直前にな、俺、彼女と喧嘩してたんだよな。もう今となっちゃ何が原因かも思い出せねぇ些細なことなんだけど、そのせいであの時、俺は彼女がどこにいんのか、居場所がつかめなくってさ」&lt;BR&gt;　何しろあの時はまだ電波障害のお陰で携帯電話は普及していなかったのだ。連絡の取りようもなく、マルストはSeeDとして戦線に参加し、熾烈な戦いの渦で自分の命を守ることしかできなかった。&lt;BR&gt;「全部終わって、安置室で彼女に再会した」&lt;BR&gt;　静かな一言に、スコールは任務に赴く前、わざわざ仲直りを勧めてきた彼の言葉を思い出した。&lt;BR&gt;　死んだ時後味悪いだろうと、簡潔な言葉にこめられた複雑な思いの正体を知る。&lt;BR&gt;「も、めちゃめちゃ後悔してさ……惚れた女ひとり守れねぇで、何がSeeDだよって全部馬鹿馬鹿しくなって、部屋に閉じこもって何もかも放り出して全力で引きこもった。&lt;BR&gt;　でもさ、哀しいことに、生きる気ゼロなのに腹は減るし用も足したくなるし、彼女が死のうが俺が引きこもろうが、世界は全然変わりなく進んでくんだよな」&lt;BR&gt;　同じことを思ったことがある、と、スコールは漠然とした気持ちでそんなことを思った。&lt;BR&gt;　恐らくマルストが部屋に閉じこもっていたあの頃に、眠り続けたリノアの横で、同じようにすべてに興味を持てずにただ呆然と、それでも世界は流れていくのだと眺めていた。&lt;BR&gt;　あの時に感じた喪失の恐怖を、この青年は味わったのだと改めて思い知る。&lt;BR&gt;「で、まぁ……そんなこんなでさ、俺、外に出て、引きこもってる間に何かあったかなってガーデンネットつないで見てみたんだよな。ちょうどあんたが前の彼女連れて出てっちゃった頃で、みんながセルフィの日記読んでて」&lt;BR&gt;　あの頃ガーデン生たちの数少ない情報源のひとつが、セルフィの書いていた日記だった。&lt;BR&gt;　放送もろくに聞いていなかったマルストは、当然スコールの状況報告も聞いていなかったため、情報を得ようとするならセルフィの日記ぐらいしかなかったのだ。&lt;BR&gt;「で、セルフィ日記のファンになってみたわけだ」&lt;BR&gt;「――――は？」&lt;BR&gt;　シリアスな話のまっただ中に唐突にそんなことを言われ、スコールはかなり素で声を上げていた。&lt;BR&gt;　マルストはあくまでも大真面目な顔をしている。&lt;BR&gt;「いや、だからマジでファンになったんだって。セルフィにちょっかい出すのも単なるファン心理。別に彼氏が焼餅妬くようなもんじゃねーから、安心しなって。&lt;BR&gt;　図書室貸してたのも、ほら先月システム総入替えあったろ？　新システムになったらIDでの入退室全部記録取られてて、俺委員長権限で夜中図書室入って寝てたら勧告くらってさ、仕方ねーからセルフィに頼んでログ削除してもらってんの。それに電情戦データまとめてもらった見返りに貸してやってるってわけ。つーわけで彼氏もさ、あとでセルフィに頼んで、ログ消してもらっといた方がいいぞ、あとで上から雷落ちるからな」&lt;BR&gt;「………………」&lt;BR&gt;　今までの会話とどう繋がるとそうなるのか、訳がわからず混乱しているスコールの前でマルストは腰を上げ、立ち上がりながら皮肉げに笑った。&lt;BR&gt;「なんかあいつって俺に似て危なっかしくてさ。俺は彼女絡みで、PTSDの疑いアリで治療受けてたから、あいつもそうなんじゃねーかって思ってたとこにフラッシュバック起こされて、やっぱりなーと思っただけ。&lt;BR&gt;　あ、そうそうあいつ、彼氏の元カノにコンプレックスあるみてーだぞ」&lt;BR&gt;　話がアクロバットか何かのようにあちこちに飛ぶので、スコールには何だかうまくついていけない。&lt;BR&gt;　言葉の意味を理解する前に、マルストはすたすた扉前に足を運んでいる。&lt;BR&gt;「まぁあの元カノ、美人だし色っぽいしスタイル良かったもんなぁ～俺の彼女ほどじゃねーけどさ。&lt;BR&gt;　てなわけで、次にあいつに会ったら適当に褒めるなりなんなりしてご機嫌とっとけ。もしあいつの背中に傷跡残ってたら、そりゃ俺のせいだから気づかないフリしろよ。とにかくあのコンプレックスどーにかしねーと、押し倒したとたんジエンドくらって、あんた違う意味で昇天しちまうからな。じゃ、健闘祈るわ」&lt;BR&gt;　言いたい放題とはまさにこのこととばかり、まくしたててとっととドアを開いて出ていく背中を、スコールはただただ唖然として見送ることしかできなかった。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　セルフィにとって、トラウマとなりうる出来事は、確かにあった。&lt;BR&gt;　一年半前の、トラビアガーデンミサイル爆撃。&lt;BR&gt;　傷つかなかったはずはない。それはわかる。だがあの日、無数の墓の群れを前にした小さな背中は、押しつぶされそうな痛みにも懸命に耐えてまっすぐに伸びていたし、バスケットコートの上でセルフィはいつもと変わらず笑っていた。&lt;BR&gt;　あの笑顔がセルフィ本人をも偽るものであったとしても、セルフィは確かに笑顔であり続ける力を持っていた。&lt;BR&gt;　それにPTSDの症状のひとつには、回避性症状、狭窄と呼ばれるものがある。トラウマに関連した物や場所を避けようとする行動のことを指すのだが、セルフィは半年近くにも渡ってトラビアガーデンに派遣され、任務を果たしていたではないか。&lt;BR&gt;（いや――）&lt;BR&gt;　そこまで考えて、スコールははたと違う可能性に気がついた。&lt;BR&gt;（まさか……あれで、悪化したのか……？）&lt;BR&gt;　そう、そもそも、あれだけトラビアガーデンに愛着を持っていたセルフィは、なぜトラビアに帰ろうとしなかったのだろう。&lt;BR&gt;　トラビアガーデンで出会った、SeeD受験資格を持ちながらトラビアのために転校を諦めるといった生徒、あれこそがセルフィの取る行動としてはもっとも自然だったのではないだろうか。&lt;BR&gt;　だがセルフィは、スコールが知る限りただの一度も、トラビアガーデンに帰ろうとはしなかった。森のフクロウの任務を終えてからも、世界中を任務で飛び回り、暇があれば通う場所はトラビアではなくエスタだった。そしてラグナの厚意でセルフィはトラビアガーデンに派遣されることになった。&lt;BR&gt;　もしセルフィが無意識にトラビアを避けていたとしたら。&lt;BR&gt;&lt;BR&gt;　――――じゃああなたは、どうしてエスタパニック前に学園祭実行委員になる子がひとりもいなかったと思ってる？&lt;BR&gt;&lt;BR&gt;　そう言ったのはキスティスだった。&lt;BR&gt;　トラウマの狭窄症状のひとつにある、対人関係の回避行動。オープンな言動に惑わされて誰も気づかなかったが、もし、彼女が意識的にしろ無意識にしろ、深い人間関係を避けていたとしたら。唯一彼女の精神的に一番近い位置にいたラグナが、よりにもよって避けたい場所の筆頭であるトラビアに向かわせたのだとしたら。&lt;BR&gt;（セルフィ……）&lt;BR&gt;　あの笑顔が彼女の強さの証明にはなりえないと、知っていたはずなのに。&lt;BR&gt;　どんな思いがするのだろう。故郷が壊滅し、幼い頃から知る人達が一斉に喪われてしまうというのは。&lt;BR&gt;　幼い頃、突然エルオーネがいなくなってしまった時の恐怖や、動かなくなったリノアを前にした喪失感を思い出す。&lt;BR&gt;　結局、自分は何も失わず、過去に失ったエルオーネすら取り戻すことができたが、セルフィはそうはいかないのだ。&lt;BR&gt;　だから推し量ることしかできない。自分がこれまで育ってきた基盤を失うということが、大切だったものたちが眼の前で失われていくということが、どれほどの絶望をもたらすものなのか。&lt;BR&gt;　もしも自分なら、きっと耐えられないと思う。&lt;BR&gt;　ずっとそうしていたように、また失うことを恐れて他人との繋がりのすべてを拒絶して生きる方を選ぶはずだ。&lt;BR&gt;（勇気――）&lt;BR&gt;　キスティスが語った言葉の意味が、今こそはっきりと納得できた。&lt;BR&gt;　セルフィはそれでも、またこの場所で、新しい基盤を作り上げることを選んだのだ。&lt;BR&gt;　トラビアガーデンでそうだったように、多くの友人と繋がりを得て、新たな関係を築いていくことを選んだのだ、失うかもしれない恐怖も、失ってしまった過去の痛みも全部抱えて。&lt;BR&gt;「―――……」&lt;BR&gt;　スコールは胸ポケットからふと携帯を取り出し、セルフィの番号をメモリで呼び出し通話ボタンを押した。&lt;BR&gt;　ガーデン内ならともかく、外出時なら携帯を持っているだろうと踏んだのだが、無機質な呼び出し音が途切れる気配はまったくなかった。&lt;BR&gt;　元々スコールは電話が苦手だし、それを知っているセルフィはかかってくることなど予測もしないで、トランクの奥底にでも携帯をしまいこんでいるのかもしれない。&lt;BR&gt;　それでもしばらく呼び出し音を鳴らして、スコールは吐息と共に携帯を切り、それを握りしめた。&lt;BR&gt;　話したいことが、たくさんあった。&lt;BR&gt;　セルフィのことや、喪われてしまった後輩の命のこと。今までのことと、そしてこれからの。&lt;BR&gt;　そして、一言、大丈夫なのか聞きたかった。&lt;BR&gt;　今彼女が向かうその場所に、彼女が足を踏み入れることが、苦しくはないのかと訊ねたかった。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　強風と大雨の中、一駅分を歩いてさらにガーデンまでも徒歩だったため、セルフィがバラムガーデンに戻ったのは夜もすっかり更けて、日付変更線もとっくに越えていた。&lt;BR&gt;　傘もささずに歩いてきたので、全身びしょ濡れだった。凍えた吐息が空気に白く飛んでいく。トランクとバッグが防水加工をしてあるもので良かったと少し思った。あまりの寒さに、歯の根が合わずにカチカチと鳴った。&lt;BR&gt;　カードリーダーのおじさんが呆れ顔で迎え入れてくれ、セルフィは手の甲で顔を拭いながらまずまっすぐ安置室に向かった。照明が落ち真っ暗な廊下を進むセルフィの足音が、妙に響いて聞こえる。&lt;BR&gt;　安置室に入るのに、少しだけ勇気を必要とした。人が死ぬことは初めてではないが、いつだって心はとても痛い。&lt;BR&gt;　中に入ると、セルフィとも顔見知りの後輩の少女が部屋の隅の椅子に腰をかけていた。&lt;BR&gt;　ドアを開けて入ってきたセルフィにびくりと顔を上げ、驚いたように言葉を失う彼女にセルフィはかすかに微笑んでみせる。彼女の前にあるベッドの上に白い布がかけられ、人の形に盛り上がっていた。&lt;BR&gt;　入口脇に荷物を置いて、セルフィは部屋の中央に歩み寄る。&lt;BR&gt;　レウィンと仲の良かったこの少女が、ひそかにレウィンに想いを寄せていたことを知っていたセルフィは、背後に座ったままの少女を振り返り、静かに訊ねた。&lt;BR&gt;「……顔、見てもいい？」&lt;BR&gt;　少女は少しためらうように視線を伏せ、それから力無く頷いてかすれた声で言った。&lt;BR&gt;「見ない方が……いいかもしれませんけど……」&lt;BR&gt;「……」&lt;BR&gt;　セルフィはちょっと言葉をのみ、それから少し考えて白い布のふくらみに近づいた。&lt;BR&gt;　布にかけた指がかすかに震える。&lt;BR&gt;　めいっぱいの勇気を振り絞ってそっと布をどけた途端、セルフィは見ない方がいいと言った少女の言葉を思い出して物凄く後悔した。&lt;BR&gt;　背後にいる少女に動揺を悟られたくなくて、セルフィは奥歯をぎゅっと噛みしめながら、あまりにも可哀想な姿になってしまった後輩の顔にゆっくり布をかける。一体何があればこんな惨い姿になってしまうのか、見たこともないほどのひどい有様だった。&lt;BR&gt;「……スコール先輩を、助けたんだそうです」&lt;BR&gt;　ぽつんと背後で声が響き、セルフィはびくりと肩を震わせて振り返った。&lt;BR&gt;　濡れた黒曜石のような瞳をまっすぐ向けて、少女が静かに言葉を続ける。&lt;BR&gt;「何か、新型の毒物を使われて……魔法抑制シールドのせいでエスナをみんな大量消費して……シールド解除がなされた時、スコール先輩とレウィンが毒に侵されていて、残ったエスナはひとつだけで……」&lt;BR&gt;　立ちすくんだまま、セルフィはその言葉を聞いていた。&lt;BR&gt;　震える指が無意識に胸元を彷徨い、濡れて凍える銀鎖のペンダントをぎゅっと握りしめる。&lt;BR&gt;　これ以上ないほど凍えていたはずなのに、寒さが急に増したような気がした。&lt;BR&gt;「スコール先輩はレウィンにエスナを使おうとしたんです。でも、それより早く、レウィンはエスナをドローしてスコール先輩に使ったんだって、聞きました……」&lt;BR&gt;「…………そっか……」&lt;BR&gt;　長い沈黙の末、水がふるえるような声でセルフィは呟いた。&lt;BR&gt;　ほろほろと涙をこぼしはじめた少女の前に腰を落とし、その涙を拭おうと手を上げかけて、自分の手が濡れて凍えていることに気がつき慌てて引っ込める。&lt;BR&gt;　少し考えて、セルフィは立ち上がると入口付近に置きっぱなしのトランクを開け、中からトラビアガーデンで愛用していた上着を出すと、なるべく自分の身体から離して少女の前に行き、ぽんと膝上にそれを置いた。&lt;BR&gt;　驚き見上げる黒い瞳に、にこりと静かに笑いかける。&lt;BR&gt;「風邪ひいちゃうからね」&lt;BR&gt;　自分こそが今にも風邪をひきそうな格好でそんなことを言われ、少女は完全に言葉を失い膝上の上着を握りしめる。彼女が何か言う前に、セルフィはトランクの前に戻って手早くそれを閉めると、立ち上がり少女を振り返った。&lt;BR&gt;「また、朝に来るね」&lt;BR&gt;　優しい笑顔でそう告げて、少女の返事を待たずにドアを開けて外に出る。&lt;BR&gt;　背中でドアが閉まった瞬間、急に泣き出したい気分に襲われてセルフィはぎゅっと眼を閉じた。&lt;BR&gt;（スコールを助けて……？）&lt;BR&gt;　後輩の死に対する胸の痛みと同じくらい、そんなふうに後輩に死なれた彼の胸中を思うと心が苦しくなった。&lt;BR&gt;　どんな思いがするものなのか、考えても想像が及ばない。&lt;BR&gt;　とにかくスコールに早く会いたかった。会って自分に何ができるかわからなかったけれど、それでも。&lt;BR&gt;　真っ暗な廊下でしばらく立ちつくし、セルフィは自分に気合いを入れると、荷物を抱えて歩き出した。&lt;BR&gt;&lt;BR&gt;　スコールの部屋のIDデコーダーは、中が空室であると示していた。&lt;BR&gt;　実は多少の知識があれば、デコーダーをいじって居留守を使うことも可能なのだが、まさかスコールがそんな姑息な技を使うとも思えず、セルフィは重い荷物をとりあえずそこに置いて、ガーデンをあちこち探して回ることにした。&lt;BR&gt;　一番いる可能性の高いと思われた執務室にも、委員会室や教室などにも、スコールの姿は見つからない。&lt;BR&gt;　まさかと思いながら校庭に出て、またも雨に打たれながらあちこちの場所を探して回ったが、もちろんそんな場所にスコールはいなかった。&lt;BR&gt;「う～～ん……」&lt;BR&gt;　ざんざか雨に打たれるのもかまわず、セルフィは水飲み場のフェンスに寄りかかってしばらく考え込んだ。&lt;BR&gt;　今さらながら、電話をかけてみればいいんじゃないかと思い当たったが、携帯は雨に濡れてはいけないとトランクに押し込めてしまってある。荷物をスコールの部屋の前に置き去りになんてするんじゃなかった……とセルフィは後悔する。二度手間かもしれないが、取りに行った方が早いだろうか。&lt;BR&gt;　――――よ～しじゃあ～、宣戦布告！&lt;BR&gt;　ふと、かつて自分が言った言葉を思い出した。&lt;BR&gt;　星の綺麗だった夜、ちょっとした抜け道を通って出た秘密の場所を探し当てられて。&lt;BR&gt;（お昼寝……は、してへんやろけど……）&lt;BR&gt;　くすっとセルフィは小さく笑う。&lt;BR&gt;　フェンスから身を起こし、セルフィはもう一度自力で捜してみようと考える。&lt;BR&gt;　それでもどうしても見つからなければ、携帯にかけてみればいいのだし。&lt;BR&gt;（そやなぁ……どこから捜せばええんかな？）&lt;BR&gt;　小首を傾げながら、これまで捜した場所をひとつひとつ思い浮かべ、選択肢を消していく。&lt;BR&gt;　とりあえず初心に返ろう、とセルフィは思った。&lt;BR&gt;（もしあたしやったら、どこにいてるかな？）&lt;BR&gt;　うん、なかなかいい着眼点だ。自画自賛しながら、セルフィは記憶を辿る。誰かが死んでしまった夜、自分だったらどこで何をしようと思うだろう――？&lt;BR&gt;&lt;BR&gt;　頭の中を突然、ひとつの光景が思考を灼きつくすようにして走り抜けていった。&lt;BR&gt;&lt;BR&gt;「あ……！」&lt;BR&gt;　反射的にセルフィは口を押さえ、肩からフェンスに勢いよく寄りかかった。がしゃんと激しい音がするのもかまわずにぎゅっと眼を閉じる。&lt;BR&gt;　思い出してしまいそうな、思い出してはいけない光景を無理矢理ねじふせた。心臓がものすごい速さで跳ねているのを感じた。&lt;BR&gt;　血の気が引くのを覚えて、その場にしゃがみこむ。薄手のコートが地面に落ちて汚れるのも構ってはいられない。&lt;BR&gt;　エスタのホテルで起きたのと同じだった。あの時は無防備にその光景を思い出してしまって、マルストを驚かせる結果になってしまったが、今回は大丈夫だった。何度も繰り返すうちに、完全に思い出す直前でその光景をねじふせることが上手くなっていた。&lt;BR&gt;　呼吸を整えながら、セルフィは思い出してはいけない光景から眼をそらし、それ以外のあの日の記憶を慎重に慎重にたぐり寄せる。無意識に握りしめたペンダントトップが、手のひらに食い込んでかすかな痛みを伝えた。&lt;BR&gt;　ぼんやりと、顔を上げる。校庭のライトに照らされて雨が静かに降っている。&lt;BR&gt;　あの日は雪が降っていた。妖精の贈り物だと言った自分の言葉を覚えている。&lt;BR&gt;　みんながバラムガーデンに帰って、セルフィひとりがその夜だけトラビアガーデンに残った。&lt;BR&gt;　あちこちから風が吹き込んで寒かった。&lt;BR&gt;　一晩中、雪は降っていた。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　―――そうだった。&lt;BR&gt;　あの日は一晩中、ずっとこうして、雪を見ていた。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　セルフィは立ち上がり、ぐるりと辺りを見回した。&lt;BR&gt;　校庭にいくつか取り付けられた、ライトの位置を確認する。&lt;BR&gt;　ライトの位置を確認して、校舎を振り返った。校舎の見取り図を思い浮かべて頭の中で照らし合わせていく。&lt;BR&gt;　しばらく雨の中そうして考えて、ひとつの結論に達したセルフィは、地面を蹴って走り出し校舎の中に向かった。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　短くなった煙草を携帯灰皿に落とし、無造作にそれを胸ポケットにねじりこんで、スコールは短く息をついた。&lt;BR&gt;　身体はずいぶん冷えている。革手袋を部屋に置いてきたことを少し後悔した。&lt;BR&gt;　雨こそ当たっているわけではないが、吹きさらしの非常階段で、強い風に晒されているのである。いくらレザージャケットを着込んでいても、その寒さは尋常ではなかった。&lt;BR&gt;　だが何となく温かな部屋に戻る気分にもなれず、混濁している思考を持て余してその場に立ちつくすスコールの耳に、遠くでドアが開く音がした。&lt;BR&gt;　廊下から非常階段に続く鉄扉が開く音だ。&lt;BR&gt;　こんな夜中に、よりによってこんな寒い場所に出てくる人間がいるとは思えなかったスコールは、少しだけ驚く。&lt;BR&gt;　階段を軽やかに上がってくる足音がする。スコールは三階の廊下から非常階段に出て、二階と三階の間をつなぐ踊り場に立っていた。足音の主は、二階から上がってきているらしい。&lt;BR&gt;　今は誰とも会いたくない。このまま上の階にあがって校舎内に戻ろうかと考えていた、その時だった。&lt;BR&gt;「み～つっけたっ！」&lt;BR&gt;　下の方から響いた、強く振った鈴の音のような声が耳に飛び込んでくる。&lt;BR&gt;　スコールはその瞬間、完全に息を止めてしまっていた。&lt;BR&gt;　信じられなかった。&lt;BR&gt;　呆然と振り返った視線の先、トントンと軽やかに足音を響かせ階段をのぼってくる、華奢な少女がこちらを見上げてにっこりと笑った。&lt;BR&gt;「宣戦布告通り、ちゃ～んと見つけたもんね～！」&lt;BR&gt;　まるで服のままプールでひと泳ぎしてきたのかと思えるような、その姿。&lt;BR&gt;　びっしょりと濡れた明るい栗色の髪はカールも取れて重く揺れ、その色を一段深く見せている。校庭からのライトを受けて輝いている濡れた頬は、冷え切っているらしく蝋人形のように白い。薄手の白いコートは重そうに雫をこぼし、その下のニットやスカートもずっぷりと濡れていることが一目でわかった。&lt;BR&gt;「えへへ、なんか、ちょ～っと久しぶり？」&lt;BR&gt;　踊り場までのぼりきって、セルフィはにこにこと小首を傾げた。水浸しの酷い格好で、喧嘩をしていたことなど微塵も感じさせることもなく、いつもと変わらない陽溜りの笑顔を浮かべて、当たり前のようにそこにいた。&lt;BR&gt;　いつも服の下に隠してある銀鎖のペンダントが、その動きに合わせてしゃらりと揺れる。&lt;BR&gt;　スコールはいくつもの雫を輝かせているペンダントを見、それから視線を上げてセルフィの翠の瞳を見、信じられないと言ったようにかすかに首を横に振った。&lt;BR&gt;「…………なんで…………」&lt;BR&gt;「う？　あ～あのね、もお聞いて～！　この時間の電車ってね、車庫の関係かなんか知らないけど、バラム東までしか行かないんだって言うんだよ～！　おかげでバラム東からここまで歩きだったの、ひどいでしょ～？」&lt;BR&gt;　ややポイントを外した返答だったが、それもまた信じがたい言葉だった。&lt;BR&gt;　みぞれ混じりの冷たい雨である。&lt;BR&gt;　一歩近づいてその手に触れれば、芯まで冷えきりぞっとするほど凍えている。常であれば子供体温のセルフィの方が手の温度は高いし、ましてスコールは長くこの場に立っているにも関わらず、だ。凍えきった身体は寒さのあまり小刻みに震えているし、唇の色も青くなっている。&lt;BR&gt;　スコールに片手を預けて、セルフィは少し恥ずかしそうにえへへと笑った。&lt;BR&gt;「でもね、キスティから電話もらってね、な～んかあたし、スコールと思いっきりすれ違いだった～って聞いて、もうちょっと長く待ってればよかった～って思ったら、もおすご～く悔しくって！&lt;BR&gt;　だってず～っと会えなくて、すご～くすご～くスコールに会いたかったんだもん～」&lt;BR&gt;　言った途端、セルフィは一瞬何が起きたかわからずに、ふにゃ？と間の抜けた声を上げた。&lt;BR&gt;　スコールが握った手を強引に引き寄せて、両腕に力一杯自分を抱きしめているのだと気がついたのは、それから数秒後のことだった。&lt;BR&gt;「わ、わ、だめだよ～！」&lt;BR&gt;　見かけに寄らずやたら広い胸に頬を押しつけてしまい、セルフィは跳ね上がる鼓動を感じ慌てて声を上げた。&lt;BR&gt;「ね、スコール、あの、ほら、濡れちゃうから……！　冷たくなっちゃうよ～！」&lt;BR&gt;　何しろ全身、どこもかしこもずぶ濡れなのだ。&lt;BR&gt;　じたばたと暴れる華奢な肢体を押さえつけ、濡れた髪に頬を埋めながら、スコールはひどく胸が痛んだ。&lt;BR&gt;　抱きしめたその身体が、まるで氷のように冷たかったから。&lt;BR&gt;　一体どれほど長く雨に打たれていたのか、冷え切った肌は少しも温まる気配がない。&lt;BR&gt;　なんでこんなことまで出来るんだろう。&lt;BR&gt;　キスティスが連絡を入れたということは、きっとセルフィはレウィンの死を知っているはずだった。好きになった誰かを喪うことを誰より恐れ、誰より重く受け止めて傷つくのはこの少女のはずなのに、どうして真っ先に自分なんかを気遣おうとできるのか、スコールにはわからなかった。&lt;BR&gt;「スコールってば、もお……苦しいよ～……」&lt;BR&gt;　暴れるのをやめたセルフィに溜息をつかれ、スコールは慌てて両腕をゆるめた。&lt;BR&gt;　素早く離れようとする少女の両肩を捕えたまま、そっとその表情を伺う。&lt;BR&gt;「……大丈夫か？」&lt;BR&gt;　強くしすぎて痛い思いをさせてしまったかと、心配しているその声音に、小さく息をついていたセルフィがきょとんと顔を上げ、それからくすっといたずらっぽく笑った。&lt;BR&gt;「ううん、だいじょぶだよ～」&lt;BR&gt;　スコールの方こそ濡れちゃったねと、セルフィが呆れたような笑顔で続ける。だがスコールの両手に包まれた細い肩の冷たさにくらべたら、こんなものは何でもなかった。&lt;BR&gt;「スコール……？」&lt;BR&gt;　両肩を捕えたまま、スコールがふっと上体をかがめて首筋に額を埋める。驚くセルフィの頬になめらかな髪が触れた。かぁっと頬に血が昇るのを覚え、身じろぎするセルフィをスコールの手ががっちりと押さえ込む。&lt;BR&gt;「……少し、動くな」&lt;BR&gt;　耳のすぐ下で聞こえた響きの良い声に、セルフィは完全に全身が硬直して動かせなくなった。&lt;BR&gt;　どきどきばくばくと忙しい心臓の音を数えながら、何か言わなくてはと思考が空転する。&lt;BR&gt;　――――どこか艶やかなこの低い声は、とにかく心臓に悪すぎるのだ。&lt;BR&gt;「あ、あの～あの～……えっと～」&lt;BR&gt;　酸素を求める魚よろしく口をぱくぱくさせているセルフィに、身を起こしたスコールが視線を向けて小さく笑った。&lt;BR&gt;　いつもの少し呆れたような苦笑まじりの笑顔は、けれどいつもより少し自嘲的な色合いを帯びていて、セルフィがそれに眼を奪われたその瞬間、スコールが精悍な頬を傾けてきたので、セルフィは慌てて背伸びをした。&lt;BR&gt;（？　なんか……苦い？）&lt;BR&gt;　直前までスコールが煙草を吸っていたことを知らないセルフィの頭の片隅に、そんな感想がちらりと浮かんだが、それも早鐘のように跳ね上がっている心臓の音にかき消されてどこかに行ってしまう。&lt;BR&gt;　唇が重なっていたのが果たしてどれほどの時間だったのか、セルフィには今ひとつわからなかったが、ようやく唇と肩が解放された瞬間、セルフィはずるずるとその場に座り込んでしまっていた。&lt;BR&gt;「……おい？」&lt;BR&gt;　びっくり顔でスコールが声をかけてくるが、セルフィは顔も上げられない。&lt;BR&gt;　セルフィが座り込んだままなので、スコールも長い脚を折ってすとんとその場に座り込んだ。&lt;BR&gt;　いきなり眼の前に座られて、セルフィは少し驚いて眼を上げる。二人で非常階段に座り込んでいる図というのも変な物だと思いながら、スコールは指を伸ばし、先ほどより少し赤みの差したセルフィの頬に触れた。&lt;BR&gt;「なんで俺が、ここにいると思った？」&lt;BR&gt;　こんな寒い日に、わざわざ非常階段に出る物好きなどいない。&lt;BR&gt;　訊ねたスコールに、セルフィは眼を伏せてかすかに笑った。&lt;BR&gt;　いつになく儚げで繊細な印象を持つその微笑が、ひどく切なく胸に突き刺さる。&lt;BR&gt;「……あのね、少し、思い出してみたんだ～、トラビアのこと」&lt;BR&gt;　セルフィの右手がゆっくり動き、頬に触れたままのスコールの手をそっと取り、両手で包んだ。&lt;BR&gt;　ぽたぽたと髪からこぼれ落ちる雫が、自分の手を包んだ冷たく白い手を滑り落ちていくのを、スコールは不思議なものを見るような面もちで眺めていた。&lt;BR&gt;「壊れたトラビアに、はじめて帰って……そのとき、自分が、ど～したのかな～って、思い出して……」&lt;BR&gt;　濡れた両手が震えているのが、寒さだけなのかはわからなかった。&lt;BR&gt;　無理に話さなくてもいいと言おうとして、顔を上げたスコールの視線の先で、セルフィはどこか懐かしそうにその瞳を校庭の方へと向けていた。&lt;BR&gt;「綺麗なものが……見たいと思ったんだ～」&lt;BR&gt;　視線に誘われるように、スコールもゆっくり眼を向ける。&lt;BR&gt;　非常階段にほど近く設置された、大きなライトがまばゆい光を放っている。&lt;BR&gt;　降り続ける雨が、光に照らされてきらきらと輝いて。&lt;BR&gt;「……ここから見ると……光が降ってるみたいだね……」&lt;BR&gt;　淡く淡く、光の雨より儚く笑う少女の肩を、スコールはもう一度引き寄せて、抱き潰さないよう注意しながらぎゅっと抱きしめた。&lt;BR&gt;「すまない……」&lt;BR&gt;　破壊されたトラビアガーデンに帰ったあの日、セルフィはどんな綺麗なものをあそこで見つけたのだろう。&lt;BR&gt;「……死なせて、ごめん……」&lt;BR&gt;「スコール……」&lt;BR&gt;　またひとり。&lt;BR&gt;　セルフィは友人を喪った。&lt;BR&gt;「ちがう……」&lt;BR&gt;　ふるふるとセルフィが首を横に振る。冷たい冷たい雫が飛び散って、まるで凍えた涙のようだった。&lt;BR&gt;「スコールが悪いんじゃない……そ～やって背負い込むの、悪い癖だよ？」&lt;BR&gt;　少しだけ震えた声で、それでも精一杯自分を気遣おうとする言葉が胸に痛かった。&lt;BR&gt;　スコールはかすかに苦笑してしまう。見た目は彼女の方が幼く見えるのに、自分よりずっとずっと大人びてみえた。&lt;BR&gt;「……なかなか……慣れないものだな」&lt;BR&gt;　共に戦った者が死ぬのを見るのは、初めてのことではない。&lt;BR&gt;　でも、何度経験しても決して慣れることがない。幾度戦場に立ち、何人この手で殺しても、少しでも名を知り言葉をかわした者の死は、痛みを伴って心にのしかかる。　&lt;BR&gt;　腕の中の彼女はきっと、この何倍もの痛みにずっと耐えているのだ。――自分はたったひとりの後輩の命ですら、今これほどに心に響いているというのに。&lt;BR&gt;「どうして？　慣れる必要なんてないよ～」&lt;BR&gt;　ふとセルフィが身を起こし、至近距離でスコールを見つめて小首を傾げた。&lt;BR&gt;「あたしたちは、SeeDだから人の死をよく見るけど……でも、そういうの、慣れちゃったらダメだって、思うんだ～。&lt;BR&gt;　だってあたしたちは、SeeDだけど人間なんだもん。そういうのに慣れちゃうのは、なんだか人間としてダメになっちゃうような、そんな気がするよ～」&lt;BR&gt;　ふわりと持ち上がった手が、スコールの頬に触れ、セルフィの髪から移った雫を指先でそっと拭った。&lt;BR&gt;「だからあたしね、もうジエンドで人は殺さないって決めてるの。ちゃ～んと、奪っているのが人の命だってこと、わかっていたいから。ホントは魔法も銃も実感湧かないからあれなんだけどね～」&lt;BR&gt;　作戦上仕方ないこともあるから、一概には言えないけどとセルフィはちょっと肩をすくめ、先ほど見せた淡い笑みではない、やわらかな強さを持った笑顔でゆっくりと言葉を続ける。&lt;BR&gt;「……だからね、慣れなくていいと思うんだ～。誰かの死に心が揺れるのは、辛いけど、悪いことじゃないよ。&lt;BR&gt;　あたしは、今みたいに、ちゃんと心を揺らしてるスコールが好きだよ」&lt;BR&gt;　スコールの瞳が一瞬かすかに見はられ、それからごくかすかな苦笑を浮かべるのを、セルフィは見つめていた。&lt;BR&gt;「……そうか」&lt;BR&gt;　セルフィが一番好きな、ほんの少し呆れたような、それでいて優しい、本当にかすかな笑顔。&lt;BR&gt;「うん」&lt;BR&gt;　身体はどこもかしこも冷えきって、歯の根は合わないほど寒いのに、心だけが不思議に温かかった。&lt;BR&gt;　スコールがセルフィの手を握り返して、冷たい指先に唇で触れた。&lt;BR&gt;「……とにかく、中に入ろう。風邪を引く」&lt;BR&gt;　少し乾いていたけれど柔らかな唇の感触に、どきりと震えたセルフィの手を持ったままスコールが立ち上がる。&lt;BR&gt;　合わせて腰を上げたセルフィに、スコールは自分のジャケットをかけてやれば良かったとそこでようやく思いついた。&lt;BR&gt;　果たして今からその濡れたコートを脱いでこれを着ろと言っても良いものかと考えながら、とりあえず手を引いて歩き出す。ここにサイファーでもいれば「肩くらい抱いてやれよバカ」くらいは言いそうなものだが、あいにくスコールにそんな気の利いた発想は存在しないのだった。&lt;BR&gt;&lt;BR&gt;　非常階段から廊下に入ると、風が吹き込まない分少し空気を暖かく感じた。&lt;BR&gt;　散々ためらいながらセルフィの薄手のコートを脱がせ、慌てて遠慮しようとする細い肩に無理矢理自分のジャケットをかぶせてやる。押しつけがましい行為かも知れないと内心かなり心配していたが、実際着させられてしまえばセルフィは真っ赤になったまま大人しく袖に腕を通した。コートが薄手なせいで中のニットも濡れており、ジャケットが替わったところでさして暖かさは変わらなかったろうが、セルフィはそれでも暖かいと言って嬉しそうに笑った。&lt;BR&gt;「すぐ部屋に戻って、ちゃんと風呂に入れ。風邪を引いたらトラビアどころじゃないだろ」&lt;BR&gt;　震えの止まらない華奢な背中に手を当てて歩き出しながらそう言うと、その背がびくりと跳ね、足がぴたりと止まった。&lt;BR&gt;「あ、……あ～うん、そうだよね～！」&lt;BR&gt;　自分を見下ろすスコールの視線に、慌てたように笑顔でそう返してまた歩き出す。&lt;BR&gt;　スコールは一歩遅れてそれについて行きながら、苦笑が唇にのぼるのを自覚した。&lt;BR&gt;（俺はあんたに、何をしてやれるだろう？）&lt;BR&gt;　同じように血に染めた、華奢な手ひとつで自分を癒してくれる存在に。&lt;BR&gt;　すべての痛みを抱え込んでなお、邪気なく笑いかけてくれるこの少女に、今、何をしてやれるだろう。&lt;BR&gt;「……あんたの部屋が嫌なら、俺の部屋にでも来るか？」&lt;BR&gt;　歩きながら、セルフィが少し驚いた顔で振り返った。&lt;BR&gt;　今まで何度となくスコールの部屋に行って、何となく良いムードになるとセルフィの方から腰が引けて逃げてしまうような、そんな経験を繰り返した記憶がふとよみがえる。&lt;BR&gt;　ノーリアクションになってしまったセルフィに、同じことを思い出しているだろうことを察して、スコールはくすっと笑った。&lt;BR&gt;「安心しろ、あんたが嫌なら何もしない。使いたければ、俺の部屋は好きに使ってくれてかまわないというだけの話だ」&lt;BR&gt;　無理強いをして、傷つけたり壊したりしたいわけではない。&lt;BR&gt;　身の内を焦がす独占欲は、今もある。出来ることなら今すぐ連れ去って、閉じこめてしまいたいほどの。&lt;BR&gt;　だが、そんな身勝手な物思いを打ち消すほど強い望みが、たったひとつある。&lt;BR&gt;「――――」&lt;BR&gt;　完全に足を止めたセルフィが、困ったような顔でうつむいた。&lt;BR&gt;　濡れた髪の間からのぞく耳までが、優しい桜色に染まっていくのを見つめながら、スコールは黙って彼女の出す結論を待つ。&lt;BR&gt;　セルフィがうつむいていたのは、さほど長い時間ではなかった。&lt;BR&gt;「……あたし、スコールの部屋に行きたい」&lt;BR&gt;　少しためらいがちな、けれどまっすぐで凛とした翠の瞳がスコールを捉える。&lt;BR&gt;「でもね……その前に、いっぱい、い～っぱい……話さなくちゃいけない、ことがある」&lt;BR&gt;　他人と眼を合わせることに慣れていないスコールだったが、向けてくる翠の瞳から視線をそらすことができなかった。&lt;BR&gt;　自分の弱さを他人に見せることが、どれほどの勇気を必要とするか、スコールも良く知っていたから。&lt;BR&gt;「あんまり、聞いても、楽しくないと思うけど……それでも……」&lt;BR&gt;　聞いてくれる？　最後の言葉は囁きに近かった。&lt;BR&gt;　スコールは、また少し苦笑した。&lt;BR&gt;　自分の他の誰に、それを聞く権利があるというのだ。&lt;BR&gt;　他人の命を踏み台にして生き残ってきた意味があるとするなら、たぶん、それは、今眼の前に立っている小さな少女の誰にも言えなかった弱音の全部を、受け止めてやることだった。&lt;BR&gt;「――話せよ」&lt;BR&gt;　だからまっすぐまっすぐ視線を返して、言った。&lt;BR&gt;「一晩中かかっても全部、聞いてやるから」&lt;BR&gt;　そらさない視線の先で、セルフィがちょっと小首を傾げた。&lt;BR&gt;　今にも泣き出しそうな顔で、それでもふわりと笑った彼女が、胸が苦しくなるくらい好きだと思った。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;&lt;/TD&gt;&lt;/TR&gt;&lt;/TBODY&gt;&lt;/TABLE&gt;&lt;BR&gt;

<script data-viewer-zoom-script>
(() => {
  const stage = document.querySelector('.viewer-stage-image');
  const image = stage ? stage.querySelector('.viewer-image') : null;
  if (!stage || !image) {
    return;
  }

  const setZoom = (enabled) => {
    stage.classList.toggle('is-zoomed', enabled);
    image.setAttribute('aria-pressed', enabled ? 'true' : 'false');
    if (enabled) {
      const naturalWidth = image.naturalWidth || image.clientWidth || 0;
      const targetWidth = naturalWidth > 0
        ? Math.max(naturalWidth, Math.min(Math.round(stage.clientWidth * 0.92), naturalWidth * 4))
        : Math.round(stage.clientWidth * 0.92);
      image.style.width = `${targetWidth}px`;
      image.style.maxWidth = 'none';
      image.style.maxHeight = 'none';
      requestAnimationFrame(() => {
        stage.scrollTop = 0;
        stage.scrollLeft = Math.max(0, Math.round((image.scrollWidth - stage.clientWidth) / 2));
      });
    } else {
      image.style.removeProperty('width');
      image.style.removeProperty('max-width');
      image.style.removeProperty('max-height');
      stage.scrollTop = 0;
      stage.scrollLeft = 0;
    }
  };

  const toggleZoom = () => {
    setZoom(!stage.classList.contains('is-zoomed'));
  };

  image.setAttribute('tabindex', '0');
  image.setAttribute('role', 'button');
  image.setAttribute('aria-label', '逕ｻ蜒上ｒ諡｡螟ｧ縺ｾ縺溘・邵ｮ蟆・);
  image.setAttribute('aria-pressed', 'false');

  image.addEventListener('click', toggleZoom);
  image.addEventListener('keydown', (event) => {
    if (event.key === 'Enter' || event.key === ' ') {
      event.preventDefault();
      toggleZoom();
    }
  });

  stage.addEventListener('click', (event) => {
    if (event.target === stage && stage.classList.contains('is-zoomed')) {
      setZoom(false);
    }
  });

  window.addEventListener('keydown', (event) => {
    if (event.key === 'Escape' && stage.classList.contains('is-zoomed')) {
      setZoom(false);
    }
  });
})();
</script>
