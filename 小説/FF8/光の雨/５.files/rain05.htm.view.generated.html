    &lt;TD align=left&gt;&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;
      &lt;P align=right&gt;*光 の 
      雨..05*&lt;/P&gt;&lt;BR&gt;&lt;BR&gt;　セルフィはドアをＩＤではなく、設定されたパスコードで開いた。&lt;BR&gt;　スコールは何も言わずに凍えた白い指の行方を、押される番号を見ていた。&lt;BR&gt;　シュッと小さな音と共にドアが開いて、それでもその中に入るのには一瞬のためらいがあった。&lt;BR&gt;「……ごめんね、散らかってるんだ～」&lt;BR&gt;　肩越しに振り返って、かすかに笑いかけることができた自分を、セルフィは少しだけ褒めてあげたかった。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　セルフィに続いて中に入ったスコールは、眼前に広がる部屋の様子に、一瞬呆気にとられてその場に立ちつくした。&lt;BR&gt;　内装は男子寮とさほど変わらない。ベッドと机と小さな本棚、奥にバスルームへと続く扉がある。&lt;BR&gt;　だが、その大して広くもない床を、足の踏み場もないほどに、ありとあらゆる配線コードがうねうねと這いつくばって占領している。明らかにガーデンから支給される類のものではない、やたらでかいサーバ端末が床にどすんと置かれ、LEDの緑の光が稼働中であることを示していた。床の片隅に蛍光イエローのダンベルが転がっていた。&lt;BR&gt;「…………」&lt;BR&gt;　もう一歩足を踏み出し、部屋に入ると、背中で静かにドアが閉じた。&lt;BR&gt;　ごくかすかに、柑橘系の香りが残っていた。ここが生活の基盤であれば、ありえないほどのかすかな残り香で。&lt;BR&gt;　配線のいくつかに繋がったデスクトップPCが、机の上に鎮座していた。ケースに謎のキャラクターシールがべたべた貼られているのは、愛用のノートPCとさして変わりはない。&lt;BR&gt;　パソコンの上から横から、ラベルの貼ったデータディスクが何枚も置かれている。ディスクに埋もるようにして、プリントが束になって無造作に置かれ、そのプリントもよく見れば、セルフィの手書きとおぼしきメモで真っ黒になっている。&lt;BR&gt;　机脇の棚の上には、写真立てが３つ、四角く平べったい箱の上に無造作に並んでいた。写真が入っているのかは伏せられているのでわからない。写真立ての下の箱には銀の錠がかかりそれ以上の詮索を固く拒んでいる。&lt;BR&gt;　ディスクとプリントとメモの饗宴は、机の上に留まらずベッドの上まで続いていた。枕元に積まれたフラッシュメモリカードの山。散らばった本はどれも情報処理関係の専門書で、十枚以上の付箋がページとページの間から顔をのぞかせている。ラグナがプレゼントした大きなクマのぬいぐるみが、恐ろしく不似合いにベッドの上に鎮座していた。&lt;BR&gt;　セルフィが見かけによらず努力家であることは、知っていた。情報処理関係及び電子情報戦に関しては、スコールでさえかなわないほどに優秀な成績をたたき出していることも。&lt;BR&gt;　だが、この部屋はなんだろう。ただただ無機質に勉強と訓練の痕跡しか残らない、この部屋は。&lt;BR&gt;　ベッドの上までこんなにたくさんの資料と教材とコンピュータと配線が埋めつくしていたら、とてもではないが休める環境にはなりえない。ここはプライベートルームなんてものではない。&lt;BR&gt;「……ごめんね、着替えてくるから……適当に好きにしてていいよ」&lt;BR&gt;　何気ない仕草で机の上のデスクトップPCの電源を入れながら、セルフィが力なく笑って椅子を促した。&lt;BR&gt;「ちゃんとシャワー浴びろよ」&lt;BR&gt;　驚きから立ち直れていないまま、それでもスコールはそんな台詞を口にしてしまう。うんありがとう、とセルフィが少し明るい笑顔で頷いた。シャワールームに向かう途中で、エアコンの電源をオンにする。&lt;BR&gt;　奥のシャワールームに彼女が消えても、しばらくスコールはその場に立ちつくして辺りを見回すことしかできなかった。&lt;BR&gt;「…………」&lt;BR&gt;　少しの間そうしていて、スコールはゆっくり足を動かして勧められた椅子に座り、手を伸ばして棚にある伏せられたままの写真立てのひとつを取り上げてみた。&lt;BR&gt;　中は、空のままだった。&lt;BR&gt;　３つある写真立てのすべてが空のまま伏せられていることを確認し、スコールは元通りにそれを戻して、もう一度ぐるりと部屋を見回し、すぐ眼の前のパソコンが立ち上がっていることに気づいた。&lt;BR&gt;　システムのログイン画面。勝手に触れていいものなのか、何故わざわざ電源を入れていったのか、スコールはその画面を眺めて少し考える。&lt;BR&gt;　改めて部屋の内部を見回して、スコールはこのパソコンの中に、この部屋の惨状を作りだした原因があるのではないかとふと思い立った。セルフィはこの部屋をパソコン操作くらいにしか利用していなかっただろうことが、容易に想像がつく有様だったからだ。&lt;BR&gt;「――――」&lt;BR&gt;　散々悩んで、一度だけ試して違うならやめてみようと、先ほどセルフィが部屋を開ける際に入力していたパスコードと同じ数字を入力してみた。エンターキーを押した瞬間、何事もなかったかのようにシステムが立ち上がりはじめたことに、スコールの方がむしろ驚いた。&lt;BR&gt;　立ち上がった画面に、ひとつのウィンドウが表示される。シャットダウンの際に閉じておかなかったらしい、セルフィが最後に使ったプログラムのウィンドウ。&lt;BR&gt;　何気なくその中身をのぞいたスコールは、しかしその瞬間完全に絶句し眼を見開いた。&lt;BR&gt;　ミサイル照準計算と、着弾誤差修正のコントロールパネルを、そっくり再現した、それは――&lt;BR&gt;（――シミュレーション……）&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　スコールがそれを直接眼にしたことはない。あの時、スコールはセルフィと二手に分かれて、バラムガーデンに向かった組だったから。&lt;BR&gt;　だが、軍事訓練を受けているスコールには、眼の前に再現されたそれが、あの日セルフィが向かったガルバディアミサイル基地のコントロールパネルであることが、無理なく理解できた。&lt;BR&gt;　このプログラムをセルフィが自分で再現したのか、それともガルバディア軍のシステムに侵入して堂々とデータをもらってきたのかはわからない。どちらもセルフィになら可能なはずだ。&lt;BR&gt;　問題は、元になっているプログラムではなく、それにより作り上げられたシミュレーションプログラムだ。&lt;BR&gt;　何度も唾を飲みながら、スコールはマウスを操作し、ログ画面を表示させる。&lt;BR&gt;　新たに立ち上がったウィンドウ内を埋めつくす膨大なログを一見して、エアコンで暖まりつつある部屋の中にいるにも関わらず、全身が冷えるような錯覚を起こした。&lt;BR&gt;　百を超える回数、繰り返されたシミュレート。&lt;BR&gt;　あらゆる状況パターンを想定し、何度も何度も繰り返されたそのシミュレーションのログが示すのは、ミサイル爆撃回避の対象がトラビアガーデンに設定されているというひとつの事実だ。&lt;BR&gt;　あの日、ガルバディアD地区収容所で、ただ呆然と見送ってしまったミサイルの軌跡を止めるための、訓練。&lt;BR&gt;　今さら繰り返すことに何の意味もない、その膨大なログに、スコールはセルフィの悲鳴を聞いたような気がした。&lt;BR&gt;　呆然と……本当にただ呆然としたまま、ミサイルの消えていった空を見上げていたあの日のセルフィの小さな背中が脳裏に思い出される。アーヴァインに「最初の標的はトラビアで、次がバラムだと聞いたよ」と告げられて、くたくたと膝の力を失って、その場にしゃがみこんでしまった、あの動きまで。&lt;BR&gt;（侵入的想起……）&lt;BR&gt;　PTSDの、主症状のひとつ。トラウマに関係のない生活をしている中でも、本人の意志に反して、トラウマ体験を繰り返し繰り返し思い出してしまう侵入性の症状。&lt;BR&gt;　トラウマを思い出すことを回避しようとする症状とまったく相反する症状が同居する、典型的な状態だった。&lt;BR&gt;（だから、セルフィは……）&lt;BR&gt;　あまりにも突然で膨大な喪失感。ミサイルを見送ってしまった自分に対する無力感。&lt;BR&gt;　喪失の痛みと自身への悔恨と無力感が、部屋でひとりになるたび襲ってきて、他に何もできずにどうしようもない苦しい過去を繰り返して。&lt;BR&gt;「……もお、カッコ悪いよね～」&lt;BR&gt;　背後でふいに声がして、びくりと振り返った視線の先に、シャワールームから出てきたセルフィが立っていた。&lt;BR&gt;　ほとんどの私服をトランクに詰めてしまっていたため、仕方なしにパジャマに着替えている。――SeeDになる前は自由に使える金などほとんどなかった孤児のセルフィは、同年代の少女に比べて私服の所有数は少な目だ。&lt;BR&gt;　肩にかけたタオルの上に、濡れた髪がこぼれている。&lt;BR&gt;　スコールは立ち上がり、本とメモがあふれかえって寝る場所なんてほとんどないセルフィのベッドに腰掛けると、セルフィを横に座らせてわしゃわしゃとタオルで髪の水気を拭いてやった。柑橘系のコロンの香りがする。&lt;BR&gt;　この部屋にひとりでいる時、セルフィはどんな顔で何を思って、長い時間を過ごしてきたのだろう。&lt;BR&gt;　どれほど想像してもわかるはずもない。&lt;BR&gt;「カッコ悪いなぁって、自分でも思ったんだ～」&lt;BR&gt;　横座りの体勢でスコールに背を向けたまま、セルフィがぽつんと言った。&lt;BR&gt;　一瞬手を止めかけたが、スコールは黙ってまた手を動かし続けた。&lt;BR&gt;「でもね、繰り返しちゃうの。も～、自分でもおかしいな～って思うくらい、思い出したくもないし苦しいんだけど、それでもね、思い出すために繰り返しちゃう。&lt;BR&gt;　思い出したい訳じゃないんだよ。どんなにトラビアの友達から、帰っておいでって言われても帰らなかったし、行かなくちゃ～って思いながら、任務の話が来るまであたし、全然トラビアに帰れなかった」&lt;BR&gt;　少し早口で喋って、セルフィはそこでちょっと吐息をついた。&lt;BR&gt;「あたしはSeeDだから」&lt;BR&gt;　細い肩が一瞬震えた。&lt;BR&gt;「……そう、思って……そう、自分に言い聞かせて、SeeDだから帰れないんだって、SeeDだからバラムにいるんだってみんなにも説明して、あたし、ぜ～んぶ、SeeDのせいにしてた。あたしはSeeDだからって口にすれば、どんなことも怖くなかった。誰かが死んでも、自分が死ぬことも、SeeDなんだからって言えばそれで全部解決したんだよ」&lt;BR&gt;　それは、スコールも何度となく聞いた言葉だった。&lt;BR&gt;　あのエスタパニックの最中も、凛とした眼差しで何度も何度も、セルフィが口にした言葉。&lt;BR&gt;「なのにね、SeeDって言葉にすがって頑張ってたのに、SeeDだからトラビアに行くことになっちゃったの」&lt;BR&gt;　ラグナにトラビアに帰りたいかと聞かれて、SeeDだから帰れないと答えた。&lt;BR&gt;　次に会った時に、SeeDとしてトラビアに帰れるようにしてやると言われて、セルフィは何も言葉を返せなかった。&lt;BR&gt;　断る理由なんて、どこにもなかった。トラビアを心配する気持ちは間違いなく存在していたし、帰らない自分に対して少なからず罪悪感めいたものも抱いていたから。&lt;BR&gt;「トラビアを守れなくて、復興の手伝いもしないなんて、やっぱりひどいな～って、心のどっかで思ってた。&lt;BR&gt;　帰りたい気持ちも、すご～くあったよ。おんなじくらい、帰りたくないって気持ちも、すご～くあって……自分でもね、自分がホントはど～したいのか、全然わかんなくなっちゃった」&lt;BR&gt;　細い両肩は、もう小刻みに震えて止まらなくなっていた。&lt;BR&gt;　髪を拭いていた手を止めて、スコールは驚かせないように注意しながら両腕を伸ばし、背中からそっと抱きしめる。&lt;BR&gt;「トラビアに行って……」&lt;BR&gt;　自分の身体に回されたスコールの腕に触れて、セルフィはぎゅっと袖を握った。&lt;BR&gt;　ずっとしまいこんでいた猛毒の記憶のいくつかが、閉じた瞼の裏で再生を開始する。&lt;BR&gt;　いつもなら即座にねじふせて視線をそらした記憶の数々。けれど、今はそれを口にしなくてはならなかった。&lt;BR&gt;　一番最悪の記憶はまだ甦っていない。慎重にそれを確認して、セルフィは歯を食いしばるようにして、何度も息をのみこみながら懸命に、震える唇を開いた。&lt;BR&gt;「色んなことがあって……色んな、ものも見たよ……」&lt;BR&gt;　―――瓦礫の山を除けるのは大変な作業で。&lt;BR&gt;　ひとつ大きな瓦礫を取り除くたびに、かつての友人だった一部が姿を見せた。炭化したそれが誰なのかもわからなくて、あの墓地の群れの下に全部いっしょくたにして埋めた。持ち主の少女の赤い指紋がくっきりとついた小さな人形は、以前取れかけた腕をセルフィが縫い合わせてやったものだった。ほとんど白骨化した足と一緒に掘り出された小さな靴には、医者になるのが夢だと語った銀髪の少女の名前が、血と埃の下にうっすら残っていた。倒壊した壁の下敷きになって、そのまま死んだ友人が残したひっかき傷を見せられたのはいつだっただろう。まだらな朱色になっていたあの壁は、本来なら白壁のはずだった。&lt;BR&gt;　あの爆撃の日から半年経っていたはずなのに、それでもそんな衝撃的な場面には何度も何度も出くわした。SeeDだから、セルフィはいつだって先頭に立って、それを真っ先に見届けなくてはならなかった。&lt;BR&gt;「……でもホントは……ホントはね…………あたし、ずっと、――……ずっと、すごく怖かった……！」&lt;BR&gt;　スコールの腕にしがみついて、ずっとずっと言えなかった言葉を涙混じりにセルフィは吐き出した。&lt;BR&gt;　本当に本当に怖かった。瓦礫がひとつ除かれるたびに脚が震えて逃げ出したくなった。&lt;BR&gt;　次に誰の何が出てくるのかわからなくて。早く見つけてあげたい気持ちと、見たくない気持ちが混在して。&lt;BR&gt;　たぶん、それは、あのトラビアのみんなも同じだったのだろう。だから半年経ってもあれほどに、撤去作業が進んでいなかったのだろう。&lt;BR&gt;　だからセルフィがやるしかなかった。あの日何もできなかった自責の念もあって、眼をそらすことはできなかった。&lt;BR&gt;　耐えられないとわかっていたから、セルフィは自分を騙した。トラビアに帰れて嬉しくて、昔の仲間と過ごせることは幸せなのだと思い込もうとし、そしてそれは成功した。セルフィはやっぱり、笑顔が少しも苦痛ではなかった。&lt;BR&gt;　周りの誰が泣いていても、セルフィは涙一つ流さなかった。たとえ周囲に誰もいなくても、泣こうという気すら起きなかった。どこか他人事のように笑顔をふりまいた。夜中に何度も眼を覚ました。そのたびに同じように眼を覚ました子供達がいないか見回して、そういう子がいればまた笑顔を見せて抱きしめた。&lt;BR&gt;「……気がついたらね、あたし……すご～くたくさんのＧ．Ｆ．をジャンクションしてたんだよね～」&lt;BR&gt;　ガーデンに入ってきてしまうモンスターを倒すためと称して、日に日にジャンクションするＧ．Ｆ．の数は加速度的に増していった。トラビアガーデンはトラビア政府の徴兵制度と深い関わりがあるのだから、応援を呼べば兵士の一個小隊くらいは貸し出してもらえるとわかっていて、あえて頼むこともしなかった。&lt;BR&gt;　いつ何が起こるかわからないから、なんて言い訳をして、眠る時ですらジャンクションを外すことはしなかった。&lt;BR&gt;「だからね～」&lt;BR&gt;　くすっとセルフィは小さく笑い、身体の向きを変えると、スコールの胸に泣き濡れた頬を埋めて言葉を続けた。&lt;BR&gt;「定期検診で再検に引っかかったってメールが来た時、これぜ～ったいＧ．Ｆ．検査のことだな～って、思ったよ」&lt;BR&gt;　スコールは一瞬、思わず息をのんでいた。&lt;BR&gt;　覚えている。エスタパニックの任務に赴く前、セルフィは再検を受けるのを妙に拒んでいた。&lt;BR&gt;　再検の呼び出しに一切応じず、メールでも放送でも無視を決め込んでいるのだと、シュウから聞いた。&lt;BR&gt;　呼び出しを無視するという行為自体、セルフィらしくないと思ったしシュウもそう言っていた。&lt;BR&gt;（わかってやってたのか……）&lt;BR&gt;　元々過適合症を起こしやすかったセルフィが、24時間Ｇ．Ｆ．をジャンクションし続けて何週間も何ヶ月もそのままにしていれば、検診に引っかからない方が不自然だ。&lt;BR&gt;「忘れたくない気持ちは、あったはずなんだけどね～……忘れたかったのかどうか、自分でもよくわかんないよ」&lt;BR&gt;　多分、忘れたい気持ちの方が少しずつ勝っていったのだろうとスコールは思う。&lt;BR&gt;　他人にも自分にも笑顔をふりまいて、他人も自分も騙しながら自分を追いつめていって。エスタで見せたどこか捨て身の言動は、恐らく全部忘れてしまいたいと願う気持ちから生み出されたものなのだろう。&lt;BR&gt;&lt;BR&gt;　――――覚えている間だけ、思い出して。いつか忘れちゃうまで、懐かしんで。&lt;BR&gt;&lt;BR&gt;　死ぬかも知れないという立場に立たされて、微笑んでそうスコールに告げた、セルフィ。&lt;BR&gt;　忘れたいと願う心と、そんな自分を薄情に思う心と。誰にも知られることなく、ずっとずっと葛藤を続けていたからこそ出た、あの言葉。&lt;BR&gt;　本当は、きっとあの言葉を、瓦礫の下で命散らしたトラビアの仲間達に、セルフィ自身が言ってほしかったのだ。&lt;BR&gt;「でもね、今は、ぜ～んぶ覚えていようって、思ってるんだよ」&lt;BR&gt;　スコールの胸に頬を預けた体勢のまま、透明な笑顔でセルフィが囁く。流れ落ちる涙はそのままに。&lt;BR&gt;「あたしの周りで死んだ人達のこと……あたしがこの手で、殺した人達のこと、ぜ～んぶ、あたしが死ぬまで、覚えていようって決めたんだ～」&lt;BR&gt;　それがどれほど痛くて苦しくて、夜ごとの悪夢にさえなったとしても。&lt;BR&gt;　たくさんの思い出を作って、すべてを記憶するとセルフィは決めたのだ。&lt;BR&gt;「だって、嬉しかったから」&lt;BR&gt;　眼を上げて、スコールの群青の瞳をまっすぐ見すえて、セルフィはにこりと笑った。&lt;BR&gt;　喪うことを恐れて他人との繋がりを深めることを避けていたセルフィが、繋がりを新たに作ることを決意した、理由。&lt;BR&gt;「スコールがあの時、あたしのこと忘れないって、封印されてでも絶対忘れないって言ってくれたの、ホントにホント～に嬉しかったから」&lt;BR&gt;　忘れてもいいと言ったのに、忘れられない辛さを誰より知るからこそ、忘れて欲しいと願ったのに、それすら超えて忘れないと宣言してくれたことが。&lt;BR&gt;「誰かが自分を覚えていてくれることが、こ～んなに嬉しいものなんだ～って、はじめて知ったよ」&lt;BR&gt;　大きな大きな翠の瞳からこぼれ落ちてゆく涙が、胸にしみるほど綺麗だった。&lt;BR&gt;　スコールの胸から身を起こして、セルフィは涙も拭わずにっこりと真正面から顔を向け、手を伸ばしてスコールの頬に触れた。&lt;BR&gt;　自分のせいで苦しい思いをするのなら、自分のことは忘れて欲しい。&lt;BR&gt;　マルストに語った気持ちに嘘はない。今だって、もしこの先自分が死ぬことがあって、それがスコールを苦しめるなら、全部の記憶を奪ってあげたいと本気で思っている。&lt;BR&gt;　でもそれとはまったく別の場所で、覚えていて欲しいと願う気持ちがあるのも、また真実だから。&lt;BR&gt;「だから忘れないの。Ｇ．Ｆ．にも負けないで、い～っぱい色々なこと、ぜ～んぶ覚えてて、一緒に未来に連れてってあげるの。そのためにあたしは、今こうして生き残ってるんだって、そう思うことにしたの。&lt;BR&gt;　そうしたらね、少～しずつだけど、思い出せるようになってきたんだよ。色々思い出しても前よりは平気になってきたし……トラビアに帰ろうって自分から思えるようにもなったし、ず～っとつけられなかったコロンもつけられるようになったし、ここで友達も作ろうって思えるようになったよ。&lt;BR&gt;　あのね、それはね、たぶん、絶対……スコールのおかげだから」&lt;BR&gt;　そうか、とスコールはかすれた声で小さく呟いた。&lt;BR&gt;　うずくまって痛みを抱えて泣いたって許されるほどの傷を受けてもなお、この少女は未来に進むことをかけらも疑うことがないのだ。&lt;BR&gt;　こんな自分の、何気ない一言さえも糧にして。その背の翅をひらめかせて、たとえその翅が破れようとちぎれようと、前へ進み自由に飛ぼうとするのだろう――どこまでもまっすぐに。&lt;BR&gt;「ゆっくり……思い出していけばいい」&lt;BR&gt;　少しずつ乾いてゆく栗色の髪を撫でながら、静かに静かにスコールが囁く。&lt;BR&gt;　髪を撫でた手が滑るように降りて頬の涙を拭うのを、セルフィは少しくすぐったく思いながら身じろぎひとつせず受け止めていた。&lt;BR&gt;「わざわざ、辛いことばかりを思い出す必要はない……セルフィが幸せだと思った記憶から少しずつ、ゆっくり思い出して覚えていけばいいはずだろ？　……思い出したい記憶だけ、覚えていたって、誰も責めない……」&lt;BR&gt;　すべてを思い出し覚えていこうと気負うから辛くなるのだ。&lt;BR&gt;　未来に連れて行くのは、優しい思い出だけでも充分なはずだ。&lt;BR&gt;「何もかも背負うのは悪い癖だと――そう言ったのは、あんたじゃないのか？」&lt;BR&gt;　くすっといたずらっぽくスコールが笑って言ったその言葉に、セルフィの眼が一瞬、大きく見開かれた。&lt;BR&gt;　止まりかけた涙が、勢いをましてどっと溢れてくる。反射的に腕を伸ばしてスコールにしがみついた華奢な身体を、スコールが驚きのあまり受け止めそこないそうになりながら慌てて抱きしめる。&lt;BR&gt;「――……いいのかなぁ？」&lt;BR&gt;　今も必死でねじ伏せている記憶のかけらが、頭の中でぐるぐる回っている。&lt;BR&gt;　あの日あの瞬間、切断されてフリーズしたままの頭のメモリは、再起動なんてする気配もない。&lt;BR&gt;　何度もしゃくりあげて、カッコ悪いと思いながら、セルフィは涙声で訊ねた。&lt;BR&gt;「そんな、都合のいい記憶ばっかで、いいのかなぁ？　あたしだって、明日死んじゃうかもしれないのに、そんなゆっくりしてていいのかなぁ？　嫌なことなんにも思い出せないで、そのまんま間に合わなくても、いいのかなぁ？」&lt;BR&gt;　この先何十年もの生命の保証があるなら、それもいいだろう。優しい記憶だけ抱いて今はただ前へ進むことだけを考えて、長い時間をかけてから辛い記憶を振り返っても許されるだろう。&lt;BR&gt;　でも、セルフィは、SeeDなのだ。&lt;BR&gt;　死に一番近いところで命のやり取りをし、生きる権利を勝ち取る世界に生きているのだ。&lt;BR&gt;「それでみんな、許してくれるのかなぁ？　ホントに、それで――」&lt;BR&gt;　涙混じりのセルフィの声は、唐突に唇をふさがれてそのまま途切れた。&lt;BR&gt;　反射的に眼を閉じた。側頭部を支えている大きな手が、低体温のはずなのに熱く感じた。&lt;BR&gt;　唇を離れたそれが頬の涙を拭い、それから閉じた瞼や額や唇や首筋にいくつもいくつも落ちてくる。&lt;BR&gt;「……セルフィ」&lt;BR&gt;　最後に額と額を合わせて囁かれた響きの良い声に、セルフィは小さく震えながら眼を開いた。&lt;BR&gt;　すぐ間近に――本当に吐息が絡むほどすぐ傍に、どきりとするほど美しい蒼の瞳が自分を見つめていた。&lt;BR&gt;　いつもの灰がかった群青の瞳と違う、まるで研磨され輝きを増した宝石のような瞳が、胸が苦しくなるほど切なげに真摯に見すえてくるのを、セルフィは魅入られたように見返した。&lt;BR&gt;「あんたを殺していいのは、俺だけだ」&lt;BR&gt;　気が遠くなりそうな一言だった。&lt;BR&gt;「勝手に死ぬのは許さない……」&lt;BR&gt;　身動きひとつできないまま、涙の上に口づける感触をセルフィは感じ、泣きながら眼を閉じた。&lt;BR&gt;　そして思い出す。列車の中、スコール班がミッショントラブルを起こしたと聞いた瞬間の、全身の血が凍えるほどの明確な恐怖を。&lt;BR&gt;「あたしだって許さない……」&lt;BR&gt;　本当は、……本当はずっと、言いたかった。&lt;BR&gt;「スコールが死ぬのは、絶対、絶対、許さないんだからぁ……っ！」&lt;BR&gt;　ＳｅｅＤなのにこんなこと、言ってはいけないのだと思っていた。&lt;BR&gt;　彼を困らせるだけだと思ったから、いつか何かのきっかけで重荷になってしまうような気がしたから。&lt;BR&gt;　なのにこの人はなんて簡単に――&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　涙混じりのセルフィの絶叫は呆気なくスコールの心臓を射抜き、ほとんど衝動的に腕を伸ばしてその身を抱き寄せると、スコールは彼女を強引に抱いたまま立ち上がった。&lt;BR&gt;　かなり強引な抱き上げられ方をされ、セルフィが身体を支えようと反射的にしがみついてくる。きっかり20センチの身長差がある彼女は、こんなふうに縦に抱き上げられると視線の位置はスコールより上になる。しがみついて動けないままのセルフィの唇に、強引に重ねてくる唇が熱くて苦しくて切なくて――&lt;BR&gt;「俺は、全部、あんたのものだ。――セルフィ」&lt;BR&gt;　セルフィは数瞬の間、完全に呼吸を忘れて止まってしまった。&lt;BR&gt;　かすめるようにまた触れた唇の温もりに、こぼれた吐息で呼吸を再開する。&lt;BR&gt;「俺を殺していいのは……あんただけだ」&lt;BR&gt;　約束する、と。&lt;BR&gt;　艶やかな声が耳に響いた瞬間、背筋から全身に電気が走るような感覚をセルフィは覚えた。&lt;BR&gt;　きっと立っていたら腰が砕けて座り込んでいたに違いないセルフィを、腕の位置を細かく変えて抱き直すとスコールは身体の向きを変える。&lt;BR&gt;　部屋を出ようとしているのだと理解して、呆然としていたセルフィが慌てて我を取り戻し声を上げた。&lt;BR&gt;「あ、あの、あのね……っ」&lt;BR&gt;　スコールの部屋に行くと言ったのは自分だった。嫌なら何もしないとスコールは言った。&lt;BR&gt;　セルフィは以前スコールの部屋で初めて泊まった時のことを思い出す。話してる途中で眠り込んだらしく、気がついたらスコールのベッドの中で外はもう朝だった。&lt;BR&gt;　床の上の寝袋の中に、スコールがいた。&lt;BR&gt;　あの時セルフィは思いきり大笑いしてスコールの機嫌を損ねてしまったが、あれを何日も続けろと言うのはあまりに申し訳ない気がした。だが自分が寝袋になんて言おうものなら、絶対に間違いなく怒るに決まっているだろうし。&lt;BR&gt;「わ～まってまってまって～っ！」&lt;BR&gt;　一度は立ち止まってくれたものの、何も言わないセルフィにあっさり見切りをつけて、机の上のデスクトップの電源を落とし、部屋を出ようとするスコールに大慌てで声を上げる。&lt;BR&gt;「……あんたが嫌なら襲いやしない。そう言っただろ」&lt;BR&gt;　響きの良い声であっさりと言われ、セルフィは何と返したものかと口をぱくぱくさせる。セルフィから視線を外して、スコールは少し切なげに笑うと、呟くように言った。&lt;BR&gt;「俺が、ただ……いてほしいだけなんだ」&lt;BR&gt;（え？　……えぇ？？）&lt;BR&gt;　セルフィの思考は今度こそ真っ白にスパークして使い物にならなくなってしまった。&lt;BR&gt;　こんなに立て続けに殺し文句を聞かされたのは生まれて初めてなのだから、無理もない。&lt;BR&gt;「ち、ちが……え～とその、嫌とかじゃなくて～」&lt;BR&gt;　一瞬だけ見た切なげな微笑が網膜に焼き付いて離れない。&lt;BR&gt;「……嫌がってたろ？」&lt;BR&gt;「いっ、いっ、嫌なわけないでしょ～！！　あ、あたしだって、あたしだって好きな人には、……っ」&lt;BR&gt;　パニックして景気よく口を滑らせたセルフィは、直後に我に返ってはたと口をつぐむ。&lt;BR&gt;　唖然とした瞳が自分を見ていることを察し、ぼぼぼぼ、と音でも出そうな勢いで顔が赤くなった。&lt;BR&gt;　好きな人には何されたってかまわない、なんて…………言えるわけがない。&lt;BR&gt;　だがしかし、嫌がっていると思われているのだけは誤解なのでどうにかしたい。今までそういうムードを避けてばかりいたのは事実だけれども、別にセルフィがスコールを嫌なのではなくて。&lt;BR&gt;「だ、だからっ！　その……嫌なのはスコールじゃないのかな～って、そういう話……」&lt;BR&gt;「……俺が？」&lt;BR&gt;　意外そうなその声にふと顔を上げたセルフィは、かすかに眉をひそめて自分を見上げる綺麗な群青の瞳を思い切りまともにのぞきこんでしまい、脳が酸素欠乏状態になって失神するかと思うほどくらくらした。&lt;BR&gt;「だ、だって……」&lt;BR&gt;　もはや通常時の３％も頭は動いていないだろう。セルフィは半泣きになった。&lt;BR&gt;「だって、あたし、めっちゃ子供体型やから胸もないし色気もないし、だから今までぜ～んぜんモテたこともないし」&lt;BR&gt;　リノアのような、女らしさなんてどこにもない。&lt;BR&gt;　恋をするまでは考えたこともなかったコンプレックスに、セルフィ自身戸惑いまくっていてどうすることもできなくて。&lt;BR&gt;「だから、せめて、も～少し胸、大きなってから思ったんやけど、どないしたら大きなるんかもわからへんのやもん～！！」&lt;BR&gt;　耳どころか首筋まで真っ赤にしてそんなことを叫ばれて、スコールは唖然としてそのまま立ちつくした。&lt;BR&gt;　そういえば……と、数時間前にマルストが言っていた言葉を思い出す。&lt;BR&gt;　リノアにコンプレックスがどうこうというのは、要するにこういうことだったらしい……。&lt;BR&gt;　そういう雰囲気になるたび逃げられていたのは彼女がまだ幼いからだとばかり思っていた。だからこそ無理強いすれば傷つけてしまいそうでためらっていたのだが、まさかこんな他愛のないコンプレックスが原因だったとは。&lt;BR&gt;「……あのな、セルフィ……」&lt;BR&gt;　果たしてこの場合何をどう言えば良いものなのか。生来の口下手であるスコールには、これまで受けたどんな試験の問題よりも難問に思えた。――何でこんなこと気にするんだそりゃ胸はないよりあった方がいいかも知れないが好きになった女なら胸があろうとなかろうとそれだけで嫌いになる訳がないんだしまして胸で選んでる訳でもなくてつまり、&lt;BR&gt;「だから……」&lt;BR&gt;　リノアはリノアであんたはあんたで俺は比べた事なんて一度もないしリノアのスタイルがどうだってそんなことは――&lt;BR&gt;「………………だから？」&lt;BR&gt;　涙目で言葉を待つセルフィに、スコールの方がなぜか顔を赤くして視線をそらしてしまう。――大体こんなことが言葉にできるのなら、これまでの人生の苦労の大半はしなくてすんでいる。&lt;BR&gt;　結果、混乱しまくったスコールは、様々に渦巻く思考を簡潔な一言にまとめて言った。&lt;BR&gt;「俺はあんたなら、胸なんてどうでもいいんだ」&lt;BR&gt;　……なんでそうなるの？　リノアがいたらこんな突っ込みの聞こえてきそうな一言だった。&lt;BR&gt;　これでセルフィが納得してしまったのは、セルフィがセルフィであるからだとしか言いようがない。&lt;BR&gt;　わかったら行くぞとばかりに、スコールはドアを開ける。&lt;BR&gt;　自分にしがみついている細い腕が一瞬震えて、それでも嫌だとは言わずに少女が自分の首筋に顔を埋めてくる。&lt;BR&gt;　少女が一年かけて作り上げたその部屋から、スコールはためらいなく彼女を連れだした。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　これと決めた起床時間に起きるのは、当たり前に修得した特技だった。&lt;BR&gt;　眼を覚まして、柑橘系の優しい香りに包まれていることにまず気がついた。&lt;BR&gt;　時計を確認しようと視線を向けると、すぐ隣で子猫のようにまるくなって眠っている少女の姿が飛び込んでくる。&lt;BR&gt;　パジャマを着直して眠る直前、腕が痺れるからと遠慮する彼女を強引に腕枕した記憶があるのだが、スコールの左腕はきちんと布団の中に入っていた。&lt;BR&gt;　どうやら自分が眠った後、起こさないようにして腕を外してくれたらしい。&lt;BR&gt;　セルフィらしいなと一瞬笑いがこみあげてきて、スコールは何とか声を抑えた。&lt;BR&gt;　腕枕なんてされたこともない彼女は、腕を痺れさせずに腕枕する方法があることさえ知らないのだ、きっと。&lt;BR&gt;　果たしてこのまま、起こさないように腕枕をしてやったら、起きた時どんな顔をするのかと小さないたずら心が芽生えたが、その前に片づけなくてはならない用事があることを思い出しあきらめる。&lt;BR&gt;　起こさないよう注意してベッドから抜け出ると、なるべく音を立てずに手早く身支度を整えた。あどけない表情で眠っている少女が目覚める気配のないことを確認し、起こしたくなかったので口づけるのはあきらめて指先で髪を直すだけに留め、そっと部屋を出る。&lt;BR&gt;　ガーデンの起床時間まで、あと一時間。&lt;BR&gt;　止まない雨のおかげで、空はまだ夜の続きのように真っ暗だった。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;「……どうしたの？　こんな時間に……」&lt;BR&gt;　起きているだろうという予想に違わず、SeeDの制服をきっちりと身につけていたキスティスは、突然のスコールの訪問に驚いた顔をしながら部屋に招き入れた。&lt;BR&gt;「レウィンのこと……気にしてると思って……」&lt;BR&gt;　背中で閉じたドアにもたれかかってそう告げたスコールに、キスティスは唖然としたようだった。&lt;BR&gt;「……どういう風の吹き回しかしら。熱でもあるんじゃないの？」&lt;BR&gt;　眼の前に立ち止まって、白い繊手が伸ばされる。額に触れかけて、キスティスがあら、と瞳を優しくした。&lt;BR&gt;「セルフィと一緒だったの？」&lt;BR&gt;　声と共に手を引っ込める。スコールは一瞬面食らって眼をまたたいた。&lt;BR&gt;　なぜわかるのだと眼で問われ、キスティスはくすっと笑う。&lt;BR&gt;「その香り。セルフィのコロンでしょう？」&lt;BR&gt;　一晩傍にいたおかげで、香りが移っていたらしい。&lt;BR&gt;　ガルバディア令嬢の香水も素早く察したキスティスは、こういったことに敏感だったらしい。&lt;BR&gt;「気遣いのおすそわけってことかしら。いやね、私はこんな経験何度もしているもの。慣れはしないけれど、気持ちをコントロールすることはもうできるのよ」&lt;BR&gt;　心配無用と微笑むその顔は、一年半前に教師資格を剥奪され、縋ってきた彼女と同一人物と思えないくらい強く美しい笑顔だった。&lt;BR&gt;　スコールの知らない内に、キスティスもまた少しずつ成長し強さを蓄えているのだ。&lt;BR&gt;　余計な世話だったかと苦笑を深めるスコールの前で、キスティスは微笑んだまま小さく吐息をついた。&lt;BR&gt;「そう……あの子、帰ってきたのね……。あの子の部屋は見た？」&lt;BR&gt;　それは疑問ではなく、確認だった。頷いたスコールに、キスティスはそう、とまた小さく息をつく。&lt;BR&gt;「キスティスは……いつ……？」&lt;BR&gt;　あの少女の部屋にどうやって入ったのか。ずっと疑問に思っていたことをスコールは問いかける。&lt;BR&gt;　セルフィはキスティスが部屋のことを知っていることに、ひどく驚いていた。&lt;BR&gt;「私は見せてもらったわけじゃないわ……偶然入ってしまっただけよ」&lt;BR&gt;　誰にも頼らないあの少女は、もちろんキスティスにも誰にも自分の弱みなど見せはしない。&lt;BR&gt;「半年くらい前かしら……セルフィしか知らないデータディスクを探さなくちゃいけなくて、学園長命令で中に入ったの。私のIDは色々あって、教官権限を持っていたから」&lt;BR&gt;　あぁ、とスコールは納得した。&lt;BR&gt;　それでキスティスはあの部屋を知っていたのだ。&lt;BR&gt;「部屋に入って……びっくりした？　……あのパソコンの中身も、もう見てる？」&lt;BR&gt;　無言で頷いたスコールに、キスティスは少し哀しげに微笑んだ。&lt;BR&gt;　半年前、キスティスはデータディスクの内容を確認しようとして、あのPCを立ち上げた。&lt;BR&gt;　パスワードは請求されたが、もしやと思ってIDデコーダーに設定されていたパスコードを入力し、あっさりとシステムを立ち上げてしまい、あのシミュレーションプログラムを見てしまった。&lt;BR&gt;「あれを見た時ね、私……正直に言うとすごく怖いと思ったわ。多分誰も気づいていなかったと思うのよ、あの事件で最も多くの犠牲を払って傷ついたのが、誰だったのか……」&lt;BR&gt;　それは魔女になってしまったリノアではなく。巻き込まれたスコール達でもなく。&lt;BR&gt;　たぶん、それは、あの事件で巻き添えを受けて爆撃されたトラビアガーデンの学生達と、セルフィだった。&lt;BR&gt;「あの子もきっと……同情や、気遣いや、そんなものを拒絶していたんだと思うの。だから率先してリノアを気遣って、スコールを気遣って、エルオーネを気遣って……私たちの誰もが、リノアやエルオーネや、ママ先生にばかり眼を向けてしまった。……セルフィが受けた傷の大きさには、みんなで眼をそらして、気づこうとしなかった」&lt;BR&gt;　セルフィは強い少女だからと。&lt;BR&gt;　きっと、あのアーヴァインでさえ、そう思っていた。&lt;BR&gt;　そう思わせるだけのものは、確かにあの少女には存在した。&lt;BR&gt;「私ね、それから少し……考えてみたの。もし私が、セルフィの立場だったら……って」&lt;BR&gt;　宝石のようなキスティスの瞳を見下ろしながら、スコールは黙って言葉を聞いている。&lt;BR&gt;「後悔したんだろうって思ったのよ。ゼルの時も、ママ先生と戦った時も。&lt;BR&gt;　確かにガーデンのことを口にしたゼルは迂闊だわ。でも、あの場にいた私たち全員には、実力行使に及んだって、ゼルの言葉を止める義務があった。止められなかったのは、私たち全員の責任だわ――ゼルだけのせいじゃなく。&lt;BR&gt;　ママ先生と戦った時もそう。あの時私たちはあなたの怪我に気を取られて、撤退の機を逃してしまった。――でもアーヴァインが可能だったように、冷静に判断すれば撤退できたはずだし、情報収集を怠らなければ、もっと早い段階でミサイル攻撃のことを知ることができたし、止めることだってできたかもしれなかったのよ。&lt;BR&gt;　どれもこれも、あの事件に直接関わった私たちには、実力で阻止することはできたはずだった。それをセルフィもわかってしまった。――だからあの子は自分だけのせいにした……」&lt;BR&gt;　魔女にガーデン報復のきっかけを与えたゼル。&lt;BR&gt;　操られ、サイファーにガーデンのミサイル攻撃を指示したイデア。&lt;BR&gt;　魔女の指示を受けて、自らミサイル発射の指令を下したサイファー。&lt;BR&gt;　トラビアガーデンが最初の標的と知りながら、リノアだけを連れて逃げようとしたアーヴァイン。&lt;BR&gt;　本当ならセルフィは、この中の誰を憎んだっていい立場にいるはずだった。&lt;BR&gt;　けれどそうしなかったのは、自分にも責任の一端があると考えてしまったから。&lt;BR&gt;「あの子を追いつめたのは、本当は私たちなのよ。私たちは、自分たちの罪から眼をそらすために、あの子の傷からも眼をそらしたんだわ」&lt;BR&gt;　そしてきっとセルフィも、誰も憎みたくなんてないと、願っていた。&lt;BR&gt;　だからキスティスは――セルフィの状況を知っても、どうしてやることもできなかったのだ。&lt;BR&gt;「セルフィは……」&lt;BR&gt;　ゆっくりと、スコールは口を開く。&lt;BR&gt;「それでも、前に……進もうとしている。あんたが罪悪感を抱いていると知ったら……セルフィはもっと、辛いと思う」&lt;BR&gt;　本来なら他人のことをこうして口にすることを、スコールは好まない。&lt;BR&gt;　だが、これだけは伝えておかなくてはならないと感じていた。セルフィもきっと、それを望むだろうと、信じた。&lt;BR&gt;「忘れないと……言っていた」&lt;BR&gt;「え？」&lt;BR&gt;「自分の周りで喪った人間――自分が殺した人間も、全部忘れずに覚えていると……言っていた」&lt;BR&gt;　大きすぎる痛みを抱え込んでもなお、凛然とした眼差しで。&lt;BR&gt;「簡単には行かないだろう。心的外傷は簡単には癒えないし、セルフィが辛いのは、まだ続くと思う。……でも」&lt;BR&gt;　スコールは視線を落とし、ちょっと息をつくと言葉を続けた。&lt;BR&gt;「でも……セルフィは必ず、立ち直る。……必ず、乗り越えるはずだ」&lt;BR&gt;　スコールはそれを信じている。遠くない未来、セルフィがちゃんとすべての痛みを乗り越えていけることを。&lt;BR&gt;　不器用に言葉を繋ぎ、スコールはキスティスにまっすぐ視線を向けた。&lt;BR&gt;「だからもう……あんたも捕らわれない方がいい」&lt;BR&gt;　スコールやセルフィとは違った不器用さで、それでもセルフィを気遣ってくれていた優しい彼女。&lt;BR&gt;　その想いは自分のことで精一杯の少女には届いていなかったけれど、いつか伝えてやれたらとスコールは思う。&lt;BR&gt;「えぇ……そうね。あの子はもう、壊れたりはしないはずだもの」&lt;BR&gt;　キスティスはいつもと変わらない、理知的な微笑を浮かべて静かに頷いた。&lt;BR&gt;　セルフィの痛みを知ることで、彼女の中にも無数の傷は生まれていたのだろうと、スコールにも察せられた。&lt;BR&gt;「……じゃあ……」&lt;BR&gt;　身体を引いたスコールに、キスティスがすぐに反応し部屋のドアを開けてくれる。&lt;BR&gt;　廊下に出て、ふと思いついたようにスコールがキスティスを振り返った。&lt;BR&gt;「……あぁ、ところで……ひとつ相談があったんだが……」&lt;BR&gt;　穏やかに会話が終了したおかげで、うっかり忘れるところだったとスコールは慌てて口を開く。&lt;BR&gt;　数秒後に呆れて笑い出すキスティスの声が、今から予測がつくようだった。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　セルフィが眼を覚ましたのは、ガーデンの起床時間より30分ほど早い時間だった。&lt;BR&gt;　見慣れない部屋を眺めて、セルフィはぼんやりと記憶を辿る。&lt;BR&gt;　たっぷりそのまま一分近くぼうっとして、それから唐突に昨夜のことを思い出した。&lt;BR&gt;「！！」&lt;BR&gt;　いっきに頬を真っ赤にして飛び起きる。全身のあちこちが重く痛い。寝る前にシャワーを浴び直しパジャマを着ていて良かったと少し思ったが、あのまま寝ようとパジャマだろうと恥ずかしさに変わりはないような気もした。&lt;BR&gt;　飛び起きて、それから部屋を見回したが、スコールの姿はどこにもなかった。&lt;BR&gt;　ちょっとだけ寂しい気持ちも胸をかすめたが、今顔を見たら全身から恥ずかしさのあまり火を噴いてしまうかもしれないと思い直す。&lt;BR&gt;　帰ってこない内に着替えてしまおうとベッドから立ち上がって、あいたたと小さく声を上げて座り込んだ。&lt;BR&gt;（え……え～～と……）&lt;BR&gt;　また頬に朱がのぼるのが自分でもわかる。ケアルでどうにかなるんかな、そもそもケアルかけてもええんかなと、下らない疑問が脳裏をよぎった。一応女性軍人として、その手の知識は授業で散々習ったが、やっぱり授業は授業で現実は現実だ。むしろ同年代の少女達と情報交換していた方がよかったかもしれない。自分にはどうせ縁のない話とばかり、聞き流していたことが悔やまれる。――この肌に残った跡って、どうやったら消えるんだろう？&lt;BR&gt;　あちこち痛くてだるい身体を持て余しながら、そろそろと立ち上がってトランクに歩み寄り、モノトーンでハイネックのワンピースを選んでそれを身につけた。&lt;BR&gt;　たまに昨夜のことを思い出して顔から火を噴いて身もだえしそうになりつつ、脱いだ物をトランクに放り込み、ついでにベッドの上も整えて、荷物を抱えて外に出た。&lt;BR&gt;　今誰かに会ったら、照れの限界値を超えて絶対気が狂うと確信していたセルフィは、節々の痛い身体を無理矢理動かして猛スピードで自分の部屋に戻る。今度はIDカードでドアを開いた。&lt;BR&gt;　この部屋を避けるようになったのはいつからだっただろう。&lt;BR&gt;　エスタから戻ってきてしばらくは、それほどでもなかった。スコールの傍で、苦痛に麻痺していた心が正常に戻ってゆくに従って、少しずつこの部屋を見ることに耐えられなくなった。――この部屋を、そしてこのPCを見ることが。&lt;BR&gt;　昨夜スコールが落とした電源をオンにした。&lt;BR&gt;　立ち上がっていくシステムに視線を落とし、セルフィはこの一年半、何度この初期画面を見ただろうとぼんやりと思う。もう見たくないとさえ思っているのに、まるで呪いのようにこの手が入れた電源。何度も何度も――&lt;BR&gt;「――……」&lt;BR&gt;　苦しさは、もちろんまだ消えない。悲しさが薄れることも、きっとないのだろう。&lt;BR&gt;　それでも前へ進むと、セルフィは決めたから。&lt;BR&gt;（ごめんね）&lt;BR&gt;　誰にともなく囁いて、セルフィの指先がキーを叩く。&lt;BR&gt;　ずっと頭の中にあった、けれどずっと入力することのできずにいた「format」の呪文。&lt;BR&gt;（ごめんね……）&lt;BR&gt;　キーを押してから、さほどの時間もかけることなく、呆気ないほど簡単にそれは終了した。&lt;BR&gt;　無機質にフォーマット完了を知らせる文字を示すそのモニタに、セルフィは眼を閉じてそっともたれかかる。&lt;BR&gt;　涙は出なかった。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　部屋に戻ると、眠っていたはずのセルフィの姿はどこにもなかった。&lt;BR&gt;　きちんとベッドは整えられ、セルフィと一緒に部屋に入れた荷物も何も残っていないことに気づき、スコールは少なからず驚き、急いで部屋を飛び出した。&lt;BR&gt;　真っ先に向かったセルフィの部屋は、デコーダーが無人であることを示している。&lt;BR&gt;　まさかもうトラビアに発ってしまったのかと本気で慌てながら、とりあえず寮の外に出る。&lt;BR&gt;　カードリーダーの管理人に聞けば、少なくともセルフィが外に出たかどうかだけはわかるはずだ。&lt;BR&gt;　……相変わらず、セルフィに対しては電話という通信手段を思いつかないスコールだった。&lt;BR&gt;&lt;BR&gt;「あれ～？　スコール～？」&lt;BR&gt;　案内板の前まで走ってきたスコールは、ふいに背後で聞こえたその声に、思わず全身が脱力して床に転がりそうになり、慌てて案内板に手を突いて身体を支えながら振り返った。&lt;BR&gt;　にこにこと笑顔で階段をかけおりてくるセルフィが、スコールが顔を向けた瞬間いきなり階段を踏み外した。&lt;BR&gt;「わ。わっ」&lt;BR&gt;　眼が合うなりいきなり階段から転落をはじめた少女に、スコールの方が驚かされる。慌てて階段下に駆け込んで、落ちてくる少女を受け止めることには成功したが、一緒にトランクとバッグも落ちてきたのでかなり痛い思いをした。&lt;BR&gt;「～～～ったあぁ……」&lt;BR&gt;　思い切りスコールを下敷きにして、セルフィが情けない声を上げる。トランクの角に頭をぶつけたスコールは、もはや声もない。セルフィが慌ててスコールの上から飛び退き、顔をのぞきこんだ。&lt;BR&gt;「あ、あ～ごめんね～！　どっか痛い？　ぶつけた？」&lt;BR&gt;　声と共に小さな手のひらから光がこぼれる。Ｇ．Ｆ．がなくともスロット魔法のあるセルフィは、無尽蔵にケアルでもフルケアでも使用できるのだ。&lt;BR&gt;　……ふと、あのガルバディア大使館で彼女さえいれば、レウィンは死なずにすんだのかも知れないという考えが脳裏をよぎった。苦い思いを無表情の奥に沈めながら、スコールは少し吐息をつく。&lt;BR&gt;「……あんた、なんで毎度毎度俺の顔見るなりコケるんだ？」&lt;BR&gt;「え～そんなことないよ～？　スコールいなくても転んでるし」&lt;BR&gt;「……なおさら悪いだろ……！」&lt;BR&gt;　誰もいない所で階段から落ちたりして、打ち所が悪ければＳｅｅＤだって死ぬ訳だし、誰かがいたところで自分以外の人間がセルフィを受け止めるなんて言語道断だ。&lt;BR&gt;　もちろんそんな男心はかけらも理解していないセルフィは、きょとんとした顔で小首を傾げている。&lt;BR&gt;　昨日のあの夜が明けたこの朝に、一体なんだってこんな間の抜けた会話をかわしているんだろうと、いささかスコールは頭痛を覚えざるをえなかった。昨夜のあれは何だったんだと首を傾げたくなるほど、眼の前のセルフィはいつもどおりに邪気のない少女のままで。&lt;BR&gt;　……彼女を女として扱うことで、その背の翅を引き裂いてしまうのではないかとずっと恐れていた。どこまでも自由で手の届かない彼女の翅に嫉妬さえ覚えながら、それ以上にその翅を愛し、失いたくないと願っていた。&lt;BR&gt;　だが心配など必要なかった。スコールがどれほど強引にこの腕に抱いて翅を引きちぎっても、彼女の翅は何度でもしなやかに再生し、羽ばたこうとするのだ。そのたびスコールを魅了して。&lt;BR&gt;「あ、そ～だ、スコールさがしてたんだ～。あのね、レウィンのとこ行く途中だったの。つきあってくれる～？」&lt;BR&gt;　ぴょんと立ち上がってセルフィはそう言うと、スコールの手を引っ張って立ち上がらせ、いつもと変わらない、曇りのない笑顔でにっこりと小首を傾げた。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　昨夜と同じに、黒髪の少女は椅子に座っていた。細い両肩には、セルフィが昨夜あげた上着がかかっていた。&lt;BR&gt;「おはよ」&lt;BR&gt;　荷物は安置室の外に置いて入室したセルフィが、そっと微笑んで呼びかけると、少女は疲れたような眼差しでそれに応える。セルフィの背後に立つスコールに気づき、ほんのかすかに表情をこわばらせた。&lt;BR&gt;　理性でわかっていても感情は違う。セルフィは少女の気持ちも、背後に立つスコールの気持ちも痛いほど理解しながら、あえて何も言わなかった。&lt;BR&gt;　昨夜と同じに白い布に覆われた、後輩の亡骸の前に立つ。&lt;BR&gt;　隣に立ったスコールに眼を向ければ、昨夜から時々見せていた、痛い物をたくさん抱え込んだ瞳で布を見ていた。&lt;BR&gt;「スコール」&lt;BR&gt;　囁くように呼びかけて、セルフィは右手を伸ばしてスコールの手を取った。握るのではなくゆっくり持ち上げるセルフィに、されるがままになっていたスコールが、はっと気づいて何かを言う前に、セルフィはスコールの指を左手にはめていたオダインバングルの金具にすべらせた。&lt;BR&gt;　ぱちんと金具が外れる。&lt;BR&gt;　スコールの指紋を解除キーにしているバングルを難なく外し、セルフィはそれを握りしめると、背後にいる少女を振り返ってにこりと笑った。&lt;BR&gt;「……今から何を見ても、絶対ナイショだからね～？」&lt;BR&gt;「セルフィ」&lt;BR&gt;　驚いたような少女の代わりに、厳しい声を上げたのはスコールだった。&lt;BR&gt;「だいじょぶだよ、心配しないで」&lt;BR&gt;　セルフィはスコールを見上げて頷いた。心配してくれる気持ちが少し、嬉しかった。&lt;BR&gt;　それからレウィンに向き直り、白い布に手をかける。昨夜見たあの姿を思い出し、一瞬手が震えたが、セルフィは意を決して慎重にそれをはぎとった。昨夜は気づかなかった、防腐剤の匂いが鼻につく。&lt;BR&gt;「……レウィン、おはよ」&lt;BR&gt;　それが本当に生身の人間であったのかさえ疑わしい、青黒く膨れあがった肉の塊に、しかしセルフィはためらうことなく手を伸ばして優しく触れる。&lt;BR&gt;（ハイン）&lt;BR&gt;　普段はセルフィの奥深くで眠っている『友人』にそっと呼びかける。セルフィの両手に蒼い光が凝った。&lt;BR&gt;「！」&lt;BR&gt;　背後で少女が息をのむのと同時に、大きく膨れあがった光が一瞬で結晶化して手の内におさまる。セルフィは両の眼をそっと閉じた。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　魔女の始祖ハインが遺した力の遺産。使う者に大きすぎる負担を与え、時には生命力までも削り取ってしまうその力を、スコールは息をのんで見すえていた。&lt;BR&gt;　できることなら、そんなものは使わせたくはない。けれど大丈夫と告げたセルフィがあんな眼差しを向けた以上、何を言っても無駄なことも知っていた。&lt;BR&gt;　セルフィの小さな両手の上に浮かんだクリスタルが、音もなくはじけとぶ。&lt;BR&gt;　思わず両腕を上げて顔をかばうほどの、圧倒的な光量が部屋全体を満たした。&lt;BR&gt;「――――！」&lt;BR&gt;　それでも懸命にスコールは光の中眼を凝らし、大切な少女の姿を確認しようと努力する。部屋を満たした光がゆっくりとおさまっていく。&lt;BR&gt;　静かに降り注ぐ光を受け止めながら、セルフィがゆっくり眼を開き、レウィンを見下ろして優しく微笑んだ。&lt;BR&gt;　何となくその視線を追ってレウィンを見たスコールは、次の瞬間愕然と息をのむ。&lt;BR&gt;　全身に回った毒素で醜く膨れあがり原型すら留めていなかったその姿が、生前の、スコールも良く知る、年相応より少し幼い外見のレウィンのものに戻っていた。&lt;BR&gt;　蒼い光の雨を受け止めて、蜂蜜色の髪がきらきらと輝く。&lt;BR&gt;　呆然と眼の前の出来事を眺めている少女を振り返り、セルフィが淡く笑った。&lt;BR&gt;　おいでと差し伸べたセルフィの白い腕に、よろよろと少女が立ち上がる。少女の手を取ると、セルフィはそっと引き寄せて少女を枕元に立たせてやった。&lt;BR&gt;「あのまんまじゃ、可哀想だったもんね」&lt;BR&gt;　優しい笑顔は少女だけではなく、スコールにも向けられたものだった。&lt;BR&gt;　少女が声もなく泣き崩れる。セルフィは視線をレウィンに戻し、鈴の音のような声で静かに言った。&lt;BR&gt;「ありがと……たすけてくれて……」&lt;BR&gt;　細い指が少年の頬にそっと触れる。甘い紫紺の瞳は、もう永遠に開かれない。&lt;BR&gt;　何か言葉をのみこむようにして、セルフィがふと口をつぐんだ。&lt;BR&gt;　スコールはその沈黙に誘われるようにして、隣の彼女に視線を向けた。&lt;BR&gt;　スコールの視線の先で、大きな翠の瞳をそらすことなく死んだ少年の上に向けて、セルフィは静かで穏やかで何かを張りつめたような微笑を浮かべて、立っていた。&lt;BR&gt;　ぴんと伸びた背筋。&lt;BR&gt;　スコールの中で、ふいに、時間が逆流した。一年半前の、壊れたガーデンに。あの寂しい墓の群れに。&lt;BR&gt;　あの日背中しか見えなかった彼女の、スコールが眼にすることのなかった表情が、すぐ眼の前にあった。&lt;BR&gt;「……じゃあ、またね」&lt;BR&gt;　囁いて、セルフィは一度も顔をうつむけることもせずに、まっすぐな視線でスコールに一瞬だけ微笑んで、あの日と同じに凛と背筋を伸ばして部屋を出ていった。&lt;BR&gt;　そのまま後を追うことなど許さない、見事なくらいきっぱりとした姿勢の良さだった。&lt;BR&gt;　スコールは閉じるドアの音を耳にしながら、じっと眠っているようなレウィンの顔を見下ろした。&lt;BR&gt;　エスナをスコールにかけたあの瞬間、少年の紫紺の瞳は確かに微笑んでいた。&lt;BR&gt;　あの時何を少年が思ったのか、スコールは知らない。それに対しどんな言葉を向ければふさわしいのかも。&lt;BR&gt;　スコールが今言えるのは、たったひとつの言葉だけだった。&lt;BR&gt;　それを少年に告げるには少し覚悟が必要だった。スコールは彼女と同じように、背筋に力を入れた。&lt;BR&gt;「――忘れないから……」&lt;BR&gt;　この胸の痛みも。やるせなさも、自己嫌悪も。&lt;BR&gt;　記憶と共に未来まで持っていってやるから。&lt;BR&gt;&lt;BR&gt;　二十秒後、部屋には黒髪の少女と、眠る少年だけが残された。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　安置室から少し離れた所にセルフィは立っていて、スコールが出ていくと顔を上げて照れたように小さく笑った。&lt;BR&gt;「もう行くのか？」&lt;BR&gt;　訊ねたスコールに、かすかに苦笑してセルフィは小さく頷く。&lt;BR&gt;「帰省はじまって人減っちゃってるから」&lt;BR&gt;　もう荷物もまとめ直してある。このまま朝食も列車で取るつもりで出ようとしているセルフィの左手を取り上げて、スコールはかしゃりとバングルをはめながら静かに言った。&lt;BR&gt;「――俺も行ってかまわないか？」&lt;BR&gt;　セルフィの反応は数秒遅れた。&lt;BR&gt;「……え？」&lt;BR&gt;　眼をまたたく少女は、何を言われたか理解できないと言ったように小首を傾げている。&lt;BR&gt;　スコールは小さく笑いかけた。&lt;BR&gt;「休暇。とったんだ」&lt;BR&gt;　セルフィがますます眼をまるくする。&lt;BR&gt;　驚きというより、きょとんとしているといった方が正しい表情になった。&lt;BR&gt;「なんで～？」&lt;BR&gt;「……行きたいと思ったからだ」&lt;BR&gt;「でも……やな思い、するかもしれないよ？」&lt;BR&gt;「知ってる。……でもそれは、あんたも同じだろ？」&lt;BR&gt;　あれから頭を冷やして色々考えて、セルフィがトラビアに行く理由のひとつが、一部のトラビア生たちの賠償金を巡るトラビア政府との対立問題にあるのではないかということは、スコールもある程度予測を立てていた。&lt;BR&gt;　そして。そのごく一部のトラビア生たちが、決してバラムガーデンに良い感情を向けていないことも、この一年指揮官として学園長の補佐をしていたスコールは知っている。&lt;BR&gt;　話してくれればいいのに…という想いもない訳ではないが、この少女はもう、どうあってもこうなのだという諦めがスコールの中には芽生え始めていた。おかげでこんな得意でもない洞察力を発揮する羽目になるわけだが。&lt;BR&gt;「……俺も一応学園祭実行委員だしな。荷物まとめるから、部屋に戻るぞ」&lt;BR&gt;　軽く笑ってセルフィの手からトランクを取り上げ、自室へと歩き出す。&lt;BR&gt;「！」&lt;BR&gt;　どん、と突然背中から飛びつかれて、スコールは驚いて足を止めた。&lt;BR&gt;「セ……っ」&lt;BR&gt;　日頃の鍛錬のたまもので、もちろんそんな衝撃に転ぶことはなかったが、起きている事態に少しばかり動転しながら振り返る。ぎゅうと背中に顔を押しつけるようにしてしがみついていたセルフィが、小さな声でぽつんと言った。&lt;BR&gt;「……スコール、だいすき」&lt;BR&gt;　邪気のない素直な声音で言われたことに、スコールは顔が少し熱くなるのを自覚する。それをごまかそうと無駄に大きな咳払いをして、手を伸ばし小さな後頭部をそっと捕えた。&lt;BR&gt;　身体の前に移動してきたセルフィが、引き寄せられるままに背伸びをする。&lt;BR&gt;　スコールは頬をななめに傾けて、セルフィの唇に――&lt;BR&gt;&lt;BR&gt;　ものすごい大音響で、起床時間を告げるチャイムが鳴り響いた。&lt;BR&gt;&lt;BR&gt;　ガーデン中に響いているそのチャイムは、運悪くスコール達のすぐ真上にスピーカーがあったせいで、それはそれはバカでかい音量となって耳に届いた。&lt;BR&gt;　反射的にお互い相手を突き飛ばしたスコールとセルフィに、朝顔を合わせてからずっと忘れられていた照れが今さらのようにどっと襲いかかってくる。&lt;BR&gt;「……。…………。………………」&lt;BR&gt;&lt;BR&gt;　その日生徒たちの間では、なぜか壁の両端にそれぞれ張り付いて全身から火を噴いていたガーデン一有名なカップルの目撃談が、華々しい尾ひれをつけてガーデン中をかけめぐることになった。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;&lt;/TD&gt;&lt;/TR&gt;&lt;/TBODY&gt;&lt;/TABLE&gt;&lt;BR&gt;

<script data-viewer-zoom-script>
(() => {
  const stage = document.querySelector('.viewer-stage-image');
  const image = stage ? stage.querySelector('.viewer-image') : null;
  if (!stage || !image) {
    return;
  }

  const setZoom = (enabled) => {
    stage.classList.toggle('is-zoomed', enabled);
    image.setAttribute('aria-pressed', enabled ? 'true' : 'false');
    if (enabled) {
      const naturalWidth = image.naturalWidth || image.clientWidth || 0;
      const targetWidth = naturalWidth > 0
        ? Math.max(naturalWidth, Math.min(Math.round(stage.clientWidth * 0.92), naturalWidth * 4))
        : Math.round(stage.clientWidth * 0.92);
      image.style.width = `${targetWidth}px`;
      image.style.maxWidth = 'none';
      image.style.maxHeight = 'none';
      requestAnimationFrame(() => {
        stage.scrollTop = 0;
        stage.scrollLeft = Math.max(0, Math.round((image.scrollWidth - stage.clientWidth) / 2));
      });
    } else {
      image.style.removeProperty('width');
      image.style.removeProperty('max-width');
      image.style.removeProperty('max-height');
      stage.scrollTop = 0;
      stage.scrollLeft = 0;
    }
  };

  const toggleZoom = () => {
    setZoom(!stage.classList.contains('is-zoomed'));
  };

  image.setAttribute('tabindex', '0');
  image.setAttribute('role', 'button');
  image.setAttribute('aria-label', '逕ｻ蜒上ｒ諡｡螟ｧ縺ｾ縺溘・邵ｮ蟆・);
  image.setAttribute('aria-pressed', 'false');

  image.addEventListener('click', toggleZoom);
  image.addEventListener('keydown', (event) => {
    if (event.key === 'Enter' || event.key === ' ') {
      event.preventDefault();
      toggleZoom();
    }
  });

  stage.addEventListener('click', (event) => {
    if (event.target === stage && stage.classList.contains('is-zoomed')) {
      setZoom(false);
    }
  });

  window.addEventListener('keydown', (event) => {
    if (event.key === 'Escape' && stage.classList.contains('is-zoomed')) {
      setZoom(false);
    }
  });
})();
</script>
