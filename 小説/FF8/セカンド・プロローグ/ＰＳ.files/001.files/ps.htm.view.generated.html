    &lt;TD align=left width=537&gt;&lt;SPAN&gt;&lt;BR&gt;&lt;BR&gt;&lt;/SPAN&gt;
      &lt;P align=center&gt;&lt;SPAN&gt;* * P O S T S C R I P T * 
      *&lt;BR&gt;&lt;/SPAN&gt;&lt;/P&gt;&lt;SPAN&gt;&lt;BR&gt;&lt;BR&gt;　お疲れさまです。ようやく完結です。&lt;BR&gt;　こ～んなくそ長い（笑／ちなみに400字詰原稿用紙換算で1120枚ですよ…）しかも重いドシリアス超ウケ悪そうなお話を最後まで読んで下さった方、本当にありがとうございました。&lt;BR&gt;　あとがきも嫌になるくらい長くなりそうなので、嫌な方はさくっと飛ばしてしまってください（笑）&lt;BR&gt;（ネタバレが大量に含まれてますから、小説を読破されていない方はお読みにならない方が賢明です）&lt;BR&gt;&lt;BR&gt;　このお話は、私が2000年にサイトを立ち上げる、ほんの少し前に思いついて書き始めた物語です。&lt;BR&gt;　サイトを作る準備をしている頃、友人と交換していたメールではじまった「スコエル談義」（FF8REVIEWにあります）が事の発端でした。&lt;BR&gt;　お読み頂いている方はご存じでしょうが、「スコエル談義」は「もしFF8のヒロインがエルオーネだったら」という前提の元に、FF8のストーリーを妄想全開で作り替えてしまおうというアホ企画なのですが（笑）、この時友人がぽろっと言った「これが終わったら次は『スコセル談義』をやりましょう」という一言で、私の頭の中に「もしセルフィがヒロインだったら！？」という空想（妄想とも言う）が広がってしまったのです。&lt;BR&gt;　けれど、その時の私の頭の中に、ヒロインを張っているセルフィというのが、どうにも思いつきませんでした。&lt;BR&gt;　スコセルは好きなのに、どうも本編中でこの二人がラブラブになっている様子というのが思い浮かばない。&lt;BR&gt;「スコエル談義」だとあんなにノリノリで思い浮かんでいたのに、セルフィになるとまったくダメ。&lt;BR&gt;　これはなかなか自分自身にとって、面白い発見でした。&lt;BR&gt;　本編中の二人は、私の中ではどうやってもくっつきそうもないらしい。&lt;BR&gt;　じゃあ、エンディング後の二人だったらどうなんだろう？&lt;BR&gt;　これが出発点でした。&lt;BR&gt;　エンディングを迎えて、少し時間が経って、キャラクター達がみんな少しずつ成長した、そんな時期のお話。&lt;BR&gt;　新しい任務にスコールとセルフィが派遣された後のお話、とかだったらどうだろう？&lt;BR&gt;　そう色々思いを巡らせた時に、このお話の第15話、スコールの中にセルフィがジャンクションして一緒に戦っている、あの場面が頭の中に降ってきたのでした。&lt;BR&gt;　私はその場面が妙に気に入って、セルフィがジャンクションしてるくらいだから、きっとエルオーネがその場にいるはず→ってことは多分エスタの出来事→エスタといえばラグナ様→スコセルの恋愛とラグスコの親子愛を絡めて書いたら、けっこう面白くなるんじゃない？と展開して、ノリだけで一気に書き上げたのが、この物語の第1話でした。&lt;BR&gt;　当時はもう少し短くなるつもりでいたので、一話のボリュームが今の半分ほど、つまりサイト開設時にアップしていたのは第1話と第2話という形になっていました。&lt;BR&gt;&lt;BR&gt;　が、サイトにアップしてからこのお話は、およそ2年という長期に渡って放置されることになりました（笑）&lt;BR&gt;　だって、アップした第1話から、第15話の例のシーンまでの間を、私はなんにも考えていなかったんです。&lt;BR&gt;　完璧な見切り発車をしたものの、そこからぴたりと筆が止まってしまって、仕方がないので書きたくなるまで置いておこうと諦めたんです。&lt;BR&gt;　その間、ちょこちょこと細かいストーリーは頭の中で練っていたのですが、書き出すまでには至りませんでした。&lt;BR&gt;　続きを書こうと思い立ったのは、ふとFF8をプレイし直したのがきっかけです。&lt;BR&gt;　改めてやり直したら、スカコーンと（笑）気持ちの良いくらいハマってしまったわけです。&lt;BR&gt;　初プレイ時には気づかなかったり見落としたりしていたイベントも全部見て、スコセルって可愛いな～良いな～と改めてハマりまくり、ずっとOFFになっていた「スコセルスイッチ」がONになって、そこでようやく、ずっと放置し続けていたこのお話の続きを書いてみよう、と思い至ったのです。&lt;BR&gt;　続きを書き始めたのは2001年の夏の終わり、一話を書いてから1年半が経過していました（笑）&lt;BR&gt;&lt;BR&gt;　最初の段階ではこの話、ラグナサイドの人達と、スコールとセルフィしか出ない予定でした。&lt;BR&gt;　開設当時の補足説明にも、スコセルとラグナサイドの人しか出てこないと書いてありました。&lt;BR&gt;「スコセルがエスタに任務に出向いて、セルフィの姿をした敵がエスタで暴れてセルフィが捕まっちゃって、すったもんだがあったけど敵を倒して大団円」くらいの考えしかなかったので（笑）&lt;BR&gt;　ラスボス（笑）の時に応援みたいな感じでサイファーとか出せたらいいな～と思ってたくらいでした（登場シーンまでちゃんと考えてたし（笑）なかなか格好良い登場シーンだったので、お蔵入りしちゃうのは残念なのですが）。&lt;BR&gt;　放置していた1年半の間に、『敵』はセルフィが初めてジャンクションしたＧ．Ｆ．にしよう、とか、セルフィのスロット魔法についての一考察（笑）とか、細かいネタはたくさん生まれて煮詰めていたのですが、改めてハマり直して、いざ書くぞと思ってもやっぱりうまく進まない。&lt;BR&gt;　さんざん悩んだ結果、どうも私はスコリノがきちんと決着ついてないと書けないらしいと気づきまして。&lt;BR&gt;　スコセルファンの方はスコセルが読みたいわけで、スコリノなんてきちんと掘り下げてやる必要ないよね～と自分の中では「物語開始時にはすでに別れているｏｒもう別れ話は出てしまってる」という設定でずっといたのですが、どうもこの初期設定が自分の中で納得が行っていなくて、書き進められずにいたらしいとわかったんですね（物語冒頭のスコールとゼルの会話も、本当はもっと決定的な所まで行っちゃったスコリノについての会話のつもりで書いてました。最終的に辻褄を合わせることができてほっとしたのですが）。&lt;BR&gt;　私の中のスコセルってカップリングには、スコリノってすごく重要だったんですよ。作中くどいくらい書きましたけど、とにかくゲーム本編中のスコールとセルフィって価値観やたら一致してて、お互い一人で全然オッケーな人達で、どちらかが意識改革しないとまず、恋愛関係になんてならなさそうな人達だったので。&lt;BR&gt;　リノアによって価値観が微妙に変化したスコールでなければ、そしてその上でSeeDであることを選択するような価値観でなければ、スコールはセルフィに惚れたりしないし、セルフィはスコールを選ばないだろうというのが私の結論だったんですね。&lt;BR&gt;　なので、その前提にあるリノアをないがしろにはできないなって思いました。スコセル小説なのにやたらとリノア出てきたのはそのせいで（笑）、リノアファンにはあまり読まれたくないんですが、あの別れのシーンとか、自分で書いてて何ですが好きなシーンのひとつだったりします。&lt;BR&gt;　スコセル小説で、スコリノのキスシーン書いたのなんて、私くらいなんじゃないかとは思いつつ（笑）第11話と並んで、アップ後の反応が怖い回でもありました。怖いけど、でもどうしても書きたい！！という、ジレンマに満ちてました（笑）&lt;BR&gt;&lt;BR&gt;　私にとってのスコセルって、とにかく「対等であること」が基本でした。対等なんだけど、なぜかお互い相手が自分より前を歩いていると錯覚を起こしてる、不器用なカップルというイメージで。&lt;BR&gt;　リノアはスコールにとって、あくまで護るべき立場にある人だし、キスティスだと兵士としては優秀なんだけど、精神的な面でいささか繊細な面があって、頼りがいありそうなスコールに寄りかかりがちになってしまう。&lt;BR&gt;　自分の荷物は自分で持っちゃう、持てるだけの実力もある、というセルフィだけが、スコールの周辺にいる女の子の中で唯一、対等でいられる存在だったんですよね。&lt;BR&gt;　そういう子だから、スコールはきっと傍にいて、すごく楽だったと思うんですね。リノアと似て、セルフィは好悪の感情がわりと素通しなので、嫌われていないかと心配する必要もまったくないし。&lt;BR&gt;　ゲーム中のスコールが妙にセルフィに優しくて甘かったのも、この辺が大きいんじゃないかと思うんですよ。&lt;BR&gt;&lt;BR&gt;　それから、知り合いの方に頂いたスコ&#215;リノ本の存在が大きいかな。&lt;BR&gt;　その本は、やっぱりED後の二人の話で、スコールがSeeDとして長期の任務を与えられることになって二人が喧嘩して、結局最後はスコールがSeeDをやめてリノアとずっと一緒にいよう、って感じで終わっていたんですね。&lt;BR&gt;　あー、やっぱそうだよなーって思ったんです。&lt;BR&gt;　スコリノがあのED後も続いていくのに、スコールがSeeDを続けてたら無理があるんじゃないかって思ってたんです。&lt;BR&gt;　SeeDであるスコールって、リノアの反発し続けている軍人の父親とまったく同じ立場にいますよね。&lt;BR&gt;　一緒に戦える立場にある内はともかく、そうでなくなった時、リノアは『SeeDのスコール』をどこまで容認できるんだろう？って、ゲーム本編中もずっと考えていたんです。&lt;BR&gt;　なので、スコリノを成立させるには、スコールがSeeDであってはいけないんじゃないのかなと。（別パターンとしてリノアがガーデンに入学する、もしくはSeeDになる、というのも考えられたんですが、どうも彼女のあの性格では傭兵には向いてないんじゃないかという気がするんですよね……）&lt;BR&gt;　それはそれでひとつの解釈なので、それを正しいとか違うとか言うことは誰にもできないんですが、とりあえず私の中のスコールは違っていたんですね。スコールにとっても「SeeD」は大切なものだったと思ったんです。&lt;BR&gt;　じゃあ、スコールがもし、SeeDであり続けることを選択していたら？&lt;BR&gt;　そうしたら、スコセルってカップリングが成立することだって、十分ありえるんじゃないだろうか。&lt;BR&gt;　裏返せば、スコールがSeeDであることを選択しない限り、私にとってスコセルって成立しないカップリングだったんです。&lt;BR&gt;&lt;BR&gt;　私がFF8で一番面白いな～と思ったのが、この「SeeD」って存在でした。&lt;BR&gt;　アーヴァインのように、実力はあってもSeeDを目指さない人ももちろんいるけれど、基本的にはSeeDを目指すのが当然で、SeeDであることが何よりの誇りで、ガーデン生の頂点に立つ存在であるSeeD。&lt;BR&gt;　スコール達SeeD4人組もその通り、かっちりきっかり「SeeDである」ことに矛盾も疑問も持ってない。「SeeDではない」自分のことなんて、考えたこともないんじゃないかってくらい、「SeeD」が深く根付いているんですね。&lt;BR&gt;　ゲーム中で最初にそれを感じたのは、ミサイル基地ミッションの時です。&lt;BR&gt;　あの時、ミサイルがガーデンに飛ばされるって聞いて、セルフィはミサイル基地に行きたいとスコールに訴えますよね。&lt;BR&gt;　たとえばあれがリノアだったら、問答無用でミサイル基地にすっ飛んでっちゃうんじゃないかと思ったんです。&lt;BR&gt;　けれどセルフィはあくまでもSeeDとして、班長であるスコールの判断を仰ごうとした。あの場でスコールが「ダメだ」と言えば、多分セルフィは文句を言いながらも従ったと思います。そのことで後に死ぬほど後悔しても。&lt;BR&gt;　ミサイル基地から帰還した後もそう。セルフィの性格なら「トラビア行きたい行きたい～！」って大騒ぎしたって不思議はないのに、やっぱりSeeDとしての立場で遠回しにトラビア行きをお願いしてる。あの場合もやっぱり、スコールがトラビアに行かなければ、セルフィもそれに従い独断で突っ走るような真似はしないでしょう。&lt;BR&gt;　スコールも同じように、うだうだとベッドに寝転がって物思いにふけっている（笑）時も「SeeDをやめる？考えたくないな」なんて言ってるし、リノアが魔女だと知ってからも「俺が倒す魔女はリノアじゃない」と言いきるだけで、別にSeeDをやめてまでリノアと運命を共にとは考えてない。リノアを背負ってガーデンを飛び出した時点でSeeDの資格剥奪くらいは覚悟していたとしても、自らSeeDを辞めるつもりは全然ないんですよね。&lt;BR&gt;　エンディングで過去のイデアに「あなたは誰？」と聞かれた時にも、「俺はガーデンのSeeD」と堂々と名乗っています。&lt;BR&gt;　友達思いのセルフィにとっての故郷、スコールが生まれて初めて恋したリノア。それと比較しても比較しきれないほど大切な「SeeD」。&lt;BR&gt;　この辺りをもう少しだけ煮詰めて、追及して書いてみたいな、と思いました。&lt;BR&gt;　書いている最中にアメリカの同時多発テロが起きたことで、私の中でもちょっと色々価値観が変化して、最終的には当初の展開とは少し違ってしまいましたが（13話のセルフィのセリフとかが大幅に変化しました）、これで良かったかなと自分では思っています。&lt;BR&gt;&lt;BR&gt;　それから、私がやりたかったこと。&lt;BR&gt;　スコセルでFF8を補完した～い！というのもあったんですが、それ以上に、世界観はかなり好みなのに、なんだか突っ込みどころ満載なFF8に突っ込みを入れまくりたい！！というのがありまして（笑）&lt;BR&gt;　せっかく長編なので、そこらへんも全部盛り込んだ結果が、この長さです。&lt;BR&gt;「結局ハインってなんだったんだ？」とか「セルフィとリノアってホントに似てるか～？」とか「ラグナとスコールの親子関係の修復を忘れてませんかー？」とか「セルフィのスロット魔法って、魔女そのものじゃん」とか、そのあたりを（笑）&lt;BR&gt;　ちなみに「セルフィとリノアの相似点」については、連載中大好きなＦＦ小説作家さんとメールで少しお話させて頂いたのですが、お互いやっぱり「似てないよねぇこの二人！」ってことで意見が一致してしまったので（…）やっぱり似てないと今でも思っています（笑）&lt;BR&gt;&lt;BR&gt;　途中アーヴァインに魔法使わせるのが悩み所で、ＦＦ8の矛盾点のひとつでもあったんですが、ＧＦをジャンクションしてないと魔法使えないって設定なのに、ＧＦを許可されてないガルバディア兵とかばんばん魔法使ってるんですよね。&lt;BR&gt;　どうしようかな～と考えたんですが、現実としてＧＦなしでも魔法はストックできてるみたいなので、多分ガーデン以外では、ＧＦに代わる疑似魔法システムみたいなのがあるんだろうと思うことにしました。ＧＦと違って、威力を増すことはできないとか、何か制約があるシステムなんだろうな～とちょっと妄想（笑）&lt;BR&gt;&lt;BR&gt;　ラグナとスコールのお話は、エピローグにちょこっと書くだけのつもりが、ずいぶん長くなってしまいました。&lt;BR&gt;　いえ本当は全編を通してスコセルの恋愛と絡めて書くつもりが、最終話にキチキチに詰め込んでしまったというのが正解なのですが……；&lt;BR&gt;　ラグナがどうしてウィンヒルに戻ることなく、そしてスコールとエルオーネをほったらかしにしてしまったのかがずっと私の中では疑問で、しかも本編できちんと親子の名乗りを上げるでもないし、ラグナ編で語られたラグナ像とここだけがどうしても噛み合わずにいたんです。&lt;BR&gt;　で、ネットとか見てもこの辺り考察されてる方とか見つけられなくて、ずっと自分の中で保留にしていたんですが、ある日突然ふっと、もしかして魔女暗殺ミッション時のスコールと、大統領に持ち上げられたラグナは同じだったんじゃないか？って思いついて。&lt;BR&gt;　そこをクリアした後は、すらすら書けて楽しかったです。&lt;BR&gt;　その前のセルフィ精神世界編も含めると、事件解決後の後日談がえらい長くなってしまって、小説としては何か不格好になっちゃったんですが、セルフィにいつまでも「ひとりでも全然オッケー」な価値観でいてもらうわけにいかないし、ラグナとスコールの親子関係を削るのもどうしても嫌だったんで、押し通しちゃいました。&lt;BR&gt;　セルフィの精神世界編は書いてて楽しかったです。楽しいけど、全然書き進まなくて苦しかったですが（笑）&lt;BR&gt;　あとはせっかく幼なじみって設定があるなら、やはり「小さい頃の約束」は必須だろう！みたいな（笑）……偏見？&lt;BR&gt;&lt;BR&gt;　ちなみにハイン関係のおとぎ話は、別に私のオリジナルではありません。&lt;BR&gt;　エルオーネを探す途中、白いSeeDの船に立ち寄る機会があると思うのですが、実はあの後もう一度白いSeeDの船に行って小さな子供達に授業している白いSeeDに話しかけると、ハインのおとぎ話を教えてくれるんですね。&lt;BR&gt;　初プレイでは聞きそびれていまして、このお話を書き始めた当初も実は知らなかったんですが、エルオーネの瞳の色を確認したくて（笑）FF8をプレイし直していたら偶然この授業を聞いて、なんだーハインってなんか面白い素材なんじゃん？とか盛り上がって、このお話におけるハインの重要度が一気にアップしました（笑）&lt;BR&gt;　おとぎ話ではハインは人間を『便利な道具として創った』ってあるんですが、その後長い眠りについちゃって目覚めた時には人間がこの星を支配していた、ってふうになっているんですね。&lt;BR&gt;　これってちょっと変だな～って思ったんです。&lt;BR&gt;　だって、道具ってことは『使う』ことが前提で創られるものなわけで、これから眠りにつきましょうって人（いや人じゃないけど）がわざわざそんなもん創るなんて労力の無駄もいいところでしょう。&lt;BR&gt;　しかも創造主のくせに、知恵が回らなくて人間にやりこめられて追いつめられ、力の半分をあげるから取引しましょうと持ちかけるなんて……ありえませんて、絶対。&lt;BR&gt;　結局ハインは物理的な力しか持たない役立たずの半身だけを人間に引き渡し、魔力をごっそり抱えて姿を消してしまうわけですが、逃げたにもかかわらず何故か『魔女』なんて存在に魔力を継がせていたりする。&lt;BR&gt;　やることが、なんかこう行き当たりばったりというか、一貫性がないんですね。実は結構詰めの甘いタイプっぽいし、人間に追いつめられてるくらいだから、きっと挑発されるとカッとなって理性をなくすタイプでもありそう。&lt;BR&gt;　そんなこんなで色々妄想ふくらませた結果、どうもハインは神様と呼ぶには格が足りない感じがして、このお話みたいな解釈になりました。&lt;BR&gt;　神様ならともかく、まったく別種の生き物って解釈でいけば、人間の女の子に恋くらいするかな～なんて。&lt;BR&gt;　何気にセルフィは人外の生き物に好かれそうなイメージがあったんです（笑）&lt;BR&gt;&lt;BR&gt;　そうそう、このお話を書くにあたって決めていたことがいくつかありまして。&lt;BR&gt;　そのひとつが、『固有名詞はなるべく使わない』でした。&lt;BR&gt;　もちろんゲーム中に出てきた単語は使ってもオッケーでしょうが、動植物みたいなものに関しては、ライオンが伝説上の獣という設定になっていたりしてることを鑑みて、やっぱり固有名詞は避けた方が、世界観を壊さずにすむだろうとの考えからそう決めました。&lt;BR&gt;　作中出てきてる「陽光色の花」って、要するにひまわりです。頑張って色々な表現でごまかしましたが（笑）あの世界に、ひまわりに相当する花があるんだと思って下さい。&lt;BR&gt;　ハインの「青い鳥」もそう。あの世界にメーテルリンクの青い鳥の話があるとは思いませんが、まぁ似たような童話があるんだろうなってことで（笑）一応ストーリーとかは考えていたんですが、出す必要性がなかったのでお蔵入りです。&lt;BR&gt;　青（蒼）と緑（翠）って組み合わせにしたかったんです。星の色だなと思って。&lt;BR&gt;&lt;BR&gt;　それからもうひとつ決めていたことが、『既成キャラは誰も殺さない』ってことでした。主役級のキャラ以外の、白いSeeDさんとか、端役でも名前のあるキャラは全部。&lt;BR&gt;　一応パラレルじゃないつもり～！なんて銘打ってしまった以上、キャラクターを殺しちゃうのはまずいよね、ってことで。怪我はやたらさせましたけど（笑）&lt;BR&gt;　ハインさんに関しては……まぁ例外ということで（笑）眼をつぶってやってください。&lt;BR&gt;&lt;BR&gt;　話も長いのに、あとがきまで長いというこの不格好さ（笑）&lt;BR&gt;　長い間おつきあい下さいました方、本当にお疲れさまでした。きっとついて来れずに脱落してしまった方も多いのではないかと思われる長さなだけに、本当に本当にお疲れさまです。&lt;BR&gt;　もし反応悪かったら、カッコ悪いのでこっそり下ろして何事もなかったかのように振る舞おうとか思っていたので（笑）、最後まで書けたことを感謝しています。最後まで書かせて頂いて、ありがとうございました。&lt;BR&gt;　私の書く文章って、Webで読みやすいと言われる文章（シンプルで、一文一文が短い文章が一般的に読みやすいとされています）からはかけ離れていると思うんですよ。&lt;BR&gt;　形容詞多いし。一文長いし、読点も少な目だし。&lt;BR&gt;　こんな読みにくさMAXの文章を、しかもこんな長期に渡って読んで下さる方がいたというのが、もうホント、自分としては奇跡的なことなんで（笑）とっても大感謝しています。ありがとございます＞＜&lt;BR&gt;　今後は……少しだけまだネタが残っていたりするので、こんなくそ長い話ではなく（笑）短編～中編くらいのお話をちまちまっと書こうかなと思ってたりします。この長編の後日談的なお話とかも頭の中にあるんですが、ちとオリジナル要素が強い上にやっぱりダークでシリアスなので(笑)、読んで下さる方の反応次第で書くかどうか決めようと思ってます。&lt;BR&gt;　ネタがなくなったらそこで終わり、くらいの軽いスタンスで、マイペースに更新していくと思いますので、お気が向かれましたらおつきあい頂けると嬉しいです。&lt;BR&gt;　リクエストとかあったら気軽にちょこっと教えてやってみてくださいね。書けるかどうかは別問題ですが（笑）&lt;BR&gt;（関係ないけど私の元には「エロを書いて」というリクと「エロだけは書かないで」というリク（？）が来てるんですが……総計としては裏URL請求状況からすると書かないで派の方のが多いのかな？）&lt;BR&gt;&lt;BR&gt;　それでは最後になりますが。&lt;BR&gt;　このお話の第一稿を書き上げた直後の日記で、文庫3冊分になったけど読んでくれる人いる？という呟きに「絶対読むよ」と言ってくれた方。&lt;BR&gt;　読んでるよ、次も待ってるよと掲示板やメールで声を聞かせてくれた方。&lt;BR&gt;　タイトル募集アンケなんて企画に参加してくださった方。&lt;BR&gt;　お話がたくさん増えて、ボリューム見ただけで帰りたくなるような量になってから「今さらですが…」と一話からがんばって読んで下さった方。&lt;BR&gt;　お声は出されなくても、更新するたびにそっと読んで行ってくださった方。&lt;BR&gt;　本当に本当にありがとうございました。&lt;BR&gt;&lt;BR&gt;みどり　拝&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;※最後に書いてる最中に聴いていたＢＧＭなど。&lt;BR&gt;　PCにコピーして、「バトル用」とか「切ない系」とか分類して、シーンごとにかけていたのですよ（笑）&lt;BR&gt;&lt;BR&gt;Dearest（浜崎あゆみ）←自分的メインテーマだったですよ（笑）&lt;BR&gt;You

<script data-viewer-zoom-script>
(() => {
  const stage = document.querySelector('.viewer-stage-image');
  const image = stage ? stage.querySelector('.viewer-image') : null;
  if (!stage || !image) {
    return;
  }

  const setZoom = (enabled) => {
    stage.classList.toggle('is-zoomed', enabled);
    image.setAttribute('aria-pressed', enabled ? 'true' : 'false');
    if (enabled) {
      const naturalWidth = image.naturalWidth || image.clientWidth || 0;
      const targetWidth = naturalWidth > 0
        ? Math.max(naturalWidth, Math.min(Math.round(stage.clientWidth * 0.92), naturalWidth * 4))
        : Math.round(stage.clientWidth * 0.92);
      image.style.width = `${targetWidth}px`;
      image.style.maxWidth = 'none';
      image.style.maxHeight = 'none';
      requestAnimationFrame(() => {
        stage.scrollTop = 0;
        stage.scrollLeft = Math.max(0, Math.round((image.scrollWidth - stage.clientWidth) / 2));
      });
    } else {
      image.style.removeProperty('width');
      image.style.removeProperty('max-width');
      image.style.removeProperty('max-height');
      stage.scrollTop = 0;
      stage.scrollLeft = 0;
    }
  };

  const toggleZoom = () => {
    setZoom(!stage.classList.contains('is-zoomed'));
  };

  image.setAttribute('tabindex', '0');
  image.setAttribute('role', 'button');
  image.setAttribute('aria-label', '逕ｻ蜒上ｒ諡｡螟ｧ縺ｾ縺溘・邵ｮ蟆・);
  image.setAttribute('aria-pressed', 'false');

  image.addEventListener('click', toggleZoom);
  image.addEventListener('keydown', (event) => {
    if (event.key === 'Enter' || event.key === ' ') {
      event.preventDefault();
      toggleZoom();
    }
  });

  stage.addEventListener('click', (event) => {
    if (event.target === stage && stage.classList.contains('is-zoomed')) {
      setZoom(false);
    }
  });

  window.addEventListener('keydown', (event) => {
    if (event.key === 'Escape' && stage.classList.contains('is-zoomed')) {
      setZoom(false);
    }
  });
})();
</script>
