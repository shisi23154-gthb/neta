      width=537&gt;&lt;SPAN&gt;&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　Ｇ．Ｆ．過適合症候群。&lt;BR&gt;　これまでバラムガーデンでも症例の出たことのない、SeeDであるスコールでさえ聞いたことのなかった症候群。&lt;BR&gt;　Ｇ．Ｆ．と最も相性が良く、脳が適合しすぎた故にＧ．Ｆ．の力を限界以上に引き出しすぎ、結果脳に障害をもたらすというＧ．Ｆ．の副作用だ。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;『……お姫さんはＧ．Ｆ．に適合しすぎて、野外訓練中にＧ．Ｆ．を暴走させちまったんだよ。モンスターも同じ班の奴らも、抑えようとした教員まで全員あの世に送っちまったらしい』&lt;BR&gt;「な……」&lt;BR&gt;　スコールは愕然と息をのんだ。&lt;BR&gt;　そんなスコールの反応には気も留めず、サイファーはどこか面白そうに言葉を続ける。&lt;BR&gt;『間近にいたヤツが全員死んでるからわからんが、生き残ったヤツが証言するには、突然青い炎があたりを包み、お姫さんの眼の前にいた奴らが骨ごと燃え崩れ、追い打ちのごとく花嵐が吹き荒れて炎を免れた人間の息の根を止めていった、……と書いてあるんだよ。&lt;BR&gt;　で、Ｇ．Ｆ．をどうにかお姫さんの中から取りだして捕獲した担当教員が数時間後に死亡。お姫さんは一週間まるまる意識不明で生死の境をさまよったが、奇跡的に意識を取り戻し、精神障害も起きなかった。……けど、Ｇ．Ｆ．のことを含め、過去の記憶の大部分が欠落してたってよ』&lt;BR&gt;　そしてトラビアガーデン側は、セルフィの放校処分も含めた対策を検討したが、セルフィ自身が完全に何も覚えていなかったこと、Ｇ．Ｆ．の危険性をよく知らない幼い彼女に悪意はありえなかったこと……などの事情を鑑みて、結局野外訓練中の不幸な『事故』としてすべてを処理した――。&lt;BR&gt;（じゃあ、野外訓練中に倒したモンスターの中にＧ．Ｆ．が入っていたってのは、セルフィの記憶に残っていたんじゃなく、教員がセルフィに後から教えたことなのか？　じゃあ実際はどうやってセルフィはＧ．Ｆ．を手に入れたんだ？）&lt;BR&gt;　そんな強大無比のＧ．Ｆ．が、トラビアを徘徊しているモンスターごときの中に入っているとは考えにくい。&lt;BR&gt;『でよ、まだ続きはあるんだぜ……お姫さんには、ひとつ特技があったよなぁ？　スロット魔法ってヤツがよ』&lt;BR&gt;　セルフィだけが使える、特別で強力な魔法――ただし出てくるのは運次第。&lt;BR&gt;『そのＧ．Ｆ．をジャンクションしてたお姫さんは、スロット魔法を自在に使ってたって記録が残ってるぜ』&lt;BR&gt;「……！？」&lt;BR&gt;『フルケアとジエンド、このふたつが使えりゃ、そりゃ向かうところ敵なしだよなぁ？』&lt;BR&gt;　ジエンド――どこまでも美しい花園の幻影に敵を包み、花の嵐の中夢見るうちに息の根を止める――セルフィだけが持つ、最強魔法。&lt;BR&gt;（スロット……？　花……嵐…………？）&lt;BR&gt;　先ほどのサイファーの説明がぐるぐると頭の中をかけめぐる。&lt;BR&gt;　もしセルフィがスロット魔法を自在に操ることができるのだとしたら――&lt;BR&gt;『魔女も使えねぇ、魔女より凶悪な魔法を、ストックするでなしに自由に使う――なぁスコール、こんな女がいた場合、そいつを普通の人間ってお前は思うかよ？』&lt;BR&gt;「――――」&lt;BR&gt;　言葉を完全に失ったスコールの耳に、サイファーの笑い声が遠くに聞こえた。&lt;BR&gt;（だってそれは……ある意味完全な『魔女』なんじゃないのか？）&lt;BR&gt;　頭の中は混乱中である。&lt;BR&gt;　そもそも魔法というのは、魔女だけが使うことのできる特殊な力のことなのだ。&lt;BR&gt;　スコール達が戦闘に使用する魔法は『疑似魔法』。つまり魔女の使う力を解析し、人工的な、あるいは自然界にあるエネルギーをストックし放つことで魔法に似た効果を及ぼすものなのだ。&lt;BR&gt;　だから疑似魔法は、魔女の使う魔法と同じ種類の魔法しか作られない。&lt;BR&gt;　稀に、キスティスのように、モンスター固有の魔法を拾得し使うことのできる者もいるが、それだって元はモンスターが持っていた魔法である。&lt;BR&gt;　もしも、疑似魔法をストックするでもなく、魔女やモンスターが持つ魔法以外の、魔法を駆使する者がいるとするなら、それは――&lt;BR&gt;『トラビアガーデンの奴らがお姫さんを放校処分にしなかった理由がこれだな』&lt;BR&gt;　にやりと笑うサイファーの皮肉げな顔が、眼に浮かぶようだった。&lt;BR&gt;『手元に置いておきたかったんだろうぜ。力自体はコントロールできなくなったが、コントロールする方法自体はあるんだからな。……魔女を凌ぐ、新しい魔女ってヤツだ』&lt;BR&gt;（新しい……魔女……）&lt;BR&gt;　スコールの脳裏に、ぼんやりと姉エルオーネの顔が浮かんだ。&lt;BR&gt;　人になく、魔女にもない特殊能力を持ったために流浪の生活を強いられた薄幸の美女。&lt;BR&gt;　もし魔女がセルフィの能力の可能性を知ったなら、きっとおそらく……エルオーネと同じに追われただろう。&lt;BR&gt;　自分の命すらおびやかす危険性を持つ存在を、世界の果てまで追っても消し去ろうとしただろう。&lt;BR&gt;『結局、ガーデン側はお姫さんの能力についてはトップシークレットにして、本人にも他校にも真実を明かさなかった。&lt;BR&gt;　本来ならＧ．Ｆ．の専門はバラムだからな、バラムにＧ．Ｆ．ごとお姫さんを引き渡すのが正しい選択だったんだろうがよ……まぁどこの世界にも強欲なヤツってのはいるもんだ。&lt;BR&gt;　お姫さんがSeeDを希望し始めた時には相当ビビったろうな。SeeDになっちまえばＧ．Ｆ．はジャンクションし放題、隠しに隠したダイヤの原石がバレちまうってな』&lt;BR&gt;「……なんで止めなかったんだ？」&lt;BR&gt;『お姫さんに何て言って止めるんだよ？　昔の事故の真実を伝えちまえば、必然的にお姫さんの能力のことだってバラさねえわけにいかねーだろ。&lt;BR&gt;　このあたりの記録は残ってねーから想像だけどよ……多分、Ｇ．Ｆ．適性検査で引っかかると奴らは踏んだんじゃねえのか？　一度事故ってるしな』&lt;BR&gt;　サイファーの説明に、スコールもなるほどと納得した。&lt;BR&gt;　セルフィの性格からしても、なまなかの理由では彼女の決意を翻すことなど不可能だろう。&lt;BR&gt;　バラムガーデンに転入拒否を依頼したくとも、そもそもＧ．Ｆ．がらみの事故をバラムガーデンに隠匿している時点でトラビアガーデンの方が分が悪い。理由を説明した途端、セルフィはバラムに引き渡し決定である。&lt;BR&gt;　だがセルフィはＧ．Ｆ．にあまりに適合しすぎ、暴走させ、記憶の大半を欠落させた過去を持っている。&lt;BR&gt;　Ｇ．Ｆ．適性検査に引っかかれば、もちろんSeeDになることなど不可能だ。SeeDになれなければ、バラムにわざわざ転校する必要はなくなってしまう。セルフィはトラビアガーデンに戻るだろう。&lt;BR&gt;　SeeDになれなくてもセルフィは優秀な兵士なのだから、トラビアが受け入れることに不自然さはない。&lt;BR&gt;（やけっぱちにも見えるが、それなりに考えたんだな……）&lt;BR&gt;　だがトラビアガーデン最大の誤算は、セルフィがそのままSeeDになってしまったことである。&lt;BR&gt;　学生が手に入れられる程度のＧ．Ｆ．では、セルフィの能力を暴走させるほど開花させることはできなかったのだ。&lt;BR&gt;（エデンを装備したって異変はまったくなかったしな……）&lt;BR&gt;　スコールの知る限り、エデン以上の力を持つＧ．Ｆ．の存在など聞いたこともない。&lt;BR&gt;　……つまり、セルフィが幼い頃ジャンクションしたＧ．Ｆ．とは、エデン以上のレベルのＧ．Ｆ．ということになる。&lt;BR&gt;『例のＧ．Ｆ．の姿を見た奴は誰もいねえ。死んじまってるからな。故意に残さなかったのかそこら辺はわからねえが、記録にも残ってねえ。ここにあるポンコツに、Ｇ．Ｆ．データは一切入っちゃいなかった。&lt;BR&gt;　なぁスコール……オレが今こうやって好き放題見てるデータ、とっくの昔にどっかに流れてたらと考えたら、お前どう思う？』&lt;BR&gt;　突然たずねられ、スコールは一瞬面食らった。&lt;BR&gt;「どう？」&lt;BR&gt;『これだけ混乱したガラクタガーデンで、いくらお姫さんが奮闘してたって所詮ひとりだ。プロが入り込んでデータ盗むくらい簡単なこったろ。&lt;BR&gt;　お前が一国の首脳陣のひとりで、こういう危険極まりない女が存在すると知ったら、お前ならどうする？』&lt;BR&gt;　……今は制御不能だが、制御するキーが何かが判明している、魔女を凌ぐ最強魔法を使う少女。&lt;BR&gt;　もし、ひとつの国のためにその力を悪用したいと望むなら、彼女の自我などいっそ不要。&lt;BR&gt;　そして、最強魔法を解き放つキーは、彼女の自我を失わせる危険性を持っている――。&lt;BR&gt;「セ……彼女を、狙う奴が……この時代にいる……？」&lt;BR&gt;『そういう奴らがごまんといるから、魔女の騎士なんてもんが必要なんだろうよ』&lt;BR&gt;　唐突に出てきた単語に、スコールの胸に苦いものが走った。&lt;BR&gt;　だが今は個人的な感傷に浸っている場合ではないと、全精力を傾けて思考を切り替える。&lt;BR&gt;『父親に名があって地位や名誉ってのに守られてる魔女なら、力に溺れる心配があってもクズに利用される危険性はほとんどゼロだ。大統領職の義理の父親持ってる特殊能力者ってのも、まぁおいそれと手は出せねぇよな。&lt;BR&gt;　けどよ、身よりのねえお姫さんみたいなガキが下手な力を持っちまったら、どうぞ利用して下さいつってるようなもんじゃねぇのか？』&lt;BR&gt;　そして、特殊能力を持つリノア、エルオーネの二人より、セルフィの持つ力の方が遙かに『実用的』なのだ……。&lt;BR&gt;『まぁ、お姫さんをさらってった奴がそういう政治的な関係の奴かはわからねーけどよ、敵が未来にいると思い込まねーほうがいいってこった。&lt;BR&gt;　オレにしちゃ出血サービスのアドバイスだな……調子狂うぜ。おい、感謝の言葉はねえのかよ？』&lt;BR&gt;　勝手にしゃべってるくせに何を言ってるのかとスコールは思わず呆れてしまいつつも、過去にサイファーに貸した分程度には役立つ情報提供だったかと考える。&lt;BR&gt;「……そうだな、あんたに礼を言うのは変な気分だが……とりあえず感謝する」&lt;BR&gt;『ハッ、可愛くねえなぁ』&lt;BR&gt;「あんたに可愛く思われてもね」&lt;BR&gt;　軽口を叩きながら、スコールはそろそろ潮時かと判断した。&lt;BR&gt;　少々長話をしてしまった……個人名はなるべく伏せたが、盗聴に成功されていると厄介だ。&lt;BR&gt;「じゃ」&lt;BR&gt;　短く言って切ろうとしたその時、クックッと笑っていたサイファーが、ふと笑いを止めて静かに言った。&lt;BR&gt;『なぁスコール。お前、多分そのうち今日オレに礼を言ったことを後悔するぜ』&lt;BR&gt;「……？」&lt;BR&gt;『じゃあな。オレがお前に使われてやるのはこれっきりだ。せいぜい頑張れよ』&lt;BR&gt;「サイファー？」&lt;BR&gt;　訝しげにスコールが名を呼ぶのと同時に、一方的に通話が途切れた。&lt;BR&gt;（なんなんだ？　最後の最後に思わせぶりに……）&lt;BR&gt;　思わず架け直そうかと考えたが、監視のことも考え、結局やめる。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　――そしてサイファーの予告通り、その後彼と通信がつながることはもうなかった。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;「SeeDってそんなに大事なの？」&lt;BR&gt;　スコールを見送った後、アーヴァインはセルフィ捜索に加わりたいのは山々だったが、リノアと自分のエスタ滞在についてのエスタとの交渉やら、バラムガーデンとカーウェイ大佐との交渉やらをまずはこなさなくてはならず、あてがわれた客間にリノアを入れて絶対出て来ないよう言い渡し、働きに働いてようやく落ち着いたのは深夜になってからだった。&lt;BR&gt;　とっくにスコールは官邸の自室に戻って寝てしまっており、アーヴァインは様子を見にリノアの部屋へと訪れた。&lt;BR&gt;　リノアももう寝ているかと思ったが、リノアはソファに腰掛けて座っていた。&lt;BR&gt;　アーヴァインはさすがに疲れて眠かったが、そうやってソファに深く腰を落とし、じっと座っているリノアはあまりにもいつもの彼女とは違っていて、気にかかって部屋を出ていくことができなくなってしまった。&lt;BR&gt;「わたしが魔女だってわかった時は……SeeDのことなんてどうでもいいみたいに言っていたんだよ？」&lt;BR&gt;　SeeDは魔女を倒す組織。リノアが新たな魔女。それを知ったスコールは、明らかに自分の肩書きを疎んでいた。&lt;BR&gt;　だからリノアは、今こうしてスコールがSeeDの任務を自分より優先することが信じられないのだ。&lt;BR&gt;　リノアはただ、リノアの騎士として、スコールに傍にいてほしかっただけなのに。&lt;BR&gt;　もちろんそれは、軍人として名をはせた祖父を目標にするゼルや、第２の故郷トラビアを出てまでSeeDを目指したセルフィ、誰かに依存することをやめ再度教員資格を得るための努力をはじめたキスティスを間近に見ての影響も多分にあっただろうが……それはリノアには受け入れられない生き方だ。&lt;BR&gt;　家庭を顧みず、軍に人生を捧げる父親の背中を憎んできたのに、スコールが選んだその生き方は自分の父親そっくりで、リノアの望みからは遠すぎる。&lt;BR&gt;「うん、周りの影響もあるよね。でもそれだけじゃないんだな～」&lt;BR&gt;　リノアの訴えに、アーヴァインは苦笑しながら肩をすくめた。&lt;BR&gt;「それだけじゃない？」&lt;BR&gt;　この間延びした言葉遣いが気に入らないのだ、と思いながら、リノアがたずねる。&lt;BR&gt;　アーヴァインは怖いくらい穏やかな眼差しでリノアを見つめ返して、口を開いた。&lt;BR&gt;「リノアにはわからないかな……ガーデンを卒業するとね、僕らは帰る場所がもうないんだよ」&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　ガーデンに在籍している生徒の多くは、戦災孤児など帰る場所のない子供達である。&lt;BR&gt;　孤児院などで暮らせるのはごく幼い時分のみ。そこで里親が見つかればその家に、里親に恵まれない子供は自ら生きる場所を探さねばならないのだ。&lt;BR&gt;　その選択肢のひとつが、各国に存在する兵士養成学校・ガーデン。&lt;BR&gt;　生きるためにガーデンに入り、ガーデンで生きるために戦闘能力を磨き、SeeDを目指す。&lt;BR&gt;　だがガーデンにいられるのは、SeeDをのぞいて１９歳まで。SeeDになっても、２０歳になれば卒業だ。そこからは真の意味で、自身の力のみで生きてゆかなければならない。&lt;BR&gt;　そういう意味で、ガーデンを出た後、SeeDの肩書きは大きな力を持つ。彼らの実力を保証し、『就職先』からの信頼を得るための、絶大の効果を持っている。&lt;BR&gt;　また、せっかくの技術や育てたＧ．Ｆ．を無駄にするのは惜しいということで、歴代の元SeeDたちが作った傭兵組織というものも存在する。どこにも属さず、個人で依頼元と交渉を行い、個人で仕事を請ける組織だ。&lt;BR&gt;　ガーデン時代とは違って定期的に給料が入るわけではないので安定性には欠くが、気に入らない仕事は蹴る自由もある。依頼人側も、戦闘支援など頭数が必要な場合には不向きだが、特殊任務など少数の優秀な傭兵を雇いたい場合などは、ガーデンを介する際の手数料などがかからず経済的損失が少ないということで、需要は高い。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;「でも、スコールには帰る場所があるじゃない。何もSeeDにこだわらなくたって……」&lt;BR&gt;「そりゃね、リノアの恋人って肩書きがあれば、就職先には困らないだろうけど……でもそういうものじゃないんだよね～、男ってのはさ」&lt;BR&gt;　くすっとアーヴァインが笑った。&lt;BR&gt;「特にスコールみたいな男はね、恋人の縁故だとか、ずっと会ってなかった実の父親のツテだとか、そんなのに頼るくらいなら死んだ方がマシくらいには思うんじゃないかな～？」&lt;BR&gt;　同じ男でもアーヴァインくらい周りの環境に柔軟に対処できる性格ならともかく、リノアの嫌いな父親同様根っからの軍人気質、頑固で真面目で朴念仁のスコールにはそんな生き方は到底不可能だろう。&lt;BR&gt;「それにね、リノア。今のスコールに帰る場所があるかどうかは問題じゃないんだ。&lt;BR&gt;　これまでのスコールが、『卒業後に帰る場所がない』って環境で育ったってことが、問題なんだよ」&lt;BR&gt;　自分で自分の人生を切り拓いていくこと。その価値観を土台にスコールは成長し、今に至っている。&lt;BR&gt;「そういうのって、人間の根っこみたいなものだろ？　枝の形や葉っぱの茂り方はどうとでも変わるけど、そういう根っこを変えるのは、よほどのことがなきゃ無理なんじゃないかな～？」&lt;BR&gt;「じゃあ、スコールはSeeDが一番大事で、それはもう変わらなくて、わたしのことはどうでもいいって、そういうことなの！？」&lt;BR&gt;「ん～……」&lt;BR&gt;　どうしてこのお姫様はこう極端かなぁ、とアーヴァインは心の中で苦笑いをした。……口に出すと蹴られそうだったので、言わなかったが。&lt;BR&gt;「恋愛オンリーで物を見てると、スコールの相手はつとまらないよってこと。&lt;BR&gt;　スコールにとっては、SeeDと恋愛って、全然別々の場所の一番なわけだからさ、どっちが欠けても困っちゃう、どっちを取るとかって決めることはできないんだよ～。&lt;BR&gt;　リノアは自分に自信持って、にこにこ笑ってスコールが帰ってくるのを待っていればよかったんだよ～。四六時中傍にいてくれなくても、愛情が減るわけじゃないんだからさ～」&lt;BR&gt;　うん、なかなかうまくまとまったと自画自賛するアーヴァインの前で、リノアは悄然とうなだれる。&lt;BR&gt;「？　ど～したの、リノア～？」&lt;BR&gt;「わたしには……そんなふうにできないよ……」&lt;BR&gt;　アーヴァインの言う愛し方は、まず確固たる自分を持ち、愛される自分に自信を持った女の愛し方だ。&lt;BR&gt;　少し前の、愛されて当然とばかりに自信に満ちていたリノアになら、できたかもしれない。&lt;BR&gt;　けれど……&lt;BR&gt;「だってわたしは……魔女だもの。それ以外、なにも持っていないんだもの」&lt;BR&gt;　SeeDの彼らに出会う前は、考えたこともなかった。&lt;BR&gt;　家を飛び出し、自分なりに真剣にレジスタンス活動などやって悦に入っていたが、スコール達に出会ってから、リノアは自分のありように疑問を抱くようになってしまった。&lt;BR&gt;　はじめは『カッコ悪い』と罵倒したSeeDだったが、命のやりとりを重ねその手を血に染め、そこから眼をそらすことなく真正面から戦う姿は――凛として誇りに満ちていた。&lt;BR&gt;　今まで出会った同年代の誰より、『生きる』ことに懸命だった。&lt;BR&gt;（わたしには、何があるんだろう……）&lt;BR&gt;　魔女の力などを受け継いだところで誰の力にもなれず、いつも足手まといで助けられてばかりで、彼らのように将来どんな道に進みたいかなどの目的もない。&lt;BR&gt;　それでも、スコールの傍にいられるうちは、まだ良かった。&lt;BR&gt;　スコールに想われている、それがリノアの誇りになり、リノアを支えてくれていたから。&lt;BR&gt;　……だが、森のフクロウが解散して以降、リノアのささやかな誇りは大きく揺らいでしまった。&lt;BR&gt;　森のフクロウが解散しガーデンに戻ったあの時、リノアは大きな誤解をしていた。&lt;BR&gt;　てっきり自分もスコールと一緒に、世界のどこにでも行けるのだと思っていた。&lt;BR&gt;　スコールが戦うことしかできないなら、一緒に戦う。それは魔女騒動の最中にリノアがスコールの傍にいるために選択したことだった。だからガーデンに戻ってからも、そうするつもりだった。&lt;BR&gt;　でも、現実はそれを許してはくれなかった。&lt;BR&gt;　ガーデンに戻ったリノアは、あくまで客人であり部外者だった。&lt;BR&gt;　国家機密に触れるようなこともあるSeeDの任務に、恋人だから魔女だからと言って、部外者であるリノアがついていける訳はなかった。リノアがどれほど望み、頼み込んでも、シドもスコールもそれだけは承知してくれなかった。&lt;BR&gt;　SeeDになれば一緒にいられると考えて行動に移してはみたものの、それもはかない夢に終わった。&lt;BR&gt;　ガーデンでただ待つだけの生活が辛くて、わかってくれないスコールが悲しくて、ガーデンを飛び出した。&lt;BR&gt;　離れてしまえば、リノアの誇りはいよいよ自信を失い頼りないものになる。何か自分の中に自分だけの確固たる何かがあれば、それを自信にできたのかもしれないが、ガルバディアの屋敷に戻ったリノアには……何もなかった。&lt;BR&gt;　制御できない魔女の力など、恐ろしく疎ましいだけ。誇りにするなどとんでもない。&lt;BR&gt;「わたしも、SeeDみたいな何かがほしかったな。目指したいって思える何かがあれば良かった」&lt;BR&gt;　情熱を傾けて目指したいと思えるもの。自分の誇りと胸を張って言えるもの。&lt;BR&gt;　黙って静かにリノアの言葉を聞いていたアーヴァインが、そこで初めて、ゆっくりと口を開いた。&lt;BR&gt;「……目指すものがほしくて何かを目指すのは、何か違うんじゃないのかな～。&lt;BR&gt;　どうしてもやり遂げたいことがあるから、それが目標になるんだろ～？&lt;BR&gt;　君は、ずっと、戦闘行為が好きじゃなかったんじゃないのかい？」&lt;BR&gt;　驚き眼をまるくするリノアを見つめ、人好きのする笑顔を浮かべて瞳をのぞきこむ。&lt;BR&gt;「けれど僕たちが戦うことしかできないと聞いたから、君はスコールの傍にいるために戦うことを選択したよね～。&lt;BR&gt;　それは別にリノア自身が『やりたかったこと』でも、『それしかできなかった』わけでもない。&lt;BR&gt;　君にとって一番選択しやすかった、眼の前に提示された『方法』が、戦うことだっただけにすぎないよね～」&lt;BR&gt;　スコールの傍にいたかったから。&lt;BR&gt;　そのために、そのためだけに、好きな人が目指すものを、必死で一緒に目指そうとした。&lt;BR&gt;「僕はね～、リノアのそういうところ、すごく好きなんだよね～。&lt;BR&gt;　好きな人が追いかけてるものを、一緒に追いかける。それ自体は、全然悪いことじゃないよ。&lt;BR&gt;　僕だって、同じ事を考えたし、同じように行動もした。&lt;BR&gt;　けれど、ダメなんだよね～。僕がやりたいこと、好きなことは、どうも違うみたいだって、わかっちゃったから」&lt;BR&gt;「…………え？」&lt;BR&gt;　形のよい眉をかすかにひそめてリノアが呟き、アーヴァインは苦笑するような笑みを唇に刻んだ。&lt;BR&gt;「――『僕はSeeDじゃないけれど、気持ちだけは君たちと一緒だ』」&lt;BR&gt;「……？」&lt;BR&gt;「僕が以前言った言葉。リノアは覚えている？」&lt;BR&gt;　こくんとリノアが小さく頷く。&lt;BR&gt;　トラビアガーデンで、幼なじみ同士の彼らの姿が少し寂しくて、そんなふうに言い切れるアーヴァインの言葉もうらやましいと思いながら聞いていたから、鮮明に覚えている。&lt;BR&gt;「……よく言えたものだなぁと、思ってね」&lt;BR&gt;　ソファに座ったままのリノアに背を向け、部屋の中をゆっくり歩きながらアーヴァインが呟くように言った。&lt;BR&gt;「どうして？　だってアーヴァインは、ガーデンで育ったんでしょ？」&lt;BR&gt;　隠しきれない羨望をにじませてリノアが訊ね、くすりとアーヴァインは背を向けたまま笑った。&lt;BR&gt;「たとえ育ちが一緒だって、目指した者と目指さなかった者との差は、大きいものなんだよ～」&lt;BR&gt;　大きな目標を定めた者と、定めなかった者。&lt;BR&gt;　目標に向かい努力した者と、しなかった者。&lt;BR&gt;　そして、成し遂げた者と、何も成し遂げなかった者――。&lt;BR&gt;「僕は確かに、イデアの孤児院で育ったし、養父母に引き取られた後にガーデンにも入った。&lt;BR&gt;　ガーデンの価値観なら僕にもある。自分のことは自分でやってきたし、甘えて生きてきたつもりもない。&lt;BR&gt;　けれどね、僕にはSeeDってものが必要じゃなかったし、きっとこれからも不要なものなんだ」&lt;BR&gt;　SeeDを選んだ者と、選ばなかった者の、大きな差。&lt;BR&gt;「まぁ一年前のあの事件の後は、SeeDを目指そうなんて思ったりもしたんだけどね……落ち着いて考えてみたら、僕にSeeDって、全然必要なものじゃなかったんだよね。&lt;BR&gt;　小さな頃から周囲がSeeDを目指してるのを見たって、僕はそれを目指そうとは思わなかった」&lt;BR&gt;「……SeeDは、ガーデン生の憧れなんじゃなかったの？」&lt;BR&gt;　理解できずに訊ねるリノアに、アーヴァインはようやく振り返ってにこりと頷く。&lt;BR&gt;「まぁSeeDになるって、自分が努力してきた戦闘能力が認められるってことだからね。そういうのは憧れるよ。&lt;BR&gt;　でもね～、僕は確かに射撃の練習は人一倍打ち込んできたけれど、なぜそうするのかもわからないまま任務を請け負うSeeDになろうとは思わなかったな～」&lt;BR&gt;　ガーデンの価値観はアーヴァインにも確かにある。&lt;BR&gt;　自分が生きる手段として戦いが存在し、生き残るために容赦なく人の命を奪う。&lt;BR&gt;　自身の敵は自分で排除しなければならない。それが当然の世界で生きてきた。&lt;BR&gt;　だがSeeDの敵は、イコール自分の敵、明確な『悪』というわけではない。&lt;BR&gt;　クライアントと立っている立場が違う人間、というだけのこと。お互いが自身を『善』と信じ、それぞれの正義にのっとって行動している、ただそれだけ。――自分自身という『個人』には、なんの関わりもなく設定される『敵』。&lt;BR&gt;　だから、SeeDは決して『何故』とは問わない。聞いても仕方がないことだからだ。&lt;BR&gt;「魔女暗殺ミッションだって、僕は魔女の名前が『イデア』だと知らなければ、断っていたと思うんだ～」&lt;BR&gt;　母と慕ったイデアがガルバディアに君臨したと聞いたから、アーヴァインは任務を受けることにした。&lt;BR&gt;　孤児院で育った自分が、自分の眼で事実を確認し、必要であるなら手を下すべきだと信じた。&lt;BR&gt;　そこでまさか孤児院で育った仲間達に再会し、あげく初恋の少女に綺麗さっぱりと忘れ去られている現実に直面するとは思わなかったが。&lt;BR&gt;「スコール達に会って、僕もリノアと同じに、気持ちを揺さぶられたり、迷ったりしたよ。&lt;BR&gt;　一度は逃げ出してしまったりもした。劣等感も少なからず抱いていた。&lt;BR&gt;　SeeDのみんなは明確な信念を打ち立てて、それによって動いてるからね、影響を受けても仕方がないよ。&lt;BR&gt;　僕には何がしたいかはっきりとしたビジョンがあるわけじゃないし、選択肢も大して多いわけじゃないからって諦めてたフシもあったし……もし僕がSeeDの彼らに劣る部分があるとしたら、そういうとこかもしれないな。&lt;BR&gt;　重要なのは、目指すものがあったかなかったか。SeeDを選んだから偉いとか、SeeDにならなかったから劣ってるとか、そういうものじゃないと思うよ」&lt;BR&gt;　劣等感を抱いていたのはリノアだけではない。&lt;BR&gt;　そう明かしたアーヴァインに、リノアは何と反応すべきかもわからず、穴の空くほどその顔を眺めてしまっていた。&lt;BR&gt;「だから……そうだね、僕はSeeDになる気はなかったし、スコール達がSeeDになったこと、それ自体をうらやましいと思ったこともなかったけれど……」&lt;BR&gt;　やわらかく微笑んで、アーヴァインはどこか遠くを見るような眼差しで、静かに言葉を続けた。&lt;BR&gt;「なんの迷いもなく目標を未来にすえて、なんのためらいもなく突き進んでいけるみんなの背中は……うらやましいと思ったよ」&lt;BR&gt;　それがどんな目標であれ、漠然と将来に不安を抱いているアーヴァインを振り返りもせず、走っていける彼らが。&lt;BR&gt;（わたしも）&lt;BR&gt;　ずきんと痛む胸を押さえ、リノアは唇を引き結んだ。&lt;BR&gt;（わたしも、そう思ってた）&lt;BR&gt;　自分も、あんなふうに。&lt;BR&gt;　前だけを見つめて、生きていけたらどれほど良いかと――&lt;BR&gt;（みんなが前ばかりを向いてどんどん進んで行ってしまうのが、心細くて怖かった）&lt;BR&gt;　限られた選択肢の中で、自分の進むべき道を見つけだせてしまう彼ら。&lt;BR&gt;　当たり前のように道を選べる彼らに、どんな不安を吐露しても決して理解してもらえなくて。&lt;BR&gt;　前ばかり向いているスコールの視界内に入りたくて、どれほど努力してもスコールの前になんて行けなくて。&lt;BR&gt;　振り返って、背後にいる自分に気づいてほしくて、必死に声を上げれば上げるほど、スコールの気持ちがどんどん離れて行ってしまうのがわかって……でも、どうしていいのかわからなかった。&lt;BR&gt;　前を向いて進んでいるスコールの視線の先に、誰もいないならまだ良かったのかも知れない。&lt;BR&gt;　けれどリノアは知っていた。スコールにとって対等と評することのできる人物が、スコールの視線の先に立つことのできる少女が、たったひとりだけ存在していることを。&lt;BR&gt;「あぁ！？　リ、リノア～、泣かないでよ～」&lt;BR&gt;　いきなり勝気な黒い瞳からぼろぼろこぼれ落ちた涙に、アーヴァインが珍しいほどにうろたえた声を上げる。&lt;BR&gt;　リノアも驚いて涙を止めようとしたのだが、どうしたことだか止まる気配がない。&lt;BR&gt;　ティンバー独立からこっち、リノアなりに懸命に、色々な不安やコンプレックスを溜め込んでいたのだ。&lt;BR&gt;　怒ったり、わめいたり――たくさんの感情をスコールにぶつけながら、それでも涙だけは、流すまいとして。&lt;BR&gt;「ほらほら、眼が腫れたら美人が台無しだよ～」&lt;BR&gt;　ハンカチをリノアの手に握らせ、大きな手のひらがぽすんとリノアの頭を包んだ。&lt;BR&gt;「…………」&lt;BR&gt;　眼を上げれば、サファイアブルーの瞳が意外なほど優しく微笑んで、リノアを見ていた。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　その後どんな会話をかわしたか、リノアはあまり覚えていない。&lt;BR&gt;　自分の知らないところで、意外な人物が自分と同じコンプレックスを抱えていたことを知らされ、そのことで頭がいっぱいになってしまったからだ。&lt;BR&gt;　やがてアーヴァインは自分にあてがわれた部屋に戻っていき、その背中を見送りながら、リノアはふと、先ほど聞き流してしまったアーヴァインの言葉を思い出した。&lt;BR&gt;（……逃げ出したって……どういうこと……？）&lt;BR&gt;　タイミングはとっくに逃しているため、今さら聞くこともできず、リノアは閉じたドアを見つめたまま、しばらく考え込んでいた。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　花が舞っていた。&lt;BR&gt;　草原を吹き抜ける優しい風にあおられて、数え切れないほどの花びらがくるくると楽しげに踊っていた。&lt;BR&gt;　風が運ぶのは甘い花の香りと、懐かしい潮の香り。&lt;BR&gt;（……イデアの孤児院……）&lt;BR&gt;　スコールは小さな花園の中に立ちつくしたまま、懐かしい光景に眼を細めた。&lt;BR&gt;　幼い頃過ごした場所。心の奥に残る、大切な故郷。&lt;BR&gt;（夢か……）&lt;BR&gt;　今はもうひどく遠い場所であるそれに、スコールは独白し納得する。&lt;BR&gt;　セルフィを捜し、疲れ果てて官邸に戻り、そのまま眠ってしまったから、こんな夢を見ているのだ。&lt;BR&gt;「――――」&lt;BR&gt;　ふと、スコールは潮騒の聞こえる方へと足を向けた。&lt;BR&gt;　何を思ったわけでもない。ただそうするべきだとわかっただけだった。&lt;BR&gt;　草原の端まで歩き、浜辺に出る石段を降りかけて――ふと思い立ち、石段をはずれて茂みの中へと足を踏み入れた。&lt;BR&gt;　がさがさと草木をかきわけ、しばらく進むと、ふいに視界が開け岩の切り立った崖に出た。&lt;BR&gt;　幼い頃、イデアが危険だから決して近づいてはならないと注意していた、海に面した小さな崖。&lt;BR&gt;　当時はひどく恐ろしい崖に見えたが、こうして見ると飛び込んでも問題はなさそうな規模だった。&lt;BR&gt;　その岩陰から、黄色い花がふわりと顔をのぞかせる。&lt;BR&gt;「………セルフィ？」&lt;BR&gt;　それだけで何故そうとわかったのか。&lt;BR&gt;　スコールが早足で近づくと、太陽という名の陽光色の花を抱えた少女が、くるりと振り返ってスコールを見た。&lt;BR&gt;　以前セルフィの精神世界で見たのとは違い、１8歳の、SeeDの制服に身を包んだセルフィである。&lt;BR&gt;　花を抱え、崖っぷちに座って空に足を投げ出していた。&lt;BR&gt;　ずっと会いたくてたまらなかった、翠色の澄んだ瞳がスコールを捉える。スコールの身体が動きを止めた。&lt;BR&gt;「……また、泣いてるのか？」&lt;BR&gt;　そんなことを口走る。セルフィの瞳はうるんでなどいなかったのに。&lt;BR&gt;　それに対しセルフィは、くすっと笑って首を振った。&lt;BR&gt;「スコールこそ、また海に落っこちるの～？」&lt;BR&gt;（また？）&lt;BR&gt;　以前にここから落ちたことでもあっただろうかとスコールは首を傾げたが、思い出せなかった。&lt;BR&gt;　あぁ、これは夢だから。改めてスコールは思い出す。&lt;BR&gt;　夢なのだから、多少変な会話が交わされたとしてもおかしくはない。&lt;BR&gt;「落ちるかよ」&lt;BR&gt;　だから笑って答えた。とても自然に笑顔になれた。&lt;BR&gt;　セルフィもそれに応えるようににこっと微笑み、抱えていた花を一輪、スコールに差し出した。&lt;BR&gt;　それを受け取りながら、スコールは訊ねる。&lt;BR&gt;「なぁ……あんた、どこにいるんだ？」&lt;BR&gt;　セルフィは微笑むだけで答えない。&lt;BR&gt;「……わかるわけないよな」&lt;BR&gt;　夢の中の少女に答えなど期待できるはずもない。スコールは頷いて、彼女の隣に腰をおろした。&lt;BR&gt;　そのまま、しばらくお互い沈黙する。&lt;BR&gt;　現実世界でひどく傷つけてしまった彼女。だが夢の中の彼女は、あまりに普段と変わらなくて。&lt;BR&gt;「リノアがエスタに来たんだ」&lt;BR&gt;　気づいたら、いつもと同じように話しかけていた。&lt;BR&gt;　不意に口を開いたスコールに、セルフィが少し驚いたような顔になる。&lt;BR&gt;「ど～して？　魔女は危ないからバラムにいるんじゃなかったの～？　あっ、スコールのこと、追っかけてきちゃったとか？」&lt;BR&gt;「………………。本人はセルフィと連絡取れなくなって心配だったからと言っていたが」&lt;BR&gt;「ふ～ん。あたしって～、もしかしてダシってやつ～？」&lt;BR&gt;「…………。笑顔で言わないでくれ…………」&lt;BR&gt;　にこやかに嫌なことをズバリと言われ、スコールが頭を抱えた。&lt;BR&gt;　くすくすとセルフィが笑い、空中に投げ出した足をぷらぷらと揺すった。&lt;BR&gt;「なぁ……」&lt;BR&gt;　そうやって笑っているセルフィはあまりにもリアルで、だからスコールは思わず素直な声音で呟いていた。&lt;BR&gt;「……ごめんな」&lt;BR&gt;「……」&lt;BR&gt;　セルフィがふと笑いやめてスコールを見つめた。&lt;BR&gt;　突然真剣な眼差しを向けられ、スコールは思わずうっとたじろいだ。&lt;BR&gt;（な、なんだよ……）&lt;BR&gt;　セルフィがまじめな顔をしているところなど、数えるほどしか見たことがない。&lt;BR&gt;　たじろぎつつも視線をそらせないスコールの前で、セルフィはじっと彼を見つめていた。&lt;BR&gt;　どこか哀しそうに、けれど決してそらさないまっすぐな眼差しで。&lt;BR&gt;　そして、そのまま、にっこりと笑った。&lt;BR&gt;　瞳に浮かぶ哀しげな光だけはそのままに、にっこりと笑顔になった。&lt;BR&gt;（――――！）&lt;BR&gt;　ずきり、とスコールの胸が痛む。&lt;BR&gt;　この笑顔は、知っている。セルフィが泣きたくて、けれど涙を流せない時に見せる笑顔だ。&lt;BR&gt;　泣かないことを自身に課しているセルフィが、泣く代わりに身につけた表情だ。&lt;BR&gt;　涙の代わりの笑顔のままで、セルフィが口を開く。笑みを刻んだ唇が動く。&lt;BR&gt;「だいじょ～ぶだよ、リノアには内緒にしといてあげるから」&lt;BR&gt;　ぱちんとウィンクして、そう言った。&lt;BR&gt;&lt;BR&gt;　――――あたしはリノアの代わりじゃないんだから……&lt;BR&gt;&lt;BR&gt;　ふいに、あの時泣き叫んだセルフィの声がよみがえった。&lt;BR&gt;「……違う」&lt;BR&gt;　思わずスコールは首を振って呟いてしまう。え？　とセルフィが首をかしげた。&lt;BR&gt;　セルフィはあのキスを、リノアの身代わりに受けたものとして片づけようとしている。&lt;BR&gt;　スコールとリノアが愛し合っていたことを知っている彼女がそう思うのは、当然のことだ。&lt;BR&gt;　……だが、スコールには、彼女がそう認識していることが耐えられなかった。&lt;BR&gt;「違う……」&lt;BR&gt;　無意識に、セルフィの二の腕をつかんでいた。&lt;BR&gt;　SeeDだなんて嘘のように、細くて華奢な腕がスコールの手の内におさまった。&lt;BR&gt;「リノアは関係ないんだ」&lt;BR&gt;「スコール……？」&lt;BR&gt;　当惑気味のセルフィの声が耳に届く。困ったような翠の瞳。&lt;BR&gt;「なにが違うの？　違うなら、なんだったの～？」&lt;BR&gt;　夢なのに、夢であるはずなのに、つかんだ腕の感触も、眼に映るその姿も、耳に届く声も、何もかもがリアルだった。&lt;BR&gt;　哀しいほどに、現実味を帯びていた。&lt;BR&gt;　向けられるセルフィの悲痛な瞳が、本当に彼女のものだと思わずにいられないほど、胸に迫った。&lt;BR&gt;「なにが……」&lt;BR&gt;　胸のつまる思いで、スコールは彼女の言葉をおうむ返しに呟いていた。&lt;BR&gt;　違うのは、あのキスがリノアの身代わりに対するものではないということ。&lt;BR&gt;　なら、その意味は？&lt;BR&gt;「…………」&lt;BR&gt;　スコールの手がするりとセルフィを解放した。&lt;BR&gt;　手の内に、たったひとつ残った黄色の花を握りしめ、スコールは悄然とうつむいた。&lt;BR&gt;　うつむく自分をじっと見つめる翠の瞳を感じながら、顔を上げることができなかった。&lt;BR&gt;「……ばか」&lt;BR&gt;　ぽつりと、セルフィの声が頭上から落ちてきた。&lt;BR&gt;「リノアと、何があったの？」&lt;BR&gt;　少しだけうるんだ声で、セルフィが囁いた。&lt;BR&gt;　再会してから何度か聞かれた質問。&lt;BR&gt;「……ううん、言わなくてもいいよ。でも……」&lt;BR&gt;　セルフィの細い腕が伸ばされ、スコールが花を握りしめる右手にそっと触れた。&lt;BR&gt;　またリアルなぬくもりが触れ、スコールは顔をかすかに上げる。&lt;BR&gt;　混乱しているスコールと対称的に、哀しそうではあったがさっぱりとした表情のセルフィがすぐ傍にいた。&lt;BR&gt;「答えは、自分でちゃんと出さなくちゃだめだよ」&lt;BR&gt;　何もかもが中途半端な状態の今のスコールを、まっすぐに見つめてセルフィは笑った。&lt;BR&gt;「だから、あたしは、何も言わないから。スコールが話したいことは、もちろん何でも聞くけどね～」&lt;BR&gt;「…………」&lt;BR&gt;　泣き出しそうなくせに強い笑顔を見せるセルフィに、スコールはおぼろげながら理解した。&lt;BR&gt;　きっと、彼女の中で、何かの答えがもう出ているのだ。&lt;BR&gt;　あの口づけに関する、スコールに関する、何かの答えが。&lt;BR&gt;　その答えが、セルフィを泣きそうな笑顔にし、こうして強い眼差しを向けさせる力にもなっている。&lt;BR&gt;　泣きたいほど辛い現実も、それすら力に変えて前へと進むセルフィが、スコールはまぶしかった。&lt;BR&gt;「どうして……あんたは……」&lt;BR&gt;「ん？」&lt;BR&gt;「どうして……笑えるんだ……？」&lt;BR&gt;　セルフィは、笑顔のまま静かに首をかしげた。&lt;BR&gt;　その笑顔の前で、スコールはまぶしげに眼を細めて、もう一度呟く。&lt;BR&gt;「どうしたら……あんたみたいに……」&lt;BR&gt;「…………」&lt;BR&gt;　小さく微笑んだまま、セルフィは数秒間じっとスコールの顔を見つめていた。&lt;BR&gt;　それからゆっくりと小さな頭が動き、スコールの額にコツンと小さな額がぶつけられる。&lt;BR&gt;　哀しみを宿した翠の瞳が、すぐ間近からスコールを見下ろした。&lt;BR&gt;「スコールは、スコールにしかなれないよ」&lt;BR&gt;「…………」&lt;BR&gt;「あたしがリノアになれないのとおんなじくらい、スコールはスコールにしかなれないよ……」&lt;BR&gt;「…………」&lt;BR&gt;　囁く声はひどく切なげに響き、スコールの胸は訳もなく痛んだ。&lt;BR&gt;　わずかに顔をずらし、そのまま華奢な肩口に額を押しつける。&lt;BR&gt;　これ以上、澄んだ瞳をまっすぐ見ることができなかった。&lt;BR&gt;「リノアと何があったのかわかんないけど、でも、気持ちが離れちゃったんなら、ちゃんと話さなきゃだめだよ～！」&lt;BR&gt;　身体が触れ合っているので、直接セルフィの声が響いて伝わった。&lt;BR&gt;「スコールは、スコールにしかなれないんだから。スコールとして、ちゃんと、リノアと向かい合わなくちゃだめだよ。&lt;BR&gt;　ちゃんと、あたしじゃなくてリノア自身と、きちんと話さなくっちゃだめだよ～。&lt;BR&gt;　スコールは、リノアのこと、忘れたくないでしょ～？」&lt;BR&gt;　真摯な響きの声が告げたことに、スコールの胸がまた、ずきりと痛んだ。&lt;BR&gt;「あたしたち……いつかは思い出をなくしちゃうんだよ。&lt;BR&gt;　スコールがガーデンを卒業するまで、あと２年あるんだよ。２年間、SeeDとしてＧ．Ｆ．使うんだよ。&lt;BR&gt;　卒業後も、行き先によればもしかしたら使い続けることもあるかもしれないよね。&lt;BR&gt;　眼の前にいる相手のことなら、思い出のタネいっぱいまいて、ずっと覚えていられるよ。&lt;BR&gt;　でも、眼の前にいなくなっちゃったら、思い出のタネはまけないんだよ～！」&lt;BR&gt;（思い出の、タネ……）&lt;BR&gt;　聞き覚えのある言葉に、スコールは少し首をかしげて記憶を探る。&lt;BR&gt;　いつだったか、確かにこの言葉を、セルフィの口から聞いたことがあった……。&lt;BR&gt;（……あぁ、そうだ。トラビアガーデンだ……）&lt;BR&gt;　ようやく記憶を探り当て、スコールはほっとする。&lt;BR&gt;　トラビアガーデンで、Ｇ．Ｆ．の記憶障害が懸念ではなく事実であったと知った時、狼狽するキスティス達にセルフィが言った言葉。&lt;BR&gt;　――――消えていく過去に負けない、たくさんの思い出のタネ、つくろ～！&lt;BR&gt;　それはセルフィらしい、前向きな言葉で。&lt;BR&gt;（だけど……現在は必ず過去になるんだ……）&lt;BR&gt;　Ｇ．Ｆ．を使い続ける限り、現在は一瞬後には過去になり、そして過去の記憶はどんどん失っていく。&lt;BR&gt;　力の代償に選んだ道だ。後悔はしないつもりだった。だが……&lt;BR&gt;「……リノアのことは、ぜ～ったい、忘れちゃだめだよ……」&lt;BR&gt;　忘れてしまうのだろうか。&lt;BR&gt;　会えない時間が長く続けば、あれほど愛した記憶も、いつか消え去ってしまうのだろうか。&lt;BR&gt;（……忘れてしまう……どれほど愛していても……）&lt;BR&gt;　そうだ。あれほど愛し世界のすべてだったエルオーネさえ、スコールは忘れ去ってしまえたのだ。&lt;BR&gt;　――――思い出したら、いろいろお話したいね&lt;BR&gt;　寂しそうだった図書室でのエルオーネの姿がよみがえり、スコールは息をつめた。&lt;BR&gt;　――――忘れられたままじゃ、寂しいもの……&lt;BR&gt;　哀しそうに呟いて、自分に背を向けたエルオーネ。&lt;BR&gt;　ほっそりと華奢なその背中に、リノアの姿が重なった。&lt;BR&gt;　……いつか忘れてしまう。会わなければ会わない時間だけ、愛した記憶も何もかも。&lt;BR&gt;「あたし、リノアのこと好きになったスコールが、好きなんだ～」&lt;BR&gt;　ふわりと、セルフィの声が響いた。&lt;BR&gt;「カッコ良かったもん、宇宙のスコール」&lt;BR&gt;　ゆっくりとセルフィの肩から顔を上げ、スコールはセルフィと眼を合わせた。&lt;BR&gt;　眼が合うと、セルフィはスコールににこりと微笑んだ。&lt;BR&gt;　その笑顔はやっぱりいつもの屈託のない笑顔とは少し違っていて……どこか哀しげにスコールには感じられた。&lt;BR&gt;「だからね、リノアのことだけは、忘れないでほしいんだ～。……えへへ、勝手な押しつけって、怒る～？」&lt;BR&gt;　肩をすくめる仕草も、澄んだ瞳も、間違いなくセルフィなのに、笑顔だけがいつもと違う。&lt;BR&gt;　ツキンと胸に走る痛みに訳がわからないまま、スコールは小さく首を振った。&lt;BR&gt;　セルフィが再度、にっこりと笑った。今度は少しだけ、明るい笑顔だった。&lt;BR&gt;　スコールは、眼を細めてそんなセルフィの笑顔を見つめる。いつも見せていた屈託のないあの笑顔が、なぜかひどく懐かしかった。&lt;BR&gt;　あの笑顔をセルフィから消したのは自分だというのに。&lt;BR&gt;（……もう……戻らないのか？）&lt;BR&gt;　ぼんやりと思った。&lt;BR&gt;（そうなったら……それすら、忘れてしまうのか？）&lt;BR&gt;　セルフィの笑顔が屈託のないものだったことも忘れて、今眼の前にある笑顔が彼女の笑顔だと認識するようになるのだろうか。&lt;BR&gt;　いや、笑顔だけではない。忘れてしまうのは――&lt;BR&gt;（セルフィの存在――）&lt;BR&gt;　気がついて、スコールは愕然と眼を見開いた。&lt;BR&gt;　今の今まで、考えもしなかった事実に気づき、頭を殴られるような衝撃があった。&lt;BR&gt;「ど～かした～？」&lt;BR&gt;　不思議そうにセルフィが首をかしげている。&lt;BR&gt;　あまりにもリアルな彼女。けれど今眼の前にいる彼女は夢のなかの住人で。&lt;BR&gt;　現実の彼女は、今もまだ行方知れずのままなのだ。&lt;BR&gt;　次に会う時は敵かもしれない。この手で倒さなければならないかもしれない、存在なのだ。&lt;BR&gt;　もしもセルフィを倒してしまったら……彼女が死んでしまったら……スコールは二度と彼女に会えなくなる。&lt;BR&gt;　会えない時間が長く続けば、きっと記憶は薄れて消えてしまう。忘れてしまう。&lt;BR&gt;　過去という二文字に置き換わったセルフィの存在が、スコールの内から消えてしまう……。&lt;BR&gt;（消えて……）&lt;BR&gt;　どくんと大きく鼓動が鳴った。&lt;BR&gt;「セルフィ……」&lt;BR&gt;「ん～？　なに～？」&lt;BR&gt;　呆然と名を呟くスコールに、にこにことセルフィが微笑んで答えた。&lt;BR&gt;　スコールはしばらく無言のまま、澄んだ翠を正面から見すえていた。&lt;BR&gt;「んも～、なによ～」&lt;BR&gt;　まじまじと注視され、わずかに赤くなってセルフィが照れてぷいと横を向いた。視線がはずれ、スコールはゆっくりと眼を伏せる。&lt;BR&gt;「いや……」&lt;BR&gt;　激しい衝撃はまだ身体の芯に残っていたが、それをどう言葉にしていいのかわからず、結局スコールはそのまま黙り込んでしまった。&lt;BR&gt;　セルフィは特に説明を求めるでもなく、また黙って水平線に眼を向ける。しばらく二人とも沈黙していたが、それを重く感じさせない雰囲気がセルフィにはあった。&lt;BR&gt;「なぁ、セルフィ……」&lt;BR&gt;　やや長い沈黙の末、ようやくぽつりとスコールが呟いた。&lt;BR&gt;「なに～？」&lt;BR&gt;　視線を遠い海の向こうに向けたまま、さらりとセルフィが答えた。&lt;BR&gt;「……一年前のこと……覚えてるか？」&lt;BR&gt;　低い声にこめられた響きに何か哀しいものを感じ、海を見つめていたセルフィが視線をスコールに戻した。&lt;BR&gt;「一年前……俺がリノアに出会ったばかりの頃」&lt;BR&gt;「うん」&lt;BR&gt;　ちょっと小首を傾げるようにして、セルフィがそれでも小さく頷き先を促す。&lt;BR&gt;　スコールはうつむいたまま、ちらっと唇に笑みを浮かべた。&lt;BR&gt;「あんたから見ても……俺、けっこう変わっただろ」&lt;BR&gt;「……そうだね～、けっこう変わったかなぁ～？」&lt;BR&gt;　わずかに考える間を置いて、くすりとセルフィが微笑んだ。&lt;BR&gt;　笑って頷き返し、スコールは視線をゆっくり上に向ける。&lt;BR&gt;「いくら拒絶してもくっついてきて、理解しようとかそういう段階も飛び越して俺の中に踏み込んできて、遠慮会釈なく優しくないだの何だの言われて……あんなふうにされたのは初めてだった。驚いたし……反発もした」&lt;BR&gt;「喧嘩、い～っぱいしてたもんね～」&lt;BR&gt;　くすくすとまた笑ってセルフィが頷く。&lt;BR&gt;　朗らかな声が、意外なほど次の言葉を唇から滑り出させやすくしてくれた。&lt;BR&gt;「それまでモノクロだった自分の世界が、どんどんリノアの色に……極彩色に塗り替えられていくような、そんな気がした。……変わっていく自分は、嫌じゃなかった。&lt;BR&gt;　エルオーネは、俺がずっと無意識に変わりたいと望んでたって、言ってた。俺も……そうなんじゃないかと思う」&lt;BR&gt;「だから、リノアを好きになったんだね」&lt;BR&gt;　翠の瞳を細めて、見たこともないほど優しく大人びた笑顔で、静かにセルフィが囁いた。&lt;BR&gt;「……そうだな」&lt;BR&gt;　はじめの内に覚えた不快感も、気づけば綺麗に消えていた。変わっていく自分の眼に、世界は鮮烈な色に映った。&lt;BR&gt;「だから……好きになった。……だから……壊れてもいった」&lt;BR&gt;「…………？」&lt;BR&gt;　かすかに首をかしげて、セルフィは黙ったままスコールを見つめる。&lt;BR&gt;　翠色の瞳に視線を合わせ、スコールは自嘲的な笑みをかすかに浮かべた。&lt;BR&gt;「リノアにも……変えられないものがあったんだ」&lt;BR&gt;　ゆるりと持ち上げた右手を拳に握り、トンと軽く胸を押さえた。&lt;BR&gt;「一番奥にある俺を……リノアは変えることができなかった。俺は、変わってやることが、できなかった」&lt;BR&gt;　心の一番奥深くの。&lt;BR&gt;　今の『スコール』を形作っている、一番根底にある部分を。&lt;BR&gt;「リノアが一番変えたかったのが『ここ』だって、俺はちゃんとわかってたんだ」&lt;BR&gt;　どれほどリノアが望んでも。必死で心をこじ開けて、感情をぶつけても。&lt;BR&gt;　まるで誰をも拒む、立入禁止の聖域のように。&lt;BR&gt;「変わってやれなかった。SeeDをやめることも、ガーデンを出ることも、リノアから片時も離れず傍にいることも――リノアの望みは全部叶えてやりたかったのに、結局俺は叶えてやれなかった」&lt;BR&gt;　強く眉を寄せて、いっきに言い放ったスコールの言葉を、セルフィはやはり黙ったまま聞いていた。&lt;BR&gt;　真摯な眼差しをまっすぐに向けて。&lt;BR&gt;「せめて……言葉だけでも、かけてやれればまだ良かった」&lt;BR&gt;「……言葉？」&lt;BR&gt;「リノアが望むような……安心させてやれるような、言葉……」&lt;BR&gt;　湯水のように愛情を注がれなければ納得できないリノアを、安心させることのできる言葉。&lt;BR&gt;　……そんな芸当が自分にできるなら、そもそも二人は仲違いなどしていないだろうが。&lt;BR&gt;『口で言ってくれないとわからないよ』&lt;BR&gt;　そう言って何度も何度も、言葉を求めたリノアに、いつだって不十分な言葉しか返してやれなくて。&lt;BR&gt;「自分のことばっか考えて……言葉ひとつ満足に口にできない」&lt;BR&gt;　魔女という重荷を背負って、ガーデンにたった独り取り残されるリノアの不安を知りながら、それでもSeeDであることを譲れなかった自分の心の狭さを、スコールは嫌と言うほど感じていた。&lt;BR&gt;　しかしそれでも、どれほどの自己嫌悪に陥っても、こうして今もSeeDで居つづける自分というものも知っている。&lt;BR&gt;　リノアすら変えることのできない心の奥底に焼き付いた、ただひとつの理想から、どうしたって眼をそらせない。&lt;BR&gt;「……つまらない話だろ」&lt;BR&gt;　皮肉げに唇をゆがめてスコールは笑い、その場を立ち上がろうとわずかに姿勢を前に傾けた。&lt;BR&gt;　その、瞬間。&lt;BR&gt;「！」&lt;BR&gt;　ふいに隣に座るセルフィの両腕が動き、細身だがやわらかい身体が腕の中に飛び込んでくる。&lt;BR&gt;「セ……」&lt;BR&gt;　驚きのあまり、前傾姿勢になりかけたままの中途半端な体勢で抱きついてきたセルフィを受け止めたスコールが、呆然と呟いた。&lt;BR&gt;　これが夢であることなど、意識しなければ忘れてしまうほど温かな体温が優しい鼓動が、リアルに衣服を通して伝わってくる。&lt;BR&gt;「言葉だけじゃないよ」&lt;BR&gt;　スコールの首筋に頬を埋めたまま、囁くようにセルフィが言った。&lt;BR&gt;「……え？」&lt;BR&gt;「言葉を出すのが難しかったら、違う方法でもいいんだよ～」&lt;BR&gt;　ぎゅっとスコールを抱きしめる細い腕に力がこもる。&lt;BR&gt;「こうして抱きしめたり、肩を抱いたり、キスしたり、手に触れて繋いだり……すぐ傍で眼を見つめるだけだって、伝えたいって思って触れれば、気持ちはちゃ～んと伝わるよ～」&lt;BR&gt;　伝えたい、伝わってほしいと思う、温かい気持ちが。&lt;BR&gt;（安心すると言ってたのは……リノアだったか……）&lt;BR&gt;　セルフィに抱きしめられたまま、スコールはぼんやりと思い出す。&lt;BR&gt;　触れることで分け合えるぬくもりが、本当に言葉を補う力を持っているのなら……なぜいくら触れても抱きしめても、リノアは『言葉』を求めたのだろう。なぜ少しも安心させてやれなかったのだろう。&lt;BR&gt;　そう呟くと、セルフィはスコールの腕の中で、くすくすと小さく笑った。&lt;BR&gt;「伝えたいって、絶対絶対伝わってほしい～！って、そういうのが足りなかったんじゃないかな～？&lt;BR&gt;　スコール、自分の意見を押しつけるの、嫌いだもんね～」&lt;BR&gt;　人に意見を押しつけられるのを嫌うのと同様に。&lt;BR&gt;　さらりと言われ、そうかもしれないと何となくスコールは納得する。どうしてもわかってもらえないなら、もう仕方がないのだろうとどこか諦めてしまっていた自分が、確かにいた。&lt;BR&gt;「……あんたはずっと、こうやってきたのか？」&lt;BR&gt;　自分を抱きしめる細い腕に視線を落としてスコールが訊ねると、セルフィはこくんと小さく頷いた。&lt;BR&gt;「トラビアに初めて行った頃、トラビア弁がうまく喋れなかった時はね～、よくこうしたよ～」&lt;BR&gt;　仲良くなりたい、友達になりたい。そんな気持ちを、言葉以上に雄弁に伝えるために。&lt;BR&gt;「あたしがおっきくなってからは、ちっちゃい子達にいっぱいこうしたよ～」&lt;BR&gt;　セルフィと同じように、トラビア弁が喋れずに萎縮してる子供達や、親に捨てられて心を閉ざしてしまった子供達に、言葉以上にたくさんの『大好き』を伝えるために。&lt;BR&gt;「…………」&lt;BR&gt;　俺は子供と同じかとかすかに苦笑してしまいながら、スコールは一度ゆっくり眼を閉じた。&lt;BR&gt;　細い腕のリアルなぬくもりは、確かに温かな気持ちを伝えてくれていた。&lt;BR&gt;「スコール？」&lt;BR&gt;　恐る恐る両腕を伸ばし華奢な身体を抱きしめてみると、腕の中でセルフィが穏やかな響きで名前を呼んだ。&lt;BR&gt;　そこに嫌悪や困惑といった感情が含まれていなかったから、スコールは少し安心する。&lt;BR&gt;「……ごめん……」&lt;BR&gt;　声がこぼれ落ちるように唇からすべり出た。腕の中のセルフィは何も言わなかった。&lt;BR&gt;　言葉足らずな自分の気持ちが伝わればいいと願いながら、スコールはかすれた声で言葉を続けた。&lt;BR&gt;「本当は……もう答えは出ているんだ」&lt;BR&gt;　衝動的な、あのキスの意味。その答え。&lt;BR&gt;「けれど俺は、まだ動いてない。あんたにそれを言う資格は、今の俺にはない」&lt;BR&gt;「？　……うん」&lt;BR&gt;　セルフィは小さく首を傾げたが、何も言わずにただ頷いた。&lt;BR&gt;「俺ちゃんと、リノアと向き直ってみる」&lt;BR&gt;　まだスコールは、リノアとの恋に決着をつけていない。&lt;BR&gt;　エルオーネとの会話の果てに、そして今もまだ感じている喪失の衝撃に自覚することのできた想いを、口にする資格をスコールは持っていない。&lt;BR&gt;「こんなこと……してる場合じゃないのにな。すまない」&lt;BR&gt;　抱きしめる腕をゆるめると、セルフィはわずかに身を離し、スコールの顔を見て小さく笑った。&lt;BR&gt;「……ううん」&lt;BR&gt;　いつもより大人びた表情で。&lt;BR&gt;「全部答えが出たら……聞かせてくれる～？」&lt;BR&gt;「あぁ」&lt;BR&gt;　スコールは頷いた。&lt;BR&gt;　セルフィも、笑顔のまま静かに頷き、ゆっくりと両手でスコールの右手を包んだ。&lt;BR&gt;　――これは夢。どれほど現実であってほしいと望んでも、夢は夢。&lt;BR&gt;　けれど、そんなことはどうでもいいと思えるほど、眼の前で静かに笑うセルフィの姿はリアルだった。&lt;BR&gt;　右手が握りしめる花の感触も、その手を包んだ小さな手のぬくもりも、何もかもが現実と変わらなかった。&lt;BR&gt;　静かな笑顔の彼女が、その後なんと言ったか、覚えていない。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　眼を覚ますと、朝だった。&lt;BR&gt;　窓から外を見れば、空が優しい暁色に染まっている。&lt;BR&gt;　スコールは右手に視線を落とした。&lt;BR&gt;　夢の中のことであればもちろん何の感触も残っているはずがない。だが眼を閉じれば、温かだったセルフィの両手の感触がよみがえってくるような気がした。&lt;BR&gt;　夢の中で、静かに笑ったセルフィの顔さえ、はっきり思い出せる。&lt;BR&gt;&lt;BR&gt;　スコールは眼を開き、右手をぎゅっと強く握りしめた。&lt;BR&gt;　それから飽くことなく、いつまでも、無機質な窓からのぞく優しい空を、眺めていた。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;&lt;/SPAN&gt;

<script data-viewer-zoom-script>
(() => {
  const stage = document.querySelector('.viewer-stage-image');
  const image = stage ? stage.querySelector('.viewer-image') : null;
  if (!stage || !image) {
    return;
  }

  const setZoom = (enabled) => {
    stage.classList.toggle('is-zoomed', enabled);
    image.setAttribute('aria-pressed', enabled ? 'true' : 'false');
    if (enabled) {
      const naturalWidth = image.naturalWidth || image.clientWidth || 0;
      const targetWidth = naturalWidth > 0
        ? Math.max(naturalWidth, Math.min(Math.round(stage.clientWidth * 0.92), naturalWidth * 4))
        : Math.round(stage.clientWidth * 0.92);
      image.style.width = `${targetWidth}px`;
      image.style.maxWidth = 'none';
      image.style.maxHeight = 'none';
      requestAnimationFrame(() => {
        stage.scrollTop = 0;
        stage.scrollLeft = Math.max(0, Math.round((image.scrollWidth - stage.clientWidth) / 2));
      });
    } else {
      image.style.removeProperty('width');
      image.style.removeProperty('max-width');
      image.style.removeProperty('max-height');
      stage.scrollTop = 0;
      stage.scrollLeft = 0;
    }
  };

  const toggleZoom = () => {
    setZoom(!stage.classList.contains('is-zoomed'));
  };

  image.setAttribute('tabindex', '0');
  image.setAttribute('role', 'button');
  image.setAttribute('aria-label', '逕ｻ蜒上ｒ諡｡螟ｧ縺ｾ縺溘・邵ｮ蟆・);
  image.setAttribute('aria-pressed', 'false');

  image.addEventListener('click', toggleZoom);
  image.addEventListener('keydown', (event) => {
    if (event.key === 'Enter' || event.key === ' ') {
      event.preventDefault();
      toggleZoom();
    }
  });

  stage.addEventListener('click', (event) => {
    if (event.target === stage && stage.classList.contains('is-zoomed')) {
      setZoom(false);
    }
  });

  window.addEventListener('keydown', (event) => {
    if (event.key === 'Escape' && stage.classList.contains('is-zoomed')) {
      setZoom(false);
    }
  });
})();
</script>
