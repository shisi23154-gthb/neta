      width=537&gt;&lt;SPAN&gt;&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　不思議な夢だった。&lt;BR&gt;　ふっつりと意識を奪われてからずっと、セルフィはこの長く不思議な夢に囚われていた。&lt;BR&gt;　昔からセルフィは、極彩色で音にあふれる、リアルな夢を見ることが多かった。&lt;BR&gt;　ガーデンの友達に「普通夢ってもっと曖昧なものだよ」と言われるまで、リアルな夢の方が見る確率が高くて、起きた瞬間忘れてしまう曖昧な夢は疲れている時にしか見ないものだと思っていたくらいだ。&lt;BR&gt;　そんなリアルな夢が、もうずっと長く続いている。&lt;BR&gt;　はじめは夢の世界にセルフィはひとりぼっちで、眼の前に展開される懐かしい過去の記憶を眺めているばかりだった。&lt;BR&gt;　忘れてしまっていた青い鳥と過ごした日々や、青い鳥と出会う前のトラビアガーデンでの日々を思い出した。&lt;BR&gt;　トラビアガーデンにはじめて来た日のことも思い出した。&lt;BR&gt;　トラビアガーデンに来る直前の、イデアの孤児院でのことも、思い出した。&lt;BR&gt;　……思い出してしまった。&lt;BR&gt;　今さら思い出してもどうしようもない、果たされなかった約束の記憶に、セルフィが泣きたくなった時――夢の中に、スコールが現れた。&lt;BR&gt;　どこまでもリアルな夢の中、こんなところまでリアルでなくても良いだろうに、現実そのままの言葉を紡ぐスコールが現れた。セルフィもまた、夢の中だというのに、いつも通りに明るく接しアドバイスまでしてしまった。&lt;BR&gt;　本当に言いたいのは、そんなことではなかったのに。&lt;BR&gt;　夢の中でさえ、伝えたい気持ちを口にすることはできなくて。&lt;BR&gt;　胸の痛みより諦観の方が強くなってしまった胸の内をのぞいているセルフィの前に、また当然のように、スコールの夢が訪れる。&lt;BR&gt;　やっぱりどこまでもリアルな姿で、セルフィの前に現れる。&lt;BR&gt;　諦めたはずのかすかな期待を抱かせるような、そんな姿で。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　吹雪の中を走り抜けた時間は、さほど長くはなかった。&lt;BR&gt;「はい、と～ちゃく！」&lt;BR&gt;　吹雪を抜け、暖かな空気の中に出ると、セルフィは手をつないだままスコールを振り返る。&lt;BR&gt;　思った通り、きょとんとして辺りを見回しているスコールの顔に、思わず吹き出した。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　そこは、イデアの孤児院。&lt;BR&gt;　セルフィにとって、もっとも思い出深い場所のひとつ。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;「ね、こっち来て。こっち～！」&lt;BR&gt;　にこにこと、はしゃいだ笑顔でセルフィはスコールを連れて、イデアの孤児院の裏手にあった抜け道に向かった。&lt;BR&gt;　セルフィは小さな頃から抜け道王である。イデアの孤児院でも、トラビアガーデンでも、セルフィが知らない抜け道などひとつもない。&lt;BR&gt;「なんだ、ここ……」&lt;BR&gt;　呆れたようなスコールの声が背後で聞こえる。少しだけ期待していたセルフィは、それを聞いてがっかりした。&lt;BR&gt;「ほら、こっちこっち～！」&lt;BR&gt;　茂みを抜け、枝をかきわけて。小さな頃はやたらと広かった茂みも、今こうして見ると大した広さではない。&lt;BR&gt;「はい、と～ちゃく～！」&lt;BR&gt;　がさっと茂みをかきわけて、少し開けた場所に出た。&lt;BR&gt;　振り返ると、スコールが驚いた眼差しで立ちつくしている。&lt;BR&gt;　少しだけ、ほんの少しだけまた期待を抱きながら、セルフィはスコールに笑いかけた。&lt;BR&gt;「えへへ～、綺麗でしょ～？」&lt;BR&gt;　イデアの孤児院からは、岩と茂みが隔てて見ることのできない場所。&lt;BR&gt;　切り立った小さな崖の上に咲き誇る、たくさんの背の高い黄色い花。&lt;BR&gt;「……こんなところにも、花が咲いてるんだな」&lt;BR&gt;　小さな花畑の出現に驚いていたスコールが、感嘆の溜息とともにそう呟く。&lt;BR&gt;　セルフィはまた、ちょっとだけがっかりした。&lt;BR&gt;「ね、スコール」&lt;BR&gt;　手を引いて、太陽さながらに咲き誇る花たちに近づき、セルフィはスコールを見上げた。&lt;BR&gt;「この花のこと、覚えてる？」&lt;BR&gt;「え？」&lt;BR&gt;　きょとんとしてセルフィを見返したスコールの瞳の色は、まったく覚えていないことを示していた。&lt;BR&gt;　わかっていたことではあったが、やっぱりセルフィは落胆せずにいられない。&lt;BR&gt;（Ｇ．Ｆ．のばか……）&lt;BR&gt;　溜息をつきたい気分だったが、スコールが自分を見ているので、代わりに笑顔を浮かべてみせた。&lt;BR&gt;「そっか～。じゃあ、いいや」&lt;BR&gt;　こだわりなくそう言い切って、セルフィはスコールの手を離した。&lt;BR&gt;　するりとはずれた指に残る温もりに、自分から手放したくせに寂しくなる。&lt;BR&gt;　笑顔のままセルフィはスコールに背を向け、スコールの温もりの残る手を見えないようにぎゅっと握った。&lt;BR&gt;「昨日くれたのは……ここの花だったのか？」&lt;BR&gt;　静かなスコールの声がする。セルフィは眼を閉じて頷いた。&lt;BR&gt;「うん」&lt;BR&gt;「少し……もったいなかったな」&lt;BR&gt;　セルフィはスコールを振り返った。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　――……もったいないな……&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　記憶の中の声がよみがえる。今よりもっともっと高く幼い少年の声が、同じ言葉を紡いだことを思い出す。&lt;BR&gt;　その懐かしさにセルフィの胸が泣き出しそうに熱くなった。&lt;BR&gt;「だいじょ～ぶだよ～。だって、これは夢だもん」&lt;BR&gt;　懸命に悟られないように笑顔を向けて、セルフィは思い出と違う言葉を返した。&lt;BR&gt;「それに、もう、あの孤児院にここの花、なくなってるから」&lt;BR&gt;「ない？」&lt;BR&gt;　少しだけ眉をひそめてスコールが呟く。セルフィはにこりと笑んで頷いた。&lt;BR&gt;「だってママ先生、アルティミシアになって孤児院出てっちゃったんだもん。世話する人なんていないじゃない」&lt;BR&gt;「わからないぞ。野生化してたくましく咲いているかもしれない」&lt;BR&gt;　ふっとスコールが笑って、ちらりと孤児院のある方角へと眼を向けた。&lt;BR&gt;「今の孤児院を思い出してみろよ。雑草やら何やらがたくましく伸び放題、花畑もちゃんと残ってただろ」&lt;BR&gt;「そ～だね……」&lt;BR&gt;　何も覚えていないスコールの言葉に、けれどセルフィは小さく笑ってみせた。&lt;BR&gt;　覚えていないのはスコールのせいではない。Ｇ．Ｆ．をジャンクションした者は皆、過去の思い出を忘れてしまう。思い出は消えるわけではないけれど、きっかけがない限りは思い出せない。&lt;BR&gt;　きっかけになるかと思ったが、どうやらそうはならなかったようだった。&lt;BR&gt;（当たり前やんか……このスコールは、夢なんやから……）&lt;BR&gt;　あまりにもリアルすぎる夢だから、つい現実と混同しかけた自分に気づき、セルフィは苦い気持ちでいっぱいになった。&lt;BR&gt;「セルフィ？」&lt;BR&gt;　ちゃんと笑顔になっていたつもりだったのに、気づかわしげにスコールが呼びかけた。&lt;BR&gt;「な～に？」&lt;BR&gt;　セルフィは明るく答えた。スコールの眼差しには、やっぱりどこか陰りがあった。&lt;BR&gt;　彼はしばらく言葉を探すように視線を宙に彷徨わせ、やがて静かに言った。&lt;BR&gt;「一緒に、見に行くか？」&lt;BR&gt;「え？」&lt;BR&gt;　なにを？　と続けようとして、セルフィはちょっと言葉をのみこんだ。&lt;BR&gt;　セルフィの背後に咲き誇る、太陽の花たちのことだと悟ったからだった。&lt;BR&gt;「もしかしたら、咲いてるかもしれないし……咲いていないかもしれない。けれど、タネのひとつくらいは、落ちてるかもしれないだろ」&lt;BR&gt;　スコールは花を見て、かすかに笑った。とても優しく、微笑んだ。&lt;BR&gt;「まいたら、また、芽を出すかもしれないだろ。……思い出のタネみたいにさ」&lt;BR&gt;　セルフィが大きく眼を見開いた。&lt;BR&gt;　言葉を失い立ちつくしたセルフィに視線を向け、スコールは少し照れたように肩をすくめた。&lt;BR&gt;「……いつか、あんたが言った言葉だろ」&lt;BR&gt;　壊滅したトラビアガーデンで……。&lt;BR&gt;&lt;BR&gt;　――――消えていく過去に負けない、たくさんの思い出のタネ……&lt;BR&gt;&lt;BR&gt;「セルフィ？」&lt;BR&gt;「覚えてたんだ～？」&lt;BR&gt;　泣き出しそうな笑顔で、セルフィが囁いた。&lt;BR&gt;「……昨日のあんたの言葉で、思い出したんだ」&lt;BR&gt;　苦笑するようにスコールは頷き、セルフィを見つめた。&lt;BR&gt;　セルフィは、にこりと笑った。身体の内側から熱い熱い塊が、胸から喉へとせり上がってくる感覚があった。&lt;BR&gt;　けれどその笑顔にスコールの表情が曇る。&lt;BR&gt;　その曇る表情が何を思っているのかわからないまま、セルフィはゆるゆると首を振った。&lt;BR&gt;「あたしは、きっと行けないよ～」&lt;BR&gt;　きっと、行くことはできないだろう。現実の、イデアの孤児院には。&lt;BR&gt;　それをセルフィはよく理解していた。長い、長いこの夢の中、すでに覚悟はできていた。&lt;BR&gt;「だからスコールが行ってきて。タネがあるなら、まいてあげて」&lt;BR&gt;　にっこりと笑って願いを口にしながら、セルフィは果たされなかった約束を思った。&lt;BR&gt;　あの日かわした、幼い約束。今こうしてセルフィは思い出しているのに、叶えることのできない約束。&lt;BR&gt;　忘れているくせに。約束なんて思い出してもいないくせに、現実通りに忘れた顔で、残酷な言葉を口にする。&lt;BR&gt;（でも、仕方ないんやんか……）&lt;BR&gt;　心の中でスコールを詰ってしまいたい気持ちでいっぱいになりながら、懸命にセルフィは自分に言い聞かせる。&lt;BR&gt;　自分だって、この長い眠りにつく前は、何も覚えていなかったのだから。&lt;BR&gt;「セルフィ……」&lt;BR&gt;　眼の前で、辛そうに眼を伏せてスコールが呟いた。&lt;BR&gt;「なんで、そんなふうに笑うんだよ……」&lt;BR&gt;　ゆっくりとスコールの手が伸ばされ、自分の腕をぎゅっとつかむのを、どこか遠い世界のように見つめながらセルフィが口を開く。&lt;BR&gt;「……あたしはSeeDだから」&lt;BR&gt;　スコールがクッと眼を見開いた。腕をつかむ手の力が強くなった。&lt;BR&gt;　痛みを感じたが、セルフィは声を上げることなく、スコールの顔を見つめ続けた。&lt;BR&gt;　唇を噛みしめ、スコールは不器用に視線をセルフィからそらすと、腕をつかむ力はそのままにぽつんと訊ねた。&lt;BR&gt;「……あんた、なんで、SeeDになりたかったんだ？」&lt;BR&gt;　問いを耳にし、セルフィはふわっと微笑んだ。&lt;BR&gt;　懐かしい言葉だった。&lt;BR&gt;　突然明るく笑ったセルフィに、スコールがいぶかしげな視線を向ける。セルフィはその視線を受け止めながら、ずっと大切にしてきた思い出を口にした。&lt;BR&gt;「昔ね～、ラグナ様が、今のスコールと同じことを聞いてきたことがあったんだよ～」&lt;BR&gt;「……ラグナが？」&lt;BR&gt;「うん。あたし、けっこうエスタに遊びに来たりしてたから、ラグナ様とも仲良しなんだ～」&lt;BR&gt;　いばるように胸を張ったセルフィに、知っていると苦笑してスコールが頷いた。&lt;BR&gt;「それでね～、何の話してた時だったかなぁ～？　ラグナ様がね、あたしに、どうしてセルフィはSeeDになりたかったんだ？　って、聞いたことがあったの」&lt;BR&gt;「セルフィは、なんて答えたんだ？」&lt;BR&gt;　ラグナとは全然違う、けれどラグナに誰よりも似ている瞳で、スコールがたずねた。&lt;BR&gt;「ガーデンで育ったからじゃないかな～って、答えたよ」&lt;BR&gt;　にっこりとセルフィが答えた。&lt;BR&gt;「やっぱ、一番上って目指したいよね～。それがガーデンではSeeDだったってだけなんだよね～」&lt;BR&gt;　それがガーデンで育つということ。ガーデンで培われた価値観。&lt;BR&gt;「あたし、SeeDのあたしが一番好きなんだ～。他の人から見たらSeeDなんて何の価値もないかもしれないけど、少なくともガーデンで育ったあたしにとっては、SeeDは特別だから」&lt;BR&gt;　後悔は微塵もしていないと、セルフィは胸を張って言い切れる。&lt;BR&gt;　どんな結末が訪れようと、間違いなくセルフィはSeeDになることを自分の意志で決め、成し遂げたのだ。与えられるのではなく、セルフィ自身の力で手に入れたものだから、後悔はない。&lt;BR&gt;「トラビアを離れるのだけが、寂しかったな～。もう、帰る場所じゃなくなっちゃうって思ってたから」&lt;BR&gt;　トラビアを離れたあの時、セルフィに孤児院の記憶はひとつも残っていなかった。&lt;BR&gt;　あの時のセルフィにとって、トラビアガーデンはたったひとつの『帰る場所』だった。&lt;BR&gt;　SeeDになることと引き替えに、セルフィはその『帰る場所』を手放したのだった。そうずっと思っていた。&lt;BR&gt;「あたしね、『おかえり』って言われるのが好きだったんだ～」&lt;BR&gt;　恥ずかしそうに笑いながら、セルフィはスコールを見上げた。&lt;BR&gt;「安心するよね～？」&lt;BR&gt;　見上げるセルフィの視線の先で、困ったような曖昧な表情でスコールが頷いてくれた。&lt;BR&gt;　それにセルフィは嬉しくなる。&lt;BR&gt;「それでもね～、SeeDになりたいって思ったんだ～。ちっちゃい頃の夢、叶えたかったんだ～。&lt;BR&gt;　バラムガーデンが、あたしの『帰る場所』だ～って、思えるようになれたらいいなって、思ったよ。&lt;BR&gt;　えへへ、森のフクロウの任務のおかげで、全然バラムガーデンにいられなかったけど」&lt;BR&gt;　セルフィが肩をすくめて笑うと、スコールも苦笑を浮かべた。&lt;BR&gt;　転校した日にはドールの実地試験で、そのままSeeDに承認されて翌日はティンバーと、SeeDになりたてのセルフィは実質一日程度しかバラムガーデンにいなかったのである。&lt;BR&gt;「だから、嬉しかったんだ～」&lt;BR&gt;　視線を伏せて、セルフィは打ち明けるようにぽつりと言った。&lt;BR&gt;「ガルバディアから戻った時……スコールが『おかえり』って言ってくれて、嬉しかったんだぁ～」&lt;BR&gt;「…………」&lt;BR&gt;　スコールが何か言おうとして、結局言葉をのみこむ気配がした。&lt;BR&gt;　ぎゅっと眼を閉じて、セルフィは微笑んだ。&lt;BR&gt;「覚えてた～？」&lt;BR&gt;　スコールからの答えはない。&lt;BR&gt;　覚えていなかったとしても、それは仕方のないこととセルフィは思う。Ｇ．Ｆ．を使い続ける以上、記憶の欠落は避けようがないのだから。&lt;BR&gt;　力と引き替えに記憶を失う。SeeDであるならそれは当然の選択だ。セルフィだって、それを選んだ。&lt;BR&gt;　だから、かまわない。期待もしない。&lt;BR&gt;「あたしが死んだら……バラムのみんなは忘れちゃうよね」&lt;BR&gt;　セルフィという人間が存在したことすら。&lt;BR&gt;　眼を閉じたまま、セルフィはスコールの様子をうかがう。彼が息をつめたのが、はっきりわかった。&lt;BR&gt;　セルフィは微笑んで、小さく首を振った。&lt;BR&gt;「あたしね、それでもいいんだ～。Ｇ．Ｆ．を使い続けたら、それは当たり前のことだもん。&lt;BR&gt;　スコール、昔、過去形にされたくないって叫んだことあったよね。覚えてる～？」&lt;BR&gt;　ちらりと眼を開けて見上げると、スコールがこくりと頷くのが見えた。&lt;BR&gt;　サイファーが死んだと聞かされたあの時、突然激昂したスコールに驚いたので、セルフィはよく覚えている。何に怒り出したのか、後になってしみじみと考え込んで、ようやく得心がいった。&lt;BR&gt;「うん。あたしはね～、過去でもいいやって思ったんだ～」&lt;BR&gt;　スコールが激昂した理由は理解できる。あの頃のセルフィなら同じように思ったかもしれない。&lt;BR&gt;　けれど、今はあの頃ではない。あの頃の、SeeDになったばかりの無邪気な少女はどこにもいない。&lt;BR&gt;「過去でもいいんだ。過去のあたしを、みんなが好き勝手に語ってくれて、それでいいんだよ～」&lt;BR&gt;　理解できないといった眼差しを向けるスコールとまっすぐに視線を合わせ、セルフィは言った。&lt;BR&gt;「だって、その間だけは、覚えててくれるってことだから」&lt;BR&gt;　スコールがわずかに眼を見はる。そんなスコールに、セルフィは強く微笑んでみせた。&lt;BR&gt;「いつかは忘れちゃうあたしのこと、その間は確かに覚えてるってことだから」&lt;BR&gt;　きっといつか、スコールもセルフィを忘れるだろう。&lt;BR&gt;　忘れてほしいと思う。幼なじみで、家族で、SeeDで、仲間だったセルフィを殺した記憶なんて、ない方がいい。&lt;BR&gt;　けれど、せめて。&lt;BR&gt;「覚えている間だけ、思い出して。いつか忘れちゃうまで、懐かしんで。あたしはそれで、嬉しいから」&lt;BR&gt;　スコールが強く眼を閉じ、二、三回首を振った。&lt;BR&gt;　セルフィはスコールの腕にそっと触れると、うつむいてしまった彼の顔をのぞきこんで、笑った。　&lt;BR&gt;「ね、スコールも、SeeDでしょ～？」&lt;BR&gt;　つかんだ腕がかすかに震えた気がした。&lt;BR&gt;　眼を見開いて自分を見つめる群青の瞳に、セルフィは言い聞かせるようにして口を開いた。&lt;BR&gt;「あたしが、Ｇ．Ｆ．に完全に乗っ取られちゃったら……ちゃんと、倒してね。それって、SeeDの義務だよ～」&lt;BR&gt;　　――大丈夫かな？&lt;BR&gt;　言葉を唇に乗せながら、セルフィは考える。&lt;BR&gt;　　――あたしは今、ちゃんと笑えてる？&lt;BR&gt;「だいじょ～ぶ、それを忘れちゃうのは～、SeeDの特権だから。きっと」&lt;BR&gt;　辛い記憶をトラウマにしていたら、戦場で生き残ることはできないから。&lt;BR&gt;　凄惨な記憶も、幸せな記憶も、すべて消え去ってしまえば、未練なく戦って生きていける。&lt;BR&gt;　それがSeeDを最強たらしめる所以のひとつ。&lt;BR&gt;「特権……」&lt;BR&gt;　呆然とスコールが呟いた。きっと、彼はそんなふうに考えたことなどなかったのだろう。&lt;BR&gt;　セルフィはにっこりと笑って頷いた。&lt;BR&gt;「うん、そうだよ」&lt;BR&gt;　だから、気にしなくても平気。大丈夫。&lt;BR&gt;　笑顔で言い切るセルフィに、スコールは難しい顔をした。&lt;BR&gt;　しばらくそのまま無言であれこれと考えているらしいスコールの様子に、セルフィは笑顔のまま、次に彼が口を開くのを待った。&lt;BR&gt;　けれど結局、スコールの中で答えは出なかったようだった。&lt;BR&gt;「！」&lt;BR&gt;　ざぁっと風が吹き、黄色い花びらが空気を染めた。&lt;BR&gt;　思わずセルフィが眼をつぶった途端、すぐ傍にあった存在感が、ふいに消える。&lt;BR&gt;「あっ……」&lt;BR&gt;　声をあげ、セルフィは薄目を開いた。&lt;BR&gt;　咲き誇る花の中、スコールの姿はどこにも見えなかった。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　エルオーネの部屋は、眠っている主のために常に薄暗く設定されていた。&lt;BR&gt;　意外なことに、リノアとアーヴァインが部屋の中にいた。&lt;BR&gt;「やだ、ひどい顔」&lt;BR&gt;　リノアが、スコールの顔を見て思い切り眉をしかめた。&lt;BR&gt;「スコール、ちゃんと眠ってる？」&lt;BR&gt;「……睡眠時間はちゃんと確保してるさ」&lt;BR&gt;　肩をすくめてスコールは答える。そっけない言葉だが、口調はいつもよりやわらかかった。&lt;BR&gt;　それにリノアはそっと微笑む。&lt;BR&gt;「エルオーネは？」&lt;BR&gt;　訊ねたスコールに、リノアは首を横に振った。&lt;BR&gt;「オダイン博士に言わせると、何かの魔力が働いたんじゃないかって言うんだけど……わたしにはうまくそれがわからないんだ。……ごめんね」&lt;BR&gt;　制御の効かない巨大な魔女の力を有するリノアは少しだけしょんぼりとうつむいた。&lt;BR&gt;「リノアのせいじゃないだろ」&lt;BR&gt;　短く呟き、スコールはエルオーネのベッドの脇まで歩み寄る。&lt;BR&gt;　こんこんと眠り続けるエルオーネの白い顔は、薄闇の部屋の中で咲く、白い花のようだった。&lt;BR&gt;「……セルフィ、まだ見つからないんだね」&lt;BR&gt;　ぽつりと、言いにくそうにリノアが呟いた。&lt;BR&gt;「そうだな……」&lt;BR&gt;　溜息と共にスコールが頷く。ルナゲートという手がかりは得たものの、捜索は難航中である。&lt;BR&gt;「わたしね、考えようって思ったんだ」&lt;BR&gt;　突然リノアが、何やら難しい顔で口を開いた。&lt;BR&gt;「セルフィはわたしたちの仲間でしょ？　だから、セルフィを助ける方法が本当にないのか、ちゃんと考えたいんだ。戦わなくてもいい方法、探す努力をしようって」&lt;BR&gt;　スコールは小さく溜息をついた。&lt;BR&gt;「どこかの学者が戦わなくてもいい方法を研究してるかもって？」&lt;BR&gt;「違うよ」&lt;BR&gt;　さらりと黒髪を揺らして、リノアが否定した。&lt;BR&gt;「たしかにわたし、昔はそう言ったよ。でもわたしにだって、わかってるんだから。誰もそんな方法考えてなんてくれないって。自分で考えるしかないんだって。そのくらいわたしも、わかってるよ」&lt;BR&gt;　強い眼差しがまっすぐにスコールを射抜いて、綺麗に輝いていた。&lt;BR&gt;　出会った頃のリノアも、こんな風に強い眼差しで人を見た。けれど今の強さは……以前とまた少し違っていた。&lt;BR&gt;「だから、わたしたちで考えるの。何もしないで運命受け入れるなんて、わたしは嫌だもん」&lt;BR&gt;「……考えても、答えなんて出ないかもしれないぞ。現状は、リノアが思ってるほど甘くないんだ。下手をしたら本当に世界が混乱・滅亡するかもしれないって問題なんだ。リノアはあのＧ．Ｆ．に直接対峙してないだろ？　だからそんなふうに楽観的でいられるんだ」&lt;BR&gt;「楽観的なんかじゃないよ！」&lt;BR&gt;　大きく何度も首を横に振って、リノアが叫んだ。&lt;BR&gt;「わたし、全然楽観的なんかじゃないよ！　わたしが魔女になっちゃったのと同じくらい、どうしようもない事態が現実には起こるってこと、わたしはちゃんと知ってるよ！&lt;BR&gt;　でも、嫌なんだもの。セルフィが死ぬなんて、スコールが殺すなんて、そんなのわたしは嫌なんだもん！」&lt;BR&gt;「喜んで受け入れる奴がいるかよ。……それは……わがままって言うんだろ」&lt;BR&gt;　やり切れない思いで呟いたスコールに、きっとリノアが苛烈な瞳を向けて力をこめて睨んだ。&lt;BR&gt;「わがままで何が悪いのよ！？」&lt;BR&gt;　いきなり怒鳴られ、スコールは思わず言葉を飲み込んでしまっていた。&lt;BR&gt;「わがままの何が悪いのよ、こういうわがまま言って何がいけないのよ！　嫌なものは嫌って言ってどうしていけないの？　セルフィに生きててほしいって思ってどこがわがままなの！？&lt;BR&gt;　わたしはただ、好きな人には生きててほしいって思ってるだけだよ。セルフィも、スコールも、誰もわたしの前からいなくなってほしくない、死んでなんてほしくないって、それだけだもの。&lt;BR&gt;　セルフィだって、残される人の気持ち全然考えてないじゃない。SeeDでいるために死を選ぶなんて、それだって十分わがままじゃない！！　わたしがわがままなら、セルフィだってわがままじゃないの！&lt;BR&gt;　世界が滅ぶからなんだって言うの？　わたしには、世界の顔も知らない人よりも、わたしの大事な人が生きててくれることの方が、よっぽど大事で重要なんだよ！！」&lt;BR&gt;　完全に絶句したスコールに、リノアはびしりと人差し指を突きつけて宣言した。&lt;BR&gt;「わたし、絶対セルフィとは戦わないから！」&lt;BR&gt;「…………は？」&lt;BR&gt;「スコールが考えないなら、わたしひとりでも考える！　セルフィと戦うなんて、わたしはできないもの。スコールが戦うことしかできないなら、わたしはわたしにしかできないことをするって決めたの」&lt;BR&gt;「………………」&lt;BR&gt;「……まだ、わたし、自分に何ができるのかわかってない。&lt;BR&gt;　戦うことはできないって、もうわかってるし……他にどんな方法があるのかも、わからない。&lt;BR&gt;　考えても結論は出ないかもしれないし、結局は戦うことになっちゃうのかも知れない。&lt;BR&gt;　でも、何もしないで流されるのは嫌。考える努力もしないで、セルフィを失うのは絶対嫌。&lt;BR&gt;　Ｇ．Ｆ．つかまえて、黒幕倒して、セルフィがこれからもずっとSeeDで生きていける、そういう未来がいいの」&lt;BR&gt;（……それが可能なら……もちろんそれが一番に決まってる）&lt;BR&gt;　スコールは一度眼を伏せ、しばらく言葉を探して唇を閉じた。&lt;BR&gt;　うまい言葉が、自分の中に見つからない。&lt;BR&gt;「……スコール、ねぇ、聞いて」&lt;BR&gt;　吐息と共にリノアが囁いた。&lt;BR&gt;「SeeDのスコールが戦わなくちゃならないことは、わたしにもわかるの。セルフィがそれを本当に望んでるってことも」&lt;BR&gt;　頭をかすかに傾けてスコールの顔をのぞきこむ。肩口からさらりと黒髪がこぼれて落ちた。&lt;BR&gt;「でもね……スコール。ほんの少しだけ、考えてみて。覚悟を決めることと、あきらめてしまうことは、きっと違うことだって、わたしは思うんだ」&lt;BR&gt;　ふと、スコールは眼を見はった。&lt;BR&gt;　間近く視線を合わせたリノアが、スコールの視線を受けてにこりと笑った。&lt;BR&gt;「いざという時の覚悟って、もちろん必要だと思う。わたしには無理だったけれど……SeeDだったら、当たり前に持ってなくちゃならないことだよね。覚悟もなしに、人を殺すなんて、できないよね。&lt;BR&gt;　でもね、覚悟は決まってるって口で言いながら、わたしにはスコール達が、最初から全部あきらめちゃってるように見えるよ。もう無理だ、セルフィは絶対Ｇ．Ｆ．に操られてしまうって決めつけて、お互い覚悟はできてるって安心させて、ぜ～んぶ、あきらめちゃってるように見えるんだよ。&lt;BR&gt;　どうしてあきらめちゃうの？　まだ何も終わってないよ。悪い方向に悪い方向に事態が動いているのはわたしにもわかるんだ……でも、どうしてあがいてみないの？」&lt;BR&gt;　セルフィは確かに姿を消してしまったけれど、敵の手に落ちたとは限らない。&lt;BR&gt;　Ｇ．Ｆ．に操られても、また自分を取り戻すことができるかもしれない。&lt;BR&gt;「可能性がゼロでないなら、少しでもあがいてみようよ。期待ばかりするのは、バカみたいなことかもしれないけど、でも、ゼロじゃない可能性を放棄しちゃうより、ずっといいよ。&lt;BR&gt;　……きっと、セルフィ、あきらめちゃってる。覚悟を決めたって言葉で、全部全部あきらめてる。だからスコールもあきらめようとしてるんだよね。セルフィが覚悟を決めちゃったから、望んでるからって、あきらめようとしてるよね。&lt;BR&gt;　ねぇ、セルフィがあきらめちゃったなら、せめてわたしたちはあきらめないでいようよ。誰もかれもがセルフィをあきらめちゃうのは、わたしは嫌だよ……」&lt;BR&gt;「……」&lt;BR&gt;　スコールは、無言のまま、ゆっくりと数回まばたきを繰り返した。&lt;BR&gt;　大勢の仲間に囲まれながらも孤独を抱え、手に届かないものすべてを潔く切り捨てるセルフィ。&lt;BR&gt;　それはかつてのスコール自身だ。そうであるが故に、無視することができなかった。&lt;BR&gt;　SeeDであることを何より大切にするセルフィの意志を尊重するために、一番大切なことを失念していた。&lt;BR&gt;（なんだよ、俺）&lt;BR&gt;　つくづく自分の成長のなさにあきれてしまう。これでは一年前、リノアをエスタに引き渡したあの時と何も変わらない。&lt;BR&gt;　もちろん、あの時よりも事態はより深刻であることは事実だし、あの時のリノアと違いセルフィが本心から望みを切り捨ててしまっていることも確かだし、あきらめずに努力しても現実の壁は高いのだけれど。&lt;BR&gt;　それでもあきらめずにあがくことが、すべて無駄になるという確証もない。&lt;BR&gt;　スコールの表情の変化を眼に留め、リノアがにっこりと花のように微笑んだ。&lt;BR&gt;「じゃ、わたし、もう部屋に行くね」&lt;BR&gt;　言いたいことはきちんと伝わったと確信し、答えは聞かずに立ち上がる。&lt;BR&gt;「アーヴァインは、スコールを手伝うでしょ？」&lt;BR&gt;　一緒に部屋まで送るつもりで立ち上がりかけたアーヴァインを振り返り、笑顔でリノアは言った。&lt;BR&gt;「え？」&lt;BR&gt;「わたしは平気。部屋に戻れば護衛の人がいるし、官邸くらいひとりで歩けるよ」&lt;BR&gt;　アーヴァインが大佐を通じてガーデンから派遣してもらったSeeDは、すでにエスタに着いている。セルフィ捜索で多忙のスコールは実は一度も会ったことがないのだが。&lt;BR&gt;「う～ん、でもほら、おねえちゃんのこともあるからさ～、やっぱり部屋まで送るよ～」&lt;BR&gt;　すべてがシステム化され、エスタで最も安全な場所であるはずの官邸で起きたエルオーネの異変。&lt;BR&gt;　どんな一瞬たりとも油断はできないとアーヴァインはきっぱりと言いきる。&lt;BR&gt;「スコールはルナゲートだろ～？　後で僕もそっちに行くからさ～、先行っててよ～」&lt;BR&gt;「……わかった」&lt;BR&gt;　官邸は絶対的に安全なわけではない。セルフィ恋しさでエスタまで来たアーヴァインだが、リノアを護衛する方が最優先である。&lt;BR&gt;　スコールが頷くと、リノアはアーヴァインを連れて部屋を出た。&lt;BR&gt;「スコール」&lt;BR&gt;　扉の外に出ながら、リノアが肩越しに振り返って小さな声で呼んだ。&lt;BR&gt;　眼を向けると、少しだけ申し訳なさそうな顔をしたリノアがスコールを見つめていた。&lt;BR&gt;「捜索、がんばって」&lt;BR&gt;　エスタに居座っていても、官邸を出ることを許されないリノアに、出来ることは何もない。&lt;BR&gt;　以前の彼女からは考えられない殊勝な様子に、スコールはくすっと苦笑した。&lt;BR&gt;「……あぁ」&lt;BR&gt;　頷いてから、スコールは少し考えて、ぽつりと付け加えた。&lt;BR&gt;「絶対、セルフィは取り戻す。……できる限り、あがいてみる」&lt;BR&gt;　リノアがちょっと眼を見はった。&lt;BR&gt;「気づかせてくれたのは……あんたのおかげだ」&lt;BR&gt;「……うん」&lt;BR&gt;　にこっとリノアが笑った。嬉しそうに。&lt;BR&gt;「ありがとう、スコール」&lt;BR&gt;　たとえ官邸で守られなくてはならないリノアでも、出来ることは必ずある。&lt;BR&gt;　きっぱりとそう言い切ってくれたスコールに、リノアの心が温かくなった。&lt;BR&gt;「じゃあ、またね」&lt;BR&gt;　朗らかなリノアらしい笑顔で、機嫌良く彼女は出ていった。&lt;BR&gt;　&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　日はだいぶ高くなっていた。&lt;BR&gt;「おい、大丈夫か？」&lt;BR&gt;　膨大な書類に埋もれて死にかけているSeeDたちの様子に、こちらも疲労の色濃い表情でスコールが声をかけた。&lt;BR&gt;「だいじょ～ぶ～」&lt;BR&gt;　全然大丈夫ではなさそうな調子で、ぐったりとアーヴァインが答えた。&lt;BR&gt;　さすがに一日中書類とコンピュータ画面とのにらめっこが続き、全員ぐったりしかけている。&lt;BR&gt;「あ、そうそうスコール、ここのさぁ～、これ、使用記録残ってないよ～」&lt;BR&gt;「……わかった。他はないか？」&lt;BR&gt;　常日頃から使用記録をきちんと取っていれば苦労はないのだが、最近ようやくルナサイド・ベース復興に向けてプロジェクトが動き始めていたことが災いし、宇宙ステーションの利用頻度はかなり高く、いちいち記録をつけずに使う人間がけっこうな数いたため、ログチェックもひと苦労する羽目になっていたのだった。&lt;BR&gt;「スコール、さっき言っていた午前３時５０分のログ、使用者の確認が取れたよ」&lt;BR&gt;「了解。今確認中なのは……」&lt;BR&gt;「僕が今渡したので……あと１５かな～？　うっわ～ホントにいい加減だよコレ～」&lt;BR&gt;　非常にいい加減な使用状況と職員の使えなさぶりに、スコールはだんだん頭痛がしてきた。&lt;BR&gt;（今日中には終わると思ったんだが、甘かったな……。こういうことは普段からちゃんとやっておけよな……仮にも国の機関がこの有様じゃ未来は暗いぞ……）&lt;BR&gt;　思わずエスタの未来を他人事ながら憂いてしまうスコールだった。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　そしてようやく、目的の使用者不明利用ログにたどり着いたのは、時計の針がちょうど午前０時をさした頃だった。&lt;BR&gt;「…………ねぇスコールさぁ……大統領に、一言文句つけといた方がいいんじゃないの……？」&lt;BR&gt;　ぐったりと疲れ果て、デスクに突っ伏しているアーヴァインが呻くように呟いた。&lt;BR&gt;　戦闘集団なのに何でこんなデスクワークを……と、ぼそぼそ呟くアーヴァインに、まったくだとスコールも内心で深々と頷いた。一日コンピュータ画面とにらめっこしていたおかげで、眼の奥が疲れている。&lt;BR&gt;「敵のハッキングの腕は大したもんだな……情報処理にスカウトしたいくらいだ」&lt;BR&gt;　実際にはセルフィを拉致する二日前にはカプセルを盗み出していたのだが、ログ上ではその痕跡を巧妙に隠してあった。&lt;BR&gt;　ほとんど死体同然のアーヴァインに苦笑しながらスコールが言うと、アーヴァインもうんうんと頷く。&lt;BR&gt;「完全に計画的に動いてるよね……セフィを冷凍しちゃったのって、あそこでなのかなぁ？」&lt;BR&gt;「カプセルをわざわざ研究室に運び込む手間暇を考えると疑問は残るが……セルフィに入り込んでくるＧ．Ｆ．のことを知っていたとするなら、研究室もしくは研究室周辺で冷凍睡眠処置を施した可能性は高いだろうな」&lt;BR&gt;　うんうんと突っ伏したままアーヴァインが頷いた。&lt;BR&gt;「だよね～、その場でやっちゃえばＧ．Ｆ．が付け入る隙もないってわけだし～。監視システムに侵入する手腕といい、プロだよね～これは……」&lt;BR&gt;「セルフィを拉致できるんだから、そりゃプロだろ」&lt;BR&gt;　あっさりと言って、スコールは行儀悪く腰掛けていたデスクの上からひょいと降りた。&lt;BR&gt;「だがあれだけの物を持ち運ぶとなると、それなりの運搬車両が必要になるよな……」&lt;BR&gt;　大きさも人一人横たえて凍らせることのできるだけの容量といえば、けっこうなものだ。&lt;BR&gt;　ルナゲートからエスタ首都までもけっこう離れているし、首都入口から魔法研究所までも距離がある。いくら早朝でも、首都内を運搬車両で走ればそれなりに目立つし、リフターに乗せるにしても広さが足りない。&lt;BR&gt;「そうだよねぇ……監視システムがパーだから尚更そう思うのかもしれないけど、ぱっと唐突に現れて、仕事終えたらぱぱっと消えた、みたいな感じがするよね～」&lt;BR&gt;　アーヴァインは溜息まじりに肩をすくめ、ちらりと時計を見た。&lt;BR&gt;「カプセル、今どうなってるのかな～。三日で自動解凍がはじまるんだよね～？」&lt;BR&gt;「そうだな……そうするとセルフィが拉致されてから……」&lt;BR&gt;　スコールも時計に眼を走らせ、厳しい表情になった。&lt;BR&gt;「あと５時間弱で約７２時間が経過するな……」&lt;BR&gt;　この６７時間あまりの内に、果たしてセルフィはどういう処遇を受けているだろうか。&lt;BR&gt;　冷凍睡眠カプセルの中に入り続けているならば、５時間後にセルフィは眼を覚ます。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　気がつくと、花畑の中に立っていた。&lt;BR&gt;（夢……？）&lt;BR&gt;　いつの間にか眠っていたのだろうか。考えながら、ゆっくりとスコールは首をめぐらせる。&lt;BR&gt;　この夢は、例のリアルな夢だ。だとしたら……。&lt;BR&gt;「あ、スコール～」&lt;BR&gt;　案の定、少し離れたところで花を抱えたセルフィがにっこりと声をかけてきた。&lt;BR&gt;「えへへ、久しぶり～」&lt;BR&gt;　ぱたぱたと駆け寄って、ひょいと黄色い花を一輪差し出す。&lt;BR&gt;　何となくそれを受け取って、スコールはセルフィをじっと見下ろした。&lt;BR&gt;「ん？　な～に？」&lt;BR&gt;　にこにこと小首をかしげるようにセルフィがスコールの様子をうかがう。&lt;BR&gt;　スコールは眼を伏せて、かすかに笑った。&lt;BR&gt;「……多分、もうすぐあんたは眼を覚ます」&lt;BR&gt;「え？」&lt;BR&gt;　セルフィがちょっと眼を見はった。&lt;BR&gt;「あんたは恐らく、ルナゲートにあったコールドスリープ装置カプセルの中で眠らされているんだと思う。カプセルは内蔵電源で７２時間稼働し、７１時間が経過した時点で自動解凍がはじまるんだ。&lt;BR&gt;　俺が眠ったのがいつだか判然としないが……あんたが拉致されてから、そろそろ７２時間が経過するはずだ」&lt;BR&gt;「え？　えぇ～？」&lt;BR&gt;　困惑したようにセルフィが眉をひそめる。混乱しているらしいセルフィに、スコールは小さく笑うと、手を伸ばしてセルフィの手を取った。&lt;BR&gt;　夢とはとても思えない、温もりが手の内に収まっている。&lt;BR&gt;「……ただの夢だとはじめは思ってた。でも……」&lt;BR&gt;　現実と何一つ変わらないセルフィ。セルフィの言葉で、セルフィが紡ぐだろう言葉を口にする彼女。&lt;BR&gt;「誰が見てる夢でも構わない。俺の言葉が、本当にセルフィに届くなら、これが何の夢でもどうでもいい」&lt;BR&gt;「誰の……夢……？」&lt;BR&gt;　ぱちぱちと眼をまたたいて、セルフィがじっと握られた手を見つめた。&lt;BR&gt;　翠色の瞳からは、何を考えているのかは判然としなかったが、スコールはかまわず言葉を続けた。&lt;BR&gt;「俺、３日間、ずっとあんたを探してたんだ……」&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　スコールはセルフィの手を引いて花畑を歩きながら、この３日間のセルフィ捜索の報告をした。&lt;BR&gt;　しばらく黙ってその報告を聞いていたセルフィは、すべて聞き終えてから小さく吐息をついた。&lt;BR&gt;「あたし、眼を覚ましたら～、やっぱりＧ．Ｆ．が入ってきてたりするんだよね～」&lt;BR&gt;「わからないけどな。エルオーネが意識不明になる前に何があったのか……」&lt;BR&gt;　エルオーネの力なしにはＧ．Ｆ．はセルフィの内に入ってくることはできない。&lt;BR&gt;　意識喪失前にエルオーネの力が使われているなら、現在カプセルの中にいるセルフィはＧ．Ｆ．と共に眠っていることになる。&lt;BR&gt;「でも、少なくともセルフィを拉致した奴らは何らかの勝算があって行動しているんだと思う」&lt;BR&gt;「あ、それなんだけど～」&lt;BR&gt;　セルフィは言いにくそうにスコールを見上げた。&lt;BR&gt;「あたしもこれ、ただの夢だと思ってたから言わなかったんだけど……あたしを攫ったのは～、サイファー達なんだよ～」&lt;BR&gt;「……え？」&lt;BR&gt;　無言でセルフィの言葉を聞いていたスコールは、その告白を聞いて眼をむいた。&lt;BR&gt;「サイファーだって？」&lt;BR&gt;「うん。あの時、あたしのいる部屋に入ってきたのは、サイファーだったよ～」&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　あの時。&lt;BR&gt;　セルフィがただならぬ気配を感じたあの時、扉を開けて入ってきた人物。&lt;BR&gt;「よぅ、お姫さん」&lt;BR&gt;　背の高いその姿には、見覚えがあった。&lt;BR&gt;　にやりと笑うその顔も、少しハスキーなその声も、良く知っている。&lt;BR&gt;　セルフィはぽかんとして、握りかけたヌンチャクから手を離した。&lt;BR&gt;「サイファー？」&lt;BR&gt;　サングラスなどをかけてますます柄が悪くなっているが、短い金髪にがっちりした筋肉に覆われた雄々しい体躯、皮肉げな笑みはどこからどう見ても、セルフィの幼なじみのひとり、サイファー・アルマシーである。&lt;BR&gt;「……なんで、サイファーがここにいるの～？」&lt;BR&gt;　しかも、何か違和感があると思えば、いつも着ているあの目立つ白のロングコートを着ていない。&lt;BR&gt;「うるせーな、色々都合があるんだよ」&lt;BR&gt;　なんとなく隠密行動中といった感じのサイファーは苦虫をかみつぶしたようにそう答え、それからサングラスをちょっとずらしてセルフィを見、大仰な仕草で肩をすくめてみせた。&lt;BR&gt;「なんだよ、おまえ。泣いてんじゃねーよ」&lt;BR&gt;「な、泣いてないもん～」&lt;BR&gt;　言い当てられ、セルフィが慌てて両手で頬を覆う。懸命にこらえていたにも関わらず、眼が腫れて言い訳無用の顔になってしまっていた。&lt;BR&gt;　サイファーは「ハッ」と短く笑い、ずかずかと大股でセルフィの前まで歩み寄ると、彼女の腕をつかんでぐいと持ち上げた。&lt;BR&gt;「わ、わ」&lt;BR&gt;　自然つり上げられる格好になったセルフィは、サイファーの前に強引に立たせられた。&lt;BR&gt;「あまり時間がねえんだ。ちょっと来てもらうぜ」&lt;BR&gt;「え？」&lt;BR&gt;　状況がよく飲み込めず、セルフィが眼をくるんとまるくした。&lt;BR&gt;「なんで？」&lt;BR&gt;「詳しい説明をしてる暇はねーんだよ」&lt;BR&gt;「でも、あたしはここ出ちゃいけないんだよ～！」&lt;BR&gt;　サイファーが腕を引っ張ったが、セルフィは足を踏ん張ってそれに抵抗して言い募る。&lt;BR&gt;　唇を曲げてサイファーはにやりと笑った。&lt;BR&gt;「何、その辺のことはちゃんと対策済みだ。こんな部屋にお前を閉じこめて、ひとりで泣かせてるような奴らに義理だてなんかすんじゃねーよ」&lt;BR&gt;「ち、違うったら～」&lt;BR&gt;　かっと赤くなったセルフィの耳元に、サイファーがすいと手を伸ばした。&lt;BR&gt;　耳のすぐ傍でシュッと空気の抜ける音がする。&lt;BR&gt;「……！」&lt;BR&gt;　空中噴霧式の注射だと気づいた時には遅かった。&lt;BR&gt;　くらり、と視界が揺れる。&lt;BR&gt;（う、うそ、うそ～）&lt;BR&gt;　バランスを崩すセルフィをサイファーが片腕で抱き留めた、その感触が最後の記憶。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;「あとのことは～、良くわかんない。気がついたら、夢の中にいたよ～」&lt;BR&gt;　現れたのがサイファーだったので、セルフィは一体自分がどういう状態になっているのかの判断がつけられずにいた。自分が行方不明になっていることも、スコールの話でようやく知ったようなものである。&lt;BR&gt;　ずっと夢を見続けていたことから、おそらく眠っているか封印施設のようなものに封印されてしまったかのどちらかだろうと見当はつけていたが、どういう事情の変化でそうなったかまでは、わからなかった。&lt;BR&gt;　自分の中のＧ．Ｆ．が暴れ出す危険性を思えば当然の措置でもある。このまま永遠に夢の世界に居つづけることになったとしても、それはそれで仕方ないと覚悟も決めていた。&lt;BR&gt;「……そうか……」&lt;BR&gt;　眼を伏せてスコールは小さく呟く。サイファーがセルフィを拉致したというのは、まったく予想外だった。&lt;BR&gt;（はじめからサイファーが今回の事件に噛んでいた？　いや、そんなことはありえない……俺がガーデンに連絡するまで、奴はガーデンにいたわけだし……）&lt;BR&gt;　いくらこちらの様子を観察していたとしても、スコールがあの時ゼルに連絡を取ることなど誰にもわからなかったはずだ。サイファーが偶然にあの通信に出たということは、彼が何も知らずガーデンにいたということになる。&lt;BR&gt;　だとすると。&lt;BR&gt;「サイファーは、セルフィのことを魔女だって言ったんだ」&lt;BR&gt;「魔女～？　あたしが～？」&lt;BR&gt;　眼を点にするセルフィに、スコールはこくりと頷く。&lt;BR&gt;「あんたが使う、スロット魔法……フルケアとか、ジエンドとか……もしもあれを自在に放つことができるとしたら、それはもう、魔女だって言っていた」&lt;BR&gt;　さすがに、かつてトラビアガーデンで起きた事件のことを口にするのははばかられ、そんなふうに説明したスコールに、セルフィは少し納得のいかない表情はしたものの、何も言わずに頷いた。&lt;BR&gt;「あいつさ……魔女の騎士になるのが夢だったんだ」&lt;BR&gt;「知ってる～。ラグナ様の映画を見て以来の夢なんだよね～。&lt;BR&gt;　んじゃ、ひょっとして～、あたしの騎士になるつもりなのかな～？」&lt;BR&gt;　スコールは至極真面目に言っていたのだが、きゃらきゃらとセルフィは明るく笑い飛ばしてしまった。&lt;BR&gt;「あいつ、顔に似合わずロマンチストだよね～」&lt;BR&gt;　笑いながらひょいと肩をすくめ、セルフィはスコールの顔をのぞきこむ。&lt;BR&gt;「なんか、そういうとこ～、スコールと似てるね～」&lt;BR&gt;「俺がロマンチスト？」&lt;BR&gt;　やめてくれと言いたげに顔をしかめたスコールに、セルフィは笑い声を立てながら繋いでいない方の手を伸ばし、スコールの胸に揺れる銀鎖のペンダントに触れた。&lt;BR&gt;「ペンダントやら指輪やらのライオンに名前つけちゃうなんて、ロマンチストに決まってるじゃ～ん」&lt;BR&gt;「…………」&lt;BR&gt;　むっと不機嫌そうな顔になったスコールに、セルフィはくすくすと楽しげに笑う。&lt;BR&gt;「リノアからその話聞いた時は笑っちゃったな～。&lt;BR&gt;　そういえば～、リノアってな～んで指輪なんてほしかったのかな～。&lt;BR&gt;　あたし、スコールの指輪に何彫ってあるのかとか、リノアに聞かれるまで全然知らなかったもん」&lt;BR&gt;　確かにセルフィは他人の装飾品に頓着する性格ではない。納得し、スコールは不機嫌そうな顔からくすりと笑顔を見せた。&lt;BR&gt;「……だろうな」&lt;BR&gt;「あたしだったら～、こっちの方もらうのにな～って、思ってたんだよ～」&lt;BR&gt;　しゃらしゃらと銀鎖に触れながら、セルフィが機嫌良く笑った。背の低いセルフィは、スコールの前に立つとちょうど視線がこのペンダントの位置にくる。&lt;BR&gt;「スコールを思い出すと、いつもこれも一緒に思い出すんだ～、あたし」&lt;BR&gt;　グリーヴァに苦戦したことも合わせて、セルフィにとっては重要な『思い出のタネ』である。&lt;BR&gt;「……やろうか？」&lt;BR&gt;　女の子であればもらうものが指輪であることに大きな意味があるのだろうが、一般的女子の枠から少々はずれているセルフィには関係がないらしい。&lt;BR&gt;　たずねたスコールに、セルフィはぱっと顔を輝かせ、それから慌てて首を振った。&lt;BR&gt;「え～？　いいよいいよ～！　リノアに怒られちゃうよ～？」&lt;BR&gt;「いや、リノアは……いいんだ。怒ることはないから……」&lt;BR&gt;　リノアとスコールは、もう恋人同士ではない。&lt;BR&gt;　詳細を全く知らず、スコールとリノアは未だ恋人同士と思いこんでいるセルフィは少し首をかしげ、スコールはそれにはかまわず言葉を続けた。&lt;BR&gt;「眼を覚ましたら……これはあんたにやる。だから……」&lt;BR&gt;「？」&lt;BR&gt;「何に支配されていても……思い出してほしいんだ」&lt;BR&gt;「……思い出す？」&lt;BR&gt;「セルフィ自身と……俺たちを」&lt;BR&gt;　セルフィがきゅっと眉を寄せてスコールを見上げた。&lt;BR&gt;　スコールはすっと視線を花畑に向けた。&lt;BR&gt;「俺さ……一年前、ここでリノアと約束をしたんだ」&lt;BR&gt;「約束？」&lt;BR&gt;「ラグナの作戦、あっただろ。未来から……帰ってくる時に、俺、ここに帰り着くことができなかったんだ」&lt;BR&gt;　ここでリノアを待つと約束したのに、リノアはちゃんと約束の場所で待っていたのに、スコールはここにたどり着くことができなかった。&lt;BR&gt;「次元の狭間みたいなとこで、迷っているのをリノアが助けに来てくれた」&lt;BR&gt;「ふぅん……」&lt;BR&gt;　ちょっと眼を伏せて、セルフィは自嘲的に小さく笑った。&lt;BR&gt;　花畑に眼を向けているスコールはそれには気づかず、言葉を続けた。&lt;BR&gt;「だから約束はしない。けど……俺はあんたをあきらめないから」&lt;BR&gt;「あきらめる……？」&lt;BR&gt;「もしＧ．Ｆ．に操られても……なんとかして、俺があんたを取り戻すから……」&lt;BR&gt;　きゅっとスコールの手を握り返すセルフィの手に力がこもった。&lt;BR&gt;「セルフィも、最後まであきらめないでくれ」&lt;BR&gt;　ぎゅっとセルフィが強く眼を閉じた。&lt;BR&gt;　しばらく沈黙していたが、やがてゆっくり眼を開き、泣き出しそうな笑顔でスコールを見上げた。&lt;BR&gt;「そんなことしてる間に、あたしスコールを殺しちゃうかもしれないよ～」&lt;BR&gt;　殺すつもりで襲ってくる相手には、殺すつもりで対峙しなければならない。兵士の鉄則である。&lt;BR&gt;　スコールは苦笑するように頷き、繋いだ手を引いてセルフィを引き寄せた。&lt;BR&gt;「…………大丈夫だ」&lt;BR&gt;　とんと額が胸に当たり、セルフィの頬のあたりで銀鎖がかしゃりと鳴った。&lt;BR&gt;「大丈夫だ……俺は負けない」&lt;BR&gt;　どきどきと胸を高鳴らせ、その姿勢のまま凝固し動けなくなったセルフィに、響きの良い声で静かにスコールが囁いた。&lt;BR&gt;「本当にどうしようもなくなったら……どうしてもダメだとわかったら……差し違えてでも、必ずあんたに勝ってやる。SeeDの俺の手で」&lt;BR&gt;　誰の手にも渡さない。&lt;BR&gt;　きっぱりと宣言したスコールに、セルフィはまた眼を閉じた。&lt;BR&gt;　その背にしがみついてしまいたい衝動を押し殺し、繋いでいない手をぎゅっと握りしめ、かすかに微笑んだ。&lt;BR&gt;「……約束？」&lt;BR&gt;「約束じゃない」&lt;BR&gt;　首を振り、スコールも自嘲的に小さく笑った。&lt;BR&gt;「約束じゃない……けど、必ず……」&lt;BR&gt;　また、守れない約束は嫌だから、約束はしない。&lt;BR&gt;　こくりと、胸の中でセルフィが小さく頷き、顔を上げた。&lt;BR&gt;「わかった。あたしも、出来る限りがんばってみる」&lt;BR&gt;　にこっとセルフィらしい笑顔を浮かべて。&lt;BR&gt;「いっぱいい～っぱい頑張って～、Ｇ．Ｆ．、あたしの中から追い出せるように、がんばってみる」&lt;BR&gt;「あぁ」&lt;BR&gt;　するりと繋いだ手が離れる。右手に感じた温もりが遠くなる。&lt;BR&gt;　花の中、笑っていたセルフィが、ふいにぎゅっと眉を寄せ、強く眼を閉じた。&lt;BR&gt;「セルフィ？」&lt;BR&gt;　突然どうしたのかと眼を見開くスコールの前、セルフィのいる風景が急にどんどん遠くなりはじめた。&lt;BR&gt;「スコール……」&lt;BR&gt;　閉じた眼を開いてセルフィが呼びかける。翠の瞳が何かを言いたげにじっとスコールを見つめた。&lt;BR&gt;「スコール、あたし……」&lt;BR&gt;　ぱちぱちと翠の瞳がまばたきを繰り返す。ひどく必死な光を浮かべて。&lt;BR&gt;「スコール、あたしね……あたし、スコールが」&lt;BR&gt;　胸が痛くなりそうに思い詰めた眼差しでまっすぐスコールを見つめながら、セルフィは何度も何度も何かを言おうと唇を震わせ、そのたびにためらい、最後に眼を伏せて小さく笑った。&lt;BR&gt;　それは何かをあきらめるような、切なげな笑顔だった。&lt;BR&gt;「……………なんでもない。……信じてるからね……」&lt;BR&gt;「セル……」&lt;BR&gt;&lt;BR&gt;　ふつりと、景色が途切れた。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　ハッと眼を開くと、そこはエスタのルナゲートの中、大量のログファイルでひっくり返った事務室の片隅だった。&lt;BR&gt;　部屋の中には誰もいない。最後の記憶ではアーヴァインと話をしていた気がしたのだが……。&lt;BR&gt;（時間……）&lt;BR&gt;　時計に眼を向けると、そろそろ６時数分前といったところだった。&lt;BR&gt;（６時……）&lt;BR&gt;　ぼんやりと頭の中で反芻する。ゆっくりと頭の中が回転しはじめた。&lt;BR&gt;（――６時……！？）&lt;BR&gt;　がばっと飛び起き、スコールはそこで自分の肩に備え付けの毛布がかけられていることを知る。&lt;BR&gt;　振り落としてしまったそれを慌てて手に取り、スコールは部屋を飛び出した。&lt;BR&gt;「あ、スコール」&lt;BR&gt;　隣の部屋にいた白いSeeDが２名、驚いたように顔をあげた。&lt;BR&gt;「動きはまだないか？」&lt;BR&gt;「あ、あぁ、何も……」&lt;BR&gt;　スコールはしばらく考える。あの夢をセルフィも見ていたなら、自分とセルフィは同時に目覚めたはずだ。&lt;BR&gt;　セルフィが夢の中で言っていたことをしばらく反芻し、彼女を拉致したのがサイファーだと語られたことを思い出す。&lt;BR&gt;　唐突に現れて、唐突に姿を消した犯人。人の手では持ち運び不可能のカプセルでセルフィを眠らせ、連れ去った者――。&lt;BR&gt;「ラグナロク……」&lt;BR&gt;「え？」&lt;BR&gt;「ラグナロクの現在位置……！」&lt;BR&gt;　トラビアガーデンとバラムガーデンを行き来する都合上、ラグナロクを優先的に使用していたセルフィがエスタに入ったことで、ラグナロクはバラムガーデンに置かれている。&lt;BR&gt;　あの飛空挺なら、カプセルを持ち運ぶことができる。短時間ならジャミングで位置を探られないようにしながら空中に留まることも可能だ。エスタに直接飛空挺を降ろさずとも、研究室のすぐ真上にあれを止めたとしたら――&lt;BR&gt;「え？　あ、え？」&lt;BR&gt;　突然のスコールの剣幕に、何がなんだかわからない白いSeeDたちを置き去りにして、スコールはルナゲートを飛び出した。エスタ・エアステーションの協力を得れば、以前エスタの物だった飛空挺ラグナロクの現在位置など調査するのは容易いだろう。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;「行方不明……！？」&lt;BR&gt;　が、その期待むなしく、エアステーションで返ってきた返答は、ラグナロクの現在位置をレーダーに捉えることが不可能であるとのものだった。&lt;BR&gt;「ジャミングが強いのか、宇宙まで出てしまっているのか……何にせよ、君たちのガーデンにラグナロクはないようだぜ」&lt;BR&gt;　以前、ラグナロクが宇宙に放置状態になってしまった時と同じ状態だと、エアステーション職員は言った。&lt;BR&gt;　あの時はスコールが通信回路を開き応答したことで、エアステーションはラグナロクの現在位置を確認し、エスタまで誘導することができたのだ。この星のどこかにいるのなら探しようがあるが、宇宙にまで出てしまうとどうしようもない。&lt;BR&gt;「宇宙……？」&lt;BR&gt;　スコールが眼を見開いたその瞬間、エアステーション内に警報が高らかに鳴り響いた。&lt;BR&gt;（！？）&lt;BR&gt;　びくりと肩を震わせスコールが天井を仰ぐ。部屋中が警戒色に明滅する中、警報と共に緊急放送が流れた。&lt;BR&gt;『非常警戒態勢レベル２発令、ショッピングモールA－４区画にて殺人事件発生、犯人は北西方面へと逃走中』&lt;BR&gt;　緊急放送を聞くスコールの胸で、小さな通信機がかすかな振動を伝えた。&lt;BR&gt;　頭の中に立ちこめる暗雲に、ぎりっと奥歯を噛みしめながらスコールは通信を開く。&lt;BR&gt;「…………こちら、スコール」&lt;BR&gt;『スコール！　セフィだよ！　セフィが市街に現れた！』&lt;BR&gt;　アーヴァインの切羽詰まった叫び声が耳に届く。予想されたそれに、スコールは思わず瞑目した。&lt;BR&gt;『すごい勢いでエスタ市民を殺してる。Ｇ．Ｆ．の姿は見えないけど、セフィ、空なんか飛んでるからもしかしたら召喚してるのかもしれない。どうする～！？』&lt;BR&gt;　スコールはゆっくりガンブレードを取り出し、強く握りしめた。&lt;BR&gt;　眼を開き、ガンブレードの青い剣先を見つめながら、静かに呟く。&lt;BR&gt;「……了解した。あんたは官邸に戻ってリノアを守れ。俺が行く」&lt;BR&gt;『大丈夫なのかい！？』&lt;BR&gt;　息をのむようなアーヴァインの声。&lt;BR&gt;　ひどく遠い世界のようにその声を聞き、スコールは小さく頷いた。&lt;BR&gt;&lt;BR&gt;　――――信じてるからね……&lt;BR&gt;&lt;BR&gt;　最後に聞いた、セルフィの声が耳元で聞こえた気がした。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;&lt;/SPAN&gt;

<script data-viewer-zoom-script>
(() => {
  const stage = document.querySelector('.viewer-stage-image');
  const image = stage ? stage.querySelector('.viewer-image') : null;
  if (!stage || !image) {
    return;
  }

  const setZoom = (enabled) => {
    stage.classList.toggle('is-zoomed', enabled);
    image.setAttribute('aria-pressed', enabled ? 'true' : 'false');
    if (enabled) {
      const naturalWidth = image.naturalWidth || image.clientWidth || 0;
      const targetWidth = naturalWidth > 0
        ? Math.max(naturalWidth, Math.min(Math.round(stage.clientWidth * 0.92), naturalWidth * 4))
        : Math.round(stage.clientWidth * 0.92);
      image.style.width = `${targetWidth}px`;
      image.style.maxWidth = 'none';
      image.style.maxHeight = 'none';
      requestAnimationFrame(() => {
        stage.scrollTop = 0;
        stage.scrollLeft = Math.max(0, Math.round((image.scrollWidth - stage.clientWidth) / 2));
      });
    } else {
      image.style.removeProperty('width');
      image.style.removeProperty('max-width');
      image.style.removeProperty('max-height');
      stage.scrollTop = 0;
      stage.scrollLeft = 0;
    }
  };

  const toggleZoom = () => {
    setZoom(!stage.classList.contains('is-zoomed'));
  };

  image.setAttribute('tabindex', '0');
  image.setAttribute('role', 'button');
  image.setAttribute('aria-label', '逕ｻ蜒上ｒ諡｡螟ｧ縺ｾ縺溘・邵ｮ蟆・);
  image.setAttribute('aria-pressed', 'false');

  image.addEventListener('click', toggleZoom);
  image.addEventListener('keydown', (event) => {
    if (event.key === 'Enter' || event.key === ' ') {
      event.preventDefault();
      toggleZoom();
    }
  });

  stage.addEventListener('click', (event) => {
    if (event.target === stage && stage.classList.contains('is-zoomed')) {
      setZoom(false);
    }
  });

  window.addEventListener('keydown', (event) => {
    if (event.key === 'Escape' && stage.classList.contains('is-zoomed')) {
      setZoom(false);
    }
  });
})();
</script>
