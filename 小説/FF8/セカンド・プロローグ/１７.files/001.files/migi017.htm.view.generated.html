      width=537&gt;&lt;SPAN&gt;&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　あの日のことは、すべてが偶然の重なりだったのだと思う。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　夜、自分だけが知っている秘密の場所で、海を眺めるのがスコールは好きだった。&lt;BR&gt;　海はエルオーネが旅立って行った場所。だから彼女が帰ってくるなら、海からだと思っていた。&lt;BR&gt;　昼間に海を眺めていれば皆に（主にサイファーに）からかわれる。イデアに哀しげに懇々と諭されてしまう。&lt;BR&gt;　それが鬱陶しくて、スコールは夜、時々海を眺めてはエルオーネの帰りを待っていた。&lt;BR&gt;　その日もそうして海を眺めにベッドを抜け出して、ふと思いつきでいつもと違う抜け道を使ったのは、単なる偶然。&lt;BR&gt;　そして茂みを迷っているうちに、陽光色の花が咲き乱れる小さな花畑にたどりついてしまったのも、単なる偶然だ。&lt;BR&gt;　意外な場所に咲き乱れる陽光色の花たちに驚いたスコールは、その背丈の高い花に抱かれるようにして泣いている少女を発見した。&lt;BR&gt;　小さな背中を丸め、数本の花を抱えて、ひっそりと泣いている幼なじみの少女。&lt;BR&gt;　淡い淡い、消え入りそうな月の光の下で、その小さな背中はひどく寂しく見えた。&lt;BR&gt;　いつも元気に笑って、はしゃいで、走り回っている彼女と同じ人に見えなかった。&lt;BR&gt;　だからスコールは……どうしていいのかわからずに、その場で立ちつくしてしまったのだ。&lt;BR&gt;　無言できびすを返すこともできただろう。だがその時のスコールにはそれができなかった。&lt;BR&gt;　かといって、他人と交流することのほとんどないスコールに、かけるべき言葉などわからない。&lt;BR&gt;　だからその場で、立ちつくしたまま小さな背中を見守ってしまった。&lt;BR&gt;　そして気配に気づき、泣いていた少女が振り返ってスコールを見つけてしまったのだった。&lt;BR&gt;『！』&lt;BR&gt;　涙に濡れる翠の瞳と、まともにスコールは視線を合わせてしまった。&lt;BR&gt;　時が凍り、お互い見つめ合ったまま数秒が経過する。&lt;BR&gt;『あっ……』&lt;BR&gt;　先に視線をそらしたのは、もちろんと言うべきか、スコールの方だった。&lt;BR&gt;　慌てふためいて茂みに飛び込み、方向も何もわからずめちゃめちゃに走る。&lt;BR&gt;『……待って、スコール……！』&lt;BR&gt;　背後から小さな声が追ってきたが、パニック状態のスコールが足を止められるはずもない。&lt;BR&gt;　夢中で走り、枝やら何やらで身体中を傷だらけにしながら茂みを抜けた瞬間、スコールはぎょっと眼を見開いた。&lt;BR&gt;　茂みを抜けた先は、小さな崖だった。&lt;BR&gt;　崖と言っても高さは５メートル程度の小さなもの。しかし幼いスコールからすれば、それは断崖絶壁に等しかった。&lt;BR&gt;　止まらなくては、と思う前に、足が宙を踏んでいた。&lt;BR&gt;『スコールっ！』&lt;BR&gt;　崖の存在をすでに知り、スコールを止めるため追ってきていたセルフィがあげる悲鳴を聞きながら、スコールは崖から落ちていた。&lt;BR&gt;&lt;BR&gt;　海から落ち、もがきながらも天性の運動神経でどうにか水中から顔を出すことに成功したスコールは、ぜいぜいと大きく息をつきながら必死で陸にあがろうと泳いだ。&lt;BR&gt;　景気よく崖から飛び込む形になったため、岩などに身体をぶつけることがなかったのが幸いだった。&lt;BR&gt;　水に落ちた時の衝撃は少々痛かったが、怪我と呼べるものでもない。&lt;BR&gt;　砂地に腰を落とし、ようやく人心地ついた時、セルフィがようやく海岸に走りおりてきた。&lt;BR&gt;　小さな腕で抱えた陽光色の花が、彼女の動きに合わせて楽しげに頭上で揺れている。&lt;BR&gt;『スコール、だいじょうぶ～？』&lt;BR&gt;　荒い呼吸を繰り返すスコールの傍まで歩み寄り、セルフィが訊ねた。&lt;BR&gt;『…………うん』&lt;BR&gt;　さすがにばつの悪そうな表情で、スコールが頷いた。&lt;BR&gt;　セルフィの顔がぱっと明るくなる。&lt;BR&gt;　何にそんなに嬉しそうなのか、スコールにはよくわからなかったが、セルフィはにこにこと笑って言った。&lt;BR&gt;『はじめて、お返事してくれたね～』&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　海から上がったスコール達は、陽光色の花畑に戻った。&lt;BR&gt;『乾くまで、しばらくここにいようよ』&lt;BR&gt;　潮風が吹きさらしの海岸にいれば風邪をひいてしまうし、今孤児院に戻ればイデアに叱られる。&lt;BR&gt;　提案したセルフィに、スコールは黙ってこくりと頷いた。&lt;BR&gt;『スコール、ここ、知ってた～？』&lt;BR&gt;　訊ねるセルフィに、スコールは首を振る。たどり着いたのはまったくの偶然だった。&lt;BR&gt;『よかった～。びっくりさせようと思ってたんだ～』&lt;BR&gt;　ほっとしたようにセルフィが笑い、腕に抱えていた花束から一本抜き取ると、それをひょいとスコールに差し出した。&lt;BR&gt;『はい、スコール。これ、あげる～』&lt;BR&gt;『…………』&lt;BR&gt;　花を眺め無言になったスコールに、セルフィははにかんだようにうつむき、小さく微笑んだ。&lt;BR&gt;『前にね～、ここだけ何にもないのに気がついたんだ～。もしかしたら昔ここに何かあったのかもしれないんだけど、今はなんにもなかったから、タネ植えたんだよ～』&lt;BR&gt;　言ってセルフィは顔を上げ、ぐるりと花畑に視線を向けてまたスコールを見つめる。&lt;BR&gt;『思ったよりたくさん咲いたから、ちょっと窮屈になっちゃった。みんなの分だけ、咲けばいいと思ってたんだけど』&lt;BR&gt;『……切ったの？』&lt;BR&gt;　セルフィの腕の中の花、そして今差し出されている一輪を交互に見、ぽつんとスコールが訊ねた。&lt;BR&gt;『……もったいないな……』&lt;BR&gt;　スコールの言葉に、セルフィは小首を傾げ、にこりと愛くるしく微笑みかける。&lt;BR&gt;『うん。でも、みんなにあげるためだったから、いいんだよ～』&lt;BR&gt;　それにたくさん咲いているし、と付け加え、セルフィはまた背後の花畑に眼を向ける。&lt;BR&gt;『お花、もうすぐしたらタネになるから～、タネになったら、それまいてね』&lt;BR&gt;『…………』&lt;BR&gt;『まいたらきっと、また来年咲くからね。そしたらそれ見て、セフィのこと、思い出してね』&lt;BR&gt;『…………？』&lt;BR&gt;　不思議そうな顔になったスコールに、セルフィは笑顔のままで頷いた。&lt;BR&gt;『セフィね～、ここのおうちを出ていくの。と……とら……なんとかってとこに、行くんだって～』&lt;BR&gt;　珍しいことではなかった。&lt;BR&gt;　少し前に、一緒に育ったゼルも、新しい家族が出来て孤児院を出て行ったばかりだった。&lt;BR&gt;　だから泣いてたんだ、とぼんやりとスコールは思う。&lt;BR&gt;（おねえちゃんとおんなじだ）&lt;BR&gt;　スコールを置いて孤児院を出て行く日、誰にも知られないようにこっそりと泣いていたエルオーネをスコールは知っている。必ずまた会おうねと言ったエルオーネの瞳が赤くなっていたことを覚えている。&lt;BR&gt;（おんなじ……）&lt;BR&gt;　ゆるゆると視線を足下に落とし、スコールは唇を引き結んだ。&lt;BR&gt;　セルフィも何も言わずにスコールを見つめている。&lt;BR&gt;　しばらくの間、沈黙が二人の間をゆっくりと流れた。&lt;BR&gt;『…………』&lt;BR&gt;　やがて動いたのはスコールの方だった。&lt;BR&gt;　手を伸ばし、セルフィが握りしめていた花をそっと取り上げる。&lt;BR&gt;　驚いたように翠色の瞳がスコールを見つめた。&lt;BR&gt;『……さみしく、ないの』&lt;BR&gt;　花を握り、視線をそこに落としたまま、ぽつんとスコールが呟く。&lt;BR&gt;『さみしいよ』&lt;BR&gt;　淡々と、セルフィが答えた。&lt;BR&gt;『うそだよ』&lt;BR&gt;　ぎゅ、と眼に力をこめ、スコールがまっすぐにセルフィを睨んだ。&lt;BR&gt;　突然睨まれ、セルフィはきょとんとした表情でそんなスコールを見つめ返す。&lt;BR&gt;　邪気のない無垢な瞳の向こうに、誰より愛した姉の姿が透かし見えるようで、スコールはさらに眼に力をこめた。&lt;BR&gt;『さみしいのなんか、この家を出る時だけなんだ。出て行っちゃったら、もうさみしくなんかなくて、戻りたいなんて思わなくて、全然、思い出したりしないんだ……！』&lt;BR&gt;　いっきに喋った。&lt;BR&gt;　無口で愛想がなくて笑った顔など見たこともない少年の、思いもかけない多弁ぶりにセルフィは一瞬面食らったように眼をまたたいた。&lt;BR&gt;　ほんの少し困ったように、かすかに小首を傾げてスコールの瞳をのぞきこむ。&lt;BR&gt;　そこに押しつけがましい同情は感じられなかったから、スコールは頑張ってその瞳を受け止め続けた。&lt;BR&gt;　こんなふうに人の眼をまっすぐ見たことなど、およそこれまでの人生で経験のないことだった。&lt;BR&gt;『……さみしいよ』&lt;BR&gt;　瞳と瞳を結び合わせたまま、セルフィがもう一度口を開いた。&lt;BR&gt;『出てったあとのことは～、セフィ出たことないからわかんないけど～、でも、でも、今さみしいって思う気持ちは、本物だよ～』&lt;BR&gt;　言葉と共に小さな両手がぎゅっと胸の前で握りしめられる。&lt;BR&gt;　翠の瞳からぽろりと涙がこぼれて落ちた。&lt;BR&gt;『それじゃ、だめ？』&lt;BR&gt;　ほんの少し寂しそうな顔、あどけない頬にぽろぽろとこぼれ落ちていく涙の珠。&lt;BR&gt;　スコールは一瞬その雫に眼を奪われ――気がつくと夢中で首を振っていた。&lt;BR&gt;『だめじゃない……』&lt;BR&gt;　言ってから、スコールはぎゅっと唇を強く噛みしめた。&lt;BR&gt;　自分を置いて出ていったきり、帰らぬ姉と混同して八つ当たりをしてしまった少女の涙に、胸が苦しくてたまらない。&lt;BR&gt;『ね、スコール』&lt;BR&gt;　スコールの視線を受け止めながら、セルフィは小さな手でぐいと涙を拭ってみせた。&lt;BR&gt;『スコール、ちょっとだけでも、セフィのことおぼえててくれる～？　さみしいって、思ってくれる～？』&lt;BR&gt;　小首をわずかに傾げた愛らしい仕草で、そう問いかける。&lt;BR&gt;　もともと声をかけても笑顔を向けても無反応だったスコールなので、あまり期待はせずにかけられた問い。&lt;BR&gt;『…………』&lt;BR&gt;　翠の瞳から視線をはずし、スコールは不器用そうに手にした花を見下ろした。&lt;BR&gt;　月明かりの下で見るその花は、太陽の下で見るより少し寂しそうに首を垂れている。&lt;BR&gt;　誰もが眠る夜にだけこっそりとうつむいて、誰もが目覚める朝には元気に顔を上げている花。&lt;BR&gt;　それはまるで、さっき見たセルフィの姿そのものだった。&lt;BR&gt;『……………………おぼえるだけじゃ、たりないよ』&lt;BR&gt;『？』&lt;BR&gt;　長い長い沈黙の後、ようよう小さく呟いたスコールに、セルフィが良く聞き取れずに首を傾げる。&lt;BR&gt;　勇気を振り絞って顔を上げ、もう一度その翠の瞳を正面から見つめたスコールは、懸命に口を開いた。&lt;BR&gt;『ぼく、知ってるんだ。いつか、セフィとおんなじに、ぼくもこの家を出ていかなくちゃいけないって』&lt;BR&gt;『……うん』&lt;BR&gt;　こくんとセルフィが頷く。&lt;BR&gt;　ここは子供の間しかいられない家。遅かれ早かれ、皆いつかはこの家を出て行かなければならない。&lt;BR&gt;『だからぼくがここで待ってても……おねえちゃんはここには帰ってきてくれない。どんなにぼくがおねえちゃんをおぼえてて、どんなに一生懸命待ってても、おねえちゃんには会えないんだ』&lt;BR&gt;『うん』&lt;BR&gt;　もう一度、セルフィは頷く。&lt;BR&gt;　先ほど自分を睨んだスコールが、誰を思ってあの言葉を口にしたのか、セルフィにも何となくわかった気がした。&lt;BR&gt;『だから……だから……ぼく、決めたんだ。ぼくはもうおねえちゃんを待たない。ぼくは早く大きくなって、強くなって、何でもひとりでできるようになって、どこにでもひとりで行けるようになって……そうしておねえちゃんを捜しに行くんだって』&lt;BR&gt;『すごいね～』&lt;BR&gt;　セルフィがにこりと笑う。&lt;BR&gt;　置いて行かれたスコールしか考えつかないだろうその決意が、孤児院を出ることに動揺するばかりだったセルフィにはひどく大人の考えに見えた。&lt;BR&gt;　無邪気な称賛の視線を向けられ、こんなにも連続して言葉を喋ったことなどついぞないスコールは、かぁっと顔を赤くする。&lt;BR&gt;　どきどきと鼓動を早まらせながら、スコールは一番言わなければならないことを、しどろもどろに口にした。&lt;BR&gt;『…………もし……いつか……いつかぼくが、おねえちゃんを捜すことができたら…………』&lt;BR&gt;『？　うん』&lt;BR&gt;『そしたら……ぼく、……捜しに、いくよ……』&lt;BR&gt;『……セフィを？』&lt;BR&gt;　くるんと翠の瞳をまるくして、セルフィが訊ねた。&lt;BR&gt;　こくんとスコールが小さく頷く。真っ赤な顔は、なんだか汗でいっぱいだった。&lt;BR&gt;『…………やならいいよ』&lt;BR&gt;　付け足しのようにぽつりと呟く。聞こえた声に、セルフィがぱあっと笑み崩れた。&lt;BR&gt;『やじゃないよ～！！』&lt;BR&gt;　大きな声で叫ばれ、びっくり顔になるスコールに、セルフィは頬を上気させて大きく頷いた。&lt;BR&gt;『そしたら、そしたら～、セフィもおっきくなって、つよ～くなって、スコールのこと捜す！　スコールと、おねえちゃんのこと捜す！　ひとりで捜すより、二人がいっぺんに捜し合ったら、きっとも～っと早く見つけられるよね！』&lt;BR&gt;　まくしたてるセルフィの笑顔は、いつも通りのお日さまそのものの全開の笑顔だ。&lt;BR&gt;　その笑顔にスコールの心が、少し明るくなる。何かに締め付けられそうだった胸が、ゆるんでいく感じがした。&lt;BR&gt;『強くなるなら、泣いてちゃだめなんだ。何でもひとりでできるようになるなら、絶対泣かないで、強い大人にならなきゃいけないんだ』&lt;BR&gt;　誰にも言わず、こっそりと自分の胸の内に打ち立てていた決意を、スコールはセルフィに打ち明けた。&lt;BR&gt;　神妙に告げられた言葉に、セルフィも何やら神妙な面もちになってこくりと頷く。&lt;BR&gt;『うん、わかった！　セフィもう泣かないよ～！　ひとりになっても、ぜ～ったい泣かない！』&lt;BR&gt;　ぐっと小さな手を握りしめて決意を新たにし、それからスコールに瞳を向けてにこりと笑った。&lt;BR&gt;『約束、だよね～？』&lt;BR&gt;　確認するように訊ねたセルフィに、スコールがちょっと眼を見はる。&lt;BR&gt;（約束……）&lt;BR&gt;　エルオーネがいなくなって以来、縁のなかった言葉。&lt;BR&gt;　スコールにとって、失望しか生み出さないその言葉が、しかしその時は、なぜかひどく温かなものに思えた。&lt;BR&gt;　信じるに足る、絶対のものであるように思えた。&lt;BR&gt;『……うん』&lt;BR&gt;　だから、頷いた。&lt;BR&gt;『約束する――』&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　だからどうか。&lt;BR&gt;　どうか泣かないで。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　こめた願いに、あの時陽溜りのように笑った彼女は気づいただろうか。&lt;BR&gt;　同じように笑い返してみたくて、けれど笑い方すら知らなかった自分の心を、彼女は知っていただろうか。&lt;BR&gt;&lt;BR&gt;　――――この星のどこにいても、どんなに時間をかけても必ず、捜し出す。&lt;BR&gt;&lt;BR&gt;　期限も定めず、待ち合わせる場所すら決めずにかわした、真摯な幼い約束。&lt;BR&gt;　どれほどの遠回りをしたとしても、その約束は必ず果たされなければならないのだ。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　エルオーネの力でセルフィの精神世界に意識を移した途端、激しい咆吼が空間を揺るがした。&lt;BR&gt;　一体何が、と眼をむいた瞬間、見覚えのある獣が襲いかかってくる。&lt;BR&gt;「うわっ……」&lt;BR&gt;　とっさに手がガンブレードを探して腰を探ってしまったが、もちろんそんなものはついていなかった。&lt;BR&gt;　一瞬体勢が崩れかけたが、そこは天性の反射神経を駆使して襲いかかってきた獣から身をかわす。&lt;BR&gt;『スコール！？』&lt;BR&gt;　スコールと意識を接続しているエルオーネの、驚く声が響いて聞こえた。&lt;BR&gt;（なんだ……！？）&lt;BR&gt;　背後で着地した獣に、素早く振り返って対峙しながら、スコールは形の良い眉をかすかにひそめる。&lt;BR&gt;　見覚えのある獣。現実に見たこともある。あの時はもう少し、恐怖の対象としてデフォルメされていたけれど――&lt;BR&gt;（グリーヴァ……）&lt;BR&gt;&lt;BR&gt;　伝説の獣。スコールがグリーヴァと名を付け自身の理想形として心に掲げていた最強の獅子。&lt;BR&gt;　いつも胸元に揺れていた銀鎖のペンダントは今はない。スコールには必要なくなったそれは、セルフィの手に渡った。&lt;BR&gt;　襲いかかってくる爪と牙を無駄のない動きで避けながら、何故こんなところにグリーヴァがいるのかスコールは考える。&lt;BR&gt;『……ここから先はきっと、セルフィの深層意識なのよ』&lt;BR&gt;　エルオーネの声がまた響いた。&lt;BR&gt;『夢とはまた少し違う……セルフィの意識を守るためにイメージされたもの。あの子の能力の本質は夢よ。だからこんな風に、明確なイメージを創り出すことができるんだわ……』&lt;BR&gt;&lt;BR&gt;　――――スコールを思い出すと、いつもこれも一緒に思い出すんだ～&lt;BR&gt;&lt;BR&gt;　そう言って笑ったセルフィが、ふいによみがえった。&lt;BR&gt;　ひとりで生きるために、絶対的な力に憧れたスコールによく似たセルフィ。&lt;BR&gt;（だったら……）&lt;BR&gt;　軽く宙を蹴ってグリーヴァの右脚の一撃をかわし、地面に降り立ちながらスコールは瞳に鋭い光を浮かべた。&lt;BR&gt;　かつてアルティミシアと戦ったあの異次元空間と同じような、不安定だが確かな地面の感触が踵を捉える。&lt;BR&gt;　身も凍るような咆吼を上げ、一撃をかわされたグリーヴァが体勢を変え、スコールに突っ込んでくる。&lt;BR&gt;『スコール！？』&lt;BR&gt;　ぐっと踵に力を込め、スコールは右手を持ち上げると、まっすぐそれをグリーヴァに突き出した。&lt;BR&gt;（！）&lt;BR&gt;　突っ込んできたグリーヴァがスコールの右腕に鋭い牙を立てながらスコールを押し倒す。&lt;BR&gt;　精神体とは言え灼熱の痛みはまさに本物。眼の前が真っ白になるほどの衝撃を受けながら、スコールはグリーヴァの重みを受け止め地面に倒れた。&lt;BR&gt;『スコール、何してるの！？　ここで死んだらあなたは……！』&lt;BR&gt;　エルオーネの悲鳴のような声が響いてきたが、スコールはぎりっと歯を食いしばって激痛をこらえ、その声を無視して右腕を食いちぎろうとするグリーヴァを睨んだ。&lt;BR&gt;「……わかるはずなんだ……！」&lt;BR&gt;　なぜセルフィの深層意識へのゲートキーパーが、グリーヴァなのか。&lt;BR&gt;　スコールを見ればグリーヴァを思い出すと、そう語った彼女の言葉が真実であるなら――&lt;BR&gt;「俺が誰なのか、あんたにはわかるはずだろう！？」&lt;BR&gt;　骨を噛み砕かれる音を聞きながら、スコールは激痛を振り払うように声を張り上げる。&lt;BR&gt;　グリーヴァの太い前脚が、スコールの喉笛を踏み抜こうとぐっと重みを増した。&lt;BR&gt;「あんたは俺を、俺を待っているんじゃないのか……！？」&lt;BR&gt;　すぐ間近にあるグリーヴァの瞳を睨み据え、無事な左手でたてがみを握りしめてスコールは言葉を続ける。&lt;BR&gt;　獣の瞳の奥にいる、たったひとりの少女に向かって。&lt;BR&gt;「俺はお前を捜しに来たんだ、セルフィ……！！」&lt;BR&gt;　忘れられていた幼い約束を果たすために――&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　スコールの喉に爪を立てていたグリーヴァの脚が、ぴたりと止まった。&lt;BR&gt;　小さな唸りと共に右腕が解放される。あまり見たくない状態になっているだろうことはわかったので、スコールはあえて視線を右腕に向けず、グリーヴァに固定し続けた。&lt;BR&gt;　スコールの注視する中、グリーヴァの身体がぽう、と淡く発光しはじめる。&lt;BR&gt;　淡い淡い蒼の光の粒子が空間を包み、グリーヴァの輪郭がゆっくりとほどけて溶けていく。&lt;BR&gt;（………）&lt;BR&gt;　無言で様子を見守るスコールを包む空間すべてが、光に包まれた。&lt;BR&gt;　すぐ眼の前にいたはずのグリーヴァの姿すら見えない、高い濃度の光。手をのばせば、光の粒子をすくえそうなほど。&lt;BR&gt;　そして。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　次の瞬間、スコールはまったく違う意識空間の中にいた。&lt;BR&gt;　どこまでも広く続く、鮮やかな緑の草原と咲き誇る花。&lt;BR&gt;　懐かしい光景。&lt;BR&gt;&lt;BR&gt;　それがどこであるか、もちろんスコールは知っていた。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　誰もいなかった。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;「…………」&lt;BR&gt;　光景こそ見覚えのあるものだったが、ひどく寂しい空間にひとり立ちつくし、セルフィはしばらくぼんやりと辺りを眺め回していた。&lt;BR&gt;「う～ん……」&lt;BR&gt;　小首を傾げ、腰に手を当てて考える。&lt;BR&gt;　胸元で銀鎖が涼しい音を立てた。&lt;BR&gt;「な～んか、拍子抜け～」&lt;BR&gt;　ひとりごち、獅子のペンダントトップ――グリーヴァを握りしめながらぐるりともう一度周囲を見回してみる。&lt;BR&gt;　セルフィが立っているのは、イデアの孤児院だ。&lt;BR&gt;　廃墟と大差ない石造りの孤児院。雑草がたくましく生い茂り、潮と花の香りが合わさって鼻腔に届く。&lt;BR&gt;「天国ってさ～、もっと超おもしろいとこなのかと思ってたのにな～。これじゃ夢とおんなじじゃ～ん」&lt;BR&gt;　声をかける相手もいないので、とりあえずグリーヴァに文句を言ってみる。&lt;BR&gt;　こんなものならジエンドで見た夢の方がよほど天国だった。&lt;BR&gt;　ひとしきり文句を言ってから、セルフィはあることに気がつき、ちょっと溜息をつく。&lt;BR&gt;「そっか、そういえばあたし、天国に行けるはずなかったんだっけ……」&lt;BR&gt;　SeeDになり、生きるために任務の名のもと数多くの命を屠ってきた自分が天国に行けるなどと、考える方がそもそもおこがましい。&lt;BR&gt;「ってことは～、ここって地獄～？　……う～ん、でもやっぱり拍子抜けだな～」&lt;BR&gt;　地獄だったらもう少し、怖かったり恐ろしかったり苦しかったりしそうなイメージだったのだが。&lt;BR&gt;　これでは本当に、冷凍睡眠状態になった時に見ていた夢と大差がない。&lt;BR&gt;　考えながらセルフィはゆっくりと歩き出す。昔の記憶を頼りに抜け道を見つけ、秘密の花畑へと通り抜ける。&lt;BR&gt;「うわぁ……」&lt;BR&gt;　天国でないならと半分以上期待していなかったのだが、茂みを抜けた先に陽光色が一面に広がっていた。&lt;BR&gt;「ほんとに夢とおんなじだぁ……」&lt;BR&gt;　感激し、セルフィはぱたぱたと花たちに走り寄る。&lt;BR&gt;　腕を伸ばして背の高い花を抱きしめると、たしかな感触があった。幻ではない。&lt;BR&gt;　誰も人がいないのは寂しいが、天国に行ける自分ではないのだから仕方のないことだ。&lt;BR&gt;　夢と大差ないこんな世界なら、セルフィに不服があるはずもない。&lt;BR&gt;（夢とおんなじ……）&lt;BR&gt;　花を抱きしめたまま、セルフィはふっと唇から笑みを消した。&lt;BR&gt;　何もかも、夢と変わりないこの世界。&lt;BR&gt;（ちがうのは……）&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　――――スコールが決して、この世界に来ないということだけ……。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　ぱた、と何かが落ちた。&lt;BR&gt;（…………？）&lt;BR&gt;　ぼんやりと眼を動かし、顔を埋めている大きな緑の葉の上に落ちた雫を眼に止める。&lt;BR&gt;（あ……）&lt;BR&gt;　慌てて抱きしめていた花から腕をほどき、ごしごしとこぼれた涙をぬぐう。&lt;BR&gt;　泣いてはだめだ。泣いたら強くなれないから……。&lt;BR&gt;（――――）&lt;BR&gt;　いつものように心の内で呟いて、それからセルフィはぴたりと涙を拭う手を止める。&lt;BR&gt;（泣いていたら、強くなれない……）&lt;BR&gt;　幼い頃から呪文のように繰り返し紡いでいた、セルフィの大切な言葉。&lt;BR&gt;　その言葉が、突然価値を失いぽかんと心の中で宙に浮く。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　――――なんのために？&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　なんのために、強くなるのか。なんのために、強くなりたいと望んだのか。&lt;BR&gt;（生きる、ため……）&lt;BR&gt;　翠の瞳を呆然と見開き、ずるりとセルフィはその場に座り込む。&lt;BR&gt;　涙をこらえる必要が、どこにもないことに気づいてしまった。&lt;BR&gt;　強くなる必要が、まったくなくなったことに気づいてしまった。&lt;BR&gt;　セルフィはもう、生きていないのだから――。&lt;BR&gt;（あぁ、そう……もう……）&lt;BR&gt;　そう。セルフィはもう死んだのだ。自分で選んで、自ら破滅の道を進んだ。&lt;BR&gt;　だからもう誰の眼を気にする必要もない。誰もいないこの世界で、永遠にたゆたっていればいい。&lt;BR&gt;（だれもいない――）&lt;BR&gt;　見ている人は誰もいない。だから強がる必要はもうなかった。&lt;BR&gt;　嗚咽をこらえたり、無理に笑顔を浮かべたり、辛い気持ちから眼をそらす必要も、もうない。&lt;BR&gt;&lt;BR&gt;　――――けれどそれは、なんて寂しいことだろう？&lt;BR&gt;&lt;BR&gt;「……あ……」&lt;BR&gt;　呆然と呟きが唇からこぼれた。ひどい脱力感と疲労感だけが心に残った。&lt;BR&gt;　見開いたままの瞳から、流れていた涙が凍えて止まる。&lt;BR&gt;　地面に腰を落としたまま、セルフィはぼんやりと丈高い花たちを見上げた。&lt;BR&gt;　十数年も昔、自分がこっそりと種をまき育てた花たちを見た。&lt;BR&gt;（……遠いなぁ……）&lt;BR&gt;　涙を流す気力すら失ってしまったセルフィは、顔を上げたままゆっくりと眼を閉じた。&lt;BR&gt;　この花たちに別れを告げてトラビアに行ったあの日から、自分はなんて遠くに来てしまったのだろう。&lt;BR&gt;（なんや、疲れたなぁ……）&lt;BR&gt;　頑張って頑張って――必死に顔を上げて笑顔を振りまいて頑張って、限られた選択肢から選んで歩いてきた今までの道の行き着く果てが、この寂しい花畑だったなんて。&lt;BR&gt;　うつろに想いを巡らせるセルフィの身を、ふわりと暖かい何かが包む。&lt;BR&gt;　すっかり疲れ果ててしまったセルフィは、思考することを放り出し、哀しいほど穏やかなそのまどろみに身をゆだねた。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　広い花畑に、スコールは腰を落としていた。&lt;BR&gt;　ここはセルフィが見ている夢とは少し違う。夢とは、覚醒時の記憶を脳が整理する時に見えるものだ。&lt;BR&gt;　かつてスコールが無意識にセルフィに接続していたあの時もそう。厳密に言えば『夢』とは少し異なっている。&lt;BR&gt;（ここのどこかに、セルフィの意識がいるってことか……）&lt;BR&gt;　考えながら、ゆっくりと身を起こす。ふと気づいて右腕に視線を向けると、グリーヴァに噛み砕かれていたはずの右腕には、傷跡ひとつ残っていなかった。&lt;BR&gt;　立ち上がり、全身をくまなくチェックする。特別痛んだり具合の悪いところもない。&lt;BR&gt;　ほっと息をつき、スコールはぐるりと周辺を見回した。&lt;BR&gt;&lt;BR&gt;『セフィ？』&lt;BR&gt;&lt;BR&gt;　突然、誰もいないと思っていたその場に、穏やかな女性の声が響き渡った。&lt;BR&gt;&lt;BR&gt;『セフィ、どうしたの？　泣いているの？』&lt;BR&gt;&lt;BR&gt;　ぎょっとして振り返るスコールの視線の先に、漆黒の長衣を身にまとった女性が、スコールに背を向けて立っている。&lt;BR&gt;　腰に届こうかというほどに長く伸ばされた癖のない黒髪の主を、スコールは良く知っていた。&lt;BR&gt;（ママ先生……？）&lt;BR&gt;　眉をひそめるスコールの前で、イデアは花を踏みつぶさないよう細心の注意を払いながら、ゆっくりと歩み進んでいく。&lt;BR&gt;&lt;BR&gt;『ママ先生……』　&lt;BR&gt;&lt;BR&gt;　イデアの進む先から、小さな少女の声がゆっくりあがった。&lt;BR&gt;　いつからそこにいたのか、花畑の中にしゃがみこみ、ずっと泣いていたらしい幼い少女がイデアを見上げている。&lt;BR&gt;　大きな翠色の瞳にも、あどけない頬にも、涙がたくさんあふれていた。&lt;BR&gt;『ママ先生……どうしてセフィ、ここを出なくちゃいけないの？』&lt;BR&gt;　眼の前に腰を落としたイデアに、泣きじゃくりながら幼いセルフィが訴える。&lt;BR&gt;『ママ先生、セフィのこと、きらいなの？』&lt;BR&gt;　訊ねるセルフィに、困ったようにイデアが微笑んだ。&lt;BR&gt;&lt;BR&gt;（これは……）&lt;BR&gt;　展開される光景に、スコールはようやく合点がいく。&lt;BR&gt;　これはセルフィの過去の記憶だ。恐らく月明かりで約束を交わした夜の、少し前の出来事。&lt;BR&gt;　この世界はすべてセルフィの意識で満たされている。あちこちで、セルフィの記憶が眠っているのだ。&lt;BR&gt;&lt;BR&gt;『そんなこと、あるはずないわ。セフィ』&lt;BR&gt;　ほっそりした白い手を伸ばし、イデアはセルフィの明るい栗色の髪を優しくなでた。&lt;BR&gt;『ママ先生はセフィのことが大好きよ。でもこの家は、小さな子供の間しかいられないお家なの』&lt;BR&gt;　寂しそうに微笑みながら、諭すように静かにイデアは語りかける。&lt;BR&gt;　本来ならもう少しだけ長く、孤児院にいられるはずだったセルフィ。明るく可愛らしい彼女なら、里親となってくれる人だって見つかったかも知れない。&lt;BR&gt;　内に眠る潜在能力のために、それはすべて叶わなかった。だからイデアの微笑みは、どこか哀しいものになる。&lt;BR&gt;『セフィはいい子だから、わかってくれるわね？』&lt;BR&gt;　願いすらこめ、イデアが囁く。聡明なセルフィなら言外ににじませた願いを感じ取るだろうことなど、百も承知で。&lt;BR&gt;『ねえ？　セフィはいい子でしょう？』&lt;BR&gt;　それは大人のエゴなのかもしれない。&lt;BR&gt;　けれど幸せを願う気持ちも、確かに本物で。&lt;BR&gt;『うん』&lt;BR&gt;　そしてもちろんセルフィは、イデアの期待を裏切ることなどありえないのだ。&lt;BR&gt;『うん、ママ先生。セフィはいい子だよ。ずっとずっといい子でいる』&lt;BR&gt;　涙をこらえて、にっこりと笑顔を作って。&lt;BR&gt;『いつもにこにこ笑ってて、強くていい子のセフィでいるよ』&lt;BR&gt;　幼い誓いは素直なセルフィの心を縛っていく。&lt;BR&gt;　たったひとり、月明かりに照らされた花の陰で、ひっそり泣くことしかできなくなるほどに。&lt;BR&gt;『ずっとずっと、いつもいい子のセフィでいるから……だからママ先生、セフィのこと、忘れないで』&lt;BR&gt;　忘れられてしまいたくない。&lt;BR&gt;　幼い心に刻みつけられた、忘却への恐怖が胸に痛かった。&lt;BR&gt;『ずっとずぅっと、大好きでいて……』&lt;BR&gt;&lt;BR&gt;　――――覚えている間だけ、思い出して。&lt;BR&gt;&lt;BR&gt;　夢の中でそう言ったセルフィ。&lt;BR&gt;　本当は、忘れられてしまうことを誰より恐れていたはずなのに。&lt;BR&gt;　イデアと、そして他ならぬ自分と交わした約束と誓いに縛られて、ひとりで泣くことすらできず、前ばかりを向いて懸命に生きたセルフィ。&lt;BR&gt;　約束したことすら忘れてしまっても、彼女の中で誓いはずっと生き続けていた。弱い自分を克服するために、哀しみに対して徹底的に無自覚を貫き、幸せなのだと自身を納得させることで最後まで誓いを守り抜いて――&lt;BR&gt;&lt;BR&gt;『――ホントにいい子だなぁ、セルフィは。エルやイデアの言ってた通りだ』&lt;BR&gt;&lt;BR&gt;　突然また、違う声が耳に届いた。&lt;BR&gt;　はっとして振り返ると、それまで立っていたはずの花畑はすっかり消え失せ、エスタ独特の半透明の素材で造られた大統領官邸のバルコニーにスコールは立っていた。&lt;BR&gt;　視線の先に立っているのはラグナと、私服のセルフィ。淡い黄色のタンクトップにデニムのミニと、ラフな格好に身を包んでいた。&lt;BR&gt;&lt;BR&gt;『けどイデアはなんか気にしてたな。セルフィに『いい子』を強制したんじゃないかって』&lt;BR&gt;　バルコニーの手すりにもたれるようにしてそう語るラグナの言葉を、セルフィは黙って聞いている。&lt;BR&gt;『イデアが言うには、お前さんは自分の役割ってのをわかってるんだそうだ。周りの仲間がお前に対して、無意識に求めてる役割――……』&lt;BR&gt;　セルフィはとても聡明で、そして他人の期待を裏切れないほど、優しかった。&lt;BR&gt;　他人が押しつけてくる気持ちのすべてを、受け止めてしまえるほどに。&lt;BR&gt;『“辛い時も笑顔で仲間を励まし気持ちを和ませる、ムードメーカーの役割”』&lt;BR&gt;　ラグナはゆっくりとそう言いきり、感情の読めない無表情になったままのセルフィの瞳をひょいとのぞき込んだ。&lt;BR&gt;『だからお前は仲間の前では一度も涙を見せなかった。故郷が壊滅した時でさえ。&lt;BR&gt;　それがお前の役割だったからだ。……違うか？』&lt;BR&gt;　響きのよい、まっすぐ心を貫き通すような声で静かに断言したラグナに、セルフィはゆるゆると首を横に振る。&lt;BR&gt;　それだけではない。けれど、ラグナの言葉が真実のひとつであることにも間違いはない。&lt;BR&gt;　だがそれを認めてしまう訳にはいかない。そんな想いがセルフィの首を横に振らせる。&lt;BR&gt;　忘れ去られた幼い誓いに今も縛られ続けているセルフィの頭を、苦笑しながらラグナは手を伸ばしてくしゃりとなでた。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　また、視界が変わった。&lt;BR&gt;　土と草の香りがする。視界を枝葉が遮っていた。&lt;BR&gt;「…………」&lt;BR&gt;　手を伸ばし、茂みをかきわける。見知ったその抜け道を、ゆっくり進んだ。&lt;BR&gt;&lt;BR&gt;　茂みを抜けた先に、陽光色の花畑は静かに広がっていた。&lt;BR&gt;　あの日と同じ、か細い月明かりに照らされしんと咲き誇る、太陽色の花。&lt;BR&gt;　その背の高い花たちに抱かれるようにして、地面から数センチのところに浮かぶ半透明の球体の中、小さくまるくなって眠っているひとりの少女。&lt;BR&gt;　十数年ぶりに再会した時と同じ、ガーデンの制服に身を包み、こんこんと眠りについていた。&lt;BR&gt;　幼さの残る頬に、涙の跡が青白い月の光にうっすらと浮かび上がっている。&lt;BR&gt;「……セルフィ……？」&lt;BR&gt;　かすれた声の呼びかけに、彼女はぴくりとも反応を示さなかった。&lt;BR&gt;　これは記憶なのだろうか。それとも、この精神世界を形成している彼女の主意識なのか。&lt;BR&gt;　判断に迷いながら、スコールはゆっくり彼女の傍に歩み寄る。&lt;BR&gt;　スコールに接続しているエルオーネの声は聞こえなかった。スコールも、姉の言葉を今は必要としていなかった。&lt;BR&gt;　こうしてこの精神世界に、スコールはしっかりと意識を保って存在している。それだけが真実だった。&lt;BR&gt;「……セルフィ」&lt;BR&gt;　地面にひざまずき、恐る恐る呼びかけながら手を伸ばす。手が触れた瞬間、半透明の球体がぱちんと弾け、中にいたセルフィの身体が落ちてくる。スコールは慌てて腕を伸ばし、華奢な身体を受け止めた。&lt;BR&gt;　涙の跡が残る頬に、スコールの指先はちゃんと触れた。そのことにひどく安堵した。&lt;BR&gt;　腕の中に小さな身体の重みが収まると、体勢を立て直しながら、真向かうように抱きしめた彼女を横抱きの形にする。それまで左腕が邪魔して見えなかった、胸にさがる銀鎖のペンダントがしゃらりと涼しげな音を立てた。&lt;BR&gt;「セルフィ……」&lt;BR&gt;　眼を伏せて、眠るセルフィにスコールは囁きかける。&lt;BR&gt;　大きな手でセルフィの頬に残る涙の跡を不器用に拭うと、頬に落ちたまま動かなかった意外なほど長い睫毛が、かすかに震えた。&lt;BR&gt;　覚醒のきざしを見て、スコールはセルフィを再度抱き直し、不安げに瞳を揺らしながらセルフィの顔をのぞきこむ。&lt;BR&gt;　ふうっと長い吐息を唇からこぼし、かすかに震えながらセルフィの瞼が持ち上がり、数回緩慢にまばたきを繰り返した。&lt;BR&gt;「……セルフィ？」&lt;BR&gt;　ややためらいがちに名を呼ぶ低い声に、疲れ果て感情を封じてしまっていたセルフィの意識が、ゆっくりと明確になっていく。翠の瞳がまっすぐに、吐息がからむほどすぐ近くにある端整な顔をはっきり捉えた。&lt;BR&gt;　ぱちぱちとまばたきしながら、セルフィはスコールの顔を穴が空くほど眺め、それから呆然としたように唇を震わせた。&lt;BR&gt;「……なんで？」&lt;BR&gt;　自分が死んだと思い込んでいるセルフィには、どうしてこんな所にスコールがいるのか、にわかには信じがたい。&lt;BR&gt;　澄んだ翠の瞳を見つめ、胸の奥が熱くなるのを自覚しながら、スコールは口を開いた。&lt;BR&gt;「捜しに来た」&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　スコールの言葉を耳にし、セルフィはまた呆然とまばたきを繰り返した。&lt;BR&gt;「え～と……」&lt;BR&gt;　スコールの腕から身を起こし、セルフィはしげしげとスコールの姿を間近く眺める。&lt;BR&gt;　天国か地獄かは微妙だが、とにかくセルフィにとって、ここは死後の世界だ。ジエンドの夢の中ではない。&lt;BR&gt;　こんなところにスコールがいるということは……。&lt;BR&gt;「もしかして、スコールも死んじゃったの～？」&lt;BR&gt;「死んでない」&lt;BR&gt;　一番ありえそうな可能性をおそるおそる口にした途端、即座にスコールから否定の言葉が返る。&lt;BR&gt;　少々安堵を覚え、表情をゆるめながら、セルフィはう～んとまた可能性を考えた。&lt;BR&gt;「あっそうしたら～、スコールって何気に霊感少年ってやつ～！？」&lt;BR&gt;　ぽんと拳で左の手のひらを打ったセルフィに、スコールが呆れ顔になった。&lt;BR&gt;「そんなわけないだろ」&lt;BR&gt;「へ？」&lt;BR&gt;　セルフィがきょとんと眼を丸くした。&lt;BR&gt;「じゃ、な～んでスコール、あたしと話できるの？　あたし死んでるのに」&lt;BR&gt;　大まじめに訊ねられ、今度はスコールが眼を丸くし、それからがっくりと頭を抱えて脱力した。&lt;BR&gt;　会話が噛み合っていないはずだ。前提となる認識が根本的に間違っている。&lt;BR&gt;「……セルフィ、俺もあんたも、まだ死んじゃいない」&lt;BR&gt;「ほえ？」&lt;BR&gt;　脱力しながらもきっぱりと説明したスコールに、セルフィがますますきょとんとする。&lt;BR&gt;「ここはセルフィの夢の中だ。俺とあんたは死ぬ寸前、ハインがあんたの中から離れたことでジエンドの効力内から外れて助かった。あんたは今エスタの国立病院で昏睡状態になっている」&lt;BR&gt;　淡々と立て板に水を流すごとく説明され、セルフィは眼を白黒させた。&lt;BR&gt;「え？　え？　えぇぇ？？」&lt;BR&gt;　混乱しながら懸命に記憶を組み立てる。&lt;BR&gt;（ハインがあたしの中から離れた……って）&lt;BR&gt;　そういえば、確か意識をなくす直前、空高くに羽ばたいていくハインを見た――ような気がする。&lt;BR&gt;　陽光色の花がとても綺麗で……。&lt;BR&gt;（あれ？）&lt;BR&gt;　そこでセルフィは小首を傾げた。&lt;BR&gt;　あのハインの姿が夢でないのなら、光の粒子となったあの陽光色の花も夢ではないということで――&lt;BR&gt;「…………」&lt;BR&gt;　そうすると、いつもの花園があの花に姿を変えたあの時、飛び込んできたスコールの姿は……&lt;BR&gt;「夢……だと、思ってた……のに……」&lt;BR&gt;　望む心が創りだした、都合のいい幻だと思い込んでいたのに。&lt;BR&gt;　呆然と呟くセルフィに、スコールが小さく笑いかける。&lt;BR&gt;「約束、思い出したって言っただろ」&lt;BR&gt;　そう、その言葉も確かに聞いた――。&lt;BR&gt;「……捜しにきたんだ」&lt;BR&gt;　静かにスコールが、待ち望んだ言葉を告げる。&lt;BR&gt;　いつもの鋭い光はどこにも見いだせない、温かい群青の瞳を見上げ、セルフィがふるふると首を振った。&lt;BR&gt;「あたし、ちょっとだけ泣いちゃったよ……」&lt;BR&gt;　かすれた声で小さく呟く。&lt;BR&gt;　決して泣かずに強くなると、遠いあの日約束したというのに。&lt;BR&gt;　哀しそうな顔で呟くセルフィの、頬に残る涙の跡を見つめながら、スコールは微笑した。&lt;BR&gt;「……いいんだ」&lt;BR&gt;　囁く言葉に、セルフィが小さく首を傾げる。&lt;BR&gt;　姿は少女に成長しても、見上げる翠の瞳の澄んだ輝きは昔とまったく変わらない。&lt;BR&gt;　幼かったスコールが、エルオーネ以外に唯一信じられると思った瞳。&lt;BR&gt;　あの頃と同じに無垢ではないだろう。世俗を知り戦場を知り、その手を血に染め生きてきたのだから。&lt;BR&gt;　それでも、変わらないものがひとつある。何を見ても損なわれない、芯にある輝きだけが。&lt;BR&gt;「泣いてもいい。怒っても、笑っても。……俺の前にいるなら、どんな表情だっていいんだ」&lt;BR&gt;　この瞳が変わらないなら――。&lt;BR&gt;　告げたスコールに、セルフィの瞳が一瞬、泣き出しそうに揺れた。&lt;BR&gt;「……スコールの前なら？」&lt;BR&gt;　泣きそうな顔のまま、いたずらっぽい口調で問いかける。&lt;BR&gt;　ふっと笑って、スコールは頷いた。&lt;BR&gt;「あぁ」&lt;BR&gt;　スコールの笑顔を見つめ、セルフィがにこりと笑う。&lt;BR&gt;　無理をしているのでも、涙のかわりでもない――屈託のない笑顔を向けて。&lt;BR&gt;「……スコール」&lt;BR&gt;　まっすぐにスコールを見すえ、強い笑顔のままセルフィが問いかける。&lt;BR&gt;「約束のつづき、覚えてる～？」&lt;BR&gt;　口調こそのんびりしていたが、その瞳が笑顔が、強くまっすぐに輝いていた。ごまかしなど、許さない意思を持って。&lt;BR&gt;　その瞳をまっすぐに見返し、スコールも強く笑った。&lt;BR&gt;「覚えてるさ」&lt;BR&gt;　その約束を果たすために、スコールはセルフィを捜したのだから。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　――――いつか捜して会えたら、そのあとは？&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　孤児院に戻ろうと進めた歩みを止め、振り返り訊ねた翠の瞳。&lt;BR&gt;　未来を夢見ることを恐れていなかった翠の瞳に、わずかな期待と不安をにじませて。&lt;BR&gt;『……そしたら……まず……ここに来ようか』&lt;BR&gt;　考えて、ゆっくりとスコールが答える。セルフィがにっこりと笑った。&lt;BR&gt;『うん』&lt;BR&gt;　今度はエルオーネと３人で、この花に会いに来る。想像しただけで楽しい未来の光景だ。&lt;BR&gt;『でも、このおうちには住めないよね？』&lt;BR&gt;　小首を傾げるようにして、セルフィがさらに訊ねた。&lt;BR&gt;　この家は、子供の間しかいられない家だから――。&lt;BR&gt;『…………』&lt;BR&gt;　その問いかけに、そこまで考えが及んでいなかったスコールは、ちょっと困って沈黙する。&lt;BR&gt;　エルオーネが戻ってこれないなら自力で捜す、捜し出して出会えたら、子供でなくても住める家を見つけてそこでエルオーネと共に暮らす。そんな夢は漠然と抱いていたのだけれど。&lt;BR&gt;　今日の今まで、セルフィの存在は念頭になかったのだから、困惑しても当然だった。&lt;BR&gt;『…………』&lt;BR&gt;　スコールが沈黙したので、セルフィも唇を結んで静かにスコールを見つめて答えを待つ。&lt;BR&gt;　結び合った瞳と瞳。大きな翠の瞳に促されるように、スコールは口を開いていた。&lt;BR&gt;『――――いいよ……』&lt;BR&gt;　呟いた言葉は、セルフィにとって意味のつながらないものだった。&lt;BR&gt;　言葉をうまく口にすることに不慣れなスコールは、それに気づき懸命に頭の中で言葉を探し出す。&lt;BR&gt;　常にひとつところにじっとすることのないお転婆な少女は、スコールが言葉を探している間身動きひとつせずに待っていた。&lt;BR&gt;『……本当は…………おねえちゃんと一緒に、大人が住める家に住むって、決めてたんだ…………』&lt;BR&gt;　ぽつぽつと呟くように説明する。セルフィがにこりと笑んだ。&lt;BR&gt;『そうなんだ～』&lt;BR&gt;　子供しか住めない家があるなら、大人が住める家だってあるはずだ。納得して笑うセルフィに、必死に瞳をまっすぐ向けてスコールは言葉を続けた。&lt;BR&gt;『…………でも…………いいよ』&lt;BR&gt;　なにが？　と言いたげにセルフィが小首を傾げる。&lt;BR&gt;　無垢な笑顔を向けて根気よく言葉を待っていてくれるその様子は、どこか姉を思い出させた。&lt;BR&gt;『セフィだったら……いいよ……』&lt;BR&gt;　一緒に暮らしても。&lt;BR&gt;　言いきったスコールに、セルフィが大きく眼を見はった。&lt;BR&gt;（セフィならいい）&lt;BR&gt;　自分と、エルオーネと。二人で暮らすことしか考えていなかったが、三人目がセルフィだったらかまわない。&lt;BR&gt;　誰に対しても公平で、向ける態度に嘘偽りを含まないセルフィだから。&lt;BR&gt;　彼女が笑顔を向ける限り、決して自分を嫌ったり憎んだりしてはいないのだと、信じることができるから。&lt;BR&gt;　他者の拒絶を極端に恐れるスコールにとって、それこそがもっとも重要だったのだ。&lt;BR&gt;『うん！』&lt;BR&gt;　ぱあっと大輪の花が咲きほころぶように満面の笑みになり、セルフィが大きく頷いた。&lt;BR&gt;『これも、約束だね～！』&lt;BR&gt;　身体ごとスコールに向き直ったセルフィは、小さな両手を伸ばしてスコールに抱きついた。&lt;BR&gt;　やわらかな身体と密着し、ぎょっと眼を見開いてスコールは硬直する。&lt;BR&gt;『約束だからね……』&lt;BR&gt;　海水で冷えたスコールの身体をいっぱいに伸ばした両腕で抱きしめ、セルフィが囁く。&lt;BR&gt;『…………うん』&lt;BR&gt;　あたたかな身体と届く鼓動を感じ、落ち着かない表情のまま、スコールはおずおずと腕を伸ばす。&lt;BR&gt;　遠慮がちに背に触れた手のひらに、セルフィがくすぐったそうに笑った。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;「……帰ってこいよ」&lt;BR&gt;　呟くように言うと、え？　とセルフィが小首を傾げた。&lt;BR&gt;　うまく言葉にできる自信がなくて、スコールはそんなセルフィをぐいと荒っぽく引き寄せ、両腕でぎゅっと抱きしめる。&lt;BR&gt;　見た目と裏腹に広い胸にすっぽり包まれてしまい、カッとセルフィが耳まで赤くなった。&lt;BR&gt;　互いの鼓動のリズムまでわかるほどに密着し、伝わってほしいと強く願いながらスコールは口を開いた。&lt;BR&gt;「あんたが帰ってこないと……俺は約束を果たせないんだ……」&lt;BR&gt;　こうしてようやく約束のひとつを果たし、セルフィを見つけても。&lt;BR&gt;　永遠にセルフィの精神世界にいる訳にいかないスコールには、最後の約束を果たすことができないのだ。&lt;BR&gt;　互いに捜し合い、見つけ合ってはじめて、あの最後の約束は成就するのだから……。&lt;BR&gt;「帰る……って……」&lt;BR&gt;　困惑したようにセルフィが呟く。スコールもセルフィを抱きしめたまま、ちょっと悩んで首を傾げた。&lt;BR&gt;　スコールはエルオーネの力を借りて、セルフィの中に入っている。『接続』が切れれば、あとはセルフィが自力で目覚めなければならない。スコールや医者には、セルフィを目覚めさせることができないのだ。&lt;BR&gt;　だが。これほど精巧で強固な精神世界を構築できるセルフィの能力は、計り知れないものだとスコールは思う。&lt;BR&gt;　イデアが昔封印したセルフィの能力は、ハインの影響もあって今や完全に彼女のものだ。それに賭けるしかない。&lt;BR&gt;　スコールはセルフィの両肩をつかんで身体を引き離し、途方に暮れるセルフィの瞳をのぞきこんだ。&lt;BR&gt;「セルフィ、イデアはあんたの力の本質は『夢』だって言ってた。ジエンドのように夢を見せたり、こんなふうにリアルな世界を構築できるのも、あんたの力の現れなんだと思う。&lt;BR&gt;　夢を作れるなら、それを打ち壊すことだってできるはずだ。あんたの夢は、あんたにしか破れない。&lt;BR&gt;　俺はそれを伝えるために、あんたを捜した。だからあんたも、俺を捜せ」&lt;BR&gt;　厳密に言えばここは夢の世界ではないのだが、とりあえずスコールはきっぱりとそう言いきった。&lt;BR&gt;「スコールを捜す……？」&lt;BR&gt;　まだどこか途方に暮れたようにセルフィが呟く。&lt;BR&gt;　いつも仲間の前で見せる表情とはまったく違う、心細そうなその表情は、けれど何よりリアルで確かだった。&lt;BR&gt;　どんな表情でもかまわない。他の誰でもない、セルフィでありさえすれば。&lt;BR&gt;「あんたを……なくしたくないんだ」&lt;BR&gt;　視線を伏せて囁いたスコールの言葉に、セルフィの翠の瞳が大きく見開かれる。&lt;BR&gt;「どっちも嫌だ……なくすのも、忘れるのも……」&lt;BR&gt;　血を吐くほどに切ない声音で、懸命にスコールは言葉を紡いだ。&lt;BR&gt;　両肩をつかんでいる華奢な身体が、一瞬大きく震えたのがわかった。&lt;BR&gt;　どうか伝わって欲しい。本当に心から、セルフィの帰還を望んでいるのだと。&lt;BR&gt;　セルフィでなければだめなのだと。&lt;BR&gt;　せめて、それだけでも。&lt;BR&gt;「……望んでみろよ」&lt;BR&gt;　眼を上げて、泣き出しそうな翠の瞳と視線を合わせて、スコールが囁いた。&lt;BR&gt;「どんなに叶わないように見えても、全力で望んでみろ。それはきっと……無駄にはならない……！」&lt;BR&gt;　いくらスコールがセルフィの代わりに望んでも、だめなのだ。&lt;BR&gt;　セルフィ自身が、抱いた望みを自覚し追い求めなくては、何も変わらない。&lt;BR&gt;『スコール』&lt;BR&gt;　必死で言葉を探すスコールの意識に、エルオーネの声が弾けるように響いた。&lt;BR&gt;『もうすぐ接続が切れるわ』&lt;BR&gt;　呼びかけるその声に、スコールはきゅっと一瞬唇を噛みしめる。&lt;BR&gt;　肩をつかんでいた手を動かし、言葉を失ったままのセルフィの頬にぐいと押し当てた。&lt;BR&gt;「接続がもうすぐ切れる……俺はもう、戻らないとならない」&lt;BR&gt;「え……？」&lt;BR&gt;　かすかに翠色の双眸に動揺が走る。その瞳の奥をのぞきこむようにして、スコールは懸命に強く笑って見せた。&lt;BR&gt;「……帰ってこれるな？」&lt;BR&gt;　ぐにゃりと世界がゆがむ。　&lt;BR&gt;　とっさにスコールの袖に手を伸ばしてつかんだセルフィに、スコールはさらに強く笑んだ。&lt;BR&gt;「ちゃんと帰ってこれるな！？」&lt;BR&gt;　心細さの頂点に達したような表情のセルフィが、ぎゅっと一度強く眼を閉じた。&lt;BR&gt;　瞼に溜まった涙を一気に押し流し、大きな瞳をきっと見開く。&lt;BR&gt;　懸命に勇気を振り絞った強い眼差しで、まっすぐにスコールを見つめて――こくりと頷いた。&lt;BR&gt;　あどけなさの残る顔が、その瞬間にSeeDの表情になる。&lt;BR&gt;　遠ざかる景色の中、はっきりとそれを認めたスコールが、にっと笑った。&lt;BR&gt;「待ってる」&lt;BR&gt;　短い囁き。輪郭を失いつつあるスコールの手が、セルフィの頬を強引にぐっと上向けた。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　それはほんの一瞬。&lt;BR&gt;　触れるか触れないかの、はかない口づけ。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;『接続』は途切れた。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　陽光色に輝く花の中、セルフィはひとり残され、ぽつんとたたずんでいた。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;&lt;/SPAN&gt;

<script data-viewer-zoom-script>
(() => {
  const stage = document.querySelector('.viewer-stage-image');
  const image = stage ? stage.querySelector('.viewer-image') : null;
  if (!stage || !image) {
    return;
  }

  const setZoom = (enabled) => {
    stage.classList.toggle('is-zoomed', enabled);
    image.setAttribute('aria-pressed', enabled ? 'true' : 'false');
    if (enabled) {
      const naturalWidth = image.naturalWidth || image.clientWidth || 0;
      const targetWidth = naturalWidth > 0
        ? Math.max(naturalWidth, Math.min(Math.round(stage.clientWidth * 0.92), naturalWidth * 4))
        : Math.round(stage.clientWidth * 0.92);
      image.style.width = `${targetWidth}px`;
      image.style.maxWidth = 'none';
      image.style.maxHeight = 'none';
      requestAnimationFrame(() => {
        stage.scrollTop = 0;
        stage.scrollLeft = Math.max(0, Math.round((image.scrollWidth - stage.clientWidth) / 2));
      });
    } else {
      image.style.removeProperty('width');
      image.style.removeProperty('max-width');
      image.style.removeProperty('max-height');
      stage.scrollTop = 0;
      stage.scrollLeft = 0;
    }
  };

  const toggleZoom = () => {
    setZoom(!stage.classList.contains('is-zoomed'));
  };

  image.setAttribute('tabindex', '0');
  image.setAttribute('role', 'button');
  image.setAttribute('aria-label', '逕ｻ蜒上ｒ諡｡螟ｧ縺ｾ縺溘・邵ｮ蟆・);
  image.setAttribute('aria-pressed', 'false');

  image.addEventListener('click', toggleZoom);
  image.addEventListener('keydown', (event) => {
    if (event.key === 'Enter' || event.key === ' ') {
      event.preventDefault();
      toggleZoom();
    }
  });

  stage.addEventListener('click', (event) => {
    if (event.target === stage && stage.classList.contains('is-zoomed')) {
      setZoom(false);
    }
  });

  window.addEventListener('keydown', (event) => {
    if (event.key === 'Escape' && stage.classList.contains('is-zoomed')) {
      setZoom(false);
    }
  });
})();
</script>
