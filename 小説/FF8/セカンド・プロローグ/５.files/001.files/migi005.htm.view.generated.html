      width=537&gt;&lt;SPAN&gt;&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　オダイン博士が試験的に作ったという、あらゆる精神波を防御するというその部屋は、防御室という物々しい名称とは裏腹に、実にエスタ的なデザインの施された、ごく普通の部屋でしかなかった。&lt;BR&gt;　聞いてみると、どうやら大統領私室に導入するためのシステムらしい。&lt;BR&gt;　長年の沈黙を破り全世界と交流を持つことになったエスタには、現在他国からのスパイもたくさん流れ込んできているのだろう。&lt;BR&gt;　だからこそ、エスタ中枢に完全な機密を守れるシステムが必要なのだ。&lt;BR&gt;（たしかに、あたしがＧ．Ｆ．過適合症ってのも、す～ぐ流れちゃったしね～）&lt;BR&gt;　敵がセルフィの過適合症を利用したのなら、その情報がガーデンから漏れたということである。&lt;BR&gt;　壁に耳ありとはよく言ったものだとセルフィは感心しつつ、３日目にしてすっかりその部屋にも飽き、５日が過ぎた現在は退屈と戦いながら用意された大きなベッドの上でごろごろと転がっていた。&lt;BR&gt;　もともとセルフィはアウトドア系である。家の中でじっとしているのは性に合わない。&lt;BR&gt;　テレビもない、ラジオもない、ついでにコンピューターの類もない、あるのは生活用品とエルオーネが日々差し入れてくれる本だけとなったら、活字にさして興味のないセルフィには牢獄と大差がなかった。&lt;BR&gt;　ごろごろごろと、何度目かの寝返りを打った時、シュンと小さな音が連続で数回聞こえた。&lt;BR&gt;　この部屋の、何重かになっている扉が開いていく音だ。&lt;BR&gt;　最後の扉が、わずかな間をおいて開く音がする。軟禁状態のセルフィのために毎日話し相手に来てくれるエルオーネだろうと見当をつけ、寝転がったままセルフィは顔だけを扉に向け、それからきょとんと眼をまるくした。&lt;BR&gt;「……暇そうだな」&lt;BR&gt;　なんだか非常に不満げな仏頂面で、顔に非常に似合わないばかでかいクマのぬいぐるみを肩にかついで、黒の私服に身を包んだスコールがセルフィを見下ろしていた。&lt;BR&gt;　かついでいるのはクマなのに、その姿は妙に格好良い。&lt;BR&gt;　この服を着ているのを見るのは、そういえばずいぶん久しぶりだったなと、ぼんやりセルフィが思っていると、スコールは長い脚をさばくようにして部屋の中央まで入ってきて、ぼすんとセルフィの腹の上にぬいぐるみを置いた。&lt;BR&gt;「……土産だ」&lt;BR&gt;「わ、クマちゃんだ～！　ありがと～！」&lt;BR&gt;　寝転がったままそれを受け取り、セルフィはうきうきと眼を輝かせる。相変わらずスコールは仏頂面だ。&lt;BR&gt;　セルフィはその体勢のままスコールを見上げ、くすくすと笑った。&lt;BR&gt;「すごいな～。スコールにこ～んなセンスあるなんて、なんか意外～」&lt;BR&gt;　対リノア限定プレゼントチョイス能力しかなさそうなのに。&lt;BR&gt;　意外そうな瞳で見つめるセルフィに、スコールは仏頂面のままそっぽを向いた。&lt;BR&gt;「…………その土産を渡したのは俺じゃなくて、ラグナだ」&lt;BR&gt;「な～んだ」&lt;BR&gt;　なるほどラグナならこのチョイスも何だか納得がいく。あのラグナならエルオーネにだってぬいぐるみを買って行きそうだ。&lt;BR&gt;　そう考えるとスコールの仏頂面も得心がいっておかしくなる。おそらく彼の頭の中では『ラグナ、本気なのか？天然なのか？俺への嫌がらせか？』とあらゆる想像が渦を巻いているに違いない。……その上セルフィが大喜びなどしているから、なおさら困惑深まったといった感じだ。&lt;BR&gt;　肩を震わせ笑い出したセルフィに、スコールが顔を横向けたままちらりと視線を向けた。&lt;BR&gt;　視線が合い、セルフィはいたずらっぽく笑いながら、クマを抱いていない方の手をひょいと差し出す。&lt;BR&gt;「えへへ～、で、スコールのお土産は～？」&lt;BR&gt;「……そんなものはない」&lt;BR&gt;「ぶ～～っ。なんでよ～！　ケチ！」&lt;BR&gt;　ず～っと会いに来なかったくせにさ～とふくれて見せるセルフィに、スコールは少しだけ口をへの字に曲げた。……困った顔をしているらしい。&lt;BR&gt;「……セルフィ」&lt;BR&gt;「ぷ～んだ。薄情なはんちょなんてしらな～い」&lt;BR&gt;　軟禁生活にすっかり飽き飽きしていたセルフィは、ここぞとばかりに拗ねてみせる。&lt;BR&gt;　……が、言葉の最後で声が笑ってしまい、本気でないことが鈍いスコールにもわかった。&lt;BR&gt;「セルフィ、次は善処するから機嫌を直してくれ」&lt;BR&gt;　やれやれとつき合ってやる。やっぱり、スコールはセルフィにどこか甘かった。&lt;BR&gt;「……じゃあ」&lt;BR&gt;　クマのぬいぐるみで半分以上顔をかくし、眼だけちらりとスコールに向けてセルフィがぼそっと口を開いた。&lt;BR&gt;「ガーデンに帰ったら食堂の特大スペシャルチョコレートパフェおごって」&lt;BR&gt;「…………」&lt;BR&gt;　それはガーデン食堂の新製品で、ゼルが毎度食べれずにいるパンに次ぐ大ヒット商品である。&lt;BR&gt;　値段も高いがそれ以上に競争率が高い。おごるのはやぶさかではないが、手に入れるのは至難の業だ。&lt;BR&gt;　……が、じぃ～っとセルフィに見つめられ、否と答えるほどスコールも命知らずではなかった。&lt;BR&gt;「………了解。帰ったら責任もって買ってやる。これでいいか」&lt;BR&gt;「…………」&lt;BR&gt;　セルフィはクマの陰でじぃっとスコールを見つめていたが、数秒後突然ぱっと全開の笑顔になった。&lt;BR&gt;「やったぁ～～！！」&lt;BR&gt;　クマを脇にどけて飛びおきて、ソファの上にどさっと座る。&lt;BR&gt;「ほんとに？　ほんとに！？　約束だよ～！！　うわ～あれいっぺん食べてみたかったんだ～！！」&lt;BR&gt;　あっさりとご機嫌回復してみせたセルフィにスコールは苦笑しつつも、思ったより元気そうなことに少なからず安堵した。&lt;BR&gt;「で、ど～したの？　なんか進展あった？」&lt;BR&gt;　にこにことご機嫌な笑顔で、セルフィが小首を傾げてたずねた。&lt;BR&gt;「はんちょが用もなく来るわけないよね～？」&lt;BR&gt;　拗ねてみせても、セルフィはSeeDである。スコールがどうして退屈な自分に会いに来ないのかくらい、ちゃんとわかっている。&lt;BR&gt;　スコールはふっと笑い、セルフィの横にどさっと腰を落とした。&lt;BR&gt;　間近に座られて、セルフィは思い出したようにミニのワンピースの裾を直したが、もちろんスコールはまったくそんなものに頓着してはいなかった。……頓着していないように見せているのかどうかは不明だったが。&lt;BR&gt;「今回の件なんだが……まだ学園長には報告していないんだ」&lt;BR&gt;　セルフィがきょとんと眼を丸くし、スコールは小さく笑ってみせた。&lt;BR&gt;　バラムガーデンには簡単に現場にいた人物を取り調べていると報告したのみで、セルフィのことは一言も告げていない。&lt;BR&gt;　なにしろ出発前からＧ．Ｆ．過適合症の恐れありなどと診断されたセルフィだ。今回の事件がもとで査問委員会などにかけられたら、最悪の場合SeeDの資格剥奪なんてことにもなりかねない。&lt;BR&gt;　SeeDであることを絶対の誇りにしているセルフィを、そんな目に合わせるわけにはいかない。だからスコールはラグナと掛け合い、現状をバラムガーデンに報告することを差し控えているのだった。&lt;BR&gt;「な～んか、真面目一辺倒のスコールらしくないね～」&lt;BR&gt;「……それは褒めているつもりなのか？」&lt;BR&gt;　正直な感想を口にしたセルフィは、スコールにじろりと睨まれえへへと笑った。&lt;BR&gt;「ん～、どうかな～？　とりあえず、ありがと。他には？」&lt;BR&gt;　けなしていたらしい。スコールは小さく溜息をついてから、口を開いた。&lt;BR&gt;「それからエスタ国民の方なんだが……とりあえずラグナの襲撃の時にセルフィがトラビアにいたのは事実だし、セルフィはグレーゾーンだけど事件の首謀者でもありえないって線で一応納得させている」&lt;BR&gt;　まだ首謀者が見つかったわけでもないのに、警戒を解かれては困るのだ。&lt;BR&gt;　簡単に現状を報告してから、スコールはちょっと言葉を切り、セルフィを見る。&lt;BR&gt;　笑顔のままスコールを見返したセルフィに、やや言葉に詰まりながら、口を開いた。&lt;BR&gt;「……セルフィはトラビア時代にＧ．Ｆ．をジャンクションしてたって話していたことがあったよな？」&lt;BR&gt;「？　うん」&lt;BR&gt;　廃墟と化したトラビアガーデンで確かにそう言った。セルフィはその通りだとこくりと頷く。&lt;BR&gt;　スコールはじっとセルフィを見つめ、ゆっくりとたずねた。&lt;BR&gt;「どんなＧ．Ｆ．だったか、思い出せないか？」&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　エルオーネの力でセルフィの過去に飛んでから、はじめにスコールが取った行動はバラムガーデンのゼルに連絡を取ることだった。&lt;BR&gt;『よぅ、スコール！　まだ生きてたのかぁ？』&lt;BR&gt;　SeeD専用の小型携帯通信機の通話器越しに聞こえた威勢のいい声に、スコールは思わず通信機を耳から離してしまっていた。&lt;BR&gt;　架け間違えたのだろうかと通信機についているディスプレイを確認してみたが、番号に間違いはない。&lt;BR&gt;　そのまま切ってしまいたい衝動にかられつつ、不承不承携帯を耳に戻した。&lt;BR&gt;「…………俺はゼルに通信しているつもりだったんだが、俺の勘違いか？」&lt;BR&gt;『間違っちゃいねーぞ、チキン野郎の通信機だ。オレがSeeD様の通信機なんざ持ってるはずねーだろ』&lt;BR&gt;　確かに、万年SeeD候補生のサイファーがそんなものを持っていたらお笑いである。&lt;BR&gt;「………………なんであんたが通信に出るんだ」&lt;BR&gt;『ハッ、細かいこたー気にすんじゃねーよ。前から思ってたんだけどよ、お前んな性格のままだと、そのうちハゲるぜ？』&lt;BR&gt;（…………よけいなお世話だ）&lt;BR&gt;　と、スコールはいったん心の中で呟いてから、&lt;BR&gt;「ゼルを出せ」&lt;BR&gt;　冷たく一言告げた。&lt;BR&gt;『あぁ？　んだお前、リノアのことは放っぽらかしでチキン野郎にラブコールかよ？』&lt;BR&gt;　もちろん、通信相手はそんなスコールの声にはひるみもしない。&lt;BR&gt;　スコールはぴきぴきとこめかみに血管が浮くような気がした。&lt;BR&gt;「…………サイファー、あんたとじゃれてる時間はないんだ。とにかくゼルを出せ」&lt;BR&gt;　通話器の向こうで腹立だしいくらいに脳天気なバカ笑いが響き渡る。&lt;BR&gt;　今日もバラムガーデン風紀委員長は絶好調のようだった。&lt;BR&gt;「わかった、もういい」&lt;BR&gt;　通信ではなくメールにするべきだったとブチ切れたスコールの低い声に、ようよう笑い声が静かになる。&lt;BR&gt;『まぁ、待てよ』&lt;BR&gt;　まったく、アルティミシア事件後しばらく大人しかったと思ったらこれである。&lt;BR&gt;　沸点が実はかなり低いスコールは問答無用で通信を切ろうとしていたのだが、通話器の向こうで新たな声が響いてきたのでその手を止めた。&lt;BR&gt;『だ――――っ！　なに人の携帯出てんだよ！！』&lt;BR&gt;『なんだ、帰ってきやがったのか。つまんねえ奴だな』&lt;BR&gt;『つまんねぇってなんだよ！　っつーか勝手に人の部屋入って物漁ってんじゃねえよ！』&lt;BR&gt;　……どうやら、サイファーがゼルの物を無断借用しに部屋に不法侵入した時に、スコールが通信機のコールを鳴らしてしまったということらしい。&lt;BR&gt;　やれやれとスコールは溜息をついた。&lt;BR&gt;『いーから、とっとと出てけ！　携帯よこせ！』&lt;BR&gt;　がしゃっと音がして、数秒後ようやくゼルの声がした。&lt;BR&gt;『もしもし！　誰！？』&lt;BR&gt;「……俺だ、元気そうだな」&lt;BR&gt;　あきれ声を聞かせると、ゼルの声がぱっと明るくなる。&lt;BR&gt;『スコール！？　おぉ、元気かよ！？　どーしたんだ？　……こら、ひっつくなっ』&lt;BR&gt;　どうやらサイファーにちょっかいを出されているらしい。&lt;BR&gt;　とりあえずスコールの方もあまり時間がなかったため、気にせず話をすることにした。&lt;BR&gt;「あぁ、すまないんだが、『物知りゼル』を発動してもらえないか」&lt;BR&gt;　見かけに寄らずゼルは物知りで、どうでもいいような蘊蓄をアルティミシア事件の旅の間に披露してくれたことも多かった。それをスコールは思い出したのだ。&lt;BR&gt;『おぉ、かまわねーぜ。で、どんなことだ？』&lt;BR&gt;　嬉しそうにゼルが答える。スコールは隣で聞いているだろうサイファーを思い、慎重に言葉を選びながら「青い鳥系のＧ．Ｆ．、もしくはモンスターを知らないか」とたずねた。&lt;BR&gt;　スコールが自分の見たＧ．Ｆ．の姿を詳しく説明すると、うーん、と受話器の向こうでゼルの唸る声がした。&lt;BR&gt;　少し遠くで『知らねぇな』というサイファーの声がしたので、ゼルが視線でも向けたのだろう。&lt;BR&gt;『そうだなぁ……それに近いのっつーと……』&lt;BR&gt;　言ってゼルはいくつかＧ．Ｆ．の種類を上げる。&lt;BR&gt;　いくつかスコールの知らない種類のＧ．Ｆ．もあったが、今回のＧ．Ｆ．とは少しずつ特徴が異なっていた。&lt;BR&gt;　何しろ、今回のＧ．Ｆ．はモンスターさながらに『戦って』くるＧ．Ｆ．なのだ。これまで常識とされてきたＧ．Ｆ．の概念を覆す存在である。&lt;BR&gt;『すまねぇ、ちょっとわかんねぇなぁ……つーかさ、それ、マジでＧ．Ｆ．なのか？　アレだよ、アルティミシアがグリーヴァ創って襲ってきただろ、あんな感じを連想させんだよなぁ……。&lt;BR&gt;　お前、そんなＧ．Ｆ．相手にしてんの？』&lt;BR&gt;　スコールはちょっと言葉につまり、慎重に声を低めた。&lt;BR&gt;「……まぁ、そんなところだ」&lt;BR&gt;　やはりゼルでさえ知らないということは、完全に未確認のＧ．Ｆ．『もどき』ということになる。&lt;BR&gt;　過剰な期待はしていないつもりだったが、少しだけ落胆してスコールは息をついた。&lt;BR&gt;「時間とらせて悪かった。もう切る」&lt;BR&gt;『おい、トラブってんのか？』&lt;BR&gt;　横割りするように届いたのはサイファーの声だ。&lt;BR&gt;　ゼルが何も言わないところをみると、どうやらゼルも同じことを聞く気だったのだろう。&lt;BR&gt;　スコールはちょっと息をついた。&lt;BR&gt;「……いや……さほどピンチというわけでもないさ」&lt;BR&gt;『と言いつつ上じゃなくチキン野郎に連絡取ってるとこみると、お前実はなんかヤバいんじゃねぇか？』&lt;BR&gt;『なんだよそれ！　……え、でも……そうなのか？』&lt;BR&gt;　憮然としつつもゼルが心配そうに聞いてくる。言い当てられ、スコールは内心で参ったなと呟いていた。&lt;BR&gt;　もちろん、学園長に詳細を報告できないために、わざわざ『物知りゼル』に連絡をとっているのだ。&lt;BR&gt;　単純なゼルだけならどうとでも誤魔化せるかと踏んでいたのだが、サイファーもとなると少々厄介だ。&lt;BR&gt;　どうしたものかと思考を巡らせていると、サイファーの声が再び聞こえた。&lt;BR&gt;『ところでよ、スコール。伝令女は元気か？』&lt;BR&gt;　突然言われ、スコールはぎょっとした。&lt;BR&gt;「……元気だが、突然なんだ？」&lt;BR&gt;『リノアがセルフィと最近連絡が取れないって言ってたからよ』&lt;BR&gt;　さらに突然リノアの名が飛び出し、スコールの思考がますます混乱した。&lt;BR&gt;『知らねぇのか？　リノアはセルフィと毎日仲良しメール交換してんだよ。ま、女同士が好きそうなことだな』&lt;BR&gt;　知らなかったが、ありえないことでもない。友人関係においてセルフィがマメなのは周知の事実だ。メールを送られればたとえ多忙であっても、律儀に返信メールを送っているだろうことが、想像に難くない。&lt;BR&gt;　そして今現在軟禁状態のセルフィがいるのは、通信関係シャットアウトの防御室。メールなど打てるはずもなく、リノアがたとえ何通メールを送って寄こしていても返信などできないのだが。しかし。&lt;BR&gt;『最近じゃ心配して、シドのおやじに様子を探ってもらうように頼むなんて言い出してるぜ』&lt;BR&gt;「……！」&lt;BR&gt;　ぎょっと息をのんだスコールに、サイファーがカラカラと大きな笑い声を聞かせる。&lt;BR&gt;『やっぱりトラブってんじゃねぇか。バラムには知られちゃならねぇトラブル抱えて、あげくリノアにチクられたら、お前どうやって動く気だよ？』&lt;BR&gt;　そこでぐっと言葉に詰まってしまったスコールは、まだまだ修行が足りなかった。&lt;BR&gt;　結局、ゼルとサイファーに現状を説明し、サイファーにはたっぷりと恩着せがましい台詞を山ほど送りつけられつつも協力を要請することになったのだ。&lt;BR&gt;　なにしろスコールはエスタを離れるわけにいかず、ひとりで動くには限度がある。リノアの暴走だって止めなくてはならないし、セルフィのこともＧ．Ｆ．のことも調べたかった。&lt;BR&gt;　サイファーが自ら動いてやるなどと言い出した時は天変地異の前触れかと思ったが、彼はどうやらアルティミシアの時の借りをスコールにとっとと返したかったらしい。&lt;BR&gt;『オレとお前はいつだってオレが上でなくちゃいけねえんだよ』とか何とか叫んでいたのだから、多分そういうことなのだろう。……スコールには良くわからないが。&lt;BR&gt;『しかし、セルフィってつくづくＧ．Ｆ．に縁があるよな。子供ん時に偶然Ｇ．Ｆ．見つけてジャンクションしてたとか言ってたのセルフィじゃなかったっけ？　ガキが偶然見つけること自体、普通じゃねぇもんな』&lt;BR&gt;　そして事態を把握したゼルがこぼしたこの一言が、スコールの興味を引いたのだった。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;「あの時はね～、どんなＧ．Ｆ．だったかなぁ～？　倒したモンスターにＧ．Ｆ．入ってて～……トラビアってＧ．Ｆ．禁止だったでしょ？　だからこっそり、誰にも見つからないようにジャンクションしてたのは覚えてるんだけど～」&lt;BR&gt;　名前どころかどういう種類だったかも綺麗に忘れているセルフィに、スコールはやっぱりと思いつつも続けて質問する。&lt;BR&gt;「なんのモンスターに入ってたんだ？」&lt;BR&gt;「ん～、なんだったかな～？　う～ん、う～ん……」&lt;BR&gt;「……じゃあ、なんで外したんだ？」&lt;BR&gt;「……なんで……えぇと～……確か、先生にバレちゃった……んだったかなぁ～？　実戦訓練の時に成績すご～く良くなって、いっつもジャンクションしてたから……」&lt;BR&gt;　Ｇ．Ｆ．を召喚せずとも、ジャンクションしているだけで身体能力が上がるのだからもっともである。&lt;BR&gt;　それを不自然に思った教師が彼女を調べてＧ．Ｆ．の存在に気づいたとしても、不思議はない。&lt;BR&gt;「トラビアにその頃の記録は残っているか？」&lt;BR&gt;「え～とね～、個人データとか入ってる、トラビアガーデンのマザーコンピュータがあるよ～。&lt;BR&gt;　でも、ミサイルで爆撃受けた時に壊れちゃってそのまんまだけど」&lt;BR&gt;　スコールは無言で頷いた。&lt;BR&gt;　セルフィに聞くまでもなく、以前トラビアガーデンに行った時に必死で修理班がいじっていたのが、個人データバンクだったことはスコールの記憶にもある。&lt;BR&gt;「でも色々いじってみたら、中のディスクに入ってるデータはある程度無事なみたいだし、取り出すこともできるかもって言われて、とりあえず落ち着くまで保管することになったんだよ～。中には生徒の個人データとか全部入ってたはずだから、あたしの当時の記録としてＧ．Ｆ．のこととかも入力されてるかもしれないよ～」&lt;BR&gt;「……そうか」&lt;BR&gt;　やはりと思いながら、スコールはもう一度静かに頷いた。&lt;BR&gt;　今頃トラビアガーデンに向かってくれているだろうゼルとサイファーが無駄足を踏む危険性は、とりあえず避けられたということになる。&lt;BR&gt;　聞くだけ聞いて無言になった彼の様子に、セルフィはじぃっと翠の瞳を向けてきた。&lt;BR&gt;「あたしのＧ．Ｆ．と今回のと、何か関連があるの～？」&lt;BR&gt;　セルフィの問いかけに、スコールはどう答えようかと考える。&lt;BR&gt;　沈黙が落ち、セルフィは一回唇を引き結ぶと、改めて口を開いた。&lt;BR&gt;「スコール、今回のＧ．Ｆ．と、あたしが昔ジャンクションしてたＧ．Ｆ．、同じだって思ってる～？」&lt;BR&gt;　……答えがないのが、最大の答えだった。&lt;BR&gt;「あたしの……Ｇ．Ｆ．……」&lt;BR&gt;　今、件のＧ．Ｆ．はトラビアのコンピュータ内に収納されている。&lt;BR&gt;　壊れて放置状態にあるため、ハッキング等の手段でデータを盗んだりＧ．Ｆ．自身の意志で逃げ出すことも、不可能ではないのかもしれない。個人データバンクの隠しデータまで全部さらえば、Ｇ．Ｆ．とセルフィの関係のひとつやふたつ出てくることだって、ゼロとは言えない。&lt;BR&gt;　不安げにセルフィが沈黙し、スコールはようやくゆっくりと首を振って口を開いた。&lt;BR&gt;「セルフィ……俺、エルオーネに過去のセルフィの中に送ってもらったんだ」&lt;BR&gt;　スコールの声を耳にし、セルフィがこくんと小さく頷く。それはエルオーネ自身からすでに聞いていた。&lt;BR&gt;　セルフィの反応に、スコールも頷き返してさらに続ける。&lt;BR&gt;「俺がセルフィの中に感じたのは、Ｇ．Ｆ．の意識だけだった。他の『人間』の意識は何も感じなかったんだ」&lt;BR&gt;「えっ……？」&lt;BR&gt;　眼をまるくして、セルフィがぽつりと呟いた。&lt;BR&gt;　それではまるで……誰の意志も介在せずに、自分がＧ．Ｆ．を装備しているようではないか。&lt;BR&gt;「で、でも～…未来のＧ．Ｆ．だけを、おねえちゃんの力で送った、ってことじゃないの～？」&lt;BR&gt;「……あぁ、そうかもしれない。けれど……Ｇ．Ｆ．だけを送ったなら、どうしてセルフィは自分の身体を自由に使われたんだ？」&lt;BR&gt;　スコールに指摘され、セルフィはぐっと息をのんだ。&lt;BR&gt;　そう、ただＧ．Ｆ．が中に入り込んで来ただけなら、こんなふうに操られることなどありえない。&lt;BR&gt;　Ｇ．Ｆ．は力を貸すが、宿る相手を乗っ取ろうとするものではない。&lt;BR&gt;　記憶障害はあくまでも、Ｇ．Ｆ．がその居場所を脳に作ってしまうが故に起きる障害。Ｇ．Ｆ．自身の悪意ではありえない。&lt;BR&gt;「けれどセルフィを乗っ取ってたのはＧ．Ｆ．だけだった。これは確かだ。俺たちが認識しているＧ．Ｆ．とは少々毛色の違う……人に対して通常以上の執着を持つＧ．Ｆ．が絡んでいるのかもしれない、そう思ったんだ」&lt;BR&gt;「執着……あたしに？」&lt;BR&gt;「まだガキの頃のセルフィに力を貸したＧ．Ｆ．だ。特別好意でも抱いてるんじゃないのか？」&lt;BR&gt;　……これは実を言えばサイファーの言った台詞なのだが、無断引用させてもらうことにする。&lt;BR&gt;「アルティミシアがエルオーネを手に入れようとしたみたいに、セルフィを手に入れようとしているのかもしれない。エルオーネを探しながら、アルティミシアが街を焼き払わせようとしたことを覚えているか？」&lt;BR&gt;　セルフィはこくんと頷く。&lt;BR&gt;　FHの駅長に対し、ガルバディアの兵士がエルオーネの所在を訊ね、いてもいなくても街は焼き払うと宣告していたことは記憶に新しい。&lt;BR&gt;「あの時、アルティミシアはエルオーネの名に対して世界に恐怖を植え付け、エルオーネの居場所をつぶそうとした。&lt;BR&gt;　それと同じ事だ。Ｇ．Ｆ．がセルフィの姿で破壊活動を行うことで、セルフィの居場所をなくそうとしているのかもしれない。&lt;BR&gt;　……もちろん、最初にラグナとエルオーネが襲われているし、他の思惑を持った奴に執着を利用されている可能性だってあるけどな」&lt;BR&gt;　くるんと大きな瞳をさらに大きくして、セルフィは黙ってスコールの言葉を聞いていた。&lt;BR&gt;　ずっと、自分が利用されたのは偶然なのだと思っていた。&lt;BR&gt;　未来の敵は何らかの思惑でエスタを混乱もしくは歴史から消滅させようとし、そのためにラグナとエルオーネが狙われ、たまたまエスタにいた自分が利用されただけなのだと思っていた。&lt;BR&gt;　だが、もしそうなら……自分がエスタ入りすることを見越して、自分がターゲットのひとつにされていたということになるではないか。&lt;BR&gt;「もちろん、これは推論だ。けれど……可能性のひとつとして視野に入れて置いてもいいと思う」&lt;BR&gt;　セルフィは、こくんとひとつ頷いた。&lt;BR&gt;　突然当事者にされてしまい、さすがに真剣な面もちになってはいたが、取り乱したりはしないセルフィの姿勢を好ましいとスコールは素直に思う。&lt;BR&gt;「……時間が戻せたらいいのにな」&lt;BR&gt;　自分でも驚くほど優しい声が口をついて出た。&lt;BR&gt;「……でも過去は……変えられないからな」&lt;BR&gt;「…………」&lt;BR&gt;　セルフィが、小首を傾げてスコールを見た。&lt;BR&gt;　まっすぐな視線を向けたまま、にっこりと微笑んだ。&lt;BR&gt;「あたしは時間が戻っても、きっと任務は受けたと思うよ。それに、過去は変えられないなんて、嘘だよ～」&lt;BR&gt;　明るくはあったが落ち着いた声に、スコールが首を振る。&lt;BR&gt;　以前、エルオーネの力でリノアの過去を変えようと試みてだめだった。エルオーネだって、スコールの精神を借りてラグナの過去を変えようとし、結局『過去は変えられないよ』と言っていた。&lt;BR&gt;　過去は変えられない。どんなに望んだって、変えられないのだ。&lt;BR&gt;　そんなスコールの仕草に、セルフィは何を言いたいのかある程度察したらしい。&lt;BR&gt;　明るく微笑んだまま、ふるふると首を振った。&lt;BR&gt;「過去は……全部を変えられるわけじゃないけど、変えられる過去も、ちゃんとあるんだよ～？&lt;BR&gt;　だからママ先生はガルバディアに君臨したんだし、おねえちゃんは白い船に乗らなくちゃならなかったんじゃないの～？」&lt;BR&gt;　イデアが孤児院の優しい『ママ先生』から恐怖の魔女になったのはアルティミシアに操られたから。&lt;BR&gt;　エルオーネが白い船に乗せられ世界を放浪したのも、アルティミシアに狙われたから……。&lt;BR&gt;「アルティミシアがいなかったら、全部起こらなかったことだよね～？　アルティミシアは、間違いなく、過去を変えたんだとあたしは思うんだ～。&lt;BR&gt;　でも、アルティミシアにも変えられなかった過去はあるよね。アルティミシアは、自分が死ぬって過去を、変えることができなかったんだよね」&lt;BR&gt;　アルティミシアは未来からジャンクション・マシーン・エルオーネを使って、イデアが息絶えるアルティミシアから魔女の力を継承するという『過去』を知り、その『自分にとっての未来』を消すために、時間圧縮を試みた。&lt;BR&gt;　生きるために彼女はイデアを操り、時間圧縮を行い、それ故にスコール達を自分の存在する時間軸に呼び寄せる結果となり、命を落とした。&lt;BR&gt;　過去を変えたつもりで、一番変えたかった過去を変えることができなかったのだ。&lt;BR&gt;「だから、過去は全部が全部、変わらないわけじゃないって、あたしは思うんだよ～。それなりの運と、実力が備わってて、あとはおねえちゃんの力があったら変わる過去はちゃ～んとある！&lt;BR&gt;　変わらない過去は……人の『意志』がからんだ過去、じゃないかな～？　無理矢理乗っ取っちゃうとか、そういうんならともかく。過去のその人が道を選んだ時の『意志』とか……そういうのは、きっと未来のあたしたちがどうしたって、変わるものじゃないんだよ」&lt;BR&gt;　実力が足りなかったから、アルティミシアの『意志』にスコールは負けてリノアの過去を変えることができなかったし、ラグナの強固な『意志』が絡むから、エルオーネはどう望んだって、小さなエルオーネを探しに旅立ったラグナの過去を変えることは不可能だったのだ。&lt;BR&gt;　そして過去のセルフィは、SeeDであることを何よりの誇りにしているセルフィは、たとえ自分自身が過去に飛んだところで、やっぱりエスタに赴くと思うのだ。&lt;BR&gt;「…………」&lt;BR&gt;　スコールは何をどう言えばいいのか、もうわからなかった。&lt;BR&gt;　沈黙が落ちた。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　眼の前で、気詰まりな沈黙に居心地悪そうなスコールは、優しい人だとセルフィは思う。&lt;BR&gt;　言葉に関してあまりに不器用で、優しい言葉を口にするのがとにかく苦手で、他人に対し自分自身を守ってしまうからわかりにくいけれど、スコールはちゃんと人に対して優しい人なのだ。&lt;BR&gt;　だから、先ほどのなぐさめだって、セルフィは嬉しかった。&lt;BR&gt;　受け入れることはできなくても、気遣ってくれるその気持ちが嬉しかった。&lt;BR&gt;（おんなじこと、昔もあったなぁ～）&lt;BR&gt;　……あれは確か、学園祭のステージがバラムガーデンとF・Hとの衝突時の衝撃で壊れてしまった時だ。&lt;BR&gt;　トラビアの安否が確認できず、死を覚悟するほどの任務を終えて帰ってきたセルフィは、精神的にひどく疲れ果てて、傍目にもわかるくらいずっしりと落ち込んでしまっていた。&lt;BR&gt;　そんなセルフィに、不器用に慰めの言葉をかけてくれたのが……スコールだった。&lt;BR&gt;　――――『あんたみたいな無関心男にそんなこと言われるなんて意外～』&lt;BR&gt;　それに対してセルフィがこう答えると、これまた傍目にはっきりわかるほど、スコールは不機嫌な顔になった。セルフィに対して不機嫌な顔を真正面からスコールが向けたのは初めてで、セルフィは少し驚き、それから彼の複雑そうな顔を見て、彼があれこれと思考をめぐらせていることに気がついた。&lt;BR&gt;　実際それまでのスコールは無関心極まりない男に見えていた。セルフィの願いを聞いて学園祭実行委員を引き受けたと聞いて、彼を知るすべての人間が驚倒していたくらいだから、その認識はセルフィだけのものではなかったのだろう。&lt;BR&gt;　けれど、それはもしかしたら、間違った認識だったのかも知れない。&lt;BR&gt;　スコールはちゃんと周囲の人間の動向を気にかけていて、それに対する彼なりの意見もちゃんと持っていて、けれどそれは彼の中だけで消化されてしまって、表に出ることがないだけなのかも知れない。&lt;BR&gt;　それからセルフィは、注意深くスコールの様子を見るようになった。自称スコール研究家のキスティスにも負けないくらい、スコールの表情や、仕草や、声に気を付けるようになった。&lt;BR&gt;　辛い時、悲しい時、苦しい時――言葉に出さないスコールが、懸命に仏頂面に感情を押し込めていることにも、すぐに気がついた。&lt;BR&gt;　……まるで、自分が笑顔の奥にダメな自分を隠しているのと同じように。&lt;BR&gt;&lt;BR&gt;　&lt;BR&gt;　セルフィは腕を上げ、両手でスコールの頬をはさみこむと、全開の笑顔で顔をのぞきこんで口を開いた。&lt;BR&gt;「んも～！　そ～んな顔、しないしない！　過去のことは基本的に考えちゃダメなの～！　あたしたちが変えられるのは未来だけなの～！　そう思っとけばがっくりもしない！　ね？」&lt;BR&gt;　なまじエルオーネが傍にいるから勘違いしやすいが、そもそも人に許された領域なんてごく限られた未来だけなのだ。セルフィはもう幾度となくそう自分に言い聞かせている。&lt;BR&gt;　毅然と『現在』を生き、手に届く未来を明るくしようと日々戦うセルフィの声に逆に励まされてしまい、スコールは眼を伏せてくっと苦笑した。まったくもってかなわない。&lt;BR&gt;　セルフィもスコールの両頬に触れたまま、にこにこと笑う。&lt;BR&gt;　だが、その触れた指先に、かすかな緊張が走ったのがスコールにもわかった。&lt;BR&gt;（？）&lt;BR&gt;　驚いて眼を上げる。そこにあるのはいつもと変わらない陽溜りのような笑顔。&lt;BR&gt;　するりと指先がスコールの頬を離れ、明るい笑みを刻んだ唇が、ゆっくり開いて明るい声を紡ぐ。&lt;BR&gt;「スコール、いっこだけ、約束してくれる～？」&lt;BR&gt;「約束？　パフェのことならちゃんと買ってやるぞ」&lt;BR&gt;「それはもちろんなんだけど、おんなじくらい大事なこと～！」&lt;BR&gt;　くすくすと上げる笑い声も、まったくいつもと変わらない。&lt;BR&gt;「あのね、もしこの先、あたしが任務の足引っ張っちゃったら～……はんちょはかまわないから、ちゃんと任務を遂行してね」&lt;BR&gt;「…………」&lt;BR&gt;　スコールから笑顔が消える。&lt;BR&gt;　鋭い視線でセルフィを見たが、彼女は変わらず微笑んでいた。&lt;BR&gt;「あたし、ず～っとSeeDになりたかったんだ～。SeeDになれたら、SeeDじゃないあたしって、もう想像つかないんだ～。&lt;BR&gt;　だから……あたしは最後まで、ちゃんとSeeDでいたいんだよ～！」&lt;BR&gt;　スコールの眼差しがますます厳しくなる。&lt;BR&gt;　それを受け止めるセルフィの眼差しは真剣だった。笑顔だったけれど、眼は本気で真剣だった。&lt;BR&gt;　こんな表情のセルフィを、過去に見たことがあったとスコールは思う。&lt;BR&gt;　あれは――そう、ミサイル基地に派遣してと、自分に詰め寄った時の顔……。&lt;BR&gt;（俺に……）&lt;BR&gt;　苦い思いで、スコールは心の中で呟いた。&lt;BR&gt;（俺にまた、命に関わる選択をしろって言うのか？）&lt;BR&gt;　あの時の、セルフィたちの帰還を待つ間のSeeDの建前と後悔との間で苛まれた記憶が生々しく甦る。&lt;BR&gt;「……セルフィは」&lt;BR&gt;　口を開きながら、これから聞く問いの答えはもうわかっていた。&lt;BR&gt;　自分だって、立場が変われば同じように言うだろう。わかっている。わかっているが……。&lt;BR&gt;「殺されてもかまわないと言うんだな？」&lt;BR&gt;「そうだよ」&lt;BR&gt;　まっすぐに視線を合わせて、セルフィが即答した。&lt;BR&gt;「あたしはSeeDだもん。それは、命より大事なんだよ～！」&lt;BR&gt;　微笑んではいても、どこか厳しい、覚悟の決まった顔で、きっぱりと言ってのけた。&lt;BR&gt;　戦場で生きて戦場で死ぬ覚悟。&lt;BR&gt;　ただ漠然と命を繋ぐだけの生を生きたくない。戦い勝ってもぎとる生しか欲しくない。&lt;BR&gt;　それはもちろん、SeeDのスコールにもわかる感情だったから……何も言えなくなってしまう。&lt;BR&gt;「……それにね、別にそうなったって、はんちょが何かを背負う必要なんて全然ないんだよ～？」&lt;BR&gt;　にこっとまた明るい笑顔に戻って、セルフィが小首を傾げるようにして囁いた。&lt;BR&gt;「あたしの命は、あたしだけのもの。あたしの人生も、あたしだけのものなんだ～。&lt;BR&gt;　あたしはあたしの意志で、SeeDになってSeeDとして生きて、SeeDとして死んでくだけなんだよ」&lt;BR&gt;　ずくり、と胸が痛んだ。&lt;BR&gt;　あの夜、二度目の市街襲撃のあったあの夜、涙をこぼしながら微笑んだセルフィを前に突如わきおこった衝動が、またスコールの脳髄をかきまわす。&lt;BR&gt;「どうして……」&lt;BR&gt;　自分の声が、頭の中だけで呟いてるのか実際に口に出しているのかも一瞬わからなかった。&lt;BR&gt;「え？」&lt;BR&gt;　首を傾げたセルフィの二の腕を乱暴につかみ寄せる。セルフィが驚いた顔をした。&lt;BR&gt;　スコールが突然激情するのは今にはじまったことではなかったが、今まで自分に関して激情するスコールというものを見たことがなかったので、どう対応すべきか反応に困っている感じだった。&lt;BR&gt;「どうして、そんな風に笑って言えるんだ……！？」&lt;BR&gt;「……スコール？　ど～したの？　怒ってる～？」&lt;BR&gt;　力まかせに握った腕は痛むだろうが、そんなことはおくびにも出さずにセルフィがスコールの眼をのぞき込む。&lt;BR&gt;　明るい光を浮かべた瞳は、ただ穏やかにスコールの感情を受け止めている。&lt;BR&gt;　怒りや悲しみといった負の感情のまったく見えない瞳。&lt;BR&gt;　負の感情をまったく持たない人間などいない。&lt;BR&gt;　それが見えないということは……そういった負の感情を押し隠すことに慣れているということ、なのだろうか。&lt;BR&gt;「怒ってる……わけじゃない……」&lt;BR&gt;（俺は……）&lt;BR&gt;　苦しげに、スコールの眉根が強く寄せられる。&lt;BR&gt;　いつもの難しそうな顔より、もう少し切なげで、辛そうな顔。&lt;BR&gt;「スコール……？」&lt;BR&gt;　一瞬、ほんの一瞬だけ、セルフィの表情から笑顔が消える。大きく見開いた翠の瞳が、一瞬泣き出しそうにゆらりと揺れる。&lt;BR&gt;　それでもセルフィは、にこりと笑ってみせた。揺らいだ瞳も、一瞬で落ち着かせて。&lt;BR&gt;「……スコール、ありがと。でもね～」&lt;BR&gt;　自分のために悩み、苦しんでくれるスコールに、セルフィは屈託なく笑いかけた。&lt;BR&gt;　涙こそ流さなかったが、それはあの夜の笑顔とまったく同じもので――。&lt;BR&gt;「――――――！」&lt;BR&gt;　あの夜襲った衝撃が、再びスコールの思考を真っ白に染めた。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　スコールの腕の中で、セルフィが首を振りもがいて暴れていた。&lt;BR&gt;　ばしばしとスコールの胸をセルフィの手が叩く。細い腕だが、SeeDにふさわしいだけの力はある。&lt;BR&gt;　スコールは、……そこでようやく、自分がセルフィに何をしているのかを認識した。&lt;BR&gt;　唇をもって、彼女の言葉を呼吸ごと奪っていることに気がついた。&lt;BR&gt;　抱きすくめ、強引に覆い被さるように口づけて、続くセルフィの言葉を遮っていた。&lt;BR&gt;　息苦しさにセルフィが喉の奥で悲鳴を上げる。薄目を開いた翠の瞳がスコールを捉える。&lt;BR&gt;「！」&lt;BR&gt;　唇に痛みが走り、スコールは思わずセルフィの上から身を起こした。&lt;BR&gt;　手で触れると、切れた唇から血がしたたり手を汚す。&lt;BR&gt;　スコールの唇に噛みついてようやく解放されたセルフィが、スコールを突き飛ばすようにしてベッドから転がり落ち、床に座り込みながら荒い呼吸を肩で繰り返していた。&lt;BR&gt;　手の甲で唇を拭いながら、スコールは茫洋とした気分で視線をセルフィに落とす。&lt;BR&gt;　同時に、ゆっくりと眼を上げたセルフィと、視線が合った。&lt;BR&gt;　驚愕というよりも、ただただ激しい衝撃を瞳に浮かべて、セルフィは無言でスコールの視線を受け止める。&lt;BR&gt;　その瞳を見た途端、スコールの頭が急速に冷えた。&lt;BR&gt;「……悪い……」&lt;BR&gt;　思わずそう呟いていた。&lt;BR&gt;　かすれたその声に、セルフィの瞳が大きく見開かれる。驚愕の眼差しが、悲痛なそれに一瞬で変わった。&lt;BR&gt;　まばたきを忘れた瞳に、見る間に涙が盛り上がる。ぎゅっと強く閉じられた瞼から、ぼろっと大粒の涙が珠を結んでこぼれ落ちた。&lt;BR&gt;「セル……」&lt;BR&gt;　唇を噛みしめ、それ以上の涙も嗚咽もこぼすまいとしているセルフィの肩に、恐る恐るスコールが手を伸ばす。&lt;BR&gt;「出てって！！」&lt;BR&gt;　だがそれを拒絶する激しい声に、空中で行き場をなくした手がぴたりと止まった。&lt;BR&gt;　眼を開き、必死に涙をこらえようと両眼に力をこめながら、セルフィはきっと顔を上げてスコールを見上げた。&lt;BR&gt;　怒りとも悲しみともつかない悲痛な眼差しがまっすぐにスコールを射抜く。&lt;BR&gt;「……あたしは……」&lt;BR&gt;　ぐっと小さな手が固く握りしめられる。震える声に、激しさが宿る。&lt;BR&gt;「あたしは、……あたしはリノアの代わりじゃないんだからぁっ！！」&lt;BR&gt;　涙混じりの絶叫が、見事なくらいまっすぐにスコールの胸を直撃し貫いてゆく。&lt;BR&gt;「出てって！　いいから、出てってよ～！！」&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　……気がついたら、スコールはその声に押されるようにして、防御室から出てきてしまっていた。&lt;BR&gt;　そのことに気づいて、スコールはますます自分が情けなくなってきた。&lt;BR&gt;（何をやってんだ……俺は……）&lt;BR&gt;　唇に触れる。ピリリとした痛みの走るそこには、まだセルフィに触れた感触が残っている。&lt;BR&gt;　――――あたしはリノアの代わりじゃないんだから！！&lt;BR&gt;　セルフィの叫び声が胸の奥に突き刺さって消える気配がない。&lt;BR&gt;　確かに今冷戦状態にあるとは言え、スコールの恋人がリノアである事実はまだ変わらない。&lt;BR&gt;　アルティミシア事件の時、リノアで頭をいっぱいにして狭い視野で暴走し、その迷惑をもっとも近くで受けたセルフィにしてみれば、今スコールのとった行動は到底許し難い行為に違いない。&lt;BR&gt;　……が。&lt;BR&gt;（リノアの……代わりになんて……しようと思ったのか？　俺は……）&lt;BR&gt;　それはどうも違うような気がする。&lt;BR&gt;　ならば何なのかと問われれば返答に困る。あのセルフィの笑顔がスコールの頭を真っ白にして、気がついたら衝動的にキスしてしまっていた。&lt;BR&gt;　そこにリノアの存在が介在する余地はなかった。……と、思う。&lt;BR&gt;　だが、そう思われても仕方がないことも、よくわかっていた。&lt;BR&gt;「……最悪だな……」&lt;BR&gt;　魔法研究所を飛び出し、官邸に戻る気にもなれずにエスタ首都入口まで早足で来てしまったスコールは、誰もいないそこでぽつりとひとりごちた。&lt;BR&gt;「本当に……何をやってるんだ……」&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　一方、防御室からスコールを追い出したセルフィは、床に座り込みベッドに突っ伏していた。&lt;BR&gt;（スコールのバカ、バカバカバカ、大バカ～！！　ほんまに、ほんまにアホちゃうか！？）&lt;BR&gt;　心の中でトラビア弁全開で、スコールに対する大罵倒の嵐である。&lt;BR&gt;（あたしのこと何や思っとるんや？　リノアがいるくせに、いるくせに、いるくせに～っ！！）&lt;BR&gt;　必死で泣くまいとはするのだが、堰を切ったようにあふれる涙は洪水状態で止まる気配もない。&lt;BR&gt;　誰も見てはいないのだが、それでも懸命に奥歯を噛みしめ嗚咽をこらえ、強く強く眼をつぶって涙を抑えた。&lt;BR&gt;　唇にはまだ先ほどの荒々しいキスの感触が残っている。それが胸の痛みをさらに増す。&lt;BR&gt;　……あのキスをどう受け止めれば良いのか、今のセルフィにはわからない。&lt;BR&gt;　自分に向けられるどんな感情も、今までありのままに受け止めてきた。好意にはなるべく好意を返し、悪意には無興味をもって返し、そうして誰に対しても適度な距離を保って今まで上手にやってきた。&lt;BR&gt;　だがあのキスは、上手にやりすごすにはどんな意味を持っていたのかがわからない。&lt;BR&gt;　好意と受け止めるには、リノアの存在が心に刺さる。&lt;BR&gt;　悪意と受け止めるには、スコールの苦しげな顔がそれを否定する。&lt;BR&gt;（なんでキスしといてあんな苦しい顔見せるんや？　苦しい顔したいんはあたしの方や！）&lt;BR&gt;　セルフィの涙混じりの絶叫に、途方に暮れた迷い子のような顔をしていた。&lt;BR&gt;　途方に暮れたいのはセルフィの方である。&lt;BR&gt;　ずっと仲間だと思っていた。男女の区別なく、信頼できる仲間だと思っていた。&lt;BR&gt;　スコールに恋われ宇宙まで追ってもらえるリノアは幸せだと思った。羨望の思いがなかったと言えば嘘になる。けれど自分の人生には関わりがない。&lt;BR&gt;　――――自分の力ひとつで生きると決めたセルフィには関わりがない。&lt;BR&gt;（なのに……）&lt;BR&gt;　それなのに、スコールはセルフィを女として扱った。男として、女のセルフィに触れ、押しつけた。&lt;BR&gt;　それがセルフィには許せない。&lt;BR&gt;（…………それだけ？）&lt;BR&gt;　痺れる頭の奥で声がする。&lt;BR&gt;（悔しいのはそれだけ？　悔しいならなぜ悲しむん？）&lt;BR&gt;　――――悲しい？&lt;BR&gt;　かたく閉じていた瞳を開き、セルフィはゆるゆると顔を上げる。&lt;BR&gt;　息すら抑えていたために乱れた呼吸音が、誰もいない部屋に静かに響き渡った。&lt;BR&gt;「悲しい……？　なんでぇ……？」&lt;BR&gt;　口に出してみる。誰にも届かない震える声。&lt;BR&gt;　対等でいたかったのに、男女をつきつけたスコールが悔しかった。それは確かだ。&lt;BR&gt;　……けれど、涙をこらえられないほどの、この胸の悲しみはなんだろう？&lt;BR&gt;&lt;BR&gt;　――――あたしはリノアの代わりじゃない……&lt;BR&gt;&lt;BR&gt;　先ほど叫んだ自分の言葉が耳によみがえる。&lt;BR&gt;（でもスコールが好きなのはリノアのはず……だよね～？）&lt;BR&gt;　自分の知らない間にふたりの間には何かの距離が生まれていた。けれどあれほど恋に囚われたスコールが、そう簡単にリノアを忘れるとは思えない。&lt;BR&gt;　なのにセルフィにキスをした。抵抗する自分を強引に押さえつけて、強引にくちづけた。&lt;BR&gt;　それが悲しかったのだろうか？&lt;BR&gt;　……だがリノアの友達としてスコールの不実に怒りを覚えるならともかく、悲しい気持ちを覚えるのは何かが違う。&lt;BR&gt;（――――）&lt;BR&gt;　ふるふるとセルフィは首を振り、あわてて思考を停止した。&lt;BR&gt;（考えちゃダメ――）&lt;BR&gt;　頭の中で、これ以上は考えるなと警笛がなった。ぎゅっと眼をつぶり、セルフィは膝の上に顔を埋める。&lt;BR&gt;　そして気がついた。&lt;BR&gt;（あ……）&lt;BR&gt;　今の警笛を、自分は頭の中で何度も聞いた覚えがあった。&lt;BR&gt;　……何度も何度も。一年前、魔女騒動のあの最中に。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;&lt;/SPAN&gt;

<script data-viewer-zoom-script>
(() => {
  const stage = document.querySelector('.viewer-stage-image');
  const image = stage ? stage.querySelector('.viewer-image') : null;
  if (!stage || !image) {
    return;
  }

  const setZoom = (enabled) => {
    stage.classList.toggle('is-zoomed', enabled);
    image.setAttribute('aria-pressed', enabled ? 'true' : 'false');
    if (enabled) {
      const naturalWidth = image.naturalWidth || image.clientWidth || 0;
      const targetWidth = naturalWidth > 0
        ? Math.max(naturalWidth, Math.min(Math.round(stage.clientWidth * 0.92), naturalWidth * 4))
        : Math.round(stage.clientWidth * 0.92);
      image.style.width = `${targetWidth}px`;
      image.style.maxWidth = 'none';
      image.style.maxHeight = 'none';
      requestAnimationFrame(() => {
        stage.scrollTop = 0;
        stage.scrollLeft = Math.max(0, Math.round((image.scrollWidth - stage.clientWidth) / 2));
      });
    } else {
      image.style.removeProperty('width');
      image.style.removeProperty('max-width');
      image.style.removeProperty('max-height');
      stage.scrollTop = 0;
      stage.scrollLeft = 0;
    }
  };

  const toggleZoom = () => {
    setZoom(!stage.classList.contains('is-zoomed'));
  };

  image.setAttribute('tabindex', '0');
  image.setAttribute('role', 'button');
  image.setAttribute('aria-label', '逕ｻ蜒上ｒ諡｡螟ｧ縺ｾ縺溘・邵ｮ蟆・);
  image.setAttribute('aria-pressed', 'false');

  image.addEventListener('click', toggleZoom);
  image.addEventListener('keydown', (event) => {
    if (event.key === 'Enter' || event.key === ' ') {
      event.preventDefault();
      toggleZoom();
    }
  });

  stage.addEventListener('click', (event) => {
    if (event.target === stage && stage.classList.contains('is-zoomed')) {
      setZoom(false);
    }
  });

  window.addEventListener('keydown', (event) => {
    if (event.key === 'Escape' && stage.classList.contains('is-zoomed')) {
      setZoom(false);
    }
  });
})();
</script>
