      width=537&gt;&lt;SPAN&gt;&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　――――ホンマに綺麗なんやねんで&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　白い白い雪原の中、そこだけ太陽を切り取ったような笑顔を向けたあの日の少女を、ハインは今でも覚えている。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　――――おひさまの色が、い～っぱい、一面に咲いてるんやわ。ハインにも見せてあげたいな～&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　邪気のかけらもない、無防備な信頼だけを向けてくるあの笑顔を、今でも覚えている。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　はじめて出会ったのも、白い白い世界の中だった。&lt;BR&gt;　人にはない強大な力を秘め、遠い昔に自分が呪わしく継承させた力の一部で封じられた、アンバランスな娘。&lt;BR&gt;　その危うく保たれた均衡に、はじめは惹かれた。&lt;BR&gt;　姿形は遠い遠い昔に自分が「無駄である」と断じて焼き払った小さな人間――『子供』と同じ。けれどその中身は他の人間や子供とはまったく違っていた。&lt;BR&gt;　力と記憶の塊となり、たゆたう自分を見ても、恐怖のかけらも抱かずまっすぐ視線を向けた少女。&lt;BR&gt;　ためらうことなく笑顔を向け、差し伸べられた小さな手。&lt;BR&gt;　はじめは小さな身の内に存在する強大な力が目的だった。&lt;BR&gt;　けれどいつの間にか、あの小さな手のひらと澄んだ瞳に囚われていた。&lt;BR&gt;「ハイン」と名を呼ぶ、あの涼やかな声に囚われた。&lt;BR&gt;　これが人の言う『幸せ』というものなのだと知り、知ってしまったからこそささやかな幸福に囚われた。&lt;BR&gt;　囚われたからこそ、小さな命を惜しんでその身を離れた。&lt;BR&gt;　暴走させた彼女の力を手に入れるより、彼女の存命を優先した。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　彼女は確かに生きながらえた。&lt;BR&gt;　だがその引き替えに彼女は、ハインの存在と、ハインと交わした約束のすべてを忘れた。&lt;BR&gt;　はじめて手に入れた幸せ。その失われた幸せを数えるのに、６年という歳月は決して短いものではなかった。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　たとえ、おとぎ話になるほどの時間を過ごしたこの身であっても。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;（ちがうよ）&lt;BR&gt;　奥に押しやられ、主導権を奪われたセルフィは、伝わり来る痛いほどの感情を懸命にやりすごす。&lt;BR&gt;（ハインと約束した、ホントの意味は、そんなんじゃない――）&lt;BR&gt;　巨大な意識に懸命に呼びかけたところで、セルフィの声は届かない。&lt;BR&gt;　たったの６年という歳月が、あの約束をどうしてこんなふうにねじ曲げてしまったのだろう。&lt;BR&gt;（なんで――）&lt;BR&gt;&lt;BR&gt;　哀しいセルフィの声は、どんなに張り上げても決して届かない。&lt;BR&gt;　もうすぐ邪魔なすべてを葬り去れると、勝利に酔いしれているハインの耳には、決して。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　ジエンドは、確かに唱えられた。&lt;BR&gt;　セルフィの可愛らしい声で、はっきりと聞こえたその言葉に、スコールもサイファーも、そして背後にいた風神もぎくりと息をのんで動きを止めていた。&lt;BR&gt;　生きとし生けるものすべての命を死に導く絶対の魔法。&lt;BR&gt;　けれど、息をつめて数秒たっても、スコール達の身には何も起こらなかった。&lt;BR&gt;「…………！？」&lt;BR&gt;　ハインが驚愕の表情を浮かべる。&lt;BR&gt;　イデアがかつて施した封印は、セルフィを乗っ取った時点ですでに解除してある。なのに何故発動しないのか――&lt;BR&gt;「今！」&lt;BR&gt;　鋭い声が背後から突き刺さり、スコールはそれにはじかれるように地面を蹴って斬りかかった。&lt;BR&gt;「！」&lt;BR&gt;　完全に不意をくらったハインの肩口からばさりと斬りつける。まとった蒼い光が衝撃を受け止めきれず、薄い肩が浅く裂けて血がしぶいた。&lt;BR&gt;　唇をぐっと噛みしめながら引き金を引く。&lt;BR&gt;　バシュッと重い衝撃。とっさにハインが片手の平をスコールに向ける。そこから蒼い光が迸る前に飛び退き、その瞬間を狙ってサイファーがファイガで動きを止め、風神が唱えたメテオがハインに降り注ぐ。&lt;BR&gt;「……ごめん、セルフィ……！」&lt;BR&gt;　シェルでダメージを軽減し、身を起こそうとしたハインの上から、エデンのエターナルブレスが直撃した。&lt;BR&gt;　すさまじい爆発で一瞬視界が途切れた。&lt;BR&gt;「……やったか……！？」&lt;BR&gt;　頭上でサイファーの声が聞こえ、スコールはわからないと首を振る。この程度でハインがやられることはあり得ないが、精神的に動揺している今なら、セルフィの肉体的損傷によっては彼女の中から離れるのではという淡い期待がある。&lt;BR&gt;「注意！」&lt;BR&gt;　風神が鋭く声を出す。未だおさまらない爆風の向こう、ゆらりと立ち上がる姿が見えた。&lt;BR&gt;　人間の分際で反抗を試みる、愚か者を怒りに満ちた蒼の瞳でひたと見すえ、静かに殺気立っている。&lt;BR&gt;　ほんのわずかではあるがダメージは負っている。それを確認し、スコールは酷薄に頬をゆるめて小さく笑った。&lt;BR&gt;「……不思議だろう？」&lt;BR&gt;　怒りだけなら、こちらも負けていない。&lt;BR&gt;　激烈な怒りを群青の瞳にこめ、大切な少女を蹂躙する者を睨め付け、スコールは一歩踏み出した。&lt;BR&gt;「なぜあんたがセルフィの魔法を使えないのか、教えてやろうか？」&lt;BR&gt;　睨み返すハインは、身動きせずスコールの言葉を待っている。&lt;BR&gt;　ハイン自身、セルフィの固有魔法を使用できないことに、激しく動揺しているのだ。&lt;BR&gt;「セルフィがあんたの中で、今も戦っているからだ……！」&lt;BR&gt;　主導権は奪われてしまったが、セルフィは今も決してあきらめてはいない。&lt;BR&gt;　どれほど意識の奥に押し込められてしまっても、セルフィだけが使える魔法はセルフィの領域にある。&lt;BR&gt;　セルフィが全力でそれを抑えているから、ハインは絶対にセルフィの魔法を使えない。ジエンドのみならず、レビテガもウォールもフルケアも、ハインに使うことはできない。&lt;BR&gt;　……セルフィは今この瞬間も、スコール達と共に戦っている。&lt;BR&gt;「あんまり、人間をなめてんじゃねーぞ」&lt;BR&gt;　スコールのすぐ後ろで、サイファーが不愉快そうに眼を細めて言い捨てた。&lt;BR&gt;「愚か者が……！」&lt;BR&gt;　怒りに満ちた凍えた声で、ハインは呟く。セルフィの魔法などなくとも、力の差は歴然としている。ジエンドで一掃とは行かなくなったが、多少死ぬ時間が先に延びた程度で、抵抗する愚か者に未来などない。&lt;BR&gt;　それにどれほどセルフィが抵抗したところで、自我が消えるのは時間の問題だ。自我が消えれば、ハインはその瞬間からセルフィの魔法を手中に収めることになる。&lt;BR&gt;　膨れあがる力を察知し、スコール達が身構えるのと同時に、ハインの身体から蒼い炎が吹き上がる。&lt;BR&gt;　今までとは比較にならない巨大な炎の塊が、ハインの小さな身体を中心にして大爆発を起こした。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　――――ハインはどうして、ずっとひとりでおったん？&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　炎に巻き上げられ、吹き飛ばされていくスコール達を眺めるハインの耳元で、ふと少女の声が響いた。&lt;BR&gt;　幼さの残る響きを持つ少女の声。&lt;BR&gt;『あたしやったら、ひとりは寂しくて耐えられへんもん。そやからあたしの傍にいてくれるん？』&lt;BR&gt;　寂しいなどと、つまらない感情は抱かない。そう答えたハインに、少女は不思議そうに首を傾げて。&lt;BR&gt;『それは、気づけないくらい寂しいってことやないの？』&lt;BR&gt;　無邪気に言った。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　崩れかけた官邸の廊下を、爆風が支配していた。&lt;BR&gt;　所詮、人間ごときが叶うはずがない。長い歴史の中、自分を追いつめることはあっても、結局滅ぼすには至らなかった愚かな生き物たち。『神』などと都合のいい言葉で自分を崇め、力の恩恵に預かろうとした卑小な命。&lt;BR&gt;　放たれる小さな魔法をはね返し、唸りをあげて振るってくる刃をかわし、数十倍もの威力を持った炎を叩き返し、また爆発が巻き起こる。&lt;BR&gt;　まだ、意識の奥には少女の精神が残っている。最後の魔法を渡さぬように、懸命に抱きしめて。&lt;BR&gt;「…………」&lt;BR&gt;　全身を朱に染め、それでもよろりと立ち上がった青年を、ハインは蒼い瞳でまっすぐ見つめる。&lt;BR&gt;　この人間がいるからいけない。&lt;BR&gt;　身の内で懸命に儚い抵抗を少女が続けているのも、この人間の気配を感じ取っているからだ。&lt;BR&gt;　もうとっくに、倒れていてもおかしくない傷を受けているのに、それでも立ち上がり刃を向けてくる。&lt;BR&gt;　このハインの攻撃を受けながら、致命傷を受けることだけは何とか免れているのは、確かに人間の中では優れた戦士なのだろう。&lt;BR&gt;　けれど、もう限界はすでに超えている。全身から流れている血は止まる気配もなく、おそらく体力をも流し出しているはずだ。内臓にもきっと損傷がある。唇から溢れる鮮やかな血がその証拠だ。&lt;BR&gt;　なのに、ガンブレードを構え、気合いとともに飛びかかってくる。鮮やかな光の軌跡を描きながら襲いかかるその数撃を、ハインはわざと受け止めた。&lt;BR&gt;『……だって、寂しいのは嫌だもん』&lt;BR&gt;　たしかに人間は愚かで非力で、その手はすべてを救うにはあまりにも小さくて。&lt;BR&gt;『寂しいのは、心があるからでしょ～？』&lt;BR&gt;　けれどすべてを救うことができなくても、ただひとりの愛しい人を喪いたくないと願うのは。&lt;BR&gt;『心があるんなら、寂しい気持ちも知ってるでしょ～？』&lt;BR&gt;　神と呼ばれる存在だって。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　意識の奥から呼びかける少女の声に、ハインは苛立ち首を振る。&lt;BR&gt;「…………！！」&lt;BR&gt;　スコールが大きく眼を見開いた。&lt;BR&gt;　最後のガンブレードの一撃をハインに振り下ろしたその瞬間、鋭い槍と化した蒼い炎が、スコールの胸をまっすぐに貫き、爆発した。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;「チッ……！」&lt;BR&gt;　壁に叩きつけられ、よろめきながら顔を上げたサイファーは、致命的な攻撃を受けたスコールの姿を目の当たりにし、顔をしかめて舌打ちした。&lt;BR&gt;（本物の化け物だ）&lt;BR&gt;　あのスコールのエンドオブハートを受けておいて、間髪入れずにあんな攻撃を放てるとは。&lt;BR&gt;　もちろん、ダメージは決して小さい物ではないはずだ。だが、それを受け止めたという事実において、スコールが受ける精神的ダメージの方が深刻で大きい。&lt;BR&gt;　吹き飛ばされたスコールは瓦礫の中に突っ込んで倒れ、そのままぴくりとも動かない。&lt;BR&gt;（死んだか？）&lt;BR&gt;　息が少しでもあれば、アレイズが間に合うのだが……。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　言葉は確かにハインに届いていた。&lt;BR&gt;　しかし、それを受け入れる気配はどこにもなかった。&lt;BR&gt;（…………）&lt;BR&gt;　意識の奥底に閉じこめられ、身動きひとつかなわないまま、セルフィは哀しい思いを抱きしめる。&lt;BR&gt;　すべてを終わらせるだけの力は、ハインによって封印を解かれ、今こうしてセルフィの腕の中にある。&lt;BR&gt;　なぜ渡さないと、ハインの苛立った意識が伝わってくる。&lt;BR&gt;（ごめんな……）&lt;BR&gt;　６年前の約束を、セルフィは鮮明に覚えている。思い出している。&lt;BR&gt;　どこかでねじ曲がり、意味を変えてしまった、ハインの中での大切な約束。&lt;BR&gt;（でも……一緒に行こうって、探しに行こうって、言ってくれたやんか……）&lt;BR&gt;　セルフィが望んだ未来は、それだけだったのに……。&lt;BR&gt;（せやから渡せへん……今のハインに、この力は渡せへん……）&lt;BR&gt;　もうじきハインの強大な意識に自分は押しつぶされて消えてしまう。そうわかっていても、心がある限りは大切な人を守りたい。&lt;BR&gt;　決意を新たにしたセルフィの心に、その時ふと、何かが呼びかけた。&lt;BR&gt;（…………？）&lt;BR&gt;　ハインではない声の主は、ハインに気づかれないよう、ひっそりとセルフィにだけ語りかけてくる。&lt;BR&gt;　望む力は、その声のすぐ傍にあった。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　瓦礫の山に頭から突っ込んだスコールは、それでもまだ意識を失ってはいなかった。&lt;BR&gt;　一瞬遅れて全身に激痛がよみがえり、途切れかけた意識が浮上する。&lt;BR&gt;（…………何……が…………）&lt;BR&gt;　ふいに喉に何かがせりあがり、とっさに顔を横向けて口にあふれた血の塊をはき出す。激しく咳き込み、呼吸もままならない。心臓は辛うじて避けたものの、肺をやられているらしい。ひとつ咳をするたび、全身に激しい痛みが駆けめぐり頭がスパークして真っ白になる。&lt;BR&gt;　じゃり、と瓦礫を踏みつけ、歩み寄ってくる者の気配があった。&lt;BR&gt;「…………」&lt;BR&gt;　わずかな呼吸を繰り返すたびに、ひゅうと息がもれた。手足の一本も動かす力も出ず、眼だけを動かしてスコールは歩み寄る者を見る。&lt;BR&gt;　無言で歩み寄るハインの胸元で、銀鎖が涼しげな音を立てた。少し汚れてしまった黄色のリボンが、ぼやける視界に鮮やかだった。&lt;BR&gt;　エンドオブハートで受けた傷は、すでに魔法で綺麗に塞がっていた。ダメージは皆無とは言えないだろうが、致命傷とはなりえなかったことが、彼女の様子からわかる。数歩離れたところで足を止め、細い腕がふわりと持ち上がった。&lt;BR&gt;　もう、以前のような不意打ちも使えない。同じ手を二度も食うほど、ハインも馬鹿ではない。&lt;BR&gt;（ごめん、セルフィ……）&lt;BR&gt;　声は出なかった。だから、心の中で謝った。届かないことは知りながらも、謝らずにいられなかった。&lt;BR&gt;　約束こそはしなかったが、必ずと誓ったにも関わらず、セルフィを取り戻すことも殺してやることもできなかった。&lt;BR&gt;　意識がまた混濁する。頭の中が混乱しているらしい。なんだか幻聴らしきものまで聞こえた気がする。&lt;BR&gt;　いよいよ終わりかなと、かすかにスコールは苦笑した。死ぬ時は戦場だろうと思ってはいたが、よもや仲間の、それも惚れた女の手にかかって息絶えることになろうとは。&lt;BR&gt;　表情ひとつ変えることなく、ハインが指先に宿した炎をスコールに放った。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　翠色の風が唐突にスコールの身を包んだ。&lt;BR&gt;　襲い来る衝撃に覚悟し、身構えていたスコールの身を苛んでいた激痛が、唐突に跡形もなく消え失せる。&lt;BR&gt;「！！」&lt;BR&gt;　常人らしからぬ反射神経で、スコールは身体を反転させ炎の矢を避けていた。&lt;BR&gt;　顔の横で小規模の爆発が起こり、頬を余波が切り裂いていったが、気にしている場合ではなかった。&lt;BR&gt;「な……！？」&lt;BR&gt;　さすがにこれにはハインも驚愕の色が隠せない。焦った様子で次々に爆発を繰り出してくる。&lt;BR&gt;　夢中で何発かはかわしたが、数発は避けようがなくまともに食らった。食らった瞬間、硬質の音が響いて衝撃が緩和される。&lt;BR&gt;（…………！？）&lt;BR&gt;　いつの間にか、物理防御と魔法防御の魔法がかけられていた。&lt;BR&gt;　この状態には覚えがある。戦闘中、セルフィがよくかけてくれた――『ウォール』の効果……。&lt;BR&gt;「……ハイン」&lt;BR&gt;　唇が勝手に動き、スコールのものではない言葉を紡ぎ出す。&lt;BR&gt;「ごめんね、ハイン。あたし、ハインのものにはなってあげられない……」&lt;BR&gt;　冷えたハインの蒼い瞳が、愕然と大きく見開かれた。&lt;BR&gt;　スコールも、そして離れた場所にいたサイファーと風神も、呆然と動きを止めていた。&lt;BR&gt;「ハインはあたしの傍にいてくれたから、あたしも一緒にいてあげたかったよ。&lt;BR&gt;　……でも、スコールを殺すのは、絶対許さない」&lt;BR&gt;　きっぱりと言い切る声は確かに自分のもの。だが、この言葉を紡ぐことができるのは、この世でただひとりしかいない。&lt;BR&gt;　呆然と眼をまたたき、信じられないとゆるく首を振りながら、スコールはゆっくりと現状を認識する。&lt;BR&gt;（セルフィ…………？）&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　どこからか、間違いなくエルオーネの力の介入があった。&lt;BR&gt;　事態を把握し、厳しい表情でハインがスコールを見つめる。&lt;BR&gt;「死ぬ気か？」&lt;BR&gt;　セルフィの内にいるハインにジエンドをぶつければ、セルフィの肉体もろとも滅びることになる。肉体が死んでしまえば、セルフィはもう戻れない。そして意識の『接続』も、エルオーネが維持しきれなくなれば途切れてしまう。&lt;BR&gt;「結果的には、そうなるかもね～」&lt;BR&gt;　あっさりとスコールの中のセルフィが肯定する。&lt;BR&gt;「つくづく、愚かだな」&lt;BR&gt;　若干の呆れを含んだその言葉に、セルフィは果敢に言い返した。&lt;BR&gt;「お互い様だよ、そんなの」&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　少し離れた位置にいたサイファーは、動きを止めた彼らの会話を聞き、何が起きたかを大体把握した。&lt;BR&gt;（やれやれ……）&lt;BR&gt;　大した離れ業をやってのけるセルフィに、サイファーは感心半分呆れ半分の眼差しを向ける。&lt;BR&gt;　……スコールの低い声でセルフィののほほんとした言葉が飛び出していることの是非については、この際置いておくことにした。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;「これが、セルフィの望んだこと？」&lt;BR&gt;　スコール達のいる階のすぐ真下に、エルオーネを連れたリノア達が身を隠しながら、ぶち抜かれた天井――スコール側から見れば床穴――から戦況を見守っていた。&lt;BR&gt;　スコールの身を癒したフルケアを見れば、セルフィの意識がスコールの内にジャンクションされたことはすぐにわかる。『一瞬前の過去のスコール』の内にセルフィの意識は送り込まれているので、タイムラグはほとんどない。一年前、宇宙に放り出されたリノアの中に、スコールを送り込んだのとほぼ同じ要領だ。&lt;BR&gt;　セルフィを内に宿したスコールが、セルフィの姿をした者に戦いを挑む。その悪趣味さに、リノアは眩暈を覚えて身を震わせた。&lt;BR&gt;「こんなのって……！」&lt;BR&gt;　激しく憤るリノアの腕をアーヴァインがぐっとつかんだ。&lt;BR&gt;「こんなの、こんなのダメだよ！　ねぇ、何か方法はないの！？　こうするしかないの！？」&lt;BR&gt;「あったら、とっくにやってるよ……！」&lt;BR&gt;　呻くようなアーヴァインの声に、リノアの眼差しが悲痛なものに変わる。&lt;BR&gt;「だって……！」&lt;BR&gt;　蒼い光が炸裂する。&lt;BR&gt;　はっと振り向けば、防御魔法に阻まれ殺しきれなかった力の残滓に身を抉られるスコールの姿があった。&lt;BR&gt;　続けざまに爆発する力を懸命に避けながら、スコールの動きは何かを狙っている。&lt;BR&gt;（ジエンド……）&lt;BR&gt;　他の誰も巻き込まないよう、確実にジエンドの有効射程内にハインを捉えようと動いている。&lt;BR&gt;　それがわかっているから、ハインの攻撃も容赦がない。ジエンドを放つ、その隙を与えまいと必死なのだ。&lt;BR&gt;　そのハインに向かい、援護の枠を超え本気の力で襲いかかっているのはサイファーだ。その後ろから攻撃魔法を放っているのは風神。&lt;BR&gt;「こんなのって……！」&lt;BR&gt;　リノアはぎゅっと眼をつぶり、現実を拒絶するように大きく首を振った。&lt;BR&gt;　こんなこと、リノアに容認することはとてもできない。&lt;BR&gt;　それに先刻、セルフィの姿を模したハインをガンブレードで貫いたスコールの姿を、リノアは鮮明に覚えている。ハインをセルフィだと思いこんでいたスコールは、セルフィと相討ちになることを明らかに望んでいた……。&lt;BR&gt;　このままジエンドを唱え、ハインごとセルフィを失ってしまったらスコールはどうなってしまうのだろう。&lt;BR&gt;　セルフィはハインのような強大な力を持つ者ではない。その肉体が滅んでしまったら、意識だけになって存在することなど絶対にできない。エルオーネの『接続』が途切れれば、そのまま消滅してしまう。&lt;BR&gt;　もしそうなったら、スコールは……！&lt;BR&gt;「あぶねぇっ！！」&lt;BR&gt;「リノアっ！！」&lt;BR&gt;　突然起きた叫び声と共に、誰かがリノアを抱いて押し倒した。&lt;BR&gt;　エルオーネの上に倒れ込む形になり、驚いて顔を上げたリノアの視界内に蒼い光がいっぱいに広がっていた。&lt;BR&gt;　爆発音が響き渡った。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　すさまじい爆発が、スコール達のいる階すべてを崩壊させる勢いで立て続けに起こった。&lt;BR&gt;　床下から突然力の塊が吹き上がり、スコール達は全員一度突き上げられ、それから重力に従い落下をはじめ、床が抜けていたのでそのまま下の階に墜落した。&lt;BR&gt;（な……！？）&lt;BR&gt;　とっさに受け身をとったものの、続けざまに上から降り注いできた力の塊を身をねじって転がりながら懸命に避ける。&lt;BR&gt;（何だ……！？）&lt;BR&gt;　内側にいるセルフィに声をかける。ジャンクションしている者は、入り込んだ対象者の思考を読むことが出来るので、声に出す必要がない。&lt;BR&gt;「おねえちゃんが……！」&lt;BR&gt;　反対に、スコールは入り込んだ意識が何を言っているのか、思考から直接読みとることができない。&lt;BR&gt;　思考に対する返答が自分の口から返ってくるという非常に貴重な体験をしながら、スコールも事態を把握した。エルオーネを殺されてしまったら、セルフィとスコールの『接続』は途切れてしまう。&lt;BR&gt;　こんなふうに、自分とサイファー・風神に対して攻撃を仕掛けながら、別方向にいるエルオーネにも攻撃魔法を放つことができるなどとはまったくの予想外だった。&lt;BR&gt;（畜生……！）&lt;BR&gt;　今もこうして『接続』が途切れていない以上、エルオーネはまだ無事なのだ。そうはわかっていても、ハインの攻撃の手がまったくゆるめられていない様を見れば、嫌でも焦りが生まれてくる。&lt;BR&gt;「スコールっ！」&lt;BR&gt;　セルフィが叫んだ。&lt;BR&gt;　避けきれなかった蒼く輝く力の塊が、まともにスコールに命中した。&lt;BR&gt;（……！）&lt;BR&gt;　全身がバラバラになりそうな衝撃が走り抜ける。動きが止まったスコールの身体めがけて、力の塊がさらに降り注ぐ。&lt;BR&gt;「馬鹿っ！！」&lt;BR&gt;　サイファーの怒声が響き渡り、魔法で生み出された灼熱の炎が蒼い光にぶつかり弾け飛んだ。&lt;BR&gt;　はっと首をねじって顔を向ければ、スコールに攻撃が集中したことで先に蒼い閃光から逃れ出たサイファーが、ハイペリオンを握りしめてスコールを睨み下ろしている。&lt;BR&gt;　力の軌道が逸れたことでできたわずかな間に、スコールは飛び起きてガンブレードを構え直す。スコールの内にいるセルフィがフルケアを唱えた。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　空中に留まり、強引に力を叩きつけることでエルオーネの場所を探ったハインは、不愉快そうに眉をひそめた。&lt;BR&gt;　思った以上に、どちらもしぶとい。&lt;BR&gt;（伝説のＳｅｅＤ……）&lt;BR&gt;　エスタ市街で対峙した時と、明らかに発揮される実力が違っている。&lt;BR&gt;　スコールだけであれば、さしたる時間もかけずに倒すことが可能だと踏んでいたのだが。&lt;BR&gt;　苦く舌打ちし、ハインは静かに眼を閉じる。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　爆発音が起きた時、はじめリノアは何が起きているのか理解することができなかった。&lt;BR&gt;　衝撃を予想して反射的に眼を閉じたものの、爆発音が耳に届くばかりで何も身体に異変はない。&lt;BR&gt;「…………？」&lt;BR&gt;　おそるおそる眼を開いたリノアの前で、リノア達の階に降り立ったハインから迸る蒼い光がそのまま力となって爆発を起こしていた。&lt;BR&gt;　だが、その暴力的な力はリノアの元には届いていない。リノアを庇うように抱きしめていたアーヴァインも、怪訝そうに振り返る。&lt;BR&gt;　そして叫んだ。&lt;BR&gt;「大統領！！」&lt;BR&gt;　悲鳴のようなアーヴァインの声に、リノアもようやく事態を把握する。&lt;BR&gt;　リノアとエルオーネを覆い被さり庇ったアーヴァインの前に飛び出し、今ハインの攻撃魔法を一身に受けているのは。&lt;BR&gt;「ラグナさ……何やって……！！」&lt;BR&gt;　足下に池をつくるほどの鮮血をまき散らしながら、それでもラグナはその身を盾としてリノア達の正面に立っていた。&lt;BR&gt;「うわっ……！」&lt;BR&gt;　どうにかしなくてはと視線を周囲にめぐらせたアーヴァインが、リノアを抱いたまま驚愕の悲鳴をあげた。&lt;BR&gt;　はっとして振り返ったリノアの視線の先で、飛び散って床に落ちた蒼い光が炎の塊となってゆらりと揺れ、むくりとそれが起きあがった。&lt;BR&gt;（え……！？）&lt;BR&gt;　リノアより先にそれを眼にしたアーヴァインが、反射的にその蒼い炎に銃を向け、躊躇なく発砲する。&lt;BR&gt;「……！」&lt;BR&gt;　しかし銃弾は蒼い炎に取り込まれて動きをぴたりと止め、そのままくるりと方向を変えると、まっすぐにアーヴァイン達に向かって雨のように降り注いだ。&lt;BR&gt;「アーヴァインっ！！」&lt;BR&gt;　とっさにリノアを突き飛ばし銃弾の射軸に飛び出したアーヴァインの全身から血霧が舞い、リノアが両手で口を覆い悲鳴をあげた。&lt;BR&gt;「……リノア、いいからエルオーネを連れて早く逃げて……！！」&lt;BR&gt;　どうしていいのかわからず、中腰の体勢で呆然としているリノアに背を向けたまま、アーヴァインが低く叫んだ。&lt;BR&gt;　傷の治癒は後回しだ。物理攻撃が効かないなら魔法で――！&lt;BR&gt;「！」&lt;BR&gt;　狙いは正しかった。必要最低限ストックしてあった疑似魔法は、少なからぬ衝撃を与えたようだった。&lt;BR&gt;「リノア、ここは何とかするから早く逃げて！　エルオーネをやられたら僕らは完全に終わりなんだ！！」&lt;BR&gt;　ハインに乗っ取られているセルフィの身体から、ハインに気づかれずにセルフィの意識だけをすくい上げてスコールの中へと送り込む。慎重を期さなければならない作業だったために、エルオーネは戦場と化したこの場に来なければならなかったのだ。接続が成功した今、彼女がここにいなくてはならない理由はない。&lt;BR&gt;　今ここでエルオーネを殺され、接続が途切れれば、すべての希望は潰えてしまう。たとえラグナとアーヴァインの生命を引き替えにしてでも、エルオーネを守らなくてはならないのだ。&lt;BR&gt;「そんな……！」&lt;BR&gt;　悲鳴のような声を上げ、リノアは腕の中のエルオーネを抱きしめながら大きく首を横に振った。激しい動きに手首にはめたバングルがかしゃりと音を立て、はっとしてリノアはバングルに視線を落とす。&lt;BR&gt;（あ……！）&lt;BR&gt;　突然の事態に失念していたが、リノアには魔法が使えるのだ。アデルとイデアの魔力を受け継いだ、この世界でただ一人の魔女なのだ。&lt;BR&gt;　恐怖と緊張ににじんだ涙を手の甲でぐいと拭い、リノアは乱暴にオダインバングルをむしり取った。&lt;BR&gt;（セルフィにわたしたちを殺すなんて、絶対させない……！）&lt;BR&gt;　ぐいと顔を上げ、リノアは力の発生源、ハインがいるだろう方向に視線を向ける。蒼い光が絶え間なく降り注いでいるので、ハインの姿はリノアからは見えなかった。&lt;BR&gt;　魔女の力をうまくコントロールできないリノアに、バリアを張るなんて器用な真似はできない。力を溜めて、攻撃魔法に変えて放つ程度のことしかできない。&lt;BR&gt;　けれど、力をぶつけさえすれば、あの蒼い力の奔流を止めることはできるはずだ。蒼い力を飛び散らせないようにすれば、あの変な蒼い炎が動き出すこともない。&lt;BR&gt;「アーヴァイン、わたしが今からあの力を止めるわ！　ラグナさんを引っ張って！！」&lt;BR&gt;「え！？」&lt;BR&gt;　驚くアーヴァインの返答を待つ暇はなかった。&lt;BR&gt;　きっと柳眉を険しくしたリノアの胸の前に突き出された両手に、こめられた力が凝って渦を巻いた。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　耳をつんざくような轟音が響き渡った。&lt;BR&gt;「なんだ！？」&lt;BR&gt;　ぎょっとしてスコール達は顔を上げ、力と力が激しく拮抗している様を見た。&lt;BR&gt;　こちらもリノア達の方同様、飛び散ったはずの蒼い光が意志持つ炎の塊となって襲いかかられ、物理攻撃が効かないので魔法戦となり、ハインを相手にするどころではない。&lt;BR&gt;「リノア！？」&lt;BR&gt;　叫んだのはセルフィだったか、スコールだったか。&lt;BR&gt;　同じ性質を持った力が激しい勢いでぶつかり合っている。ハインの力がスコール達の方へも振り分けられているため、辛うじてリノアの力がハインの力を押しとどめているといった様子だ。&lt;BR&gt;「背後！」&lt;BR&gt;　よそ見をしているスコールに、風神の鋭い警告が飛んだ。&lt;BR&gt;　はっとするスコールの手が意志にかかわらず動き、緑色の光が弾け飛ぶ。&lt;BR&gt;　スコールの背後から襲いかかろうとしていた蒼い炎が、サイファーの相手をしていた影ごとアルテマによって消し飛ばされた。&lt;BR&gt;「悪い……！」&lt;BR&gt;　短い呟きは風神とセルフィに対して。&lt;BR&gt;「どうすんだ、リノア長くは持たねぇぞ！」&lt;BR&gt;　力の押し合いを観察し、サイファーが新たに起きあがった蒼い炎をブリザガの一撃で消滅させながらスコールに叫んだ。&lt;BR&gt;（どうするって……）&lt;BR&gt;　奥歯を噛みしめながらスコールはハインを睨む。リノアを相手にしながらこちらに向ける攻撃魔法は激しさを増す一方だ。まさに化け物としか言いようがない。&lt;BR&gt;「早くなんとかしなくちゃ～！　リノア、あんなことしてたら、すぐエネルギー切れになっちゃうよ～！」&lt;BR&gt;　あんなふうに、加減も何も考えずに力を放出していたら。&lt;BR&gt;「スコール、なんとかしてハインに近づいて～！　近づくだけでいいから……！」&lt;BR&gt;　ジエンドをハインにかける。&lt;BR&gt;　打開策はそれしか思いつかなかった。&lt;BR&gt;　下手にジエンドを放って、加減を間違えて仲間まで巻き込むようなことがあってはならない。力を加減しすぎて、ハインが乗っ取っている『セルフィの身体』だけに効力が及んでしまっても意味がない。&lt;BR&gt;　確実に、セルフィの内にいる『ハイン』にジエンドをぶつける。それしかない。&lt;BR&gt;（くそっ……）&lt;BR&gt;　ガンブレードを握りしめ、スコールは歯がみした。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　同じことを、アーヴァインも危惧していた。&lt;BR&gt;「リノア！　ダメだよそんな力の使い方……！」&lt;BR&gt;　リノアから強大な魔法力が発せられるのと同時に、身をもって自分たちを庇っていたラグナを力の奔流から救い出し、荒い息をつきながらリノアを見つめてアーヴァインが声を上げる。&lt;BR&gt;　アーヴァインの声は聞こえたものの、リノアは今更どうすることもできない。全力で魔法力を放出して、ようやく押しとどめることのできる凄まじい力にまともに相対しているのだ。力負けすればリノアのみならず、背後にいるアーヴァイン、ラグナ、エルオーネ達の命もない。&lt;BR&gt;「アーヴァイン……早く、エルオーネ連れて、ここから逃げて……！」&lt;BR&gt;　今度はリノアがこの台詞を言う番だった。力を放っている両手首の感覚はすでにない。&lt;BR&gt;　急場しのぎにケアルをラグナと自分にかけたアーヴァインが、驚いてリノアを見上げた。&lt;BR&gt;「早く！」&lt;BR&gt;　叱り飛ばす勢いのリノアは、アーヴァインに視線を向ける余裕もない。限界が近いと感じ取ったアーヴァインは、唇を噛みしめエルオーネを振り返る。&lt;BR&gt;（どうする……！？）&lt;BR&gt;　エルオーネが死んでしまったら、万に一つの望みも絶たれてしまう。&lt;BR&gt;　エルオーネ自身は『接続』の維持に集中するために瞳を閉じ、ぴくりとも動かない。自力では逃げられない。&lt;BR&gt;（けれど、大統領ひとりじゃ戦えない……）&lt;BR&gt;　昔取った杵柄、なんて悠長なことが通用する相手ではない。リノアという防衛ラインを突破されてしまったら、エルオーネを連れて逃げるラグナにハインの攻撃は集中する。そうなればラグナに勝ち目はない。&lt;BR&gt;　何の役に立つかはわからずとも、護衛としてラグナと共にエルオーネを連れて逃げるべきか、当初の任務通りリノアと共にいるべきか。&lt;BR&gt;（でも、ここにいたって僕にできることは何もない……）&lt;BR&gt;　魔女ではないアーヴァインがここにいたところで、リノアが負けた瞬間に一緒に命を散らすだけである。&lt;BR&gt;　ならばここはやはりリノアの言葉に従いエルオーネを連れて逃げるべきか、と考えをまとめ、アーヴァインはラグナに視線を向けて口を開きかけ――&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　――――逃げるの？&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　ふいに脳裏に、幼い少年の声が弾けた。&lt;BR&gt;　言いかけた言葉をのみこみ、アーヴァインは背後を振り返る。&lt;BR&gt;　心の奥底まで射抜くような光を宿したサファイアブルーの瞳が、まっすぐにアーヴァインを見つめていた。&lt;BR&gt;　大きく息をのむアーヴァインに、整ってはいても強い印象を残さない面立ちの少年が、再度囁いた。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　――――また、セフィから逃げるの？&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;（…………！）&lt;BR&gt;　ぎくりとアーヴァインは身をこわばらせる。&lt;BR&gt;（また――）&lt;BR&gt;　セルフィから。&lt;BR&gt;（逃げようと…………）&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　あの日の、ように――&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;「ハイン……」&lt;BR&gt;　スコールの唇を割り、ぽつりとセルフィが呟いた。&lt;BR&gt;　小さな呟きが轟音にさらわれて消えていく。ぐっと一度息をのみ、セルフィが声をはりあげた。&lt;BR&gt;「ハインっ！！」&lt;BR&gt;　最小限の動きで身をねじったすぐ脇を、轟音あげて力の塊が突き抜ける。&lt;BR&gt;「……ねぇ、何がしたいの！？　何で忘れちゃったの！？」&lt;BR&gt;　スコールの声に、悲痛な響きを乗せてまっすぐにハインに放たれた言葉。&lt;BR&gt;　スコールにはセルフィの思考は聞こえない。けれど、ひどく悲しい気持ちは伝わってきた。&lt;BR&gt;　敵対するしかない、立場を違えてしまったハインに対する、切ない好意だけがはっきりと感じ取れた。&lt;BR&gt;（セルフィは……）&lt;BR&gt;　今もまだ、ハインに対して好意を抱いている――？&lt;BR&gt;　かすかに眉をひそめたスコールに、セルフィからの答えはない。スコールの思考を読むことのできるセルフィが沈黙しているということは、スコールの疑問を肯定しているということだ。&lt;BR&gt;　機械的に身体を動かし、攻撃魔法を避けては蒼い炎をうち倒しながらスコールは考える。&lt;BR&gt;　６年前、セルフィがジャンクションし続けていたというハイン。&lt;BR&gt;　ずっとスコールは、ハインがセルフィの不思議の力を欲しているのだと思っていた。&lt;BR&gt;　無論それは理由のひとつだっただろう。けれど、もしそれだけなら、なぜセルフィの脳が負荷に耐えきれなくなるまで彼女の中に居つづけていたのだろう？&lt;BR&gt;　セルフィが見ていた夢の中、青い小鳥の姿をしたハインとセルフィはひどく親密だった。&lt;BR&gt;　――――ハインはね、神様なんかじゃないんだよ～&lt;BR&gt;　セルフィの言葉がふとよみがえる。&lt;BR&gt;　人と同じ、この星に生まれた命のひとつにすぎないハイン。&lt;BR&gt;　この星に生きる人間が誰も知らないおとぎ話の真実を、セルフィに語ったというハイン。&lt;BR&gt;（でも……人間を憎んで、『魔女』という呪いを残した……）&lt;BR&gt;「そう」&lt;BR&gt;　ようやく、セルフィが静かに肯定した。&lt;BR&gt;　ふいに手の内に力が凝る。よくわからない内に掲げられた手から、迸ったのは純白の力。&lt;BR&gt;　避けることなく、リノアと同じに力を叩きつけることで襲い来る力を相殺し、開けた視界にセルフィがまっすぐハインを見すえて声を上げた。&lt;BR&gt;「だけど、ねぇ、魔女の呪いなんかで、人間は絶対滅びたりなんかしないんだよ！」&lt;BR&gt;　張り上げた声をうち消すように、ハインの小さな手の平から莫大な力の塊が放たれる。&lt;BR&gt;　スコールは、今までと同じようには動かなかった。セルフィの作った防御魔法でも防ぎきれない力に全身を貫かれ血がしぶいても、その場に立っていた。&lt;BR&gt;「ねぇ、ハインは、あたしの力だけがほしくてあたしの中にいたわけじゃないんでしょ！？」&lt;BR&gt;　続けて二発、連続して放たれた蒼い光は、セルフィがぶつけたホーリーが相殺した。&lt;BR&gt;　魔法力を叩きつけるだけで、自ら標的になろうかという態度のスコール・セルフィに、何をやっているのかとサイファーが顔をしかめる。今更理想的にお話し合いでもする気なのか。&lt;BR&gt;　リノアに向ける攻撃の手をいっさいゆるめないまま、ぞっとするほど冷えた蒼の瞳をハインはセルフィに向ける。&lt;BR&gt;　ハインよりも愛しい男を選び、自らの意志でその身の内に意識を移した少女の声が、怒りの感情に火を付けた。&lt;BR&gt;　６年前のあの少女はもう、どこにもいない。どこまでも純粋な思慕を向けてきたあの少女は、永遠に失われてしまったのだ。&lt;BR&gt;　それなのに。同じ姿をした少女だけが、こうして存在を続けている。死の力を持ちながら変わらず澄んだ精神を抱く彼女が、『神』とまで呼ばれたハインを惑わせる。&lt;BR&gt;　それは決して許諾することのできない現実だ。&lt;BR&gt;「なんで忘れちゃうの！？　こんな約束じゃなかったはずだよ！！」&lt;BR&gt;　蒼い光と白い光がぶつかりあい炸裂する。何度も何度も。&lt;BR&gt;「あたしがハインと約束したのは……っ！！」&lt;BR&gt;　泣き出したいほどの悲憤がスコールの脳内を占領する。&lt;BR&gt;　向けてくるハインからの激昂と殺気に負けないほどに圧倒的な、セルフィの怒り。&lt;BR&gt;「あたしが約束したのは、こんなことなんかじゃないよ……！！」&lt;BR&gt;　もっともっと、優しい約束だったはずなのに――！&lt;BR&gt;　セルフィの絶叫が、ハインの内にあった何かを引きちぎり押し流した。&lt;BR&gt;　忘れられた約束。それを嘆き悲しむのはハインの方だ。&lt;BR&gt;　一瞬すら永劫に感じるほどの６年を過ごしたハインこそが、それを叫ぶ権利があるというのに。&lt;BR&gt;　なぜ、自分は今他ならぬセルフィに詰られなければならないのだ！？&lt;BR&gt;「――――忘れたのはお前の方だろう！？」&lt;BR&gt;　憤怒に我を忘れ、怒号が空気を押し流す勢いでセルフィに放たれた。&lt;BR&gt;　今までとは比にならないほどの強大な力が腕に凝る。荒れ狂う意識に視界内が真っ赤に染まる。ハインの意識が、自分以外の男の内に留まる少女の存在ただひとりに向けられる。&lt;BR&gt;　許容できない存在となった少女をこの手で殺める、そのためだけの力を爆発的に膨れあがらせたハインを見つめ、それでもセルフィは――スコールは、動かなかった。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;「くぅ……っ」&lt;BR&gt;　身の内の魔法力がどんどん消耗してきている。&lt;BR&gt;　じりっと心の内に生まれる焦燥に唇を噛みしめ、リノアは必死で魔法力を維持し続けていた。&lt;BR&gt;　両手首から先にあった痺れは、両腕全体に及んで感覚を奪っている。限界はとっくに過ぎている。&lt;BR&gt;　けれどリノアはあきらめない。こうして自分が時間を稼げば稼ぐほど、エルオーネは安全な場所に逃げられる。今も懸命に『接続』を維持することで戦っているエルオーネの、手助けをすることができる。&lt;BR&gt;　それはセルフィと戦うことを容認することのできない、リノアなりの戦い方だ。&lt;BR&gt;（でも……どうするの？）&lt;BR&gt;　視線を光の向こうに戻し、リノアは姿を見ることのできないスコールに心の内で呼びかける。&lt;BR&gt;　どれほどリノアが時間を稼ごうと、エルオーネが限界値を超えて頑張ろうと、接続はいつか途切れてしまう。&lt;BR&gt;　それまでに、ジエンドを唱えることができるのだろうか。&lt;BR&gt;（セルフィが死んじゃうってわかっているのに……）&lt;BR&gt;　額に浮かんだ汗が頬を伝ってぽたりと落ちた。&lt;BR&gt;「！」&lt;BR&gt;　ぎくり、とリノアが大きく眼を見開く。思った以上のリノアの力の消耗に、ハインの力がぐんと膨れあがったような錯覚さえあった。&lt;BR&gt;　押さえきれない蒼い力が、リノアの叩きつける力の隙間をかいくぐり刃となって襲いかかる。&lt;BR&gt;「――――！！」&lt;BR&gt;　逃げることもできず、リノアはぎゅっと両眼を閉じ、襲い来る衝撃に身をこわばらせる。&lt;BR&gt;　どん、と鈍い衝撃があった。&lt;BR&gt;「え……！？」&lt;BR&gt;　荒っぽく誰かの腕が自分を抱きしめている。&lt;BR&gt;　一瞬後にそのことに気づき、魔法力を維持したまま恐る恐る眼を開いたリノアは、自分を抱きしめている者の姿を眼に止め、愕然と瞠目した。&lt;BR&gt;「なっ……なにやって……」&lt;BR&gt;「力をゆるめないで……！」&lt;BR&gt;　蒼い光が弾けるたびに、びくんとアーヴァインの全身が大きく跳ねる。痛みすら感じるほどきつく抱きしめられたリノアは、さながらアーヴァインを盾代わりにしながら攻撃魔法を放っている状態だった。&lt;BR&gt;「逃げろって……言ったじゃない……！！」&lt;BR&gt;　泣き出しそうな顔で叫ぶリノアに、顔も上げられないままアーヴァインが口元をかすかにゆるめた。&lt;BR&gt;「…………大、丈夫……エルオーネは……もう、避難したから…………」&lt;BR&gt;「大丈夫って……！」&lt;BR&gt;　エルオーネが避難したということは、ラグナも当然一緒なのだろう。&lt;BR&gt;　残る力を懸命に振り絞り、なんとかアーヴァインにかかる負担を軽減させようと努めながら、リノアは何故共に逃げなかったのかと訴える。&lt;BR&gt;　衝撃に舌を噛まないよう歯を食いしばっているアーヴァインは、それ以上言葉を発することができず、顔を伏せたままかすかに苦笑してリノアを抱く腕に力をこめた。&lt;BR&gt;（……また逃げるわけには……行かないよね）&lt;BR&gt;　一年前のあの日のように。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　……一年前の、あの日。&lt;BR&gt;　ガルバディアD地区収容所に投獄されてしまったスコール達の中から、リノアだけを連れ出して逃げた、あの日。&lt;BR&gt;　十年以上ぶりに再会した幼なじみ達全員を見捨てて、リノアを救い出すことを選択した、あの日。&lt;BR&gt;（見捨てたんじゃないんだ）&lt;BR&gt;　誰もがアーヴァインを覚えていなかった。孤児院にいたことすら、誰の記憶にも残っていなかった。&lt;BR&gt;　アーヴァインの記憶には今も鮮明に残る記憶。けれどそれをどうして口にできただろう？&lt;BR&gt;（僕はあの時……みんなから逃げたんだ……）&lt;BR&gt;　哀れな過去の思い出から背を向けて、逃げ出した。&lt;BR&gt;　リノアがあれほどに暴れなければ、きっとデリングシティまで帰り着いてしまっていただろう。&lt;BR&gt;（でも君は最後まで、必死でスコールについて行こうとしてたよね。僕は……逃げようとしてしまったのに）&lt;BR&gt;　十数年ぶりに再会した初恋の少女。&lt;BR&gt;　あの遠い過去の日々も、彼女の背中を追いかけて走っていた。いつか大きくなって、彼女を守れるようになりたいと、幼心に思っていた。&lt;BR&gt;　そして時が経ち、再会した彼女より自分はずっと背が高くなり、歩く速度も彼女よりずっと速くなっていて――なのに、やっぱり自分は、彼女の背中に追いつけなかった。&lt;BR&gt;　アーヴァインにとって必要ないものだったSeeDになり、それを誇りと輝かせ、誰に守られることも必要ないと、強く毅然と前だけ向いて。&lt;BR&gt;　十数年前の彼女と何も変わらない、けれど十数年前の彼女とはまったく違っていた、セルフィ。&lt;BR&gt;　だからアーヴァインは逃げようとした。彼女と真正面から向き合う勇気が持てなくて、思い出という切り札もなしに今の彼女に必要とされるだけの自信が見つからなくて、彼女から逃げた。&lt;BR&gt;　リノアのおかげで逃げ出さずにすんだ後も、結局、彼女と真正面から向き合うことはできなかった。&lt;BR&gt;　彼女はアーヴァインのずっと先をまっすぐ進んでいて、追いつくことができなかった。&lt;BR&gt;　もちろん彼女は自分の後ろにいる者のこともきちんと気にかける少女だった。好意を向けてくる相手には、好意をもって返す少女だった。――どこまでも平等に。&lt;BR&gt;　決して、誰かひとりの『特別』にはなりえない少女だった。&lt;BR&gt;　それはアーヴァインを失望させもしたが、同時に彼女が誰のものにもならないという安堵をももたらした。&lt;BR&gt;　遙か先を歩く彼女のまっすぐな視線が、何を捉えているのかも気づかずに。&lt;BR&gt;（セフィの視界内に、入ることができたのは……）&lt;BR&gt;　SeeD達の中でも唯一、彼女の隣を歩くことのできた者。&lt;BR&gt;　誰よりも不器用な、孤高の青年。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　霧のようなものが頬に吹き付けた。&lt;BR&gt;「アーヴァイン……！」&lt;BR&gt;　それが鮮血であることを知り、悲鳴のような声でリノアが名を呼ぶ。&lt;BR&gt;「もう……もうやめてよ……！　こんなのイヤだよ……！！」&lt;BR&gt;　じりじりと魔法力が減退していく。蒼い輝きが、すぐ眼の前まで迫ってきている。&lt;BR&gt;　あと数分ともたないことが、リノアにもわかっていた。&lt;BR&gt;　恐怖なのか哀しみなのか、震えわななく身体を抱きしめたまま、アーヴァインはかすむ眼をゆっくり開いた。&lt;BR&gt;「…………言っ………ただ……ろ…………？」&lt;BR&gt;　首を傾け、リノアの耳元に唇を寄せ、声を絞り出すようにして小さく囁く。&lt;BR&gt;「……僕は……僕、たちは……戦う…ことしか………できない……って……」&lt;BR&gt;「……っ」&lt;BR&gt;　見開いたままのリノアの勝気な瞳から、涙がぼろりとこぼれた。&lt;BR&gt;　ぶつかりあう魔法力が生み出す余波に、こぼれた雫はビーズのように細かに散った。&lt;BR&gt;（僕は、もう……）&lt;BR&gt;　激しい衝撃が、また背中を抉る。ぎりっと奥歯を噛みしめ声を押し殺し、リノアを抱く手にきつくきつく力を込めた。&lt;BR&gt;（もう絶対、逃げたくなんてないんだ……！！）&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　息が止まるほど強く抱きしめられたリノアは、もう、アーヴァインに制止の声をかけることができなかった。&lt;BR&gt;　ぎゅっと一度だけ両の瞳を固く閉じる。奥歯を噛みしめ、大きく息を吸い込み、全身の力を奮い起こして眼を開く。&lt;BR&gt;（負けたくない）&lt;BR&gt;　生命力さえ魔法に変えんとばかりに、リノアの放出する力がぐんと膨れあがる。&lt;BR&gt;（死なせたくないの……！）&lt;BR&gt;　リノアの決して譲れない願いが、蒼の輝きをぐっと押し返した。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　セルフィは動かなかった。&lt;BR&gt;　だからスコールも、逃げようとはしなかった。&lt;BR&gt;　思考を読むことなどできないが、セルフィがその一瞬にかけようとしていることは理解できた。消耗戦にもつれこんだ現在、不利であるのが自分たちであることを、知っていた。&lt;BR&gt;　激昂し、燃えさかる炎そのままに荒れ狂う凄まじい力がハインの手から放たれる。同時にスコールの手が動いた。&lt;BR&gt;　一撃でスコールの息の根を止めるだろう圧倒的な質量を持つ力の塊は、しかしその対象を直前で見失い、エスタ中に響き渡るかと思えるほどの轟音を発し大爆発を起こした。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;「！」&lt;BR&gt;　抵抗は、唐突に消えた。&lt;BR&gt;　全力で魔法力を放出していたリノアは、状況の変化に対応することができなかった。&lt;BR&gt;「あ……！」&lt;BR&gt;　唇から悲鳴がこぼれる。&lt;BR&gt;　一撃に全力をつくしてしまったハインに、容赦なくリノアの全開の力が襲いかかった。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　エスタの大統領官邸の上層が吹き飛んだ。&lt;BR&gt;　科学と魔法を駆使して作られた堅牢なシステムによって守られていなければ、恐らく官邸すべてを吹き飛ばしていてもおかしくないほどの、それは凄まじい爆発だった。&lt;BR&gt;　２階分ほど床が崩れ、戦闘の場にいた全員が瓦礫と共に落下し、床に叩きつけられる。爆発の直前にそれを予想しパンデモニウムの能力を用いてその場を飛び逃げていた者と、その場からいち早く脱出を試みていた者をのぞいて。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;「…………なんてこった…………！」&lt;BR&gt;　エルオーネを抱きかかえ、ようやくBブロック――戦闘区域から抜けたばかりのラグナは、間一髪惨事を免れ、呆然と愛娘を抱いたまま轟音と共に崩れていく様を見つめていた。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　その爆発にはもちろん、自ら死に急ぐようなスコールとセルフィに焦れて駆け寄っていたサイファーも、否応なしに巻き込まれていた。&lt;BR&gt;　物凄い衝撃に左半身が吹き飛ばされ、意識がぶつりと途切れた。&lt;BR&gt;　爆風にあおられ宙を舞ってから２階分の距離を落下し地面に叩きつけられる。激しい衝撃と激痛に、空白化した意識が一気に引き戻された。&lt;BR&gt;　気も狂わんほどの激痛に、呻き声を噛み殺しながらサイファーは眼をうっすらと開け、懸命に状況を確認する。&lt;BR&gt;　同じように少し離れた場所に吹き飛ばされていた風神が、よろよろと身を起こしていた。&lt;BR&gt;　そして。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　怒りのあまり、その瞬間リノアの存在を完全に失念していたハインは、リノアの力をまともに受けた。&lt;BR&gt;　加減など知らない、ただただ純然に力を叩きつけることしか知らないリノアの力は、それゆえにまともに受けた際の衝撃は予想以上のものがあった。&lt;BR&gt;「……！」&lt;BR&gt;　しかし、そこは魔女の始祖ハインである。遠い昔にほんの一部力を分け与えただけの魔女の力ごときで、命を奪われたりするはずはない。&lt;BR&gt;　ダメージは負ったものの、すぐさま立ち直りその場から飛び逃げる。セルフィを傷つけたいわけではないリノアは、そのハインを追って攻撃を続けたりはしなかった。&lt;BR&gt;　しかし、そのリノアの力から逃れるための動きは、ハインに致命的な隙を与えていた。&lt;BR&gt;　頭上に突如現れた凄まじい殺気に、顔を上げた時にはすでに遅かった。&lt;BR&gt;　烈風を利用して空に留まり、大上段にガンブレードを構え、全身から流れる血などものともせず、悲痛な眼差しでハインを見下ろす、スコールの姿がそこにあった。&lt;BR&gt;「！！」&lt;BR&gt;　蒼い瞳が驚愕に大きく見開かれる。&lt;BR&gt;　最後に残った躊躇を振り捨て、スコールは残った力のすべてをかき集めガンブレードを振り下ろした。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　受け止めた衝撃を殺しきれず、華奢な身体が吹き飛ばされ、瓦礫の山の中に突っ込んだ。&lt;BR&gt;（……セルフィ……！）&lt;BR&gt;　蒼い瞳を閉じたその姿に、振り捨てたはずの躊躇がよぎる。しかしスコールの意志とは関わりなく動いた腕は、かけらほどのためらいも見せなかった。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　――――バイバイだね、スコール&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;「ジエンド！」&lt;BR&gt;　高らかに、死を与える絶対の魔法が唱えられた。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　――――…………ありがとう…………&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　びくんと大きく震え、エルオーネが眼を見開いた。&lt;BR&gt;「エル……！」&lt;BR&gt;　覚醒を感じ取り、ラグナが慌てて抱いていたエルオーネを床に下ろす。&lt;BR&gt;「大丈夫か？」&lt;BR&gt;　たずねたラグナに頷き、エルオーネは振り返りスコール達がいるだろう方向へと眼をこらす。&lt;BR&gt;　こうして自分が眼を覚ました、『接続』が切れたということは――。&lt;BR&gt;「セルフィ……スコール……！」&lt;BR&gt;　夜着の上にかけたアーヴァインのコートをぎゅっと握りしめ、エルオーネが祈りをこめて呟いた。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　花嵐が、吹き上がりはじめた。&lt;BR&gt;&lt;BR&gt;&lt;/SPAN&gt;

<script data-viewer-zoom-script>
(() => {
  const stage = document.querySelector('.viewer-stage-image');
  const image = stage ? stage.querySelector('.viewer-image') : null;
  if (!stage || !image) {
    return;
  }

  const setZoom = (enabled) => {
    stage.classList.toggle('is-zoomed', enabled);
    image.setAttribute('aria-pressed', enabled ? 'true' : 'false');
    if (enabled) {
      const naturalWidth = image.naturalWidth || image.clientWidth || 0;
      const targetWidth = naturalWidth > 0
        ? Math.max(naturalWidth, Math.min(Math.round(stage.clientWidth * 0.92), naturalWidth * 4))
        : Math.round(stage.clientWidth * 0.92);
      image.style.width = `${targetWidth}px`;
      image.style.maxWidth = 'none';
      image.style.maxHeight = 'none';
      requestAnimationFrame(() => {
        stage.scrollTop = 0;
        stage.scrollLeft = Math.max(0, Math.round((image.scrollWidth - stage.clientWidth) / 2));
      });
    } else {
      image.style.removeProperty('width');
      image.style.removeProperty('max-width');
      image.style.removeProperty('max-height');
      stage.scrollTop = 0;
      stage.scrollLeft = 0;
    }
  };

  const toggleZoom = () => {
    setZoom(!stage.classList.contains('is-zoomed'));
  };

  image.setAttribute('tabindex', '0');
  image.setAttribute('role', 'button');
  image.setAttribute('aria-label', '逕ｻ蜒上ｒ諡｡螟ｧ縺ｾ縺溘・邵ｮ蟆・);
  image.setAttribute('aria-pressed', 'false');

  image.addEventListener('click', toggleZoom);
  image.addEventListener('keydown', (event) => {
    if (event.key === 'Enter' || event.key === ' ') {
      event.preventDefault();
      toggleZoom();
    }
  });

  stage.addEventListener('click', (event) => {
    if (event.target === stage && stage.classList.contains('is-zoomed')) {
      setZoom(false);
    }
  });

  window.addEventListener('keydown', (event) => {
    if (event.key === 'Escape' && stage.classList.contains('is-zoomed')) {
      setZoom(false);
    }
  });
})();
</script>
