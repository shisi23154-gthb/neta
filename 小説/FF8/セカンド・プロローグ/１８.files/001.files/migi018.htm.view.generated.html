      width=537&gt;&lt;SPAN&gt;&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;『接続』が切れてしまった。&lt;BR&gt;　自らが創り上げた世界にただひとり、セルフィは残された。&lt;BR&gt;&lt;BR&gt;「……スコール……？」&lt;BR&gt;　呆然とセルフィは呟く。いくら見渡しても、そこには月の光受け咲く花が揺れるばかり。&lt;BR&gt;「スコール！？」&lt;BR&gt;　悲鳴のような声をあげ、セルフィは夢中でその場を走り出す。&lt;BR&gt;　陽光色の花たちに背を向け、茂みを抜け、花畑を見、孤児院をのぞき、さらにそこからどんどん走る。&lt;BR&gt;「スコールっ！！」&lt;BR&gt;　いないことは理解していたが、胸に迫る不安に押しつぶされそうで、懸命にセルフィは叫んだ。&lt;BR&gt;　夢中で走り回るセルフィの胸の上でグリーヴァが揺れ、銀鎖が涼しげな音を立てる。&lt;BR&gt;　その音がひどく耳障りで、セルフィは銀鎖をぐっと片手でつかみ止めた。&lt;BR&gt;　どこまでも精緻なその世界、しかしガーデンにもどこにも、スコールの姿は見えなかった。&lt;BR&gt;　帰れると頷いてしまったのに、胸の奥底から巨大な不安がふくれあがって、押しつぶされそうになる。&lt;BR&gt;「わかんないよ～……」&lt;BR&gt;　呟いた瞬間、涙がぼろっとあふれて落ちた。&lt;BR&gt;「どうやって戻ればいいのかわかんないよ……！」&lt;BR&gt;　涙をぬぐってぐるりと世界を見回す。一点の綻びさえ見つけられない完璧な世界。&lt;BR&gt;（いらない）&lt;BR&gt;　懸命に泣くのをこらえながら、セルフィは小さく首を横に振った。&lt;BR&gt;（スコールのいない世界なんていらない）&lt;BR&gt;　大切な、大切な、たったひとりの存在のない世界なんて意味がない。&lt;BR&gt;「必要ないよ……！」&lt;BR&gt;　きっと眼の前に広がる世界を睨み付け、セルフィが叫んだ、その瞬間。&lt;BR&gt;&lt;BR&gt;　ぱりん&lt;BR&gt;&lt;BR&gt;　脆いガラスが砕けるような音が、世界のどこかで響いた。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　眼を開いて、最初に見えたのはゼルの顔だった。&lt;BR&gt;「…………」&lt;BR&gt;　ぼんやりとゼルの頬に刻まれた刺青を眺めていると、急にゼルが怒った顔になった。&lt;BR&gt;「だーもう！　お前、いきなり意識飛ばしたりすんじゃねーよ！　びっくりするだろ～！？」&lt;BR&gt;　話している途中で倒れられ、心臓が止まるほど驚いたゼルに怒鳴られ、スコールはようやく周囲の状況を認識した。&lt;BR&gt;「ああ……悪い……」&lt;BR&gt;　のろのろと身を起こす。ゼルがおたおたとスコールに手を貸した。&lt;BR&gt;「……セルフィを捜してた」&lt;BR&gt;「え？」&lt;BR&gt;　ゼルが首をかしげ、意味をはかりかねたような顔でスコールを見た。&lt;BR&gt;「……会えたのか？」&lt;BR&gt;　それ以上を語ろうとしないスコールに、とりあえず訊ねる。&lt;BR&gt;　スコールは小さく頷いた。&lt;BR&gt;「でも……戻る手助けは俺にはできない」&lt;BR&gt;　接続が切れる瞬間の、あの不安に揺れる瞳を思い返し、スコールはかすかに表情を曇らせる。&lt;BR&gt;　あの世界を自分の精神世界だと認識すらできていなかった彼女に、果たして目覚めることが可能なのだろうか。&lt;BR&gt;　考え込むスコールに、事情は半分も理解できていなかったが、ゼルは肩をすくめて口を開いた。&lt;BR&gt;「なんかよくわからねーけどよ……お前がやれることを全部やったんなら、あとは信じて待つだけだろ」&lt;BR&gt;「…………」&lt;BR&gt;　無言でスコールが瞳をめぐらせる。群青色の瞳を受け止め、ゼルはにっと明るく笑ってみせた。&lt;BR&gt;「セルフィは絶対に、最後まであきらめたりしねー奴だよ。どんな場所からだって、絶対帰ってくるって！　な？」&lt;BR&gt;　誰もがあきらめてしまう状況下であっても、セルフィは決して絶望したりはしない。&lt;BR&gt;　一年前、爆発するミサイル基地から彼女と共に生還したゼルはそれを知っている。&lt;BR&gt;　セルフィがあきらめずに頑張っているのに、待つ自分たちがあきらめてしまってはならないと諭すゼルに、スコールは小さく笑んで頷いた。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　破裂音が響いた瞬間、世界はその形を一瞬にして失った。&lt;BR&gt;「え……？」&lt;BR&gt;　呆然と眼を見開くセルフィの声は、すうっと闇の中に吸い込まれて消えてしまう。&lt;BR&gt;　あたりを見回しても、闇に包まれ何も見えない。眼の前に持ち上げた手のひらすら視界に映らない。&lt;BR&gt;「なに～……？」&lt;BR&gt;　急に恐怖が立ち上り、鼓動を早めながらセルフィは必死に自分を保つようつとめながら闇の中眼をこらした。&lt;BR&gt;　世界などいらないと叫んだセルフィが創り出した、『何もない世界』。&lt;BR&gt;「ちがうよぉ……」&lt;BR&gt;　こんな恐ろしくて寂しい場所に来たい訳ではない。&lt;BR&gt;　一体何をどう望めば良いのかわからず、途方に暮れてセルフィは闇の中ずるりと座り込んだ。&lt;BR&gt;（スコール……）&lt;BR&gt;　頭に浮かぶのはただひとりの姿だけ。&lt;BR&gt;　思い出したように手を動かし、見えない胸元をそっとまさぐる。かけられた銀鎖の感触はすぐに見つかった。&lt;BR&gt;（スコール）&lt;BR&gt;　呟くと、また涙がこぼれる。&lt;BR&gt;　座り込んだまま悄然とうつむくセルフィの髪に、その時ふいに、誰かの手が触れた。&lt;BR&gt;「……！？」&lt;BR&gt;　心臓が破裂しそうに驚き、反射的にセルフィは顔を上げる。&lt;BR&gt;　何も見えない闇の中、まるでそれ自体が発光しているかのように淡く闇に浮かび上がるようにして、セルフィの前に青年が立っていた。&lt;BR&gt;　彫像のように整った容貌。形の良い眉の間に刻まれた稲妻形の傷。&lt;BR&gt;　癖のない焦茶の長い前髪の下に輝く群青の瞳が、静かにセルフィを見下ろしている。&lt;BR&gt;　眼にしたものが信じられず、翠の瞳を見開いたまま凝固したセルフィに、精悍な頬をちょっとゆるめて青年が笑った。&lt;BR&gt;「……どうした、セルフィ？」&lt;BR&gt;　不器用そうなその笑顔も、ぎこちなく伸ばされ頬に触れる指先も、全部見知ったもの。&lt;BR&gt;　セルフィの大好きな――&lt;BR&gt;（ちがう）&lt;BR&gt;　食い入るように眼の前の『スコール』を見つめながら、セルフィはかすかにかぶりを振った。&lt;BR&gt;（ちがう、ちがうちがうちがう……）&lt;BR&gt;　これはセルフィの好きな『スコール』ではない。&lt;BR&gt;　望む心が創りだした、ただの幻影。ただの夢。&lt;BR&gt;「……ちがうよ」&lt;BR&gt;　現実とまったく変わらない、夢の中のスコール。&lt;BR&gt;　セルフィだけを見て、セルフィだけに触れてくれる、セルフィだけのスコール。&lt;BR&gt;　それは確かに、セルフィが心の奥底でずっと望んでいた『特別』だったのかもしれない。&lt;BR&gt;「でもね……ちがうんだよ」&lt;BR&gt;　セルフィの本当の望みとは違う。&lt;BR&gt;　叶わないと無意識にあきらめてしまった、大切な望みとは違う。&lt;BR&gt;「こんな夢は……いらないんだよ」&lt;BR&gt;　ひとつまばたきをする。新しい涙が頬にこぼれた。&lt;BR&gt;　泣いていいのは『本当のスコール』の前でだけ。だからセルフィはそれ以上の涙を懸命にこらえ、小さく笑った。&lt;BR&gt;「こんな夢が、ほしいんじゃないんだよ～」&lt;BR&gt;　眼の前の『スコール』は静かにセルフィを見つめている。&lt;BR&gt;　眼に力をこめ、セルフィはさらに強く笑った。&lt;BR&gt;　認めるのが怖くて眼をそらしていた、ただひとつの譲れない夢。&lt;BR&gt;　叶わないとはじめからあきらめた、けれど消すことのできなかった望み。&lt;BR&gt;&lt;BR&gt;　――――どんなに叶わないように見えても、全力で望んでみろ。それはきっと、無駄にはならない……！&lt;BR&gt;&lt;BR&gt;「……スコールに会いたい」&lt;BR&gt;　すっと眼を閉ざし、セルフィは囁くように望みを口にする。&lt;BR&gt;「ホントにホントの、あたしがだ～いすきな、スコールに会いたいの。スコールの傍にいたいの」&lt;BR&gt;　あの不器用で孤高の魂を抱いた、彼に。&lt;BR&gt;　一気に言いきり、セルフィはゆっくりと眼を見開き、眼の前にいる『スコール』ににこりと笑った。&lt;BR&gt;「叶うかもしれないし、叶わないかもしれない。でも、叶わなくたって、あたしはホントのスコールしかいらないんだよ」&lt;BR&gt;　いつだって、あの背中に憧れていた。&lt;BR&gt;　セルフィのことなんて振り返りもせずにひとりで進んで行ってしまう背中と、リノアにだけ微笑みかける端整な横顔をいつも見つめていた。&lt;BR&gt;　それでかまわないと、思っていた。&lt;BR&gt;　幼い約束に縛られた想いではなく、すべてを忘れてまっさらな状態で出会って、そして好きになった人。&lt;BR&gt;　はじめからあきらめたはずの、けれど消えることなくセルフィの中でひっそりと息づいていた想い。&lt;BR&gt;「約束とかは関係ないの。あたしのこと振り返ってくれなくてもいいの。&lt;BR&gt;　あたしに背中ばっかり向けてても、リノアのことしか見てなくっても……スコールがあたしを好きでなくたって、あたしはスコールが大好きなんだぁ～」&lt;BR&gt;　どれほどセルフィの望む通りの愛を注いでくれる存在でも、それが本物の彼でなければ意味がない。&lt;BR&gt;　大きく息を吸い込み、セルフィは眼に力をこめて、幻影のスコールを見すえ、きっぱりと告げた。&lt;BR&gt;「だからあなたもいらない」&lt;BR&gt;　強く微笑んだまま、頬に触れる手を突き放す。&lt;BR&gt;　眼の前の『スコール』が、驚愕の眼差しで払われた手を、セルフィを見つめて。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　世界の色がまた、ふいに変わった。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　座り込んだまま、セルフィは真っ白な世界にいた。&lt;BR&gt;　眼の前にいたはずの『スコール』は消え去り、代わりに蒼い光の塊がぽかんと浮かんでいた。&lt;BR&gt;「…………ハイン？」&lt;BR&gt;　見覚えのあるそれに、セルフィが驚き声をあげる。&lt;BR&gt;　はじめて出会った頃の、ハインだった。&lt;BR&gt;　白い白い雪原に突如セルフィの前へと現れた、あの日のハインと同じだった。&lt;BR&gt;　姿も何もない、ただ蒼い光が凝っただけの。そこに生命を宿しただけの。&lt;BR&gt;『――いつか』&lt;BR&gt;　セルフィの呼びかけを無視するように、ゆるやかに空間にハインの声が響いた。&lt;BR&gt;　幼いセルフィがずっとずっと聞いていた声。セルフィの声を利用するのではない、本当の『ハイン』の声。&lt;BR&gt;『お前が見つける時のために、私の力を残しておこう』&lt;BR&gt;　やわらかなその声は、６年前のあの日々、セルフィの中からいつも聞こえていた優しい響きを持っていた。&lt;BR&gt;　そしてセルフィは認識する。――これは、ハインの残した最後のメッセージなのだと。&lt;BR&gt;　ハインという存在はもうこの世から消えてしまったのだから。&lt;BR&gt;『それが私とお前の契約であったのだから、好きに使うがいい』&lt;BR&gt;　セルフィの傍にいて、セルフィに力を貸す――それが６年前の、出会った時に交わされた契約だった。&lt;BR&gt;『お前は契約を忘れたが、お前との約束を忘却したのは私も同じだ。&lt;BR&gt;　お前は私を選ばなかったが、約束は果たされた』&lt;BR&gt;　あの陽光色の花の中で――。&lt;BR&gt;『なれば私も、お前との契約を全うせねばなるまい』&lt;BR&gt;「…………」&lt;BR&gt;　座り込んでいたセルフィは、声を聞きながらよろりと立ち上がった。&lt;BR&gt;　視線の高さに、蒼い光がゆらめいている。&lt;BR&gt;『過去に私が残した呪いの残滓は未来においてお前自身が断ち切った。&lt;BR&gt;　お前に与えるこの力はお前だけの力だ。彼方の未来に私の痕跡が残ることはないだろう』&lt;BR&gt;「……ホントの、おとぎ話になるんだね～」&lt;BR&gt;　かすかに眼を細めてセルフィが微笑む。&lt;BR&gt;　魔女はアルティミシアを最後の代にして滅びる未来にある。セルフィに渡された力は、誰に継承されるものでもなくセルフィの生命がつきると共に消滅するとハイン自身が断言するなら、アルティミシアの未来より先に、ハインの力は断片にも残らないということになる。&lt;BR&gt;　そしていつかおとぎ話になる。遠い遠い昔、ハインという存在がいたことも、魔女と呼ばれる存在があったことも。&lt;BR&gt;『……お前の最後の問いに、私は返す答えを持たないが……』&lt;BR&gt;　ゆらゆらと続いていた声が、そこでふっと一度止まった。&lt;BR&gt;　わずかな沈黙。&lt;BR&gt;　やがて、ゆっくりと言葉が続いた。&lt;BR&gt;『お前に会えて良かったと思う』&lt;BR&gt;　セルフィがふと眼を見はる。&lt;BR&gt;　懐かしい思い出のひとつひとつが一斉に心によみがえる。胸が震えた。&lt;BR&gt;『……これをひとつの回答と見なすならば、それはお前にとって真実であるのだろう』&lt;BR&gt;　それが残された最後の言葉だった。&lt;BR&gt;　蒼い光がゆらゆらと輝いている。&lt;BR&gt;　しばらくの間その光を見つめていたセルフィは、やがてそれがすべての言葉だと悟り、かすかに微笑んだ。&lt;BR&gt;　細い腕をそっと伸ばす。蒼い光が輝きをいっそう強めた。&lt;BR&gt;「ハイン……」&lt;BR&gt;　手のひらの上で光は凝縮し、やがてセルフィの小さな手に収まるくらいの大きさになる。&lt;BR&gt;　内に莫大な力と意思を内包し、結晶化する。&lt;BR&gt;　どこまでも蒼く透明なクリスタルに姿を変えた光を、セルフィは両手に包んでそっと抱きしめた。&lt;BR&gt;「……うん……そうだね……」&lt;BR&gt;　そこにこめられた想いを受け取り、セルフィは眼を閉じ小さく笑う。&lt;BR&gt;「そうだね……会えて、よかった」&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　蒼く輝くクリスタルを両手に捧げ持ち、セルフィはすうっと大きく息を吸い込んだ。&lt;BR&gt;（帰らなきゃ……）&lt;BR&gt;　ここは意識の海の最下層。ハインを宿した負荷とジエンドの影響で、セルフィの意識は表層に上がれない状態になっている。&lt;BR&gt;　奇跡を起こす強大な力は今、セルフィの手の内にある。ハインが遺してくれた、力の遺産がここにある。&lt;BR&gt;　あとはセルフィ自身が、帰る道を見つけだせばいい。&lt;BR&gt;（……スコール）&lt;BR&gt;　大切な面影を思い描き、セルフィはきっと眼を大きく見開いた。&lt;BR&gt;　何より大切な、たったひとつの願い。叶わないと思いこんでもなお、手放すことのできなかった想い。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　――――スコールに会いたい&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　セルフィの手の内で、奇跡に等しい強大な力が解放された。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　力の気配を感じ、エルオーネがはっと振り向いた瞬間、それは起こった。&lt;BR&gt;　ベッドの上で眠り続けていたセルフィを中心に、蒼い輝きが一瞬でドーム上に膨れあがり部屋を満たした。&lt;BR&gt;（――……！？）&lt;BR&gt;　この蒼い力は、忘れることなどできないハインの力だ。&lt;BR&gt;　消滅したはずなのに、なぜこんな力が突然発現するのか――&lt;BR&gt;　激しい驚愕に眼を見開くエルオーネの前で、セルフィの細い腕や頭、胸にとりつけられていた様々な管がいっせいに弾け飛んだ。&lt;BR&gt;　光の奔流にあおられる髪が、幼さを残す頬の上で激しく揺れる。その陰に隠れるようにして、長い睫毛が震えた。&lt;BR&gt;「…………！！」&lt;BR&gt;　ゆっくりと、光の中、セルフィの瞼が震えるようにして持ち上げられた。&lt;BR&gt;　光に満たされた部屋の天井を見つめる瞳は、翠色。&lt;BR&gt;「セル……」&lt;BR&gt;　名を呼びかけるエルオーネの声に気づかないように、セルフィは一度緩慢にまばたきをし。&lt;BR&gt;　ふいにその姿を消した。&lt;BR&gt;「え……！？」&lt;BR&gt;　セルフィの姿がかき消えた瞬間、部屋を満たしていた蒼い光が悪夢のように消え失せる。&lt;BR&gt;　病室に立ちつくし、エルオーネはただただ呆然と、セルフィが眠っていたはずの空のベッドを見つめていた。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　ゼルに促されるように、ベッドに身を沈めようとしていたスコールは、突然肌に強大な力を感じてぎょっと眼を見開いた。&lt;BR&gt;「な、何だ……！？」&lt;BR&gt;　優れた兵士であるゼルも同時に察知し、緊張を顔に浮かべて病室の扉を見る。力の奔流を感じたのは、廊下の方――。&lt;BR&gt;「……スコール！」&lt;BR&gt;　見に行こうかとした矢先、スコールが無言でベッドから降りようとしはじめたのを眼に留め、ゼルが慌てて大声を上げた。&lt;BR&gt;「何やってんだよ！　オレが外見てくるから、お前は大人しく――」&lt;BR&gt;「俺じゃなきゃだめだ」&lt;BR&gt;　止めようとするゼルの腕を振り払い、スコールは奥歯を噛みしめ気合いを入れて床に降り立った。&lt;BR&gt;　感じた力はハインのものだった。ハインはもう消滅しているはずだが、間違えようがない。&lt;BR&gt;　ハインの力を使ったのが誰であるかは明白だった。&lt;BR&gt;　奥歯に力をこめながら、スコールはよろめくように足を踏み出す。&lt;BR&gt;　鬼気迫るその様子に、ゼルはかける言葉を失いその場に立ちすくんだ。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;「いった～～」&lt;BR&gt;　どさりと廊下の上に落ち、したたかに背中を打ったセルフィは思わず悲鳴をあげた。&lt;BR&gt;　涙目になって背中をさすりつつ、セルフィは自分がいる場所をぐるりと見回す。&lt;BR&gt;　夢の中でのスコールの言葉が真実なら、ここは恐らくセルフィの入院しているというエスタ国立病院のはずだ。&lt;BR&gt;「スコールは……」&lt;BR&gt;　どこにいるのだろう。彼もまたここに入院しているのだろうか。&lt;BR&gt;　ジエンドに巻き込んでしまったことを思い出し、かすかに表情を曇らせながら、セルフィはよいしょと立ち上がり――歩き出そうとして、そのまま転んだ。&lt;BR&gt;「んきゃっ」&lt;BR&gt;　受け身をとったつもりだったが、なぜかまともに転び全身に痛みが走る。&lt;BR&gt;「な、なんで～？」&lt;BR&gt;　驚いて自分の身体を見下ろしてみる。エスタ独特のデザインをもった検査着の丈は確かに長かったが、こんなものに足をとられて転ぶようなことはありえない。&lt;BR&gt;　それでも一応と、裾を握って引き裂こうとしたが、どうしたことか手先も思ったとおりに動かなかった。&lt;BR&gt;　もちろん四肢に残る麻痺はジエンドの後遺症なのだが、何しろジエンドで生還した者が過去にいなかったため、セルフィには何がなんだかわからない状況だった。自分の身体が言うことを聞かない。&lt;BR&gt;　長い時間をかけ、どうにか裾をたくしあげて結び、セルフィは唇を噛みしめ、壁にすがるようにしてもう一度立ち上がる。ハインの力を使って細かくスコールの居場所を探って移動することも、不可能ではないのかもしれないが、セルフィはそうする気にはならなかった。&lt;BR&gt;　スコールだって、セルフィの精神世界でちゃんと自分を捜し出してくれたのだ。&lt;BR&gt;　セルフィも強くなって、自分の力でスコールを捜すと約束した。&lt;BR&gt;　現実世界に戻った以上、セルフィは自力で捜し出さなくてはならないのだ。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　どさりと、何度目かの転倒をした。&lt;BR&gt;　半透明な廊下に、銀鎖が当たって澄んだ音を立てる。&lt;BR&gt;「あいたた～」&lt;BR&gt;　ゆっくりと頭を振り、身体のどこも傷つけていないことを確認し、セルフィは全身に力をこめて身を起こす。&lt;BR&gt;（スコール……）&lt;BR&gt;　長い廊下をずいぶんと進んだが、同じような部屋と廊下の連続で方向感覚がそろそろなくなりかかっている。&lt;BR&gt;　本当にこちらで良かったのか、この先にスコールがいるのか、保証などどこにもない。&lt;BR&gt;　時間も場所も特定しない約束なのだから仕方のないことではあるが、もし間違えていたなら、またこの長い道のりを戻る気力があるかどうか、いささかセルフィも自信がなかった。&lt;BR&gt;　だが、もう進むしかない。ここまで来て、歩みを止めることはできない。&lt;BR&gt;　ハインの力は確かにスコールの近くにセルフィを連れてきてくれたはずだ。それを信じて進むしかない。&lt;BR&gt;（病室に連れ戻されて、スコールが来てくれるの待つなんて、絶対イヤや……！）&lt;BR&gt;　他人が聞けば笑うかもしれないが、何としても今、自分の力でスコールを捜し出さなくてはならないのだ。&lt;BR&gt;　ぐっと歯を食いしばり、気合いをこめて立ち上がると、またゆっくりと廊下を歩み進む。廊下の先はＴ字になっていた。&lt;BR&gt;　それに気づき、セルフィはちょっと困惑する。右か左か、どちらが正しい道なのかはわからない。&lt;BR&gt;　萎えた足を引きずるようにして、セルフィはようやく曲がり角にたどり着く。あがった息を整え、左の廊下に顔を向け奥を凝視した。&lt;BR&gt;　廊下はずいぶん先まで続いているように見えた。&lt;BR&gt;（間違えて、戻るの……しんどそうやなぁ……）&lt;BR&gt;　思わず溜息が口からこぼれた。無意識に胸元のグリーヴァをぎゅっと握りしめる。&lt;BR&gt;　それから右の方へと顔を向ける。どちらの道の方が短そうかを確認しようと視線をめぐらせたその先に、……&lt;BR&gt;「……あ……」&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　壁にすがりながら懸命に歩を進めているのは、スコールもまた同じだった。&lt;BR&gt;　集中治療室で眠っているはずの彼女を、なぜこんなにも必死に捜そうとしているのか。スコール自身わからないまま、それでも身体を引きずるようにして、廊下を捜し歩いていた。&lt;BR&gt;　なぜかはわからないが、彼女がすぐ近くにいるような気がしていた。&lt;BR&gt;　すぐ傍まで来て、同じように自分を捜しているのだと知っていた。&lt;BR&gt;「！」&lt;BR&gt;　ふと耳に、どさりという重い音が届いた。続いてかしゃりと軽やかに響いた硬質の音。&lt;BR&gt;　涼しげなその金属音を、スコールは確かに聞いたことがあった。&lt;BR&gt;　足を止め、振り返る。&lt;BR&gt;　自分が歩いてきた廊下、その途中にあるT字の曲がり角――その奥から、音は響いてきたようだった。&lt;BR&gt;　少しの間があり、衣擦れの音と共に重くひきずる足音がゆっくりと近づいてくる。&lt;BR&gt;　スコールと同じように歩くことにひどく難儀しているような……けれどしっかりと前に進んでいる、そんな足音。&lt;BR&gt;　鼓動が急に速くなった。急いている気持ちとは裏腹に、スコールの足はその場から一歩も動けなくなってしまう。&lt;BR&gt;　立ちつくし、曲がり角を凝視しているスコールの視線の先に、重い足取りながら、ゆっくりとその場に到着した少女が、小さなその姿を見せた。&lt;BR&gt;「…………！」&lt;BR&gt;　息をのむスコールには気づかず、壁に半身を預けながら、小さな頭をめぐらせスコールのいる側とは反対方向の廊下の奥をのぞきこんでいる。&lt;BR&gt;　エスタ独特のデザインを持つ検査着、優しい薄黄色の衣服からのぞくその手足は、ひどくか細く見えた。&lt;BR&gt;　スコールに向けているその背中も、あまりにも華奢で、小さかった。&lt;BR&gt;　けれど、ただひとつの想いを懸命に抱きしめるその背中は、あの日と何も変わらず、綺麗だった。&lt;BR&gt;　スコールが愛した、凛とした背中だった。&lt;BR&gt;「――」&lt;BR&gt;　そっと少女が小さく息をついた。静かな廊下に、その吐息はひどく良く響いた。&lt;BR&gt;　くるりと楽しげにカーブを描く明るい栗色の髪が、ふわりと揺れる。小さな頭が、ゆっくりと振り返る。&lt;BR&gt;　翠色の澄んだ瞳が、廊下に立ちつくすスコールの姿の上でぴたりと止まった。&lt;BR&gt;　驚愕に大きく瞳を見開き、小さな身体が動きを止める。&lt;BR&gt;「……あ……」&lt;BR&gt;　かすれた声が、乾いた唇を割って吐息のようにこぼれた。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　二人はそのまま、お互いの眼を見つめ合ったまま何も言えずその場に立ちつくしていた。&lt;BR&gt;　長い長い遠回りの末に、ようやく果たすことのできた約束を、ただ呆然と見つめていた。&lt;BR&gt;「…………」&lt;BR&gt;　永遠に続くかに見えたその見つめ合いから、最初に動いたのはセルフィの方だった。&lt;BR&gt;　ふらりと一歩踏み出した細い足に、スコールの意識の呪縛もようやく解ける。はっとまばたきをしたスコールの前で、二、三歩足を進めたセルフィが、どさりと床の上に転んだ。&lt;BR&gt;　また銀鎖が硬い床の上で涼しげに音を立てる。いたた、と小さく呟きながらセルフィがゆっくりと身を起こしている間に、スコールもまたふらつく足を懸命に制御しながら、ゆっくりと座り込んでいるセルフィの前に歩み寄った。&lt;BR&gt;　四肢を自由に動かせないスコールの様子に、セルフィは顔を上げ、つぶらな瞳をまるくする。&lt;BR&gt;　首を傾げているセルフィの前に、時間をかけようやく歩み寄ったスコールが、壁に手をついたまま崩れるように床に膝をついた。&lt;BR&gt;　乱れる前髪の間から、セルフィの翠の瞳をまっすぐ見つめる。&lt;BR&gt;　間違いようのない、本当に本物の、セルフィの瞳。&lt;BR&gt;「……大丈夫か？」&lt;BR&gt;　優しさを帯びた響きの良い、低い声。&lt;BR&gt;　十数年ぶりにそうと知らずにガーデンで再会したあの時と、まったく同じ言葉、同じ口調で。&lt;BR&gt;（あぁ、スコールや）&lt;BR&gt;　急にじんと胸の奥が熱くなり、セルフィは慌ててこくりと頷いた。&lt;BR&gt;　会いたくて会いたくてたまらなかった人が、眼の前にちゃんといる。すぐ傍に、群青色の瞳がこちらを見つめている。&lt;BR&gt;　あまり感情を浮かべない、けれどその奥にたくさんの気持ちの詰まった、スコールの瞳。&lt;BR&gt;「スコール……」&lt;BR&gt;　囁くように呼びかけて、セルフィはにこりと笑った。&lt;BR&gt;　大輪の花が咲きこぼれるように、曇りなくふわりと笑う。どこまでも屈託なく。&lt;BR&gt;　何度も何度も、喪うことを覚悟し続けた懐かしい笑顔が、スコールのすぐ眼の前にあった。&lt;BR&gt;「――――！」&lt;BR&gt;　バネにはじかれるように腕が伸びた。今この瞬間に腕が動くなら、他の四肢が動かなくなってもかまわなかった。&lt;BR&gt;　華奢な背中を捉え、強引に引き寄せて胸の中に抱きしめる。本当にそこにいることを確認するように、震える両腕に力をこめて、ぎゅっと強く眼を閉じた。&lt;BR&gt;　伝わる温もりと震える鼓動が、はっきりとスコールにセルフィの存在を教えている。&lt;BR&gt;　熱い熱い何かが胸の奥からせり上がって全身を満たしていく。呼吸が震えた。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;「…………おかえり……」&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　息も止まるほど強く抱きすくめられ、まばたきすら忘れて凝固していたセルフィの耳に、震える声が届いた。&lt;BR&gt;　熱い何かがセルフィの背に落ちる。&lt;BR&gt;　顔は見えなかったが、耳元に届く震える呼吸音が、すべてを伝えた。&lt;BR&gt;　見開かれた翠の瞳から、堰を切ったように涙があふれた。こらえることはできなかった。こらえようとも思わなかった。&lt;BR&gt;　萎えた手をスコールの背に回し、ぎゅっと力をこめてすがりつく。&lt;BR&gt;　頬を埋めた胸の奥から響いてくる鼓動が、はっきりとセルフィに伝えていた。&lt;BR&gt;　……ここにいると。帰ってきたのだと。&lt;BR&gt;「――――！！」&lt;BR&gt;　胸の奥底から喉へと熱い塊がこみあげてくる。一瞬で膨れあがって、破裂する。&lt;BR&gt;　気がつけば、全身すべての力を振り絞るようにして、セルフィは声を上げて泣いていた。&lt;BR&gt;　小さな小さな子供と同じように、周囲の眼など気にもせず、身も世もなく大声を上げて、泣きじゃくっていた。&lt;BR&gt;　それは十数年という時の間、ずっと溜め込んでいた涙のすべてだったのかもしれない。&lt;BR&gt;　流すことを自ら拒絶し、受け止める者もまたいなかった十数年分の涙が、しがみつくスコールの胸元にこぼれ落ちてゆくたびに、身の内を灼き焦がした何かもまた押し流されていく。&lt;BR&gt;　幼子のような号泣からしゃくり上げる泣き声に変わるに従い、きつくセルフィを抱いていた腕の力が優しくゆるむ。&lt;BR&gt;　大きな手のひらが、子供をあやすように震える背を上下するのを意識しながら、セルフィは眼を閉じ涙が止まるのをゆっくり待ち続けた。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;「……どうやって、帰ってこれた？」&lt;BR&gt;　頭上から静かな低い声が降ってきた。&lt;BR&gt;　壁に背を預け、冷たい半透明の廊下に座るスコールの腕の中で、かすかに小首を傾げるようにしてセルフィはスコールの顔を見上げる。&lt;BR&gt;　幼い頃から変わることのない可愛らしいその癖を、スコールは少し眼を細めて見守った。&lt;BR&gt;「……ハインがね」&lt;BR&gt;　まだ少しかすれた声で、セルフィはゆっくり口を開く。泣きすぎて真っ赤な瞳が、にこりと笑んだ。&lt;BR&gt;　膝の上に置いた手のひらを上向けると、そこにふわりと蒼い光が宿った。&lt;BR&gt;「ハインが、力をあたしに、残してくれたんだ～」&lt;BR&gt;　驚愕の眼差しでセルフィの両手のひらを凝視するスコールに、セルフィは小さく笑ってみせる。&lt;BR&gt;　ハインが使っていた時はただ恐ろしく見えただけの蒼い光。けれど今見るその光は、どこかで見たことのあるような懐かしさに満ちていて。&lt;BR&gt;　同じ力なのに、セルフィが使っているというだけで何故こんなにも優しい力に見えてしまうのか、スコールは不思議でならなかった。&lt;BR&gt;「魔女の力と違って、ハインがあたしだけに残した力だって、言ってたよ～」&lt;BR&gt;　だから魔女のように力の継承は行われない。ハインがセルフィのためだけに遺した、セルフィだけの力。&lt;BR&gt;　Ｇ．Ｆ．障害を治すこともできる莫大な力を継承したセルフィを、スコールは小さく眉をひそめて見つめた。&lt;BR&gt;「……何ともないのか？」&lt;BR&gt;　多少特殊な力は持っていようと、ただの人間に過ぎないセルフィが、そんな強大な力を宿しても。&lt;BR&gt;　心配するスコールに、セルフィはにこりと笑った。&lt;BR&gt;「わかんないけど、今のとこは大丈夫だよ～。ちょっと身体がうまく動かないくらいだから～」&lt;BR&gt;　あ、でもこれが副作用なのかな～？　とセルフィが今さらながらに首を傾げる。スコールはくすりと苦笑した。&lt;BR&gt;「それはジエンドの後遺症だ。麻痺が残っているだけらしい。治らない訳じゃないらしいから心配するな」&lt;BR&gt;「……だから、スコールも動けないの？」&lt;BR&gt;　壁にとりすがるようにしてこの場所に現れたスコールの様子を思い出し、表情を曇らせてセルフィが顔をのぞき込む。&lt;BR&gt;　原因が自分の力だなどとわかって、冷静でいられるはずもない。&lt;BR&gt;　嘘を言う訳にもいかず、ちょっとためらって頷いたスコールに、セルフィは申し訳なさそうな顔になった。&lt;BR&gt;「ごめんねぇ……」&lt;BR&gt;　あの時、ハインの入った自分の身体に戻ったことを後悔している訳ではないが、ジエンドにスコールを巻き込んでしまったことは、やはり申し訳なくてならない。&lt;BR&gt;　しょんぼりとしてしまったセルフィに、スコールが少しだけ困った顔になり、胸元に当たる明るい栗色の髪をなでた。&lt;BR&gt;「……気にするな。あんたのせいじゃない」&lt;BR&gt;　不可抗力で巻き込まれた訳ではなく、自分から飛び込んだのだから。&lt;BR&gt;　言葉足らずのスコールの真意が伝わったのかどうかは定かではないが、セルフィは無言で小さく頷き眼を伏せる。&lt;BR&gt;　伏せた視線の先に、まだ蒼く力宿る自分の手のひらを見て、ふっと何かを思いついたように翠の瞳を見開き、スコールの腕から身を起こした。&lt;BR&gt;　ケアルではあくまでも『傷』を癒すことしかできない。手足の麻痺や病気などを治す力はケアルにはない。&lt;BR&gt;　けれど、セルフィのＧ．Ｆ．障害を治したこの力なら――？&lt;BR&gt;「！」&lt;BR&gt;　ふいに輝きを増したセルフィの両手に、スコールがぎょっと眼を見開く。&lt;BR&gt;　精神世界の中と同じように、蒼い光が凝ってセルフィの小さな手の上で輝く透明なクリスタルに変化する。&lt;BR&gt;　蒼く輝く力が空気の渦を起こし、光を受けて金茶に輝くセルフィの髪が煽られてぶわりと舞った。&lt;BR&gt;　眼の高さにまで蒼いクリスタルを掲げたセルフィは、一度スコールに視線を向けてにこりと笑い、それからゆっくりと翠の瞳を閉じる。&lt;BR&gt;　蒼いクリスタルを通じて、すぐ傍にいるスコールの消耗度や四肢に残る麻痺、それから同じ病院内にいるたくさんの患者達の身体の不調などがセルフィに伝わってくる。もっと感覚を広げれば広げるほど、身体に不調を感じているエスタ中の人々の存在の情報が次々に飛び込んできた。&lt;BR&gt;　どの人も、今回のハインの暴走で怪我をしたり、その後遺症に苦しんでいる人ばかりだ。国中が混乱に陥っているため、本来ならケアルで治るような簡単な怪我でさえ、癒されずに放置されている人もいる。&lt;BR&gt;　ツキンと胸に走る痛みを感じながら、セルフィは大きく息を吸う。&lt;BR&gt;　強く望めばいい。全力で望めば、それは決して無駄にならない。セルフィにはもうそれがわかっていた。&lt;BR&gt;　――――たったひとりの大切な人を、そしてたくさんの、顔の知らない人達を――――&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　セルフィの掲げる蒼いクリスタルを中心にして、蒼い光がドーム状に膨れあがり、一瞬にして病院からエスタ全土へと広がり空気のすべてを蒼く包んだ。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　視界内が一瞬にして蒼に染まり、眼を射るわけではないが光以外何も見えなくなったスコールは、わずかに腕を上げて顔をかばう体勢で凝固した。&lt;BR&gt;　手ですくえば指先に光の粒子を感じることができるのではないかと思えるほど、しっとりとした質量を持つ蒼い光が身体を包み、溶け込み、癒していく。重い鉛のようだった四肢が一瞬ごとに軽くなっていく。まるで身体の中のすべてが新しいものに取り替えられていくような、そんな新鮮な感覚があった。&lt;BR&gt;（こんな……）&lt;BR&gt;　すさまじい治癒の力を目の当たりにし、スコールは呆然と眼の前のセルフィに視線を向ける。蒼い光の中心点にいる彼女の姿は、すぐ傍にいるはずのスコールにも見えなかった。&lt;BR&gt;　音もなく空気を染め上げる蒼い光。&lt;BR&gt;　ハインの使う恐ろしい力とまったく同質のものであるはずなのに、スコールを包むそれはひどく優しかった。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　エスタ国立病院から、エスタ全土まで広がった蒼い光は、傷つき病んだ人々の身体を包み、痛みを拭い、傷を癒し、すさんだ心をうるおした。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;（あぁ、そうか……）&lt;BR&gt;　不思議な既視感を覚えていたスコールは、眼を細めて蒼い光を見つめながら、ようやく記憶を探り当てる。&lt;BR&gt;　この深い蒼を、確かに昔、見たことがあった。&lt;BR&gt;　一年前、セルフィと共に、ルナサイドベースで――――……&lt;BR&gt;&lt;BR&gt;（星の色だ）&lt;BR&gt;&lt;BR&gt;　スコール達が生を受けた、この星の、色。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　ゆっくりと、光がおさまりはじめた。&lt;BR&gt;　光の中心にいた華奢な姿が、ようやく視界内に捉えられるようになる。&lt;BR&gt;　掲げていた手のひらの上に浮かんでいた蒼いクリスタルが、光の粒子にほどけて消えた。&lt;BR&gt;　光の余韻残るその空気の中、セルフィの翠の瞳がゆっくり開かれる。&lt;BR&gt;　まるでおとぎ話の妖精のように、それはひどく現実感を欠いていて、言葉をかけることもできずにいるスコールの視線の先で、セルフィが静かに動いた。&lt;BR&gt;　明るい栗色の髪がふわりと揺れる。&lt;BR&gt;　まるで羽を失った蝶のように、華奢な身体が冷たい床に倒れこんだ。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;「――――セルフィ！」&lt;BR&gt;　一瞬、何が起きたのかもわからず倒れるセルフィを見守ってしまったスコールが、直後に我に返って大声で叫んだ。&lt;BR&gt;　横倒しに冷たい廊下に倒れたセルフィは、スコールの大声にぴくりと肩を震わせる。&lt;BR&gt;　全身の血が一気に凍りついたような感覚を覚えながら、セルフィをのぞきこむスコールの視線の先で、睫毛を震わせてゆっくり瞼が持ち上がり、翠色の澄んだ瞳がうっとりとスコールを捉えた。&lt;BR&gt;　今にも心臓が止まりそうな表情をしているスコールを見上げ、セルフィは小さく笑う。青ざめ白く凍えたその顔は、まったく血の気を欠いていた。息があがり、苦しげに肩で呼吸を繰り返している。&lt;BR&gt;「えへへ、しっぱい……しちゃった～……」&lt;BR&gt;　受け継いだばかりの莫大な力を、まだ完全に制御できなかったと、照れたように笑うセルフィに、全身から冷汗が吹き出す思いでスコールは小さく首を横に振った。&lt;BR&gt;「おどかすな……！」&lt;BR&gt;　未だ衝撃冷めやらぬといった声音で叱られ、セルフィは小さく肩をすくめた。セルフィだって、ハインの力を使うことでこんなことになるなんて、わかってやったわけではない。――わかっていたらやらなかったかと言われれば、返す言葉もないのは事実だが。&lt;BR&gt;　ハインがセルフィの内にジャンクションされた状態であった時は、こんなふうにはならなかった。脳障害という諸刃の剣を抱えてはいるが、莫大な力を行使する際、ジャンクションしている強大な意識体は術者を護る役目も果たしているのだとスコールは納得する。負担を軽減するハインという存在がなければ、セルフィは力を行使するたび体力生命力を削らなくてはならない。&lt;BR&gt;「でも、麻痺、治ったよね～？」&lt;BR&gt;　くすりとセルフィが笑う。体力は底をついてしまったが、不快な四肢の麻痺はちゃんと消え去っていた。&lt;BR&gt;　スコールの体調を伺うセルフィに、スコールは大きく溜息をついた。麻痺が消えたどころか、スコールの方は体力まで完全復活を遂げていた。今すぐ任務について戦場に出てもいいくらいだった。&lt;BR&gt;　腕を伸ばして床にくずおれたままのセルフィの肩の下に手を入れ、ぐいと抱き起こす。&lt;BR&gt;　こんなに軽かったかと眉をひそめたくなるほど華奢な身体を、スコールは腕の中にしっかり抱き支えた。&lt;BR&gt;「無茶、するな……！」&lt;BR&gt;　叱りつけるかすれた声を耳にし、セルフィはかすかに微笑んだ。屈託のない無邪気な笑顔ではなく、どこかひどく大人びた表情でスコールを見上げ、それからゆっくり腕を上げるとスコールの首に回す。&lt;BR&gt;　自分から身を寄せてきたセルフィに、スコールが驚いて動きを止めた。&lt;BR&gt;「……無茶、したいんだよ」&lt;BR&gt;　首筋に頬を寄せ、囁くようにセルフィが言った。&lt;BR&gt;「無茶したく、なっちゃうんだよ～……だってあたしは、スコールが好きだから」&lt;BR&gt;　耳にした言葉に、スコールが眼を見開いた。驚きのあまり、息さえ忘れた。&lt;BR&gt;「スコールが誰を好きでも全然関係ないの。あたし、スコールのことが好き。これからもず～っと、大好きだよ」&lt;BR&gt;　夢の中で言えなかった言葉。&lt;BR&gt;　ずっと言いたかった言葉をようやく口にして、セルフィはちょっと顔を上げ、にこりと笑った。&lt;BR&gt;　すっかり青ざめて衰弱しきっているくせに、どこか大人びたその笑顔は変わらず明るく凛として。&lt;BR&gt;　挑むようにまっすぐ自分を見つめる翠の瞳に、スコールがかすかに苦笑を浮かべた。&lt;BR&gt;　まったく、かなわない。&lt;BR&gt;「――――」&lt;BR&gt;　コツンとセルフィの額に自分の額を押しつける。驚いて反射的に眼を閉じたセルフィの肩を抱き支えたまま、顔をずらして頬と頬を触れ合わせる。冷たく凍えてはいたが、腕の中のセルフィは確かにちゃんと生きていた。&lt;BR&gt;「それでも……無茶するな」&lt;BR&gt;　自分の熱のすべてを与えようとするかのようにセルフィを抱きすくめ、哀願するようにスコールが囁く。&lt;BR&gt;　もう失いたくない。ようやく手に入れた絶対のものを、なくしたくない。&lt;BR&gt;　深い喪失感を幾度も経験してきたスコールの切ない声に、セルフィの胸が震えた。&lt;BR&gt;　何かを失う痛手を恐れるあまりに心を閉ざし、笑い方すら忘れてしまったあの日のスコールを思い出す。&lt;BR&gt;「……ここにいるよ」&lt;BR&gt;　ぎゅっとスコールの首に回した手に力をこめ、セルフィは呟いた。&lt;BR&gt;「ここにいるし、離れないよ」&lt;BR&gt;　スコールが望む限り。&lt;BR&gt;　ずっと。&lt;BR&gt;「……あぁ……」&lt;BR&gt;　かすかに残る儚い温もりが愛しくて、スコールは栗色の髪に頬を埋めて小さく頷く。&lt;BR&gt;「どこにも、行くな……」&lt;BR&gt;　不器用で、しかしひどく真摯な響きを持つ声音に、セルフィの胸がまた、じんと熱くなった。&lt;BR&gt;　ぱちぱちとまばたきを繰り返しながらスコールの首筋に顔を埋めるセルフィを、抱きつぶしてしまわないよう細心の注意を払いながら、スコールはさらにぎゅっと強く抱きしめる。&lt;BR&gt;　次の一言を口にするのに、ものすごい精神力を必要とした。&lt;BR&gt;　らしくもなく心臓が早鐘を打っている。鼓動の音と両腕にかけられた力に、何故かひどく緊張していることを見て取って、セルフィが眼をぱちくりとさせる。&lt;BR&gt;　深く深く抱きしめられていたために、その声は直接身体に響いた。&lt;BR&gt;　かき消えそうに小さな声だったが、でもはっきりと聞こえた。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　――――「好きだ」と、たった一言。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　セルフィが放ったハインの力で、病院にあふれていた怪我人達は全員完治し、翌日には外科病棟がほぼ空になるという騒ぎになっていた。&lt;BR&gt;　奇跡的なこの出来事は、打ちひしがれていたエスタ国民の志気を煽り、結果としてエスタ復興が順調すぎるほど順調に進むという恩恵をもたらした。&lt;BR&gt;　あと１、２ヶ月もすればOCSも解除することが可能らしい。元々底力のある国とはいえ、大したものだった。&lt;BR&gt;　スコールはといえば、今回の件で二週間の謹慎処分を受けることになり、それをいいことにエスタに残っていた。&lt;BR&gt;　SeeDレベル降格ではなく、わざわざ謹慎処分になったのは、恐らくイデアの気遣いを受けてのことだろう。&lt;BR&gt;「……あ、スコール」&lt;BR&gt;　いつものように国立病院に足を運んだスコールに、待合室に座っていた少女が声をかけてきた。&lt;BR&gt;　振り返ると、待合室のソファに座っていた黒髪の少女がスコールに手を振りながら立ち上がるところだった。&lt;BR&gt;「リノア？」&lt;BR&gt;　確か数日前に退院しガルバディアに帰ったはずの美少女の姿に、スコールは眼をまたたいた。&lt;BR&gt;&lt;BR&gt;「魔法研究所に用があって」&lt;BR&gt;　スコールの隣を歩き出しながら、朗らかにリノアは笑い左腕をひょいと持ち上げた。&lt;BR&gt;「オダインバングルの改良版ができたって言うから、取りに来たの」&lt;BR&gt;「……そうか」&lt;BR&gt;　細い左手首にかしゃりと涼しげに鳴るのは、透明に輝く繊細な造りのバングルだ。&lt;BR&gt;　普通のバングルとは少し変わっていて、少し平べったい留め具がついている。ブレスレットと呼んだ方が正しい気がしたが、『オダインバングル』という名前がすでに製品名なので、便宜上仕方のないことなのだろう。&lt;BR&gt;「セルフィにつけてたやつ、全部ぱきって壊れちゃったじゃない？　あれがショックだったんだって」&lt;BR&gt;　そもそもバングルは魔女仕様であって魔女の始祖仕様になってはいなかったのだから、仕方のないことではあるのだが。&lt;BR&gt;「じゃあ、セルフィにも？」&lt;BR&gt;　訊ねると、リノアはにこっと頷いて服の隠しから同じデザインのバングルを取り出してスコールに差し出した。&lt;BR&gt;「もちろん」&lt;BR&gt;「……心強いな」&lt;BR&gt;　小さく笑って、リノアからバングルを受け取る。&lt;BR&gt;　何しろハインの力はセルフィにとって負荷がかかりすぎる。使うなと言ったところで、任務などになれば自身をかえりみるタイプではないセルフィである。バングルひとつでも、あるとないでは大違いだろう。&lt;BR&gt;「それね、スコールがつけてあげてね」&lt;BR&gt;　ひょいっとスコールの顔をのぞきこみ、リノアがいたずらっぽく笑った。&lt;BR&gt;「俺が？」&lt;BR&gt;　首をかしげると、リノアはバングルの留め具の部分を指さした。&lt;BR&gt;「そこね、実は指紋登録装置になってるの。バングルはめて、留め具留めた人間の指紋が解除キーになってるんですって」&lt;BR&gt;「指紋？」&lt;BR&gt;「自分で外せちゃ意味がないだろうってことで、そうなったみたいよ」&lt;BR&gt;　肩をすくめたリノアに、確かにそれはそうかもしれないとスコールは考える。&lt;BR&gt;　自分で外せてしまったら、セルフィは事あるごとに外して力を使ってしまいそうだ。何しろ、無鉄砲なので。&lt;BR&gt;　しかし。&lt;BR&gt;「……なんで俺なんだ？」&lt;BR&gt;　大まじめに訊ねる。魔女の力を恐れるエスタ上層部とか、ガーデン学園長とかがしゃしゃり出てきてもおかしくない気がするのだが。&lt;BR&gt;「スコール以外の人がセルフィにそんな物つけて、スコールは嬉しいの？」&lt;BR&gt;　くすっと笑ってリノアが問い返した。&lt;BR&gt;　スコールは少し沈黙する。&lt;BR&gt;　想像しただけで、不機嫌度が倍増したらしいその様子に、リノアが遠慮なく爆笑した。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　その頃病室では、アーヴァインがセルフィを見舞っていた。&lt;BR&gt;「もうだいぶいいの～？」&lt;BR&gt;　今回の件で一番の被害を被ったセルフィに、アーヴァインが花束を渡しながら訊ねる。&lt;BR&gt;　ようやく半身を起こして座れる程度には回復したセルフィが、人懐こい笑顔で頷いた。&lt;BR&gt;「うん、だいぶ回復したよ。まだ歩いたり走ったりはキツイんだけどね～」&lt;BR&gt;　でも大丈夫、と笑うセルフィの顔色は、アーヴァインがリノアと共にガルバディアに帰った日よりもずっと血色良くなっている。&lt;BR&gt;「っていうか聞いて聞いて～！　あたし、気がつかなかったんだけど、実は入院って初めてだったの～！！」&lt;BR&gt;「え？　そうなのかい？」&lt;BR&gt;「もちろん！　いつもセルフィちゃんはモリモリ元気いっぱ～いだったんだから！　こないだ気がついて、うわ～人生初体験！！　とか思っちゃったよ～」&lt;BR&gt;　任務で多少大怪我をしても、回復魔法で完治できる程度の怪我でしかなかったし、病気らしい病気もしたことのなかったセルフィである。病院なんて、彼女にとって最も縁のない場所のひとつだった。&lt;BR&gt;　アーヴァインはくすくす笑い、近くの花瓶に花を挿しながらおどけて見せる。&lt;BR&gt;「で、どうなの入院生活は～？　オバケとか出たかい～？」&lt;BR&gt;「ざ～んねんながら、全然。出たら絶対自慢してやろうと思って、待ちかまえてるんだけどね～！」&lt;BR&gt;「……な～んて待ちかまえてる限り、オバケは出てくる気なくすと思うんだけどねぇ～」&lt;BR&gt;「えっなんでなんで？　やっぱ怖がってる人にしか出てきてくれない？」&lt;BR&gt;　待ってるのに～と本気で拳を握って力説しているセルフィは、確かに元気そうである。&lt;BR&gt;　この調子なら一ヶ月も療養して体力が戻れば、SeeD復帰も夢ではないかもしれない。――無論、Ｇ．Ｆ．適合症の精密検査を受けてから、だが。&lt;BR&gt;「花、ずいぶんたくさんあるね」&lt;BR&gt;　こんなにたくさんあるなら、花束はかえって迷惑だったかな……そんな響きを言外ににじませてアーヴァインが言う。&lt;BR&gt;　窓辺に並んだ花瓶の数々に視線を向け、セルフィは眼を細めて笑った。&lt;BR&gt;「そうだね～。なんか、エスタの人がいっぱい送ってくれてるみたいだよ～」&lt;BR&gt;「……エスタの人が？なんで？」&lt;BR&gt;　面識も大してないはずなのにと驚くアーヴァインに、セルフィは小さく肩をすくめた。&lt;BR&gt;「ラグナ様がね、今回の事件の説明の時に、あたしを英雄に仕立て上げちゃったみたいなんだ～。&lt;BR&gt;　ＳｅｅＤのひとりであるあたしの姿を真似てエスタを襲った魔女みたいな化け物がいて、あたしは『伝説のＳｅｅＤ』と一緒にその化け物を退治した……って筋書きにしたんだよ～」&lt;BR&gt;　それは、市街で散々に姿を目撃されてしまったセルフィの名誉回復の為の、最善の策だったのかもしれないが。&lt;BR&gt;　実際にヌンチャク振り回したセルフィに救われた市民も少なからずおり、結果としてちょうど良い形でセルフィは祭り上げられてしまったという訳である。&lt;BR&gt;「おかげで、こんな調子だよ～。補佐官の人なんて、毎日来ては卒業後の進路について話をとか言ってくるし、ＯＣＳ起動で外に出られなくなった各国の諜報員って人からのメールも毎日くるし、なんか騒がしいよ～」&lt;BR&gt;「……ス、スカウト合戦なんだね……」&lt;BR&gt;　何か自分とは違う世界の話に、アーヴァインが冷汗まじりに苦笑を浮かべた。&lt;BR&gt;「でもさ、セフィ自身はどう考えてるの？」&lt;BR&gt;「ん？　進路のこと～？」&lt;BR&gt;「そう。もし、ＳｅｅＤに復帰できたら、って前提で」&lt;BR&gt;　そうだなぁ～とセルフィは小首をかしげて考える。&lt;BR&gt;「前々から、ラグナ様からはエスタ軍に就職しないかって言われてたんだけど……結論は出してなかったんだよね～。&lt;BR&gt;　卒業したらＳｅｅＤって基本的にガーデンに就職斡旋してもらって、どっかの軍に送られるじゃない？&lt;BR&gt;　特にココ！って希望もなかったから、適当に斡旋してもらってもいいとも思ったし、フリーで傭兵やるのも向いてるかなとも思うし……キスティみたいに教員採用試験受けて、トラビア帰るってのもいいかなぁ～とか思ってたし」&lt;BR&gt;「トラビアガーデンの教師になるってことかい～？」&lt;BR&gt;「うんそう。ＳｅｅＤを選んだことで、あっちの手助けとか出来なかったから、それもいいかなぁ～って。&lt;BR&gt;　ミサイル爆撃で、教師の数激減しちゃったしね～」&lt;BR&gt;　邪気なく笑うセルフィに笑い返しながら、アーヴァインは心の中で考える。&lt;BR&gt;　今後自由な進路選択といったものが、セルフィに許されるかは微妙なところだ。&lt;BR&gt;　今回の件でセルフィが図らずも継承してしまった『ハインの遺産』の処遇を巡って、恐らくガーデンとエスタを中心としたパワーゲームが始まるだろう。&lt;BR&gt;　ガルバディアが魔女リノアを擁している以上、『ハインの遺産継承者』の存在を欲しない国など恐らくいない。各国の諜報員がセルフィに接触を試みているということは、混乱に乗じてかなりの情報が渡っている可能性もある。&lt;BR&gt;　たとえセルフィが『遺産継承者』であることを隠し通せたとしても、エスタを救った英雄などと祭り上げられた彼女を放っておく法はないだろう。なまじ『遺産継承者』の正体が不鮮明であればあるほど、彼女の価値はいや増しに上がってしまうことになる。&lt;BR&gt;『伝説のＳｅｅＤ』『バラムガーデン初代指揮官』という肩書きを持ってしまったスコール同様、彼女もまた、どの道を選んでも戦いから避けては通れない人生を送ることになるはずだ。&lt;BR&gt;（ホントにねぇ……世界が違うよねぇ）&lt;BR&gt;　苦笑しながら、アーヴァインは花を飾り終えた花瓶を窓辺に置き、セルフィを振り返った。&lt;BR&gt;「ねぇ、セフィ」&lt;BR&gt;「な～に？」&lt;BR&gt;「どんな進路になってもさ～」&lt;BR&gt;　言いながら、セルフィの枕元に歩み寄り、どさっとそこに腰を下ろす。&lt;BR&gt;　翠色の綺麗な瞳を見つめて、言葉を続けた。&lt;BR&gt;「スコールと戦い合うような場所に就職するのだけは、避けられるといいね」&lt;BR&gt;　くるんとセルフィの瞳がまるくなった。&lt;BR&gt;　アーヴァインは手を伸ばし、セルフィの首から提げられた銀鎖にそっと触れる。&lt;BR&gt;　グリーヴァを弄ぶアーヴァインの指を見つめながら、セルフィはそっと穏やかに微笑んだ。&lt;BR&gt;「そうだね……」&lt;BR&gt;　就職先によっては、卒業生同士殺し合うことだって有り得るのが、セルフィ達の世界だ。&lt;BR&gt;　誰と争い合うことになっても、スコールと敵対することだけは、絶対に避けたい。これは確かだった。&lt;BR&gt;「あのさ」&lt;BR&gt;　ペンダントに視線を落としたまま、普通の調子を保ってアーヴァインが囁く。&lt;BR&gt;「うん？」&lt;BR&gt;「僕ねぇ……実はずっと、セフィのことが大好きだったんだよ」&lt;BR&gt;　ちゃり、と指先から離れたペンダントが、かすかに涼しげな音を立てた。&lt;BR&gt;　静かに視線を向けてくるセルフィに、顔を上げてアーヴァインはかすかに笑った。&lt;BR&gt;「知ってたかい～？」&lt;BR&gt;　サファイアブルーの瞳をのぞきこむようにして、セルフィは少し哀しげに微笑んだ。&lt;BR&gt;「……知ってた」&lt;BR&gt;　けれど気づかない振りをした。&lt;BR&gt;　幼い頃から、セルフィにとってアーヴァインは、いつだって後ろに立っていてくれる大事な友人だった。&lt;BR&gt;　スコールのように先に立って歩いていく訳でもなく、置いていかないでとすがりついて来るわけでもなく、ただ当たり前のように、後ろに立ってセルフィを見ていてくれる人だった。&lt;BR&gt;　自分のこのアーヴァインに対する想いが、恋ではないとわかっていたから、気づかない振りをした。&lt;BR&gt;　適度な距離が心地よくて、アーヴァインに一歩踏み出す勇気がないのをいいことに、気づかない振りをした。&lt;BR&gt;「ごめんね」&lt;BR&gt;　スコールに恋をした今ならわかる。&lt;BR&gt;　そんなセルフィの背中を、アーヴァインがいつもどんな気持ちで見ていたか。&lt;BR&gt;「謝らないでよ」&lt;BR&gt;　苦笑してアーヴァインがセルフィの瞳をのぞきこむ。手を伸ばして、セルフィの明るい栗色の髪を優しくなでた。&lt;BR&gt;　謝るなと言われ、セルフィはかすかに小首をかしげて考える。&lt;BR&gt;　考えて、今の気持ちに適した言葉を思いついて、口にした。&lt;BR&gt;「……ありがと、アービン」&lt;BR&gt;「うん」&lt;BR&gt;　寂しげにアーヴァインが微笑んで、ゆっくり椅子から立ち上がる。&lt;BR&gt;　見上げるセルフィの髪をそっと指で触れ、なめらかさを失っていないその感触を楽しんで、アーヴァインは改めて穏やかに微笑むと、長身を折り曲げるようにしてセルフィの顔に自分の顔を寄せた。&lt;BR&gt;「！」&lt;BR&gt;　セルフィの眼の下に、やわらかな唇がふわりとかすめた。&lt;BR&gt;　翠の瞳をまんまるに見開いて、セルフィは頬にキスして、また身を起こすアーヴァインの動きを、ただ呆然と見守っていた。&lt;BR&gt;　視線を合わせて、くすりと苦笑するようにアーヴァインが笑う。&lt;BR&gt;　まだぽかんとしているセルフィに、何かを言おうと口を開き、そこでふと動きを止めて病室の入口に眼を向けた。&lt;BR&gt;「？」&lt;BR&gt;　アーヴァインの視線を追ってセルフィも首をめぐらせる。&lt;BR&gt;　開いたままの病室の扉のところに、所在なげに立っているスコールとリノアの姿があった。&lt;BR&gt;（うわっちゃあぁぁぁ……）&lt;BR&gt;　顔にこそ出さないものの、セルフィは心の中で大絶叫をあげてしまっていた。&lt;BR&gt;　これは、このスコールの顔は、どう考えても今の一連を見られている。&lt;BR&gt;（い、いつからいたんやろ？　告白されたんも、聞かれてたんやろか……）&lt;BR&gt;　このご機嫌直滑降な仏頂面を見る限り……なんだか聞かれていてもおかしくない気がする。&lt;BR&gt;「あ、あれ～スコール、来てたんだ～」&lt;BR&gt;　セルフィ同様全身に冷汗をかきながらアーヴァインが声をかける。&lt;BR&gt;　無言で部屋に入ってくるスコールの背後で、リノアが白い頬を紅潮させて笑いをこらえていた。&lt;BR&gt;　静かに殺気立つスコールと、表面上は余裕のある笑顔を浮かべつつ内心で引きつっているセルフィとを見比べて、アーヴァインは懸命に何か違う話題を振らなくてはと思考をめぐらせる。&lt;BR&gt;　やがてはっと思いつき、くるりとセルフィに振り返って素っ頓狂なくらい明るい声をあげた。&lt;BR&gt;「そ、そ～だセフィ！　君、トラビアガーデンの方に、合同学園祭の打診してたんだって？」&lt;BR&gt;　唐突に、かつ強引に話題を変えてきたアーヴァインに、内心ほっとしてセルフィは笑顔で頷く。&lt;BR&gt;「うん、そ～だけど……なんでアービンが知ってるの～？」&lt;BR&gt;「さっきゼルからメールが来てたんだよ～、セフィのお見舞い行くなら知らせてほしいって～。&lt;BR&gt;　トラビアガーデンの生徒会長から、正式に合同学園祭計画に賛同するってメールが届いてたんだって～」&lt;BR&gt;　ガーデンに戻ったはいいが、今回の件のとばっちりを受けて、ゼルはスコール同様しばらく謹慎処分になっていた。なんだか暇そうだった上に今回何も役に立てなかったと気に病んでいるので、セルフィの方からパンク寸前になっていたメールボックスのメール管理をお願いしていたのだ。&lt;BR&gt;「うわ！　うわ～！！　ホントに！？」&lt;BR&gt;　ぱあっとセルフィが顔を輝かせる。&lt;BR&gt;「うわ～すごい嬉しい！！　絶対、トラビアのみんなも学園祭やりたいだろうなって思っていたんだよ～！！&lt;BR&gt;　ね、スコールスコール、合同学園祭オッケーだよね？　やれるよね？」&lt;BR&gt;　いきなりきらきら輝く翠の瞳を向けられ、仏頂面を継続させていたスコールがうっと息をのむ。&lt;BR&gt;　邪気のないこの全開の笑顔に、スコールは弱い。&lt;BR&gt;「……恐らく、問題はないと思うが……」&lt;BR&gt;「やった～！　じゃ、ガーデン帰ったらあたし早速企画書作るから、ガーデンいいんちょのスコールは学園長の許可とってくれる？　あたしよりやっぱスコールが説得した方が成功率高いよね～！」&lt;BR&gt;　あっあとはママ先生にも協力お願いしなくちゃ～！　とセルフィの心はすでに学園祭に飛んでいる。&lt;BR&gt;　アルティミシアに操られたイデアの指示で発射されたミサイルで破壊されたトラビアガーデンとの合同学園祭。イデアが説得担当を断るとは思えず、シドもイデアに説得されれば嫌とは言えないはずだ。&lt;BR&gt;　入院していても、セルフィは相変わらず前向きでパワフルだ。くすくす笑って、アーヴァインはゼルからの伝言の続きを口にした。&lt;BR&gt;「それで、生徒会長の方から、現在までの進行状況をメールなりなんなりで送ってもらえないかって話だったってさ～。&lt;BR&gt;　今バラムで出てる案を見て、トラビアの方でも色々企画を考えたいって言ってたよ～」&lt;BR&gt;　……このアーヴァインの台詞に、スコールの体温が数度ほど下がった。&lt;BR&gt;（現在の進行状況……）&lt;BR&gt;　トラビアガーデン長期レンタル中のセルフィからメールでもらった指示を、忙しさにかまけて全部放置していたなんて……もちろんスコールはセルフィには内緒にしていたわけで。&lt;BR&gt;「あ、そうなんだ～？　えっとね～あたしも実は知らないんだよね、ず～っとトラビア行きっぱなしだったから」&lt;BR&gt;「じゃあ全然進展なし？」&lt;BR&gt;「ううん、一応メールで学園長には企画書とか申請書とかは出してたし、承認出た分に関してはスコールの方に色々作業依頼してたから、その進行状況まとめて送ればオッケーだと思うよ～。&lt;BR&gt;　ね、スコール、どこまで進んでる？」&lt;BR&gt;　期待に瞳を輝かせ、今すぐ病室から逃げ出したい気分のスコールを見つめてセルフィが訊ねる。&lt;BR&gt;　スコールの体温が、さらに数度下がった気がした。&lt;BR&gt;　じりっと背中に嫌な冷汗が浮かぶのがわかる。&lt;BR&gt;　進展なし。手もつけてない。……などと、一体この状況で誰が口にできようか。&lt;BR&gt;　三人の注視を受けたまま、スコールは無表情をキープして沈黙する。&lt;BR&gt;　長く重く寒い沈黙が病室を支配する。&lt;BR&gt;&lt;BR&gt;　スコールを見つめて答えを待っていたセルフィが、やがてにっこりと無邪気に微笑んだ。&lt;BR&gt;　可愛らしい仕草で小首を傾げ、スコールの瞳をのぞきこむ。&lt;BR&gt;「……スコール？」&lt;BR&gt;　鈴を振るような声が名を呼んだ瞬間、スコールの運命は決定した。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;&lt;/SPAN&gt;

<script data-viewer-zoom-script>
(() => {
  const stage = document.querySelector('.viewer-stage-image');
  const image = stage ? stage.querySelector('.viewer-image') : null;
  if (!stage || !image) {
    return;
  }

  const setZoom = (enabled) => {
    stage.classList.toggle('is-zoomed', enabled);
    image.setAttribute('aria-pressed', enabled ? 'true' : 'false');
    if (enabled) {
      const naturalWidth = image.naturalWidth || image.clientWidth || 0;
      const targetWidth = naturalWidth > 0
        ? Math.max(naturalWidth, Math.min(Math.round(stage.clientWidth * 0.92), naturalWidth * 4))
        : Math.round(stage.clientWidth * 0.92);
      image.style.width = `${targetWidth}px`;
      image.style.maxWidth = 'none';
      image.style.maxHeight = 'none';
      requestAnimationFrame(() => {
        stage.scrollTop = 0;
        stage.scrollLeft = Math.max(0, Math.round((image.scrollWidth - stage.clientWidth) / 2));
      });
    } else {
      image.style.removeProperty('width');
      image.style.removeProperty('max-width');
      image.style.removeProperty('max-height');
      stage.scrollTop = 0;
      stage.scrollLeft = 0;
    }
  };

  const toggleZoom = () => {
    setZoom(!stage.classList.contains('is-zoomed'));
  };

  image.setAttribute('tabindex', '0');
  image.setAttribute('role', 'button');
  image.setAttribute('aria-label', '逕ｻ蜒上ｒ諡｡螟ｧ縺ｾ縺溘・邵ｮ蟆・);
  image.setAttribute('aria-pressed', 'false');

  image.addEventListener('click', toggleZoom);
  image.addEventListener('keydown', (event) => {
    if (event.key === 'Enter' || event.key === ' ') {
      event.preventDefault();
      toggleZoom();
    }
  });

  stage.addEventListener('click', (event) => {
    if (event.target === stage && stage.classList.contains('is-zoomed')) {
      setZoom(false);
    }
  });

  window.addEventListener('keydown', (event) => {
    if (event.key === 'Escape' && stage.classList.contains('is-zoomed')) {
      setZoom(false);
    }
  });
})();
</script>
