      width=537&gt;&lt;SPAN&gt;&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　夢の中で、スコールはセルフィに言った。&lt;BR&gt;　どうしても、どうあってもセルフィを取り戻すことが不可能だと悟ったなら、差し違えても必ず、SeeDとして倒すと。&lt;BR&gt;　実際に眼の前に現れた彼女は、スコールの良く知るセルフィではまったくなかった。&lt;BR&gt;　呼びかけにも、スコールの血にも、何一つセルフィは反応しなかった。セルフィの中にいるＧ．Ｆ．は、どんな手を用いたところでセルフィを取り戻せないと、スコールを嘲笑った。&lt;BR&gt;　だから――どうにもならないのだと悟ったから、スコールはセルフィにガンブレードを突き立てた。&lt;BR&gt;　とどめの一撃を受けたあの瞬間、力を放出した直後の、セルフィに隙が生じたあの一刹那を狙って。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;「いやあぁぁぁぁ！！」&lt;BR&gt;　遠くでリノアの悲鳴が聞こえる。&lt;BR&gt;　泣き叫ぶその声も、腕に抱いたセルフィの感触も、どんどん遠ざかっていく。&lt;BR&gt;（死ぬ……のか……）&lt;BR&gt;　SeeDになってからも、なる以前も、これほどはっきりと死を意識したことなどない。&lt;BR&gt;（死って……こんなんなのか……）&lt;BR&gt;　身体の感覚がだんだん消えていく。ただひどく、寒さだけが――&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;「……スコール！？」&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　澄みきった鈴の音を思わせる、凛とした響きを帯びた声。&lt;BR&gt;　意識が消滅する寸前、聴覚もほとんどまともに機能しなくなったはずのスコールの耳に、その声は確かにはっきりと届いた。&lt;BR&gt;　ぼんやりと眼を開く。腕に抱いた少女ではなく、声がしたとおぼしき方向に、よく見えない眼を向ける。&lt;BR&gt;　とてもとても遠くに、瓦礫の山の上に、立ちつくしている小さな影が見えた。&lt;BR&gt;　胸元に揺れる黄色いリボンが、太陽色の花たちを連想させて懐かしかった。&lt;BR&gt;　どこまでも澄んだ翠の瞳が、大きく見開いてスコールを捉えていた。&lt;BR&gt;　がしゃりと、足下に取り落としたヌンチャクが乾いた音を立てた。&lt;BR&gt;（……なんだよ……）&lt;BR&gt;　スコールの唇が、かすかに笑みの形を刻む。&lt;BR&gt;　あんなところにいた。&lt;BR&gt;　腕の中ではなく、あんな遠い場所に。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;「スコール！！」&lt;BR&gt;　武器を取り落としたことも忘れ、セルフィが夢中でスコールに走り寄る。&lt;BR&gt;　あふれる鮮血に濡れたスコールの唇が、かすかに動いた。&lt;BR&gt;　その唇が自分の名を呼んだことを、セルフィは疑わなかった。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　時は少し遡る。&lt;BR&gt;&lt;BR&gt;　スコールと言葉を交わし温もりを分け合った長い長い夢から覚めたセルフィの眼に、最初に飛び込んできたのは、見慣れたラグナロクのハンガーだった。&lt;BR&gt;「…………あれぇ？」&lt;BR&gt;　寝心地がいいとは言えないカプセルの中、ぼんやりと眼を開けて呟いたセルフィに、すぐ傍にいたらしい人物が反応し声をかける。&lt;BR&gt;「眼が覚めましたか？　セルフィ」&lt;BR&gt;　優しい穏やかな声がすぐ傍で聞こえ、びっくりしてセルフィは身を起こした。&lt;BR&gt;　と、急激な運動に身体がついてゆけず、くらりと視界が暗くなる。&lt;BR&gt;「……あぁ、いきなり動かないで。３日間眠っていたのですから……」&lt;BR&gt;　慌てたように、穏やかな声の主がセルフィの身体を支えてくれる。&lt;BR&gt;　細い腕に抱き留められ、セルフィはゆるりと首をめぐらせて助け起こしてくれる人を見た。&lt;BR&gt;「ママ先生……」&lt;BR&gt;「久しぶりね、セルフィ」&lt;BR&gt;　黒いワンピースに身を包み、長い黒髪を自然に背に流した美しい女性が、セルフィを見つめて優しく微笑んだ。&lt;BR&gt;　もう魔女であった頃のような、おかしな形に髪を結い上げたりしていない。セルフィがよく見慣れた、一番好きな姿のイデア。&lt;BR&gt;「なんで、ママ先生がいるの～？」&lt;BR&gt;「……色々あるんですよ」&lt;BR&gt;　くすっとイデアは微笑むと、セルフィの様子をうかがいながら手を放す。&lt;BR&gt;　自力で身を起こしたセルフィは、再度ぐるりと辺りを見回した。&lt;BR&gt;「ここ、ラグナロクだよね～？」&lt;BR&gt;「えぇ」&lt;BR&gt;「あたし、サイファーに連れて来られたと思ったんだけど、サイファーは～？」&lt;BR&gt;「いますよ、操縦室の方に」&lt;BR&gt;　イデアはすいと立ち上がり、セルフィに手を差し出した。&lt;BR&gt;　たおやかなその腕につかまって立ち上がりながら、セルフィは首をかしげる。振り返り、自分が今眠っていたものが見覚えのある冷凍睡眠カプセルであることを確認する。&lt;BR&gt;　夢の中、スコールが話してくれたことをセルフィは覚えていた。コールドスリープ処理を施されて眠らされているだろうと言った彼の予想は、的中していたと言うことだ。&lt;BR&gt;（Ｇ．Ｆ．……）&lt;BR&gt;　ふと、思い出してセルフィは自分の胸に手を当てた。&lt;BR&gt;　今この瞬間は、自分の身体は自分のものだ。Ｇ．Ｆ．などが入ってきている感覚はない。&lt;BR&gt;　ほっと少しだけ安堵して、セルフィはカプセルの中から外に出た。&lt;BR&gt;「あたし、サイファーに会いたい」&lt;BR&gt;　聞きたいこと、確認したいことは山ほどある。&lt;BR&gt;　主張するセルフィに、イデアは微笑んで静かに頷いた。&lt;BR&gt;「えぇ、行きましょう」&lt;BR&gt;&lt;BR&gt;　操縦室には、サイファーと雷神だけがいて、風神の姿はどこにもなかった。&lt;BR&gt;「よう、起きたか眠り姫」&lt;BR&gt;　自ら操縦桿を握ってにやりと笑うサイファーを、セルフィは冗談めかして睨んでから、周囲の光景に眼をまるくする。&lt;BR&gt;「ここ、宇宙なの～？」&lt;BR&gt;「おうよ」&lt;BR&gt;　言ってサイファーは自動操縦に切り替えると、操縦席を飛び越えセルフィの前にトンと立った。&lt;BR&gt;「あの青い鳥に見つからねえ場所つったらな、宇宙ぐれえっきゃ思いつかなかったんだよ」&lt;BR&gt;　言いながら、くいと親指を立ててエレベータを示す。場所を変えようということなのだろう。&lt;BR&gt;　素直に頷き、サイファーについて客席に場所を移してシートに座り、人心地ついて、セルフィはサイファーに何が起きているのか問いただした。&lt;BR&gt;&lt;BR&gt;「まぁ要するに、エスタやら青い鳥やらより先に、お前の身柄を確保しようと思ったんだよ」&lt;BR&gt;　どさりとシートに腰掛け、サイファーはあっさりとそう言った。&lt;BR&gt;「ついでにあの青い鳥も捕獲してやろうかとも思ったんだけどな」&lt;BR&gt;　セルフィを突然奪い、冷凍睡眠状態にした上に宇宙まで逃げてしまえば、Ｇ．Ｆ．はセルフィの気配を追うことができなくなる。そうすれば必ずエルオーネの力を当てにして動くだろうとサイファー達は踏み、風神を大統領官邸に潜入させておいた。SeeDに匹敵する実力の持ち主である風神なら、あの堅牢なシステムの裏をかいて潜入することも不可能ではない。&lt;BR&gt;「けどまさか人に化けてたとは思わなかったからな、裏をかかれちまった」&lt;BR&gt;　もっとも間近くエルオーネの傍についていた白いSeeDが、件のＧ．Ｆ．。&lt;BR&gt;　風神がエルオーネの部屋に飛び込んだ時はすでに手遅れで、後から飛び込んできたアーヴァイン達の眼を盗んで脱出するだけでひと苦労だった。&lt;BR&gt;「え～と……あの青い髪の人がＧ．Ｆ．だったってこと～？」&lt;BR&gt;　セルフィは眼をまるくする。&lt;BR&gt;　確かに、６年前セルフィがジャンクションしていたあのＧ．Ｆ．は自由に姿を変えられたし、人語に不自由もしていなかったし、人間に利用されたりするような存在とも思えなかったが。&lt;BR&gt;（あたしと話できるゆうんも、ホンマはおかしいわけやし……）&lt;BR&gt;　通常、被ジャンクション者が脳内ジャンクションしている意識体と会話なんて交わせない。&lt;BR&gt;　それが可能な時点で、すでにして十分規格外だ。&lt;BR&gt;「えぇと～……つまりつまり、あたしたちが考えてたみたいな背後に組織が～とかそういうのも全然なくって、バラムガーデンがどうとかエスタがどうとかも関係なくって、ひたすらＧ．Ｆ．があたしを狙ってたって、単にそれだけ？」&lt;BR&gt;「……としか言いようがねえんだよな」&lt;BR&gt;　一国の大統領を巻き込んでおいて、なんだか拍子抜けな真相に、セルフィはがっくりと肩を落とす。&lt;BR&gt;　逆に言えば、セルフィに執着するＧ．Ｆ．が、大国エスタを巻き込むほどの強大な力の持ち主でなければ、今回の事件は起こらなかったのだ。&lt;BR&gt;「っていうか、それってもうＧ．Ｆ．っていうのとはちょっと違うんじゃ～？」&lt;BR&gt;「正体はオレたちもよくわからねーな。Ｇ．Ｆ．みてーに明確な実体を持ってねえくせに、人に化けたり小器用な真似をしたりする。前代未聞もいいとこだぜ」&lt;BR&gt;　肩をすくめてサイファーはそう言うと、ちらりとイデアに視線を流した。&lt;BR&gt;　イデアがその視線を受け、かすかに微笑みながら小さく首を振る。結局、二人ともそのまま沈黙した。&lt;BR&gt;「？」&lt;BR&gt;　今の一連の動きがなんなのかわからず、首をかしげるセルフィに、イデアが口を開いた。&lt;BR&gt;「セルフィ、おそらくＧ．Ｆ．は、スコール達の動きを読んでいます」&lt;BR&gt;「え？」&lt;BR&gt;「エネルギー体に戻って人間から見えないようになっているか、変幻自在のようですから、昆虫などの不審を持たれにくい姿形となっているか……いずれにせよ、官邸内にＧ．Ｆ．が留まっている可能性は非常に高いでしょう。&lt;BR&gt;　スコール達はすでに、あなたが冷凍睡眠カプセルに入っていることを突き止めています。Ｇ．Ｆ．もおそらくその情報を何らかの形で入手しているでしょう。あなたが７２時間後に目覚めることも、おそらくは知っているはずです」&lt;BR&gt;「え～と、それって、あたしの中に入ってくるかもってこと～？」&lt;BR&gt;　イデアは静かに首を振った。&lt;BR&gt;「いいえ、エルオーネが意識を閉ざしている今、Ｇ．Ｆ．にはあなたの中に入ってくる手だてはありません。エルオーネが目覚めて力をふるうか、あなたがＧ．Ｆ．を受け入れでもしない限りは、あなたがＧ．Ｆ．に操られてしまうような危険性はないでしょう」&lt;BR&gt;　エルオーネがそれを予期して自ら意識を閉ざしているだろうことは、あえてイデアは口にしなかった。&lt;BR&gt;「でも、Ｇ．Ｆ．は黙ってあなたを手放すようなことはしないでしょう。あれはセルフィを求めています。&lt;BR&gt;　７２時間はすでに経過しました。おそらく、あなたを求めてＧ．Ｆ．は動き出すでしょう」&lt;BR&gt;「動き出す……？」&lt;BR&gt;　イデアは黙って頷いた。おそらく、サイファー達の狙いはそこにあるのだと、セルフィは悟った。&lt;BR&gt;　サイファーは短気で大雑把で、堅実地道なスコールと対称的な人間だ。Ｇ．Ｆ．を安全におびき出すために、手っ取り早くセルフィを奪って隠して挑発するなどとは、いかにも彼らしい。&lt;BR&gt;「でも～、だったらなんでスコールに知らせてあげないの～？」&lt;BR&gt;　夢の中、必死で自分を捜してくれていたらしいスコールの様子を思い出してそうたずねると、サイファーは不機嫌そうな顔でシートの上に反っくり返った。&lt;BR&gt;「決まってんだろ、嫌がらせだ！」&lt;BR&gt;　悪びれず堂々と言い放つ。&lt;BR&gt;　セルフィはきょとんとサイファーの顔を眺め、それからぷっと吹き出してくすくす笑い出した。&lt;BR&gt;　サイファーは不機嫌そうな顔のままぷいと視線をそらす。怒り出すくらいの反応は予測していたが、よもや笑い出されるとは思っていなかったので、反応に困った感じだ。&lt;BR&gt;　しばらく笑っていたセルフィはようやく笑いをおさめ、それから幼い頃、孤独を癒してくれた青い鳥の姿をしたＧ．Ｆ．を思い出した。&lt;BR&gt;　あの頃は、セルフィの望み通りに、小さな小さな小鳥の姿だったのだけど……。&lt;BR&gt;「サイファー！」&lt;BR&gt;　と、ふいに客席の扉が開き、どたばたと無骨な音を立てて雷神が飛び込んできた。&lt;BR&gt;「サイファー、通信だもんよ！　風神からだもんよ！」&lt;BR&gt;　がたっとサイファーが素早く立ち上がった。&lt;BR&gt;　続けて立ち上がるセルフィとイデアに、鋭い眼差しをざっと流す。&lt;BR&gt;「動いたな」&lt;BR&gt;　思ったより早い。セルフィは少しだけ息をのんだ。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　エスタに潜入している風神からの連絡は、予想通りＧ．Ｆ．が動いたというものだった。&lt;BR&gt;『Ｇ．Ｆ．現。姿セルフィ。街破壊、死傷者多数』&lt;BR&gt;「派手にやってんじゃねーか」&lt;BR&gt;　愉快そうにサイファーが笑い、セルフィはむうっと盛大にむくれる。&lt;BR&gt;「んも～！　な～んであたしの姿で壊すのよ～！」&lt;BR&gt;「おそらく、セルフィの居場所を奪おうとしているのでしょう」&lt;BR&gt;　静かにイデアが答える。&lt;BR&gt;　未来の魔女アルティミシアも、エルオーネのいる街を片っ端から焼き払い人々に恐怖を焼き付けることで、エルオーネの居場所を地上から奪おうとした。それと同じことである。&lt;BR&gt;「わかってるけど～！　んも～！　むかつく～！」&lt;BR&gt;　大きく腕を振ってセルフィは叫んだ。&lt;BR&gt;『スコール現在追跡。戦闘中。我隠手助』&lt;BR&gt;　どうやら風神は現在進行形でスコールを追い、隠れてサポートしながら実況中継中らしい。&lt;BR&gt;　暴れていたセルフィは、報告を受けてぴたりと動きを止めた。&lt;BR&gt;（って……もしかして、スコールあたしと間違うて追ってたり……）&lt;BR&gt;　してそうである。&lt;BR&gt;　夢の中、最後にかわした、約束ではない誓いを思い出す。&lt;BR&gt;（差し違えても――）&lt;BR&gt;　そうだ。スコールは、どうあってもセルフィを取り戻せないと悟ったら、差し違える覚悟でセルフィを倒してやると、言っていた……。&lt;BR&gt;「大変～！」&lt;BR&gt;　にわかに慌てふためき、セルフィは操縦桿に走り寄る。&lt;BR&gt;「おいこら、何だよ突然」&lt;BR&gt;　驚くサイファーに、セルフィは涙目で振り返った。&lt;BR&gt;「早く地上に戻らなきゃ～！　スコールが死んじゃう～！！」&lt;BR&gt;　地上で暴れているセルフィは、本物のセルフィではない。&lt;BR&gt;　どれほどスコールが尽力しようと、宇宙にいるセルフィが地上に戻らない限り、本物のセルフィは取り戻せない。&lt;BR&gt;　取り戻せないということは……&lt;BR&gt;「早く戻らなくちゃ～！！　早く早く早く～～！！」&lt;BR&gt;「バカ、落ち着け！　お前までノコノコ出向いてってどうすんだよ！？　オレたちが行ってやるから、お前はラグナロクで大人しくしてろって！」&lt;BR&gt;「落ち着いてる場合じゃな～い！！」&lt;BR&gt;　じたばたと暴れながら、セルフィはサイファーを大きな眼で睨んだ。&lt;BR&gt;「サイファーもみんなも知らないだろうけどね～、あれはすっご～く強いの！　みんなでいっせいに戦っても、勝てる保証なんてほとんどないの～！」&lt;BR&gt;　長い期間ジャンクションしていたセルフィの、本能で覚えている記憶だ。&lt;BR&gt;　けれど、どれほど強大な力をふるう敵であっても、勝つ見込みがまったくゼロだというわけではない。&lt;BR&gt;「……あたしがジエンドを出す。それまで、サイファー達が抑えてくれてたら、勝てるかもしれないんだよ……！」&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　宇宙から帰還したセルフィは、とにかくスコールと連絡を取ろうと試みた。&lt;BR&gt;　だが携帯を鳴らしてみても戦闘中のスコールが応答できるはずもなく、とにかく大慌てでエスタ市内に入り、サイファー達と二手に分かれてスコールを捜した。&lt;BR&gt;　瓦礫やら何やらが凶器と化して飛び交う市内、生存者が怪我をしないようヌンチャクで飛んでくる破片を弾き飛ばしながらスコールを追って走るセルフィに、偶然遭遇したのがリノアとアーヴァインだ。セルフィの意識は瓦礫とスコールにのみ向けられていたので、自分がこの二人を助けたことも気づいていなかったが、リノアとアーヴァインの方はちゃんとセルフィの姿を認識した。&lt;BR&gt;　宙を飛び蒼い瞳で無造作に破壊活動を行う人間離れした少女より、ヌンチャク片手に市民を救済しつつ地面を走っているセルフィの方が本物であることは、明白である。&lt;BR&gt;　とにかくスコールに、戦っている相手が偽物であると知らせなければ、スコールが殺されてしまう。そう判断しスコールとセルフィを追った二人だが、途中でセルフィの姿を見失ってしまった。行き先は同じだろうと二人はそのままスコールを追い、セルフィは人助けをしながらスコールを追う途中、偶然白いSeeD達に遭遇し、合流した。にこやかにあまたの市民の命を奪っていった殺戮者と、まったく同じ顔をした少女に親切に助けられたエスタ市民達は、驚きを通り越して茫然自失状態に陥った。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　そうしてようやく、スコールのいる場所にたどり着いた、のだが……。&lt;BR&gt;「スコール！？」&lt;BR&gt;　自分とまったく同じ顔をした少女を抱いたまま、血だまりに倒れているスコールの姿に、セルフィは血の気も引く思いで呆然と立ちつくした。&lt;BR&gt;「これは……」&lt;BR&gt;　背後にいる白いSeeD達が呆然と息をのむ声がする。&lt;BR&gt;　だがセルフィには、そんな反応に言葉を返す余裕などどこにもなかった。&lt;BR&gt;（夢……？）&lt;BR&gt;　悪い夢でも見ているのだろうか。だが鼻腔に届く強烈な血臭は紛れもなく本物である。&lt;BR&gt;　ゆっくりと、スコールが眼を開くのが見えた。うっとりと見開かれた瞳が、はっきりとセルフィを捉える。&lt;BR&gt;　スコールの唇がかすかに笑みを刻んだ。&lt;BR&gt;　そのまま、ことりと眼を閉じた。&lt;BR&gt;「スコール！！」&lt;BR&gt;　悲鳴を上げ、セルフィは慌ててスコールに向かって走り始めた。&lt;BR&gt;　早く近くに行って、アレイズをかけて――早く、早く……！&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　閃光が天からほとばしった。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　頭の中が真っ白になるほどの、すさまじい爆発がセルフィの眼の前に炸裂した。&lt;BR&gt;　爆音がひとつ、ふたつ、……数え切れないほどセルフィの周辺で炸裂する。さすがのセルフィも、思わず足を止めて顔をかばうように両腕を上げた。&lt;BR&gt;　天からいくつもいくつも、無数の光の刃が降ってくる。セルフィの足下に激突し、地面をえぐりながら爆発する。&lt;BR&gt;「……セルフィ！」&lt;BR&gt;　少し離れた場所にいたリノアとアーヴァインが悲鳴を上げたが、それもセルフィの耳には届かない。またそれほどのすさまじい攻撃にも関わらず、セルフィの身には傷ひとつつかなかった。&lt;BR&gt;「――――？」&lt;BR&gt;　ようやく爆発音が止み、セルフィはおそるおそる眼を開いた。&lt;BR&gt;　顔をかばっていた両腕を下ろし、もうもうと埃の巻きあがる中、怪訝な顔をする。&lt;BR&gt;　あきらかにこちらを狙っていた攻撃だったのに、なぜ自分がこうして無事なのかがわからない。&lt;BR&gt;　不思議に思いながら、とにかくスコールの傍に行かなくてはと思い出し、一歩踏み出したとたん、ずるりと何かに足が滑った。&lt;BR&gt;「きゃっ……！」&lt;BR&gt;　びっくりし、そのまま滑ったセルフィは、地面に盛大な尻餅をつく。ばしゃっと地面に溜まっていた水がはねて顔にかかった。&lt;BR&gt;「やっ、なに～？」&lt;BR&gt;　記憶では水たまりなんてなかったはずだ。そう思いながら地面を見下ろしたセルフィは、その姿勢のまま眼を見開いて凝固した。&lt;BR&gt;　セルフィが腰を落としていたのは、真っ赤な水たまりだった。&lt;BR&gt;　一瞬固まってしまったセルフィは、直後にはっと我に返り、慌てて自分の背後にいた白いSeeDたちを振り返る。&lt;BR&gt;「だ、大丈夫～！？」&lt;BR&gt;　色をなして叫んだセルフィに、返ってきたのはうめき声だけだった。&lt;BR&gt;　白いSeeD服を暗赤色に染め、全身傷だらけでSeeD達が倒れている。&lt;BR&gt;　自分はまったくの無傷なのに――！&lt;BR&gt;「しっかりして～！　え、え～とえ～と、あっそうだまずオーラかけて……！」&lt;BR&gt;　フルケアさえ出せれば、怪我人が何人いようと一瞬で回復させられる。焦りながらストックしている魔法を探るセルフィの背後で、ばさりと羽音がした。&lt;BR&gt;「……！」&lt;BR&gt;　息をのんで振り返る。傷つき倒れているスコールのすぐ傍に、同じく血に染まっていたセルフィの姿をした者が、いつの間にか立ち上がっていた。&lt;BR&gt;　自力で腹部に突き立ったガンブレードを引き抜いて地面に放り出し、とうとうと流れ落ちる鮮血を冷静に眺めて口の中でかすかに魔法を唱える。&lt;BR&gt;　一瞬後、いかなる魔法であったのか、彼女の腹部の傷が綺麗に癒され、流れ出た彼女の血が蒼い光になって空中へと消えた。&lt;BR&gt;　自分とまったく同じ顔をした少女を見つめながら、呆然と眼を見開いているセルフィに顔を向け、蒼い瞳を細めてにっこりと少女が笑う。笑う少女の遙か頭上から、羽音は聞こえていた。&lt;BR&gt;「あ……」&lt;BR&gt;　懐かしい音だった。&lt;BR&gt;　軽い羽音を響かせながら、青い小鳥が少女の元へと降りてくる。&lt;BR&gt;　少女はかつてのセルフィと同じように、細い腕をすいと上げ、手首を軽く曲げるようにして小鳥を迎えた。&lt;BR&gt;「私の名を覚えているか？」&lt;BR&gt;　小鳥を手にとまらせ、少女がセルフィの声で静かにたずねた。&lt;BR&gt;　セルフィの姿をし、セルフィの声ではあったが、それが間違いなく青い小鳥の言葉であることがセルフィにはわかった。&lt;BR&gt;「……覚えてない」&lt;BR&gt;　首を横に振り、セルフィは答えた。どれほど長い夢の中、過去の思い出を見てきても、どうしても思い出すことができなかった。&lt;BR&gt;「そうか。なら――」&lt;BR&gt;　頷いた少女の背後から、突然空気を切る音と共に一条の闇が走った。&lt;BR&gt;　ぴくりと眉を動かしたのみで、振り向くこともない少女の背後、見えない不可視の壁に遮られ、飛び来た闇が硬質の音を立てて地面に叩きつけられる。&lt;BR&gt;　がしゃりと地面に落ちたそれは、漆黒の刀身を持つ細身のガンブレードだった。&lt;BR&gt;「ハイペリオン……！？」&lt;BR&gt;　スコールの元に駆け寄りたくとも血まみれの少女がすぐ傍にいるため果たせず、自分自身に苛立っていたリノアが、見覚えのあるガンブレードに驚き声を上げた。&lt;BR&gt;「チッ……」&lt;BR&gt;　セルフィに少し遅れてこの場所に到着し、機をうかがい気配を殺していたサイファーは、少女と鳥の意識がセルフィに向いた一瞬の隙をついて背後から強襲したのだが、それも徒労に終わり、悔しげに舌打ちした。&lt;BR&gt;　何もかもお見通しと少女は笑い、改めてまっすぐにセルフィを蒼の瞳で見すえた。&lt;BR&gt;「思い出すがいい、私の名を。救いたい命があるなら、契約の名を呼べ」&lt;BR&gt;　細い手首がやわらかく動き、小鳥が飛んだ。&lt;BR&gt;　スコール達の命と引き替えに自身を受け入れろと要求を突きつけるＧ．Ｆ．に、セルフィが大きく眼を見開く。&lt;BR&gt;　なぜＧ．Ｆ．がこんな風に殺戮を繰り返したのか、そしてスコールを殺そうとしたのかが、わかった。&lt;BR&gt;（本気なんや……）&lt;BR&gt;　こんな風に、セルフィにとって大切な人を盾にとった時に、本気で殺すことができるのだという、意思表示。&lt;BR&gt;　Ｇ．Ｆ．の意図としては、セルフィがこの場に到着した時点で、スコールを殺してしまうつもりだった。&lt;BR&gt;　最愛の人間の死で茫然自失になったセルフィなら、簡単に精神を蹂躙することができたはずだから。&lt;BR&gt;　だが、幸か不幸かスコールは即死しなかった。今ここでスコールにとどめを刺すことは、彼女を怒りに奮い立たせる可能性が高くなる。それはＧ．Ｆ．にとって得策ではない。&lt;BR&gt;　だからこその、交換条件。そのための意思表示はすでにできている。&lt;BR&gt;　立ちつくすセルフィの前まで飛んだ青い小鳥は、ぴたりと止まるとそこでくるりと回った。&lt;BR&gt;　そして――。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　それは、その場にいた者すべての眼に生々しく映った。&lt;BR&gt;　瓦礫の山と化したエスタ首都が、一瞬にして赤に黄色に咲き乱れる花畑となった。&lt;BR&gt;「えっ……！？」&lt;BR&gt;　どこまでも広がる草原。咲き誇り濃厚に香り立つ花の匂い。&lt;BR&gt;　突然視界に映ったものの意外さに眼をまるくしているのはセルフィだけではない。&lt;BR&gt;　少し離れたところで立ちすくんでいたリノアとアーヴァインも、未だ身を隠したままのサイファー達も、何が起きたのかと呆然と周囲の風景を見回した。&lt;BR&gt;（ママ先生のお花畑？）&lt;BR&gt;　花畑と聞くとまずそこを思い浮かべるセルフィは、首を傾げながら周囲をぐるりと見渡した。&lt;BR&gt;（……ううん、違う、あそこやない……！）&lt;BR&gt;　３６０度ぐるりと回転し、セルフィはきゅっと眉をひそめた。&lt;BR&gt;　この風景は、違う。夢の中、スコールと手を繋いで歩いたあの場所ではない。&lt;BR&gt;　でもどこかで、確実にセルフィはこの風景を見た。この風景に立ったこともある。いつ、どこで……？&lt;BR&gt;「！」&lt;BR&gt;　花びらと共に、空中を何かが舞っていることに気づき、セルフィははっと眼を見開いた。&lt;BR&gt;（雪……！）&lt;BR&gt;　瞬間、ゴッと風がうなりをあげ、視界をいっきに青い炎が埋め尽くした。&lt;BR&gt;「えっ……！？」&lt;BR&gt;　ぎょっと息をのんだが、その青い炎はセルフィの身を傷つけるものではなかった。&lt;BR&gt;　自分からその炎が放たれたものだと知り、驚愕するセルフィのすぐ傍で、身も凍るような絶叫が起こる。&lt;BR&gt;「……！」&lt;BR&gt;　振り仰ぐセルフィのすぐ横、いつの間にか立っていた灰色の制服の少女が、青い炎に身を包んで絶叫を上げていた。&lt;BR&gt;　叫び声は長くは続かず、ぐるりと一回転した少女の身体は、燃え崩れて花びらの向こうに倒れ、姿を消す。&lt;BR&gt;　それと相前後するように、セルフィの周辺で次々と悲鳴が上がる。火柱を吹き上げるようにして、灰色の制服を着た少年少女達が倒れていく。&lt;BR&gt;「な……」&lt;BR&gt;　何が起きているのか、眼を見開いたまま、どうすることもできずに彼らを見つめるセルフィの耳に、自分の名を呼ぶ男の声が届いた。&lt;BR&gt;　振り向けば、花びらの向こうから、屈強な身体の男が自分を呼んでいた。手を差し伸べ、必死の光をその眼に浮かべて、セルフィを見すえている。&lt;BR&gt;　その男の名を、セルフィは瞬時に思い出した。今の今まで忘れ去っていた男の存在を、かつてのセルフィは確かに知っていた。&lt;BR&gt;　幼少クラスの頃から、セルフィを受け持ってくれていた、男性の担当教官――。&lt;BR&gt;「あ……」&lt;BR&gt;　両手で口を覆い、愕然と眼を見開いてセルフィは、あらためて周囲を見回した。&lt;BR&gt;　燃え崩れ、動かなくなった少年少女たちの姿を見つめる。&lt;BR&gt;　能力バランスが取れた者同士、いつもいつも班を組んでいた、仲良しだった者達の変わり果てた姿――。&lt;BR&gt;「――――――！！！！」&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　かしゃん、と。&lt;BR&gt;　何かが壊れたような、音が聞こえた。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　ぱたぱたと、鳥の羽音がする。&lt;BR&gt;　ぼんやりと眼を開き、それで自分が眼を閉じていたことを知った。&lt;BR&gt;　気がつけば花畑も消えている。建物の残骸と、血と、セルフィ達だけが視界に映っていた。&lt;BR&gt;「…………」&lt;BR&gt;　のろのろと顔を上げ、セルフィは青い鳥を見上げた。&lt;BR&gt;（思い出した）&lt;BR&gt;　この青い鳥の姿をした者の名前。きっと、この世界にいる誰もが知っているだろう名前。&lt;BR&gt;　人と相容れるはずのないこの青い鳥を受け入れたことで、トラビアの地で何があったのか、どうして教官やクラスメイトが死に青い鳥を自分が手放したのか、全部。&lt;BR&gt;（スコール……）&lt;BR&gt;　青い鳥から視線をはずし、離れたところで倒れているスコールを見る。息をしているのかしていないのか、この距離ではよくわからない。&lt;BR&gt;　Ｇ．Ｆ．のふりをしたこの青い鳥が、自分たちの手に負える存在ではないことを、長い期間ジャンクションしていたセルフィはよく理解していた。&lt;BR&gt;　条件をのまなければ、このままスコールは死ぬ。セルフィの周囲に傷つき倒れている白いSeeD達も。そして未だ無傷の、セルフィが大切に想う人達も、きっと殺される。セルフィを手に入れるまで、殺戮はきっと繰り返される。&lt;BR&gt;（ママ先生……）&lt;BR&gt;　エスタに降りる直前、ラグナロクでイデアがセルフィに言って聞かせた言葉が、ふいに胸によみがえった。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;「セルフィ、決してそのＧ．Ｆ．を受け入れたりしてはいけませんよ」&lt;BR&gt;　長い黒髪を風に揺らし、真剣な眼差しで、イデアは言った。&lt;BR&gt;「エルオーネが眠りについた今、Ｇ．Ｆ．はあなたの受け入れなしに、あなたを手に入れることはできません。&lt;BR&gt;　きっとあらゆる手段を講じても、あなたを手に入れようと動くでしょう。&lt;BR&gt;　けれど、あなたは決して自分を差し出してはなりません。それは世界の終わりです」&lt;BR&gt;　驚くセルフィに、イデアはまっすぐ視線をぶつけて静かに頷いた。&lt;BR&gt;「あなたを手に入れようとしているそのＧ．Ｆ．は、かつてあなたの封じられた魔法の力を解き放った存在。&lt;BR&gt;　封印を解くことさえできるなら、宿った者の持つ力を自在に操ることなど、訳もないことです。&lt;BR&gt;　あなたが自分では制御できない魔法の力も、意のままに操り、それを人に向けるでしょう」&lt;BR&gt;　防御不能のジエンドを無差別に使われたら、太刀打ちできる者など誰もいない。&lt;BR&gt;　この星すべての生き物を死滅させることも可能な絶対無比の力を、あのＧ．Ｆ．に与えるわけにはいかない。&lt;BR&gt;　だからイデアとサイファー達はセルフィを宇宙に連れ出しても、身柄を確保しようと動いたのだ。こうしてエスタに降りることだって、最後の最後まで反対した。強硬にそれを押し切って地上に戻ったのは、セルフィの意志である。&lt;BR&gt;「大丈夫～！　あたし、ぜ～ったいそんなこと、させないから！」&lt;BR&gt;　大きく頷いて、セルフィは笑った。&lt;BR&gt;　スコールを救うためにセルフィは地上に戻るのだ。そのスコールを殺すかもしれない相手に、自分の力を差し出すような真似をするはずがない。そんな事態になったなら、セルフィは自害する方を選ぶ。&lt;BR&gt;　あっけらかんと笑顔で飛び出していくセルフィを、不安げな表情で、イデアは見送った。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;（あたしを手に入れたら……やっぱりスコール達、殺されてしまうんやろか……）&lt;BR&gt;　いかなSeeDの精鋭だって、ジエンドを自在に使われれば赤子も同然だ。&lt;BR&gt;　セルフィはそんなことはさせたくない。絶対に、そんなことは許せない。&lt;BR&gt;（どないしたら……）&lt;BR&gt;　唇を噛みしめ、必死で考えるセルフィを、無言で青い鳥は待ち続けた。ぱたぱたと続く羽音が、何も言わずにセルフィを追い立てる。&lt;BR&gt;　無駄に時間を使えば、それだけスコールは死に近づき、どんな手だても間に合わなくなってしまう。&lt;BR&gt;　スロット魔法を回している余裕はない。魔法を発動させるそぶりなど少しでも見せれば、その瞬間にスコールが殺されてしまう。&lt;BR&gt;　噛みしめた唇から血が滴るほど焦りながら、セルフィは必死で考える。スコールを死なせずにすむ方法、殺させずにすむ方法――。&lt;BR&gt;（やるしかない……）&lt;BR&gt;　脳裏に浮かんだのは、ひとつ間違えば絶望しか招かない、ぎりぎりの賭け。&lt;BR&gt;　けれどこれ以上成功率の高い手段などセルフィは持っていない。&lt;BR&gt;　無謀は承知で、やるしかない。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　噛みしめていた唇を放し、セルフィは翠の瞳でまっすぐに青い鳥を見つめた。&lt;BR&gt;　決意のこもった眼差しを受け、青い鳥が静かに舞い降りる。視線の高さまで降り、セルフィの言葉を待つ。&lt;BR&gt;　ぐいと唇の血を手の甲で拭い、セルフィは小さく笑った。&lt;BR&gt;（あきらめるわけやない……）&lt;BR&gt;　スコールに告げた通り、最後まであきらめないとセルフィは決めていた。&lt;BR&gt;　最後まで戦う。戦って、ちゃんと勝つ。&lt;BR&gt;　戦わなければ誰も守れない。救えない。&lt;BR&gt;　すうっと息をすいこみ、眼を閉じると、セルフィは静かにその名前を囁いた。&lt;BR&gt;「…………ハイン」&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　蒼い光がはじけた。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　周囲が静かになり、空間を満たしていた殺気がぬぐわれたように消滅した。&lt;BR&gt;（………………）&lt;BR&gt;　身体の痛みにわざと集中し、意識をどうにか保っていたスコールは、ぼんやりと眼を開く。&lt;BR&gt;　何か、遠くで声が聞こえていた気がしたが、誰がなんと言っているのかまではわからなかった。&lt;BR&gt;　死にかけているスコールには、周囲の状況がまったく読めない。人の気配がすることは確かだが、それが誰であるかまではわからない。&lt;BR&gt;　ふっと、自分の上に影ができた。&lt;BR&gt;　誰かが顔をのぞきこんでいる。&lt;BR&gt;　ゆっくりと眼だけを動かし、自分を見下ろす者の姿をスコールは視界に捉えた。&lt;BR&gt;　泣き出しそうにうるんだ翠の瞳が、まっすぐにスコールを見つめている。&lt;BR&gt;（……セルフィ……）&lt;BR&gt;　ゆっくり近づき、スコールの横に腰を落としたセルフィが、今にも泣きそうな切ない表情で、黙ってスコールを見下ろしていた。&lt;BR&gt;（そんな顔……するなよ……）&lt;BR&gt;　悲痛な光を浮かべた翠の瞳に、スコールの胸まで苦しくなる。やっぱり、セルフィはいつだって、笑顔が一番似合っている。涙の代わりに浮かべるあの笑顔ではなく、心から楽しそうに輝くおひさまのような笑顔が。&lt;BR&gt;　そんなスコールの想いも知らず、座ったセルフィは、ゆっくり手をのばし、スコールの頬に触れた。&lt;BR&gt;　血の気をなくし、思った以上に冷たい頬に、セルフィは切ない想いでいっぱいになる。&lt;BR&gt;　出血は続いていた。急所を外してはいるものの、スコールはすでに高所から地面に叩きつけられ全身打撲で瀕死の重傷を負っている。ショック死していないだけでも、奇跡的だった。&lt;BR&gt;　唇を汚した血を指先でそっとぬぐい、眼を伏せて、セルフィはゆっくりとスコールの上にかがみ込む。&lt;BR&gt;　二度目のキスは、血の味がした。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　唇をはずし、セルフィが眼をあけてスコールを見た。&lt;BR&gt;　突然身を苛む激痛から解放され、驚きセルフィを見返すスコールの様子に、にこりと微笑む。&lt;BR&gt;　笑った拍子に、こらえていた涙が一粒、珠を結んでほろりと落ちた。&lt;BR&gt;「……スコール」&lt;BR&gt;　どこかつらそうな様子で、セルフィはそれでもにこにこと笑いながら、静かに告げる。&lt;BR&gt;「時間、あんまりないよ～」&lt;BR&gt;　言って、胸に手をそっと当てた。&lt;BR&gt;「あたしの中にね、ハインがいるんだよ～」&lt;BR&gt;「ハイン？」&lt;BR&gt;　聞き覚えのある名に眉をひそめるスコールに、セルフィはひとつ頷いて見せた。&lt;BR&gt;「……『偉大なる魔女の始祖ハイン』……」&lt;BR&gt;　さらりと呟くそれは、魔女の恐怖にさらされた人々がよく使う、恐れと尊敬をこめた呼び名。&lt;BR&gt;　この星に生きる人間で、歴史上最初の魔女とされるハインの名を知らない者は、赤子以外誰もいない。&lt;BR&gt;「それが……Ｇ．Ｆ．……？」&lt;BR&gt;　眼を見開くスコールに、セルフィは苦笑するような顔をして、また頷いた。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　魔女の始祖ハイン。&lt;BR&gt;　強大な力を持ったハインは、大地を創り、空を創り、そして自身の道具として人間をも創りだした、いわば神話の中の存在である。&lt;BR&gt;　快適に過ごすための道具として人を生み出し、長い眠りについたハインは、しかし次に目覚めた時に星の上いっぱいに繁栄した人間達に仰天した。&lt;BR&gt;　数を減らそうと、ハインは手始めに小さな人間――『子供』を炎で焼き払ってしまった。これが人間の憎悪に火を付けた。人間は団結して、ハインに抵抗をはじめた。&lt;BR&gt;　力で抑えつけようにも、数が多く知恵もある人間に、やりこめられることも数多く、このままでは分が悪いと判断したハインは、人間達と取引をする。&lt;BR&gt;　すなわち、強大な力の半分を人間にやるから、休戦しようという取引だった。&lt;BR&gt;　その力をめぐって、人間達は争った。多くの時間と人血を無駄遣いし、ようやく覇者となった者が手に入れたのは、自ら裂いたハインの半身。しかしそれはあの強大な魔法の力ではなく、物理的な力しか持たない、役立たずのハインの抜け殻だった。&lt;BR&gt;　くだらない争いに人間がかまけている間に、ハインは強大な魔法力のみを持って、その姿をくらましてしまったのだ。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　小さな子供の頃から、おとぎ話の形や学校の授業で習い聞かされる、人類創世の物語。&lt;BR&gt;　やがて人々の間から現れた魔女は、その姿をくらましたハインの魔法力を受け継いだ存在なのだと信じられるようになり、『ハインの末裔』とも呼ばれるようになった。&lt;BR&gt;「……スコール、ハインはね、神様なんかじゃないんだよ～」&lt;BR&gt;　セルフィはぽつりとそう呟いた。&lt;BR&gt;「この星も、人間も、別にハインが創ったものなんかじゃないんだよ。ハインは、人間が今の姿に進化した頃からこの星で生きている存在なの」&lt;BR&gt;　人間よりも長寿で、強大な力を持った、自然の内に生まれた生命のひとつ。&lt;BR&gt;「おとぎ話は、ホントのことじゃないけど、全部嘘ってわけじゃないんだよ。確かにハインは人間と争ったし、数にたのむ人間に追いつめられて、自分の身体を引き裂いたんだよ」&lt;BR&gt;　けれどそのハインの力を巡り、今度は人間同士が争いをはじめた。同族同士で争い合う愚かな命に、ハインは使い物にならない方の力を与え、姿を隠した。&lt;BR&gt;「ハインは物理的な力を全部人間に渡して、魔法の力だけになったから、Ｇ．Ｆ．とおんなじ存在になったんだよ」&lt;BR&gt;　その力があまりに強大なものであったから、ハインはそこに自らの意志を宿し、『生き』続けた。&lt;BR&gt;「けどハインは、人間が嫌いだったから、Ｇ．Ｆ．みたいに人に力を貸してあげようなんて思わなかった。ハインは人間が嫌いだったから、力の一部を人間に受け継がせたんだよ」&lt;BR&gt;　それが魔女。連綿と力を受け継ぎ存在し続けた、ハインの末裔。&lt;BR&gt;「魔女の力は……ハインの呪い？」&lt;BR&gt;　身を起こしながらたずねたスコールに、セルフィは静かに頷いた。&lt;BR&gt;「そう」&lt;BR&gt;　力を巡って、争い合った愚かな人間達。ハインは、自滅することを狙って力を人間に託し、高見の見物を決め込んだ。&lt;BR&gt;「魔女の持ってる力は、ハインの力のほ～んの一部なんだよ」&lt;BR&gt;　スコール達が苦戦してようやく倒したアルティミシアもそう。あれほどの恐ろしい魔女でさえ、ハインの力のほんの一部を受け継いだにすぎない、ただの人間。&lt;BR&gt;「なんで、そんなことを知っているんだ？」&lt;BR&gt;「……ハインが、昔あたしに教えてくれたから」&lt;BR&gt;　にこりと強く微笑んで、セルフィが胸に手を当てた。&lt;BR&gt;「６年前、あたしの中にいたＧ．Ｆ．は、ハインだったんだよ～」&lt;BR&gt;　実体を持たない自律エネルギー体のハインは、固有の形を持っていない。だからどんな姿にもなれる。紺色の髪を持つ白いSeeDにも、蒼い瞳持つセルフィそっくりの少女の姿にも。&lt;BR&gt;　あの青い鳥の姿は、セルフィの望みを受けてハインが姿を変えたものだ。&lt;BR&gt;「そいつが……今、あんたの中に？」&lt;BR&gt;「うん」&lt;BR&gt;　セルフィは強い笑顔のままで頷いた。&lt;BR&gt;「今はがんばって押さえてるけど、たぶん、あんまり長くは持たないと思うんだ～」&lt;BR&gt;　エルオーネの力のように、知らぬ内に自然な形で入り込まれてしまうのでは防御のしようもないが、自ら覚悟の上で受け入れるのであれば、ある程度気構えもできる。気力さえあるならば、本来この身体の持ち主であるセルフィが主導権を握ることも不可能ではない。ハインがほしいのはセルフィの能力である。強引に力をふるって脳細胞を破壊し、使い物にならなくなって困るのはハインである。&lt;BR&gt;　もっとも、ハインは人類創世の神とも言われるほどの存在だ。おそらくさほど時間をかけずに、セルフィの自我はハインの力にのみこまれ、消滅する。ハインがセルフィの身体の主導権を握ってしまう。&lt;BR&gt;「だから、その前に、お願い」&lt;BR&gt;　にこりと笑って、きっぱりとセルフィは言った。&lt;BR&gt;　セルフィの自我が勝っている今しかチャンスはない。ハインであっても封印施設に封印されてしまえば、出てくることはかなわないはずだ。肉体を持たないハインはセルフィを殺されても、死んだセルフィの身体を出てしまえばダメージを受けない。封印するしか、術がない。&lt;BR&gt;「どうして……」&lt;BR&gt;　ようやくセルフィを取り戻したというのに、待っていた現実の過酷さに、スコールは呆然と呟いた。&lt;BR&gt;　一年前、リノアが魔女になってしまった時のことを思い出す。&lt;BR&gt;　絶望に食いつぶされていくような、そんな感覚が心をむしばんだ。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;「スコール……」&lt;BR&gt;　重い沈黙に支配される空間に、穏やかで優しい声が静かに響く。&lt;BR&gt;　振り向いたスコールは、そこに立つ黒い衣服に身を包んだ美しい女性の姿に、眼をまたたいた。&lt;BR&gt;　驚くスコールの視線を受け止め、哀しい顔をしたイデアの背後には、ラグナとオダイン博士もいた。&lt;BR&gt;「あなたに、話があります。私の知る、あなたの知らない過去の話です」&lt;BR&gt;　言ってイデアはセルフィに視線を向けた。&lt;BR&gt;　イデアの言いつけを無視し、ハインを受け入れてしまったセルフィは、後ろめたい思いで視線を伏せる。&lt;BR&gt;　後悔はいっさいしていないが、母代わりのイデアを悲しませるのは本意ではない。&lt;BR&gt;「セルフィ……」&lt;BR&gt;　哀しそうな眼差しでセルフィを見つめ、イデアは静かに続けた。&lt;BR&gt;「あなたは、オダイン博士に診ていただきなさい。あなたの中のハインの力を、少しでも抑えなければなりません。その後のことは、皆で相談しましょう……」&lt;BR&gt;「なんにしろ、とにかく官邸に戻ろうぜ」&lt;BR&gt;　ここからなら、官邸が一番近いし、もっとも被害の少ない施設だ。ラグナの言葉に、イデアも頷いて賛成する。&lt;BR&gt;「どうして……ママ先生が……」&lt;BR&gt;　呆然と呟くスコールに、また視線を戻し、イデアが静かに頷いた。&lt;BR&gt;「それも、説明します。さ、官邸に行きましょう……」&lt;BR&gt;「行こ、スコール」&lt;BR&gt;　するりとスコールの横でセルフィも立ち上がる。&lt;BR&gt;　状況をのみこめず、座り込んだままのスコールを振り返ることなく、ラグナ達の元へと歩いていく華奢な背中は、いつもと同じように、凛としていた。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;&lt;/SPAN&gt;

<script data-viewer-zoom-script>
(() => {
  const stage = document.querySelector('.viewer-stage-image');
  const image = stage ? stage.querySelector('.viewer-image') : null;
  if (!stage || !image) {
    return;
  }

  const setZoom = (enabled) => {
    stage.classList.toggle('is-zoomed', enabled);
    image.setAttribute('aria-pressed', enabled ? 'true' : 'false');
    if (enabled) {
      const naturalWidth = image.naturalWidth || image.clientWidth || 0;
      const targetWidth = naturalWidth > 0
        ? Math.max(naturalWidth, Math.min(Math.round(stage.clientWidth * 0.92), naturalWidth * 4))
        : Math.round(stage.clientWidth * 0.92);
      image.style.width = `${targetWidth}px`;
      image.style.maxWidth = 'none';
      image.style.maxHeight = 'none';
      requestAnimationFrame(() => {
        stage.scrollTop = 0;
        stage.scrollLeft = Math.max(0, Math.round((image.scrollWidth - stage.clientWidth) / 2));
      });
    } else {
      image.style.removeProperty('width');
      image.style.removeProperty('max-width');
      image.style.removeProperty('max-height');
      stage.scrollTop = 0;
      stage.scrollLeft = 0;
    }
  };

  const toggleZoom = () => {
    setZoom(!stage.classList.contains('is-zoomed'));
  };

  image.setAttribute('tabindex', '0');
  image.setAttribute('role', 'button');
  image.setAttribute('aria-label', '逕ｻ蜒上ｒ諡｡螟ｧ縺ｾ縺溘・邵ｮ蟆・);
  image.setAttribute('aria-pressed', 'false');

  image.addEventListener('click', toggleZoom);
  image.addEventListener('keydown', (event) => {
    if (event.key === 'Enter' || event.key === ' ') {
      event.preventDefault();
      toggleZoom();
    }
  });

  stage.addEventListener('click', (event) => {
    if (event.target === stage && stage.classList.contains('is-zoomed')) {
      setZoom(false);
    }
  });

  window.addEventListener('keydown', (event) => {
    if (event.key === 'Escape' && stage.classList.contains('is-zoomed')) {
      setZoom(false);
    }
  });
})();
</script>
