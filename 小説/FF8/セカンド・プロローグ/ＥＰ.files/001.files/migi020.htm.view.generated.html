      &lt;P align=center&gt;&lt;SPAN&gt;* * E P I L O G U E * 
      *&lt;BR&gt;&lt;/SPAN&gt;&lt;/P&gt;&lt;SPAN&gt;&lt;BR&gt;&lt;BR&gt;　今日もバラムはいい天気だった。&lt;BR&gt;　セルフィが退院して、一週間が経過していた。&lt;BR&gt;　リノア達がセルフィの退院日に退院祝いパーティを開き、それに集まったトラビアガーデンの生徒達でしばらくバラムガーデンは賑やかだったが、一週間も経った今は全員トラビアに帰りリノア達もガルバディアに戻ったため、いつもの穏やかさを取り戻している。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;「おっ、こんなとこにいたのかよ～！」&lt;BR&gt;　食堂に響いた賑々しい声に、巨大パフェに挑んでいるセルフィ以外の全員が一斉に声の主へと視線を向けた。&lt;BR&gt;「なんだ」&lt;BR&gt;　相手を認め、スコールが小さく肩をすくめる。ちらりと隣に座るセルフィが視線を上げたが、またすぐ眼の前のパフェに戻して完食への飽くなき挑戦をはじめてしまった。&lt;BR&gt;　セルフィは相変わらず黄色いリボンの制服姿、スコールは漆黒の私服に全身を隙なく固めている。&lt;BR&gt;　二人の傍まで近寄って、今朝ようやく任務から帰還したゼルは呆れ果てた表情でしみじみとそのパフェを眺めた。&lt;BR&gt;「……すっげぇなこれ。オレ間近で見たの初めてだぜ」&lt;BR&gt;　もともと、ガーデンの食堂で出される料理は街などで出される料理よりも一人前が多めになっている。&lt;BR&gt;　育ち盛りの少年少女、それも日々厳しい軍事訓練を受けている彼らの食事なのだから当然なのだが、その一般的に１．５人前で一人前というガーデンの常識から照らし合わせて見て、その超人気売り切れ必至というパフェは３人前以上の分量があった。一般人の眼には、恐らく５人前か６人前くらいに見えるに違いない。&lt;BR&gt;「売り切れ必至というのも、そもそも量を作れないというのが根底にあるらしい」&lt;BR&gt;　いい加減巨大パフェも見飽きて辟易したといった風情で、スコールが溜息まじりに説明した。&lt;BR&gt;「ゲットするの大変だったんだよね～！」&lt;BR&gt;　中のアイスが溶けてしまわないうちにと、素晴らしい猛スピードでパフェをたいらげていくセルフィがにこりと笑顔で補足説明をする。スコールがちょっと眉を上げて叱った。&lt;BR&gt;「……いいから、とっとと食べろ……！」&lt;BR&gt;　言葉と共に手を伸ばし、あどけなさの残る頬に飛んだクリームを指先でぐいと拭う。えへへ～と笑ったセルフィがパフェに没頭したのを見届けて、スコールはゼルに視線を向けた。&lt;BR&gt;「で、用はなんだ？」&lt;BR&gt;　指についたクリームを無造作に舐め取りながら淡々とスコールがゼルに訊ねる。見ているだけで胸焼けがしそうなパフェから視線をどうにか外し、ゼルはスコールと視線を合わせて肩をすくめた。&lt;BR&gt;「あぁ、いや、用あんのこっちなんだけどよ……終わんの待つわ」&lt;BR&gt;「……そうか。そうしてくれ」&lt;BR&gt;　今の状況で下手に話しかけるのは得策ではない。&lt;BR&gt;　頷いて、ゼルはなるべくパフェを見ないようにしてスコールの隣の椅子に腰を下ろした。&lt;BR&gt;&lt;BR&gt;「っていうかお前、いつガーデンに戻ってきてたんだよ」&lt;BR&gt;　確かSeeD復帰直後から忙しく任務に派遣されていたはずだと記憶を探るゼルに、スコールは軽く頷いて手元の水をぐいと飲み干した。&lt;BR&gt;「ただの『伝説のSeeD指名』なだけで、大した任務じゃなかったんだ」&lt;BR&gt;　一国の首相などからの依頼の時は、さほどの戦闘能力が求められていない場合でも、『伝説のSeeDを雇った』という箔をつけるためだけに、わざわざ指名してくることが多いのだ。&lt;BR&gt;　当然ゼルもその手の依頼はよく受けているので、あぁ、と顔をしかめて苦笑いをしてみせる。戦場で命のやり取りをしている身としては、馬鹿げた発想としか思えない。&lt;BR&gt;「まぁ、最近は特にでかい依頼なんざ来ねぇしな……」&lt;BR&gt;　呟くようにゼルがこぼした言葉に、スコールは無表情で静かに頷いた。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　セルフィが退院するのとほぼ同時に、スコールの謹慎処分は解け、通常通りSeeDの任務に出るようになっていた。&lt;BR&gt;　本来はそれより一週間以上早くSeeDの任務に戻れるようになったゼルと同じ復帰になるはずだったのを、なんだかんだと周囲の気配りで延び延びになっていたのだ。&lt;BR&gt;　また最近世界情勢が変化を見せたことで、ＳｅｅＤ稼業も需要がずいぶん減っていた。&lt;BR&gt;　第三次エスタ危機（サード・エスタ・パニック）――今回スコールとセルフィが関わった事件のことを、世間はこう呼んでいる――の影響だ。&lt;BR&gt;　先日ようやくOCSを解除したエスタが出した公式発表は、以前病院でセルフィがアーヴァインに語ったものと大差ないものだった。――いわく、『未知のＧ．Ｆ．がエスタを襲撃し、それを伝説のＳｅｅＤが倒した』というものだ。&lt;BR&gt;　むろん、その公式発表を素直に信じる者はいない。未知のＧ．Ｆ．が魔女に匹敵する、あるいはそれ以上の力を持つ存在であったこと、そしてＧ．Ｆ．消滅後に何者かがその力を使ってエスタ国民の怪我を癒すという奇跡を起こしたことなどの情報は、光速で世界中を駆けめぐっている。その未知のＧ．Ｆ．がどうやら魔女の始祖であったらしいということも含めて、だ。&lt;BR&gt;　世界は今、死にものぐるいで情報収集に励んでいる。戦闘支援のように頭数を必要としない情報戦の依頼がどっと増えたため、ＳｅｅＤの彼らはだいぶスケジュールに余裕が生まれたという訳である。&lt;BR&gt;　もっとも、コンピュータの知識が豊富なSeeD――ゼルなどは例外的に任務量が増しているのだが。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　ぽつぽつと世間話をしている内に、セルフィは見事につつがなく、巨大パフェを完食してみせた。&lt;BR&gt;「うぉすっげぇ～！」&lt;BR&gt;　空になった容器に眼をまるくしてゼルが素っ頓狂な声を上げる。周囲から呆れ半分感心半分の拍手が起こり、セルフィがえっへへ～と得意げに笑って小さな胸を反らせた。&lt;BR&gt;「つーかマジで、お前どこに入ってんだよコレ……」&lt;BR&gt;「どこって胃に決まってんじゃん。こ～んなのちょちょいのちょ～いで食べられなくてど～すんの！」&lt;BR&gt;　勝ち誇ったようにセルフィが笑う。ゼルの顔のげんなり度が数十％ほど増した。&lt;BR&gt;「ちょちょいのちょいで食える分量かっ！」&lt;BR&gt;「え～食べられたよ～？　ゼルの胃ってちっちゃいのかなぁ～？　ちょっと見せてみ？」&lt;BR&gt;「見せてみって……うわぁお前何ガンブレード持ってんだ！！」&lt;BR&gt;　あっさりとスコールの腰のガンブレードを抜いてにこにこと迫ってくるセルフィに、本気で顔色を変えてゼルが立ち上がって逃げ腰になる。きゃらきゃらと鈴を鳴らすように朗らかな声でセルフィが笑った。&lt;BR&gt;「やっだも～！　何マジで逃げてんのよ～！　じょ～だんだってばじょ～だん！」&lt;BR&gt;　無邪気に嬉しそうに笑ってガンブレードを振り回しているその顔は……どこからどう見ても冗談を言っているようには見えなかった。油断すればその場で本当に腹をかっさばきかねない危険な笑顔だ。&lt;BR&gt;　涙目でセルフィから隠れるようにスコールの背中の陰にこそこそと入ってくるゼルに、スコールが額に手を当て大きく溜息をつく。気分はすっかり保父さんだ。嬉しくない。&lt;BR&gt;「……セルフィ、久しぶりだからってあまり苛めるな。せめて段階を踏んでやれ」&lt;BR&gt;　仕方なしに場を治めようとぼそりと口を開いてみる。キスティスかアーヴァインがいれば勝手に治めてくれるのに……と考えていると、セルフィが注意されて面白くなさそうに口をとがらせ、ゼルが「なんだよ段階って！」と耳元で金切り声を上げた。……ますますうるさい。&lt;BR&gt;　うんざりと溜息をつきながら、とにかくセルフィの手からガンブレードを取り返し、元の椅子に座らせると、憤然としているゼルに怜悧な瞳を向けた。&lt;BR&gt;「……とりあえず、話があったんだろう。先にそれを片づけろ」&lt;BR&gt;　セルフィのパフェは無事に完食したのだしと促され、そういえばそうだったとゼルが頭を切り換える。くるんと翠の瞳をまるくしたセルフィが、グラスを両手で持って水を飲みながらゼルを見た。&lt;BR&gt;「あのさ、検査結果がもう出たから、時間できたら保健室来いってよ、カドワキ先生が」&lt;BR&gt;「え？」&lt;BR&gt;　言われたことに、セルフィがごくんと水を一口飲んだ状態で動きを止め、スコールがぴくりと片眉を動かした。&lt;BR&gt;　検査というのは、もちろんエスタ国立病院で入院していた時に受けたＧ．Ｆ．適合検査のことだ。この結果次第で、今後のセルフィの行く末が決定する。&lt;BR&gt;「なんで～？　予定では、来週って聞いてたんだよ～！」&lt;BR&gt;　困惑したようにセルフィがスコールに視線を向ける。一週間の短縮というのはなかなか破格だ。&lt;BR&gt;「……確かに、早いな」&lt;BR&gt;　無造作に腕を伸ばし明るい栗色の髪をぐしゃりとなでてやりながら、スコールもちょっと難しい顔になる。&lt;BR&gt;　どこかで何らかの介入が生じて検査結果が早く出た、そんな感じだ。&lt;BR&gt;「エスタの古狸が口出したに決まってんだろ」&lt;BR&gt;　唐突に背後から響いた低い声に、その場にいた全員が驚いて振り返る。すぐ後ろのテーブルに行儀悪く腰を下ろし、意地の悪そうな笑みを浮かべている男の姿を見て、スコールとゼルが一気に苦い顔になった。もはや条件反射的にこの男に対しては身構える癖がついている。&lt;BR&gt;「あれ～？　サイファーいつの間にそこにいたの～？」&lt;BR&gt;　ただひとりの例外、常にマイペースを崩すことのないセルフィだけが、にっこりと小首を傾げながら無邪気に笑った。&lt;BR&gt;　一瞬だけスコールに垣間見せた不安の色は微塵も感じさせない完璧な笑顔に、スコールは内心やれやれと肩をすくめる。これもまたある意味条件反射だ。無邪気な分、たちが悪い。&lt;BR&gt;「お前がそのバカでかいもんを食い尽くした時からだよ」&lt;BR&gt;　傲然と顔を上げて告げたサイファーに、えへへ～とセルフィが照れたように笑った。&lt;BR&gt;（……褒めてねぇだろ……）&lt;BR&gt;　と、心の中で呟いたのはゼルだけではなかったはずだ。&lt;BR&gt;　サイファーに大して身構えていたはずなのに、いつの間にかすっかり毒気が抜けてしまったスコールとゼルは一度顔を見合わせて、それからおもむろに視線をサイファーへと向けた。&lt;BR&gt;「……エスタが絡んでるというのは？」&lt;BR&gt;　静かにスコールが訊ねる。セルフィもテーブルに頬杖をつきながらサイファーの言葉を待つように視線を向けた。&lt;BR&gt;　答えを待つ瞳を向けられ、サイファーはにやりと満足げに笑い、テーブルに腰掛けたまま長い脚を高々と組んだ。&lt;BR&gt;「エスタの古狸どもが今一番欲しいのはこのお姫さんなんだよ。奴らにとっちゃこいつがSeeDの資格剥奪になった方が都合がいいんだぜ、より早く手に入れることができるからな」&lt;BR&gt;「……何？」&lt;BR&gt;　スコールがかすかに眉を寄せてセルフィを見た。&lt;BR&gt;　サイファーの言葉を聞いて、なんだそういうことかとばかりに、セルフィはひとり合点のいった顔で水を飲んでいる。&lt;BR&gt;　説明を求める視線を感じ、グラスを唇に当てたまま、翠の瞳がそっと伏せられた。&lt;BR&gt;「う～ん、つまりねぇ」&lt;BR&gt;　ちょっとグラスから唇をはずし、言葉を選ぶように小首を傾げながら、セルフィはゆっくりと説明した。&lt;BR&gt;「取り合いっこされてるの、あたし」&lt;BR&gt;　伏せた視線の先にある細い手首をスコールは無言で見やる。&lt;BR&gt;　少し前にスコールがはめた、透明なオダインバングルが輝いていた。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　今、世界がやっきになって捜している『ハインの遺産継承者』が、ここにいる少女であることを知っているのは、エスタ上層部とバラムガーデンだけだ。情報が錯綜して、世界では『伝説のSeeD』と目されているスコールが遺産を継承したのではないかなどとまことしやかに囁かれていたりもするのだが。&lt;BR&gt;　サードパニックで国力が低下したエスタとしては、世界がそうやって様々な情報に翻弄されている今のうちに、『ハインの遺産継承者』であるセルフィの存在を、各国、特に魔女リノアを擁する西の大国ガルバディアに対する威嚇として使う意味でも、あらゆる手段を講じても手に入れたいと望んでいる。&lt;BR&gt;　しかも、『遺産』を封印しているオダインバングルの解除キーは、誰あろう『伝説のＳｅｅＤ』スコールなのだ。セルフィを手に入れれば自動的にスコールも手に入る。……だがバラムガーデンとしては、『遺産継承者』と『伝説のＳｅｅＤ』を両方持って行かれてしまうのは歓迎すべき事態ではない。&lt;BR&gt;　そんなこんなで、セルフィとスコールの意志は完全に置き去りにされたまま、エスタとガーデン間で静かに調整が行われているというわけである。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;「ガーデンとしてはね～、スコールを手元に置いておいて、あたしだけをエスタにって考えてるみたいだよ～」&lt;BR&gt;　説明を終え、セルフィはグラスに入った水をこくんと一口飲み、ふいと視線を遠くへ向けて黙り込んだ。&lt;BR&gt;　復帰直後に任務に駆り出されたスコールと違い、ガーデンにいたセルフィは冷静に情報収集に励んでいたらしい。&lt;BR&gt;　鈴の音を思わせる声が淡々と告げた思惑に、スコールは小さく吐息をついた。&lt;BR&gt;　確かに、現エスタ大統領の実子であり『ハインの遺産』封印解除キーであるスコールがガーデンにいれば、エスタがセルフィを入手してもガーデンが脅威に感じる必要性はまったくなく、むしろ連携は強固なものになる。&lt;BR&gt;　いかにも酸いも甘いも知りつくしたガーデン上層部とエスタの政治家達が考えそうなことだ。&lt;BR&gt;　そして。そういう思惑があるのなら、確かにサイファーの言うとおりセルフィがSeeDでなくなった方が彼らにとっては都合が良いのだろう。人の良さそうな笑みを浮かべつつ煮ても焼いても食えそうにない学園長シドと裏で協定のひとつも結んで、SeeDの資格剥奪が決定した時点で即卒業エスタに就職という取り決めが成されていてもおかしくない。&lt;BR&gt;「あたしとしては～、ま、SeeDでいられなくなっても、学園祭終わるまでは卒業したくないんだけどね～」&lt;BR&gt;　しばらく無言でいたセルフィが、持っていたグラスをテーブルに置き、あっけらかんとした笑顔をようやくスコールに向けて言った。&lt;BR&gt;　スコールは少し考え、かすかに笑い返してやることにした。&lt;BR&gt;「……そうだな。せっかくの合同学園祭だしな」&lt;BR&gt;「そうだよ～！　誰がなんと言おうと、セルフィちゃんから学園祭は奪えないんだからね～！」&lt;BR&gt;　ぐっと小さな手を拳に握りしめて力説するセルフィに、くすりとスコールはまた笑った。&lt;BR&gt;　ふんとサイファーが鼻で笑って視線をそらし、進行している事態におろおろとしていたゼルが、ほっとしたように声を上げた。&lt;BR&gt;「しっかし、よくOK出したよなぁ、トラビアの方がさ」&lt;BR&gt;「ん？　そう？」&lt;BR&gt;「……ホントのこと言うと、SeeDの派遣が決まった時から驚いていたんだけどよ……」&lt;BR&gt;　何しろスコールのカンパも「関係ない人からの援助は受けられない」と断るような生徒達だ。&lt;BR&gt;　何もかもを自分たちで、とこだわる彼らが、SeeDの援助だの合同学園祭だのを容易に承認するとは思いがたい。&lt;BR&gt;「あ、それはね～、あたしが派遣されたからオッケーだったんだよ～！　だってほら、あたしトラビア出身だし～」&lt;BR&gt;　同じSeeD派遣でも、まったくの知らない人間が派遣されてくるよりセルフィが派遣された方が、向こうの心証もずいぶんと変わってくる。&lt;BR&gt;「ま～最初はあたし以外の人が派遣される予定だったらしいんだけどね～、ラグナ様がクライアントとして派遣SeeDをあたしに指名してくれたから、話がスムーズに進んだんだよね～」&lt;BR&gt;「……は？」&lt;BR&gt;　唖然としてゼルとスコールが眼をまるくした。サイファーですらわずかに驚いてセルフィを見た。&lt;BR&gt;　セルフィはそんな男達の反応に、くすりと笑う。&lt;BR&gt;「だって考えてもみてよ～、あたしってＡランクＳｅｅＤだよ～？　ガーデンの中ではかなりの稼ぎ頭になるってわかってて、トラビアガーデンに学園長が出してくれるわけないじゃな～い」&lt;BR&gt;　言われてみればその通り。&lt;BR&gt;　何しろガーデン経営費用の大部分は、ＳｅｅＤ派遣費用が占めている。&lt;BR&gt;　もちろんそれだけで足りるはずもないので、ガルバディアガーデンの経営費用はガルバディア政府からの委託金で補われているし、国民徴兵制で全国民が軍事訓練義務を負っているトラビア政府はトラビアガーデンの経営費用を負担しているが、エスタと提携する以前のバラムガーデンでは、ＳｅｅＤ収益のみが頼りだったのだ。&lt;BR&gt;「……トラビア政府からの依頼だと思っていた」&lt;BR&gt;「あ、もちろん依頼はあったみたいだよ～。でも金額的に、ランク１０くらいのＳｅｅＤを二人雇うのが精一杯程度の契約だったみたい」&lt;BR&gt;　それをＡランクセルフィを雇うだけの金額を追加して、セルフィを派遣するように働きかけてくれたのがラグナなのだ。&lt;BR&gt;　当然その裏でトラビア政府とエスタ政府の間に何らかの交渉ごとが行われたりしたのだろうが、そのあたりはセルフィの知るところではない。&lt;BR&gt;「さすがに今回のエスタ危機で、あたしを雇う余力なくなっちゃったみたいだから、今は元々のトラビア政府からの依頼通り、ランク１０のＳｅｅＤが行ってるみたいだよ～。あたしって前例があったこともあって、けっこううまくやってるみたい。&lt;BR&gt;　ま、だいぶ落ち着きは取り戻してるし、あたしが抜けた時にトラビア政府の兵士も派遣されて、ガーデンに入って来ちゃうモンスターもずいぶん減ったって話だし、あたしがいなくても大丈夫だと思うから、いいんだけどね～」&lt;BR&gt;　言いながらセルフィはひょいと椅子から立ち上がった。彼女の動きに合わせて胸元で揺れた銀鎖のペンダントが涼しげな音を立てる。&lt;BR&gt;　重たそうなパフェの器を両腕で持ち上げると、セルフィはスコール達を順々に見やってにこやかに笑った。&lt;BR&gt;「んじゃま、とりあえず結果聞いてくるね～！　色々ありがと～」&lt;BR&gt;　こだわりなくあっさりとそう言って、軽やかな足取りで男達に背を向けて歩き出してしまう。&lt;BR&gt;　なんとなくぽかんとしたまま、器を食器入れに戻して出て行ってしまう華奢な背中を見送り、直後慌ててスコールが椅子を蹴って立ち上がった。&lt;BR&gt;　放っておくと何でもひとりでやってしまう少女に、甘えるという発想は基本的に存在しない。奔放で執着のないわがままな面と甘えを許さない厳しい姿勢を、矛盾させることなく存在させる彼女の相手をするのはなかなか難しいらしいと、無言で去っていくスコールの背中を見送りサイファーとゼルは同様の感想を抱いた。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　廊下を少し走ったところで、セルフィの小さな背にスコールは追いついた。&lt;BR&gt;　追ってくる足音に気づいて振り返ったセルフィが、きょとんとしたように眼をまるくしてスコールを見つめる。&lt;BR&gt;「ど～したの？」&lt;BR&gt;　足を止め、小首を傾げて訊ねたセルフィに、スコールはちょっと溜息をついて首を振った。&lt;BR&gt;「いや……」&lt;BR&gt;　口で説明するのも馬鹿らしい気がして、スコールはセルフィの小さな手を取るとそのまま歩き出した。&lt;BR&gt;　ちょっと驚いたように眼をまたたいたセルフィが、しかし大人しく手を引かれてスコールについてくる。&lt;BR&gt;　ガーデン内では周囲の眼も気にして、セルフィと必要以上の接触を避けているスコールだけに、珍しいなとセルフィはぼんやり考えた。彼なりに、気を遣っているということなのかもしれない。&lt;BR&gt;（別に平気なんやけどなぁ……）&lt;BR&gt;　今のセルフィは、SeeDに執着するしかなかったあの頃のセルフィではない。&lt;BR&gt;　自分からSeeDを辞めるつもりはもちろんないが、今のセルフィにはSeeD以上に大切なものがちゃんとある。&lt;BR&gt;（ま、そないなのもスコールらしいんやろうけど）&lt;BR&gt;　きっと以前自分が言った言葉をスコールは覚えているのだろう。他人の気持ちを推し量ることに慣れていないスコールは、言葉で「こうしたい」と主張した希望を、そのまま鵜呑みにする傾向がある。&lt;BR&gt;「ねぇスコール」&lt;BR&gt;　保健室に続く渡り廊下に来たところで、セルフィは先を歩くスコールの背中に声をかけた。&lt;BR&gt;　着やせする彼の背中は、こうして見るとあまり広くは感じない。むしろ細身で、この両肩に世界の命運をかけられていただなんて想像もつかないほどだ。&lt;BR&gt;　肩越しに振り返るスコールを見つめながら、セルフィは突然不思議な気持ちになった。&lt;BR&gt;「あのね、あたしね～、全然平気だからね？」&lt;BR&gt;　強がりではない笑顔を浮かべてそう告げれば、スコールの瞳が何かを言いたそうにかすかに揺れた。&lt;BR&gt;　本当にセルフィは不思議だった。こうして見下ろしているスコールは指揮官でも凄腕の傭兵でもなく、ただ不器用な十代の青年だ。セルフィが心の奥底でひっそりと憧れたような、あの無条件に頼りたくなる強さはどこにいったのだろう。&lt;BR&gt;　ずっと先を歩いている人だと信じていたはずなのに、今こうしてセルフィを見つめて困った顔をしている彼は、前でも後ろでもなく、セルフィのすぐ隣に立っている人だった。手を伸ばせば届くほど、すぐ隣に。&lt;BR&gt;「そりゃ、SeeDじゃなくなった自分のことなんて想像つかないけど～、でもね、ど～んな結果になっちゃっても、あたしはぜ～んぜん大丈夫だよ。SeeDより大事なものが、今はあるからね～」&lt;BR&gt;　セルフィの手を握る大きな手が、ほんの少し力をこめた。伏せた瞳が、懸命に何か言葉を探している。&lt;BR&gt;　気持ちを言葉にすることに慣れていないスコールを知っているセルフィは、唇を結んで静かに待った。&lt;BR&gt;　そして、あぁそうか、と心の奥底で納得した。&lt;BR&gt;（おんなじやったんや……）&lt;BR&gt;　十数年ぶりに再会したあの日から。自分とスコールはまったく同じ場所に立っていたのだ。&lt;BR&gt;　自分自身から眼をそらしていたセルフィは、だからそのことに気づかなかった。セルフィとは違う成長の仕方をしたスコールが、自分より先に進んでいるような錯覚を起こしていた。もうひとりの自分自身として、セルフィ自身の理想を投影されたスコールは、だからこそセルフィの眼にいつだって強く頼もしく映っていた。&lt;BR&gt;　ふいに、スコールがつないだままのセルフィの手を少し持ち上げた。&lt;BR&gt;　どれほど自分の中に言葉を探しても、うまい言葉が見つからなかったスコールは、無言のまま空いていた手を服の隠しに突っ込み、小さな包みを取り出すと、自分の手の内にある小さな手の中に握らせた。&lt;BR&gt;　なに？　と小首を傾げて問う翠の瞳に、開けてみるように促す。解放された手の上に乗った小さな包みの紐を、セルフィは不思議そうな顔で器用にほどいて中をのぞいた。&lt;BR&gt;「わぁ……」&lt;BR&gt;　眼を見開いてセルフィが声を上げ、ぱあっと笑み崩れてスコールを見上げた。&lt;BR&gt;「すご～い、種がいっぱいだね～！」&lt;BR&gt;　包みの中に入っていたのは、あの陽光色の花の種。&lt;BR&gt;　視線を受け止め、スコールは軽く頷いた。&lt;BR&gt;「この間ウィンヒルに行った時に、花屋に取り寄せておいてもらったんだ」&lt;BR&gt;　説明すると、セルフィはますます嬉しそうに笑った。&lt;BR&gt;　小さな包みから種をこぼしてしまわないようにぎゅっと胸の前で握りしめる。銀鎖がまた、しゃらりと音を立てた。&lt;BR&gt;「ママ先生のお花畑に、まきに行かなくちゃ～！」&lt;BR&gt;　きっと来年の夏には陽光色の花がまた咲くだろう。考えただけで嬉しい気持ちでいっぱいになって、セルフィは頬を上気させ、スコールを見上げる。翠の瞳をきらきら輝かせた、まるで陽の光に溶けてしまいそうな笑顔で。&lt;BR&gt;　まぶしいものでも見るように、スコールは眼を細めてその笑顔に見入った。&lt;BR&gt;　それは、彼にとって、決して失ってはならない唯一のものだった。人が生きるために呼吸が必要なのと同じくらい、この笑顔はスコールにとって当たり前のように必要で大切なものだった。&lt;BR&gt;　これ以上に大切なものなど、自分の中にはひとつも存在しない。&lt;BR&gt;　そして、それに気づいた瞬間、先ほどのセルフィの言葉の意味が心にしみ込むように理解された。&lt;BR&gt;「……どうしたい？」&lt;BR&gt;　探しても探しても見つからなかった言葉が、するりと唇からすべり出た。&lt;BR&gt;「……？」&lt;BR&gt;　セルフィが小首を傾げてスコールを見上げると、鋭い光を宿した群青の瞳が、射抜くようにセルフィを見つめていた。&lt;BR&gt;「今じゃなくても、いつか俺たちはSeeDじゃなくなる日が来るだろう。……その時、あんたはどこで、どうしたい？」&lt;BR&gt;　たとえ今回の検査でSeeDに復帰できたとしても、20になればセルフィ達はガーデンを卒業することになる。&lt;BR&gt;　セルフィを取り巻く現状では、SeeDの資格剥奪が決定しようがSeeDとして無事卒業しようが、セルフィ自身の意志で将来を決定できる可能性は限りなくゼロに近いのが明らかだ。&lt;BR&gt;　なぜこんなことを聞くのだろうと不思議そうな顔をしているセルフィに、スコールは惚れ惚れするような笑みを浮かべて静かに囁いた。&lt;BR&gt;「外野は気にしなくていい。誰が邪魔しても、俺が連れて行ってやる」&lt;BR&gt;　だからあんたが決めろと促す声に、翠の瞳が揺れた。&lt;BR&gt;（世界の思惑に奪われるなんてまっぴらだ）&lt;BR&gt;　もう力不足で大切なものを奪われて、泣いたりしたくない。&lt;BR&gt;　そのために力をつけて生きてきた。奪われないための力は、充分身につけた。&lt;BR&gt;（誰にも渡さない）&lt;BR&gt;　世界を相手に戦うことになろうとも。セルフィが決めないのなら、さらってでも連れて行く。&lt;BR&gt;　研磨した宝石のような瞳が、言葉以上に雄弁に、セルフィにそれを伝えた。&lt;BR&gt;　ずっと憧れ続けた熱い瞳の奥に宿る独占欲が、紛れもなく自分に向けられていることに改めて気づく。&lt;BR&gt;「……いいよ、どこでも」&lt;BR&gt;　胸が震えるのを感じながら、それでも気丈にセルフィは微笑んだ。&lt;BR&gt;　熱っぽい群青の瞳にのみこまれてしまわないように、まっすぐ視線を返して。&lt;BR&gt;「スコールと一緒のとこに、あたしも行く」&lt;BR&gt;　連れて行ってもらうのではなく。あくまでも自分の意志と力で。&lt;BR&gt;　セルフィの帰る場所はいつだってここなのだから。&lt;BR&gt;「あぁ」&lt;BR&gt;　セルフィの答に、満足げにスコールが笑った。&lt;BR&gt;　どこまでも自分と対等であろうとする彼女の意志が愛しかった。&lt;BR&gt;「じゃあ……とりあえず、行ってくるね」&lt;BR&gt;　大事に種の入った包みの紐をきちんと結び直し、制服のポケットに入れると、セルフィは顔を上げてにこりと強く微笑んだ。&lt;BR&gt;「大丈夫か？」&lt;BR&gt;　訊ねたスコールに、こくんとひとつ大きく頷き、保健室の扉をまっすぐ見すえる。&lt;BR&gt;「だいじょ～ぶだよ～！」&lt;BR&gt;　きっぱりと言いきる声は、いつも通り鈴の音のように凛と響く。&lt;BR&gt;「あ、でも……」&lt;BR&gt;　ふと思いついたように、セルフィが視線をスコールに戻した。&lt;BR&gt;　何かあったかと首を傾げているスコールに一歩近づいて、セルフィは小首を傾げていたずらっぽく笑う。&lt;BR&gt;「一回だけ、ぎゅ～ってして」&lt;BR&gt;　不意を突かれたように、瞬間スコールの青い瞳が大きく見開かれた。&lt;BR&gt;　まっすぐ自分を見上げているいたずらな翠の瞳が甘えている。&lt;BR&gt;　ふっと、スコールの表情が驚きから苦笑に変わった。まったく、かなわない。&lt;BR&gt;　笑い出しそうになるのをこらえるように、腕を伸ばして華奢な身体を抱き寄せる。両腕にぎゅっと力をこめてやると、くすぐったそうにセルフィが笑った。&lt;BR&gt;　一度だけ抱きしめて、すぐに両腕をほどいて解放すると、セルフィがくすくす楽しそうに笑いながら自力できちんと立ってスコールを見上げた。&lt;BR&gt;「じゃあ、行ちきます！」&lt;BR&gt;　にこっと強く笑って、くるりと軽やかな動作でスコールに背を向け、迷いのない足取りで保健室へと歩いていく。&lt;BR&gt;　スコールがかつて憧れ愛した、まっすぐに伸びた背中。その小さな背中の向こうに、新しい戦いの日々が広がっているのがスコールには見える気がした。&lt;BR&gt;　これまで宿命のように進んできた戦いの道ではなく、彼女と自分が自由を獲得するための戦いの道。&lt;BR&gt;　それを進むことすら幸せと感じる自分に気がついて、スコールはセルフィを見つめながら小さく苦笑した。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　セルフィがSeeDの任務に復帰するのは、それから約一週間後のことになる。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;END&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;&lt;/SPAN&gt;

<script data-viewer-zoom-script>
(() => {
  const stage = document.querySelector('.viewer-stage-image');
  const image = stage ? stage.querySelector('.viewer-image') : null;
  if (!stage || !image) {
    return;
  }

  const setZoom = (enabled) => {
    stage.classList.toggle('is-zoomed', enabled);
    image.setAttribute('aria-pressed', enabled ? 'true' : 'false');
    if (enabled) {
      const naturalWidth = image.naturalWidth || image.clientWidth || 0;
      const targetWidth = naturalWidth > 0
        ? Math.max(naturalWidth, Math.min(Math.round(stage.clientWidth * 0.92), naturalWidth * 4))
        : Math.round(stage.clientWidth * 0.92);
      image.style.width = `${targetWidth}px`;
      image.style.maxWidth = 'none';
      image.style.maxHeight = 'none';
      requestAnimationFrame(() => {
        stage.scrollTop = 0;
        stage.scrollLeft = Math.max(0, Math.round((image.scrollWidth - stage.clientWidth) / 2));
      });
    } else {
      image.style.removeProperty('width');
      image.style.removeProperty('max-width');
      image.style.removeProperty('max-height');
      stage.scrollTop = 0;
      stage.scrollLeft = 0;
    }
  };

  const toggleZoom = () => {
    setZoom(!stage.classList.contains('is-zoomed'));
  };

  image.setAttribute('tabindex', '0');
  image.setAttribute('role', 'button');
  image.setAttribute('aria-label', '逕ｻ蜒上ｒ諡｡螟ｧ縺ｾ縺溘・邵ｮ蟆・);
  image.setAttribute('aria-pressed', 'false');

  image.addEventListener('click', toggleZoom);
  image.addEventListener('keydown', (event) => {
    if (event.key === 'Enter' || event.key === ' ') {
      event.preventDefault();
      toggleZoom();
    }
  });

  stage.addEventListener('click', (event) => {
    if (event.target === stage && stage.classList.contains('is-zoomed')) {
      setZoom(false);
    }
  });

  window.addEventListener('keydown', (event) => {
    if (event.key === 'Escape' && stage.classList.contains('is-zoomed')) {
      setZoom(false);
    }
  });
})();
</script>
</body>
</html>
