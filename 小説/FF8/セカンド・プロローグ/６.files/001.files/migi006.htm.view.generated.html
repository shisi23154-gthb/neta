      width=537&gt;&lt;SPAN&gt;&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;「スコール……？」&lt;BR&gt;　官邸の廊下を歩いていたエルオーネは、すさんだ空気を身にまとって帰ってきた弟の姿に眼をまるくした。&lt;BR&gt;「スコール、どうしたの？」&lt;BR&gt;　無表情なので他人にはわかりづらいが、今のスコールがひどくふさいでいることが、エルオーネにはよくわかった。&lt;BR&gt;「……エルオーネ……」&lt;BR&gt;　重い足取りでようやく官邸にたどり着いたスコールは、顔を上げて姉の姿を眼に止め、わずかに表情をやわらげる。それは緊張が解けた証だった。&lt;BR&gt;「なにかあったの？　セルフィと何かが……？」&lt;BR&gt;　傍に走り寄り、背の高い弟の顔をのぞきこむようにして、エルオーネがたずねる。スコールが今日、セルフィに会いに行っていることを彼女は知っていた。&lt;BR&gt;　セルフィの名を出したとたん、スコールの頬に緊張が走る。&lt;BR&gt;　エルオーネにしかわからないだろう、ごくわずかな動揺が、エルオーネの問いの答えを雄弁に語っていた。&lt;BR&gt;「……私の部屋に行きましょう。話してちょうだい……ね？」&lt;BR&gt;　言いながら、自分に付き添ってくれていた紺色の髪の白いSeeDに目配せをしてから、スコールに視線を向けると優しく微笑みかけ、エルオーネはスコールの手を両手で握ると自分の部屋へと促す。&lt;BR&gt;　素直にそれに従いエルオーネの部屋まで連れられたスコールは、扉が閉まるなり重い息をついた。&lt;BR&gt;「何があったの？」&lt;BR&gt;　立ちつくすスコールを部屋の長椅子に座らせ、その脇に立つとエルオーネは優しく促す。　&lt;BR&gt;　スコールは苦しげな表情で姉を見上げ、それからうつむいて重い口を開き、ぽつりぽつりと語り出した。&lt;BR&gt;　先ほど、魔法研究所で自分がセルフィにしたことを。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　どれほど長くそうしていたのかわからない。&lt;BR&gt;　セルフィは、床に座りこんだまま、外の風景を映すモニタにゆるりと視線を向けた。&lt;BR&gt;（あさ……）&lt;BR&gt;　スコールが訪れたのが夕方だったから……一晩が経過してしまったことになる。&lt;BR&gt;　必死に押しとどめていた涙もいつしか止まっていた。全身の力をこめて奥歯を噛みしめていたので、疲労した顎がだるく感じる。眼が腫れぼったくなっていた。&lt;BR&gt;　身体を動かすと、関節が少し痛んだ。固い床に座り込んだままだったのだから、当然だ。&lt;BR&gt;　のろのろと身体を起こし、今更のようにベッドに腰をおろした。&lt;BR&gt;「…………」&lt;BR&gt;　膝の上に視線を落とし、セルフィはまたしばらくその姿勢のまま凝固した。&lt;BR&gt;　一晩のうちに、気がついてしまった、ひとつの真実。&lt;BR&gt;（あたし……）&lt;BR&gt;　もうずっと、ずっと前から、懸命に気づかないようにしていた想い。&lt;BR&gt;　望みなどないことはわかっていたから。自分には必要のないものだと思っていたから。ずっと気づかないように、気づかないように、眼を閉ざしてきた。&lt;BR&gt;「ばか……」&lt;BR&gt;　かすれた声で、セルフィは眼の前にいない男に呟いた。&lt;BR&gt;　こんな想いを抱かせて、そらした眼の前に突き出す男が憎らしい。&lt;BR&gt;「ばかばかばか……」&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;（……？）&lt;BR&gt;　そうしてまたしばらく時間が経過して、セルフィはふと不穏な気配を感じて顔を上げた。&lt;BR&gt;　物音がしたというわけではない。音波も電波も遮断する部屋であれば、外の音が聞こえるはずもない。&lt;BR&gt;　けれど、それはSeeDとしていくつかのミッションをこなしたセルフィが肌で何度も感じた感覚。&lt;BR&gt;　きゅっと眉をひそめ、立て膝になってすぐ動ける体勢になる。武器は常にベッドの脇に置いてある――。&lt;BR&gt;　シュッと遠くで、多重構造になっている扉の外側が開く音がした。&lt;BR&gt;（…………！）&lt;BR&gt;　ごくりと息をのみ、全身を緊張させ耳をそばだてる。&lt;BR&gt;　数秒の間をおいて、シュッと音を立てて扉が開いた。&lt;BR&gt;　どこかで見た長身が、開いた扉の向こうに立っている。&lt;BR&gt;「えぇ～？　なんで～？」&lt;BR&gt;　ぽかんと口を開いて、セルフィはヌンチャクを握りしめる手の力をわずかにゆるめた。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;「スコールは……セルフィに自分を重ねているのね」&lt;BR&gt;　時を少し遡り、真っ暗状態で帰ってきたスコールから話を聞いたエルオーネは、穏やかな眼差しで静かにたずねた。&lt;BR&gt;　話している間中彼女は長椅子のすぐ横に立っていたのだが、今は長椅子の脇にあるベッドに腰をおろしていた。&lt;BR&gt;「よく似ているもの」&lt;BR&gt;　微笑む彼女に、スコールが顔を上げた。&lt;BR&gt;　その顔にありありと彼女の言葉に対する疑念が浮かんでいたので、エルオーネはくすっと笑ってしまう。&lt;BR&gt;　無表情で他人を寄せ付けないスコールと、常に笑顔で誰の心にも溶け込むセルフィと。&lt;BR&gt;　確かに一見すると、ふたりは磁石のプラスとマイナスみたいに正反対だ。&lt;BR&gt;　だが。&lt;BR&gt;「そうね、これはたとえ話なんだけれど……植物の種があるとするわね」&lt;BR&gt;　突然話を飛ばしたエルオーネに、怪訝そうな表情のままスコールは黙って頷く。&lt;BR&gt;「この植物は、砂漠に生息する植物だったとするわ。でも、風が強くて飛ばされたり、渡り鳥のお腹に入ったりして、別の大陸に飛ばされたとするわね。そこは、森がたくさんある大陸なの。&lt;BR&gt;　砂漠に落ちたままの植物と、森に運ばれた植物は、その場所に適するように進化を遂げる。これはガーデンで習ったでしょ？&lt;BR&gt;　砂漠で進化する植物は、乾いた砂の上で、時々降る雨を水分に生きなくてはならないから、自然に水をたくわえても大丈夫なように肉厚の葉になるし、空気中の細かい水蒸気をより多く吸収しなければならないから、葉の形状はどんどん細くなる。&lt;BR&gt;　対して森で進化する植物は、木が茂っているからより大きく葉を広げて日光を少しでも多く吸収しようとするし、地中に水が蓄えられているから、根はどんどん深く張っていくわよね。虫たちに気がついてもらえるように、綺麗な花だって咲かせるかもしれない。&lt;BR&gt;　このふたつの植物は、見た目は全然違って見えるけど、もとは同じ植物の種よ。ただ環境に適応するために、姿を変えて成長しただけなんだわ」&lt;BR&gt;　そこでエルオーネは言葉を切り、スコールに向けて優しく微笑んだ。&lt;BR&gt;「あなたたち、元は同じ種だったんじゃないかと思うの。&lt;BR&gt;　寂しいのをとても嫌っていて……寂しくならないように、悲しい思いをしないように、毎日を生きてる。&lt;BR&gt;　ただ、セルフィは誰からも愛されることで寂しさを回避して、スコールは自分からすべてを拒絶することで、拒絶される悲しさを回避しようとしただけ。&lt;BR&gt;　スコールにとって、セルフィはなれなかったもうひとりの自分だったんだわ」&lt;BR&gt;　ようやく、スコールにもエルオーネの言わんとすることがおぼろげにわかった気がした。&lt;BR&gt;　壊れ果てたトラビアガーデンで、たくさんの墓石を前に笑顔で語りかけるセルフィの、小さな背中を思い出す。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　トラビアガーデンがミサイルで攻撃されたあの時、セルフィはたくさんのものを失った。&lt;BR&gt;　故郷の風景、一緒に育った家族同然の友人、そのほとんどを失った。&lt;BR&gt;　仲間の誰もがセルフィを気遣った。スコールも、顔には出さなかったがもちろんセルフィがショックを受けているだろうことくらいわかっていた。&lt;BR&gt;　アーヴァインを筆頭に皆が彼女をなぐさめる言葉を懸命に考えていた。……それを拒絶したのは、他ならぬ彼女自身だった。涙ひとつ人前では流さずに、日記でぽつりとこぼした以外、泣き言を口にしなかった。&lt;BR&gt;　他人からのなぐさめの一切を笑顔で拒絶し、凛と背筋を伸ばして朗らかに笑い、喪失の痛みに耐えていた小さな背中を、スコールはずっと忘れられずにいた。リノアを失った自分の醜態を後に思い返すにつけ、あの姿はいっそう鮮やかに胸の奥に刻まれていた。&lt;BR&gt;　笑顔で他者と距離を保ち、笑顔で他者の過干渉を拒み、誰に対しても公平であるがゆえに誰にも頼らず、けれど頼られれば互いの負担にならない程度に助ける、そうやってひとりで生きる力を身につけてきたのだろう。&lt;BR&gt;　誰にでも公平なのは、不公平から来る嫉妬を生むのを避けるため。&lt;BR&gt;　時折毒のある言葉を口にしても（素なのだろう、あれは）、あの笑顔が毒気を奪ってしまう。&lt;BR&gt;　スコールが誰からも傷つけられないように拒絶の鎧を心にまとったように、セルフィは笑顔の鎧をまとって、誰からも憎まれないように生きてきたのだ。&lt;BR&gt;　それは、エルオーネを失って、ひとりでも平気なように、ひとりで生きられるようにと、ずっと肩肘を張って生きてきたスコールと、とても良く重なる感情。&lt;BR&gt;　違うのは、スコールはただ拒絶する術しか知らず、他人の荷物を引き受けることができなかったということだけ。&lt;BR&gt;　そんなスコールにとって、誰の存在をも受け入れなおひとりで立っているセルフィは、はじめから放棄してしまった自分の理想の姿だったのだ。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;「人間って、自分との共通項を持つ人間に対しては好意的になるものよ。逆に完全に正反対の存在には、反発しながらも惹かれ合うの。あなたとリノアが後者なら、セルフィは前者だったんだと思うわ。&lt;BR&gt;　だって私は、セルフィがスコールに良く似ていたから、あの笑顔の意味に気づいたんだもの」&lt;BR&gt;　エルオーネの視線はスコールに一番に向けられている。他の弟妹たちだって可愛い存在だが、レインの忘れ形見のスコールは別格だ。スコールも、エルオーネにだけは心を開いた。この世の誰より、エルオーネはスコールのことを理解している。&lt;BR&gt;　そのスコールと同じ鎧を心にまとっていたから、セルフィの存在はエルオーネの眼に止まったのだ。&lt;BR&gt;「……だから私は、セルフィが笑えば笑うほど、スコールが冷たい言葉を口にするのと同じくらい、辛かった」&lt;BR&gt;「…………」&lt;BR&gt;　切なげに微笑むエルオーネに、スコールの胸がかすかに痛んだ。&lt;BR&gt;　今のスコールの心は鎧を必要としていない。リノアとの出会いが、スコールをセルフィより一歩先に進めさせた。&lt;BR&gt;　だがセルフィは、今もあの頃と同じ場所に留まっている。人懐っこい笑顔を振りまいているから、誰もセルフィの孤独に気づかない。リノアのように心をこじ開けるような者もいない。&lt;BR&gt;「だからスコールも辛くなったんでしょう？」&lt;BR&gt;　リノアによって鎧をはずされたスコールの眼に、セルフィの笑顔の鎧は痛々しく映ったから――。&lt;BR&gt;（それじゃあリノアと同じじゃないか……）&lt;BR&gt;　スコールは視線を伏せて、心の中で呟いた。&lt;BR&gt;　相手の心の有り様を良しとせず、自分の望むままに変えようと働きかける。&lt;BR&gt;　リノアは言葉を叩きつけることでスコールの心をこじ開けようとしたが、スコールの場合は口が回らないためより直接的な――最低な方法をぶつけてしまった。&lt;BR&gt;　……確かにスコールにとってリノアのそれは良い方向に作用した。だが常にそうとは限らない。&lt;BR&gt;　人は個人を決定するのに決して譲れない、核の部分というものを持っている。それすら染め変えようとするならば、それは人格そのものを否定し、崩壊させようとするものだ。&lt;BR&gt;　自分はまさにそれと同じことをセルフィに対してしたのではないだろうか？&lt;BR&gt;　困惑と自己嫌悪にかられるスコールに、エルオーネは眼を細めてそっと微笑んだ。&lt;BR&gt;「あなたは、ずっと自分が嫌いだった。変わりたいって、そう望んでいた。&lt;BR&gt;　だから、リノアがあなたを変えようとした時、反発しながらもそれを受け入れた。&lt;BR&gt;　セルフィは、今の自分で良いと思ってる。どんな状況だって楽しくしていられて、周りにはたくさんの友達がいて、『特別』を手に入れなくても、あの子は抱えている寂しさをちゃんと紛らわせることができているから。&lt;BR&gt;　小さい頃からセルフィってそういう子だったわ。あの子は眼の前にあるどんなことでも楽しむことができる。眼の前にないものは、あの子にとって存在しないものなのよ。望んだり夢見ることも決してしない。&lt;BR&gt;　自分だけのもの、特別なもの、そんなものはこの世に存在しないって、そんなふうに考えている子供だった」&lt;BR&gt;　手に入らないものがあまりに多すぎた、孤児だったセルフィ。&lt;BR&gt;　限られたものしか手に入らないから、手に入れたものすべてを全力で楽しんで、叶わない夢を見ないことで失望を回避して。&lt;BR&gt;「もしセルフィが自分を変えたいと願うようになってほしいなら……まず誰かがセルフィに、セルフィだけの『特別』が手に入るのだと、教えてあげなくてはならないわ。&lt;BR&gt;　あの子は自分だけが独占できるものは、自分自身以外にないと思っているの。だからはじめから無謀な望みは抱かない。手をいっぱいに伸ばしたぎりぎりの先にある、実現可能の夢しか見ないの。&lt;BR&gt;　誰かが、あの子が望んだものは手に入れることができると示してあげなくてはいけないんだわ。&lt;BR&gt;　スコール、あなたはセルフィの特別になれるのかしら？」&lt;BR&gt;　最後の言葉にスコールはぎょっと眼をむいた。&lt;BR&gt;（セルフィの特別？）&lt;BR&gt;　セルフィに、無謀に見えても成就を望ませるほどの思慕を抱かせることのできる人間。&lt;BR&gt;　抱いた思慕に、思慕をもって応えることのできる存在。&lt;BR&gt;　そんな存在になれるかと問うエルオーネに、スコールは視線を伏せることしかできなかった。&lt;BR&gt;　あれほど露骨に愛情を向けてくるリノアの気持ち一つ満足に受け止めきれない自分に、そんな存在になれる自信なんてかけらもない。&lt;BR&gt;　うつむいてしまったスコールに、エルオーネはかすかに微笑んだ。&lt;BR&gt;「……難しく考える必要はないのよ。必要なのは、気持ちだけだから」&lt;BR&gt;　そこでいったん言葉を止め、エルオーネはまっすぐにスコールを見つめて言葉を続けた。&lt;BR&gt;「スコールは、セルフィが好き？」&lt;BR&gt;　優しくたずねられ、スコールはわずかに眉を寄せてエルオーネを見返していた。&lt;BR&gt;（好き……？）&lt;BR&gt;　それはきっと、仲間に対する好きとは違うもので。&lt;BR&gt;（……セルフィが……？）&lt;BR&gt;　冷静にたずねられ、今更ながら先ほどの行為を思い出し、スコールは顔に血が昇ってくるのを感じた。&lt;BR&gt;　泣く代わりに浮かべる痛々しいセルフィの笑顔とか、唇を重ねた直後の驚愕に見開かれた翠の瞳や、初めて見た怒りと哀しみのないまぜになった泣き濡れる瞳がいっせいに脳裏によみがえる。&lt;BR&gt;（俺……）&lt;BR&gt;　たくさんのセルフィの姿が脳裏に一気に浮かび、そしてそれがたったひとつの光景に収束されていく。&lt;BR&gt;　一年も昔の、寂しい墓場で見た小さな背中。涙をこらえて微笑んで立っていた華奢な姿。&lt;BR&gt;　何を言われても嫌悪感を抱くことのない少女だった。そういう意味では初めから特別だった。けれどそれが明確に特別だと認識される、そのきっかけとなった、あの日のセルフィ。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;（綺麗だと……思ったんだ……）&lt;BR&gt;　凛としたあの背中が。ぴんと伸びた背筋が。傷ついても、なお前を向き続ける翠の瞳が。&lt;BR&gt;　無邪気で過激な天然ボケの性格だけではない、あの芯の通った姿勢が、綺麗だったのだ。&lt;BR&gt;　それからずっと、あの日の小さな背中はスコールの心のどこかにあった。&lt;BR&gt;　意識されることもないほど自然に、当たり前のように、理想的な形で心の中にしまいこまれていた。&lt;BR&gt;　リノアと激しい恋に落ち、周り中が見えなくなって、リノアの姿ひとつを追い求めていた時も、ずっと変わらず心の中に大切に保存されていた、記憶。&lt;BR&gt;　ひとつの恋が終わりを告げ、真剣に自分自身と向き合おうとしたその時に鮮やかに浮かび上がり、自分を導いたもの。&lt;BR&gt;　トラビアに行ってしまい、長いこと会うことがなくても、セルフィはいつでもスコールの中にいた。&lt;BR&gt;　激情に流されるようだったリノアに対する想いとは違う、とても自然で、けれどとても特別な想いに守られて、ずっとスコールの中にいたのだ。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　無言であれこれ考え出してしまった弟の様子に、どうやらこれは本当に自覚ゼロであったらしいと気づいたエルオーネは、くすりと気づかれないように小さく笑った。&lt;BR&gt;　あれほど恋い焦がれたリノアに対してさえ、喪失の危機に直面しなければ自覚できなかったスコールだ。彼らしいといえば至極、彼らしいのかもしれない。&lt;BR&gt;　そんなことを考えながら、かすかに寂しそうに微笑んだエルオーネは静かにスコールを見つめ、優しい言葉をかけるべく口を開く。&lt;BR&gt;　だがその言葉は、扉の外で響き渡った激しい声にかき消され、スコールの元には届かなかった。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　一晩を徹してスコールとエルオーネが部屋の中で語り合う中、エルオーネについている紺色の髪の白いSeeDは部屋の前で姿勢良く立っていた。&lt;BR&gt;　深夜から空が白み始めるまで、ふたりが出てこないため根気よく立っていた白いSeeDは、廊下を歩いているる大統領の姿に気づき驚いた。&lt;BR&gt;「大統領……！？」&lt;BR&gt;「おう、どうしたんだ？　こんなとこで」&lt;BR&gt;　紺色の髪の白いSeeDは部屋の中を指し示した。&lt;BR&gt;「スコールとエルオーネが中にいるので、その警護を」&lt;BR&gt;「ふたりでか？　けしからんヤツだな～」&lt;BR&gt;　冗談めかして笑うラグナに、白いSeeDも静かな笑顔を見せる。&lt;BR&gt;「大統領こそ、こんな明け方にどうされました」&lt;BR&gt;「な～んか眼が覚めちまってよ。散歩だ散歩」&lt;BR&gt;　官邸の中だけでは気分も盛り上がらないが、身体を動かしていたかったらしい。&lt;BR&gt;　そうして穏やかに談笑している最中、突如白いSeeDがビクッと身体を震わせ、表情を険しくした。&lt;BR&gt;「……！！」&lt;BR&gt;　全身を殺気立て、恐ろしい気配を突如身にまとった白いSeeDの変貌ぶりに、ラグナが驚いて笑顔をひっこめる。&lt;BR&gt;「ど、ど～した？」&lt;BR&gt;「あ……いえ……」&lt;BR&gt;　ハッとラグナの存在に意識を留め、慌てたように白いSeeDは首を振る。&lt;BR&gt;　しかし、彼がすでに別の場所に心を飛ばしていることは、いかに鈍いラグナであろうとも良くわかった。&lt;BR&gt;「……なんかあったか？」&lt;BR&gt;「いえ……」&lt;BR&gt;　完璧なポーカーフェイスを取り戻した白いSeeDは、しかしどこか焦燥しているように見受けられた。&lt;BR&gt;　気詰まりな沈黙が場を支配する。それを破ったのは白いSeeDが身につけていた通信機だった。&lt;BR&gt;　発信音を止め、ラグナにも聞こえるよう音量を大きくして通信をオンにする。&lt;BR&gt;　白いSeeDの仲間の、切羽詰まった叫び声が廊下に響き渡った。&lt;BR&gt;『魔法研究所へ至急集合！　防御室保護対象が奪われた！！』&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　防御室保護対象――それがセルフィ・ティルミットであることを、知らない者はその場にいなかった。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;「何があったんだ！？」&lt;BR&gt;　部屋の中から白いSeeDの通信を聞き、血相を変えてスコールが魔法研究所に飛び込んだのは数分後。&lt;BR&gt;　エルオーネはとりあえず、紺色の髪の白いSeeDを付けて部屋に置いてきた。&lt;BR&gt;「スコール、すまない。僕らの失態だ」&lt;BR&gt;　魔法研究所に詰めていた白いSeeD達が、申し訳なさそうに謝罪した。&lt;BR&gt;　だがその全身が朱に染まっているのを見て、スコールの勢いがわずかに殺がれた。&lt;BR&gt;　治癒魔法で傷自体は治っている。だがその白い制服についた血痕と損傷が、彼らの傷がどれほどのものであったかを物語っている。&lt;BR&gt;「一体何が……」&lt;BR&gt;　振り返って見回せば、その時間研究所にいた職員を含め、全員かなりのダメージを負っていた。&lt;BR&gt;「突然かまいたちのような風が吹いて、部屋の奥にいた者はその風に切り刻まれて意識を失った。&lt;BR&gt;　入口付近にいた僕たちは、突然襲われて……何か剣技のようなもので倒された。相当の手練れだった。&lt;BR&gt;　一撃で致命傷に近い傷を負わせ、さらに魔法で僕らは眠らされ……目覚めた時にはセルフィは……」&lt;BR&gt;（魔法と武器攻撃で重傷を負わせて……眠らせたと言うことは殺す気はなかったということなのか？）&lt;BR&gt;　SeeDを名乗るくせにスリプルひとつ防御できない彼らに対して言いたいことがないわけではなかったが、過ぎたことをどうこう言っていても仕方がなかった。&lt;BR&gt;（セルフィ……）&lt;BR&gt;　防御室を覗き込む。外の荒れようからは嘘のように、部屋の中に戦闘の痕跡はひとつもない。&lt;BR&gt;（抵抗しなかったということか？）&lt;BR&gt;　セルフィは軟禁状態にあったが、武器は密かに携帯を許されていた。何者かが彼女を傷つけようとすれば抵抗しないはずはないし、ああ見えて彼女の戦闘能力は侮れない。&lt;BR&gt;　抵抗する間もなく囚われたと考えるよりは、抵抗しなかったと考える方が自然だ。&lt;BR&gt;　眠らされた職員たちを人質に取られたのか、あるいは顔見知りの犯行だったのか――。&lt;BR&gt;「これはどういうことなのだ……」&lt;BR&gt;　その時、遅れて大統領秘書官が数名飛び込んできた。あまり直接言葉を交わしたことのない老人たち。&lt;BR&gt;　無言で振り返り、ざっと記憶の中を探って彼らの名を思い出した時、ひとりの秘書官がスコールを睨んだ。&lt;BR&gt;「説明してもらおう」&lt;BR&gt;（説明？　説明してほしいのはこっちだぞ……）&lt;BR&gt;　とっさに何を言われているのかわからず、スコールは無表情を継続したまま静かに彼らを見返した。&lt;BR&gt;「逃がした……というわけではないのかね」&lt;BR&gt;　秘書官が続けて言った言葉に、スコールの眉がぴくりと動いた。&lt;BR&gt;　唇の端がわずかに下がる。仲間が見れば、スコールの機嫌が今かなり直滑降ぎみになっていることを察知したことだろう。&lt;BR&gt;「意味がわかりませんが」&lt;BR&gt;　冷静冷静冷静、と頭で繰り返しながらスコールが静かにたずねる。&lt;BR&gt;「重要参考人のあの娘はバラムガーデンのSeeDだろう。……隠す必要はない、計画は私たちも知っている。&lt;BR&gt;　我々に身柄を押さえられれば困ると思い逃がしたのではないのかね。この状況を見れば、魔法研究所を襲った敵は相当の手練れだろう。&lt;BR&gt;　……SeeDレベルの、な」&lt;BR&gt;　最後の言葉を意味ありげに呟く秘書官に、スコールはますます血が頭にのぼりつつも、冷静冷静冷静冷静冷静と口の中で呟いてやりすごした。&lt;BR&gt;　下手な言動はできない。今この自分の言動ひとつでセルフィの処遇が決まる――。&lt;BR&gt;　それだけではない、万が一セルフィが武器を持っていたことが知れれば、それを許したラグナにまで非難は向けられる。セルフィが事件の首謀者だと断じられ、それを庇ったなどとわかったら――？&lt;BR&gt;「ガーデンに、エスタとの友好関係を断ち切る意志はまったくありません」&lt;BR&gt;　しかしスコールは口下手だ。アーヴァインでもいれば任せてしまうのにと思いながら、スコールは現状打破のために口を開いた。&lt;BR&gt;「それに俺はSeeDです。万が一セルフィがこの事件の首謀者であるなら、身内の恥は身内で雪ぎます……隠すなんてことはしない」&lt;BR&gt;&lt;BR&gt;　――――あたしを……殺していいよ。&lt;BR&gt;&lt;BR&gt;　涙をこぼして微笑んでいたセルフィの声が、ふいに胸によみがえる。&lt;BR&gt;（大丈夫だ）&lt;BR&gt;　いなくなったセルフィに、スコールは心の中で呼びかける。&lt;BR&gt;（大丈夫……あんたの望みは、俺がちゃんと守ってやる……）&lt;BR&gt;　どんな形であれ、セルフィは最後までSeeDでありたいと望んでいた。&lt;BR&gt;　切ないほど真摯なその願いを、スコールは絶対に守ってやりたかった。&lt;BR&gt;「セルフィはSeeDでありながら敵に利用されました。それは後日、責任を取らねばならないでしょう。&lt;BR&gt;　ですがセルフィ自身が首謀者ではありえない。彼女をガーデンが匿う理由もない。&lt;BR&gt;　SeeDひとりのために大国エスタを敵に回すくらいなら、ガーデンは俺にセルフィを討てと命じるはずです」&lt;BR&gt;　組織とはそういうものだ。エスタとの友好関係とセルフィと、どちらを取るかと迫られれば、シドは間違いなくエスタを取る。&lt;BR&gt;　もちろん、スコールがそれに従いセルフィを見捨てるつもりは毛頭なかったが。&lt;BR&gt;（あんたの望みも……命も……）&lt;BR&gt;　可能なら、両方守る。固い決意をこめ、スコールは秘書官を見すえた。&lt;BR&gt;「セルフィが消えた件に関して、ガーデンはノータッチです。……セルフィを捜索する許可を求めます」&lt;BR&gt;　秘書官はじろりとスコールを睨み、小さく息をついた。&lt;BR&gt;「……そちらの身内のゴタゴタに、我らを巻き込むつもりかね？」&lt;BR&gt;「俺の任務は大統領を襲った者の割り出しと身柄の拘束です」&lt;BR&gt;　スコールは秘書官の視線を受け止め、ついでに睨み返しながら言い募った。&lt;BR&gt;「セルフィを連れ去った者は十中八九今回の事件の黒幕か、それに通じる者の犯行であると考えられます。&lt;BR&gt;　彼女の捜索は任務遂行に必要です。……許可を頂けないなら、それでも結構。&lt;BR&gt;　俺は大統領と直接話します」&lt;BR&gt;　強気のスコールの発言に、秘書官はにやりと笑った。いささか人の悪い笑みだった。&lt;BR&gt;「許可は出そう。だが……監視を数人つけさせてもらう」&lt;BR&gt;　スコールは自分の頬がぴくぴく動いているのを自覚したが、懸命に無表情を維持し続けた。&lt;BR&gt;「……けっこうです。俺がセルフィを逃がすようなことがあれば俺を殺してくれてかまわない。&lt;BR&gt;　その代わり……俺がどんな手で彼女を捜そうとも口出しは無用です。彼女が次に俺たちの前に現れた時も、手出しは無用……。&lt;BR&gt;　SeeDにはSeeDの流儀があります。セルフィが敵に寝返るなら俺が倒します」&lt;BR&gt;　秘書官が面白くなさそうに笑って頷く。&lt;BR&gt;　それを見ながら、今の言葉をセルフィはどう評価するのだろうと……スコールは頭の片隅で考えていた。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　スコールが秘書官と対決している最中、大統領官邸では招かれざる客をふたりほど迎えていた。&lt;BR&gt;「……ねぇ、リノア～……なんかやっぱりまずいんじゃないのかな～？」&lt;BR&gt;「なによ、ここまで来て怖じ気づいたってわけ？　嫌ならあなただけ帰ればいいじゃない！」&lt;BR&gt;　非常に気弱な男の声と、非常に苛立った女の声。&lt;BR&gt;　……妙に静かな官邸に、その声はきんきんとよく響いた。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;（……あら？）&lt;BR&gt;　自室にいるよう命じられ、ただひたすらセルフィの無事を祈っていたエルオーネは、聞き覚えのある声が廊下から響くのに眼をまるくした。&lt;BR&gt;（あの声……）&lt;BR&gt;　と、頭上でかすかな舌打ちが聞こえた。&lt;BR&gt;　眼を上げると、常に穏やかさを失わない紺色の髪の白いSeeDが苛立たしげに扉の方を睨んでいた。&lt;BR&gt;（……？）&lt;BR&gt;　声をかけようかとエルオーネは迷い、それからふと彼の名を思い出していなかったことに気がついた。&lt;BR&gt;　そういえば、スコールとセルフィがエスタに来たあの日の朝、彼の名を思い出せず、結局未だに呼んだことがなかったのだと今更ながらに思い出す。&lt;BR&gt;（……いいえ、そうじゃない。おかしいのは、名前を思い出せないことだけじゃなくて……）&lt;BR&gt;　瞬間、紺色の髪の青年がくるりと振り返った。&lt;BR&gt;　底のない深淵をのぞきこんだような、温度のない蒼の瞳がエルオーネの瞳をのぞきこむ。&lt;BR&gt;　意識が一瞬、蒼い瞳に染まりかけ――だが、すんでのところで引き戻された。&lt;BR&gt;（この人は誰？）&lt;BR&gt;　ぱちん、と泡がはじけるように、エルオーネの意識が明確になる。&lt;BR&gt;　まるで今まで、目隠しをされていたかのように、忘れていた疑問が頭に浮かぶ。&lt;BR&gt;（誰かこの人の名前を呼んだことがあった？）&lt;BR&gt;　彼と共に来た白いSeeDたちでさえ、彼の名を呼ぶところを見た覚えはない。&lt;BR&gt;（私はこの人と船に乗ったことがあった？　白いSeeDの船に彼はいた？　いいえ、いなかった……！）&lt;BR&gt;　青年がかすかに苛立ったように顔を険しくする。エルオーネの意識に何かが手を伸ばす。&lt;BR&gt;（――――！！）&lt;BR&gt;　その感覚をエルオーネは知っていた。&lt;BR&gt;　遠い昔に、そしてそれほど昔でもない過去に……何度も体験して、知っていた。&lt;BR&gt;「入ってこないで！！」&lt;BR&gt;　エルオーネは叫びながら立ち上がった。一生懸命に頭の中で、今浮かんだ疑問を抱きしめる。&lt;BR&gt;　自分の意識で自分を満たすように心がけながら、エルオーネは眼の前に立つ青年を見た。&lt;BR&gt;「あなたは誰？」&lt;BR&gt;　ぎゅっとストールを握りしめ、エルオーネはたずねた。&lt;BR&gt;　紺色の髪の青年は黙ってその疑問を受け止める。唇に穏やかな微笑が浮かぶ。&lt;BR&gt;　だがそんな笑顔にエルオーネは騙されない。&lt;BR&gt;「ラグナおじさんは……敵は未来にいるって、そう言ったわ……。誰かの意識を過去の人間にジャンクションさせる機械は、未来にしかないからって……」&lt;BR&gt;　震えるのは恐怖ではなく、緊張からだ。&lt;BR&gt;　必死で自分に言い聞かせ、エルオーネは柳眉を険しくして青年を見た。&lt;BR&gt;「でも……この時代には私がいるわ……。私を使えば、精神体のＧ．Ｆ．をセルフィに送り込むことなんてとても簡単なことだわ……」&lt;BR&gt;「……貴女がそれをしたと？」&lt;BR&gt;　穏やかに青年がたずねる。エルオーネはかぶりを振る。耳の下で綺麗に切り揃えた髪が頬を強く打つほど激しく、首を振った。&lt;BR&gt;「私の意志じゃないわ。でも、私の意志を奪ってそれをさせた人がいる。私を暗示にかけ、私を思うままに操って……そうよ、私を催眠術にかけたんだわ、小さい頃の私に博士たちがしたように！」&lt;BR&gt;　幼い、幼い頃……ウィンヒルのレインの家から魔女狩りでエスタに連れてこられたエルオーネは、不思議の力をオダイン博士に見いだされ、様々な実験にかけられた。&lt;BR&gt;　泣いてオダイン博士に抵抗するエルオーネは素直に力を発揮しようとはせず、博士は実験がスムーズに動くよう、エルオーネに対し薬物と魔法を用いて暗示をかけ、素直に言うことを聞かせて力をふるわせた。&lt;BR&gt;　そしてエルオーネがそれ故に、催眠術の類にかかりやすい精神構造を形成してしまったのもまた事実。&lt;BR&gt;　お転婆できかん気でいたずら好きな、自己主張の強い無鉄砲娘は姿を消し、物事を柔軟に受け止め、運命に逆らわずしなやかな忍耐強さを持った少女がエルオーネの中から生まれ出た。&lt;BR&gt;　精神の感じる苦痛を少しでもやわらげるための、それは幼い少女ができる最善の方法だったのだ。&lt;BR&gt;「私、覚えている……思い出したわ。私とラグナおじさんが襲われたあの日、あの夜、あなたはエスタに入ってきて私の護衛についた。私の傍で……私の意識の隙をいつだって狙っていた。&lt;BR&gt;　バラムガーデンからSeeDを新たに呼ぶって聞いた時、セルフィを呼んだのは……私にそう言わせたのは、あなただったのよ……！」&lt;BR&gt;「……」&lt;BR&gt;　青年は沈黙を保ってただ微笑んでいる。それが怖くて、エルオーネは萎える足を懸命に叱咤した。&lt;BR&gt;　あの日、最初に青年がエルオーネの意識を蹂躙した、あの日から、エルオーネはずっと彼の術中にいた。&lt;BR&gt;　事件の衝撃に心が浮き立ったあの瞬間を狙って、ささやかな抵抗を試みるエルオーネを屈服させ、青年に関する記憶を奪い、いつでも自由にエルオーネの力を使うことを可能にした。&lt;BR&gt;　ただひとつ、誤算があるとするなら、それはスコールもまた、エスタに呼び寄せてしまったこと。&lt;BR&gt;　本当なら、エスタに来るのはセルフィひとりのはずだった。その方が青年にとっては都合が良かった。&lt;BR&gt;　それを狂わせたのは、エルオーネ。記憶を奪われ意識の舵を奪われても、懸命にセルフィを守ろうと、信頼できる弟の名を口にした。それが彼女の精一杯だった。&lt;BR&gt;「ショッピングモールでもあなたは私から意識を奪い、力を使った……」&lt;BR&gt;　エスタ市街の最初の襲撃。セルフィにＧ．Ｆ．をジャンクションさせ、召喚させて市民を襲った。&lt;BR&gt;　エルオーネの力を使えば、セルフィに抵抗のすべなどない。あとはスコールの予想通り――。&lt;BR&gt;　だが、セルフィが行方不明になったことで、エルオーネの意識はセルフィ一点に向けられ、それが青年の術に綻びを作り、催眠術を破った。セルフィを心配する気持ちが、エルオーネに自分を取り戻させたのだ。&lt;BR&gt;&lt;BR&gt;　青年が一歩、エルオーネに向かって踏み出した。&lt;BR&gt;　エルオーネは慌てて一歩下がり、胸の前でさらに強くストールごと拳を握った。&lt;BR&gt;「今度は何をするつもりなの？　私に近づかないで！！」&lt;BR&gt;　催眠術に対する下地のできてしまった自分が、どこまでこの青年に対抗できるかがわからず、恐怖しながらもエルオーネは気丈に叫ぶ。&lt;BR&gt;　今ここでまた、青年の思うように操られるわけにはいかない。&lt;BR&gt;　ただでさえ自分が不甲斐ないせいで、セルフィが不幸になっているというのに――！&lt;BR&gt;　また、青年が一歩踏み出した。さらに下がったエルオーネの足が、ベッドにぶつかり退路をふさぐ。&lt;BR&gt;「来ないで……もうあなたの好きにはさせない」&lt;BR&gt;　青年がエルオーネのすぐ傍に立った。&lt;BR&gt;「セルフィを手に入れてどうするつもりなの！？」&lt;BR&gt;「……どこへ隠した？」&lt;BR&gt;　叫んだエルオーネの耳の傍で、青年は信じられない言葉を囁いた。&lt;BR&gt;　え、とエルオーネは大きく眼を見開く。&lt;BR&gt;「私の存在に気づき、あれを隠したのはおまえだろう？」&lt;BR&gt;「なにを……」&lt;BR&gt;　エルオーネは反駁しかけて絶句した。&lt;BR&gt;　――――この男はセルフィを連れ去っていない？&lt;BR&gt;　今の今まで、エルオーネはこの男こそがセルフィを連れ去ったのだと思っていた。&lt;BR&gt;　手に入れたセルフィにまたＧ．Ｆ．を使わせるために、自分を使おうとしているのだとばかり思っていた。&lt;BR&gt;　だが、今この男が口にしたのは。&lt;BR&gt;「言わぬならそれも構わぬ。おまえの心が壊れるも、それは私の預かり知らぬこと」&lt;BR&gt;　青年は淡々と言うと、やにわに腕を伸ばしてエルオーネの眼の上から頭をわしづかみにした。&lt;BR&gt;「！」&lt;BR&gt;　万力のような力でぎりぎりとこめかみを締め上げられ、激痛が脳天にまで響いたが、エルオーネは懸命に苦痛の声をこらえ、手が邪魔して見えない青年を睨みつけた。&lt;BR&gt;（……！！）&lt;BR&gt;　ぞろり、と嫌な感触をエルオーネは感じる。何か、巨大な力が自分の中に侵入し蹂躙しはじめる。&lt;BR&gt;　懸命に逃れようとエルオーネは両手を上げて青年の手を引きはがそうと努力したが、彼女の両腕の力に青年の右手はびくともしなかった。&lt;BR&gt;　やがてキーンと耳鳴りがしはじめ、ぐらぐらとめまいがし、地面が揺れ始めた。&lt;BR&gt;　それは、最初にエルオーネが青年の術にかかったあの日とは少し違う。青年は暗示をかけようとしているのではない。&lt;BR&gt;　青年は今、力ずくでエルオーネの意識のすべてを奪おうとしているのだ。周到にセルフィを周囲から隔離させ、世界から拒絶される形で彼女を手に入れようと画策していた頃と違い、今の青年には正体が明らかになることやエルオーネが廃人となることなど、一切かまわないという雰囲気があった。&lt;BR&gt;　なりふり構わずセルフィの行方を追おうとしている青年のその執着に、エルオーネの背筋が寒くなる。&lt;BR&gt;　エルオーネはもちろんセルフィの行方を知らない。だが、エルオーネの力に距離は障害にならない。エルオーネの力でこの男がセルフィの中に接続してしまえば、どこにいるかなどすぐにわかってしまう。&lt;BR&gt;（……させないわ……）&lt;BR&gt;　そんなことは許されない。エルオーネは、セルフィを守らなくてはならない。&lt;BR&gt;　その方法をエルオーネは知っていた。昔、イデアが自分を守ろうと身を挺してくれた時に教わった。&lt;BR&gt;（……あなた……の……好きに……なんか……）&lt;BR&gt;　耳鳴りはますますうるさくなる。身体はもはや動かない。思考がかき回される不快感。&lt;BR&gt;（スコール……セルフィを見つけてあげてね……ラグナおじさん……ごめんなさい……）&lt;BR&gt;　かすかにエルオーネの唇が震えながらも笑みを刻んだ。それを眼に止め青年が眉をひそめる。&lt;BR&gt;　そして――――&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;「……何か今、エルお姉ちゃんの声がした……ような～？」&lt;BR&gt;　勝手に官邸にお邪魔して、ふと耳をそばだててアーヴァイン・キニアスは立ち止まった。&lt;BR&gt;　非常に不機嫌そうな顔で、先に立つリノアが振り返る。&lt;BR&gt;「なによ」&lt;BR&gt;「いや……今」&lt;BR&gt;　さんざんにリノアに蹴られ引っかかれ殴られて、それでもまだ懲りない男はあちこちを見回した。&lt;BR&gt;「リノアも探して。エルオーネの顔は覚えているかい？」&lt;BR&gt;「なんで？」&lt;BR&gt;　やっぱり不機嫌そうなリノアだったが、アーヴァインはすでにリノアを見ていなかった。&lt;BR&gt;「君は知らないだろうけど、エルオーネが叫んだりすることなんて滅多にない。というかむしろ有り得ない。&lt;BR&gt;　でも僕が今聞いたのは叫び声だったんだ。だから僕はエルオーネを探さなくちゃならない」&lt;BR&gt;　真剣な顔はすでにガーデン生のそれ。&lt;BR&gt;　リノアはまだ不機嫌な顔だったが、それ以上異論を唱えることはせず、手近な部屋をのぞきこんでエルオーネ探しに協力しはじめた。&lt;BR&gt;「叫んだって、なんて言ってたの？」&lt;BR&gt;「来ないで、って聞こえたんだけど……遠かったからよくは聞き取れなかった」&lt;BR&gt;「……来ないで……」&lt;BR&gt;　確かに、不穏な事態を想像させる言葉ではある。&lt;BR&gt;　そうしてあちこち部屋を開けていると、唐突に聞き覚えのある声がした。&lt;BR&gt;「おぉい、何やってんだお前ら？」&lt;BR&gt;　勝手に官邸侵入していたアーヴァインとリノアはぎくりと硬直した。&lt;BR&gt;　おそるおそる振り返ると、ラグナがきょとんとしたような顔でふたりを眺めている。背後には数名の白いSeeDを従えていた。&lt;BR&gt;　不審者かと思いきやアーヴァインとリノアだったので、白いSeeDたちはラグナに先に報告したらしい。&lt;BR&gt;「あ、あの……」&lt;BR&gt;　リノアがどう言い訳しようかと口を開いた時、アーヴァインがざっと白いSeeDたちに視線を走らせながら素早く言った。&lt;BR&gt;「大統領、エルオーネはどこですか？」&lt;BR&gt;「え？」&lt;BR&gt;「エルオーネは一緒じゃないんですか？　今僕は彼女の悲鳴を聞いたんです。彼女はどこですか？」&lt;BR&gt;　ラグナの顔がふと厳しくなった。&lt;BR&gt;「エルオーネなら部屋にいるはずなんだが……」&lt;BR&gt;「それはどこですか？」&lt;BR&gt;「こっちだ」&lt;BR&gt;　ラグナが足早にエルオーネの部屋に歩み寄り、ノックしながらドアを開ける。&lt;BR&gt;　直後、ラグナの吠えるような大声が響き渡った。&lt;BR&gt;「――エル！！」&lt;BR&gt;　アーヴァインも素早くリノアを置いてその部屋の中に飛び込んで行き、リノアも慌てて後を追った。&lt;BR&gt;　部屋に飛び込む。あまり広くないその部屋の奥にベッドがあり、ラグナとアーヴァインがその脇に跪いているのが見えた。それから――。&lt;BR&gt;「君たち、医者だ！　あとオダイン博士を！」&lt;BR&gt;　アーヴァインが振り返りざまリノアのすぐ前に立つ白いSeeD達に叫んだ。&lt;BR&gt;　慌てて白いSeeDたちが駆けだしていく。&lt;BR&gt;　リノアはその最中……呆然と立ちつくしていた。&lt;BR&gt;「大統領、あまり揺すらないで！　倒れた時に頭を打っているかもしれない。息はしています、とにかくベッドに……」&lt;BR&gt;　冷たい床の上、アーヴァインの腕の中に抱き起こされているのは、スコールの最愛の姉エルオーネ。&lt;BR&gt;　見開かれた栗色の瞳はまばたきを忘れ、ガラス玉のように室内の灯りを映している。&lt;BR&gt;　あまり会う機会がなかったが、覚えている限りでは色白の優しげな印象の人だった。でも今人形のように横たわる彼女の顔は、記憶の中よりずっとずっと白く紙のようで……。&lt;BR&gt;「どうしたって言うんだよ～、これじゃ魔女になった時のリノアだよ～！」&lt;BR&gt;　嘆くアーヴァインの声に、我に返ったリノアが慌てて駆け寄った。&lt;BR&gt;「アーヴァイン、どいて。わたし、やってみる」&lt;BR&gt;　いつも腕にしていたオダインバングルをむしり取るようにはずしたリノアに、アーヴァインが驚く。&lt;BR&gt;　受け継いだ魔女の力を制御すべくイデアの特訓を受け、その結果３日で音を上げ自分は一生オダインバングルを外さないからこれでいいのだと叫んだリノアの姿を良く知るだけに、その瞳には懸念がくっきり浮かんでいる。&lt;BR&gt;　リノアは嫌な顔をしてアーヴァインを睨んだ。&lt;BR&gt;「蘇生魔法のひとつやふたつ使うだけで、官邸ふっとばしたりなんかしないわよ！！」&lt;BR&gt;　声とともに白い手のひらに淡い光が宿る。&lt;BR&gt;「いくわよ……！」&lt;BR&gt;　黒髪が、あふれる力に大きく舞った。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　物事というものは、動く時はいちどきに動き出すものらしい。&lt;BR&gt;　その一報を受けた時、スコールの中に浮かんだ感想はこんなつまらないものだった。&lt;BR&gt;　あまりにもめまぐるしく動く事態に、神経がやや鈍ってきているのかもしれない。&lt;BR&gt;「どうした？」&lt;BR&gt;　白いSeeDが通信を切ったスコールに気づかわしげに訊ね、スコールは吐息まじりに答えた。&lt;BR&gt;「エルオーネが昏睡状態になった」&lt;BR&gt;　簡潔な一言に、その場にいた白いSeeD全員がぎょっと眼をむいた。&lt;BR&gt;　彼らはエルオーネを姉と慕い深い敬愛を抱いている。&lt;BR&gt;「なぜ……」&lt;BR&gt;　呆然と立ちつくす白いSeeDにスコールは背を向け歩き出しながら言った。&lt;BR&gt;「理由は不明だ。命に別状はなさそうだが、尋常な様子じゃなく魔力が働いた可能性が高いらしい。……すまないが、俺が官邸に一度戻ってもかまわないか？」&lt;BR&gt;「あ、あぁ……聞き込みは我々の方で行うから……行ってやってくれ」&lt;BR&gt;　スコールは振り向かずに軽く頷き、そのまま魔法研究所を後にした。&lt;BR&gt;　外に出ると、思いの外強い日差しが眼を刺した。&lt;BR&gt;（あぁ……もう日中か）&lt;BR&gt;　あまりに長い夜だった。まるでもう明けないかと思えるほど、長かった。&lt;BR&gt;　けれどこうして陽はちゃんと昇っている。セルフィが姿を消しても。エルオーネが謎の昏睡に陥っても。&lt;BR&gt;（セルフィ……どこにいる？）&lt;BR&gt;　今ここにセルフィが隣にいたら、彼女は何て言っただろう。&lt;BR&gt;　スコールには考えつかないような、前向きな発言のひとつやふたつは口にしてくれただろうか。&lt;BR&gt;　それともSeeDらしい辛辣でシビアな予想を口にしてくれただろうか。&lt;BR&gt;　どちらもありえそうだと考え、スコールは小さく溜息をついた。&lt;BR&gt;　あんなキスをして傷つけておきながら、……スコールはセルフィに会いたかった。&lt;BR&gt;　無性に、セルフィに会いたくてたまらなかった。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;&lt;/SPAN&gt;

<script data-viewer-zoom-script>
(() => {
  const stage = document.querySelector('.viewer-stage-image');
  const image = stage ? stage.querySelector('.viewer-image') : null;
  if (!stage || !image) {
    return;
  }

  const setZoom = (enabled) => {
    stage.classList.toggle('is-zoomed', enabled);
    image.setAttribute('aria-pressed', enabled ? 'true' : 'false');
    if (enabled) {
      const naturalWidth = image.naturalWidth || image.clientWidth || 0;
      const targetWidth = naturalWidth > 0
        ? Math.max(naturalWidth, Math.min(Math.round(stage.clientWidth * 0.92), naturalWidth * 4))
        : Math.round(stage.clientWidth * 0.92);
      image.style.width = `${targetWidth}px`;
      image.style.maxWidth = 'none';
      image.style.maxHeight = 'none';
      requestAnimationFrame(() => {
        stage.scrollTop = 0;
        stage.scrollLeft = Math.max(0, Math.round((image.scrollWidth - stage.clientWidth) / 2));
      });
    } else {
      image.style.removeProperty('width');
      image.style.removeProperty('max-width');
      image.style.removeProperty('max-height');
      stage.scrollTop = 0;
      stage.scrollLeft = 0;
    }
  };

  const toggleZoom = () => {
    setZoom(!stage.classList.contains('is-zoomed'));
  };

  image.setAttribute('tabindex', '0');
  image.setAttribute('role', 'button');
  image.setAttribute('aria-label', '逕ｻ蜒上ｒ諡｡螟ｧ縺ｾ縺溘・邵ｮ蟆・);
  image.setAttribute('aria-pressed', 'false');

  image.addEventListener('click', toggleZoom);
  image.addEventListener('keydown', (event) => {
    if (event.key === 'Enter' || event.key === ' ') {
      event.preventDefault();
      toggleZoom();
    }
  });

  stage.addEventListener('click', (event) => {
    if (event.target === stage && stage.classList.contains('is-zoomed')) {
      setZoom(false);
    }
  });

  window.addEventListener('keydown', (event) => {
    if (event.key === 'Escape' && stage.classList.contains('is-zoomed')) {
      setZoom(false);
    }
  });
})();
</script>
