      width=537&gt;&lt;SPAN&gt;&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;「スコール……！？」&lt;BR&gt;　朝早くに部屋を訪れたスコールに、リノアはドアを開け驚いたように眼を見開いて立ちつくした。&lt;BR&gt;「すまない、朝早くに……寝てたか？」&lt;BR&gt;　ぶっきらぼうに謝罪するスコールに、部屋着のままだったリノアは慌てて首を横に振った。&lt;BR&gt;「ううん、今起きたとこ。今の時間だと……おはようだね」&lt;BR&gt;「あぁ……」&lt;BR&gt;　スコールは頷き、右手を強く握りしめながら笑いかけた。&lt;BR&gt;　思ったより、自然に笑いかけることができた。&lt;BR&gt;　リノアが少し驚いたように眼を見開き、それから嬉しそうに微笑んだ。&lt;BR&gt;（……久しぶりだ）&lt;BR&gt;　こんなふうに笑うリノアの顔を見たのは――。&lt;BR&gt;　ちりっと胸が痛んで、スコールは視線を伏せた。&lt;BR&gt;　リノアが魔女になって、意識を失ってしまったあの時、思い返すのはリノアの笑顔ばかりだった。&lt;BR&gt;　なのにいつの間にか、リノアを思い出すと怒った顔ばかりが浮かぶようになってしまった。&lt;BR&gt;　喜怒哀楽のはっきりしたリノア。感情を隠さず顔に出す彼女が怒った顔ばかりをしているということは、つまり自分の前でいつでも怒っていたということになる。&lt;BR&gt;「リノア、俺……あんたと話したいことがあるんだ」&lt;BR&gt;　笑顔で自分の前に立つリノアになら、以前みたいに素直に話ができるような気がした。&lt;BR&gt;　そして、右手に残る温もりの記憶が、それを助けてくれるとも思った。&lt;BR&gt;「うん。わたしも、話したいって思ってたよ」&lt;BR&gt;　にこりと笑い、リノアは頷いた。&lt;BR&gt;「ちょっと待っててね。わたし、着替えてくる」&lt;BR&gt;「あぁ」&lt;BR&gt;　頷くスコールを置いて、リノアは部屋の中に戻っていく。&lt;BR&gt;　数分後、外に出てきたリノアは、ミニの白いワンピースを身につけていた。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;「わたし、たぶん、最初から間違えちゃったよね」&lt;BR&gt;　スコールの部屋に入ると、スコールが勧めたソファにも座らず、リノアが先に口を開いた。&lt;BR&gt;「最初？」&lt;BR&gt;　リノアの前に立ったまま、スコールはリノアと視線を結び合わせて静かにたずねた。&lt;BR&gt;　部屋に入った時から、視線はなるべく外さずに、真正面から対峙しようと決めていた。&lt;BR&gt;「わたしね……あなたに認めてもらうには、戦わなくちゃならないんだって思ってた」&lt;BR&gt;　それは確か、ガルバディアガーデンとの交戦時に、リノア自身が言っていた言葉だった。&lt;BR&gt;　――――戦うことであなたに認めてもらえるなら……わたしも戦う。&lt;BR&gt;　そう言って、SeeDでもガーデン生でもないリノアも、魔女との戦いに身を投じたのだ。&lt;BR&gt;「でも、戦いの場で、わたしはスコールと対等になんてなれなかった。&lt;BR&gt;　いつもいつも、戦いがはじまるとみんな、どんどん先に行っちゃうの。わたしはいつも、追いつけない。&lt;BR&gt;　……どうしてなのかなって、いつも考えてた。&lt;BR&gt;　戦闘能力、それ自体はわたし、足を引っ張らない程度でがんばれてたと思うの。&lt;BR&gt;　だけど、それでもどこか、追いつけないって思って……それがなんだかわからなくて……。&lt;BR&gt;　でもね、昨日やっと、わかったんだ」&lt;BR&gt;　そこでいったん言葉を切り、リノアは寂しそうに笑った。&lt;BR&gt;「スコール昨日、セルフィは最後までSeeDでいることを望んでいる、だから敵に完全に操られてしまうなら、SeeDとしてセルフィと戦う……そう言ったよね。&lt;BR&gt;　あぁ、こういうことなのかなぁって、少し思ったよ。&lt;BR&gt;　なんていうのかな……誇りっていうのかな……それが、スコール達にとっては、命より大事なんだね」&lt;BR&gt;　リノアは胸の鎖につながる銀の指輪にそっと触れた。&lt;BR&gt;「ライオンみたいに誇り高くて……その誇りを守るために、戦ってるんだよね。&lt;BR&gt;　わたしも、最初はそんなみんなの姿がすごくかっこいいなって思ってた。&lt;BR&gt;　わたしも、そんなふうになりたいなって思ってた。&lt;BR&gt;　でもね……気がついたの。わたしは、わたしは……やっぱり、命が一番大事だから」&lt;BR&gt;　一度伏せられた視線がまた上げられ、視線と視線が空中で結び合った。&lt;BR&gt;「生きてるって、すごいことだと思うんだ。&lt;BR&gt;　何をなくしても、生きてさえいれば、また取り戻せるってわたしは思うんだ。&lt;BR&gt;　もちろんわたし自身の命のことだけじゃなくて、みんなのこともそう思うの。&lt;BR&gt;　負けたっていい、誇りが傷ついたっていい、夢が破れてしまったって、生きていれば再戦のチャンスは巡ってくるし、傷ついた誇りはいつかまた輝くし、新しい夢は生まれるって思うんだよ。&lt;BR&gt;　命があるから、何かを成し遂げたいって思うし、生きるために希望や目標はあるんだって思う。&lt;BR&gt;　でも、みんなは違うんだよね。何かを成し遂げるために命があって、生きることだけのために命があるってふうには思ってないんだよね。希望や目標があるから、生きているんだよね」&lt;BR&gt;「…………」&lt;BR&gt;　生への執着。&lt;BR&gt;　それがなければ戦場で生き抜くことなどできはしない。&lt;BR&gt;　だが、死の覚悟なしに、戦いの世界に身を置くことは決してできない。&lt;BR&gt;　できることなら穏便に、平和に、幸せに――そんなリノアの望みは、戦いの世界とは確かに相容れないものなのかもしれない。&lt;BR&gt;「だからわたしは……トラビアガーデンでみんなで話したあの時に、違う立場でみんなの傍にいられる道を選ばなくちゃいけなかったんだって、気づいたの。&lt;BR&gt;　みんなは自分の命を捨ててでも戦うために走って行ってしまうから……わたしはそんなみんなのすぐ傍で、生きなくちゃだめだよって、大声で叫び続けていなくちゃいけなかったんだよね。&lt;BR&gt;　ティンバーの独立戦争が終わった後もそう、わたしはスコールと離れたくないって思う気持ちばっかりになってしまって、自分がどこに立っていればいいのか、自分がどういう存在なのかがつかめなくて、空回りばっかりしてた。&lt;BR&gt;　SeeDでい続けるスコールが理解できなくて、なんとかわたしの考えをわかってほしくて、でもどうしてもわかり合えなくて……傷つけ合ってばっかりになっちゃったよね。&lt;BR&gt;　わたしは、スコールにとって、生きるための未練になれればよかった。&lt;BR&gt;　戦うスコールを理解できないなら、生きることがどんなに素敵で、どんなことがあっても生きて帰るんだって、せめてスコールにそう思ってもらえるように、わたしがそういうふうにしなくちゃいけなかったよね。&lt;BR&gt;　……わたし、自分の気持ち押しつけるばっかりで、全然だめだった」&lt;BR&gt;　いっきに話し終え、リノアは顔を一度伏せ、しばらく黙っていたが、またすっと顔を上げた。&lt;BR&gt;　にっこりと、スコールと眼を合わせて微笑んだ。&lt;BR&gt;「ごめんね、スコール」&lt;BR&gt;　スコールは、首を振った。&lt;BR&gt;　強く握りしめたままの右手に左手で触れながら、静かに言った。&lt;BR&gt;「リノアが悪いわけじゃない……俺も、色々なことがうまくできなかった」&lt;BR&gt;　微笑んだままのリノアはやっぱりどこか寂しそうで、それがスコールの胸を痛ませる。&lt;BR&gt;　傍若無人なくらい強気に笑うリノアの方が、彼女らしい。&lt;BR&gt;　夢の中でもらったあの花を、リノアにも渡すことができたらいいのにとスコールは思った。&lt;BR&gt;「なぁリノア……リノアは、まだ未来が来るのが怖いか？」&lt;BR&gt;　魔女になって、未来なんて来なくていい、今が永遠に続いてほしいと泣いたリノア。&lt;BR&gt;「あの『時』が……ずっと続いてれば良かったって、思うことはあるよ」&lt;BR&gt;　心細そうに泣くリノアを抱きしめたあの時、守りたいと願った気持ちに嘘はなかったのに。&lt;BR&gt;　時間はどこまでも無情に時を刻み、人の心も成長し変化していってしまう。&lt;BR&gt;「でもね……二人きりの世界で、生きていくことはできないって、わたしにもわかったから」&lt;BR&gt;　また指輪に触れ、うつむいて視線を隠しながら、リノアが呟くように言った。&lt;BR&gt;「わたし、ひとりで何でもできる気になってた。家を飛び出して、森のフクロウに入って、みんなと色々な計画を練って……楽しかった。家を飛び出して、自分の力で自由に生きるってなんて素敵だろうって思ってた。&lt;BR&gt;　だからスコール達と出会って、ちっとも自由じゃない生き方で平気なみんなに腹が立ったの。&lt;BR&gt;　自由に生きるのはこんなに素晴らしいのに、命令されるだけ、従うだけ、覚悟は決まってるなんて命を粗末にして、楽を優先してなんてもったいない生き方をしてるのかしらって思ったの。&lt;BR&gt;　……でも、違ってたね。命令に従って生きるのは、全然楽なことじゃなかった。&lt;BR&gt;　だからって、自由に生きていくのは……もっと全然楽じゃなかった。&lt;BR&gt;　わたしは、自由に生きているつもりで、本当はただ勝手なことをしていただけだった」&lt;BR&gt;　言葉の最後がかすかにかすれ、うつむいたリノアの頬から涙がぽろぽろとこぼれ落ちた。&lt;BR&gt;「自由に生きるって、何もかも自分の力で手に入れて、手に入れたものだけで生きる人が使える言葉よね。&lt;BR&gt;　わたしは……なんにも、自分の力で手に入れていなかった。&lt;BR&gt;　ひとりじゃ何にもできなかった。&lt;BR&gt;　イデアと戦うこともできなくてスコール達の足を引っ張ったし……みんなと一緒なら戦えるって思っても、ガーデンから落ちそうになってスコールに助けてもらって……決戦にくっついて行けば魔女になっちゃうし……アデルの封印を解いて、エスタはあんなことになっちゃうし……」&lt;BR&gt;「それは……リノアのせいじゃないだろ」&lt;BR&gt;　リノアの言葉の後半部分に、スコールは首を振った。&lt;BR&gt;　別に魔女になってしまったのは、リノアが暴走したせいでも実力不足だったわけでもない。&lt;BR&gt;　イデアの魔女の力ごと、アルティミシアの意識がくっついてきたのだって、別にリノアのせいではない。&lt;BR&gt;　エルオーネの力を使って入り込まれて、対抗するすべなど誰も持たないのだから。現に正SeeDであるセルフィだって、エルオーネの力を使って入り込まれたＧ．Ｆ．に操られてしまったではないか。&lt;BR&gt;　ただの偶然。ただの不幸な事故。&lt;BR&gt;　スコールはそう思っているし、他の仲間たちだってそう思っているはずだ。&lt;BR&gt;「ありがと。でもね……事実だから。&lt;BR&gt;　わたしが魔女になってしまったのも、魔女になったわたしが今こうして勝手な行動をしているために、他のたくさんの人が迷惑していることも……事実だから。&lt;BR&gt;　わたしが森のフクロウに戻って、スコールの傍にいたあの時だって……わたしたちは、二人きりで生きてたわけじゃなかったよね。&lt;BR&gt;　メンバーのみんなや、ゼルやセルフィに迷惑をかけたから、わたしたちは思う存分、一緒にいられた」&lt;BR&gt;　スコールは、頷いた。&lt;BR&gt;　初めての恋だった。だからあれほど夢中になった。周囲など何も見えなかった。&lt;BR&gt;　リノアの姿しか眼に入らなかった。リノアさえいれば世界は完全で、他には何もいらないとさえ思っていた。&lt;BR&gt;　そんな自分たちのために、ゼルとセルフィがその分働いていたなんて、思いもしなかった。&lt;BR&gt;　周囲の様子を認識し、自分の行動と照らし合わせて冷静になった、あの時の衝撃。&lt;BR&gt;　自分がガーデンを放り出してリノアを連れてエスタに走った、あの時もセルフィ達はガーデン生みんなに『好きにさせてあげようよ』と説得し、納得させてくれていたことも、後から知った。&lt;BR&gt;　本当に、二人きりの世界で生きていくことなど、できないのだと知った。&lt;BR&gt;「スコールは、わたしよりもっと早く、そのことに気づいていたんだね。&lt;BR&gt;　だからわたしより先に、未来に眼を向けて、走り出すことができたんだ……。&lt;BR&gt;　わたしには、ずっとわからなかった。ティンバーの独立戦争が終わらなければいいなんて思ってた。父が独立宣言してくれたことも、素直に喜べなくて……そんな自分がすごく嫌だった……」&lt;BR&gt;　一緒にティンバー独立の夢を追っていたはずの仲間と、喜びを分かち合うことができなくて。&lt;BR&gt;　その後すぐに、スコールは未来に向かいリノアを置いて走り始めてしまった。&lt;BR&gt;「わたしが最初に、もっと違う形での対等な関係を、スコールと作っていられれば良かったの。&lt;BR&gt;　わたしにしかできない形で……わたしとスコールだけの関係を作れれば良かった。&lt;BR&gt;　過去はどうすることもできないけれど……でもそれだけが、とても悔しい」&lt;BR&gt;　他の仲間と同じ絆を求めてしまったから、バランスを崩してしまったスコールとリノアの関係。&lt;BR&gt;　もう少し早くリノアが気づけていたなら、もっと違った展開も開けたかもしれないけれど……。&lt;BR&gt;　それはすべて『もしも』の話。人は現状起きている事実を見すえて、生きなければならない。&lt;BR&gt;「……みんなにまた迷惑をかけるけれど……しばらく、エスタにいさせてほしいんだ」&lt;BR&gt;　ようやく顔を上げ、リノアが涙の残る瞳をにこりと優しくした。&lt;BR&gt;「アーヴァインもせっかく頑張ってくれたし……それにね、しばらく、スコールを見ていたいんだ。&lt;BR&gt;　恋とかそういう気持ちのフィルターを通さずに、客観的に、スコール達を見てみたいの。&lt;BR&gt;　もしかしたら、わたしがこれからどうするのか、どうしたいのか、そういうのが見えてくるような気がするから」&lt;BR&gt;　アーヴァインは、恋愛オンリーで物を見ているだけでは、スコールの相手はつとまらないと言っていた。&lt;BR&gt;　だから、もっと違った視点で物事を見たいとリノアは思ったのだ。&lt;BR&gt;「……好きにしろよ。けれど、絶対無茶はしないでくれ」&lt;BR&gt;　軽く頷くスコールが、素早くSeeDの顔になる。&lt;BR&gt;　そんな真面目さがおかしくて、リノアはくすっと笑った。&lt;BR&gt;「わかってる。……あとね、この指輪……もう少し、持っていてもいい？」&lt;BR&gt;　指で触れていた指輪を、リノアはスコールに指し示してたずねた。&lt;BR&gt;「もう少しだけ……わたしがきちんと、自分の足だけで立てるようになったら、きっと返すから」&lt;BR&gt;　スコールは、指輪を見下ろして、しばらく黙っていた。&lt;BR&gt;　グリーヴァという名のライオンを彫り込んだ指輪。誇り高くて強くて……スコールが心に描いた理想の姿を持った伝説の獣。&lt;BR&gt;　アルティミシアが実体化させた幻想のグリーヴァに戦い勝って、もうスコールには必要のなくなったそれ。&lt;BR&gt;「……あんたにそれが必要なら、好きなだけ持っててかまわないさ」&lt;BR&gt;「スコールには……もう必要ない？」&lt;BR&gt;　リノアがいたずらっぽく笑って前屈みにスコールの顔を覗き込んだ。&lt;BR&gt;　スコールは少し決まり悪そうな顔になったが、何も言わなかった。&lt;BR&gt;　何を考えているのかなと、こんな時いつもリノアは寂しい気持ちになるのだった。&lt;BR&gt;「ね、スコール……ひとつだけ教えて？」&lt;BR&gt;　寂しい気持ちを押し隠し、リノアが微笑んでたずねた。&lt;BR&gt;「なんだ？」&lt;BR&gt;　鈍感なスコールは気づかない。&lt;BR&gt;　そんなところも嫌いではなかったが、やっぱり少し寂しかったなとリノアは心の内で呟いた。&lt;BR&gt;　本当に、どこまでも不器用な男だった。&lt;BR&gt;「スコールは、セルフィが好き？」&lt;BR&gt;「は？」&lt;BR&gt;　唐突な質問に、間髪入れずにスコールが声を上げた。&lt;BR&gt;　驚愕に見開かれた眼差しに、リノアはすっと眼を細めた。不意を突かれた分だけ、瞳の色に正直な答えが見えた。&lt;BR&gt;　やっぱり……と心の中で小さく呟く。寂しさだけが胸に残った。それでも懸命に、リノアは微笑んだ。&lt;BR&gt;　今までスコールが見た中で、一番研ぎ澄まされた、美しい笑顔だった。&lt;BR&gt;「ううん、いいの。なんでもない。あんまり必死だから、言ってみただけ」&lt;BR&gt;　手を振って笑うリノアに、スコールは居心地の悪そうな顔をした。&lt;BR&gt;　なにやらあれこれとまた考えてるようだったが、相変わらずそれを口にするつもりはないようだった。&lt;BR&gt;　話してと言えば口にしてくれるだろうが、そう頼むつもりはリノアにはなかった。&lt;BR&gt;「……じゃあ、わたし、部屋に戻るね」&lt;BR&gt;　笑顔のまま、リノアはゆっくり前屈みの姿勢を元に戻し、スコールに背を向け扉に向かって数歩進んだ。&lt;BR&gt;「リノア」&lt;BR&gt;　その背中に、スコールが慌てて声をかけた。&lt;BR&gt;「俺……あんたが好きだったんだ」&lt;BR&gt;　立ち止まったリノアの背中から聞こえる、とても優しい声。&lt;BR&gt;　不器用な彼が精一杯に紡ぐ言葉は……優しくて、とても残酷だった。&lt;BR&gt;「あんたが魔女だとか、そんなことは関係なかったんだ。魔女だから、こんなことになったわけじゃない。&lt;BR&gt;　魔女でも、魔女でなくても、リノアはずっと、リノアだった……！」&lt;BR&gt;　リノアは眼を閉じた。&lt;BR&gt;　魔女になってしまった自分に、変わらず接してくれたスコールの今までを思い出した。&lt;BR&gt;　もし魔女になって、変わったものがあるとしたら、それはリノアの方だった。&lt;BR&gt;「わかってる……」&lt;BR&gt;　囁いて、リノアはひとつ、まばたきをした。&lt;BR&gt;　瞼の奥に溜まった涙があふれてこぼれ、顎から雫となって床に落ちた。&lt;BR&gt;「わかってるよ、スコール」&lt;BR&gt;　振り返る。涙で視界がゆがんでよく見えなかった。&lt;BR&gt;　でもリノアは、ぼやけて見えないスコールに向かって笑いかけることができた。&lt;BR&gt;　きっと、とても苦しそうな顔をしているだろう、彼に。&lt;BR&gt;「だから……わたしはあなたが好きになったんだもん」&lt;BR&gt;　初めは端整な姿に惹かれた。反発しながらも、戦う彼は凛々しくてますます惹かれた。&lt;BR&gt;　酷薄なふりをして、本当は優しくてただ不器用なのだと知って、本気で愛した。&lt;BR&gt;　魔女になってしまったからと、リノアを突き放すような男だったら、はじめから愛したりしなかった。&lt;BR&gt;　リノアの望む通りには愛してくれなくても、リノアにたくさんの愛をくれた人。&lt;BR&gt;　たくさんの夢を見させてくれた人。リノアを大人へと成長させてくれた人。&lt;BR&gt;「あなたが好きだった」&lt;BR&gt;　だからこうして笑って言える。そのことがリノアは嬉しかった。&lt;BR&gt;　恋は壊れてしまっても、笑い合えることが嬉しかった。&lt;BR&gt;「とても好きだった……」&lt;BR&gt;　スコールが、涙の向こうで一歩、リノアに近づいた。&lt;BR&gt;　ずっと握りしめていた右手をまっすぐに伸ばして、リノアの白い手をぎゅっとつかんだ。&lt;BR&gt;　まるで初めから決まっていたように、リノアはスコールに引き寄せられるままに、背伸びをした。&lt;BR&gt;　唇が触れ合う。重ねるだけの、軽い口づけ。&lt;BR&gt;　ぬくもりが唇に落ちた瞬間、これで最後なのだと心が受け入れた。&lt;BR&gt;　そっと唇が離れ、リノアは眼を開いて笑った。&lt;BR&gt;　スコールも、小さく笑い返した。&lt;BR&gt;　すぐ至近距離で見たその笑顔が、苦いものの含まれていない笑顔だったことが、リノアは嬉しかった。&lt;BR&gt;「それじゃ……」&lt;BR&gt;　スコールの右手がリノアの手を解放する。熱い体温が、離れていく。&lt;BR&gt;　リノアは顔を上げ、まっすぐにスコールを見てもう一度笑いかけた。&lt;BR&gt;　笑って、そして、スコールに背を向けると、振り返ることなく部屋を出ていった。&lt;BR&gt;　今まで見たどんな姿よりも、毅然とした後ろ姿だった。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　――――スコールは、セルフィが好き？&lt;BR&gt;　結局、最後まで答えを聞くことのできなかった問いを胸に抱きしめて、リノアはまっすぐアーヴァインの部屋に飛び込んだ。&lt;BR&gt;　泣きながら駆け込んできたリノアに驚いた顔をしながらも、アーヴァインは黙って部屋に招き入れ、ソファに座らせてくれた。ぽつりぽつりと語るリノアの話に、穏やかに耳を傾けてくれた。&lt;BR&gt;　肩を抱いたり、手を握ったり、そんなことは一切せずにただ隣に座っているアーヴァインの存在を、リノアは初めて心強い存在だと思った。初めて間近で見たサファイアブルーの瞳が、意外なほど優しく見えた。&lt;BR&gt;　とても、安心できた。&lt;BR&gt;「スコールも……そうだったのかな……」&lt;BR&gt;「何が？」&lt;BR&gt;「……ううん」&lt;BR&gt;　仲間内で、スコールと最も似通った価値観を持ち合わせていたのが、セルフィだった。&lt;BR&gt;　スコールは冷たい口調で言い、セルフィは独特ののんびり口調で言うのでわかりづらかったが、スコールの主張とセルフィの主張は大抵一致していた。&lt;BR&gt;　エルオーネが姉の直感で見抜いたとするなら、リノアのそれは女の直感である。&lt;BR&gt;　スコールがセルフィに対して時折とても優しいことを、スコールだけを見つめていたリノアは見抜いていた。&lt;BR&gt;　……きっと彼にとって、セルフィの傍は居心地が良かったに違いなかった。彼女はもうひとりのスコールで、常に彼と対等の位置にいて、彼の一切を拒絶しない、数少ない存在のひとりだったのだから……。&lt;BR&gt;「アーヴァイン……前に、ガルバディアのミサイルが飛んできたこと、覚えてる？」&lt;BR&gt;「うん」&lt;BR&gt;「わたしとアーヴァインがバラムガーデンに向かって……ゼルとキスティス、セルフィがミサイル基地に行ったの。わたしあの時ね……本当のこと言うと少し……ほんの少しだけ……嬉しかったんだ」&lt;BR&gt;「そっか～」&lt;BR&gt;　リノアはアーヴァインが差し出したハンカチで顔を拭った。&lt;BR&gt;　さすがに、女心に敏感なアーヴァインのやることはそつがない。&lt;BR&gt;「ゼルがね……戻ってきた後、教えてくれたんだよ。&lt;BR&gt;　自爆する基地に閉じこめられて……絶体絶命になって……キスティスは『スコールは私がこうなるって知っててこっちのチームに入れたの？』って嘆いたりしてて……でもセルフィはね、全然そうじゃなかったって」&lt;BR&gt;　あのキスティスが仲間の前でそんなふうに嘆くなら、それがどれほど緊迫した状況だったかもわかる。&lt;BR&gt;「セルフィがね、言ったんだって。スコールは、自分たちを信頼してくれてるんだって。だから、ミサイル基地にゴーサインを出してくれたんだって。嫌いだから、目障りだから……そんな理由で送り出すような奴じゃないよって」&lt;BR&gt;「すごいな～さすがセフィ」&lt;BR&gt;　アーヴァインが感心して声を出す。リノアはくすっと笑った。&lt;BR&gt;「ずっとスコールのことを好きで、スコールのこと良く見てたのは、キスティスの方なのにね。&lt;BR&gt;　でも……きっと、わたしがあっちのチームに入って、そういう風になったら……きっとキスティスと同じこと、思ったと思うんだ……」&lt;BR&gt;　危険度の高いミッション。そのチームに入れたのは、スコールが自分を嫌いだったからなのかと……。&lt;BR&gt;　セルフィのように、信頼してくれたからなのだとは、きっとあの時の自分は思えなかったはずだ。&lt;BR&gt;「……うん、僕も、もしかしたら同じかもしれないな～」&lt;BR&gt;　アーヴァインも視線を伏せて呟く。あの頃のアーヴァインだったら、間違いなくそう思っただろう。&lt;BR&gt;「それからね……色々考えたんだ。&lt;BR&gt;　スコールはわたしを好きになってくれたけど……そういう意味で信頼してくれたことって、あったのかな？&lt;BR&gt;　わたしは目指した通りに、スコールに認めてもらえているのかなって。&lt;BR&gt;　そうして思い返すとね、スコールは戦いに関してはすごくシビアだったなって思ったの。&lt;BR&gt;　いつもわたしを『クライアント』として扱って、危険な場所へは行かせなかったし、ガルバディアガーデンと戦った時も名前を呼んでくれなくて……戦力外だって、いつもそう思ってたんだよね」&lt;BR&gt;「……僕も呼ばれた記憶がないんだなぁ～」&lt;BR&gt;　アーヴァインが苦笑し、リノアは頷いた。&lt;BR&gt;「きっと、アーヴァインがガルバディアガーデンの生徒だからじゃない？&lt;BR&gt;　これからガルバディアガーデンと戦うのに、やっぱり名前、呼びづらかったんだと思うよ。&lt;BR&gt;　だからほら……アーヴァインが自分から参戦した後は、戦力に数えてもらってたじゃない？」&lt;BR&gt;　アーヴァインは小さく笑った。&lt;BR&gt;「それにね、スコールって、セルフィにはすごく優しいんだよ。&lt;BR&gt;　わたしがね、スコールがガーデン案内してくれたって言ったら、セルフィも案内してもらったって言うんだよ。&lt;BR&gt;　案内板見て、ひとつひとつ教えてくれて、案外親切な奴だよね～だって。&lt;BR&gt;　わたしの時は不承不承って感じだったのよ。失礼しちゃう」&lt;BR&gt;　肩をすくめてリノアはアーヴァインを見て笑った。&lt;BR&gt;　しかもそれを悪気なく口にするセルフィの無邪気さも罪作りだ。&lt;BR&gt;「さらにスコールってば、学園祭実行委員なんか引き受けてるって言うし。キスティスがすごくびっくりしていたんだよ。&lt;BR&gt;　セルフィは引き受けてくれてもあんまり真面目にやってくれなさそう～なんて言ったけど、わたし知ってるんだ。バラムガーデンが内紛状態だった時に、スコール、ちゃんと校庭のステージが無事かどうか、確認していたんだよ」&lt;BR&gt;「……よ、良く見てるねぇ……」&lt;BR&gt;　一緒にいたはずのアーヴァインはさっぱり記憶にない。&lt;BR&gt;　呆れ半分感心半分の言葉に、リノアはくすくすと笑って見せた。&lt;BR&gt;「トラビアガーデンでもね、スコール、嘘みたいに優しかった。&lt;BR&gt;　お墓で……セルフィを見てるスコール、本当に優しい顔をしてた。&lt;BR&gt;　その時はスコールが、こんな優しい顔をするんだってそっちの方が嬉しかったけど……」&lt;BR&gt;　でもリノアは同時に気づいたのだ。&lt;BR&gt;　優しくセルフィの背中を見つめるスコールの瞳に浮かんだもの――憧憬と敬愛の混ざった優しい光。&lt;BR&gt;　リノアには決して向けられることのない、尊敬という感情。&lt;BR&gt;　セルフィの背筋の伸びた爽やかな強さは、あの時、確かにスコールの心を打っていた。&lt;BR&gt;　リノアが最後まで踏み込むことのできなかった、スコールの心の一番奥に、間違いなく焼き付いていた。&lt;BR&gt;「だからわたしは、スコールがわたし以外の人を好きになるなら、セルフィなんだって思ってた……」&lt;BR&gt;　明らかにスコールにとって特別だった、セルフィという存在。&lt;BR&gt;　きっとそう思っていたのはリノアだけだっただろう。リノアを早々にライバルと認識したキスティスでさえ、想定していなかったに違いない。&lt;BR&gt;　スコールと『対等』になりたかったリノアだけが、『対等』を手にしたセルフィに気がついたのだから。&lt;BR&gt;「……もちろん、エルオーネも重大なライバル出現かと思ったけど」&lt;BR&gt;　付け加えて、リノアは肩をすくめた。&lt;BR&gt;　どうやら現在のスコールは完全にエルオーネを大事な姉としか見てなさそうだが、血は繋がっていないのだし絆の強さでは群を抜いている。&lt;BR&gt;「う～ん、意外な伏兵登場って感じだなぁ～」&lt;BR&gt;　アーヴァインが額を手で覆い、大げさな仕草で溜息をついた。&lt;BR&gt;　いたずらっぽくリノアがアーヴァインの顔を覗き込む。&lt;BR&gt;「一年もあったくせに、何をのんびりしてたのよ？」&lt;BR&gt;「だってさ～、僕って実はそろそろ卒業なんだよ～？　ガルバディアガーデンもトラビアほどじゃないけど、魔女騒動で相当被害受けてたし、一応友達なんかもいたりするから復興の手助けは一緒にしたかったし、セフィはトラビアガーデンに行きっぱなしだし、恋愛に興味なさそうだったし……」&lt;BR&gt;「……あぁ、そういえばガーデンって１９歳までしかいられないんだったっけ」&lt;BR&gt;「そうなんだよ～。僕もう１８になっちゃったからさ～、今年が勝負なんだよ～。SeeD目指すって選択肢もあったし一瞬考えたこともあったけど、昨日言った通りSeeDになる気はなかったからさっさとやめちゃったんだよね～。&lt;BR&gt;　でも、卒業はできないと就職に影響出るでしょ？」&lt;BR&gt;　周囲が２０までガーデンに在籍できるSeeD資格保有者だったので、リノアもすっかり失念していたが、確かにアーヴァインはそろそろ本腰を入れないとまずい時期なのだろう。&lt;BR&gt;　……と、そこでふとリノアは首をかしげた。&lt;BR&gt;「そうすると、サイファーってもしかしてすっごくヤバ目？」&lt;BR&gt;「サイファーって１９だっけ？　でもSeeDの受験資格持ってるくらいだから、卒業に必要な単位はもう取ってるはずだよ～」&lt;BR&gt;「…………でもあいつ、就職とか全然考えてなさそうだけど」&lt;BR&gt;「なさそうだよねぇ～、ま、ガルバディア軍には少なくとも入れないよね～、あれだけの騒ぎの中心にいたら……っていうか彼はSeeDをまだ目指してるんだろ～？」&lt;BR&gt;「知らないけど。でもそうすると、キスティスもそろそろ卒業時期ってこと？」&lt;BR&gt;「教員認定試験に再合格しなかったら、そうなるだろうね～。教員になっちゃえばさ、そのままガーデン就職決定なわけだから……」&lt;BR&gt;　失恋相談が、いつの間にやら進路相談である。&lt;BR&gt;「ふ～ん」&lt;BR&gt;　ひとしきり進路について聞いた後、リノアがぽつりと言った。&lt;BR&gt;「みんな、将来のこととか、ちゃんと考えてるんだね……」&lt;BR&gt;「うん、食べてくのは重要な問題だからね。かじる親のスネはないわけだから」&lt;BR&gt;　にこりとアーヴァインが笑う。リノアの涙もすっかり乾いたようだ。&lt;BR&gt;　リノアは膝の上にほおづえをついて、溜息をついた。&lt;BR&gt;「わたし、ほんとに全然、みんなのことわかってなかったんだ……」&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　二日目の捜索も、あまり大した進展は見られずに日が暮れようとしていた。&lt;BR&gt;　進展らしい進展と言えば、ルナゲートのホストコンピュータにハッキングの形跡があり、事件当日の侵入者監視システムの記録がいじられている可能性があるらしいと報告があったことだった。&lt;BR&gt;「ルナゲート？」&lt;BR&gt;　腰に手を当て、スコールは報告に眉をひそめた。&lt;BR&gt;（セルフィが宇宙にいるってことか？）&lt;BR&gt;　確かに一時壊滅状態になり、放逐されていたルナサイドベースの開発計画がまた再開していることで、宇宙に行くこと自体は不可能ではないはずだが……。&lt;BR&gt;　いくらなんでも、ロケットなり宇宙船なりを発射すれば、エスタ側には一目瞭然、わからない方がおかしいということになる。&lt;BR&gt;　もちろん、低い可能性でもゼロでない限りは徹底検証、がスコールの方針なので、彼はすぐにルナゲートに向かうことにした。&lt;BR&gt;（宇宙か……）&lt;BR&gt;　歩きながら、懐かしい記憶がよみがえり、かすかに胸が痛む感じがした。&lt;BR&gt;　今思い返しても、宇宙に飛び出したあの時の自分の行動は……赤面ものである。&lt;BR&gt;　もう少し冷静にふるまっていればまだしも、情熱むき出しの暴走ぶりを仲間たちに完全披露してしまったのだ。当然、未だに何かきっかけがあればからかいのネタにされている。&lt;BR&gt;　それに教訓を得たわけでもないが、今回スコールはとにかく慎重冷静を心がけて動いていた。&lt;BR&gt;（そういえば……宇宙に行った時は、セルフィも一緒だったな）&lt;BR&gt;　単純にゼルのうっかりストッパーにしっかり者のキスティスと如才ない社交派アーヴァインをつけたら、結果的に宇宙組がセルフィになっただけなのだが。&lt;BR&gt;　コールドスリープ処置で凍っている間に月に着いてしまったので、『ぜ～んぜん窓の外見れてない～！』と解凍直後に嘆いていたセルフィを思い出し、スコールはくっと笑い出しそうになって、口を片手で押さえた。&lt;BR&gt;　それから、ふとその姿勢のまま動きを止めた。&lt;BR&gt;（冷凍……睡眠……？）&lt;BR&gt;　超高速で月に向かう小型射出機に人間を収容するための、コールドスリープ用カプセルの形を思い出す。&lt;BR&gt;　カプセル自体はそれほど巨大なものではなかった。周囲の機械につながれていはいたけれど、射出機に積み込み発射するのだから取り外すことくらいできるはずだ。&lt;BR&gt;　冷凍睡眠処理を施されれば、身体の代謝はかなり低下することになる。Ｇ．Ｆ．が彼女の内に入り込んだところで、自力で装置を動かし解凍することが可能だとは思えない。&lt;BR&gt;（……もしそんな処理が必要なら……セルフィを拉致した奴らはＧ．Ｆ．を制御できないってことになるのか……？）&lt;BR&gt;　コンピュータに戻すにしてもＧ．Ｆ．の執着がセルフィに対してより強ければそうも行かない。セルフィを恐怖の象徴、新しい魔女に仕立て上げて何かするにしても、肝心要のＧ．Ｆ．の制御がきかないのではままならない。だからセルフィをとりあえず眠らせておいて何らかの対策を講じている――そういうことなのだろうか。&lt;BR&gt;（でも、じゃあ何で慌ててセルフィを拉致する必要がある？　対策を立ててから拉致したって遅くはないはずじゃないか……）&lt;BR&gt;　それとも……敵側の方で、セルフィを手元に確保しなければならない何らかの事情が発生した――ということか。&lt;BR&gt;（どちらにしても……確証のある話じゃないな……）&lt;BR&gt;　頭の中で懸命に様々な可能性を組み立てながらスコールはルナゲートにたどり着いた。&lt;BR&gt;（とにかく、何でもいい、手がかりになれば……）&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;「カプセルというのは、普通の車などで運び出し可能なのか？」&lt;BR&gt;　ばさりと書類を机に放り出し、スコールがルナゲート職員に質問を投げかけた。&lt;BR&gt;「そうですね……大きさがけっこうありますから、普通車両ではまず無理だと思いますよ。軍事用の運搬車両とかなら可能でしょうけど」&lt;BR&gt;「稼働状態での持ち運びは可能か？」&lt;BR&gt;「えぇ。カプセルを射出機に搭載して発射した後、不測の事態が起きた時には射出機からカプセルを分離することができるんです。射出機から分離したカプセルの内蔵電源でおよそ７２時間稼働できるよう設計されています。つまり、約３日ですね」&lt;BR&gt;「射出機ごと動かすなんてことは、もちろん不可能だな？」&lt;BR&gt;「それはもちろん。小型と言っても持ち運びのできる代物ではありませんから」&lt;BR&gt;「７２時間たつと、どうなるんだ？　放置した場合、中の奴はどうなる？」&lt;BR&gt;「７１時間が経過した時点で、自動解凍がはじまります。ルナサイドベースで行う急速解凍よりも若干時間はかかりますが、それでも６０分もすれば意識を回復できるはずです。ちなみにその後１８時間程度は生命維持装置が作動するようになっていますので、事故が起きた場合はその間に救難信号を自分で出し、こちらが信号を受け取り回収作業に出るのを待つことになりますね」&lt;BR&gt;「７２時間……か」&lt;BR&gt;　ちらりとスコールは腕時計に視線を走らせる。現在は午後１時を回ったところ。セルフィの身柄が奪われたのが大体午前５時前後。約３１時間が経過した計算だ。&lt;BR&gt;　エスタと同等の設備のある施設に移されているなら目覚めている可能性もあるし、７２時間を超えて眠らされる可能性もあるが……この世界で、エスタと同等の科学力を持った国の話など、聞いたことはない。&lt;BR&gt;　そうなると、セルフィを手に入れた連中は、ただ雁首揃えて自動解凍が終わるのを待っているのみということになる。７２時間というタイムリミットをその連中が知っているかどうかは定かではないが、Ｇ．Ｆ．に対する何らかの手段もその間に講じるはずだ。&lt;BR&gt;　スコールは立ち上がり、ルナゲートに集まった白いSeeD達に視線を走らせ口を開いた。&lt;BR&gt;「とりあえず、ルナゲートにあるホストコンピュータのログを洗い出す。セルフィ拉致以降記録にない冷凍睡眠装置のカプセルの使用履歴があれば全部抜き出して調査しろ。監視システム同様、データをいじっている可能性もあるからそれも考慮に入れてくれ。&lt;BR&gt;　装置の方はカプセルが取り外し可能だから、ステーション内で稼働させた可能性は低いと思う。未記録でカプセルの取り外し作業を行った形跡がないかどうかを重点的に見てほしい。&lt;BR&gt;　あぁ、訂正がひとつ。拉致以降ではなく、念のため拉致以前も数日間に遡ってログを洗ってくれ。長期に渡ってカプセルが取り外されているような場合があれば、それも確認する。いつから計画を練られていたのか、わからないからな」&lt;BR&gt;「……ログの数は膨大だから、人海戦術になるな、これは」&lt;BR&gt;　白いSeeDのひとりが苦笑まじりにログファイルを眺めて呟く。スコールは頷いた。&lt;BR&gt;「大変だろうが、頼む。俺は未記録分のデータ解明に当たる。記録にない使用ログがあったら俺のところまで持ってきてくれ。&lt;BR&gt;　……あと、ここの監視体制ももう一度チェックしたい。システムはどうなってる？」&lt;BR&gt;「じゃ、こちらへ」&lt;BR&gt;　職員は頷き、スコールを促しすぐさま部屋を飛び出していく。&lt;BR&gt;　あわただしく全員が動き始めた。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　ログの調査は、深夜まで及んだ。&lt;BR&gt;　SeeDとして数多くの任務についてきたスコールは、２日くらいなら眠らず活動できる程度の体力を持っている。&lt;BR&gt;　だが彼は、徹夜で作業しようとは言い出さなかった。&lt;BR&gt;　作業を切り上げ官邸に戻っていく彼に、ほんの少し意外な印象を受けた者達も、異議を唱えることはしなかった。&lt;BR&gt;&lt;BR&gt;　こうして、セルフィ行方不明から二日目が過ぎていった。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　視界のすべてを、白い雪が舞っていた。&lt;BR&gt;&lt;BR&gt;　強い風の中、雪はクルクルと舞い上がり、激しく踊るようにして、白銀の地面に舞い落ちる。&lt;BR&gt;　見た目はやわらかく美しい白銀の地面は、けれど一歩踏み出すごとに固い音を立てた。&lt;BR&gt;　ほっと息をひとつつく。白い息が風に飛ばされる。&lt;BR&gt;　セルフィはそれを見送り、それからゆっくりと腕を伸ばした。&lt;BR&gt;　まっすぐ腕を伸ばし、手首をわずかにやわらかく曲げる。&lt;BR&gt;　すると吹雪の音に混ざって、パタパタ…と羽音が聞こえてくるのだ。&lt;BR&gt;　真っ白だった視界内に、青い羽がふわりと見える。それにセルフィはにっこりと笑った。&lt;BR&gt;『……物好きだな』&lt;BR&gt;　吹雪など物ともせず、軽やかな羽音とともにセルフィの手に舞い降りたのは、一羽の青い小鳥だった。&lt;BR&gt;「誰かおったら、会えへんもん」&lt;BR&gt;　ぷうっと頬をふくらませて、セルフィが答える。&lt;BR&gt;　青い小鳥が、思考に直接言葉を送る――そんな怪異を、当然のように受け止めていた。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;（そう……ひとりになった時だけ、姿が見れた……）&lt;BR&gt;　過去の自分の姿を思い描き、懐かしい光景を見つめながら、セルフィはそっとひとりごちる。&lt;BR&gt;　トラビアガーデンでは禁止されたＧ．Ｆ．。それをジャンクションしていることに、後ろめたさは少なからずあった。&lt;BR&gt;　けれど、セルフィはこの青い小鳥の姿をしたＧ．Ｆ．を、いたく気に入っていた。&lt;BR&gt;　はじめ出会った時――それがいつのことかは思い出せないが――このＧ．Ｆ．はもっと違う姿だった気がする。まったく違う姿で、セルフィと出会ったはずだ。&lt;BR&gt;　本はあまり読まないセルフィが、たったひとつだけ印象的に覚えていた童話に、幸福を運ぶ青い鳥の話があった。だから、Ｇ．Ｆ．にねだった。青い鳥の姿になってほしいと、自分だけの青い鳥になってほしいと、願った。&lt;BR&gt;　Ｇ．Ｆ．は、セルフィの願いを聞き届けてくれ、望み通りの姿で、セルフィの内に留まった。&lt;BR&gt;　せっかく青い鳥になってはもらっても、そういつもいつも姿を見ることはできなかった。&lt;BR&gt;　何しろ見る者が見ればＧ．Ｆ．だと一目でわかってしまう。青い鳥と引き離されるのが怖くて、セルフィはいつだって、このＧ．Ｆ．を見る時は完全にひとりの時だけに留めておいた。召喚などしなくても、Ｇ．Ｆ．が内にいてくれれば話はできる。戦闘になっても、強力な魔法を好きに使うことができた。&lt;BR&gt;　そして何より、自分の内にＧ．Ｆ．がいるということは、セルフィの孤独をなぐさめた。&lt;BR&gt;　今までずっと、セルフィは毎日を楽しく過ごしていた。同い年の友達、優しい先輩、可愛い弟妹――皆に愛され一緒に暮らして、ずっと楽しく、幸せなのだと信じていた。親はいなかったけれど、こんなトラビアのガーデンにいる子供達はほとんど皆孤児で、これだけ同じ境遇の子供がいれば親がいないことを不幸だとも思わなかった。&lt;BR&gt;　けれどＧ．Ｆ．を手に入れたことで、セルフィは気づいてしまった。……自分がずっと、寂しかったことに。&lt;BR&gt;　どれほど仲良くしていても、家族同然の暮らしをしていても。セルフィは自分のすべてを他人にさらけ出すようなことはしなかったし、他人に頼り切ることもできなかった。頼られれば素直に嬉しくても、自分が甘えるようなことはできなかった。&lt;BR&gt;　誰にでも平等であるがゆえに、自分もまた、平等の一端でしかないことも自覚していた。何かを独占したことも、独占したいと思ったこともなかった。わがままを言える相手もいないから、できることは全部自分でやった。できないことも、自分の力でこなす努力を惜しまなかった。&lt;BR&gt;　それが当然と思う心の裏側で、セルフィは、確かにひどく、寂しかったのだ。&lt;BR&gt;　頼る相手、甘える相手、無条件で独占することのできる相手――一般の子供達が『親』という名で生まれながらに与えられている、そんな存在をずっと欲していた。&lt;BR&gt;　楽しい生活、幸せな毎日の陰で押し殺してきたそんな気持ちを、Ｇ．Ｆ．はセルフィに気づかせてしまった。&lt;BR&gt;　どんな契約を成したかも忘れたが、Ｇ．Ｆ．はそんなセルフィの傍にいることを約してくれた。&lt;BR&gt;　誰に自慢できる存在でもなかったが、青い鳥のＧ．Ｆ．は間違いなく、セルフィがはじめて手に入れた『セルフィだけのもの』だった。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;「Ｇ．Ｆ．が話しかけてくることもあるんだな」&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　突然、背後から声がした。&lt;BR&gt;　聞き慣れた響きの良い低い声。&lt;BR&gt;　どきりと心臓を高鳴らせ、セルフィは過去の光景から眼を離して振り返る。&lt;BR&gt;　雪の中、漆黒の固まりが立っているように見えた。&lt;BR&gt;　それがすらりとした長身の青年であることに、気づくまでに時間はかからなかった。&lt;BR&gt;「また会えたな」&lt;BR&gt;　ちらっと笑みを見せて、スコールが言った。――現実と、寸分違わぬリアルさで。&lt;BR&gt;「そうだね」&lt;BR&gt;　頷いて微笑みながら、セルフィは泣き出したい気持ちになっていた。&lt;BR&gt;（夢……）&lt;BR&gt;　これは自分が見ている夢。眠らされた自分が紡いでいる夢。&lt;BR&gt;　だからこうして自分と言葉をかわすスコールもまた、ただの夢。セルフィの望みを映しただけの存在。&lt;BR&gt;　気づいてしまった大切な想いが、夢の世界で作り出した幻想にすぎない。&lt;BR&gt;「リノアと話、できた～？」&lt;BR&gt;　夢なのだから、もっと都合の良い会話を交わしてもいいはずなのに、結局こんな言葉を口にしてしまう。&lt;BR&gt;「……あぁ」&lt;BR&gt;　穏やかに笑んで、スコールが頷いた。&lt;BR&gt;　リノアと出会ってから身につけた笑顔。それにセルフィの胸が締め付けられる。&lt;BR&gt;「ケンカにならなかった～？」&lt;BR&gt;「あぁ。あの花のおかげだ」&lt;BR&gt;「そっかぁ」&lt;BR&gt;　にっこりと笑顔で頷く自分が、自分でも不思議だった。&lt;BR&gt;　本当は大声で泣きたい気分なのに、どうして笑っていられるのか、自分でもわからなかった。&lt;BR&gt;　夢の中でまで、リノアを想って幸せそうに微笑むスコールが憎らしかった。&lt;BR&gt;　――――全部答えが出たら……&lt;BR&gt;　自分で言った言葉をふと思い出し、セルフィはどきりと胸を高鳴らせた。&lt;BR&gt;　あの時は何となく雰囲気でああ言ってしまったが、今こうしてすっきり顔のスコールを前にすると、あのキスの意味を聞く勇気などとても湧いてこなかった。&lt;BR&gt;　たとえ夢の中であっても、辛い答えが返ってきそうな、そんな気がした。&lt;BR&gt;「これは？」&lt;BR&gt;　スコールがすいと視線を辺りに向けてセルフィにたずねた。&lt;BR&gt;　昨日スコールと話したのはイデアの孤児院だった。そして今はトラビアの雪原。&lt;BR&gt;「あ、う、うん……」&lt;BR&gt;　慌ててセルフィは頷いて、過去の情景に眼を向けた。会話の流れが変わり、内心少しほっとする。&lt;BR&gt;「思い出そうと思ったんだけど……」&lt;BR&gt;　自分の身を使いエスタを襲うＧ．Ｆ．の正体を、思い出したかった。&lt;BR&gt;「あたし、Ｇ．Ｆ．に乗っ取られてる時ね、夢見てたんだ～」&lt;BR&gt;「夢？」&lt;BR&gt;「こんなふうに、昔の思い出を、夢に見てたんだよ。起きた時には忘れちゃってたんだけど～」&lt;BR&gt;　雪の中、青い鳥と楽しげに遊ぶ１２歳のセルフィを見つめて、スコールがわずかに眼を細めた。&lt;BR&gt;　そんなスコールの端整な横顔をじっと見つめながら、セルフィは言葉を続けた。&lt;BR&gt;「でもね～、ダメなんだ～。あのＧ．Ｆ．にいつ、どんな風に会ったのかとか、どんなきっかけではずしたのかとか、肝心なとこだけ思い出せないんだよ～」&lt;BR&gt;　どれほど頑張っても、思い出せるのはその周辺の思い出ばかり。&lt;BR&gt;　セルフィの言葉に、スコールの横顔に苦いものがよぎる。&lt;BR&gt;　まさかスコールが、セルフィの失われた過去に何があったか知っているなどとは夢にも思わないセルフィは、不思議に思いながらスコールを見上げる。&lt;BR&gt;　吹雪が邪魔だな、とそこでセルフィは気がつき、にっこりと笑って言った。&lt;BR&gt;「場所、変えようか～」&lt;BR&gt;「え？」&lt;BR&gt;　今度はスコールが不思議そうにセルフィを見る。そんなことが可能なのかと言わんばかりに。&lt;BR&gt;　セルフィはなんだかおかしな気分になった。&lt;BR&gt;　この世界はセルフィの夢だ。場所なんてセルフィが望むままにどんなふうにも変えられる。夢の中の一部にすぎないこのスコールには、それがわからないのだろうか。&lt;BR&gt;「行こ！」&lt;BR&gt;　セルフィは腕を伸ばしてスコールの手をとった。あたたかな手に触れて一瞬どきりとしたが、気がつかない振りをした。夢でなければこんな風にできっこないのに、ためらっていたらもったいない。&lt;BR&gt;「お、おい」&lt;BR&gt;　驚いたように、けれど素直にセルフィの手に引かれてスコールがついてくる。&lt;BR&gt;&lt;BR&gt;　忘れられた思い出のタネを、芽吹かせることはできるのだろうか。&lt;BR&gt;&lt;BR&gt;　はかない期待を抱きながら、セルフィはスコールの手を引いて、吹雪の中を走り抜けた。&lt;BR&gt;　大切な思い出の場所は、すぐ傍にあった。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;&lt;/SPAN&gt;

<script data-viewer-zoom-script>
(() => {
  const stage = document.querySelector('.viewer-stage-image');
  const image = stage ? stage.querySelector('.viewer-image') : null;
  if (!stage || !image) {
    return;
  }

  const setZoom = (enabled) => {
    stage.classList.toggle('is-zoomed', enabled);
    image.setAttribute('aria-pressed', enabled ? 'true' : 'false');
    if (enabled) {
      const naturalWidth = image.naturalWidth || image.clientWidth || 0;
      const targetWidth = naturalWidth > 0
        ? Math.max(naturalWidth, Math.min(Math.round(stage.clientWidth * 0.92), naturalWidth * 4))
        : Math.round(stage.clientWidth * 0.92);
      image.style.width = `${targetWidth}px`;
      image.style.maxWidth = 'none';
      image.style.maxHeight = 'none';
      requestAnimationFrame(() => {
        stage.scrollTop = 0;
        stage.scrollLeft = Math.max(0, Math.round((image.scrollWidth - stage.clientWidth) / 2));
      });
    } else {
      image.style.removeProperty('width');
      image.style.removeProperty('max-width');
      image.style.removeProperty('max-height');
      stage.scrollTop = 0;
      stage.scrollLeft = 0;
    }
  };

  const toggleZoom = () => {
    setZoom(!stage.classList.contains('is-zoomed'));
  };

  image.setAttribute('tabindex', '0');
  image.setAttribute('role', 'button');
  image.setAttribute('aria-label', '逕ｻ蜒上ｒ諡｡螟ｧ縺ｾ縺溘・邵ｮ蟆・);
  image.setAttribute('aria-pressed', 'false');

  image.addEventListener('click', toggleZoom);
  image.addEventListener('keydown', (event) => {
    if (event.key === 'Enter' || event.key === ' ') {
      event.preventDefault();
      toggleZoom();
    }
  });

  stage.addEventListener('click', (event) => {
    if (event.target === stage && stage.classList.contains('is-zoomed')) {
      setZoom(false);
    }
  });

  window.addEventListener('keydown', (event) => {
    if (event.key === 'Escape' && stage.classList.contains('is-zoomed')) {
      setZoom(false);
    }
  });
})();
</script>
