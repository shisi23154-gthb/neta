      width=537&gt;&lt;SPAN&gt;&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;「……そうです。やはりＧ．Ｆ．を操る人間がいるようです」&lt;BR&gt;　数日を情報処理に追われ、一段落したところで、スコールは学園長に対し中間報告を入れていた。&lt;BR&gt;　可能な限り盗聴や電波傍受をブロックする、特別製のSeeD専用小型通信機だ。もっともエスタの技術で作られたものなので、エスタ内でどれほど信憑性があるのかは謎だったが。&lt;BR&gt;「噂話の大半は信憑性のかけらもありませんが、目撃証言はある程度情報が一致しています。顔を見た者はいませんが、背の低い少年もしくは女性、細身で動作は軽く事件現場から走り去るのを数人が目撃しています。あと同じく事件現場に近い場所にいた人間数名から、被害者が襲われた時、鳥の羽音を聞いていたという証言が」&lt;BR&gt;　セルフィが一体何を吹聴して回ったかは不明だったが、事件現場に近くいたという証言が相次いで寄せられていた。&lt;BR&gt;　現場自体は寂しい区画だったが、路地をはさんで大通りに出れば、ちょうど酒場や風俗店の並ぶ夜の街だったため、深夜の帰宅客が多くその場にいたのである。&lt;BR&gt;「……えぇ、鳥です。酔客の証言ですが、人の悲鳴を聞いて酔いが醒めた時に聞いたそうですし、数人が同じ証言をしています。……はい、そうです」&lt;BR&gt;　そんなスコールの会話を聞きながら、セルフィはミニコンピュータを打つ手を止めた。&lt;BR&gt;　スコールにあてがわれた部屋に押し掛けて、彼女はベッドに腰掛けガーデンに提出する報告書を作成中である。&lt;BR&gt;（おねえちゃんたちを襲ったＧ．Ｆ．も、たしか鳥系の形をしとったんやなかったっけ～？）&lt;BR&gt;　そうだ、確かそうだった。&lt;BR&gt;「応援？　……いえ、不要です。それは契約外ですから」&lt;BR&gt;　言いながらスコールがセルフィに視線を流し、セルフィも同意の意味をこめて頷いた。&lt;BR&gt;　まだ敵の実体もつかめていないのに、応援なんて呼んだらSeeD失格だ。&lt;BR&gt;　スコールはそんなセルフィの眼差しにふと唇に笑みをのせた。&lt;BR&gt;「はい……はい、わかりました。はい。では」&lt;BR&gt;　通信を終え、回線を切ると、スコールは無駄のない動きで立ち上がりセルフィの手元をのぞきこんだ。&lt;BR&gt;「報告書は終わったか？」&lt;BR&gt;「へ？　あ、あと少し～」&lt;BR&gt;「書いたらそのまま学園長にメールで送付しておいてくれ」&lt;BR&gt;　スコールは報告書をわざわざチェックするつもりはないらしい。面倒くさいのかセルフィを信頼しているのか、微妙なところだとセルフィは思った。&lt;BR&gt;「りょ～かい」&lt;BR&gt;　のんびりと答え、ミニコンピュータをまたぱちぱちと打ち始める。&lt;BR&gt;　固い文章を作るのはあまり楽しい作業ではないが、文章を書くこと自体はそれほど苦手ではない。&lt;BR&gt;　そういえばガーデンの日記、更新止まっちゃったままだな～などと考えながら、手早く報告書をまとめていく。&lt;BR&gt;「ね、スコール」&lt;BR&gt;　画面に顔を向けたまま声をかける。返事はなかったが、気にせずに彼女は続けることにした。&lt;BR&gt;「おなじＧ．Ｆ．だと思う～？」&lt;BR&gt;　また数秒沈黙。セルフィは少しの間答えを待ったが、ないようなのでさらに口を開いた。&lt;BR&gt;「もし使い手が複数だったら～、Ｇ．Ｆ．の数は少ないってことかな～？」&lt;BR&gt;「……Ｇ．Ｆ．の数？」&lt;BR&gt;　ふと、スコールが興味を引いたようにたずねてきた。セルフィはなんとなく嬉しくなる。&lt;BR&gt;「うん。Ｇ．Ｆ．って必ずしも同じ人ばっかがジャンクションしてるわけじゃないでしょ～？　もちろん同じ人が継続してジャンクションし続けてた方が相性も良くなるし、強さにも影響してくるけど」&lt;BR&gt;　一国の大統領を相手にしているのだ。セルフィの頭にははじめから、敵は複数だという考えがあった。&lt;BR&gt;「もしそうなら……人間は複数いるのに、わざわざ同じＧ．Ｆ．を使ったってことだよね～？　……あ、でも、こっちの捜査を攪乱させる気が全然なくて、むしろ同一犯を意識させたくて、わざと同じＧ．Ｆ．を使ってるってことだって、ないわけじゃないのか～」&lt;BR&gt;　狙いはラグナやエルオーネ個人ではなく、国家そのものだと意識づけたくて、市民を襲った。&lt;BR&gt;　そっちの方が考えとしては自然かもしれないと、セルフィは頭の中で軌道修正する。&lt;BR&gt;「そうしたら……やだな、相手にあとどのくらいのＧ．Ｆ．がいるのか、全然わからないんだ～。最強を連れてきてるのか、そこそこなのか……」&lt;BR&gt;　今回の事件の被害者たち。そして前回被害を受けたSeeDたち。損壊の激しい遺体を見れば、襲ったＧ．Ｆ．の力量もわかろうというものだ。&lt;BR&gt;　それが、相手の中ではどの程度の力なのか。今回のＧ．Ｆ．より強いＧ．Ｆ．に複数襲いかかられたりしては、たまらない。&lt;BR&gt;「……」&lt;BR&gt;　セルフィの言葉に、色々と思考をめぐらせながら、スコールは黙ってうつむいていた。&lt;BR&gt;　立て続けに起きた血の惨事。謎のＧ．Ｆ．とその使い手。昨夜のセルフィの異変。&lt;BR&gt;　うまく頭の中で、それらが一本の線につながらない。&lt;BR&gt;「Ｇ．Ｆ．を……使える人間……」&lt;BR&gt;　ぽつりとセルフィが呟く。スコールが眼を上げた。&lt;BR&gt;　訓練もせずに、あれほどのＧ．Ｆ．を使える人間……。&lt;BR&gt;「卒業生……とかだったら……やだね～……？」&lt;BR&gt;　思いついてしまった嫌な予感に、セルフィがスコールと視線を合わせ苦笑した。&lt;BR&gt;　スコールはかすかに眉をひそめる。&lt;BR&gt;　確かに、世界広しと言えど、Ｇ．Ｆ．を使うことができるのはバラムガーデンに在籍したことのある者のみ、なのだが……。&lt;BR&gt;「……」&lt;BR&gt;　無言でスコールはセルフィに歩み寄り、どさっと彼女の隣に腰をおろすと、身体を横倒すようにして勢いよく彼女の背中に寄りかかった。&lt;BR&gt;「わっ、わっ、わっ、なに～？？」&lt;BR&gt;　ベッドの上に乗っていたセルフィは、いきなりスコールの体重を背中に受け、そのまま前のめりに崩れそうになって声をあげた。&lt;BR&gt;「ガーデンは……疑いたくないな」&lt;BR&gt;　背中に直接スコールの声が響く。&lt;BR&gt;　セルフィは肩越しにスコールを見たが、表情まではわからなかった。&lt;BR&gt;「……」&lt;BR&gt;　そうだ、最初の任務を聞いたときから、スコールはその可能性を考えていたのだ。&lt;BR&gt;　スコールの声を聞いた瞬間に、セルフィはそう悟っていた。&lt;BR&gt;　心の片隅でリノアに怒られるかなぁ…と思いながら、セルフィはスコールに寄りかかり返す。&lt;BR&gt;　首を横向けると、スコールのさらりとした髪が頬に触れた。&lt;BR&gt;「……うん、そうだね～……」&lt;BR&gt;　トラビアで育ったセルフィはともかく、バラムで育ったスコールにとって、あそこは家と同じなのだ。&lt;BR&gt;　かつて『家族』だった者が、Ｇ．Ｆ．でSeeDを襲ったなんて、想像したくはない。&lt;BR&gt;　SeeDとしては甘い考えなのだろうけれど……。&lt;BR&gt;（それにもし……ほんまに）&lt;BR&gt;　声には出さず、セルフィは心の中でそっと呟く。&lt;BR&gt;（もしほんまに、バラムの卒業生や在校生の仕業やったら……）&lt;BR&gt;　今築かれたバラムとエスタの関係は、確実に悪化する。&lt;BR&gt;　それはきっと、スコールやラグナ、エルオーネにとって、不幸な未来だ。&lt;BR&gt;　セルフィにはそんな未来は耐えられない気がした。&lt;BR&gt;「だいじょぶ、だいじょ～ぶ！」&lt;BR&gt;　だからセルフィは無理に明るい声でそう言い切った。明るい未来だけが来るように。&lt;BR&gt;「ガーデン関係者が、そんなことするなんて、ありえないよ～！　たまたまＧ．Ｆ．と相性のいい人が偶然見つけて利用してるだけとかだよ～！　ね？」&lt;BR&gt;　くすっと、背中でスコールが小さく笑った気配がした。&lt;BR&gt;「……偶然か」&lt;BR&gt;「そう、偶然～！」&lt;BR&gt;　セルフィも笑って答える。&lt;BR&gt;　不幸な未来ばかりを考えて、本当にそんな未来を引き寄せてしまいたくはなかったから。&lt;BR&gt;「……そうか」&lt;BR&gt;　あれこれと最悪な事態ばかりを想定していたスコールだったが、セルフィの明るい声を聞いてたら何だか妙に気分が軽くなってくる。&lt;BR&gt;　思い悩んでいたことがばかばかしく思えてくるのだ。&lt;BR&gt;「疲れたな」&lt;BR&gt;　気が軽くなった影響か、こんな言葉もするりと口をついて出る。&lt;BR&gt;　セルフィには、どんな弱音も受け止めて笑い飛ばしてくれる雰囲気があった。&lt;BR&gt;「疲れたね～。こぉゆう座ってお仕事系は気分すっきりしなくてダメだよね～！」&lt;BR&gt;　外に出てモンスター退治でもしていた方がよほど気が紛れると言い切るセルフィにスコールは苦笑する。&lt;BR&gt;「確かにな」&lt;BR&gt;　兵士養成所だけあって、ガーデン生は基本的に体育会系である。&lt;BR&gt;　姿の見えない敵を追うより、目の前の雑魚を蹴散らして走る方が精神衛生上非常に楽であるのは明白だ。&lt;BR&gt;　セルフィの薄い肩に右半身を預けていたスコールは、そのままするりと真後ろに倒れ込んだ。&lt;BR&gt;「わわっ」&lt;BR&gt;　スコールに体重を預け返していたセルフィは、支えを失ってスコールの腹の上にぽすんと倒れ込む。&lt;BR&gt;　あきれるほど軽い彼女の重みを受け止めても、スコールの腹筋はびくともしなかった。&lt;BR&gt;「なんだ、腹筋のない奴だな」&lt;BR&gt;　自分の体重くらいちゃんと支えろと言うスコールに、彼の腹を枕にしてしまったセルフィはぷうっと頬をふくらませた。&lt;BR&gt;「んも～！　あたしはちゃんと腹筋くらいあります～！　今のはいきなりで、油断したの～！」&lt;BR&gt;　肉のつきにくい体型のセルフィは、端から見てるとあまりわからないが、無駄のない筋肉が計算されてかっちりと配置されている。&lt;BR&gt;　もちろん、そうでなければ巨大なヌンチャクを振り回してモンスターと渡り合えるはずもない。&lt;BR&gt;　寄りかかったスコールを受け止めた華奢な背中は、見かけほどか弱いものではないのだ。&lt;BR&gt;「そういう意地悪なはんちょは枕にしちゃうもん～！」&lt;BR&gt;　冗談めかしてスコールを睨んだセルフィは、一度持ち上げた頭部をまたスコールの腹部にぼすんと乗せる。&lt;BR&gt;　もちろんそんな重みは苦でもなかったが、そうやってじゃれているセルフィはなんだかご機嫌の猫のようで、スコールはくっくっと喉の奥で笑い出してしまう。&lt;BR&gt;「おい、くすぐったい」&lt;BR&gt;「し～らない！」&lt;BR&gt;　セルフィは怒っているふりでそっぽを向く。&lt;BR&gt;　だが怒った顔は長くは続かず、セルフィもまたこみ上げてくる笑いに、くすくすと身体を震わせる。&lt;BR&gt;　気が付くと、ふたりとも発作のように笑い合っていた。&lt;BR&gt;　子供のようにじゃれ合いながら、不安すべてを消し去るように。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　しばらく後、スコールの部屋にふたりの様子を見に来たエルオーネは、ベッドの上で兄妹猫よろしく重なって眠りこけている弟と妹を発見し、いい歳をしてベッドの上で何をしているのかと苦笑しながら毛布をかけてやった。&lt;BR&gt;　と、さすがSeeDと言うべきか、人の気配に気づいてスコールが先に眼を覚ました。&lt;BR&gt;「………………おねえ……？」&lt;BR&gt;　だが声はまだ寝ぼけている。エルオーネはくすくすと笑ってスコールの顔をのぞきこんだ。&lt;BR&gt;「お疲れね、スコール。いいから、もう少し寝てなさい」&lt;BR&gt;「……え……？」&lt;BR&gt;　ずいぶんと無防備な眼差しに、エルオーネは驚きさえ覚えながら、もう一度優しく言った。&lt;BR&gt;「いいから。おやすみなさい」&lt;BR&gt;　次にスコールがこんな表情になれるのはいつなのだろう。そんなことを、ふと考えた。&lt;BR&gt;　肉親同然のエルオーネの声に、半覚醒状態のスコールはそのまま眠りに落ちてしまう。&lt;BR&gt;　ちょうど眠りが深い時に声をかけてしまったのだろうとエルオーネは判断し、もう一度毛布をきちんとふたりにかけ直してやると、足音を忍ばせて部屋を出た。&lt;BR&gt;（スコール、もしかしてずっと熟睡できていなかったのかしら）&lt;BR&gt;　エスタに来た時から、どこか思い詰めた表情をしていた彼女の弟。&lt;BR&gt;　一年前の魔女騒動以来久しく見ていなかった顔だったから、少し気にかかっていたのだ。&lt;BR&gt;　もちろん、彼はプロだから、不眠などになって仕事に支障の出るような真似はするはずがない。&lt;BR&gt;　けれど、身体の疲れをとるだけでなく、精神的にきちんと休める睡眠だって、人間には必要なのだ。&lt;BR&gt;　今までの様子からして、必要最低限の睡眠を義務のごとく取っていただろうことが、容易に想像できて、エルオーネは少しもどかしいような、悲しい気持ちになった。&lt;BR&gt;　でもなぜ……今こんな事件の最中、あんな無防備に眠っていられるのだろう？&lt;BR&gt;　セルフィだって、不安だらけのはずだろうに……。&lt;BR&gt;　スコールの部屋から一歩出た体勢のまま、エルオーネは立ちつくして考え込まずにいられなかった。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　なんだかあたたかいものに包まれていた。&lt;BR&gt;　懐かしいような、切ないような、温もりがすぐ傍にあった。&lt;BR&gt;　夢だろうか？　自問して、スコールは夢だろう、と勝手に納得する。&lt;BR&gt;　幼稚な夢だと認識しながら、それでも温もりを失いたくなくて、スコールは固く眼を閉じたまま開かずにいた。&lt;BR&gt;　夢ならいいじゃないか、と心の中で声がした。誰に知られることもないのだから。&lt;BR&gt;　と、ふいに触れていた温もりが消え、離れていく感覚があった。&lt;BR&gt;「――！」&lt;BR&gt;　とっさに温もりに手をのばし、引き留める。手の中に、ずっと感じていた温もりがおさまった。&lt;BR&gt;　完全になくしたわけじゃないとわかり、スコールは少しだけほっとする。&lt;BR&gt;　温もりは、なくした時がひどく辛い。それを彼は幼い頃に嫌と言うほど知っていた。&lt;BR&gt;　だから、温もりなどもう求めない、そう決めた。けれど結局は、誰より温もりを求めてやまなかったのも事実なのだと気が付いてしまったのだけれど。&lt;BR&gt;「あ、あの～？」&lt;BR&gt;　引き寄せて、腕の中に捕らえたとたん、声がした。&lt;BR&gt;「スコール？　ねぼけてるの～？」&lt;BR&gt;　驚きをにじませた、ほんの少し高いトーンの声。&lt;BR&gt;　聞き覚えのある声だった。その上、妙にリアルだった。……夢のわりには。&lt;BR&gt;（夢……？）&lt;BR&gt;　あくまで眼を閉じたまま、スコールは心の中にむくりと浮かんだ疑惑に眉をひそめた。&lt;BR&gt;（夢……の、はず……だよな……？）&lt;BR&gt;「スコール、お～い？　もしも～し！」&lt;BR&gt;　しかしリアルな声はよく知る少女の声で、しつこく自分を呼びかけてくる。&lt;BR&gt;（…………まさか……）&lt;BR&gt;　意を決して、おそるおそる眼を開けると、視界に自分がしっかりと抱きしめてしまっているセルフィの姿が飛び込んできた。&lt;BR&gt;　右手ががっちりとつかんでいるのは、彼女の二の腕である。&lt;BR&gt;　いつもきちんと外巻きにカールされている栗色の髪が、ルーズに乱れて幼さの残る頬に散っていた。&lt;BR&gt;「…………セルフィ？」&lt;BR&gt;「あ、起きた～？」&lt;BR&gt;　にっこりとセルフィが笑う。頬に当たっていたスコールの銀鎖のペンダントが、彼女の動きに合わせてかしゃりと澄んだ音色をたてた。&lt;BR&gt;「なんか、いつの間にか寝ちゃったみたいだね～。あたし、スコールのことずっと枕にしちゃってたみたい～」&lt;BR&gt;　幸か不幸かお互い寝相が大変よろしかったため、じゃれ合って笑い合っていた時とまったく同じ体勢で寝入ってそのまま眼がさめたらしい。&lt;BR&gt;　報告書のことを思い出して慌てて身を起こしたところを、スコールに引き留められて抱きしめられてしまったというわけだ。&lt;BR&gt;「あ、……あ、悪い……」&lt;BR&gt;　先ほどエルオーネが声をかけた時と違い、完全に覚醒した状態のスコールは、事態を把握して慌てて腕を開いて彼女を解放した。&lt;BR&gt;「スコールはあたしがおふとん代わりだったの～？　じゃ、おあいこだ～！」&lt;BR&gt;　セルフィと、（誰がかけたが不明だが）毛布と。そりゃいきなり上から除けられてしまったら寒いだろうと、明るくセルフィは笑って言った。&lt;BR&gt;「あぁ……」&lt;BR&gt;　歯切れ悪くスコールは頷き、のろのろと身を起こした。&lt;BR&gt;　セルフィはそんな彼にあっさりと背を向け、スリープしているミニコンを立ち上げている。&lt;BR&gt;　しばし後に起動音がし、セルフィはカタカタと音を立てて報告書の続きを作り始めた。&lt;BR&gt;「……」&lt;BR&gt;　セルフィの背中を見つめながら、スコールはぼんやりと、彼女に手を伸ばそうか迷っている自分に気づき、不思議な気持ちになっていた。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　数日は何事もなく過ぎた。&lt;BR&gt;　変わったことといえば、エスタの夜が奇妙に静かになったことだ。&lt;BR&gt;　皆、夜になれば謎のＧ．Ｆ．を恐れて外にでることを拒み、結果としてエスタの街はひどく静かになってしまった。&lt;BR&gt;　月の涙以降ようやく客足も回復してきたところだった居酒屋や風俗店など、夜の店はまたもや大打撃である。&lt;BR&gt;　ラグナとエルオーネ近辺も、特にこれといって変わったことは起きていなかった。&lt;BR&gt;　襲撃のあった夜、おかしな様子を見せたセルフィもまったくいつも通りと変わらない。&lt;BR&gt;　スコール達は襲撃のあった夜の目撃情報を元に捜査をしていたが、これといって進展は望めなかった。&lt;BR&gt;　せめて犠牲者がひとりでも生きていてくれたら――そんなふうに溜息ばかり出るようになった頃。&lt;BR&gt;　再度の事件が、起きた。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;「スコール、来てくれ！！　街から通報だ！！」&lt;BR&gt;　真夜中に部屋に飛び込んできた大統領付きの白いSeeDに、スコールは飛び起き、手近にいつもおいてある上着と武器をひっつかんで部屋を飛び出した。&lt;BR&gt;　部屋の外には数名の白いSeeDがスコールを待っていた。&lt;BR&gt;「Ｇ．Ｆ．は！？」&lt;BR&gt;「まだ街にいるらしい！」&lt;BR&gt;「大統領とエルオーネは無事なんだな？」&lt;BR&gt;「こっちには来ていない。前回と同じだ！」&lt;BR&gt;　叫ぶように会話をかわしながら廊下を走っていると、反対側から別のSeeDが走ってくるのが見えた。&lt;BR&gt;「スコール！　セルフィを見なかったか！？」&lt;BR&gt;　そのSeeDはスコールの姿を見つけて大声で叫ぶ。スコールは思わず急停止してしまっていた。&lt;BR&gt;「……いないのか？」&lt;BR&gt;　クッと眉をひそめて尋ねたスコールに、白いSeeDも立ち止まり頷く。&lt;BR&gt;「通報を受けて真っ先に部屋に行ったがいなかった。通信機は部屋に置いたままだった」&lt;BR&gt;　そうしてピアス型の通信機をスコールに放り投げる。&lt;BR&gt;　片手でそれを受け止め、スコールは嫌な予感に唇を噛みしめずにいられなかった。&lt;BR&gt;「スコール？」&lt;BR&gt;　脇に立つSeeDが顔をのぞきこむ。スコールは慌てて頭を振り、わざと大きな声をあげた。&lt;BR&gt;「わかった。俺はセルフィを探しがてら街におりる。おまえたちは現場に直行、できうる限り情報収集につとめてくれ。&lt;BR&gt;　万が一Ｇ．Ｆ．に遭遇したら正面からぶつからず泳がせろ。黒幕への道案内になるかもしれない。&lt;BR&gt;　他の奴らは官邸に残る。最大限の警戒体勢を取ってくれ。何かあったら俺を呼ぶこと。&lt;BR&gt;　くれぐれも無謀な戦いを挑もうとは考えるな。俺たちの任務は大統領とエルオーネの身を守ることが最優先だ」&lt;BR&gt;「了解」&lt;BR&gt;　白いSeeDたちが素早く散っていく。&lt;BR&gt;　スコールは手の中のピアスを見下ろし、一度眼を伏せると、床を蹴るようにして走り始めた。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　奇妙に静かだった街が、喧噪に包まれている。&lt;BR&gt;　不穏な空気がエスタ全体を染め上げているようだった。&lt;BR&gt;「もう、すぐ……」&lt;BR&gt;　ぽつりと、窓に手を押し当てた美女が小さく呟いた。&lt;BR&gt;「エルオーネ？」&lt;BR&gt;　誰にともなく発された言葉。それを耳にし、部屋に詰めていた白いSeeDが怪訝な表情を見せたが、彼女はまったく構わない。&lt;BR&gt;「……エルオーネ」&lt;BR&gt;　彼女の様子のおかしいことに戸惑う白いSeeDたちの中、紺色の髪のSeeDが静かに彼女に歩み寄り、穏やかな声で名を呼びかける。&lt;BR&gt;　名を呼ばれた美女が、ゆっくりと振り返り彼を見た。&lt;BR&gt;　なんの感情も浮かばない白い無表情の中、栗色のはずの瞳が冷え冷えと蒼に輝いていた。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　リフターは混乱する人々が争い奪い合う元凶になるため、一時的に使用停止になっていた。&lt;BR&gt;　スコールはガンブレードを片手に、半透明の街をひた走っていた。&lt;BR&gt;　襲撃はまたもやショッピングモールで起きたらしい。だが真っ黒な夜空に、Ｇ．Ｆ．らしき姿は見えない。&lt;BR&gt;　逃げたのだろうか……そう心の中で呟きながら、スコールは懸命にセルフィを探していた。&lt;BR&gt;（なにがあった？）&lt;BR&gt;　あの日、街に襲撃があった最初の夜、あの時もセルフィは街に出ていた。&lt;BR&gt;　今、二度目の襲撃が起きて、スコールは今回も彼女が街にいることを直感していた。&lt;BR&gt;（どこにいる？）&lt;BR&gt;　数日前のあの時に、エルオーネの力を借りてセルフィの動向を『見て』おかなかったことを、スコールは激しく後悔し始めていた。&lt;BR&gt;　考えられる可能性を懸命に押し殺し、ただただ必死で彼女を探す。&lt;BR&gt;　セルフィを早く見つけなければならなかった。&lt;BR&gt;　セルフィを見つけるのは自分でなければならないと、心のどこかでわかっていた。&lt;BR&gt;「！」&lt;BR&gt;　不意に、すぐ近くで悲鳴が聞こえた。&lt;BR&gt;　ぎょっとして悲鳴の方へ顔を向ける。&lt;BR&gt;　夜空に、大きな鳥の影が見えた。&lt;BR&gt;（――！！）&lt;BR&gt;　夜に飛ぶ鳥などいない。こんな巨大な鳥などいない。だとしたら……！！&lt;BR&gt;「どうした！？」&lt;BR&gt;　とっさに大声を出す。とにかく今襲われている人を助けなくてはならない。&lt;BR&gt;　Ｇ．Ｆ．の注意がスコールに向く。その瞬間、リフターのチューブの影から小さな子供を抱えた女性が転げるように飛び出してきた。&lt;BR&gt;「……ファイガ！！」&lt;BR&gt;　すかさず彼女の背に一撃を食らわそうとしたＧ．Ｆ．に、スコールが攻撃魔法を放つ。&lt;BR&gt;　はじけた炎に、Ｇ．Ｆ．は動きを止めたが、ダメージを受けたようには見えなかった。&lt;BR&gt;「官邸の方に逃げろ！！　早く！！」&lt;BR&gt;　どこかを負傷しているらしく、右半身を血で染めた若い母親に、スコールはＧ．Ｆ．に斬りかかりながら大声で怒鳴りつけた。&lt;BR&gt;　見るからに強敵とわかるＧ．Ｆ．相手に、素人を守りながら戦う自信はさすがにない。&lt;BR&gt;　ギィッと声をあげ、Ｇ．Ｆ．はスコールのガンブレードを軽やかに避け、鋭い爪をうち下ろした。&lt;BR&gt;「……！！」&lt;BR&gt;　とっさに身をねじって避ける。肩を爪がかすめ、上着の袖と共に肉を抉っていった。&lt;BR&gt;　血がしぶき激痛が走ったが、続いて巨大な嘴が頭を狙ってきたため気にしてる余裕などなく、スコールは無事な右腕でガンブレードを掲げて頭を庇いながら、地面を転げて攻撃を避けた。&lt;BR&gt;「シェル…！」&lt;BR&gt;　転がりながら防御魔法を唱えたのはほぼ無意識。&lt;BR&gt;　光のシールドがスコールの身体を覆うのと、すさまじい暴風が空間を支配したのはほぼ同時だった。&lt;BR&gt;（――――な……！！）&lt;BR&gt;　容赦ない風の力に身体が空に浮き、抵抗不能の状態で無数の光と真空の刃が皮膚を肉を骨を貫き切り裂いてゆく。&lt;BR&gt;　頭部を両腕でかばうのが精一杯のまま、全身を一瞬にして朱に染めたスコールは喉の奥で呻いた。&lt;BR&gt;　思考が空白化し、攻撃が止むと同時にどうっと地面に落とされる。&lt;BR&gt;　全身を激痛が貫き、意識がふわりと浮いた瞬間、Ｇ．Ｆ．がとどめとばかりに突っ込んできた。&lt;BR&gt;「…………！！」&lt;BR&gt;　それでも喉笛を狙うそれを避けることができたのはさすがと言うべきか。&lt;BR&gt;　肩に食い込んだ嘴に、スコールは苦痛の声をかみ殺し足を跳ね上げＧ．Ｆ．を蹴った。&lt;BR&gt;　反撃を予想していなかったか、まともに蹴りを食らったＧ．Ｆ．がスコールの頭の後方に飛ばされる。&lt;BR&gt;　地面に落ちる寸前にＧ．Ｆ．は空中で体勢を立て直したが、その隙にスコールも素早く立ち上がっていた。&lt;BR&gt;（畜生、確かにこいつは……）&lt;BR&gt;　荒く肩で呼吸を繰り返しながら、スコールは口の中でケアルガを唱えた。&lt;BR&gt;　身をさいなむ激痛が確実にやわらいでいく。だが、損傷が激しかったため、完全回復するには至らない。それだって、防御魔法が間に合わなければこんなものではすまなかったはずだ。&lt;BR&gt;　手練れのSeeDを倒しただけのことはある。召喚時間の長さといい、攻撃回数の多さといい、これはただのＧ．Ｆ．とは違う。モンスターと大差がないが、実体を本来持たないという点では、アルティミシアの作り出したグリーヴァと性質が似ているか。&lt;BR&gt;　彼が優秀な傭兵であるがために、力の差は歴然と感じ取れる。&lt;BR&gt;（Ｇ．Ｆ．を使うしかないか……？）&lt;BR&gt;　セルフィが不在と聞いたあの時に、スコールはバハムートをジャンクションして来ていた。&lt;BR&gt;（……エデンにした方がよかったかもな……こいつはオメガウェポン級だ）&lt;BR&gt;　かつてアルティミシアもオメガウェポンも倒したスコールだが、あの時は仲間がいた。&lt;BR&gt;　互いに背中を守り合える仲間がいた。&lt;BR&gt;（せめて……セルフィがいればな……）&lt;BR&gt;　そんなことを頭の片隅で考えた瞬間、Ｇ．Ｆ．の翼がバサっと空を切った。&lt;BR&gt;「！」&lt;BR&gt;　スコールもバハムートを召喚しようと身構える。……が、Ｇ．Ｆ．はそんなスコールに眼もくれずに宙高く舞い上がり、少し飛んだ先でふっと姿を消した。&lt;BR&gt;「……！？」&lt;BR&gt;　さすがにこれにはスコールも驚き、あたりをぐるりと見回した。&lt;BR&gt;（術者が、召喚を止めてＧ．Ｆ．を呼び寄せた……？　それとも……俺を、誘導してるのか…？）&lt;BR&gt;　今スコールのいる場所は官邸から魔法研究所に抜ける内周道路のど真ん中。そしてＧ．Ｆ．が消える寸前に向かっていた先は……&lt;BR&gt;（官邸……？　いや、あの方角は……）&lt;BR&gt;　スコールは身を翻すようにして、Ｇ．Ｆ．が向かったであろう方角――エアステーションへ走り出した。&lt;BR&gt;　それが敵の罠であったとしても、行かないわけにはいかなかった。&lt;BR&gt;　先ほど受けたダメージのせいか嫌な予感のせいか、胸に鈍い痛みが走った。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　動いていないリフターのチューブの中をひた走り、エアステーションにたどりついたスコールの耳を激しい絶叫が貫いた。&lt;BR&gt;　断末魔と呼ぶのがふさわしいような、苦痛に満ちた絶叫。&lt;BR&gt;　悲鳴など聞き慣れたスコールでさえ、思わず顔をしかめてしまう悲惨な声に、ぞわりと背筋を冷たいものが走る。&lt;BR&gt;　肺の痛みを意識から追いやり、スピードを上げる。カーブを抜けたあたりで、大きな鳥の姿が見えた。&lt;BR&gt;　――再召喚されたのであろう、あのＧ．Ｆ．だ。&lt;BR&gt;「……よせ！！」&lt;BR&gt;　そのＧ．Ｆ．が爪で翼で嘴で、嬲り弄んでいる女性の姿を眼にとめて、スコールは怒号のような声をあげた。&lt;BR&gt;　懸命に腕に抱いた子供を庇いうずくまる彼女の背中は、無数の傷でおおわれて真っ赤だった。&lt;BR&gt;　先ほどスコールが助けた親子だった。なぜ市街に逃げなかったのか、官邸に逃げ込まなかったのか。&lt;BR&gt;　歯ぎしりしたい思いで、スコールは口の中で素早くアルテマを唱えた。&lt;BR&gt;　緑色の光が鮮やかに飛び散り、さすがのＧ．Ｆ．も動きを止める。&lt;BR&gt;　十分なダメージを与えたとは言えなかったが、ともかく動きを止めることに成功したスコールは、間髪入れずに親子を救い出すためＧ．Ｆ．と彼女たちの間に入り込もうとした。――その刹那。&lt;BR&gt;「…………！？」&lt;BR&gt;　親子に気を取られて気づかなかった、もうひとつの影を眼にとめ、ぎょっと息をのんでスコールは立ちすくんだ。&lt;BR&gt;　血みどろの親子のすぐ傍に立ち、親子を静かに見下ろす少女の姿を。&lt;BR&gt;「な……」&lt;BR&gt;　驚きで声も出ない。&lt;BR&gt;　そんなスコールに、静かに立つ彼女は一瞥もくれることなく、ダメージを受けたばかりのＧ．Ｆ．に眼を向けた。&lt;BR&gt;　まだ幼さの残る頬には、足下に転がる親子のものなのか、返り血がべっとりとこびりついている。&lt;BR&gt;　紺色の服は目立たないけれど同様に返り血を浴び、胸元に結んだ黄色いリボンも赤く染まっていた。&lt;BR&gt;　Ｇ．Ｆ．を見つめる瞳は冷えた蒼。そこに感情と呼べるものはおよそ見つからない。&lt;BR&gt;「……セル……」&lt;BR&gt;　からからになった喉から声を押しだしスコールは彼女の名前を呼ぶ。&lt;BR&gt;　彼女は、かすかにさえ反応を示さなかった。&lt;BR&gt;「セルフィ……！」&lt;BR&gt;　ゴウッと音を立てて風が巻き起こり、はっとスコールが気づいた時には、もう遅かった。&lt;BR&gt;「よせ！！」&lt;BR&gt;　叫んだがもちろん間に合わなかった。セルフィに気を取られた隙に、ダメージから立ち直ったＧ．Ｆ．が哀れな母親のかすかに残った生命を奪い去ってしまっていた。&lt;BR&gt;　悲鳴すらあげる間もなく、頭部を失った母親は血柱を吹き上げどうと倒れる。&lt;BR&gt;　噴水のような真紅のそれを全身に浴びながら、しかしセルフィはただ静かに彼女の終焉を見つめていた。&lt;BR&gt;　全身を、他人の血で真紅に染めたまま。&lt;BR&gt;　スコールは呆然とその光景を眺めていた。&lt;BR&gt;　何かの悪い冗談か、夢を見ているとしか思えなかった。&lt;BR&gt;　セルフィがゆっくりと、はじめてスコールに視線を向ける。いつもの明るい翠の瞳ではなく、ただただ冷たい蒼の瞳で。&lt;BR&gt;　ばさりと、翼を動かしてＧ．Ｆ．が動いた。&lt;BR&gt;「……冗談だろ……？」&lt;BR&gt;　自嘲的な笑みが知らず唇にのぼる。まったく、趣味の悪い現実だった。&lt;BR&gt;　これから、謎のＧ．Ｆ．のみならずセルフィとも戦えということなのだろうか。&lt;BR&gt;「……」&lt;BR&gt;　何の反応もしない彼女の前で、Ｇ．Ｆ．の巨体に蒼い光が満ちた。&lt;BR&gt;　あぁ、このＧ．Ｆ．の色は蒼だったのかと、今更のようにスコールは気が付いた。&lt;BR&gt;　そんな色に気づく精神的余裕すらなかったことに気が付いた。&lt;BR&gt;　とっさに攻撃魔法でなく防御魔法を唱えたスコールの視界内が蒼い光に染め上げられた。&lt;BR&gt;「――――――！！」&lt;BR&gt;　シェルで防ぎきれない衝撃が全身を襲う。&lt;BR&gt;　蒼い光に見えたそれは炎の色だったのだと、灼熱の痛みにスコールは悟った。&lt;BR&gt;　気管が灼け、呼吸が止まり、視界が青から白に染まる。&lt;BR&gt;　絶叫すら許されず、一度炎に包まれ宙に浮いたスコールの身体は、そのまま地面に叩きつけられた。&lt;BR&gt;「…………ぁ……」&lt;BR&gt;　そしてその光景を、静かに見守っていたセルフィの表情が、そこで初めてかすかに揺らいだ。&lt;BR&gt;　二度三度とまばたきを繰り返す。澄んだ翠の双眸が震えた。&lt;BR&gt;「……ス……コール……？」&lt;BR&gt;（…………？）&lt;BR&gt;　その小さな呼びかけは、意識を飛ばしかけたスコールの耳にもはっきりと届いた。&lt;BR&gt;　地面に倒れ伏したまま、かろうじて残った気力と体力とを振り絞り、首を持ち上げ彼女を見る。&lt;BR&gt;　スコールにとどめを刺そうとしていたＧ．Ｆ．ですら、動きを止めていた。&lt;BR&gt;「……セル……」&lt;BR&gt;　名を呼びたかったが、声も満足に出なかった。熱で喉を痛めたらしい。&lt;BR&gt;　けれど立ちつくす彼女は、スコールの声をちゃんと聞いていた。&lt;BR&gt;「スコール……？」&lt;BR&gt;　どこか驚愕したような――呆然としたような眼差しは、間違いなくスコールのよく知るそれ。&lt;BR&gt;　もう一度大きくまばたきをし、血だまりに倒れるスコールの惨状をはっきりと認識して、セルフィは愕然としたように大きく口を開けた。&lt;BR&gt;「スコール！？」&lt;BR&gt;　わななく唇が、彼女の衝撃を物語っている。&lt;BR&gt;「ど、ど～して…なにがあったの～！？」&lt;BR&gt;　血に染まっているのはスコールだけでなくセルフィも同様なのだが、今の彼女に自分の姿をかえりみる余裕はないらしい。&lt;BR&gt;「スコー……きゃっ」&lt;BR&gt;　スコールに向けて足を踏み出そうとしたとたん、Ｇ．Ｆ．がセルフィの前をばさっと横切り、翼が生んだ風にセルフィは歩みを遮られた。&lt;BR&gt;「えっ……！？」&lt;BR&gt;　よろめきながらセルフィは今眼の前を横切っていったＧ．Ｆ．を驚き見つめる。&lt;BR&gt;　そんなセルフィに向かって、宙で方向転換したＧ．Ｆ．が、まっすぐに急降下してきた。&lt;BR&gt;「……セルフィ！！」&lt;BR&gt;　何がなんだかわからずにいるセルフィの腕を、跳ね起きたスコールの手がつかむ。&lt;BR&gt;　ぎしっと全身が痛んだが、構っている余裕などもちろんなく、細い腕をたぐりよせるようにして、セルフィの身体を腕の中に引きずり寄せて抱きしめた。&lt;BR&gt;　ゴウッと音をたててＧ．Ｆ．が地面に激突する寸前に体勢を立て直し、一瞬だけスコール達に顔を向け――次の瞬間、まっすぐ上空に向けて飛び上がっていった。&lt;BR&gt;　Ｇ．Ｆ．の姿はどんどん遠ざかり、やがて夜の闇に溶け込むようにして、その姿を消した。&lt;BR&gt;　それきりだった。&lt;BR&gt;「……」&lt;BR&gt;　息をつめるようにしてそれを見守っていたスコールは、やがて殺気が完全に消えたのを確信し、どっと身体の力を抜いて地面に横倒しに倒れた。&lt;BR&gt;　全身が今更のようにずきずき痛みはじめ、吐き気が襲ってくる。&lt;BR&gt;　倒れた瞬間、スコールの重みを受けて血だまりがバシャっと音を立てたが、気にする余裕はなかった。&lt;BR&gt;「ス、スコール……」&lt;BR&gt;　腕の中で、一緒に倒れ込んだセルフィが呆然とスコールの名を呼んだ。&lt;BR&gt;　何がなんだかわからない、といったような途方に暮れたその声に、答えてやりたかったが、もう声が出なかった。&lt;BR&gt;「スコール？」&lt;BR&gt;　もぞもぞと腕の中からセルフィが身を起こすのがわかった。&lt;BR&gt;「スコール……スコール！　しっかりしてよ～！」&lt;BR&gt;　セルフィにしてはめずらしく動揺した声と共に、軽く肩を揺すられる。スコールは苦労の末、重い瞼をゆっくりと持ち上げた。&lt;BR&gt;　ぶれて定まらない視界の中、半身を起こしたセルフィが、眉をひそめて自分を見下ろしていた。&lt;BR&gt;「なにが、あったの～？」&lt;BR&gt;　心細げな眼差しではあったが、翠色の澄んだ瞳が今はひどく懐かしかった。&lt;BR&gt;　そんな感情がスコールの唇に笑みを乗せ、セルフィが少し驚いた顔をして、それから笑顔に変わる。&lt;BR&gt;　くるくると変わる表情は、間違いなくセルフィのものだった。&lt;BR&gt;「……あ、やっと出た～」&lt;BR&gt;　セルフィがほっとした声をあげ、少しだけ泣きそうな笑顔のままで、スコールの額に手を伸ばす。&lt;BR&gt;　彼女の全身が淡い金色の光に包まれていることに、その時ようやくスコールは気づいた。&lt;BR&gt;（オーラ……？）&lt;BR&gt;　スコールがぼんやりとそう思うのと同時に、セルフィが眼を伏せて静かに魔法を唱えた。&lt;BR&gt;「フルケア」&lt;BR&gt;　それはセルフィだけの魔法。どんな深い傷も癒す完全回復の魔法。&lt;BR&gt;　熱い光が全身を包み、折れた骨を裂けた皮膚を痛みもなく癒していくのが眼を閉じると実感できた。&lt;BR&gt;　呼吸が一秒ごとに楽になり、激痛が嘘のように遠のいていく。&lt;BR&gt;　数秒たって全身を癒した熱さが引いたのを確認し、眼を開いてみたが、もう視界がぶれることもなかった。&lt;BR&gt;　緊張させていた全身からどっと力が抜け、スコールは大きく息をつく。&lt;BR&gt;（死ぬかと……思ったな……）&lt;BR&gt;　ここまでのダメージを受けて惨敗したことは、過去を振り返ってもまずなかった。&lt;BR&gt;　そんなことを考えていた時、どさっと身体の上に何かが覆い被さってきた。&lt;BR&gt;（なんだ？）&lt;BR&gt;　地面に肘をつき上体だけ起こして見れば、座り込んでいたはずのセルフィがスコールの上にうつぶせるように倒れている。&lt;BR&gt;「セルフィ？」&lt;BR&gt;　さすがに驚いてスコールはきちんと半身を起こし、彼の動きに従い膝の上へとすべり落ちたセルフィの小さな身体を抱き起こした。&lt;BR&gt;「おい？　どうした？」&lt;BR&gt;　声をかけ揺さぶっても、セルフィの反応はない。慌てて脈をとり呼吸を確認し、眠っているだけとわかったが、妙に冷たい身体と青い顔色が気にかかった。&lt;BR&gt;（そもそも……なんだったんだ？）&lt;BR&gt;　とにかく早く官邸に戻ろうとセルフィを抱き上げる腕に力をこめ、そこでスコールはふと考え込んだ。&lt;BR&gt;　先ほど、Ｇ．Ｆ．と共にいたセルフィは、明らかに普段と様子が違っていた。&lt;BR&gt;　本来翠であるはずの瞳を蒼に染め、冷やかな、およそ感情など見つからない無表情で静かに立っていたあの姿。&lt;BR&gt;　誰が見たって、あのＧ．Ｆ．を召喚しているのは彼女にしか見えなかった。&lt;BR&gt;　だが、今腕の中にいるセルフィに、Ｇ．Ｆ．をジャンクションしている気配はまったくない。&lt;BR&gt;　制服の中のミニコンにＧ．Ｆ．が数体入っているが、それらはどれもスコールの良く知るＧ．Ｆ．たちで、あの青い鳥の姿をしたＧ．Ｆ．は一体も入っていなかった。&lt;BR&gt;（セルフィと、Ｇ．Ｆ．……か）&lt;BR&gt;　少し前に、この両者についての話を誰かがしてはいなかっただろうか。&lt;BR&gt;　……そうだ、バラムガーデンの養護教諭、カドワキが出発前にスコールに語っていた。&lt;BR&gt;　セルフィには、Ｇ．Ｆ．不適合症のおそれがある……と。&lt;BR&gt;（いや、違ったな……不適合症ではなかった……）&lt;BR&gt;　彼女の症状は不適合症とは背反する症状、過適合症候群とでも呼ぶべきものと……言っていた。&lt;BR&gt;　Ｇ．Ｆ．と相性が良すぎるために、脳がＧ．Ｆ．に適合しすぎてしまう症状であると。&lt;BR&gt;（もし、その症状が進行した場合……どうなるんだ？）&lt;BR&gt;　あまりにも適合しすぎた時、Ｇ．Ｆ．に意識を乗っ取られてしまったりすることなど……起こりうるのだろうか？&lt;BR&gt;　実際、セルフィが正気に戻った途端、実体を保てず消えたのではなかったか？　&lt;BR&gt;（でも、Ｇ．Ｆ．が使い手を拉致しようとするなんて馬鹿なことがあるか？）&lt;BR&gt;　あのＧ．Ｆ．は姿を消す直前、セルフィの身を奪おうとしていたようにスコールには見えた。&lt;BR&gt;　Ｇ．Ｆ．はそもそも実体のない巨大な自律エネルギー体だ。術者に召喚されることでごく短時間実体を持ち力をふるうことができる。&lt;BR&gt;　その術者が召喚を止めてしまったり、あるいはジャンクションをはずしてしまえば、Ｇ．Ｆ．にはどうすることもできないはずだ。&lt;BR&gt;　思考がぐるぐると回り出し、スコールは思わず頭を抱えた。&lt;BR&gt;　わかるのは、あのＧ．Ｆ．をジャンクションし召喚したのがたとえセルフィであっても、彼女自身の意志で殺戮を行っているわけではないということ。&lt;BR&gt;　何がなんだかわからないが、これだけは自信を持ってスコールは断言できた。&lt;BR&gt;　彼女は、任務以外において人を殺すような人物ではない。&lt;BR&gt;　そして、エスタで殺戮を行えなどという任務を、バラムガーデンが下すはずがない。&lt;BR&gt;（だが万が一、あのＧ．Ｆ．がセルフィを動かしているんだとしたら……）&lt;BR&gt;　普段からマイナス思考になりがちなスコールの頭の中は、最悪の事態ばかりを想定してしまう。&lt;BR&gt;　いつもならこのあたりでセルフィやゼルが明るく笑い飛ばしてプラス思考に導いてくれるのだが、あいにくセルフィは寝ているしゼルは遠い空の下だ。&lt;BR&gt;　と、思考のどつぼにはまっていたスコールの耳に、救世主のように小さな声がかすかに届いた。&lt;BR&gt;「……？」&lt;BR&gt;　全身を緊張させ、セルフィを抱く腕に力をこめながら、スコールは油断なくあたりに鋭い視線を走らせる。&lt;BR&gt;　また、声がした。猫の鳴き声にも似ているが、明らかな人の……子供の声。&lt;BR&gt;（子供……？）&lt;BR&gt;　頭の中で様々な情報がかけめぐり、ぐるりと思考が回転する。&lt;BR&gt;　少し前、血に染まり地に倒れた、女性の腕の中、の――――&lt;BR&gt;「！！」&lt;BR&gt;　スコールはガバッと立ち上がり、肩の上にセルフィを抱えると長い足で飛ぶようにして絶命した女性に駆け寄った。&lt;BR&gt;「おい！」&lt;BR&gt;　素早く地面にひざまずき、セルフィを抱えていない左腕で、うつぶせた女性の遺体をそっと横向けにする。&lt;BR&gt;　女性の身体に遮られくぐもって聞こえていた泣き声が、はっきりとその場に響いた。&lt;BR&gt;　血に染まった細い腕に抱きしめられていた小さな子供――おそらくまだ乳飲み子だろう――は、母親に命がけで庇われ助かっていた。&lt;BR&gt;　スコールは急いで女性の腕をほどき、子供に大きな怪我などがないか確認すると、念のためにケアルをかけて、左腕ですくうようにして子供を抱き上げた。&lt;BR&gt;　スコールに抱かれ、子供はますます大声で泣きじゃくりながら、倒れて動かない母親に小さな手を伸ばす。&lt;BR&gt;　その子供の仕草に、スコールの胸がかすかに痛んだ。&lt;BR&gt;　もう、子供の声に応えて、母親が腕をさしのべることはない。&lt;BR&gt;　この子供は永遠に、母親を失ったのだ。&lt;BR&gt;「……泣くなよ……」&lt;BR&gt;　つぶやいても、子供にはどこまでも届かない。&lt;BR&gt;　ますます激しさを増す泣き声に、スコールはぎゅっと唇をかみしめた。&lt;BR&gt;&lt;BR&gt;& <script data-viewer-zoom-script>
(() => {
  const stage = document.querySelector('.viewer-stage-image');
  const image = stage ? stage.querySelector('.viewer-image') : null;
  if (!stage || !image) {
    return;
  }

  const setZoom = (enabled) => {
    stage.classList.toggle('is-zoomed', enabled);
    image.setAttribute('aria-pressed', enabled ? 'true' : 'false');
    if (enabled) {
      const naturalWidth = image.naturalWidth || image.clientWidth || 0;
      const targetWidth = naturalWidth > 0
        ? Math.max(naturalWidth, Math.min(Math.round(stage.clientWidth * 0.92), naturalWidth * 4))
        : Math.round(stage.clientWidth * 0.92);
      image.style.width = `${targetWidth}px`;
      image.style.maxWidth = 'none';
      image.style.maxHeight = 'none';
      requestAnimationFrame(() => {
        stage.scrollTop = 0;
        stage.scrollLeft = Math.max(0, Math.round((image.scrollWidth - stage.clientWidth) / 2));
      });
    } else {
      image.style.removeProperty('width');
      image.style.removeProperty('max-width');
      image.style.removeProperty('max-height');
      stage.scrollTop = 0;
      stage.scrollLeft = 0;
    }
  };

  const toggleZoom = () => {
    setZoom(!stage.classList.contains('is-zoomed'));
  };

  image.setAttribute('tabindex', '0');
  image.setAttribute('role', 'button');
  image.setAttribute('aria-label', '逕ｻ蜒上ｒ諡｡螟ｧ縺ｾ縺溘・邵ｮ蟆・);
  image.setAttribute('aria-pressed', 'false');

  image.addEventListener('click', toggleZoom);
  image.addEventListener('keydown', (event) => {
    if (event.key === 'Enter' || event.key === ' ') {
      event.preventDefault();
      toggleZoom();
    }
  });

  stage.addEventListener('click', (event) => {
    if (event.target === stage && stage.classList.contains('is-zoomed')) {
      setZoom(false);
    }
  });

  window.addEventListener('keydown', (event) => {
    if (event.key === 'Escape' && stage.classList.contains('is-zoomed')) {
      setZoom(false);
    }
  });
})();
</script>
