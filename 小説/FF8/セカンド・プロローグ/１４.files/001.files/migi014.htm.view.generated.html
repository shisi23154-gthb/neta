      width=537&gt;&lt;SPAN&gt;&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　突然に大統領室を訪れたスコールを、エスタ大統領ラグナは待っていたとばかりに迎え入れた。&lt;BR&gt;&lt;BR&gt;「……セルフィの封印はいつ行われる？」&lt;BR&gt;　部屋に入るなり、前置きも何もなくスコールはラグナにそう切り出す。&lt;BR&gt;　キロスとウォードの姿はない。大統領室は常の姿を一変させ、壁一面にいくつものモニタが点灯している。どうやら官邸内にあるコントロールルームと映像・音声が直結しているらしい。大統領はこの部屋にいながら、官邸内の動きを把握しオペレーター達に指示が出せるという仕組みである。&lt;BR&gt;「早朝、だな」&lt;BR&gt;　ぱちんと音声回線を切りながら眼を伏せて返答したラグナに、スコールがまっすぐ眼を向けて間髪入れずに口を開いた。&lt;BR&gt;「頼みがあるんだ」&lt;BR&gt;　向けてくる群青がかった瞳がひどく必死で、ラグナは驚いて眼をまたたく。&lt;BR&gt;「セルフィを助けてほしい」&lt;BR&gt;　驚くラグナには一向にかまわず、スコールは願いを口にする。ちょっと眉を上げ、大統領の顔になったラグナが静かに訊ねた。&lt;BR&gt;「……封印するなってことか？」&lt;BR&gt;「そうじゃない」&lt;BR&gt;　スコールは首を振る。ハインを内側に留めたセルフィを思えば、封印処置は仕方のないことだと納得している。ハインを抑えていることで、セルフィの精神的負荷もただごとではない。連れて逃げたところで、さして時間もかけずセルフィはハインに取って変わられる。セルフィを手に入れている以上、これ以上の破壊と殺戮が行われる可能性は高くないが、世界を支配しようと動くだろうことは容易に想像ができる。新たな魔女などと祭り上げられ、畏怖と恐怖の対象になることを、セルフィ自身が決して望まない。&lt;BR&gt;「けど、あんたの国民は、セルフィを宇宙に放り出そうとするだろう？」&lt;BR&gt;　１８年前、アデルを封印し宇宙へと放逐したあの時のように。&lt;BR&gt;　しかも今はエスタ自体の国力が低下し、改めてＯＣＳを起動して沈黙する羽目になるほどの未曾有の危機にある。アデル・セメタリーの失敗経験から言っても、ルナサイドベースを造り直してそこに封印施設を飾るような真似はしないだろう。無人衛星に搭載してこの星から遙か彼方に飛ばすくらいのことをされてもおかしくはない。&lt;BR&gt;　そんなことをされて、もしこの先オダインの研究が進んでハインをセルフィから取り出せるようになっても、セルフィが宇宙の塵と化してしまっているのではどうにもならない。&lt;BR&gt;「……だろうな」&lt;BR&gt;　スコールの想定した未来が、ある程度確実に実現するだろうことを、ラグナも認めて頷いた。&lt;BR&gt;　魔女の恐怖を何よりも知るエスタの国民が、首都をこれほど破壊しつくした少女を大人しく施設に置いておこうとするはずがない。&lt;BR&gt;「だから、あんたに頼みたいんだ。……セルフィを、助けてくれ」&lt;BR&gt;「もちろん、出来る限りの努力はするつもりだけどよ……永久保証はできねぇよ。オレだって、終身大統領ってわけじゃない」&lt;BR&gt;　選挙で１８年間、再選され続けているから大統領なのだ。今回のエスタの危機で不信任案が可決でもされて、大統領職を失えば、いくら望んでもセルフィを守ることなど不可能である。&lt;BR&gt;　さして今の肩書きに執着があるわけでもないが、セルフィを守るためには大統領の持つ権限はどうしても必要不可欠だ。ラグナとしても、懐いて慕ってくれ、新たに出来た可愛い娘同然のセルフィを、無下に宇宙に放り出すような真似はしたくない。&lt;BR&gt;「……あんたが大統領の間に、研究してもらえればかまわないさ」&lt;BR&gt;　あっさりとスコールが言ってのける。とにかくハインがセルフィの外に出れば、勝ち目はある。生きとし生けるもの全てに死を与える伝家の宝刀ジエンドは、エネルギーのみになって生きるハインにだって当然有効なはずだ。&lt;BR&gt;　イデア自身はもう魔女ではないからセルフィの能力の封印を解くことができないが、リノアがその方法を習得すれば問題ない。魔女の力を制御することを早々に断念してしまったリノアだが、大事な友人の命がかかっていれば、いくら何でも頑張ってくれることだろう。&lt;BR&gt;「もしどうしてもダメになったら……その時は、またその時だ」&lt;BR&gt;　ふいと視線を外し、自嘲的に笑んでスコールが呟いた。&lt;BR&gt;「封印施設に、人数制限なんてないんだろ？」&lt;BR&gt;「……あ？」&lt;BR&gt;　訝しげにラグナは眼を上げる。しかし横を向いた端整な顔がひどく張りつめていて、それ以上声をかけることができなくなった。&lt;BR&gt;　元から思いつめた顔をよくする青年ではあったが、ここまで破滅的な表情を見せることは滅多にない。&lt;BR&gt;　眉をひそめたラグナは、もう一度今までの会話を頭の中で反芻する。結論が導き出されるのに、大した時間はかからなかった。&lt;BR&gt;「……お前、やっぱオレには全然似てねーな」&lt;BR&gt;「当たり前だ」&lt;BR&gt;　しみじみと呟いたラグナに、にべもなくスコールは言い捨てる。&lt;BR&gt;　相変わらず複雑な感情を抱いているらしい息子の様子に苦笑いをしながら、ラグナは両手をポケットに突っ込んで静かに言った。&lt;BR&gt;「お前さ、一年前のこと覚えてるか？　時間が圧縮されちまった時のことだよ」&lt;BR&gt;　唐突に話題を変えたラグナに、スコールはやや不機嫌そうに視線を向けた。&lt;BR&gt;　無駄口を叩く時間があるならとっとと研究室に戻りたいと、眼で口ほどに物を言っているその様子に、ますます苦笑いを深めながらラグナは言葉を続ける。&lt;BR&gt;「あの時、けっこう行方不明になった奴がいたって言うだろ」&lt;BR&gt;　スコールは小さく頷く。時間軸すべてが圧縮されてしまったあの時、本来いるべき時間軸から足を踏み外した者が何名か、圧縮が解けた後も行方知れずになったと報告を受けている。&lt;BR&gt;　未来から現在に戻る際、過去に戻りすぎてアルティミシアの終焉を見届けた挙句、次元の狭間に迷い込んでリノアに助けられたスコールにとっては、あまり他人事ではない話だ。&lt;BR&gt;「オレも、過去に戻っちまったんだ、あの時」&lt;BR&gt;　圧縮されたことで垣間見えた過去の光景。そして、もしもやり直せたらと願う人生の分岐点。&lt;BR&gt;　気がついた時には、手を伸ばし、足を踏み込んでいた。&lt;BR&gt;「オレはエルに引き戻してもらったんだけどよ……」&lt;BR&gt;　過去に人の意識を接続できるエルオーネは、時間の流れを読む力がある。もしエルオーネがラグナの存在を探し出すことができなければ、圧縮解除後、エスタ大統領は忽然と姿を消していたことだろう。&lt;BR&gt;「エルが引き戻したのは、オレだけじゃなかったんだな。セルフィも、過去に戻りすぎちまってた」&lt;BR&gt;「……セルフィが？」&lt;BR&gt;　興味ない顔をしていたスコールも、セルフィの名前にようやく反応を見せる。&lt;BR&gt;「……会いたかったんだってよ」&lt;BR&gt;　群青の視線をまっすぐに受け止め、ラグナは不思議な微笑を浮かべて静かに言った。&lt;BR&gt;（会いたかった――――）&lt;BR&gt;　今の時間軸にいる限り会えない人。過去の時間でしか会えない人――。&lt;BR&gt;「…………」&lt;BR&gt;　少し眼を見はり、スコールはラグナを見つめた。&lt;BR&gt;　セルフィが会いたいと望んだのは恐らくあの墓の下の人達だろう。&lt;BR&gt;　なら、ラグナが会いたいと望んだのは――。&lt;BR&gt;　ゆっくりとラグナがスコールの前に歩み寄る。深い色の瞳を見上げ、何か言おうとスコールが唇を動かしたその瞬間。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;『――スコール！』&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　脳裏で突然、悲痛な叫び声がはじけた。&lt;BR&gt;「！？」&lt;BR&gt;　びくんと身体を硬直させ、辺りを素早く見回すスコールにラグナが驚いた顔になった。&lt;BR&gt;「おい、どうした？」&lt;BR&gt;　眼をまたたいているラグナには何の変化もない。声はスコールにしか届いていない。&lt;BR&gt;『スコール！　何をしてるの！？』&lt;BR&gt;　また、聞こえた。&lt;BR&gt;（エルオーネ……！？）&lt;BR&gt;　ようやくスコールは思い当たる。この声の主、そしてこんな風に声を届ける存在を、スコールはひとりしか知らなかった。&lt;BR&gt;『スコール、早く来て！　早く、セルフィを助けて……！』&lt;BR&gt;「エルオーネ！」&lt;BR&gt;　悲鳴のような叫び声が、唐突にぶつりと途切れた。&lt;BR&gt;「な、なに？　エルオーネ？」&lt;BR&gt;　戸惑っているラグナにはかまわず、スコールは夢中で声を上げた。&lt;BR&gt;「エルオーネ、何があった！？　エルオーネ、答えろ！」&lt;BR&gt;　血相を変えてスコールは遠い空間にいるはずのエルオーネに声を上げる。だがすでに、『接続』は断ち切られた後だった。&lt;BR&gt;（セルフィがなんだって……！？）&lt;BR&gt;　とっさに壁に表示されたモニタに視線を向ける。次々と官邸内を映し出すモニタのひとつが、真っ白になっていた。&lt;BR&gt;「うお、な、なんだぁ！？」&lt;BR&gt;　スコールの視線を追ったラグナが驚愕し、すっとんきょうな声を上げる。モニタは完全に白く染まり何も映らない。&lt;BR&gt;　このモニタが設置されているブロックは――&lt;BR&gt;（畜生……！）&lt;BR&gt;　それがオダイン研究室のあるブロックだと察知した瞬間、床を蹴るようにしてスコールは走り出した。コントロールルームと音声を繋ぐためにボタンに手を伸ばしかけていたラグナが、はっとしたように首をめぐらせる。&lt;BR&gt;「スコール！」&lt;BR&gt;　部屋を飛び出そうとしたその背中に、ラグナが鋭く声をかけた。&lt;BR&gt;　声に宿る響きに、焦っていたスコールも思わず足を止め、背後を振り返る。&lt;BR&gt;　銀色の光がラグナの手から放たれた。&lt;BR&gt;「！」&lt;BR&gt;　とっさに手を伸ばして投げられたものを受け止める。固い感触が手の内に収まった。&lt;BR&gt;「お守り」&lt;BR&gt;　手を開いて見れば、銀色のシンプルなデザインの指輪だった。&lt;BR&gt;　１８年間、外されることのなかった、指輪。&lt;BR&gt;「後でセルフィと返しに来いよ。やるわけじゃねーからな」&lt;BR&gt;「…………」&lt;BR&gt;「二人で、だぜ。セルフィにまた過去に戻りたいなんて思わせたりすんじゃねーぞ」&lt;BR&gt;　言葉を失ったスコールにひらひらと手を振りながら、ラグナはにやりと笑った。&lt;BR&gt;「おら、とっとと行けよ。突っ走るのは若者の特権だぜ～？」&lt;BR&gt;　そしてその後ろをカバーするのは大人の仕事である。&lt;BR&gt;　わずかに戸惑いを見せながらも、スコールは指輪をぐっと握りしめて無言で背を向けた。&lt;BR&gt;　開いた扉から走り去っていく背中に、真摯な響きを持った声が追いかける。&lt;BR&gt;「後悔すんなよ……！」&lt;BR&gt;　１８年前の、自分のように。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　蒼い光が空間を支配していた。&lt;BR&gt;「アーヴァイン！！」&lt;BR&gt;　セルフィの身体から蒼い光が弾けた瞬間、弾き飛ばされ壁に激突したアーヴァインの姿にリノアが悲鳴を上げた。&lt;BR&gt;　慌てて駆け寄って大声で名を呼ぶと、一瞬眼を回していたアーヴァインが小さく呻いて眼を開いた。&lt;BR&gt;「セフィは……！？」&lt;BR&gt;　ぐらぐらする頭を振ってアーヴァインが声を絞り出す。頷いて、リノアは立ち上がった。&lt;BR&gt;「セルフィっ！！」&lt;BR&gt;　うずくまっている小さな背中に声を上げて走り寄る。&lt;BR&gt;「きゃあ！」&lt;BR&gt;　だが、部屋をしめる蒼い光にはじき返され、悲鳴を上げてリノアは壁に激突した。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　遠くでリノアの声は聞こえていたが、セルフィは振り向くこともできなかった。&lt;BR&gt;（どないしよう……）&lt;BR&gt;　両腕で自分の身体を抱きしめながら、必死に内にいる大きな力を抑えつける。&lt;BR&gt;（……おねえちゃん……）&lt;BR&gt;　眼をこらせば、炸裂する蒼い光の向こうに静かに立ちつくすエルオーネの姿が見える。栗色の穏やかな瞳は冷えた蒼に輝き、くずおれているセルフィを見下ろすエルオーネの美麗な顔に、感情と呼べるものはかけらも見いだせない。&lt;BR&gt;「…………っ」&lt;BR&gt;　懸命に耐えながら、迂闊だったとセルフィは唇を噛みしめる。&lt;BR&gt;　セルフィの行方を追わせないため、意識を閉じたエルオーネの身体はひとつの『器』だった。力や意識をその内に留め、誰にも悟られずに隠匿するのに最適の器。&lt;BR&gt;　ハインはセルフィを手に入れるための保険として、自分のエネルギーの一部をエルオーネの中に留めておいたのだ。セルフィがもしハインに抵抗し、自らの意識をもってハインを抑えつけようとした時の、外部からの『呼び水』に使うための力として。&lt;BR&gt;（イヤ……）&lt;BR&gt;　外部からの強烈な力に、身体の内側でハインが暴れ出しているのがわかる。強引に抑えつけるセルフィの意識を食い破り、表に出ようと浸食をはじめている。&lt;BR&gt;（イヤ……そんなの、絶対あかん……）&lt;BR&gt;　ぎゅっと眼を強く閉じ、小刻みに震えながらセルフィは必死でそれに耐える。&lt;BR&gt;　エルオーネの中にいるのが、最後のハイン。エルオーネは意識を閉ざしたままだ。意識を開いたとたん、おそらくエルオーネの中のハインは彼女の力を使ってセルフィに『接続』してくる。それがわかっているから、セルフィはエルオーネの名を呼ぶことができなかった。&lt;BR&gt;　ぐっと意識の内側で、ハインの質量が膨れあがってくる。危険信号が頭の中で点滅する。&lt;BR&gt;　自害してしまえばハインはセルフィを手に入れることはできなくなる。ふとそんな考えが脳裏をよぎったが、セルフィを手に入れずともハインの魔法力は凄まじい威力を持っている。怒りにまかせて、スコール達を襲うようなことがあっては意味がない。&lt;BR&gt;　生理的な涙がにじみ、内から膨れあがる力で息が詰まる。&lt;BR&gt;　うっすらと眼を開くと、膝の上に銀のペンダントトップが見えた。&lt;BR&gt;「――――」&lt;BR&gt;　必死で苦しい呼吸を繰り返しながら、セルフィは唇にかすかに笑みを浮かべた。&lt;BR&gt;（大丈夫……）&lt;BR&gt;　ぐっと獅子を象ったペンダントトップを握りしめる。手のひらに生まれた痛みが、意識を少しはっきりとさせてくれる。&lt;BR&gt;　懸命に意識を保ちながら、端整な横顔を思い浮かべてセルフィは囁いた。&lt;BR&gt;（まだ、がんばれる……あたし、まだ、あきらめてへんよ……）&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　エレベータが到着するのももどかしく、急いで立ち上がったスコールは、廊下の奥から蒼い光がこぼれているのに気づいてぎょっと眼をむいた。&lt;BR&gt;「セルフィ！！」&lt;BR&gt;　ガンブレードを抜き、大声で叫びながら蒼い光溢れる部屋の中に駆け込んだスコールに、どっと圧力が押し寄せる。&lt;BR&gt;「スコール！」&lt;BR&gt;「大変だもんよ！」&lt;BR&gt;　イデアとオダインをかばって部屋から脱出を図っていた風神と雷神が、飛び込んできたスコールに声を上げた。&lt;BR&gt;「遅ぇぞ、馬鹿野郎が！」&lt;BR&gt;　何度となく蒼い光に挑みかかり、そのたびにはね飛ばされ何度も床に壁にと激突し、痣だらけになったサイファーが顔も向けずに怒鳴りつける。&lt;BR&gt;　全員の無事を確認し、部屋の奥に視線を向けたスコールはそのまま絶句した。&lt;BR&gt;　何があったのかは、蒼い光の中に立ちつくす美女の姿を見ればある程度わかった。&lt;BR&gt;（ルナサイドベースのリノアと同じだ……）&lt;BR&gt;　近づく者すべてを問答無用の力ではじき飛ばし、目的を達しようとする不思議の力。&lt;BR&gt;「セルフィ！！」&lt;BR&gt;　エルオーネの向こう、蒼い光に全身を包まれうずくまる少女の姿を見つけ、スコールは腹の底から大声を絞り出すようにして名を呼んだ。&lt;BR&gt;　声が届いたかは定かではないが、光の中、セルフィの栗色の髪がぴくりと揺れた。&lt;BR&gt;　自分で自分を抱きしめながら、ゆっくりとセルフィは顔を上げる。うっすらと見開かれた翠の瞳が、光の中をぐるりと見回していく。&lt;BR&gt;　求める姿を探すように視線を彷徨わせた翠の瞳が、やがてまっすぐにスコールの姿を捉え、止まった。&lt;BR&gt;「――――」&lt;BR&gt;　翠の瞳に、驚きと安堵の光が浮かぶ。&lt;BR&gt;　苦しげな息の向こう、必死で戦っていたセルフィが、スコールを見つめて小さく微笑みかける。&lt;BR&gt;　スコールの眼に無垢な笑顔が映った、その瞬間――&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　ぱきい、と。&lt;BR&gt;　硬質な音が静かに、部屋に響いた。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　セルフィの細腕につけられていた５つのオダインバングルの、砕け散る、音が。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;（…………！）&lt;BR&gt;　蒼い光が爆発した。&lt;BR&gt;　圧倒的な力が押し寄せ、スコールは成す術なくその力をまともに受け止めた。&lt;BR&gt;　同じくはじかれ飛ばされたエルオーネの細い身体を抱きしめ、庇う形で壁に激突する。&lt;BR&gt;「……ッ！」&lt;BR&gt;　がつりと肩にまず激痛が走った。息が詰まり全身に痛みが駆けめぐる。&lt;BR&gt;　折れたかヒビが入ったか。気にする余裕もなく、スコールは意識のないエルオーネを床に素早く横たえながら顔を上げた。&lt;BR&gt;「セルフィ！」&lt;BR&gt;　無我夢中で痛む身体を引きずり起こし、蒼い光の向こうに叫んだ。&lt;BR&gt;　あの一瞬、光がふくれあがる直前のあの瞬間、スコールは確かにセルフィを見た。ハインではない、あれはまぎれもない『セルフィ』だった。苦痛に表情をゆがめながら、間違いなくスコールに向かって微笑んで。&lt;BR&gt;「セルフィ！！」&lt;BR&gt;　悲痛な響きを帯びた叫び声が蒼い光に吸い込まれていく。&lt;BR&gt;　徐々に光が収まっていき、そのただ中にいた人影が見えてきた。&lt;BR&gt;　息をのんで見つめるスコールの前で、ゆっくりと小さな人影が立ち上がる。&lt;BR&gt;「セルフィ……」&lt;BR&gt;　ぱさりと、ほどけた栗色の髪が揺れた。&lt;BR&gt;　乱れて頬に振りかかる髪を鬱陶しそうに振り払い、満足げに笑んだ少女が静かに囁く。&lt;BR&gt;「……ようやく、手に入れた」&lt;BR&gt;　冷えた蒼の瞳を見つめながら、スコールはくらりと足下が揺れた気がした。&lt;BR&gt;　何かの悪い夢なのだと思った。&lt;BR&gt;　ベッドの上に飛び起きて、冷えた汗を拭って安堵の吐息をつくような、悪夢のように思った。&lt;BR&gt;　固く握りしめ汗ばむ手のひらに、あの時肉を貫いた嫌な感触が甦る。&lt;BR&gt;　大切な存在と思いこんでいた少女、細い身体を抱きしめ貫いた、二度と味わいたくなどないと思った、あの感触を。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;「手こずらせてくれる……」&lt;BR&gt;　淡々と、セルフィの身体を奪った者が肩をすくめてそう言った。&lt;BR&gt;　身体の具合を確認し、不具合がないことを確かめる。&lt;BR&gt;　先ほどスコールから受けた一撃の影響はまだ残っているが、特に問題はなさそうだった。&lt;BR&gt;「まぁ、こんなものか……」&lt;BR&gt;　満足そうに笑んで、両の手をぐっと拳に握った。細い背をそらし、片足がトンと地面を蹴る。&lt;BR&gt;（…………！）&lt;BR&gt;　おさまったかに見えていた蒼の光が、またもや爆発した。&lt;BR&gt;　とっさに上げた片腕で顔をかばい、スコールはじりっと後退する。耳に天井か何かが破壊される音が聞こえた。&lt;BR&gt;　眼を開けば、一瞬にして部屋の壁が砕かれ、床が抜け天井が消え去っていた。&lt;BR&gt;　あまりにも突然変化した部屋の様子に呆然とするスコールの頭上に、淡く発光して浮かぶ姿がある。&lt;BR&gt;「……セルフィ……！」&lt;BR&gt;　下と左右、一部屋ずつ空間を広げ、セルフィ＝ハインは中空に浮かんでいた。&lt;BR&gt;　紺色の短いスカートをはためかせ、かろやかに飛んでいるその姿は愛らしく幻想的だが、あまりに現実離れしていて悪い夢の続きに見えた。&lt;BR&gt;　蒼の瞳をゆっくり開き、ハインはにぃっと笑う。&lt;BR&gt;　はっきりと目標を定めた視線を向けられ、スコールが一瞬息をのんだ。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;「ぐずぐずしてんじゃねぇ！」&lt;BR&gt;　怒鳴り声と共に、隕石の雨が唐突に降り注いだ。&lt;BR&gt;　ぎょっと眼を見開くスコールの眼の前で、不意を突かれ隕石の雨を食らった少女が抜けた床の下方へ落ちていく。&lt;BR&gt;「行くぞ！」&lt;BR&gt;　容赦なくメテオを浴びせたサイファーが、続けて床穴に手をかけながらスコールに声を投げた。&lt;BR&gt;　ここにはまだイデアとオダインがいる。戦場にしてしまうわけにはいかない。&lt;BR&gt;　サイファーの叫びに事態を理解し、SeeDの顔に戻ったスコールが素早く部屋を見回した。&lt;BR&gt;「アーヴァイン、リノア！　いるか！？」&lt;BR&gt;「……ここにいるわ！　アーヴァインも無事よ！」&lt;BR&gt;　部屋の奥でリノアの声が響いた。&lt;BR&gt;「無事ならエルオーネを連れて大統領室に避難してくれ！」&lt;BR&gt;「雷神！　おまえはイデアとオダインを守ってろ！」&lt;BR&gt;　床穴に飛び込みながらサイファーが雷神に指示を出す。おたおたと雷神が返事をする前に、風神が素早くサイファーの後を追って床穴に身をすべらせた。&lt;BR&gt;「スコール……！」&lt;BR&gt;　綺麗な黒髪を振り乱し、イデアがうわずった声でスコールを呼んだ。&lt;BR&gt;　床穴に手をかけながら、スコールはちらりとイデアに視線を向ける。&lt;BR&gt;「ママ先生……」&lt;BR&gt;　胸がつぶれそうに心配するイデアに、スコールはぎゅっと唇を噛みしめる。&lt;BR&gt;　何も言葉を返すこともできずに床穴に飛び込んでいくスコールの背中を、イデアが悲痛な面もちで見送った。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　ハインを追って飛び出していったスコールの指示を、リノアは確かに聞いた。&lt;BR&gt;「アーヴァイン！」&lt;BR&gt;　回復魔法を与えていた長身の男に勝ち気な瞳を向けてリノアは叫んだ。&lt;BR&gt;「行って！」&lt;BR&gt;「え？」&lt;BR&gt;「わたしひとりでどうにかなるから！」&lt;BR&gt;　リノアはアーヴァインの腕をつかみ、強引に引っ張って一緒に立ち上がる。&lt;BR&gt;　スコールの指示はエルオーネを連れて大統領室へ避難しろ、だ。あんな細身で軽そうな女性ひとり、背負って行けないリノアではない。&lt;BR&gt;「なんだったらあの人を待ってから行くし。だからアーヴァインはセルフィを追って。行きたいんでしょ？」&lt;BR&gt;　リノアの言うあの人とは、リノアの護衛のためにバラムガーデンから派遣されてきたSeeDのこと。&lt;BR&gt;　先ほど官邸から姿を消したリノアを探すため、アーヴァインと共に市街に出、違う道を探しに行ったためまだ戻ってきていないが、連絡はしたのでもうすぐ官邸に戻ってくるはずだ。&lt;BR&gt;　だがそう提案したリノアには返答せず、アーヴァインは研究室の方へと声をかけた。&lt;BR&gt;「雷神～！　そっちから外に出られそうかい～？」&lt;BR&gt;　破壊されつくした感のある部屋である。入口が瓦礫で塞がっていないか確認したアーヴァインに、雷神の代わりにオダインの声が答えた。&lt;BR&gt;「問題ないでおじゃるが、この階はそろそろ持たないでおじゃる。早く出ないと死ぬでおじゃるよ」&lt;BR&gt;「わかった、今そっちに行くから～」&lt;BR&gt;　この研究室は官邸最上階に位置している。吹き飛んだ天井からのぞいている空が不吉極まりない。&lt;BR&gt;「リノア、急いでここを出るよ～。セルフィを追うのは、その後だ」&lt;BR&gt;　緊張した声で促され、リノアも慌てて立ち上がる。応援のSeeDを待っている場合ではないらしい。&lt;BR&gt;　抜けた床のはるか下方から激しい破壊音が響き初め、リノアの胸が不安にざわめいたが、どうすることもできなかった。&lt;BR&gt;　崩れかかった床や壁が危険なため、リノアの手を引いてアーヴァインは雷神たちと合流し、横たわるエルオーネを両腕に抱き上げた。&lt;BR&gt;「ママ先生、オダイン博士、先に出てください。リノア、君も早く」&lt;BR&gt;　アーヴァインの指示に従い、オダインがまず先に崩れかけた扉から廊下に出、イデアと雷神、それにリノアが後に続く。&lt;BR&gt;　エルオーネを抱いたアーヴァインが最後に出、非常灯のみがついている廊下に表情を曇らせた。&lt;BR&gt;「官邸内の電力系統はどうなってますか？」&lt;BR&gt;　質問はオダインに対して。&lt;BR&gt;　この中で誰より官邸内に詳しいオダインは、訊ねられひょいと肩をすくめた。&lt;BR&gt;「各ブロックごとに独立しているでおじゃる。心配しなくても、エレベータは非常電力で動かすことができるでおじゃる。途中で止まってもラグナの元に行くことは可能でおじゃるよ」&lt;BR&gt;「すいません、案内をお願いできますか？」&lt;BR&gt;「オダインは好きに動くのでおじゃる。ついて来るか来ないかはお前達次第なのでおじゃる」&lt;BR&gt;　ひねくれた言葉を返し、オダインはくるりと背を向け、年齢などまるで感じさせない強健な足取りでとことことエレベータに向かって走り出す。&lt;BR&gt;　やれやれとアーヴァインは小さく苦笑し、残された３人に視線をぐるりと回して一度強く頷いてみせた。&lt;BR&gt;「行くよ～」&lt;BR&gt;　とにかく、大統領室にいるラグナと合流しなければならない。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　ハインがぶち抜いた床を飛び降りたスコールは、さらに階下の床まで綺麗にぶち抜かれているその様にぎょっと眼をむいた。&lt;BR&gt;（なんだ！？）&lt;BR&gt;　どうにか崩れていない足場に着地することに成功し、ものすごい破壊音がとどろく廊下の奥に眼を向ける。&lt;BR&gt;　ハイペリオンで激しく斬りかかるサイファーと、床にいくつもの大穴を開けながら高速移動をしているハインの姿が遙か遠くに見える。&lt;BR&gt;　姿は見えないが、恐らく風神も一緒のはずだ。&lt;BR&gt;（くそっ……）&lt;BR&gt;　サイファーと風神が戦いを挑んでいる敵、その相手が紛れもなくセルフィであることに、スコールがぎりっと歯がみした。&lt;BR&gt;　光の中、最後に見たセルフィの笑顔が、繰り返し脳裏によみがえる。&lt;BR&gt;&lt;BR&gt;　――――信じてるからね……&lt;BR&gt;&lt;BR&gt;　ずどん、とまた大きな爆音が響き渡る。&lt;BR&gt;　視線を向ければサイファーが激しく壁に叩きつけられ、ずるりと床に落ちるところだった。&lt;BR&gt;（くそ……！）&lt;BR&gt;　ぐっとガンブレードを強く握りしめる。無意識に噛みしめていた唇が破れ、口の中に金臭い味が広がった。&lt;BR&gt;　サイファーを弾き飛ばしたハインの両腕に力が凝る。&lt;BR&gt;（セルフィ……）&lt;BR&gt;　どうしてやることが彼女にとって一番良いことなのか。&lt;BR&gt;　リノアの言う『あきらめない』というのは、今この現状ではどのような行動を指しているのか。&lt;BR&gt;（……セルフィ――）&lt;BR&gt;　一瞬ぎゅっと強く眼を閉じる。&lt;BR&gt;　遠いあの日、闇の中で差し出された陽光色の花をふと思い出した。&lt;BR&gt;「セルフィ……」&lt;BR&gt;　ゆっくりと眼を上げる。&lt;BR&gt;　悲痛な決意を宿した群青の瞳で、まっすぐにセルフィの姿を見つめた。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　細い腕に宿った強大な蒼の力、サイファーに叩きつけられるはずだったそれは、しかし目的を果たすことはできなかった。&lt;BR&gt;　ブーメランのように飛びきた円形のエッジ、そして恐ろしい勢いで空を薙ぎながら突っ込んできたガンブレードの刃先を素早く飛んで避けながら、ハインはぎりっと表情を険しくした。&lt;BR&gt;　方向を定めず放たれることになった蒼の力が後方の壁をぶち抜き、小規模の爆発を起こす。&lt;BR&gt;「……愚か者が……」&lt;BR&gt;　空中で体勢を立て直し、セルフィの顔でハインが不愉快そうに眉をひそめた。&lt;BR&gt;　風神とスコールの攻撃が作ったわずかな合間に、身体を揺らしながらもサイファーが立ち上がる。&lt;BR&gt;「！」&lt;BR&gt;　サイファーに一瞬視線を向けたハインは、直後はっと気配を感じ素早くその場から飛びずさる。&lt;BR&gt;　振り下ろした一撃を避けられたスコールは、しかし腕に力をこめ振り子のようにガンブレードを振り上げた。&lt;BR&gt;　尋常ではない反射速度で空中でくるりと回転し、着地と同時に地面を蹴りつけスコールに飛びかかる。辛くも身をひねって避けたスコールの左肩に蒼く輝く凶刃と化した細い手が触れ、浅く灼けた。&lt;BR&gt;　肩の傷にかまわずがら空きの細い背中に振り下ろしたスコールのガンブレードを、ハインが強化した防御魔法で受け止め、衝撃を利用して地面に着地しバックステップでスコールの背後に一瞬で回り込む。&lt;BR&gt;「心中でもする気か？」&lt;BR&gt;　人間が持つ筋力の限界を超えた勢いで形の良い脚が空を切る。半身をねじって肩でブロックしたが、すさまじい衝撃にスコールの身体が３メートルほど吹き飛び、崩れそうな壁に激突する。追おうとしたハインの足下を、とっさに放った風神のトルネドが突き刺さるように抉った。ハインの注意が風神に向いた一瞬を逃さず、スコールが素早く立ち上がり、ガンブレードを構えた。&lt;BR&gt;　純粋な殺気を向けてくるスコールに、ハインが宿るセルフィの身体に対する遠慮はまるでない。&lt;BR&gt;「あんたにセルフィを渡す気にはなれないからな」&lt;BR&gt;　ばしっ！　と激しく炎がはじける。後方からサイファーが放った魔法だ。&lt;BR&gt;　ハインが不快げに顔をしかめ、巻き添えで頬を灼いたスコールが嫌な顔をする。&lt;BR&gt;（この方向音痴……！）&lt;BR&gt;　喧嘩している場合ではないので心の中だけで毒づき、スコールはさらに前へと歩を進めガンブレードを突き出した。&lt;BR&gt;「……これは私のものだ……！」&lt;BR&gt;　蒼い炎で護った細腕が、突き出されたガンブレードをがつりと受け止める。びりっと刃先からガンブレードを握るスコールの手に、激しい衝撃が伝わり痺れを生じさせた。&lt;BR&gt;「……誰が、誰のものだって……？」&lt;BR&gt;　ひやりとした怒りをにじませ、腕の痺れにかまわずスコールはさらにガンブレードを握る手に力をこめる。&lt;BR&gt;　小さくハインは舌打ちし、次の瞬間空いた片腕が巨大な蒼い炎を宿し大きく振られた。&lt;BR&gt;「！」&lt;BR&gt;　とっさにガンブレードを引き構えたスコールの眼の前で、蒼い炎が破裂する。&lt;BR&gt;　わずかに勢いは殺したものの、その場に踏みとどまることができず吹き飛ばされる。&lt;BR&gt;　そのまま壁に叩きつけられる寸前、がっしりとした太い腕がスコールの身体を受け止め、衝撃を緩和した。&lt;BR&gt;「……？」&lt;BR&gt;　覚悟していた衝撃が来ないことに訝しみ、反射的に閉じていた眼を開いたスコールは、不機嫌そうに自分を受け止め見下ろす怜悧な瞳を頭上に見つけきょとんとする。&lt;BR&gt;　眼が合ったとたん、どんと突き飛ばすほども乱暴にスコールの身体を解放し、流れる動作で腕を振ると灼熱の炎を叩きつける。&lt;BR&gt;　スコールの後を追うように走ってきた蒼い炎が、紅蓮の炎と空中で激突し激しくスパークした。&lt;BR&gt;「行け！」&lt;BR&gt;　吼えるような声に、スコールが弾かれるようにハインに向き直る。&lt;BR&gt;　炎を盾にし死角から飛び込んできたスコールに、サイファーの炎を突き破ろうとしていたハインが一瞬眼を見開き、宙高く飛んだ。&lt;BR&gt;　力の均衡が破れ、紅蓮の炎が一瞬にして廊下を埋め尽くす。巻き込まれそうになったスコールを防御したのは、風神の魔法だ。&lt;BR&gt;　炎の威力がすさまじく、風神がどこにいるのかスコールからは見えない。だが的確に魔法でサポートしてくれる存在を確信し、スコールは自身の防御は頭から振り捨て、地面を蹴り宙を飛び逃げるハインに飛びかかる。&lt;BR&gt;　間一髪で蒼い炎で作りだした防御魔法がガンブレードを受け止める。ばしばしと火花が散ったが、スコールはそれにも構わずガンブレードを叩きつける両腕に力をこめる。&lt;BR&gt;　捨て身とも思える無謀な攻撃に、ハインは冷えた蒼の瞳を不愉快そうに細めた。&lt;BR&gt;「……そんなに死に急ぎたいか？」&lt;BR&gt;　辟易とした調子で訊ねられ、飛び散る蒼い火花に精悍な頬をいくつも切り裂いたスコールが、酷薄に笑った。&lt;BR&gt;「惚れた女を奪われて、のうのうと生き延びる気にはなれないな」&lt;BR&gt;　答えを耳にし、ハインの唇に嘲笑がのぼった。&lt;BR&gt;　ぐんと蒼い炎の質量が増す。&lt;BR&gt;「ならば死ね」&lt;BR&gt;　ひたと冷えた瞳をスコールの瞳と合わせ、一言呟くとハインは細い腕を振り上げた。&lt;BR&gt;「………………ジエンド」&lt;BR&gt;　愛らしい声が、死の呪文を紡いだ。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　セルフィ＝ハインとスコール達のあげる破壊音は、大統領室にいてもはっきりと聞こえていた。&lt;BR&gt;「とにかく全職員に緊急避難命令を出せ！　間違っても奴に対抗しようなんて思うんじゃねーぞ！　無駄死にするだけだからな！！」&lt;BR&gt;　コントロールルームと音声を繋ぎ、ラグナはもう何度目かわからない指示を大声で出す。&lt;BR&gt;　懸命に冷静さを保とうと努力しているのがよくわかるオペレータの声が、同じ数だけ答えてきた返答をよこしてきた。&lt;BR&gt;『現在非常警戒態勢レベル４にシフト中。機械兵を全職員の避難誘導、および護衛に回しています』&lt;BR&gt;　大統領室には大統領の警護の兵士と白いSeeDが数名いるのみだ。&lt;BR&gt;　壁一面に映し出されたモニタには、忙しく各エリアの被害状況がリアルタイムで表示されている。&lt;BR&gt;『対象は３８階ＢブロックにてバラムのSeeDと交戦中。……Ａブロック西２－３Ｃエレベータでオダイン博士のアクセス確認、補助電力でエレベータを起動し大統領室に向かっています』&lt;BR&gt;「……はん、悪運強ぇのは相変わらずだな」&lt;BR&gt;　ラグナが苦笑いを浮かべて肩をすくめた時、エルオーネを抱きリノア達を伴ったアーヴァインが息を切らせて部屋に飛び込んできた。&lt;BR&gt;「大統領！」&lt;BR&gt;「よぅ、お前ら！　全員無事か！？」&lt;BR&gt;　緊急警報がけたたましく鳴り響く中、血の跡は残していても元気そうな彼らの様子に、ラグナが安堵の表情を浮かべて叫ぶ。&lt;BR&gt;　アーヴァインはそんなラグナの前に走り寄り、早口で何が起きたかを説明した。&lt;BR&gt;「やっぱりな……」&lt;BR&gt;　ハインの意識に主導権を奪われ、セルフィが破壊神と化してしまったと聞き、ラグナが表情を曇らせた。&lt;BR&gt;「おいオダイン、何とかならねぇのかよ～！」&lt;BR&gt;「オダインは天才でおじゃる。おじゃるが、天才にも時間は必要なのでおじゃる」&lt;BR&gt;　どうにかしてくれと泣きつかれ、オダインはひょいと肩をすくめてあっさりとそう答える。&lt;BR&gt;　研究する時間さえあれば、セルフィを救う手だてのひとつも考えつけるかもしれないが……この状況でそんな悠長なことを言っている時間は、もちろんない。&lt;BR&gt;　今はスコールを倒すことしか考えていないハインだが、スコールを倒せば次の狙いは、間違いなくラグナとオダインに向かうだろう。&lt;BR&gt;「とにかく……」&lt;BR&gt;　深刻な表情で考え込んだラグナ達に、オダインが何かを言いかけたその時、ふうっと長い吐息が響いた。&lt;BR&gt;「エルおねえちゃん……？」&lt;BR&gt;　両腕に抱いたままの美女の意識が戻る気配に、アーヴァインが慌てて両膝を折りその場に座り込む。&lt;BR&gt;　立てた片膝に背を預ける形でエルオーネを楽な姿勢にさせてやる。その様子に、ラグナとイデアが素早く走り寄り、腰を落とした。&lt;BR&gt;「エル、おいエル！　しっかりしろ！」&lt;BR&gt;「エルオーネ、聞こえますか？　眼を開けて！」&lt;BR&gt;　優しい仕草で軽くイデアが頬を叩く。眠っていたエルオーネが、かすかに眉をひそめて小さく呻いた。&lt;BR&gt;「エル！」&lt;BR&gt;　さらに呼びかけるラグナ達の前で、うっとりとエルオーネの栗色の瞳が見開かれた。&lt;BR&gt;「起きた！」&lt;BR&gt;　心配そうにのぞきこんでいたリノアが、歓喜の表情ではしゃいだ声を上げた。声のした方向に、エルオーネはぼんやりと視線を彷徨わせる。&lt;BR&gt;（…………私…………？）&lt;BR&gt;　長い眠りから覚醒し、まだ頭がうまく動いていない。&lt;BR&gt;　はしゃいでのぞきこむ青い服の少女から、隣に座ってこちらを見つめる顔に視線を動かし、エルオーネはそのままぱちぱちと数回まばたきをした。&lt;BR&gt;　この顔は良く知っている。エルオーネに、一番安心感をくれる人だ。&lt;BR&gt;「大丈夫か？　エル」&lt;BR&gt;　心配そうに眉をひそめ、腕をのばして大きな手のひらで頭をなでてくる。&lt;BR&gt;　子供の頃と何も変わらない、遠慮なくぐしゃぐしゃとなでてくれる、大きな手。&lt;BR&gt;「……ラグナおじさん……」&lt;BR&gt;「エル？」&lt;BR&gt;　ゆっくりと意識が現実に戻ってくる。&lt;BR&gt;　数秒間ラグナを無言で見つめていたエルオーネは、ややしてはっと大きく眼を見開き、アーヴァインの腕の中からがばっと身を起こした。&lt;BR&gt;「ラグナおじさん……！」&lt;BR&gt;　血相を変えて飛び起きたエルオーネに、ラグナが驚いて手を引っ込める。&lt;BR&gt;「ど、どうした」&lt;BR&gt;「スコールは……セルフィは……！？　私……大変なことを……！」&lt;BR&gt;　青ざめて訊ねるエルオーネの剣幕にラグナは困惑し、代わりに隣にいるイデアが静かに口を開いた。&lt;BR&gt;「エルオーネ、セルフィは今ハインが動かしています。例のＧ．Ｆ．は、魔女の始祖ハインだったのです」&lt;BR&gt;　エルオーネが大きく息をのんだ。&lt;BR&gt;　セルフィを守るために意識を閉ざしたことで、結果的にセルフィの内側からハインを引きずり出すことになってしまったことは、何とはなしに理解していた。&lt;BR&gt;「あぁ、そんな顔しないで。エルオーネは悪くないよ～」&lt;BR&gt;　首を横に振り、サファイアブルーの瞳に優しい光を浮かべたアーヴァインが安心させるように人好きのする笑顔を浮かべてエルオーネを見つめた。&lt;BR&gt;「セフィが曲がりなりにもハインに抵抗できたのは、エルオーネが力を封じてくれていたからだよ。エルオーネはエルオーネに出来る限りの力で戦ったんだから、恥じることなんて何にもないよ」&lt;BR&gt;　優しいアーヴァインの言葉に、悲痛な表情のエルオーネはゆるゆると首を振る。&lt;BR&gt;　だが、起きてしまったことをどうこう言っても始まらないのは、事実だった。&lt;BR&gt;「話は終わったでおじゃるか？」&lt;BR&gt;　飄々としたいつもの調子で、オダインが重い空気をものともせず口を開いた。&lt;BR&gt;「時間はあまりないでおじゃる。スコール達がハインを留めておける内にレベルMAX発動なのでおじゃる」&lt;BR&gt;「レベルMAX？」&lt;BR&gt;　首を傾げたアーヴァインに、オダインが得意げに薄い胸を張って口を開く直前に、ラグナが素早く説明した。&lt;BR&gt;「非常警戒態勢レベルMAX。Aブロック……オレらがいるとこな、このあたりをブロックごと官邸から切り離して防御システムを稼働させるってことだな」&lt;BR&gt;　ラグナに説明されてしまい、オダインはむ～っと不機嫌そうな顔になった。&lt;BR&gt;　なんだか意気消沈といった風情のオダインに、ラグナはやれやれと苦笑する。オダインには気の毒だが、説明させると長いのだから仕方がない。&lt;BR&gt;「まぁ簡単に言うと、ここらへんの区画全体をシェルターで隔離して、セルフィが入ってた防御室みてえにパッキング処理した上に疑似魔法をいくつも重ねてバリア張る、魔女でもそうそう破れそうにないシステムで護りましょうってこった」&lt;BR&gt;　セルフィが入っていた防御室は、そもそも大統領室の防御システム構築のために作られたものだった。&lt;BR&gt;　防御室が一応の完成を見て、試験的にではあるがすでに大統領室にシステムが導入されていたというのは、アーヴァインにとっては初耳だった。さすがにエスタはやることが早い。&lt;BR&gt;「スコール達はどうなるの？」&lt;BR&gt;　かすかに眉をひそめてリノアが訊ねる。&lt;BR&gt;「誰も助けてくれないってこと？」&lt;BR&gt;「……助けようがないんだよ、リノア」&lt;BR&gt;　溜息をついて答えたのはアーヴァインだ。&lt;BR&gt;「今現在、エスタの兵力は相当落ちている。スコール達より戦闘能力の高い兵士や機械兵なんて、エスタのどこを探したっていないんだ。……下手に援護なんかに来られても、足手まといにしかならない可能性が高い」&lt;BR&gt;「そんな……！」&lt;BR&gt;　リノアが息をのんでラグナを見つめ、ラグナはその視線を受け止めたが無言のままだった。&lt;BR&gt;「でも、このままじゃ、スコール達が……」&lt;BR&gt;「恐らくやられてしまうでおじゃるな」&lt;BR&gt;　淡々とオダインが答え、デスクに歩み寄りその上に身軽く飛び乗り、コンピュータのキーボードを器用に叩き始めた。&lt;BR&gt;「でも、このまま世界が滅びるのを待つこともできないでおじゃるよ。時間さえあれば、オダインがどうにかできるかもしれないでおじゃる」&lt;BR&gt;「どういうこと？」&lt;BR&gt;「ハインを倒せる人間は存在しないでおじゃる。でも、セルフィだけはハインを倒せるでおじゃる」&lt;BR&gt;　モニタに何やら様々な数値を呼び出しているオダインを見つめ、アーヴァインがひとつ頷く。&lt;BR&gt;「ジエンド……」&lt;BR&gt;「そうでおじゃる。あれだけが、ハインを倒せる最後の切り札でおじゃる。セルフィの中からハインを切り離しできれば、勝機はあるのでおじゃるよ」&lt;BR&gt;　そしてこれに、エルオーネの力は期待できない。&lt;BR&gt;　エルオーネの力はあくまで、過去の人間に現在の人間の意識をジャンクションさせることだ。&lt;BR&gt;　ハインを過去の人間の中に送り込んだ場合、確かにセルフィからは切り離しができるものの、誰の中に送り込むかが問題になる。ハインを宿した人間もジエンドで死んでしまうことになる上、その人間が現在の時間軸で生存している者だった場合、重大なタイムパラドックスが起きてしまう。何がなんでも、今の時間軸の中で、ハインの存在を単体に切り離さねばならない。&lt;BR&gt;「そんなこと、できるの？」&lt;BR&gt;　訊ねたリノアに、オダインは顔を上げ、勝ち誇ったように笑った。&lt;BR&gt;「もちろんでおじゃる。オダインに不可能はないでおじゃる。&lt;BR&gt;　……でも、天才にも時間は必要でおじゃる。もっと研究しないと、そんな方法は見つからないでおじゃる。&lt;BR&gt;　ここには、オダインが今まで研究してきたすべてのデータがあるでおじゃる。ハインは恐らく、オダインもデータも消してしまうつもりでおじゃるよ。それでは困るでおじゃる」&lt;BR&gt;　自身の生死に関わる話題だというのに、あくまで飄々としているハインに感心すらしながら、リノアが小首をかしげた。&lt;BR&gt;「でもさっき、研究室壊れてなかった？」&lt;BR&gt;「そんなこともあろうかと、バックアップをとっていたでおじゃる。今こっちで復帰作業をしてるでおじゃるよ」&lt;BR&gt;　先ほどから何をしているのかと思えば、データの保全に努めていたらしい。&lt;BR&gt;「……じゃあ、スコール達が戦う必要なんてないんじゃないの……！？」&lt;BR&gt;　堅牢な防御システムがあるのなら、そこに全員で避難していればすむ話ではないか。&lt;BR&gt;　訴えるリノアに、オダインは飄々とした態度を崩さずあっさり答えた。&lt;BR&gt;「システム起動中に襲われたり、研究中に世界が滅んでしまっては困るでおじゃる。スコール達に時間を稼いでもらわないとならないでおじゃる」&lt;BR&gt;「スコール達を捨て石にするってこと！？」&lt;BR&gt;「傭兵というのは、そういう役割を担うものでおじゃる」&lt;BR&gt;　冷たく言い放つオダインに、ラグナが苦く笑って首を振った。&lt;BR&gt;「そう冷たいこと言うなよ～なんとかシステム起動後に奴らを拾ってやる方法を考えようぜ～」&lt;BR&gt;「それまで保てばの話でおじゃるな」&lt;BR&gt;　身も蓋もないオダインに、ラグナの苦笑がさらに深まり、リノアの頭に血がさらに昇った。&lt;BR&gt;「あ、あのっ！」&lt;BR&gt;　憤然と何やら叫びだそうとしたリノアの出鼻をくじくように、慌てて声を上げたのはエルオーネだった。&lt;BR&gt;「待って……部屋を隔離する前に、私を外に出してください」&lt;BR&gt;「エル？」&lt;BR&gt;　突然何を言い出しているのかと驚くラグナに、エルオーネは必死な色を浮かべた瞳を向ける。&lt;BR&gt;「ごめんなさい、ラグナおじさん。でも私、今この部屋に避難してしまうわけにいかないの……！」&lt;BR&gt;「あぁ？」&lt;BR&gt;　素っ頓狂な声を上げたラグナにかまわず、エルオーネはふらつきながらも自力で立ち上がった。&lt;BR&gt;　この場にいる誰よりも非力なエルオーネの無謀な行動に、アーヴァイン達も呆気にとられて彼女を見上げた。&lt;BR&gt;「パッキング処理されたら、私は私の力を自由に使えなくなるのでしょう？　それじゃ、私はあの子達の役には立てない……」&lt;BR&gt;「そ、外に出たら、危ないもんよ！」&lt;BR&gt;　入口に最も近い場所に立ってアーヴァイン達の動向を見守っていた雷神が、驚いて声を上げた。&lt;BR&gt;　顔に似合わず根っからのフェミニストな雷神に扉の前に立ちはだかれ、エルオーネは泣き出しそうに顔をゆがめる。&lt;BR&gt;　花のような美女にうるんだ瞳を向けられ、雷神がうっと息をのむ。&lt;BR&gt;　エルオーネはくるりと背後のラグナを振り返った。&lt;BR&gt;「私、わかったの。あの時、私の中に閉じこめられていた力が、セルフィにぶつかったあの瞬間に……ハインを引き出してしまったあの瞬間に、セルフィが何を望んだのか」&lt;BR&gt;　セルフィの中で意識の主導権が取って代わってしまったあの瞬間を、エルオーネは思い出す。&lt;BR&gt;「それを叶えてあげられるのは、私だけよ。私にしかできないことよ。だから私、セルフィの所に行かなくちゃ……！」&lt;BR&gt;　奥ゆかしい女性の代名詞みたいなエルオーネの行動に、アーヴァイン達はもうあんぐりと口を開けて見るしかない。&lt;BR&gt;　そういえば、小さな頃のエルオーネはモンスターだらけの町中でも平気で走り出してしまうような、豪毅なお転婆娘であったことをラグナは思い出す。成長後のエルオーネがあまりにも清楚で控えめだったので、すっかり忘れ去られていたが。&lt;BR&gt;「しゃ～ね～な～……」&lt;BR&gt;　強引にダメだと言い聞かせれば、エルオーネは言うことを聞くかもしれない。けれどそれは、きっとエルオーネ自身のために良くないことだ。&lt;BR&gt;　そう判断したラグナは、よいしょと立ち上がりコントロールルームに向かって声を上げた。&lt;BR&gt;「オレはこれから３８階Bブロックに向かう。オレが出たらまずこの部屋のシステムだけを作動してくれ。オダイン達の安全が最優先だ。……オレの生体反応がゼロになったら警戒態勢レベルMAXに即座にシフトしろ。ただし、エルはきちんと保護してくれよ」&lt;BR&gt;『何言ってるんだ、君は……！』&lt;BR&gt;　大統領室のスピーカーから、オペレーターの代わりにキロスの声が響き渡った。どうやらコントロールルームに詰めていたらしい。&lt;BR&gt;　にかっとラグナが豪快に笑った。&lt;BR&gt;「ようキロス、そっちに行ってたか。聞いた通り、エルがスコール達の支援しに行くってーからよ、オレは護衛でくっついてくことにしたぜ」&lt;BR&gt;『馬鹿なことを言わないでくれ。今更戦闘行為なんて君にできると思っているのか！？』&lt;BR&gt;「失礼なことを言うなよな～キロス。こう見えてもオレはまだまだ現役だぜ～！」&lt;BR&gt;　ラグナは胸を張って言いきったが、退役してから十年以上も時がたっている彼に、戦闘能力を期待できるとはその場にいる誰もが思えなかった。&lt;BR&gt;「ついでにオレに何かあったら、エルだけでなくあいつらの方もよろしく頼むわ。できたらMAXシフト前にあいつらを回収してやりてえんだが……」&lt;BR&gt;『君の息子だ。彼を守りたいのなら、何としても生き残って自分でやることだな』&lt;BR&gt;　淡々としたキロスの言葉に、ラグナはにっと豪快に笑った。&lt;BR&gt;「おう、確かにその通りだぜ～！　ま、それでもいちお、フォロー頼むわ。じゃな」&lt;BR&gt;　あっさり笑って通信を切り、ラグナは愛用のマシンガンを手にとってエルオーネを振り返った。&lt;BR&gt;「んじゃエル、ちょっくら行ってくっか！」&lt;BR&gt;「え？　あ、うん」&lt;BR&gt;　きょとんとキロスとラグナの会話を聞いていたエルオーネが、我に返って慌てて頷く。アーヴァインは思わず頭を抱え、それから観念して立ち上がると、着ていた長いコートを脱いでエルオーネの肩にかけてやった。&lt;BR&gt;「あぁもう！　どうなっても僕は全然知らないからね～！　みんな好きにすればいいんだよ！」&lt;BR&gt;　薄い夜着のみを身につけていたエルオーネは、ばさりと肩にかけてもらったコートに驚き、瞳を優しくしてアーヴァインを見つめる。&lt;BR&gt;「ありがとう、アービン」&lt;BR&gt;　幼い頃の愛称で呼ぶエルオーネに、アーヴァインはちょっとむくれた顔で横を向く。&lt;BR&gt;「ほらほら、拗ねない拗ねない！　じゃ、行こっか！」&lt;BR&gt;　立ち上がり、ぱしぱしとアーヴァインの背中を叩いたリノアが朗らかに言って扉に向かう。&lt;BR&gt;「おう、ほら行こうぜ」&lt;BR&gt;　ラグナとエルオーネがリノアについて行くのを一瞬見送ってしまったアーヴァインは、直後に我に返って悲鳴を上げた。&lt;BR&gt;「っていうか、な～んでリノア、君まで行くんだよ～！？」&lt;BR&gt;「馬鹿ね、ここまで来たら最後まで見届けなくてどうするのよ。いくらここの部屋の防御がすごくったって、一生ここにいるわけにいかないんだし、殺されるのなんて時間の問題だよ」&lt;BR&gt;　リノアは、ハインの魔法力の一部を受け継ぐ魔女なのだ。&lt;BR&gt;　先ほどはエルオーネが意識不明になっていたし、アーヴァインの様子も心配だったのでセルフィの後を追うのは断念したが、問題は一応解決済みである。何か策があるなら、協力もしたい。スコールやセルフィを本当の兄妹のように愛しているエルオーネがやることなら、きっとそれはあの二人のためになる。&lt;BR&gt;「それに、アーヴァインだって見届けなくちゃ、終われないんじゃないの？」&lt;BR&gt;　あんな風に、遠くから奪われた愛しい者の姿を見つめて傷ついているだけではなくて。&lt;BR&gt;　あの二人がどこにたどり着くのか、それを見届ければ自分の気持ちにだって整理がつけられるはずだ。&lt;BR&gt;「だから、行こう？　アーヴァイン」&lt;BR&gt;　真摯に見つめて誘いかけてくるリノアに、アーヴァインはやれやれと苦笑する。&lt;BR&gt;　勝ち気な少女は、どんな時でも強気でまっすぐだ。&lt;BR&gt;「ＯＫ、一緒に行くよ」&lt;BR&gt;　ここで傷ついているだけでは、確かに前には進めない。&lt;BR&gt;　アーヴァインは頷き、破壊神と化した初恋の少女の元へ向かう決意をした。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;&lt;/SPAN&gt;

<script data-viewer-zoom-script>
(() => {
  const stage = document.querySelector('.viewer-stage-image');
  const image = stage ? stage.querySelector('.viewer-image') : null;
  if (!stage || !image) {
    return;
  }

  const setZoom = (enabled) => {
    stage.classList.toggle('is-zoomed', enabled);
    image.setAttribute('aria-pressed', enabled ? 'true' : 'false');
    if (enabled) {
      const naturalWidth = image.naturalWidth || image.clientWidth || 0;
      const targetWidth = naturalWidth > 0
        ? Math.max(naturalWidth, Math.min(Math.round(stage.clientWidth * 0.92), naturalWidth * 4))
        : Math.round(stage.clientWidth * 0.92);
      image.style.width = `${targetWidth}px`;
      image.style.maxWidth = 'none';
      image.style.maxHeight = 'none';
      requestAnimationFrame(() => {
        stage.scrollTop = 0;
        stage.scrollLeft = Math.max(0, Math.round((image.scrollWidth - stage.clientWidth) / 2));
      });
    } else {
      image.style.removeProperty('width');
      image.style.removeProperty('max-width');
      image.style.removeProperty('max-height');
      stage.scrollTop = 0;
      stage.scrollLeft = 0;
    }
  };

  const toggleZoom = () => {
    setZoom(!stage.classList.contains('is-zoomed'));
  };

  image.setAttribute('tabindex', '0');
  image.setAttribute('role', 'button');
  image.setAttribute('aria-label', '逕ｻ蜒上ｒ諡｡螟ｧ縺ｾ縺溘・邵ｮ蟆・);
  image.setAttribute('aria-pressed', 'false');

  image.addEventListener('click', toggleZoom);
  image.addEventListener('keydown', (event) => {
    if (event.key === 'Enter' || event.key === ' ') {
      event.preventDefault();
      toggleZoom();
    }
  });

  stage.addEventListener('click', (event) => {
    if (event.target === stage && stage.classList.contains('is-zoomed')) {
      setZoom(false);
    }
  });

  window.addEventListener('keydown', (event) => {
    if (event.key === 'Escape' && stage.classList.contains('is-zoomed')) {
      setZoom(false);
    }
  });
})();
</script>
