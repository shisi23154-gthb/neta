      width=537&gt;&lt;SPAN&gt;&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;「まったく、なんて日なんだろうな！」&lt;BR&gt;　大仰に手を振り回し、ラグナはソファにどさっともたれかかって大声をあげた。&lt;BR&gt;「セルフィが行方知れずになったと思ったら今度はエルが何かの魔力で昏睡状態……しかもよりによってそんな日に、世界でただひとりの魔女がエスタにお目見えだ」&lt;BR&gt;「……その魔女リノアの力でもエルオーネは目覚めない……か。あのふたりは？」&lt;BR&gt;「リノアがオーバーワークでへたっちまったから、空いてる部屋で寝てる」&lt;BR&gt;　ラグナを見下ろすキロスの顔にも疲労がにじみ出ている。&lt;BR&gt;　ベッドの上のエルオーネは、こんこんと眠り続けていた。瞼を閉じてやったので、瞳は見えない。&lt;BR&gt;　……と、その時部屋の扉が音もなく開いた。&lt;BR&gt;「……！」&lt;BR&gt;　振り返れば、スコールがこれまた疲れ果て殺気さえ感じる顔で立っている。&lt;BR&gt;　これが見知らぬ人間だったら、刺客と間違われても文句は言えない風情だった。&lt;BR&gt;「スコール……」&lt;BR&gt;　自分も眼の下に隈を作っているくせに、ラグナの顔がみるみる心配そうに曇っていく。&lt;BR&gt;「エルオーネは？」&lt;BR&gt;　意外にもしっかりした足取りでスコールはベッドの脇まで歩み寄り、キロスがはっと我に返ったように口を開いた。&lt;BR&gt;「命に別状はない。……だが、どうしても目覚めない」&lt;BR&gt;「目覚めない？」&lt;BR&gt;「色々と手はつくしたんだが……こうなると自然に眼を覚ますのを待つしかない」&lt;BR&gt;　スコールは手を伸ばし、白いエルオーネの額に触れた。&lt;BR&gt;　――――なんだかあの時のリノアみたいだね～？&lt;BR&gt;　そんなふうに呟くセルフィの声が聞こえた気がして、スコールはかすかに笑った。&lt;BR&gt;　イデアから魔女の力を継承し、アルティミシアの魔力の干渉を受けたリノアも、こんなふうに眠っていた。&lt;BR&gt;　まるで死んでしまったように、ひっそりと眠りに落ちた。&lt;BR&gt;（そうだな……まったく同じだな）&lt;BR&gt;　疲れ切った心は麻痺したようで、なんだかすべてが遠い出来事のように感じる。&lt;BR&gt;　――――だから、大丈夫だよ～！　リノアだって起きたんだもん、おねえちゃんだってすぐ起きるって！&lt;BR&gt;　そんなふうに励ます声が聞こえている自分はどこか異常なのかもしれない。&lt;BR&gt;　あの時は……リノアの声が聞こえずに動揺するばかりだったのに。&lt;BR&gt;「どういう状況で倒れたんだ……？」&lt;BR&gt;　ひとりごとのように呟いたスコールに、ラグナが溜息まじりに答えた。&lt;BR&gt;「わからねぇ。オレはアーヴァインがエルの悲鳴を聞いたって聞いて、エルの部屋に直行したんだけどよ、その時にはエルはひとりで床に倒れてた」&lt;BR&gt;「誰もついていなかったのか？　いつもエルオーネについていた……」&lt;BR&gt;　そこでスコールは言葉を切り、そういえば名前を知らなかったと今更ながらに気がついた。&lt;BR&gt;「紺色の髪のSeeDが、いつもついていたはずだ」&lt;BR&gt;「……そいつは行方不明だ」&lt;BR&gt;　溜息まじりのラグナの言葉に、スコールは眼を見開いた。&lt;BR&gt;「行方不明……？」&lt;BR&gt;「あぁ。確かにエルの傍にいたはずなのに、忽然と官邸から姿を消しちまった。捜索はしてるんだけどよ、おかしいんだ。誰もあいつの名前を知らねえってんだよ」&lt;BR&gt;「え……？」&lt;BR&gt;　姿を消したということは拉致されたかエルオーネを昏睡に陥れた張本人かと考え込んでいたスコールは、最後のその言葉にきょとんと眼を見開いた。&lt;BR&gt;「名前を……知らない？　白いSeeDも？」&lt;BR&gt;「誰も、だ。よく考えると、オレも確かにあいつが名前で呼ばれているのを聞いたことがねーんだよ。エルが名前を呼んだりしてるのを見たこともねえ。……それに対して、変だとも思わなかった」&lt;BR&gt;　エルオーネは白いSeeDたちのこともちゃんと名前で呼んでいる。一緒の船で育った、彼らも可愛い弟妹たちなのだ。&lt;BR&gt;　そのエルオーネが、ここ数日誰よりも傍にいたあの青年だけ、名前を呼んだことがない？&lt;BR&gt;（……それは変だろ）&lt;BR&gt;　常識ではありえないことが起きている。&lt;BR&gt;（変な魔法でもかけられたのか……？）&lt;BR&gt;　だがあの紺色の髪をした白いSeeDに関わったすべての人間、正SeeDである自分たちを含めた大多数の人間の眼をあざむく魔法など、スコールは聞いたこともない。魔法にかけられた記憶もない。&lt;BR&gt;（そんなことができる奴が、人間って呼べるのか？）&lt;BR&gt;　スコールは頭を抱える。ガルバディアのデリングシティで魔女の術中に陥り魅縛されていた人々のことがふと脳裏に甦った。&lt;BR&gt;（でも、魔女はリノアだけのはずだ……あぁでも、発見されていなかっただけで、こっそり存在してた魔女って可能性も……いやあいつはどう見ても男だったよな……男の魔女なんてありえるのか？　そもそもその場合魔『女』って呼ぶのはなんか変じゃないのか？）&lt;BR&gt;　スコールはますます頭を抱える。わからないことだらけでやっぱり身動きが取れそうもなかった。&lt;BR&gt;（今回の事件に関与しているのはセルフィとエルオーネと紺色の髪のあいつ……その誰もが現在行方不明か昏睡状態で話の聞ける状態じゃない……さらにサイファーが……）&lt;BR&gt;　先ほどセルフィ失踪直後にゼルとサイファーに連絡を入れたのだが、サイファーにだけはどうしても通信がつながらなかった。&lt;BR&gt;　サイファーはSeeDではない。SeeDではないが、非番のSeeDの通信機をひとつ勝手に拝借してトラビアに向かっていた。サイファーと共にトラビアに向かったゼルは、SeeDの休暇申請の手続きをきちんと踏んだにも関わらず、ガーデンから緊急任務の名目で呼び戻されてしまっていた。ゼルとサイファーの動きに、ガーデン側も何か不審に思う部分があったのかもしれない。&lt;BR&gt;　だからゼルも、別行動をとっているサイファーの動向を完全に把握していない。どうやらサイファーと共に風神雷神も動いているようだが、それもゼルは詳細を知らないとのことだった。&lt;BR&gt;（何やってんだよこんな時に……どこもかしこも袋小路だ……）&lt;BR&gt;　だんだん苛々してきたスコールは、大きく溜息をついて両腕を振った。&lt;BR&gt;　自分の感情を持て余した時などに出る癖なのだが、今日は周囲の様子を完全に失念していたらしい。&lt;BR&gt;「きゃっ」&lt;BR&gt;　力一杯振った腕が、誰かに当たった。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;「……！」&lt;BR&gt;　驚いてスコールが振り返ると、いつの間にか部屋に入ってきていたリノアが、彼の腕にはじき飛ばされ床に尻もちをつくようにして座り込んでいた。&lt;BR&gt;　脇には、どうやらとっさにリノアを受け止めたらしい、アーヴァインもいる。&lt;BR&gt;（……あぁ、そういえば来てたって誰かが言ってたな）&lt;BR&gt;　スコールはぼんやりとそう考えてから、首をひねった。&lt;BR&gt;（……でも、なんでこんなところにいるんだ？）&lt;BR&gt;　リノアは世界で確認されている唯一の魔女で、今回の事件のとばっちりを食わないようにバラムガーデンに保護されているはずだったのだが。&lt;BR&gt;（勝手に飛び出してきたのか？　……………そうなんだろうな）&lt;BR&gt;　セルフィと連絡が取れないと心配していたというサイファーの証言もあることだし、サイファーにシドへの進言を止められてしまい、業を煮やしてエスタに乗り込んできたというのが真相だろう。&lt;BR&gt;　もちろんサイファーがいれば強引に止めてもくれただろうが、今は世界各地を飛び回っている。心中役立たずと罵りたい気分がないわけでもなかったが、それを思えば仕方のないこととぐっと我慢もできる気がした。&lt;BR&gt;（少なくともＧ．Ｆ．はセルフィしか狙っていないから、リノアが狙われることはないだろうが……バックにいる奴らがどう出るかがわからないな……何が目的かもまだはっきりしていないんだし……）&lt;BR&gt;　以前、スコールがセルフィと話し合った時に出たエスタとバラムガーデン分断説だって、完全に否定されたわけではない。もしあの説の通りなら、ガーデンに保護されている魔女リノアの存在は、かなり重要なポジションを占めることになる。&lt;BR&gt;　何しろリノアは魔女である以前に、フューリー・カーウェイの愛娘なのだ。&lt;BR&gt;　一時は魔女イデア暗殺計画失敗などで失墜を余儀なくされた彼も、今は次期大統領に推す動きが出るほどの復権を果たしている。&lt;BR&gt;　そんな彼の娘が、バラムガーデンに保護されている最中にエスタ領内で失踪したり怪我をしたり死亡するなんてことになったら……間違いなく国家間の大問題だ。&lt;BR&gt;（下手をしたら戦争勃発だぞ……）&lt;BR&gt;　だんだん頭痛がしてきて、スコールは座り込んだままのリノアを見ながら、思わず溜息をついてしまった。&lt;BR&gt;「……スコール」&lt;BR&gt;　その溜息に、不安そうな顔をしていたリノアが、複雑な表情になった。怒って良いのか、迷っている表情。&lt;BR&gt;「前にも言ったと思うんだけど……口にしてくれないと、思っていること、わかんないよ」&lt;BR&gt;（わからない？）&lt;BR&gt;　スコールはますます頭痛を感じ、苛々と大きく腕を振った。&lt;BR&gt;「この状況で、俺が溜息をつきたくなる心境が、あんたにはわからないのか？」&lt;BR&gt;　でもって、久々に出た言葉はこれである。&lt;BR&gt;　つくづく、優しい言葉をかけるということに不慣れな自分に呆れてしまう。&lt;BR&gt;（だが、言わないとならないことはちゃんと言わないと……）&lt;BR&gt;　――――わかるけど～、言い過ぎは良くないよ～？&lt;BR&gt;　気を取り直して口を開きかけたとたん、セルフィの声が聞こえた気がした。&lt;BR&gt;　出かけた言葉をのみこみ、スコールはちょっと考える。&lt;BR&gt;（じゃあ、あんたならどうするんだ？）&lt;BR&gt;　記憶の中のセルフィが、肩をすくめてくすっと笑った。&lt;BR&gt;　――――どうするかな～？　どうすると思う～？&lt;BR&gt;（わかるかよ……）&lt;BR&gt;　スコールは思わず苦笑した。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　続けざまに叱られると思っていたリノアは、突然肩の力を抜いたスコールにきょとんとした顔になる。&lt;BR&gt;　スコールは少しだけ表情をやわらかくして、リノアを見下ろした。&lt;BR&gt;「……大丈夫か？」&lt;BR&gt;　問いかけは自分の腕が当たってしまったリノアに対して。&lt;BR&gt;　リノアは慌てて頷き、アーヴァインの支えを断り自力で立ち上がった。&lt;BR&gt;「大丈夫、直撃は避けたから」&lt;BR&gt;「僕もちゃんと受け止めたしね～」&lt;BR&gt;　一触即発の張りつめた空気が消え、ほっとした様子でアーヴァインも笑顔になって立ち上がる。&lt;BR&gt;　スコールは頷き、視線をリノアにまっすぐ向けた。&lt;BR&gt;「で、どうしてここにいるんだ？」&lt;BR&gt;　静かに訊ねられ、リノアはばつが悪そうな顔になった。&lt;BR&gt;「……セルフィが……心配だったから」&lt;BR&gt;　うつむき、拗ねたように床をトントンとつま先で蹴って、リノアが答える。&lt;BR&gt;　スコールはひとつ頷くと、なるべく穏やかな声になるよう気を付けながらまた口を開いた。&lt;BR&gt;「サイファーには何て説明された？」&lt;BR&gt;　驚くリノアに、スコールは肩をすくめてみせる。&lt;BR&gt;「止められたんだろ？　学園長に直談判しに乗り込んで行きそうだと、奴が言っていたからな、俺が止めてくれるように頼んだんだ」&lt;BR&gt;　リノアはぷいと顔を横向けた。&lt;BR&gt;「……あいつは、ただ絶対にシドさんには何も言うなって言っただけよ。言うとセルフィが困った立場になる、詳細は言えないけどこれだけは確かだから、セルフィを心配するなら大人しくしておけ、って。&lt;BR&gt;　しかも、わたしには何にも教えてくれないくせに、突然勝手にガーデン出て行っちゃって……シドさんにも、キスティス達にも、何も言わずによ？　ほとんど同時にゼルまで休暇取って出かけちゃって、みんな心配してたんだよ。&lt;BR&gt;　ゼルは、任務があるって連絡したら戻ってきたみたいだけど、サイファーのことは何も知らないって言うの。&lt;BR&gt;　それでシドさんが、わたしにサイファーが何か言っていなかったかって聞いてきて……でも、あんな言い方されたら、わたしも何も言えないじゃない？&lt;BR&gt;　でも、こんなふうに蚊帳の外に追いやられて、仲間が困っているかも知れないのに、自分だけ安全圏で守られてるなんて、わたしは嫌だもん。&lt;BR&gt;　だから、シドさんの協力が仰げないなら、わたし、自分で来ようって決めたの。キスティスは反対したけど、わたしはセルフィが心配だったんだもの。待ってるだけなんて、わたしはできないよ！」&lt;BR&gt;「で、僕はお姫様の父君にお目付役を頼まれていてね。お姫様がどうしてもエスタに行くって聞かないから、ついてきたんだ」&lt;BR&gt;　すっかり大佐の便利屋扱いらしいアーヴァインに、スコールは軽く頷いた。&lt;BR&gt;　もちろんそればかりではないだろう。何しろこのエスタにはセルフィがいる。……いるはず、だった。&lt;BR&gt;（キスティス……頼むからじゃじゃ馬の手綱はちゃんと握っておいてくれ……）&lt;BR&gt;　脱力しそうにぐったりしながら、スコールは一年前のルナティックパンドラでの出来事をふと思い出した。&lt;BR&gt;　あの時、スコールはラグナロクの中にリノアとキスティスを残してアデルとの戦いにのぞんだ。&lt;BR&gt;　しかし結局リノアはどうしてもスコールの傍にいたいとラグナロクを飛び出し、キスティスはそれを止めることもできず、リノアはサイファーに捕えられアデルと融合する羽目になったのだ。&lt;BR&gt;　リノアに対し、多大なコンプレックスを抱いているキスティスは、リノアに対し強い態度に出ることができない。&lt;BR&gt;　それにアーヴァインがお供で一緒だし、エスタにはスコールがいる。何かあっても最悪の事態は避けられると勝手に判断してしまったということも考えられた。&lt;BR&gt;　せめてゼルがガーデンにいてくれれば、もう少し違った展開になったかも知れないが、さすがにシドは侮れない。任務の一言で、完全にゼルの身柄を押さえられてしまった。&lt;BR&gt;　SeeDである以上、ゼルが任務を拒むことなどできるはずがない。&lt;BR&gt;（俺に不信感でも抱いているのかもな……）&lt;BR&gt;　確かに、報告ひとつ入れずに単独行動を取り続け、挙句ガーデン内の人間に密かに連絡をとって動かしているなどと知れれば、SeeDランクの降格どころではすまないだろう。ゼルを押さえたという行動からも、シドがサイファー・ゼルの動きをスコールに結びつけて考えているのは間違いない。&lt;BR&gt;　そうして考えると、リノアとアーヴァインをエスタに出したのだって、何の思惑も動いていないとは考えにくい。&lt;BR&gt;　一年前、面倒ごとを全部スコールに押しつけて孤児院に雲隠れしたあげく、君は指揮官でしょうと偉そうに言ってのけたシドの人の良さそうな笑顔が、どれほど食えないものかスコールは身をもって知っている。&lt;BR&gt;（やれやれ……）&lt;BR&gt;　ますますもって疲労感を感じたが、今はぐったりしている場合ではない。&lt;BR&gt;　ともかく現状打破だと気合いを入れ、スコールはラグナの方へと顔を向けた。&lt;BR&gt;「セルフィの捜索の許可を……あんたのとこの秘書官から出してもらった」&lt;BR&gt;　スコールはリノア達を手で制し、ラグナを振り返ると冷静な声で先ほど魔法研究所であったことを報告した。&lt;BR&gt;「監視？」&lt;BR&gt;　にこにことスコール達を眺めていたラグナは顔をしかめ、大仰に肩をすくめた。&lt;BR&gt;「悪ぃな、みんな疑心暗鬼になっちまってるみてぇだ……。安心しとけって、監視なんてオレがとっぱらってやっからよ、お前はがんばってセルフィ捜してこい。それをエルだって望んでるだろうしな」&lt;BR&gt;「…………」&lt;BR&gt;　スコールは頷き、それから言った。&lt;BR&gt;「あと、他国の現在の国際情勢について、エスタは何かつかんでないか？」&lt;BR&gt;「お？　なんだ突然、難しそうな話題だな～」&lt;BR&gt;「……さっき、俺なりに今回の事件の整理をしてみたんだが……」&lt;BR&gt;　ざっとリノア達にも視線を流し、注意を引いてから、淡々とした口調でスコールは自分の考えを話しはじめた。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;「つまりアレだな、セルフィとあのSeeDがいなくなって、エルが眠っちまったことで、わからねえことも増えた代わりに、Ｇ．Ｆ．以外に人間がからんでるってことも判明したってわけなんだよな。……未来さんじゃない、この時代に生きてるヤツの仕業ってことも」&lt;BR&gt;　セルフィを拉致した人間がいるということで、図らずもＧ．Ｆ．の単独暴走ではないことが露見した形となった。エルオーネに対し実力行使に及んだ時点で、その人間がこの時代に生きている者であることも明らかだ。&lt;BR&gt;　だからこそ、エルオーネ自身の存在が鍵となる。&lt;BR&gt;「首謀者にゃ、例のSeeDが関与してる可能性が高く、エルは何らかの形で利用されて、口封じに何かされたって可能性が高い、と」&lt;BR&gt;「あのSeeDは……普通の人間じゃない」&lt;BR&gt;　これだけ大勢の、戦闘のプロですらあざむいた彼の力は、人間の限界を超えている。&lt;BR&gt;　うんうんとラグナが頷いた。&lt;BR&gt;　リノアとアーヴァインも、横で今回の事件の詳細を聞き、すっかり大人しくなっていた。&lt;BR&gt;　その様子をちらりと横目で見、スコールは腕を組んで言葉を続けた。&lt;BR&gt;「普通の人間を超越した奴が、規格外のＧ．Ｆ．を暴走させてこのエスタに何かを仕掛けようとしている……目的はエスタとバラムガーデンの分断、もしくはエスタかガーデンの世界的孤立……ひょっとしたら、世界大戦を起こそうとしている可能性もないとは言えない。&lt;BR&gt;　例のＧ．Ｆ．は十中八九、セルフィが初ジャンクションしたＧ．Ｆ．だと思う。とすると、敵はセルフィの過去を調べ、今彼女がＧ．Ｆ．過適合症の疑いを持たれているということを知ることができる存在だということだ。……それほどの情報網を持っている、組織があるということになる」&lt;BR&gt;「組織か……それはもう、国家レベルの話ということだな」&lt;BR&gt;　キロスが思慮深げに呟き、スコールもこくりと頷いた。&lt;BR&gt;「国家に対し何かを仕掛けるなら、それは他国か、自国の抵抗組織かのどちらかになる。&lt;BR&gt;　エスタに今そこまでの抵抗組織があるという情報を俺は聞いたことがない。ないとするなら、敵はエスタ以外の他国……バラムガーデンとエスタが結びつくことを望まない、エスタの国力が低下して得をする国、ということになる。&lt;BR&gt;　もしくは、魔女を利用して世界を掌握しようとした、デリング大統領のような奴がどこかの国に現れ、世界を混乱させるために影響力の高いエスタに揺さぶりをかけているのかも知れない。&lt;BR&gt;　そして国が動いているのなら……あの青い髪の男以外のスパイが、エスタ内部にいることだって十分考えられる」&lt;BR&gt;　静かに断言されたその言葉に、ラグナが驚いた顔をした。&lt;BR&gt;「おいおいおい、いよいよ不穏な感じだな」&lt;BR&gt;「……初めからこの事件は不穏なことだらけだったんだが……君は気づいていなかったのか？」&lt;BR&gt;　あきれ顔でキロスが突っ込み、ラグナは慌てて首を振った。&lt;BR&gt;「何を言ってるんだ、キロス君。オレはちゃ～んとわかってたぜ！　あえてわかってないフリしてんじゃねーか、言わせんなって！　ほら、よく言うだろトンビの爪ってよ！」&lt;BR&gt;「………………。鷹の爪と言いたかったのか？」&lt;BR&gt;「う、うるせーな、大した違いはねーだろ！」&lt;BR&gt;　騒々しいやり取りがしばらく続き、その寒い応酬を見るにも飽きたスコールは、ちょっと息をついてからリノアの方を見た。&lt;BR&gt;「恐らく、リノアとアーヴァインがエスタに入ったことだって、もう情報としては流れていると見た方がいい」&lt;BR&gt;　いきなり話の中心にされ、リノア達がぎょっとしてスコールを見返した。騒いでいたキロスとラグナも口をつぐむ。&lt;BR&gt;　スコールは冷静に頷いて、ラグナに視線を流した。&lt;BR&gt;「そしてリノアが何者なのかも、調べればすぐにわかることだ。リノアはカーウェイ家の令嬢で、現在はバラムガーデンの保護下にいるはずの世界唯一の魔女だ。&lt;BR&gt;　エスタ内でリノアに危険が及べば、ガルバディアは恐らく黙ってはいない」&lt;BR&gt;「そんな……！」&lt;BR&gt;　リノアが反射的に抗議の声をあげ、それからぐっと言葉をのみこんだ。&lt;BR&gt;　スコールの視線を受けたからなのか、親バカ一直線の父親のことを思いだしたからかは不明だったが、ありえないことではないとリノアも思ったのかも知れない。&lt;BR&gt;「あんまり良くねぇ状況ってこったなぁ……」&lt;BR&gt;　ラグナはのんきな口調で呟き、ぽりぽりと頭をかいた。&lt;BR&gt;　真剣な面もちでスコールは頷く。&lt;BR&gt;　もし世界を掌握したいなどと考える第二第三のデリング大統領がいるとしたら、恐怖の象徴・魔女であるリノアの存在を見逃すなど考えられない。&lt;BR&gt;「……そういうことなんだ」&lt;BR&gt;　スコールはリノアに視線を向けた。&lt;BR&gt;　突然言葉をかけられ、呆然としていたリノアがはっとしたように眼を見開いた。&lt;BR&gt;「えっ？」&lt;BR&gt;「……これが今の現状なんだ。どうしてあんたがエスタにいるのがまずいのか、わかっただろ？」&lt;BR&gt;「あ……」&lt;BR&gt;　顔色を少し変え、リノアはうつむいて首につけたネックレスの指輪にそっと触れた。&lt;BR&gt;　出会った頃から持っていた指輪と、スコールがリノアにあげたグリーヴァの指輪。&lt;BR&gt;　まだ持っていたのか――今更のように気がついて、スコールは少し複雑な表情になった。&lt;BR&gt;　……だが、何も言わなかった。&lt;BR&gt;　しばらく沈黙が落ち、リノアはずっとうつむいたまま、口を開こうとしなかった。&lt;BR&gt;（……拗ねたのか？）&lt;BR&gt;　他人の気持ちを推し量ることに慣れていないスコールは、少しだけ困惑する。&lt;BR&gt;　自分にしては珍しいほどにきちんと言葉で説明し、現状を認識させたつもりだったのだが。&lt;BR&gt;「リノア……別に意地悪や嫌がらせでガーデンに戻れと言っているわけじゃないんだ」&lt;BR&gt;　仕方なく、スコールは説得すべく口を開く。&lt;BR&gt;「俺はこれからセルフィといなくなったSeeDを捜索しなけりゃならない。敵の正体も目的も、はっきりとはまだわからない状態で動いているんだ。&lt;BR&gt;　正直に言って、今の状況であんたに敵の狙いが向いた時、確実に守りきる自信は……ない」&lt;BR&gt;　少々情けないが、スコールはそう断言した。&lt;BR&gt;　リノアとアーヴァインが少し意外そうにスコールを見つめている。&lt;BR&gt;（情けないけど……万が一セルフィがＧ．Ｆ．付きで出てきたら……）&lt;BR&gt;　セルフィが相手というだけでも苦戦必至なのに、反撃する猶予すら与えてもらえないあのＧ．Ｆ．までもがおまけでついてきた日には……。&lt;BR&gt;「……努力はしても、限界はある。限界を見極めるのも、SeeDの義務だ。俺が死ぬならともかく、あんたには確実に無事でいてもらわないとならない」&lt;BR&gt;「そんなふうに、言うのやめてよ」&lt;BR&gt;　ぱさっと黒髪を揺らし、リノアはスコールの言葉を遮った。&lt;BR&gt;「スコール、いつもそればかり。命よりもSeeDが大事、わたしの気持ちより、任務が大事、って……」&lt;BR&gt;　その言葉に、スコールはクッと視線を屈折させ、横を向いた。&lt;BR&gt;&lt;BR&gt;　――――スコールは、SeeDの任務とわたしのどっちが大事なの！？&lt;BR&gt;&lt;BR&gt;　数週間前、スコールとリノアがしばらく冷却期間を設けることになった、決定打のリノアの台詞。&lt;BR&gt;　あの台詞が記憶からよみがえり、懸命に穏やかな言葉を紡いでいたスコールの唇から、次の声を失わせた。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　きっかけは、ほんの些細なことだった。&lt;BR&gt;　アルティミシアを倒し、世界が元の時間の流れを取り戻し、スコールとゼルとセルフィは当初の契約通り、リノア達森のフクロウの傭兵になった。&lt;BR&gt;　ティンバーで過ごした短い日々は、満ち足りていて幸せだった。&lt;BR&gt;　恋をすると視野狭窄気味のふたりは、周囲が呆れるほど情熱的で、片時も離れることがなかった。&lt;BR&gt;　だが、ガルバディア弱体化を狙って、活動休止状態だった他のレジスタンス組織がいっせいに立ち上がり、ティンバーの独立戦争がいっきに盛り上がったあたりから、少しずつそれが変わり始めた。&lt;BR&gt;　リノアしか視界に入っていなかったスコールが、その頃からようやく周囲を認識するようになったのだ。&lt;BR&gt;　現実に立ち返って周囲をよく見れば、二人だけの世界を構築している間、黙って二人を見守りSeeDとしての任務をこなしていたゼルとセルフィ、時が到来したと長い沈黙を破り武器をとったティンバーを愛するレジスタンス達がいて、そこで初めてスコールは、恋に溺れ一時は放棄しかけたSeeDという立場、SeeDを目指したことの意味、そんなことを考えるようになっていった。&lt;BR&gt;　そんなスコールにリノアは不安を覚えたが、動き出した事態は彼女を待ってはくれない。&lt;BR&gt;　さらに同時期に、復権を果たし事実上のガルバディアの指導者となったカーウェイ大佐が、ティンバーの独立を認めたのだった。&lt;BR&gt;　表向きは国内の建て直しを図るため、爆発寸前のティンバーを切り捨てたのだと見られていた。&lt;BR&gt;　だがもちろん、リノアの心中はひどく複雑だった。&lt;BR&gt;　大佐の内心の思惑はどうあれ、ともかくティンバーは最小限の犠牲を払って独立を果たし、森のフクロウとバラムガーデンとの契約はそれを持って終結した。&lt;BR&gt;　スコール達SeeDはガーデンに帰り、もちろんリノアもついていった。&lt;BR&gt;　学園長のシドは快く迎えてくれ、部屋も用意してくれたが……リノアは、一日中ガーデンで暇を持て余す状態になった。&lt;BR&gt;　何しろスコール達は、SeeDの中でもAランクに認定されているエリート中のエリートである。&lt;BR&gt;　おまけに『伝説のＳｅｅＤ』という仰々しい肩書きまでついている。&lt;BR&gt;　当然、他国から指名を受けることも珍しくないわけで、その生活はリノアの想像以上に多忙だったのだ。&lt;BR&gt;　スコールとゼルはガーデン内で見かける方が珍しい有様、キスティスは教員免許再取得の試験の準備でこれまた忙しく、セルフィはトラビアガーデン復興のために長期でレンタル決定となり、リノアの相手をしてくれるのは、たまにガーデンにふらりと帰ってくる超問題児サイファーくらいのものだった（そしてガーデン内のサイファーの悪ガキぶりを目の当たりにし、サイファーを何でも知っていて頼れる男と認識していたリノアはカルチャーショックを受けたりするのだが）。&lt;BR&gt;　そのうちリノアは魔女の力を制御すべく、イデアの元で訓練を受けることにしたのだが、性格そのままに暴走して止まらない力にすぐに音を上げ、今度はガーデンに編入してSeeDを目指すと言い出しシドを困らせ、特別に認められて特別生として授業と訓練を受けたものの、自由奔放が信条のリノアに命令されるばかりの軍事訓練などとても耐えられるはずもなく、結果日がな一日アンジェロと散歩してるのが日課になってしまった。&lt;BR&gt;　不安で、退屈で、寂しくて。&lt;BR&gt;　他の仲間にできていることが、自分にはできない。&lt;BR&gt;　旅の間に生まれていたコンプレックスは日増しにふくれあがり、その苛立ちをたまに帰ってくるスコールにぶつけるようになり、口げんかが絶えなくなった。&lt;BR&gt;　リノアは大切。だが、SeeDである自分、SeeDになることを選んだ自分の人生も、また大事。&lt;BR&gt;　どちらが欠けても、スコールには足りない。&lt;BR&gt;　けれどリノアには伝わらない。口に出して、態度に示して、湯水のように注がれなければ彼女にとってそれは愛情とは呼べないから。&lt;BR&gt;　好きだから、ちゃんと言ってほしい。&lt;BR&gt;　好きだから、言わなくてもわかってほしい。&lt;BR&gt;　恋にしか生きる拠り所のない女と、軍人気質の朴念仁の男との会話は果てしなく不毛にすれ違い、口を開けば傷つけ合うばかり、思えば何もかも正反対の気質で反発し合って惹かれ合ったのだからある意味当然だったのだが、蜜月があまりに幸せすぎたために、そのギャップもまた激しく感じた。&lt;BR&gt;　そしてリノアの決定的な一言がその唇から放たれ、それに対しスコールが&lt;BR&gt;「俺は、リノアと同じくらい……SeeDも大事だ。&lt;BR&gt;　それが許せないなら……俺はリノアの騎士にはふさわしくないということなんだろう」&lt;BR&gt;　と、これまた決定打の一言を返したため、リノアはガーデンを出て行った。&lt;BR&gt;　……もちろん森のフクロウが消滅し、魔女という身でおいそれと自由に動けるわけでもないリノアが行く当てなどほとんどなく、事態を傍からハラハラと見守っていたゼルがリノアを追いかけて彼女を保護し、面白がってついて来たサイファーと説得してガルバディアの生家に帰したのだった。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;「わたしの気持ちは？　最善の方法がとれれば、わたしの気持ちはどうでもいいの？&lt;BR&gt;　スコールは、SeeDの自分が一番大事なの？　だからわたしをバラムに閉じこめて、セルフィを捜すの？」&lt;BR&gt;　自分でも駄々っ子のような言葉を言っていると自覚しながら、リノアが言い募る。&lt;BR&gt;　スコールの眉がぎゅっと寄せられ、彼が明らかに苛立っているのがその場にいた全員にわかった。&lt;BR&gt;「リノア……」&lt;BR&gt;　いつもよりさらに低い声に、びくんとリノアの肩が震えた。&lt;BR&gt;　誰よりも長くスコールの傍にいたリノアには、今の彼がどれほど怒っているか、わかった。&lt;BR&gt;　スコールはそんなリノアを見すえ、何かを言おうと口を開きかけ、そのままくっと視線を屈折させると眼を閉じた。&lt;BR&gt;　眼を閉じると、闇の向こうで黄色い花が揺れるのが見えた。&lt;BR&gt;　ささくれ立つスコールの心がほんのわずか、慰撫される。&lt;BR&gt;　忘れかけた優しい気持ちが戻ってくる。&lt;BR&gt;（そうだ……悪いのは俺なんだ）&lt;BR&gt;　必死で冷静さを維持し、スコールは自分に言い聞かせる。&lt;BR&gt;（俺がリノアにここまで言わせているんだ……）&lt;BR&gt;　突然魔女になり、愛されて当然とばかりに輝く自信を喪失しかけたリノアにとって、誰に相談することなく、ひとりで自分の人生を選択し、SeeDとして軍人として生きるために走り出してしまったスコールの背中を見つめるのは、どれほど切ないことだっただろう。&lt;BR&gt;　スコールやセルフィ達と違い、リノアには自分自身の内に『SeeD』のような確固たる自信を打ち立てるだけのものがない。&lt;BR&gt;　魔女になってしまったリノアにとって、拠り所はスコールの愛情だけだったのだ。&lt;BR&gt;　俺はリノアの、魔女の騎士だと言った、スコールのあの言葉だけが、リノアにとってすべてだったのだ。&lt;BR&gt;「……ごめん……」&lt;BR&gt;　怒鳴られると身をすくませたリノアの耳に、スコールの小さな呟きが届いた。&lt;BR&gt;　はっと顔を上げるリノアの眼に、映るのはスコールの端正な横顔。&lt;BR&gt;「あんたはどうするんだ？」&lt;BR&gt;　声をかけられたのは、黙って事態を見守っていたアーヴァインだ。&lt;BR&gt;　リノアとの会話は、あれでもう終わってしまったらしい。&lt;BR&gt;　言うべきことは言い、聞くべきことは聞いた。だから後はリノアの自己責任と言うことなのだろうか。&lt;BR&gt;　突然放り出されたような気分で胸を痛めるリノアにはかまわず、スコールとアーヴァインの会話は続く。&lt;BR&gt;「君たちに迷惑がかからない範囲で、僕もセフィの捜索に加わりたいんだけど……まずいかな～？」&lt;BR&gt;「人手は足りないから歓迎すると言いたいが……そっちにも事情はあるだろう？」&lt;BR&gt;　腕を組んでスコールがちらっとリノアを見る。&lt;BR&gt;　アーヴァインも視線を追ってリノアを見、にこっと人好きのする笑顔を浮かべた。&lt;BR&gt;「うん、僕はリノアから離れちゃいけないことになってるからね～。だからとりあえず、ガーデンから応援を頼もうかと思うんだ～」&lt;BR&gt;　スコールはリノアからアーヴァインに視線を戻した。&lt;BR&gt;「応援？　バラムガーデンからか？」&lt;BR&gt;「別にガルバディアガーデンでもいいんだけど、リノアの保護はバラムガーデンが請け負ったことだからバラムの方が筋は通るかな～？&lt;BR&gt;　君たちの任務とは別件で、リノアの護衛でSeeDを派遣してもらえたらな～と思うんだ。&lt;BR&gt;　大佐も、リノアに関してはお金を惜しむつもりはないだろうし、経営上問題なければガーデンも快く派遣してもらえるだろうしさ」&lt;BR&gt;　大佐を説得するのは僕に任せてよ～とにこやかに告げるアーヴァインに、スコールはふっと苦笑して頷いた。如才ないアーヴァインなら、娘を溺愛している大佐を動かすのはさほど困難でもないだろう。&lt;BR&gt;「……了解した。ただ、人数を増やすなら官邸側と先に交渉が必要だろう。&lt;BR&gt;　俺たちのクライアントはエスタだが、あんたのクライアントはカーウェイ大佐だからな」&lt;BR&gt;「あ～、そうだよね～」&lt;BR&gt;　ラグナは二つ返事で了承するだろうが、今後のことも考えて必要な手順は踏んでおくべきだとスコールは考える。&lt;BR&gt;「それから繰り返すが、今回の俺たちのクライアントはエスタだ。そっちに何かあっても、対処するだけの余力はこちらにはほとんどない。それはあらかじめ了承しておいてほしい。&lt;BR&gt;　あんたがセルフィの捜索に加わるのは自由だが、あんたの行動がどんな結果を導いても、俺はノータッチだ。&lt;BR&gt;　それから……あんたの最優先はリノアの護衛だ。リノアの身に危険が及べば何が起こるか、それだけは常に認識しておいてもらいたい」&lt;BR&gt;　SeeDの顔できっぱりと言うスコールに、リノアは寂しそうな顔になり、アーヴァインは笑顔で頷いた。&lt;BR&gt;「もちろん、心配しないでよ～。僕だってガーデンの生徒なんだからさ～」&lt;BR&gt;「信用している。……あぁ、それと……」&lt;BR&gt;　そこでスコールは少し言いにくそうな顔になり、眼を伏せて慎重に口を開いた。&lt;BR&gt;「セルフィを発見できても、例のＧ．Ｆ．をジャンクションしている可能性が高い。&lt;BR&gt;　もしその場合は……最悪セルフィとの戦闘になることも、可能性のひとつとして認識しておいてくれ」&lt;BR&gt;「え？」&lt;BR&gt;　ぱちぱちとアーヴァインがまばたきをし、リノアも表情をこわばらせた。&lt;BR&gt;　確かに、先ほどのスコールの説明で、すでに一度スコールがＧ．Ｆ．と戦闘になったとは聞いていたが……。&lt;BR&gt;「セルフィが自分を取り戻すことができれば、問題はないさ。だが……完全にＧ．Ｆ．に乗っ取られてしまっているなら……それはかつての魔女イデアと同じ状況だ。戦うしかない」&lt;BR&gt;「イデア……ママ先生……」&lt;BR&gt;　アーヴァインが呟き、呆然とそのまま黙り込む。&lt;BR&gt;　母とも慕った大切な女性を狙撃し、直接戦闘にもつれこんだ、あの時のことを思い出して。&lt;BR&gt;「で、でも……前に戦った時は途中でセルフィに戻ったんでしょ？」&lt;BR&gt;　青ざめたリノアを、スコールは見つめる。&lt;BR&gt;「……可能性にはかけたいさ。簡単にあきらめるつもりもない。けれど、不確定要素も多すぎる。&lt;BR&gt;　セルフィ自身は、最後までSeeDでいたいから、こちらもSeeDとして対応してほしいと、失踪直前に俺に言い残していた」&lt;BR&gt;「そんな……！」&lt;BR&gt;　リノアが反駁しかけ、スコールは彼女に視線を向ける。彼女が何を言いたいのかは、もうわかっていた。&lt;BR&gt;（俺だって……同じ気持ちなんだ……）&lt;BR&gt;　けれど、セルフィの意志も尊重したい。あの自分に良く似た少女が手に入れた大切なものを、守ってやりたい。&lt;BR&gt;「……それしか……ないの？　そうするしか……仕方がないってことなの？」&lt;BR&gt;　リノアが呆然としたように呟いた。&lt;BR&gt;（仕方がない……？）&lt;BR&gt;　ぼんやりと、一年前リノアをエスタの手に引き渡した時のことを思い出し、スコールの胸がかすかに痛んだ。&lt;BR&gt;　リノアが望んだことだから仕方がないと後ろ向きになったスコールを、馬鹿と叱りつけたキスティスを思い出す。&lt;BR&gt;　あの時、リノアの本当の望みはスコール達の傍にいることだった。嫌われず、恐れられず、親しみをもって触れてもらえることが彼女の望みだった。&lt;BR&gt;（でも、セルフィは……）&lt;BR&gt;　SeeDであることを何より優先する、セルフィの望みは――。&lt;BR&gt;「……だ、大丈夫だよ～。あのセフィが、黙って操られっぱなしになるわけないだろ～？」&lt;BR&gt;　嫌な雰囲気に、慌てたようにアーヴァインが明るい声を出す。&lt;BR&gt;　それはそう思っているというより、祈っているとでも言った方が正しいような響きの声だった。&lt;BR&gt;「そ、そうだよね！　セルフィ、強いもの。何度でも戻ってきてくれるよね」&lt;BR&gt;　リノアも大きく頷いて、スコールを見た。&lt;BR&gt;　スコールは……それに頷き返すことができず、顔を横向けるだけだった。&lt;BR&gt;（セルフィが強い？）&lt;BR&gt;　以前もリノアが同じようなことを口にしていたと、ぼんやりと思い出す。&lt;BR&gt;　あの壊れ果てたトラビアガーデンで、強いんだねと寂しそうにリノアが呟いていたことを思い出す。&lt;BR&gt;（強いわけじゃないんだ……）&lt;BR&gt;　そしてあの時、言い返さなかった言葉を、スコールはまた胸の内で繰り返した。&lt;BR&gt;（……強いんじゃない。セルフィはただ、弱くないだけだ。笑っていないと自分を保てないから……必死なだけなんだ）&lt;BR&gt;　もちろん、それをやり通す彼女を強いと評価することもできるだろう。けれど……。&lt;BR&gt;「スコール……？」&lt;BR&gt;　不安げに見上げてくるリノアの視線を感じながら、スコールは視線を伏せていた。&lt;BR&gt;　脳裏に浮かぶのは、あの日焼き付いた笑顔にこぼれた、たった一粒の涙。&lt;BR&gt;（あんな風にしか泣けない奴が……強いわけないじゃないか……）&lt;BR&gt;　だが彼女が、他人に強い人間と評価されたがっていることも知っているスコールは、リノア達に何も言えなかった。&lt;BR&gt;「……そうだといいな」&lt;BR&gt;　だから、こんな一言だけを呟いて、スコールは素早く身をひるがえし、エルオーネの部屋から外に出た。&lt;BR&gt;「え？　あ、スコール？」&lt;BR&gt;　驚くリノア達の声を背中に受けながら、スコールは振り返らずに官邸入口に向かって歩き出す。&lt;BR&gt;　官邸から外に出ると、日差しは変わらずまぶしかった。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　小型通信機が振動音を発した。&lt;BR&gt;　魔法研究所付近で魔法の気配をたどったり目撃者を捜したりと地道な調査を行っていたスコールは、意識を調査に集中しながら通信機を取り上げた。&lt;BR&gt;「はい」&lt;BR&gt;　ディスプレイで名前を確認することもせず、気だるげに答えたスコールの耳に、豪快な笑い声が響き渡る。&lt;BR&gt;『よぅ、相変わらずしけた声してんなぁ！』&lt;BR&gt;　スコールはぎょっとして耳から通信機を離してしまっていた。ディスプレイに眼を走らせる。&lt;BR&gt;　そこには、セルフィが失踪してから、何度呼び出しをかけても応じなかった男の名前が表示されていた。&lt;BR&gt;「サイファー、あんたどこに……緊急事態発生なんだ。セルフィがいなくなった」&lt;BR&gt;　早口で告げると、サイファーはハッと息をついた。&lt;BR&gt;『……セルフィが？　自分から？』&lt;BR&gt;「さらわれたんだ。魔法研究所の職員が全員重傷だ。エルオーネも昏睡状態で眼を覚まさない」&lt;BR&gt;『なんだって？』&lt;BR&gt;　サイファーの声が低くなった。&lt;BR&gt;『エルオーネが……魔法研究所にいたってのか？』&lt;BR&gt;「え？」&lt;BR&gt;　スコールは眼をまたたき、それから今の話の流れでは確かにそう解釈されることに気がついた。&lt;BR&gt;「あ……いや、エルオーネはセルフィがいなくなって、俺たちが捜索にかり出されてる時に……」&lt;BR&gt;　ほっとサイファーが吐息をついた。&lt;BR&gt;『襲われたのか？』&lt;BR&gt;「……わからない。発見された時にはもう……」&lt;BR&gt;　さすがにサイファーが通信の向こうで絶句しているのがわかった。&lt;BR&gt;　サイファーにとっても、エルオーネは敬愛すべき美しい姉である。&lt;BR&gt;「ちょうどリノアとアーヴァインがエスタに来ていて、リノアが魔女の力を使ってみたんだが、それも効かないらしい」&lt;BR&gt;　そこでスコールはいったん言葉を止め、通信機を睨みながら低く言った。&lt;BR&gt;「サイファー、あんた、リノアを止めてくれたんじゃなかったのか？」&lt;BR&gt;　スコールの記憶に間違いがなければ、サイファーにこうしてプライドにヒビを入れつつ協力要請する羽目になったのもリノアの暴走を止めてほしかったからなのだが。&lt;BR&gt;『なんだ、リノアの奴、エスタに行っちまったのか……オレはちゃんと、シドのオヤジにチクりに行くのは確実に止めたんだぜ。エスタに行くなとは言わなかったけどよ、ガーデンから出るなとは言っといたんだけどな』&lt;BR&gt;　悪いのは自分じゃないとばかりのその声に、スコールはむっと口をへの字に曲げた。&lt;BR&gt;『まぁ行っちまったもんは仕方ねーだろ。ところでよ、スコール。少しおもしれーことがわかったぜ』&lt;BR&gt;　仕方ないの一言ですまされ、スコールはこめかみに血管が浮くのを自覚した。&lt;BR&gt;「……なんだよ」&lt;BR&gt;『行方不明のお姫さんのＧ．Ｆ．だよ』&lt;BR&gt;　その一言で、スコールは不機嫌を振り飛ばした。&lt;BR&gt;「見つかったのか？」&lt;BR&gt;『いや。トラビアのぶっ壊れたマザーコンピュータの端末、オレと雷神が適当に学生の気引いてる隙に、チキン野郎と風神とでハッキングかましたんだよ。&lt;BR&gt;　お姫さんのデータももちろんあったぜ。例のＧ．Ｆ．使ってたのは１２歳の頃。約一年近くこっそりジャンクションし続けてたらしい』&lt;BR&gt;「一年……」&lt;BR&gt;　スコールが顔をしかめた。未成熟な精神しか持たない１２の子供が、一度も外さず一年もＧ．Ｆ．をジャンクションし続けるなど、もちろん正気の沙汰ではない。&lt;BR&gt;『でよ、おもしれーのはこっからだ。お姫さんのデータだけ隠しファイルが存在してたんだよ』&lt;BR&gt;「隠しファイル？」&lt;BR&gt;『厳重にパスワードでロックしてやがった。突破すんのは至難の業だったんだぜ』&lt;BR&gt;「……あんたがやったんじゃないだろ」&lt;BR&gt;　スコールは肩をすくめる。サイファーは低い声で笑った。&lt;BR&gt;『つまんねーヤツだなおまえ。……まぁいいさ、で、何が出てきたと思う？』&lt;BR&gt;「何だよ」&lt;BR&gt;　言いながら、スコールはふと背後に気配を感じてかすかに舌打ちした。&lt;BR&gt;　例の、エスタの監視だ。ラグナの命令が伝わっていないのか、事務方が独断で行っているのか……。&lt;BR&gt;「時間がない。早く言え」&lt;BR&gt;　ともかく、自分がどこかと連絡を取っていることが監視役にバレた。当然盗聴しようとしてくると悟り、スコールは声をひそめて早口になる。&lt;BR&gt;　この通信機はSeeDに支給される特別製なので盗聴される危険性はほとんどないとされているが、まったくないわけでもないのだ。&lt;BR&gt;『そうだな、時間がねーのはお互い様だ』&lt;BR&gt;　くつくつと通信機の向こうでサイファーが笑い、声を低めた。&lt;BR&gt;『出てきたのはよ、お姫さんのＧ．Ｆ．過適合症のデータだぜ』&lt;BR&gt;「……え？」&lt;BR&gt;　スコールは大きく眼を見開く。&lt;BR&gt;　その単語をスコールが初めて聞いたのは、この任務に入る直前のことだ。&lt;BR&gt;　今まで症例が報告されたこともない未知の適合症が、6年前のデータから出てきた……？&lt;BR&gt;「なんだよ、それ……」&lt;BR&gt;　眉根を寄せ、呆然とスコールが呟く。&lt;BR&gt;　携帯通信機を握る手が、じりっと汗ばんだ。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;&lt;/SPAN&gt;

<script data-viewer-zoom-script>
(() => {
  const stage = document.querySelector('.viewer-stage-image');
  const image = stage ? stage.querySelector('.viewer-image') : null;
  if (!stage || !image) {
    return;
  }

  const setZoom = (enabled) => {
    stage.classList.toggle('is-zoomed', enabled);
    image.setAttribute('aria-pressed', enabled ? 'true' : 'false');
    if (enabled) {
      const naturalWidth = image.naturalWidth || image.clientWidth || 0;
      const targetWidth = naturalWidth > 0
        ? Math.max(naturalWidth, Math.min(Math.round(stage.clientWidth * 0.92), naturalWidth * 4))
        : Math.round(stage.clientWidth * 0.92);
      image.style.width = `${targetWidth}px`;
      image.style.maxWidth = 'none';
      image.style.maxHeight = 'none';
      requestAnimationFrame(() => {
        stage.scrollTop = 0;
        stage.scrollLeft = Math.max(0, Math.round((image.scrollWidth - stage.clientWidth) / 2));
      });
    } else {
      image.style.removeProperty('width');
      image.style.removeProperty('max-width');
      image.style.removeProperty('max-height');
      stage.scrollTop = 0;
      stage.scrollLeft = 0;
    }
  };

  const toggleZoom = () => {
    setZoom(!stage.classList.contains('is-zoomed'));
  };

  image.setAttribute('tabindex', '0');
  image.setAttribute('role', 'button');
  image.setAttribute('aria-label', '逕ｻ蜒上ｒ諡｡螟ｧ縺ｾ縺溘・邵ｮ蟆・);
  image.setAttribute('aria-pressed', 'false');

  image.addEventListener('click', toggleZoom);
  image.addEventListener('keydown', (event) => {
    if (event.key === 'Enter' || event.key === ' ') {
      event.preventDefault();
      toggleZoom();
    }
  });

  stage.addEventListener('click', (event) => {
    if (event.target === stage && stage.classList.contains('is-zoomed')) {
      setZoom(false);
    }
  });

  window.addEventListener('keydown', (event) => {
    if (event.key === 'Escape' && stage.classList.contains('is-zoomed')) {
      setZoom(false);
    }
  });
})();
</script>
