      width=537&gt;&lt;SPAN&gt;&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　セルフィのフルケアで、致命傷を負っていた白いＳｅｅＤ達は全員完全回復を遂げた。&lt;BR&gt;　どうやら誰も命を落とさずにすんだことを確認し、セルフィはほっとする。&lt;BR&gt;　安堵した瞬間、ふっと足がもつれて細い身体が揺らいだ。&lt;BR&gt;「！」&lt;BR&gt;「セルフィ！」&lt;BR&gt;　ぎょっと眼を見開き、セルフィの背後に立っていたスコールが慌てて腕を出して華奢な背を抱き支える。&lt;BR&gt;　手出しをすることも許されず、ただ成り行きを呆然と見守ってしまっていたリノアとアーヴァイン、そして姿を隠していたサイファーと風神、雷神も、同時に声を上げていた。&lt;BR&gt;「…………っ」&lt;BR&gt;　スコールの腕に抱き留められたセルフィは、苦しげに形の良い眉をしかめ、ぎゅっと強く眼を閉じたまま動きを止めていた。自分で自分を抱きしめるように細い腕を身体に回し、ぐっと全身に力をこめる。&lt;BR&gt;　緊張で声も出せずに全身を硬直させたまま、息をつめて見つめるスコールの視線の先で、細かく身体を震わせていたセルフィが、やがてため込んでいた息をはっと大きく吐き、荒い息をつきながらゆっくりと眼を開いた。&lt;BR&gt;「……あ……ごめ……」&lt;BR&gt;　大怪我を負い貧血状態になっているスコールよりなお蒼白の顔を上げて、セルフィがいそがしく瞬きを繰り返しながら淡く笑った。&lt;BR&gt;「えへへ……失敗、失敗～」&lt;BR&gt;　照れたように笑いながらスコールの腕の中から身を起こし、自力できちんと立つ。眉をひそめ、スコールは全身に入った力を抜きながら、かすれた声を喉から押し出した。&lt;BR&gt;「……大丈夫か？」&lt;BR&gt;「うん、だいじょぶだいじょぶ！」&lt;BR&gt;　にこりとセルフィは笑顔で頷く。その笑顔の奥に暴れ狂う巨大な意識を押さえつけて。&lt;BR&gt;　何かを言わなくてはと思いながらも、言葉を見つけられずにいるスコールの前で、セルフィは自分の名を呼んだとおぼしき声を探すべく小さな頭をひょいとめぐらせ、アーヴァインとリノアの姿を眼にして驚いたように眼を見開き立ちつくした。&lt;BR&gt;（えっ……えぇ！？　あ、っちゃあぁぁ～～！！）&lt;BR&gt;　よもやリノアとアーヴァインが近くで見ているとは知らなかった。&lt;BR&gt;　誰も見ていないし、これが最後だとばかりにスコールに口づけてしまったセルフィは内心ひどく焦る。&lt;BR&gt;　だが青ざめてセルフィを見つめている彼らの誰も、そのことについて言及するつもりはなさそうで、セルフィはとりあえず笑顔でごまかすことに決め、にこにこと無意味に明るい笑顔を振りまき、自分の足で一歩踏み出した。&lt;BR&gt;「んじゃ～、官邸いこっか～！」&lt;BR&gt;　官邸内は大混乱中だろうから、見た目が多少血みどろで物騒だろうが、恐らく見とがめる者はいないはずだ。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　そう思ったのは正解で、エスタを襲った未曾有の危機に、官邸の者は全員浮き足だって走り回っており、大統領ラグナの所在もろくにつかめておらず、戻り来た姿を見て警備兵が驚倒している始末だった。&lt;BR&gt;「エスタを一時的に閉鎖してるんだ」&lt;BR&gt;　スコール達を連れて大統領私室に向かいながら、ラグナが説明した。&lt;BR&gt;　今現在、エスタ大陸全土を覆うＯＣＳ（光学偽装装置）の起動で、外部の者にエスタの様子は一切見えない状態になっている。衛星から見ようと何を使おうと、エスタの内部事情は一切見ることは不可能だ。&lt;BR&gt;　ただでさえ月の涙で打撃を受け、国力が低下していて他国からも狙われやすい状況だったエスタだ。今の首都の有様を見れば、確実に侵攻してくる国のひとつやふたつあってもおかしくはない。封鎖してしまえば敵の侵攻はある程度抑えられるが、何かあったのだと他国にも悟られる。大統領としては苦渋の決断だ。&lt;BR&gt;　スコールは無言のまま、少し前を歩いているセルフィの華奢な背中を見つめる。&lt;BR&gt;　どうしてセルフィの中にハインなんて伝説の存在が入り込み、官邸にいろと言い置いたはずのリノアとアーヴァインがあの場にいて、行方不明だったはずの風紀委員３人組がエスタにおり、しかもイデアまで連れているのか。スコールには何がなんだかさっぱりわからない。&lt;BR&gt;（いつもこうだ……）&lt;BR&gt;　一年前のあの時と、何も変わらない。知らされる情報量が圧倒的に少なく、振り回されてばかりだ。&lt;BR&gt;　違うのは、スコールが自分で、何がしたくて何を望むのかを知っているということ。&lt;BR&gt;　どう利用され、振り回されることになろうとも、それだけは絶対に譲りたくないと心に誓いながら、スコールはじっとセルフィの背中を見つめた。&lt;BR&gt;　&lt;BR&gt;&lt;BR&gt;　大統領私室に向かう透明な廊下の前に来ると、ラグナの横を歩いていたオダインはぴたりと足を止め、セルフィを振り返って飄々と言った。&lt;BR&gt;「ではオダインはセルフィを研究するでおじゃる。セルフィはオダインと一緒に来るでおじゃるよ」&lt;BR&gt;　オダインの声を聞き、セルフィの後を歩いていたスコールが、むっと眉をひそめた。&lt;BR&gt;「おい……！」&lt;BR&gt;　どこへ連れて行って、何をする気なのか。返答次第ではただではおかないと言わんばかりに殺気立つスコールに、振り向いたオダインは当然とばかりに胸を張った。&lt;BR&gt;「オダインはずっと魔女を研究してきたでおじゃるが、魔女の始祖を研究したことは一度もないでおじゃるよ。色々調べて、封印施設がハインにも有効か確認しなければならないでおじゃる。&lt;BR&gt;　ハインが表に出てきたら、恐ろしいでおじゃるよ。オダインもラグナも、お前達も全員殺されてしまうでおじゃるよ」&lt;BR&gt;　何しろスコール達は一致団結して魔女を何人も倒してきている『伝説のSeeD』だ。魔女の始祖に目障りに思われていても当然である。&lt;BR&gt;「大丈夫でおじゃる。お前達の話が終わる前に、封印したりはしないでおじゃるよ」&lt;BR&gt;「違う……！」&lt;BR&gt;　スコールは苛々と声を荒立てる。まだセルフィを封印するなんて、スコールは了承した覚えがない。&lt;BR&gt;　だがセルフィはそんなスコールを振り返り、にっこりと笑いかけた。&lt;BR&gt;「スコール、あたしは大丈夫だよ～。ママ先生の話なら、宇宙でもう聞いちゃったし～」&lt;BR&gt;　トラビアガーデンの事故についてはサイファー達が故意に伏せたので聞かなかったが、記憶はすべて取り戻している。戻った記憶と宇宙で聞いたイデアの話で、セルフィには事の次第がすべてのみこめていた。同じ話を二度聞くより、面倒ごとをさっさと片づけてしまった方が、合理的である。&lt;BR&gt;　気にするなと明るく笑いかけるセルフィに、スコールは苛立ちを隠さない不機嫌な顔を向けた。&lt;BR&gt;「大丈夫大丈夫！」&lt;BR&gt;　ハインを受け入れると決めた時から、覚悟の上だった。&lt;BR&gt;「ちゃんと話を聞いたら、また会わせてやるから心配ないのでおじゃる。ハインが表に出るまでの時間稼ぎもするでおじゃるよ」&lt;BR&gt;　魔法研究所は損壊が激しいので、官邸にあるオダイン研究室で研究を行う。さほど離れた場所に移動するわけでもないので、心配はないと言い切るオダインに、イデアが頷いた。&lt;BR&gt;「了承なさい、スコール。あなたは私の話を聞いてください。それでどうするのかは、あなたの判断に任せましょう」&lt;BR&gt;　何も知らないままでは、何を判断することもできない。&lt;BR&gt;　セルフィと引き離されることに関しては不満いっぱいだったが、とりあえず納得し、スコールはイデアに従い大統領私室へと足を向けた。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;「サイファー達が私の孤児院をたずねてきたのは、数日前のことです」&lt;BR&gt;　トラビアガーデンでセルフィの過去を調べたサイファー達は、その足で孤児院に向かった。ラグナロクを借りているので、世界中どこへでも、サイファー達に行けない場所はない。&lt;BR&gt;「サイファー達は、私に、孤児院にいた頃の、そして来る前のセルフィについて聞きたいと言いました」&lt;BR&gt;　初めは何も話すつもりのないイデアだったが、トラビアガーデン時代のセルフィが起こした事故について聞き、考えを改めた。トラビアガーデントップシークレットのその事故のことは、もちろんイデアにとっても初耳だった。&lt;BR&gt;「はじめ、私にはなぜ、Ｇ．Ｆ．をジャンクションしただけでセルフィがスロット魔法を自在に操ったのか、わかりませんでした。あの魔法は封じられた魔法です。Ｇ．Ｆ．の影響ぐらいで、解ける封印ではありません。&lt;BR&gt;　ですが、先ほど、セルフィの言葉で謎は解けました。セルフィに入り込んだのがハインであるなら、魔女の封印など造作もなく解くことができるでしょう」&lt;BR&gt;　言ってイデアは言葉を切り、怪訝そうな顔をするスコール達の顔を順々に眺めた。&lt;BR&gt;　孤児院ですでに話を聞いているサイファー達は、どことなく不機嫌そうな顔でよそを向いている。&lt;BR&gt;「セルフィは、孤児院に来る以前、そして孤児院に来た当時、すべての魔法を自在に使っていました」&lt;BR&gt;　きっぱりと言ったイデアの言葉に、サイファー達以外の全員が、驚愕して眼を見開いた。&lt;BR&gt;「セルフィは戦災孤児です。戦地となってしまった小さな村に暮らしていたために、親を失い孤児院に来たのです。&lt;BR&gt;　それ自体はさほど珍しい話ではありません。ですが、セルフィが親を亡くした経緯が特殊でした。&lt;BR&gt;　セルフィは親を、草原の中で亡くしました。花の咲き乱れる美しい花園だったと聞きます。その花園が、セルフィ達の国では戦地となりました。&lt;BR&gt;　村から脱出した村人と、その村人を守るための兵士を、敵国の兵が追撃したのです。逃げ切ることかなわず、村人達は全員亡くなりました。共に逃げていた兵士も亡くなりました。&lt;BR&gt;　ですが、敵国の兵士も全員、その花園の中で戦死を遂げました。生還したのはセルフィだけでした。&lt;BR&gt;　そして最大の謎は、死んだ者の多くが、無傷のまま息絶えていたということです」&lt;BR&gt;　イデアのその言葉に、スコールは嫌な顔をした。&lt;BR&gt;　そんなふうに、無傷で安らかに息絶えた者の姿を、スコールは見たことがある。&lt;BR&gt;「セルフィの母親もそうでした。血の流された戦地に、穏やかに安らかな顔で息絶えていました。&lt;BR&gt;　何が起きたのかは、生き残った者がセルフィ以外にいないので誰にもわかりません。&lt;BR&gt;　セルフィの身柄を確保したのは、セルフィの国の兵士でした。まだようやく歩けるようになったばかりの子供ですから、大した取り調べをされることもなく、私の孤児院に送られてきたのです」&lt;BR&gt;　国自体が混乱していたこともあり、軍がセルフィを長く手元に置くことなく孤児院に送ってしまったので、幸運にもセルフィの持つ異常さに気づいた者は誰もいなかった。　&lt;BR&gt;「セルフィが孤児院に来て、３日もたたない内に、私にはセルフィの持つ能力が異常であると気づきました。&lt;BR&gt;　明らかに魔女ではないはずなのに、セルフィは遊びながら魔法を用いていたのです」&lt;BR&gt;　幼いセルフィに、事の善悪などわからない。飼っている家畜をブリザドで凍らせたり、咲き誇っている花たちにファイアで火をつけたり――セルフィは、魔法のジャンクションなどできるはずもない、幼い少女だったというのに。&lt;BR&gt;「そして海岸でモンスターに襲われた時、セルフィはジエンドを使ったのです」&lt;BR&gt;　命の危機に、自らの意志で。&lt;BR&gt;「その時に私は理解しました。あの日、花咲き乱れる戦地で、敵味方すべての命を奪った力が誰のものであったのか……」&lt;BR&gt;　方向性も何もなくセルフィが放った力は、イデアをも巻き込もうとする力だった。イデアが魔女で、気配を感じて逃げなかったら、おそらくイデア自身も人生の終焉を迎えていた。&lt;BR&gt;「このままではいけないと、私は思いました。セルフィは魔女ではありません。普通の人の子の範疇を超える能力を持って生まれた、エルオーネと同じ存在です。&lt;BR&gt;　もしセルフィの能力が広く知られるようなことになれば、エルオーネ同様、必ずその身を狙われるでしょう。&lt;BR&gt;　それに今のままでは、セルフィの力は無差別で制御不能です。放置しておくことはあまりにも危険でした」&lt;BR&gt;　子供同士のケンカ中にうっかりジエンド発動などしたら冗談ではすまない。&lt;BR&gt;「私だけがセルフィの力を知っている、今しかないと思いました。私はセルフィの能力を封じてしまおうとしたのです。&lt;BR&gt;　……ですが、できませんでした。&lt;BR&gt;　セルフィの持つ力は私の持つ力とはまったく異なる力です。強くて大きな力です。&lt;BR&gt;　私の力だけで、その力すべてを封じることは不可能でした。&lt;BR&gt;　だから私はやむを得ず、セルフィの記憶を封じたのです」&lt;BR&gt;　セルフィが生まれながらに本能的に身につけていた、『能力の使い方』を忘れさせた。力自体はすさまじい大きさだが、使い方を知らなければ出口をふさがれたも同じ、表に出ることはない。&lt;BR&gt;「それでも私は不安でした。私たち魔女のように、後天的に得た力であればまだ良かったでしょう。&lt;BR&gt;　ですがセルフィの力は、本能に深く根ざしたもの。&lt;BR&gt;　力の大半を封じ、記憶すら封じても、成長するに従いセルフィの力は表に出てきてしまいました。&lt;BR&gt;　だから私は、セルフィをガーデンに入れることにしたのです」&lt;BR&gt;　力は表出してしまったが、それでも意のままに操れるものではなく、運任せの役立たず能力にしか見えない魔法だったから、幸運にも彼女を異端視する人間は誰もいなかった。&lt;BR&gt;　そして戦闘集団の中ならば、セルフィの能力はより目立たなくなる。自分の身を自分で守れるようになれれば、いずれ何かのきっかけで彼女の真の力が発現しても誰かに利用されたり、追われたりする危険も減る。Ｇ．Ｆ．の使用がどんな副作用をもたらすかわからなかったから、わざとトラビアガーデンを選択した。&lt;BR&gt;　元々好戦的で過激な思考回路を持っているセルフィだ。ガーデンという環境は肌にも合っていた。&lt;BR&gt;　イデアは間違いなく、セルフィにとって最良の方法を取ったのだ。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　ハインはおそらく、セルフィの持つ能力に興味を惹かれて、トラビアの地に現れたのだろうとイデアは思う。&lt;BR&gt;　自らの力の一部を魔女に受け継がせ、自分は人間の歴史に一切干渉せず、おとぎ話になるほどの時間を隠匿して過ごしながら、けれど決して眠ったりしてはいなかったハインが、魔女の封印を受けた、まったく未知の力を持つ少女に興味を持ち、手に入れたいと望んでも、不思議なことでもなんでもない。&lt;BR&gt;　セルフィを手に入れ、その力を自在に引き出せるようになっても、ハインはセルフィに対し積極的に干渉することはなかった。だからこそセルフィは長くハインをジャンクションした状態でも自我を保っていたのだ。&lt;BR&gt;　結局最後は過剰反応を起こして暴走したわけだが、ハインはその際にも、大人しくセルフィの内から出、トラビアのコンピュータ内に封印されている。――ハインにとっては、いつでも抜け出せる檻でしかなかったのだが。&lt;BR&gt;「実験……のようなものだったのかもしれませんね。人がハインという存在を宿したらどうなるのか……」&lt;BR&gt;　そうしてずっと機を伺っていた。最高のタイミングで行動を起こし、セルフィを人の世界から切り離して手に入れるために――。&lt;BR&gt;　最後の最後でセルフィの抵抗にあって、未だ完全には手に入れていないが、ハインの目的は半分以上達成できている。&lt;BR&gt;　厳しい表情で黙り込んだスコールに、イデアがすいと音もなくスコールの前まで歩み寄り、哀しげに微笑みかけた。&lt;BR&gt;「スコール、あの子が操る力の本質は『夢』です。あの子は生きている者に夢を見せて殺します。夢を見せられた者は、幸福の内に生涯を終えたという夢に囚われて死んでいくのです」&lt;BR&gt;　それはまさしく、ジエンドで穏やかに吹き荒れるあの花嵐さながらに。美しく、華々しく、明るく幸せな夢で命を絡め取る。&lt;BR&gt;　セルフィにとって、花というのは死の象徴なのだ。&lt;BR&gt;　幼いセルフィは花の中で、生まれて初めて『死』に触れた。初めて力を行使して命を奪ったのも、花園の中だった。&lt;BR&gt;　結果として、息絶えてゆく人々と、花というキーワードが、セルフィの中で固く結びついてしまった。&lt;BR&gt;　だからジエンドは花園の幻想を生み出し、死にゆく者の夢に花を添える。&lt;BR&gt;「スコール、以前私が話したことを覚えていますか？」&lt;BR&gt;「……？」&lt;BR&gt;　突然話を変えたイデアに、スコールは訝しげな顔をした。&lt;BR&gt;「一年前、私は言いました。あなたの物語を終わらせなさいと……」&lt;BR&gt;　静かなイデアの言葉に、スコールは記憶を探り当てる。確かに、孤児院でその言葉を聞いたことがあった。&lt;BR&gt;&lt;BR&gt;『あなたの物語を終わらせなさい。たとえそれが誰かの苦しみの物語の幕開けだったとしても――』&lt;BR&gt;&lt;BR&gt;　そう言って、アルティミシアとの戦いに身を投じる自分たちを見送ったイデア。&lt;BR&gt;　思い出したらしいスコールの様子に、イデアは穏やかに頷いた。&lt;BR&gt;「今、展開している現実は、セルフィの物語です」&lt;BR&gt;　生まれ落ちたその瞬間から静かにはじまっていた、セルフィの物語。&lt;BR&gt;「あの子はきっと、ただ一人でこの物語を終わらせるでしょう。夢に逃げることもなく、誰かの悲劇の幕を開けることもなく、あの子の物語は終わりを告げるでしょう」&lt;BR&gt;　たくさんの夢を多くの人に見せながら、セルフィは決して非現実的な夢を見ない。&lt;BR&gt;　トラビアガーデンの墓地で見た、小さな背中を唐突にスコールは思い出した。&lt;BR&gt;&lt;BR&gt;　――――あたしたちの夢、もっともっと、素敵なんやもんね……&lt;BR&gt;&lt;BR&gt;　セルフィの夢はいつだって、誰かを喜ばせたり、楽しませたりする夢ばかりだった。&lt;BR&gt;「……私の話はこれで終わりです。スコール、あとはあなたが考えなさい」&lt;BR&gt;　セルフィの結論はもうすでに彼女の中で出ている。&lt;BR&gt;　それを踏まえた上で、スコールはスコール自身の結論を出せと、イデアは言った。&lt;BR&gt;（俺の結論……）&lt;BR&gt;　スコール自身の結論も――本当はとっくの昔に導き出されていた。&lt;BR&gt;　息をするように自然に、いつの間にか好きになっていた少女。失いたくない、大切な人。&lt;BR&gt;　けれど、あの背中を見るたびに、何も言えなくなってしまう。小さな誇りを、守ってやりたいと願ってしまう。&lt;BR&gt;　あきらめる気はさらさらなかったが、どうするのがセルフィにとって一番良いことなのか、スコールにはどうしてもわからなかった。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　オダイン研究室は、官邸内の最上階に位置していた。&lt;BR&gt;「奥の部屋におるでおじゃるよ」&lt;BR&gt;　スコール達が入っていくと、検査結果のデータ解析に忙しいらしいオダインが興味なさそうにそう言った。&lt;BR&gt;「…………」&lt;BR&gt;　スコールは無言で頷くと、リノア達を置き去りにして大きなストライドで部屋を横切り、オダインに示された奥の扉の前に立った。&lt;BR&gt;　シュッとかすかな音と共に扉が開く。&lt;BR&gt;（え……？）&lt;BR&gt;　瞬間、スコールの視界内を、黄金色に輝く花がいっせいに埋めつくした。&lt;BR&gt;　夢の中で何度も見た花。スコールにとっては、懐かしいそれ。&lt;BR&gt;（！）&lt;BR&gt;　その花たちに抱かれるように、小さな少女がしゃがみこんでいる。&lt;BR&gt;　まだ５つにもならないほどに幼い少女、その小さな背中がぴくりと震え、栗色の髪揺らしてスコールを振り返る。&lt;BR&gt;　太陽さながらに咲きこぼれる大輪の花の中、涙に濡れた翠色の瞳がひどく鮮烈で、綺麗だった。&lt;BR&gt;「スコール？」&lt;BR&gt;　ふいに聞き慣れた少女の声がした。&lt;BR&gt;　はっとしてスコールは瞳をめぐらせる。あれほどに視界を埋めつくしていたと思った陽光色の花は跡形もなく消え失せ、簡素なベッドの上に腰掛けているセルフィだけがその部屋にいた。&lt;BR&gt;（なんだ……今のは……？）&lt;BR&gt;　呆然とスコールは眼をまたたいてセルフィを見つめる。セルフィはそんなスコールににっこりと陽溜りのような笑顔を浮かべた。&lt;BR&gt;「えへへ～、お話終了～？」&lt;BR&gt;「……あぁ」&lt;BR&gt;　頷くスコールに笑いかけているセルフィは、何やら色々な器具を身体に取り付けられている。&lt;BR&gt;　細い左腕に５つほど取り付けられているのは、リノアもいつもつけているオダインバングルだ。&lt;BR&gt;　首の後ろにも何やらコードのようなものが取り付けられていて、そのためセルフィの髪はふたつに分けて結っていた。&lt;BR&gt;「一応ね～、封印するのは問題なさそうなんだって～。まぁ、ハインって魔女の親分だもんね～」&lt;BR&gt;（……封印……）&lt;BR&gt;　一年前、リノアが封じられそうになった施設を思い浮かべ、スコールは苦い表情になった。&lt;BR&gt;　スコールはセルフィを封印などさせたくない。&lt;BR&gt;「……他の方法ってないのか？　あんたからハインを取り出して、戦うことは無理なのか？」&lt;BR&gt;「ハインがそうしたいって思わなかったら、無理だよ～」&lt;BR&gt;　あっさりとセルフィが首を振る。&lt;BR&gt;「昔、あたしがハインを暴走させちゃった時もそう。ハインがあたしから離れる気がなかったら、教官が何人死んじゃっても、あたしからハインを引き離すことなんてできなかったよ～」&lt;BR&gt;　ハインがほしいのはセルフィの力。&lt;BR&gt;　セルフィが力を使い果たして死んでしまえば、ハインはセルフィの力を手に入れることができなくなる。それがわかっていたから、ハインは大人しくコンピュータ内に封印されたのだ。&lt;BR&gt;「あともうちょ～っと時間あったら可能だったかもしれないけどね～」&lt;BR&gt;　にこにことセルフィは明るく笑って肩をすくめた。&lt;BR&gt;　セルフィは決して、叶わない夢は見ない。&lt;BR&gt;&lt;BR&gt;　――――あの子は自分だけが独占できるものは、自分自身以外にないと思っているの。だからはじめから無謀な望みは抱かない。手をいっぱいに伸ばしたぎりぎりの先にある、実現可能の夢しか見ないの。&lt;BR&gt;&lt;BR&gt;　いつか、エルオーネの言った言葉が耳によみがえった。&lt;BR&gt;&lt;BR&gt;　――――誰かが、あの子が望んだものは手に入れることができると示してあげなくてはいけないんだわ。&lt;BR&gt;&lt;BR&gt;（セルフィの、望んだもの……）&lt;BR&gt;　叶わないと知るから、覚悟という名に隠れて望みのすべてをあきらめて。&lt;BR&gt;「……なぁ」&lt;BR&gt;「な～に？」&lt;BR&gt;「あきらめないんじゃ……なかったのか……？」&lt;BR&gt;「え？」&lt;BR&gt;　ぽつりと呟くスコールに、セルフィが翠色の瞳をくるんとまるくして小首をかしげた。&lt;BR&gt;　澄んだ瞳に浮かぶ純然な疑問の色に、言葉をかけたスコールの方が思わず驚いてしまう。&lt;BR&gt;「何言ってんの～？　あたしは全然、なんにもあきらめてなんかないよ～！　夢の中でそう、言ったでしょ～？」&lt;BR&gt;　ぷぅっと頬をふくらませて言い募るセルフィのその様子は、明らかに強がりとかごまかしといったものとはほど遠い。&lt;BR&gt;（なんだ……？）&lt;BR&gt;　それまでエルオーネの言葉やスコール自身が受けた印象から抱いていた『セルフィ』からは、わずかにずれた感じを受ける彼女にスコールは困惑する。&lt;BR&gt;（まさか……）&lt;BR&gt;　澄んだ翠の瞳を見つめながら、スコールは急に胸の奥にわきあがってきたひとつの考えが確信に変わるのを感じた。&lt;BR&gt;（……無自覚……？）&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　そうだ。&lt;BR&gt;　哀しい気持ちを笑顔に押し隠して明るく振る舞うセルフィは、しかし、辛い思いをしている時は無理しているのが周囲にすぐにわかってしまうほど、感情が明け透けな少女だった。&lt;BR&gt;　トラビアガーデンがミサイル攻撃を受けて友人の大半を亡くしたあの時も。&lt;BR&gt;　学園祭のステージが壊れてしまった時も。&lt;BR&gt;　鈍感と自他共に認めるスコールでさえ、セルフィが浮かべている笑顔が無理して作られたものだと感じ取ることができるほどに、セルフィの感情はまっすぐに透けて見えていた。&lt;BR&gt;　辛い状況下で明るく笑っている時のセルフィは、ただ、自分の抱いた辛さを自覚できていないだけ。&lt;BR&gt;　自分を取り巻く環境は辛く哀しいものではないと無意識に思いこんでいるからこそ、その笑顔はどこまでも明るく、周囲のすべてを欺くほどに完成されたものになってしまう。&lt;BR&gt;　眼の前のものすべてを楽しもうとし、また楽しんでしまえる性格なので、よほどのことがなければ辛いとは感じない。&lt;BR&gt;　辛い、哀しい、寂しい――自分の中にある負の感情を意識的に排除することで、自分は幸せだと思いこめる。&lt;BR&gt;　失望することを回避するために、叶う可能性の少ない望みにも気づかないふりをする。&lt;BR&gt;　自覚さえしなければ、セルフィにとってそれは『ない』ことになる……。&lt;BR&gt;　セルフィは自覚してしまった感情を、隠し留めておけるような性質ではない。&lt;BR&gt;　どれほど絶望的な状況でも、セルフィが笑顔でいられたのは、この徹底した『無自覚』によるものだ。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;（あぁ、そうか……）&lt;BR&gt;　不思議そうに見つめくる翠の瞳を真正面から見つめながら、スコールはかすかに苦笑した。&lt;BR&gt;　他人に頼ったり、甘えたりすることがないのも当然だ。&lt;BR&gt;　誰にも頼らず手に入れられること以外、そもそもセルフィは何も望んでいない。&lt;BR&gt;　一年前、他人の荷物を背負うことを何より厭っていたスコールは、セルフィのそんな精神的に依存しない姿勢が好ましく思っていた。自分の荷物は自分で持つ少女だから、誰より傍にいて居心地がよかった。&lt;BR&gt;　けれど今は。&lt;BR&gt;「馬鹿だな……」&lt;BR&gt;　苦く笑いながら、ひどく優しい瞳を向けるスコールに、セルフィがきょとんと首をかしげる。&lt;BR&gt;　スコールはゆっくりと胸の銀鎖をつかみ、ぐいとそれを首から引き抜くと静かに言った。&lt;BR&gt;「そうだな……確かにあんたは、今も何もあきらめちゃいない……」&lt;BR&gt;　ぽかんとしてスコールの動作を見守っているセルフィの手首をつかんで持ち上げ、身をかがめてはずした銀鎖のペンダントを小さな手の中に握らせる。&lt;BR&gt;　どきりと胸を震わせるセルフィの瞳を間近くのぞき込み、スコールは以前リノアが言っていたことを思い出す。&lt;BR&gt;　覚悟を決めることとあきらめることは違うのだと、そう言いきったあの日のリノアを。&lt;BR&gt;「あきらめる以前に、あんたは自分自身について、何も望んでいない。&lt;BR&gt;　あんたが望んでいるのは、ハインを封じて俺たちの命を守り、SeeDとして任務を果たすことだけだ」&lt;BR&gt;　セルフィが沈黙した。&lt;BR&gt;　そう、確かにセルフィは望んだことすべてを今もあきらめてはいない。&lt;BR&gt;　あきらめているように見える事項については、はじめから望みを抱いていないだけ。&lt;BR&gt;「あんたが望まないなら、俺が勝手に望んでやる。俺はあんたをあきらめないし、この先忘れるつもりも毛頭ない」&lt;BR&gt;「え……？」&lt;BR&gt;　ぱちくりと翠の瞳をまたたくセルフィに、スコールは身をかがめたまま片頬をゆるめて小さく笑った。&lt;BR&gt;「今が無理なら、未来がある。ああ見えてオダインは天才だから、あんたからハインを取り出す方法だって思いつくかもしれない。そうしたら、一緒にハインと戦って倒せばすむことだろ」&lt;BR&gt;「え、えっと～……？」&lt;BR&gt;　ぱちぱちとまばたきを繰り返し、セルフィが半笑いの微妙な表情になった。&lt;BR&gt;　本気か冗談か捉えかねているといった様子のセルフィに、スコールも自嘲的な苦笑いを浮かべた。&lt;BR&gt;（何言ってるんだろうな、俺も……）&lt;BR&gt;　だが、それがスコールの望みで、一番譲ることのできないものなのだから仕方がない。&lt;BR&gt;　夢物語と一刀両断されたとしても。&lt;BR&gt;「そんな未来が来るまで、俺は絶対あんたを忘れない。忘れそうになったら、俺も一緒に封印されてやる」&lt;BR&gt;「――――！」&lt;BR&gt;　愕然と眼を見開いたセルフィに、スコールはもう一度笑いかけ、かがめていた身をすいと上げた。&lt;BR&gt;「じゃあ、後で」&lt;BR&gt;　あっさりと言い切り、スコールはセルフィに背を向け、大きなストライドで部屋を出ていった。&lt;BR&gt;　動揺を隠せない翠の瞳でその動きを追い、セルフィは両手をぎゅっと銀鎖ごと胸の前で握りしめた。&lt;BR&gt;（スコールの眼……）&lt;BR&gt;　間近く自分を見つめた、スコールの瞳。熱をはらんだあの瞳を、セルフィは知っていた。&lt;BR&gt;　いつだってリノアに注がれていた、熱い眼差し。宇宙に行った時も、帰ってきた後も、ずっと印象に残っていた瞳が、間違いなくセルフィだけに向けられていた。&lt;BR&gt;（なんで……？）&lt;BR&gt;　開いた扉の向こうにいるだろうリノアを思い、セルフィの胸がずきりと痛んだ。&lt;BR&gt;　リノアとの別れを知らないセルフィにとって、スコールの言葉は何もかも意味不明のものばかりだ。&lt;BR&gt;（うそつき）&lt;BR&gt;　これから死に等しい状態に置かれる自分に対する同情だとでも言うのだろうか。&lt;BR&gt;（うそつき、うそつき、うそつき……！）&lt;BR&gt;　成就など望んだことのない恋だった。自覚する前からあきらめたはずの恋だった。&lt;BR&gt;　スコールの言葉をかけらほども信じていないはずなのに、嘘つきとなじる自分が確かにいるのに、心のどこかであの言葉を喜んでいる自分がいる。それがセルフィには許せない。&lt;BR&gt;「……っ」&lt;BR&gt;　胸の前で握りしめた手を、セルフィは口元に持ってきてぎゅっと押しつけた。奥歯を強く噛みしめ、全身の力をこめて、溢れそうになる涙をこらえた。&lt;BR&gt;　期待などしない。叶わない夢は初めから見ない。どれほど言い聞かせても、胸の痛みは無視することができないほど強くなる。こんな感覚を、セルフィは今まで知らなかった。&lt;BR&gt;（……だめや……！）&lt;BR&gt;　きゅっと眉根を強く寄せ、奥歯がすり減るくらいに強く食いしばり、懸命に涙が流れないように身体を固くする。&lt;BR&gt;　それは小さな頃からの癖。涙が決してこぼれないように、泣きそうな時はいつだってこうしてやりすごした。&lt;BR&gt;　――――泣いてたら、強くなれない……&lt;BR&gt;　泣いていてもどうにもならない。事態は解決せず、甘えた心が残るだけ。強い自分を作れない。&lt;BR&gt;　だからセルフィは泣いてはいけない。泣かないことを、幼いあの日約束したのだから。&lt;BR&gt;　泣かずに強い大人になると、約束し合ったのだから――&lt;BR&gt;（……忘れてたくせに……）&lt;BR&gt;　くすりと、唇の端に自嘲的な笑みがこぼれた。&lt;BR&gt;　幼い約束のすべてを忘れても、誓いだけはセルフィの中にしっかりと根付いている。&lt;BR&gt;　この先も決して果たされない約束。それなのに今もこうして、あの日の誓いがセルフィを縛っている。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　オダイン研究室を出たスコールは、そのまままっすぐに大統領室に戻っていた。&lt;BR&gt;　いつも部屋の前に立っている秘書官の姿はなく、かわりにエスタ兵が２名立っていた。&lt;BR&gt;　すでに顔パスになっているスコールは、難なく部屋の中に足を踏み入れる。&lt;BR&gt;「……よう」&lt;BR&gt;　スコールが部屋に入って行くと、行儀悪く机に腰を下ろしていたラグナが小さく笑った。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　扉が開いた。&lt;BR&gt;　驚いてセルフィは顔を上げる。またスコールが戻って来たのかと一瞬思ったが、開いた扉の向こうに見えるシルエットはスコールのものよりずっと長身だった。&lt;BR&gt;「ひさしぶり」&lt;BR&gt;　にっと人好きのする笑顔を浮かべ、アーヴァインが優しく囁く。&lt;BR&gt;「アービン」&lt;BR&gt;　懐かしい姿を改めて見つめ、いつも通りの笑顔でセルフィは頷いた。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　アーヴァインの後ろから、リノアも続けて入ってきた。&lt;BR&gt;　握りしめたままの銀鎖のペンダントを見ても、二人は何も言わなかった。&lt;BR&gt;　アーヴァインは何を考えているのかよくわからない笑顔のまま、部屋に入りセルフィの前に立つ。&lt;BR&gt;　高い位置から見下ろされ、セルフィはくすくすと笑った。&lt;BR&gt;「いつもより首が疲れるよ～」&lt;BR&gt;「あぁ、ごめんごめん」&lt;BR&gt;　くすっと苦笑し、アーヴァインは長いコートの裾をさばくようにしてセルフィの隣に腰掛けた。&lt;BR&gt;「リノアも、ひさしぶり～」&lt;BR&gt;　扉の前に立ったままのリノアに、セルフィは内心ほんの少し困りながらもにこにこと笑顔を向けた。&lt;BR&gt;「……うん、ひさしぶり」&lt;BR&gt;　メールのやり取りはわりと頻繁だったが、見栄もあってスコールとのことは一切書かなかったし、ガルバディアに戻ったことも言い出せなかったリノアは、ばつの悪い顔でこくりと頷いた。&lt;BR&gt;「ママ先生もサイファー達も、隣の部屋にいるよ。でもその前に、僕たちはセフィと話がしたかったんだ～」&lt;BR&gt;「話？」&lt;BR&gt;　小首をかしげるセルフィに、アーヴァインは薄く微笑んで静かに言った。&lt;BR&gt;「セフィ、本当にこれでいいのかい？」&lt;BR&gt;「これでいいって？」&lt;BR&gt;「このまま、封印されてもかまわないかってことだよ」&lt;BR&gt;　セルフィはにっこりと笑った。&lt;BR&gt;「心配してくれてるの～？　あたしは全然大丈夫だよ～」&lt;BR&gt;　常と変わらない笑顔を見せるセルフィに、アーヴァインがかすかに苦い笑いを浮かべた。&lt;BR&gt;「……スコールのことはいいの？」&lt;BR&gt;　視線を落として囁くようにたずねた。&lt;BR&gt;　伏せられたアーヴァインの瞳が見ているもの、銀鎖を握る手に力をこめてしまいながら、セルフィは反射的にリノアを振り向いてしまっていた。&lt;BR&gt;　勝ち気なリノアの黒い瞳は、ただ静かにセルフィを見つめている。&lt;BR&gt;　その瞳を眼にしたとたん、セルフィの胸がどきりと跳ねた。&lt;BR&gt;　いつになく狼狽した表情で、セルフィはおたおたと口を開く。&lt;BR&gt;「なに言ってんの～？　スコールは全然関係ないよ～！」&lt;BR&gt;　自覚していない頃は必要のなかった偽りを口にしながら、セルフィは強引に笑顔を作る。&lt;BR&gt;「えへへ、リノアもそ～んな、真剣な顔しなくたって大丈夫だよ～！　スコールは単に、心配してくれてるだけなんだから！　ね？」&lt;BR&gt;　先ほどスコールにキスしてしまったり、それ以前もセルフィの行方を懸命に捜してもらったりと、確かにリノアにとっては面白くないことが続いていたはずだ。&lt;BR&gt;　これから封印されて死ぬも同然の状態になる女であっても、事の真偽を問いただしておきたいと思っても無理はない。そう解釈し、安心させようと笑うセルフィに、リノアがわずかに眼を見はった。&lt;BR&gt;「セルフィ、何も知らないの？」&lt;BR&gt;　当たり前のようにスコールとリノアが恋人同士であると信じ切っているセルフィに、リノアは驚いてそう問いかけ、それからはたとセルフィが今日ようやく宇宙から帰還してきたのだと気がついた。&lt;BR&gt;　スコールと変わらず仲良くやっているようなリノアからのメールを読んでいたセルフィだ。自分が宇宙で眠っている間に、二人の恋が静かに終わったなどとどうして考えつくだろう。&lt;BR&gt;　言葉足らずのスコールからの具体的説明も一切なかったのだから、誤解を抱いて当然だ。&lt;BR&gt;　どこまで不器用なのだろうかと呆れて嘆息し、リノアはやれやれと首を振った。&lt;BR&gt;「あのねセルフィ。わたしはもう、スコールの恋人じゃないの」&lt;BR&gt;（なんでわたしの口から言わせるかなぁ……）&lt;BR&gt;　お人好しもいいところだ。これがセルフィでなければ、死んでも言ってやる気にはならなかったのだが。&lt;BR&gt;「は？」&lt;BR&gt;　きょとんと翠の眼をまるくしているセルフィには一片の邪気もない。リノアはくすりと笑った。&lt;BR&gt;「詳しい話は、スコールから聞いてね」&lt;BR&gt;　リノアの口から説明するよりも、きっとセルフィはスコールの口から聞きたいだろう。&lt;BR&gt;　考えて、リノアはそれ以上の明言を避け、セルフィに歩み寄りながら言葉を続けた。&lt;BR&gt;「わたし……セルフィの気持ち、多分少しわかるんだ」&lt;BR&gt;　ゆっくりと歩み寄ってくるリノアを、セルフィが動揺冷めやらぬ表情で呆然と見つめている。&lt;BR&gt;「一年前、わたしもね、ものすごく覚悟して、あの施設行ったよ」&lt;BR&gt;　立ち止まり、リノアは手を伸ばしてセルフィが握りしめている銀鎖に触れた。&lt;BR&gt;　驚いた表情のセルフィが手を開き、リノアはそこから銀鎖のペンダントを取り上げた。&lt;BR&gt;（一年前――）&lt;BR&gt;　魔女になってしまったあの時。&lt;BR&gt;　嫌われる前に、恐れられてしまう前にと、リノアは封印施設に入ると決めた。&lt;BR&gt;　あの時の覚悟は本当の本気だった。スコールが助けに来てくれた瞬間吹き飛んでしまったが、それでも、リノアは確かに封印されてもいいと覚悟を決めていた。&lt;BR&gt;「だからわかるんだ。セルフィが覚悟を決めた気持ちも……それから、心のどこかで、期待する気持ちがあるってことも」&lt;BR&gt;　見上げるセルフィの首に銀鎖をかけてやり、留め具の位置を調整しながらリノアはちょっと笑った。&lt;BR&gt;「違う？」&lt;BR&gt;　訊ねたリノアに、セルフィは視線を伏せて小さく首を振る。&lt;BR&gt;「……よくわかんない」&lt;BR&gt;　自分の気持ちをコントロールすることに慣れすぎて、無意識下で何を自分が望んでいるかなんてわからない。&lt;BR&gt;　常に明るく天真爛漫であることを自身に課しているセルフィに、リノアは小さく吐息をつき、前屈みになってセルフィの瞳をのぞきこんだ。&lt;BR&gt;「ねぇ、SeeDって、そんなに大事？」&lt;BR&gt;「ん？」&lt;BR&gt;「わたしは……SeeDより、今セルフィが生きてる方が大事だよ……」&lt;BR&gt;　こうして、眼の前で言葉を交わして、触れ合って。&lt;BR&gt;　たとえスコールの存在を間に挟んでいたとしても、リノアにとってセルフィは大切な友人なのだ。&lt;BR&gt;「あのさ」&lt;BR&gt;　静かにリノアとセルフィの会話を聞いていたアーヴァインがゆっくりと口を開く。&lt;BR&gt;「スコールが封印させないって言っても、セフィの気持ちは変わらない？」&lt;BR&gt;　訊ねられ、視線をアーヴァインに向け、リノアに戻し、セルフィは泣き出しそうな切ない瞳で、それでも小さく笑った。&lt;BR&gt;「うん。ごめんね」&lt;BR&gt;　先ほど部屋を出ていったスコールの言葉、他愛のない夢物語が胸によみがえる。&lt;BR&gt;（本気やったん……？）&lt;BR&gt;　リノアとの恋が、もし本当に終わってしまっているのだとしたら。&lt;BR&gt;　あの瞳に宿る熱が、本当にセルフィに向けられていたのだとしたら。&lt;BR&gt;（アホやなぁ……）&lt;BR&gt;　明確にその言葉を口にできなかった理由があるとすれば、それは自分だとセルフィはわかっていた。&lt;BR&gt;　あくまでもSeeDにこだわる、自分を知っているから――。&lt;BR&gt;「ごめんね。あたしは、戦うことしかやっぱり、できないから」&lt;BR&gt;　戦うことでしか、自分も仲間も守れない。&lt;BR&gt;　仲間を、大好きなスコールを、そして自分の誇りを。セルフィは自分の力で、守りたいのだ。&lt;BR&gt;「リノア、前に言ってたよね。戦わなくちゃだめなのかな、戦わずにすむ方法ってあるのかなって」&lt;BR&gt;「……？　うん……」&lt;BR&gt;　唐突に話題を変えたセルフィに、わずかに戸惑いながらリノアが頷く。&lt;BR&gt;　セルフィはにこりと笑顔を向けた。今度はいつも通りに笑うことができた。&lt;BR&gt;「あたし、あれからず～っと考えてたよ。いっぱい考えたよ。&lt;BR&gt;　でもだめだってわかったんだ。この世界には、神様がいないから」&lt;BR&gt;　神様はいない。&lt;BR&gt;　おとぎ話に語られるハインですら、神などではないことを、セルフィは誰よりも良く知っている。&lt;BR&gt;「神様ってさ、きっと、すご～く強くって、力で対抗しようとする相手を傷つけずに退けることができて、それで誰の味方もしないような、そういう存在のことを言うと思うんだ～。&lt;BR&gt;　そういう神様がね、だ～れの味方もしないで、いっつもみんなの中立で、戦いが起こったらうりゃ～！って止めに入ってくれて世界を監視してくれてるんなら、戦いなんて起きないと思うんだよ～。&lt;BR&gt;　あたしたちは……人間は、ちょっとの力しか持ってないから、力に対抗しようとすると相手を傷つけちゃう。ちょっとの力しかないから、精一杯がんばっても自分と、ほんのちょっとの好きな人達しか守れないし、気持ちはどうすることもできないから、中立でなんかもいられないよね～」&lt;BR&gt;　常に中立で誰の味方もせず、すべての攻撃を受け止めるだけの強大な力を持ち、なおかつそれを他人に向けて行使せず、人と人とが話し合いで解決できるように見守る『神』のような存在がいれば、戦いは起こらない。&lt;BR&gt;「でも、そんなの、人間じゃないよね。たとえ力を手に入れたって、人間にそんなことできないよね。&lt;BR&gt;　自分の意見はちゃんと言いたいし、好きな人がいたら知らない人より、好きな人の味方をしたいもん」&lt;BR&gt;　世界中の見知らぬ命たちを公平に愛する、神のような心を持った人間などいない。&lt;BR&gt;　自分と、特別な誰かと。人が愛することができるのは、そこまでだ。&lt;BR&gt;　人ではなく、強大な力を持つハインだって、心がある以上は『神』にはなれない。&lt;BR&gt;「だからね～、戦わずにすむ方法なんてどこにもないの。夢物語なの。&lt;BR&gt;　心がある者同士が、おんなじ世界で生きていくんなら、ど～しても争い合わずにいられないんだよ。&lt;BR&gt;　中途半端な力で傷つけ合って、バカみたいだけど、それでも一生懸命戦って、大事なものを守りたいんだ～」&lt;BR&gt;　もちろん、それは武器を持って戦うだけではなくて。&lt;BR&gt;　セルフィを守るために意識を閉ざして眠るエルオーネも、スコール達を支援し環境を整えるために懸命なラグナ達も、今こうしてセルフィを心配してくれるリノアとアーヴァインも、それぞれに戦っている。&lt;BR&gt;　自分と、自分の生きる場所と、自分の大切な人を守るために。&lt;BR&gt;「ハインはね～、ハインなりの理由があって戦ってる。あたしは、そのハインの理由を知ってて、受け入れられないってわかってるから、ハインと戦うって決めて、今こうやって戦っているんだよ～。&lt;BR&gt;　わかりやすい悪なんて、戦いには存在しないんだよね。ただ、立ってる足下の『正義』が、お互いちょっとずつ違うってだけで……だから、どっちかが勝ってどっちかが負けるまで、戦いは終わったりしないんだよね～」&lt;BR&gt;　お互い決して譲れないものがあるからこその、戦い。&lt;BR&gt;　譲歩することはあり得ないのだと断言し、セルフィはぐっと顔を上げた。&lt;BR&gt;「だから、ごめんね」&lt;BR&gt;　にっこりと強く笑ってセルフィが言い切った。&lt;BR&gt;　好きな人を、友達を、親と慕った人を――セルフィは絶対に、死なせたくない。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;「――あれ？」&lt;BR&gt;　ふいに、アーヴァインが何か気配を感じて顔を上げた。&lt;BR&gt;　同時にセルフィも眉をひそめ、素早くSeeDの表情になって扉に鋭い視線を向ける。&lt;BR&gt;「なに？」&lt;BR&gt;　わからないのはリノアだけだ。きょとんとしている彼女を後目に、セルフィが素早く立ち上がり、扉に向かって走った。&lt;BR&gt;「あ、ま、待ってセフィ、僕が行くから……！」&lt;BR&gt;　慌ててアーヴァインも立ち上がる。セルフィの前でシュンと音を立てて扉が開いた。&lt;BR&gt;「ね～、どうかした～？」&lt;BR&gt;　言いながら隣室をのぞきこみ一歩踏み出したセルフィに、怒号のような声が飛んだ。&lt;BR&gt;「馬鹿野郎、部屋に戻れっ！！」&lt;BR&gt;　遠慮会釈ない怒鳴り声をあげながらサイファーはセルフィに駆け寄り、驚いている彼女を思い切り突き飛ばした。&lt;BR&gt;　不意を突かれて部屋の中に倒れ込んだセルフィをアーヴァインが慌てて受け止め、一緒になって床に尻餅をつく。&lt;BR&gt;　瞬間、研究室内に炸裂した蒼い光に、セルフィとアーヴァイン、リノアの三人は驚愕し、とっさに顔を腕で庇った。&lt;BR&gt;「サイファー！！」&lt;BR&gt;　炸裂した光の直撃を受けて跳ね飛ばされるサイファーの姿に、セルフィが悲鳴を上げた。&lt;BR&gt;　夢中で身を起こし助けに行こうとする細い身体を、アーヴァインが必死に抱きとめる。&lt;BR&gt;「セフィ、ダメだよ！　セフィの中にはハインがいるんだろ！？」&lt;BR&gt;「……！」&lt;BR&gt;　ぎくりと身をこわばらせ、セルフィが動きを止めた。&lt;BR&gt;　あの蒼い光は、たしかによく見知ったものだった。&lt;BR&gt;（……まだ、ハインが外におる……？）&lt;BR&gt;　唇を噛みしめながら、セルフィは懸命に考える。&lt;BR&gt;　自分そっくりの姿をしたハインと、青い鳥の姿をしたハイン。まったく同一の『ハイン』という精神を宿しながら、それぞれ個体として姿を保つことの可能な存在。&lt;BR&gt;　おとぎ話にあるように、肉体を引き裂き魔法力のみとなって世界にたゆたうハインは、Ｇ．Ｆ．と同じ、意志を持った自律エネルギー体だ。物理的な肉体を持たないエネルギー体だから、確かにばらばらに散らばっていてもおかしくはない。&lt;BR&gt;（あたしの中に閉じこめたんで、全部や思とったのに……！）&lt;BR&gt;　内側にいるハインだけだって、相当な質量だ。今だって、懸命に集中して抑えているのがやっとだというのに、これ以上のエネルギーをもって『ハイン』が入り込んできたら……！&lt;BR&gt;「博士っ！」&lt;BR&gt;　蒼い光が充満する部屋に向かい、セルフィが悲鳴のような声でオダインを呼んだ。&lt;BR&gt;　部屋にいるのが本当にハインであるなら、魔女の力に精通しているオダインが一番危ない……！&lt;BR&gt;「アービン、どうしよう！？」&lt;BR&gt;　光の量が多すぎて、部屋の中にいた者がどうなっているのかがまったくわからない。&lt;BR&gt;　弾き飛ばされて行ったサイファーの姿すら、セルフィの眼には映らない。見えるのはただただ蒼い光ばかり。&lt;BR&gt;　焦れて叫ぶセルフィを抱きしめたまま、アーヴァインは懸命に光の中眼をこらす。&lt;BR&gt;「…………！」&lt;BR&gt;　びくりと震えてセルフィを抱く腕に力がこもった。&lt;BR&gt;　驚いてセルフィはアーヴァインを見上げ、その視線をたどって蒼い光の中を見る。&lt;BR&gt;　光の中、立ちつくす姿を眼に止めて、さらなる驚愕にセルフィは言葉を失った。&lt;BR&gt;「…………」&lt;BR&gt;　ゆっくりと、蒼い光の中たたずむ女性がセルフィ達に顔を向けた。&lt;BR&gt;　薄い夜着を身にまとい、冷たい床の上に裸足のままで立っている。&lt;BR&gt;　清楚な美貌は生気がなく、耳の下で切りそろえた艶やかな黒髪も乱れている。&lt;BR&gt;　うつろな無表情の中、栗色を蒼に染めた瞳だけが光を宿し、ひたとセルフィに視線を向けた。&lt;BR&gt;（……お、ねえ……ちゃ……）&lt;BR&gt;　そして蒼い光が空間を満たし。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;「――――！！」&lt;BR&gt;　声にならないセルフィの悲鳴が空間を引き裂いた。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;&lt;/SPAN&gt;

<script data-viewer-zoom-script>
(() => {
  const stage = document.querySelector('.viewer-stage-image');
  const image = stage ? stage.querySelector('.viewer-image') : null;
  if (!stage || !image) {
    return;
  }

  const setZoom = (enabled) => {
    stage.classList.toggle('is-zoomed', enabled);
    image.setAttribute('aria-pressed', enabled ? 'true' : 'false');
    if (enabled) {
      const naturalWidth = image.naturalWidth || image.clientWidth || 0;
      const targetWidth = naturalWidth > 0
        ? Math.max(naturalWidth, Math.min(Math.round(stage.clientWidth * 0.92), naturalWidth * 4))
        : Math.round(stage.clientWidth * 0.92);
      image.style.width = `${targetWidth}px`;
      image.style.maxWidth = 'none';
      image.style.maxHeight = 'none';
      requestAnimationFrame(() => {
        stage.scrollTop = 0;
        stage.scrollLeft = Math.max(0, Math.round((image.scrollWidth - stage.clientWidth) / 2));
      });
    } else {
      image.style.removeProperty('width');
      image.style.removeProperty('max-width');
      image.style.removeProperty('max-height');
      stage.scrollTop = 0;
      stage.scrollLeft = 0;
    }
  };

  const toggleZoom = () => {
    setZoom(!stage.classList.contains('is-zoomed'));
  };

  image.setAttribute('tabindex', '0');
  image.setAttribute('role', 'button');
  image.setAttribute('aria-label', '逕ｻ蜒上ｒ諡｡螟ｧ縺ｾ縺溘・邵ｮ蟆・);
  image.setAttribute('aria-pressed', 'false');

  image.addEventListener('click', toggleZoom);
  image.addEventListener('keydown', (event) => {
    if (event.key === 'Enter' || event.key === ' ') {
      event.preventDefault();
      toggleZoom();
    }
  });

  stage.addEventListener('click', (event) => {
    if (event.target === stage && stage.classList.contains('is-zoomed')) {
      setZoom(false);
    }
  });

  window.addEventListener('keydown', (event) => {
    if (event.key === 'Escape' && stage.classList.contains('is-zoomed')) {
      setZoom(false);
    }
  });
})();
</script>
