      width=537&gt;&lt;SPAN&gt;&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;「スコール君、ＳｅｅＤのスコール君。至急学園長室まで来なさい」&lt;BR&gt;　穏やかなシドの声が、バラムガーデン内に響き渡る。&lt;BR&gt;　それを耳にし、スコールは足を止めると、先に立つゼルの背中に声をかけた。&lt;BR&gt;「ゼル、すまない」&lt;BR&gt;　呼びかけられ、ゼルもまた足を止め、スコールを振り返り明るく笑った。&lt;BR&gt;「いいってことよ、気にすんなって。ちょっと残念だけどな」&lt;BR&gt;　明日からはまた任務でガーデンを空けることになるゼルは、そう言って小さく肩をすくめた。&lt;BR&gt;「でも、何だろうな？　また任務かな」&lt;BR&gt;「……さあな」&lt;BR&gt;　興味なさそうにスコールは息をつき、ゆっくりと体の向きを変えた。&lt;BR&gt;「話がすぐ終わるようなら、後から行く。でも長引くようなら、好きに引き上げてくれ。明日は早いだろ」&lt;BR&gt;「わかった」&lt;BR&gt;　頷いて、ゼルはそのまま訓練施設に向かいかけ――そのまま足を止めてスコールを振り返った。&lt;BR&gt;「なぁ」&lt;BR&gt;　肩ごしにゼルを見たスコールの視線を受けとめ、わずかに表情を曇らせて言葉を続けた。&lt;BR&gt;「……もし長期の任務とかだったら、おまえ、どうするんだよ」&lt;BR&gt;「…………」&lt;BR&gt;　冷ややかな沈黙が、二人の間に重く降りた。&lt;BR&gt;　しばしそうして視線を結び合わせ、はじめに口を開いたのはゼルの方だった。&lt;BR&gt;「いいのかよ、中途半端のままで」&lt;BR&gt;「……俺には」&lt;BR&gt;　ゆるく首を振って、スコールはゼルの言葉を遮った。&lt;BR&gt;「どうすることもできないんだ。答えを出すのは、多分俺じゃない」&lt;BR&gt;　わずかに寄せられた眉根が辛そうで、ゼルはそれ以上何も言えずに沈黙する。&lt;BR&gt;　スコールはそんなゼルに、最近ようやく少しずつ見せるようになった微笑を向け、静かに言った。&lt;BR&gt;「心配をかけて、すまない」&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　アルティミシアを倒し世界が救われてから、一年が過ぎていた。&lt;BR&gt;　森のフクロウとの契約は、ティンバーがガルバディアから魔女による混乱に乗じて独立を果たした時点で終了となり、スコール達はガーデン生活に戻り、ＳｅｅＤとして任務に追われる日々となった。&lt;BR&gt;　一連の魔女騒動において、イデア・アデル・アルティミシアといった３人もの魔女を倒して世界を救ったスコールは『伝説のＳｅｅＤ』などという大層な呼び名をつけられており、森のフクロウとの契約終了後、指名で任務依頼が殺到するという事態になり、生活は超多忙を極めることになった。&lt;BR&gt;　もっとも、ＳｅｅＤは特殊任務を請け負うことも多く、あまり有名人になってしまうのは好ましくない。そんな事情で『伝説のＳｅｅＤ』の名前は極秘事項、ひとりなのか複数なのかも明かされず、当然顔も知られていないので、依頼主も数名派遣されたＳｅｅＤのどれが『伝説のＳｅｅＤ』なのかはわからないような配慮がなされており、忙しい以外はプライベートを侵害されることもなく、平和な日常が続いていた。&lt;BR&gt;　セルフィは森のフクロウ契約終了後、ＳｅｅＤとしてしばらくスコール同様世界各国を飛び回っていたのだが、トラビアガーデンの復興支援に長期レンタルされることが決定し、現在バラムガーデンにその姿はない。学園祭実行委員長なので、時折メールで進行状況の確認やら作業の指示やらがスコールの元に届いているが、多忙なので手をつける余裕がなく、しかも実行委員は今のところスコールしかいないという頭の痛い事態になっていた。――恐ろしくて、セルフィ本人にはその事実を告げていない。&lt;BR&gt;　バラムガーデンでは、シド学園長によりノーグがマスターの座を追放され、代わりにガーデンの資金面での運営を引き受けたのが、なんとエスタ大統領のラグナだった。&lt;BR&gt;　そのエスタも、月の涙により壊滅的ダメージを受けたものの、ラグナの絶大なカリスマ性によって、どうにか内乱も起こさず徐々に平穏を取り戻しつつある。&lt;BR&gt;　ガルバディアに戻ったアーヴァインは、ＳｅｅＤを目指して勉強に追われているようだ。ガーデンの方も、生徒も大分戻り平常通りの運営になったらしい。&lt;BR&gt;　そして。&lt;BR&gt;「…………」&lt;BR&gt;　いろいろなことを考えているうちに、スコールは学園長室へとたどりついていた。&lt;BR&gt;　とりあえず考え事を一時中断し、スコールは改装のすんだ学園長室の扉をノックした。&lt;BR&gt;「スコール・レオンハートです」&lt;BR&gt;「入りなさい」&lt;BR&gt;　扉の向こうでシドの声がし、スコールは中へと踏み込んで、そこに立つ意外な人物に眼をまるくした。&lt;BR&gt;「あ、スコール～」&lt;BR&gt;　ぱっとまぶしく笑った少女は、ＳｅｅＤの制服を着たセルフィだった。&lt;BR&gt;　トラビアにいるはずの彼女がなぜここにいるのかわからず、反応できずにいるスコールに、学園長席に座るシドが穏やかに笑いかけた。&lt;BR&gt;「揃いましたね、スコール、セルフィ。新しい任務です」&lt;BR&gt;　スコールは驚き、セルフィもまたきょとんとしてシドを見た。&lt;BR&gt;「え？　え？　じゃあ、今のあたしの任務は～？」&lt;BR&gt;「トラビアには、別のＳｅｅＤを二名、派遣します。あなた方には、新たな任務について頂きたいのです」&lt;BR&gt;　スコールは表情を改めると、セルフィの隣まで足を運び、姿勢を正した。&lt;BR&gt;　セルフィも神妙な面持ちになり、ぴんと背筋をのばす。&lt;BR&gt;　シドはそんな二人を見、満足そうに微笑むと、静かに口を開いた。&lt;BR&gt;「あなた方二人には、明日より、エスタ大統領の身辺警護についていただきます」&lt;BR&gt;　セルフィの横で、スコールがぴりっと緊張した。&lt;BR&gt;　エスタ大統領ラグナ・レウァールは、現在のバラムガーデンのマスターであり、スコールの実の父親なのである。&lt;BR&gt;　セルフィは大きな瞳で一瞬ちらりとスコールを見、それからシドへと視線を戻した。&lt;BR&gt;「でも、エスタにはもうＳｅｅＤが派遣されてましたよね～？」&lt;BR&gt;　治安維持のための応援要員が何名かエスタに行っていることを、ラグナによく懐いてエスタにも足しげく通っているセルフィは知っている。&lt;BR&gt;　なぜ、わざわざトラビアから呼び戻してまで自分を派遣する必要があるのか、その意図がわからない。&lt;BR&gt;　シドはセルフィの言葉に静かに頷いた。&lt;BR&gt;「ええ、確かに大統領の周りには、ＳｅｅＤが四名、警護に当たっていました。&lt;BR&gt;　ですが、先日、そのＳｅｅＤ達が殺害される事件が起こったのです」&lt;BR&gt;　セルフィは驚愕し、大きく目を見開いた。&lt;BR&gt;「それで、ラグナ様は！？」&lt;BR&gt;「傍にいたエルオーネを庇って負傷はしましたが、命に別状はありません。殺害されたＳｅｅＤは三名。一名は重傷です。&lt;BR&gt;　エルオーネの話では、強力なＧ．Ｆ．が突如襲いかかってきたそうですが、その使い手までは不明です」&lt;BR&gt;　バラムガーデンが誇る精鋭部隊・ＳｅｅＤを三名も倒すことのできるＧ．Ｆ．の使い手。&lt;BR&gt;　事の重大さに、さすがのスコールとセルフィも厳しい表情で黙り込んだ。&lt;BR&gt;「そのＧ．Ｆ．は大統領と、エルオーネをも狙っていたということです。&lt;BR&gt;　あなた方は大統領、エルオーネの二人と面識がありますし、実力もずば抜けたＳｅｅＤです。&lt;BR&gt;　キスティス、ゼルには今、それぞれに任務が入り、すぐには動かせません。&lt;BR&gt;　サポートには白いＳｅｅＤ達がついてくれることになっています。&lt;BR&gt;　大統領とエルオーネの身辺警護及び暗殺者の割り出しと身柄拘束。&lt;BR&gt;　これが今回の任務です。引き受けてくれますね？」&lt;BR&gt;「りょ～かいっ！」&lt;BR&gt;　即座に敬礼したのはセルフィだった。&lt;BR&gt;　一拍遅れて、スコールも敬礼する。&lt;BR&gt;「了解」&lt;BR&gt;　ラグナについては未だこだわりもあるが、その命が危険とあれば見過ごすことなどできない。&lt;BR&gt;　まして、スコールの最愛の『姉』、エルオーネも危険にさらされているならなおさらだ。&lt;BR&gt;「よろしい。それでは、作戦を説明しましょう。&lt;BR&gt;　あなた方は明日より、ガーデンの一般生としてエスタに入ってもらいます。決してＳｅｅＤであると、身分を明かしてはなりません。&lt;BR&gt;　敵には、ＳｅｅＤとして大統領についているのは白いＳｅｅＤ達のみであると思わせるのです。&lt;BR&gt;　あなた方は、ＳｅｅＤ候補生としてついてもらうことになります。&lt;BR&gt;　白いＳｅｅＤ達はすでにエスタに入っています。&lt;BR&gt;　あなた方は、ラグナロクではなく、Ｆ・Ｈからエスタ入りしていただくことになります。&lt;BR&gt;　エスタに入った後は、基本的には大統領の指示に従って動きなさい。&lt;BR&gt;　襲撃時の状況からして、敵は外部の者である可能性が高いと思われますから、あなた方の顔を知っていることはないでしょうが、油断はしないように」&lt;BR&gt;「つまり～、あたしたちは一番弱い囮のフリして、本当の囮は白いＳｅｅＤさんたち……」&lt;BR&gt;「そういうことです。もちろん、襲撃があった場合は依頼主の安全確保が優先です。ガーデン生ではないからと言って、彼らに対し気を使う必要はまったくありません。彼らもＳｅｅＤなのですから」&lt;BR&gt;「りょ～かい」&lt;BR&gt;「了解」&lt;BR&gt;　頷いた二人に、シドはかすかに表情を優しくした。&lt;BR&gt;「それから、明日からリノアには我々の保護下に入っていただきます」&lt;BR&gt;「どうして～？　リノアも襲われちゃったの～？」&lt;BR&gt;　セルフィは首をかしげてスコールを見上げたが、スコールは冷ややかな無表情のままセルフィを見ようともしなかった。&lt;BR&gt;「いいえ、違いますよ、セルフィ。これはいわば、事前防止策です｣&lt;BR&gt;　代わりに答えたのはシドだった。&lt;BR&gt;「リノアは、現在この世界で確認されている唯一の魔女ですからね。エルオーネが狙われていることもありますから、万が一のことを考えて、ガーデンにしばらく来てもらうことになりました｣&lt;BR&gt;「あれ～？　じゃ今、リノアってここにいないの～？」&lt;BR&gt;　てっきりスコールの傍にいると思いこんでいたセルフィは再度スコールを見上げたが、その鉄壁のポーカーフェイスは揺らぎもしなかった。&lt;BR&gt;「彼女は今、デリングシティに帰っていますよ。森のフクロウも解散しましたし、一度ゆっくりとお父上と話をするつもりだと言っていました｣&lt;BR&gt;「ああ、そっか～……」&lt;BR&gt;　なぜだか非常に親子仲の悪かったリノア達のことを思い出し、セルフィは納得した。&lt;BR&gt;「ですから、リノアのことは心配ありません。確実に任務を果たしてください。&lt;BR&gt;　それから、Ｇ．Ｆ．ですが、身体の負担もありますから、なるべくジャンクションは控えること。これは以前に通達した通りです。&lt;BR&gt;　ですが、今回は相手が特殊ですから、そうも言ってられない場合もあるでしょう。&lt;BR&gt;　スコールをリーダーに指名します。ジャンクションが必要かどうか、現場の状況に応じて君が判断しなさい。セルフィはそれに従うこと。&lt;BR&gt;　Ｇ．Ｆ．はシュウから支給させますから、必ず彼女に会っていきなさい｣&lt;BR&gt;「了解」&lt;BR&gt;「りょ～かい」&lt;BR&gt;　シドは微笑して、ゆっくりと二人の顔を交互に見た。&lt;BR&gt;「またあなた方に会えることを祈っていますよ」&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　学園長室を出ると、セルフィは大きく伸びをして息をついた。&lt;BR&gt;「あーあ、もう大変なことになっちゃったね～」&lt;BR&gt;　スコールは何も言わず、エレベーターのスイッチを押した。&lt;BR&gt;「強力なＧ．Ｆ．か～。何が目的なんだろ。どうせならエスタの国力落ちてた時にすればいいのにね～？」&lt;BR&gt;「エルオーネも狙われてるんだ。エスタが目的ではないんだろ」&lt;BR&gt;　エレベーターに乗り込み、そっけなくスコールが答える。&lt;BR&gt;　セルフィも続いて乗り込みながら、スコールをのぞきこんだ。&lt;BR&gt;「スコール、ご機嫌ななめだねぇ？」&lt;BR&gt;「……」&lt;BR&gt;「リノアとなんかあった～？」&lt;BR&gt;「……」&lt;BR&gt;「う～ん。それともラグナ様のことかな～？」&lt;BR&gt;「……」&lt;BR&gt;「でもちょっと、心配だよね～。怪我しちゃったなんて……。おねえちゃんはだいじょぶだったのかな」&lt;BR&gt;「…………ラグナが庇ったんだから、無事だったんだろ」&lt;BR&gt;「そっかあ、そうだよね～。あ、着いたよスコール」&lt;BR&gt;　自分の質問の大半を無視されたことには一向に気にとめず、セルフィは開いたドアから身軽い動作で外に出てスコールを振り返った。&lt;BR&gt;「そーいえば、シュウ先輩のとこ行けって言ってたよね～？　あたし、まだごはん食べてないんだ。スコール行ってきてくれる～？」&lt;BR&gt;　スコールは素直に頷き、それからゆっくりとまばたきをした。&lt;BR&gt;「まだ食べてないのか？」&lt;BR&gt;　食堂はすでに営業終了の夜中である。セルフィは苦笑して肩をすくめた。&lt;BR&gt;「いきなりメールで呼ばれて、慌ててラグナロクでこっちに着いたばかりなんだ～。学園長が一応食堂のおばさんに話つけてくれてるから、これから食べに行くの～」&lt;BR&gt;「……そうか、わかった」&lt;BR&gt;　それなら仕方ないと頷いて、学生寮の方に向かいかけたスコールは、ふと思いついてセルフィの背中に呼びかけた。&lt;BR&gt;「セルフィ、今ならゼルがまだガーデンにいるから、会いに行くといい」&lt;BR&gt;「ほんと？」&lt;BR&gt;　くるんと振り返ったセルフィは、嬉しそうに笑って頷いた。&lt;BR&gt;「ゼルに会うのも久しぶり～！　うん、あとで会いに行く！」&lt;BR&gt;「多分まだ訓練施設にいると思うが……」&lt;BR&gt;「わかった、のぞいてみるね。ね、キスティはいないの？」&lt;BR&gt;「キスティスは数日前から任務みたいだ」&lt;BR&gt;「そっか」&lt;BR&gt;　ひとつ頷いてから、セルフィは改めてにっこりとスコールに笑いかけた。&lt;BR&gt;「それじゃ、スコールはんちょ！　明日からよろしくお願いします！」&lt;BR&gt;「……」&lt;BR&gt;　いきなりのストレート技にスコールは一瞬虚をつかれたが、やがて静かに微笑んで頷き返した。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;「あら、スコール一人？　セルフィは？」&lt;BR&gt;　ドアを開けるなり、シュウの発した第一声はこれだった。&lt;BR&gt;　スコールは吐息をついて、腰に手を当てる。&lt;BR&gt;「セルフィは食事中だ。俺一人じゃまずかったか？」&lt;BR&gt;「うーん、まずくはないけど」&lt;BR&gt;　困ったようにシュウは小首をかしげ、それから部屋の中に入るよう手招きした。&lt;BR&gt;「私、カドワキ先生にセルフィへのことづけ頼まれてたんだよねぇ。放送とかで呼んでも逃げられちゃうし、メール送っても応答ないし」&lt;BR&gt;「……セルフィが？」&lt;BR&gt;　シュウの後に続いて入室しながら、スコールは訝しげに眉をひそめた。&lt;BR&gt;　呼び出しに応じなかったりメールを無視したりするのは、あまり彼女らしくない。&lt;BR&gt;　シュウも苦笑まじりに頷いた。&lt;BR&gt;「そうなんだよねぇ。そういうことする子に見えないから、かえって対処のしようがなくって。&lt;BR&gt;　そうだ、じゃあ悪いけどスコール、うまくあの子を誘導して、カドワキ先生のとこ連れてってくれる？&lt;BR&gt;　なんでも、健康診断で再検にひっかかっちゃってたらしくってね、今度の任務前にどうしても検診受けさせないとって、結構心配してたから」&lt;BR&gt;「再検？」&lt;BR&gt;　詳しくはわからないとシュウは首を振った。&lt;BR&gt;「さて、それで、Ｇ．Ｆ．だったわね。一応君達の使っていたＧ．Ｆ．はそのまま、私のＰＣで預かってるから」&lt;BR&gt;　言いながらシュウはＰＣのキーボードをいくつか叩いてパスワードを入力し、画面を呼び出してからスコールを振り返った。&lt;BR&gt;「はい、ＯＫ。自由に持って行っていいわよ」&lt;BR&gt;　スコールはそれに応じて画面をのぞきこみ、かつてともに戦ったＧ．Ｆ．たちをあらかたダウンロードしてから、顔を上げてシュウを見た。&lt;BR&gt;「確かに受け取った。……セルフィの件は、なんとか言ってみる」&lt;BR&gt;「よろしくね」&lt;BR&gt;　穏やかに笑ったシュウは、一年前より少し伸びた髪をふわりと揺らし、スコールをまっすぐに見た。&lt;BR&gt;「大変な任務らしいけど、健闘を祈る」&lt;BR&gt;　シュウらしいきっぱりとした言葉に、スコールもわずかに表情を優しくした。&lt;BR&gt;「……ありがとう」&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　食堂に行くと、入り口近くのテーブルにセルフィとゼルが座っているのが見えた。&lt;BR&gt;　どうやら食堂に行く前に、訓練施設に寄ったらしい。&lt;BR&gt;　相変わらず仲良さそうに笑い合っている二人の様子に、スコールが割り込むきっかけがつかめずに立ちつくしていると、視線に気づいたセルフィが顔を上げてぱっと明るく笑った。&lt;BR&gt;「あ、スコール～！」&lt;BR&gt;　ゼルもまた顔を上げ、スコールの姿を認めてにこっと笑った。&lt;BR&gt;「よう、スコール。話、終わったのか」&lt;BR&gt;「……あぁ」&lt;BR&gt;　スコールは大きなストライドでまっすぐに二人のテーブルに近づき、手近な椅子を引き寄せてどさっと座った。&lt;BR&gt;「ね、ね、シュウ先輩会えた～？　なんか言ってた？」&lt;BR&gt;「……いや……」&lt;BR&gt;　どう言ったものかとスコールは悩みながら、長い足を高く組んで視線を二人からそらした。&lt;BR&gt;　スコールが多くを語らないのはいつものことなので、セルフィとゼルは二人だけの会話にまた花を咲かせはじめる。&lt;BR&gt;「そうだ、ねえ、ラグナロク、どこに置いとこうかな～。ゼル、使う～？」&lt;BR&gt;「バーカ。使えるわけねーだろ。オレの次の任務、結構特殊なんだから」&lt;BR&gt;「そーなの～？　ゼル一人で～？」&lt;BR&gt;「いや、先輩が一人つくから、オレと二人だな」&lt;BR&gt;「そっかぁ～。じゃ、安心だね～」&lt;BR&gt;「…………どういう意味だ、それ」&lt;BR&gt;「じょーだんじょーだん！」&lt;BR&gt;　明るくきゃらきゃらと笑いながら手際よく皿の上の料理を片付け、セルフィは満足したように息をついた。&lt;BR&gt;「ふー、ごちそうさま～。なんか、久しぶりにここのごはん食べれて超シアワセ～！」&lt;BR&gt;「そういえばあっちは今、どうしてんだ？　メシ」&lt;BR&gt;「生徒が作ってるよ、交代で。もぉ大変なんだよねぇ～、まずい人のってほんとにまずいんだもん～」&lt;BR&gt;　深刻そうにため息をついて、セルフィは首を振った。&lt;BR&gt;「でも、それはいいんだよ、別に。一番大変なのは、モンスターかなぁ、やっぱ」&lt;BR&gt;「モンスター？　大分減ってきたけど、まだいんのか？」&lt;BR&gt;「いーるーよー。もーたっくさん！　中にまで入ってきちゃうんだもん、退治すんのいつも大騒ぎ！」&lt;BR&gt;　まるでウィンヒルみたいなんだよねぇ、とつけ加えたセルフィに、ゼルが同情した眼差しを向けた。&lt;BR&gt;「そりゃー……大変だよな……」&lt;BR&gt;「でしょ？　でしょ？　たいへーんなのだ～！」&lt;BR&gt;　無邪気にセルフィが笑った瞬間、入り口付近から聞き慣れた声が響いた。&lt;BR&gt;「大変だからといって、健康診断すっぽかすのはよくないねぇ、セルフィ」&lt;BR&gt;　スコールが驚いて振り向くと、白衣姿の校医のカドワキが食堂の入り口で両腕を組んで立っていた。&lt;BR&gt;「あ～、カドワキ先生～」&lt;BR&gt;　さすがにちょっとばつの悪そうな表情でセルフィが呟くように言った。&lt;BR&gt;　反応のしようがなくて無表情になったままのスコールに、歩み寄ったカドワキはくすっと笑って片目をつぶった。&lt;BR&gt;「あんたにこの子をうまく誘導できるなんて、シュウも私も思っちゃいないさ」&lt;BR&gt;　用意周到なシュウは、スコールの「セルフィは食堂にいる」という情報を、速攻でカドワキに伝えていたのだ。&lt;BR&gt;　かなわないなとスコールはかすかに唇に笑みを刻み、それからセルフィを振り返って低い声で静かに言った。&lt;BR&gt;「セルフィ、あきらめて再検を受けろ。班長からの命令だ」&lt;BR&gt;「……はぁ～い」&lt;BR&gt;　スコールにそう言われれば何も言えず、セルフィは仕方なさそうにカドワキを見上げた。&lt;BR&gt;「え？　なんだよセルフィ、どっか悪いのか？」&lt;BR&gt;　眉根を寄せたゼルに心配され、セルフィは困ったように肩をすくめて笑った。&lt;BR&gt;「んー……わかんない。こないだの健診でなんかひっかかっちゃったらしいってだけだもん～」&lt;BR&gt;「再検受ければ結果が出てすっきりするよ。ほら、明日からもう任務なんだろ。今晩中にとっととやっちゃうよ」&lt;BR&gt;「……はぁ～い」&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　カドワキに強引に引っ張って行かれるセルフィを見送って、スコールとゼルはどこを見るともなく視線を合わせてしばし沈黙した。&lt;BR&gt;「…………今度の任務、厄介なんだ？」&lt;BR&gt;　沈黙が苦手なゼルが先に口を開き、スコールは無表情のまま静かに視線をはずして頷いた。&lt;BR&gt;　任務内容はお互い決して口にしない。&lt;BR&gt;「そっか」&lt;BR&gt;　ゼルも軽く頷いて、しばらく言葉に迷ったように視線を宙に泳がせていたが、結局一言だけ短く口にした。&lt;BR&gt;「頑張ろうぜ、お互い」&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　任務初日の朝、スコールは久しぶりにガーデンの一般学生の制服に腕を通した。&lt;BR&gt;　ＳｅｅＤに任命される前も、あまりこの制服を身につけた記憶は少ない。&lt;BR&gt;「…………」&lt;BR&gt;　なんとなく袖が短い気がして、スコールはしばし複雑な気分でそれを眺めやった。止まったと思いこんでいた身長はまだ伸びていたのだろうか。&lt;BR&gt;　簡単に荷造りをしていると、短いチャイムの音が響いた。ＳｅｅＤの部屋なら各々に取り付けられている呼び鈴である。&lt;BR&gt;　スコールが驚いて荷造りの手を止めるのと同時に、ドアの外からカドワキの声が響いた。&lt;BR&gt;「スコール、ちょっといいかい？」&lt;BR&gt;「……今開けます」&lt;BR&gt;　昨夜のセルフィとのやり取りを思い出し、ふと眉を寄せながらスコールは立ち上がり、ドアを開けた。&lt;BR&gt;「おはよう、スコール。ああ、制服なんだね」&lt;BR&gt;　いつもと変わらない優しい笑顔でカドワキがスコールを見上げた。&lt;BR&gt;「……セルフィに何か？」&lt;BR&gt;「まぁ、そうだね。忙しいところ悪いけど」&lt;BR&gt;　スコールは小さく頷くと、身を引いてカドワキに中に入るよう示した。&lt;BR&gt;　応じてカドワキは部屋の奥へと進み、窓際に立つと静かにスコールを振り返った。&lt;BR&gt;「……今度の任務では、あんたがＧ．Ｆ．のジャンクション指示を出すことになっているんだろ？」&lt;BR&gt;「……ええ」&lt;BR&gt;　スコールは椅子をカドワキに手ですすめたが、カドワキはそれを断った。&lt;BR&gt;　この部屋には椅子が一つしかないのである。&lt;BR&gt;「セルフィが再検にひっかかった項目が何かわかるかい？」&lt;BR&gt;　そんなこと知るわけないだろうとスコールは心の中で呟いてから、首を振って口を開いた。&lt;BR&gt;「いえ、知りません」&lt;BR&gt;「そうかい。まぁ、そうだろうね」&lt;BR&gt;　じゃあ聞かなきゃいいじゃないかと思うスコールの心中を知ってか知らずか、カドワキはまっすぐにスコールを見つめた。&lt;BR&gt;「Ｇ．Ｆ．不適合症候群だよ」&lt;BR&gt;　スコールは思わず眼を見開いた。&lt;BR&gt;　何か言わねばと、混乱した思考のために重い口を開く。&lt;BR&gt;「不適合症……？」&lt;BR&gt;「そう。病名くらいは知っているだろう？」&lt;BR&gt;　スコールは黙って頷いた。&lt;BR&gt;　Ｇ．Ｆ．は意識をもつ巨大な自律エネルギー体であり、土地などに宿るほか人間の脳内にジャンクションすることもできる。&lt;BR&gt;　だが、この脳内ジャンクションにはそれなりのリスクも当然伴い、記憶の欠落に代表されるさまざまな副作用が使用者を襲うのだ。&lt;BR&gt;　Ｇ．Ｆ．にもそれぞれレベルはあり、高レベルのＧ．Ｆ．であればあるほど有するエネルギーも莫大になり、ジャンクションする者への負担も大きくなる。&lt;BR&gt;　負担が増加すると、稀にＧ．Ｆ．に対して激しい拒絶反応を起こしたり、記憶の欠落が激しくなったり、ひどい時には意識喪失、廃人になってしまうこともある。これを一般的に、Ｇ．Ｆ．不適合症候群と呼ぶのだ。&lt;BR&gt;　現在Ｇ．Ｆ．の使用許可が下りているのはバラムガーデンのみであるが、こういった危険性を加味し、ジャンクション経験のある者、及び継続使用者は毎月一度定期検診を受けることを義務付けられている。&lt;BR&gt;　無論、Ｇ．Ｆ．不適合症候群であるとされた生徒は、ＳｅｅＤになることはできない。退校になることはないが、ガーデン生である以上、ＳｅｅＤになることは最終目標であるわけで、不適合症の生徒は大抵目標喪失の痛みに耐えられずに自主退学の道を選ぶことも多いのだ。&lt;BR&gt;　そして、今カドワキは、セルフィに不適合症の可能性があるのだと言うのである。&lt;BR&gt;「でも……セルフィはＧ．Ｆ．を使っている間、一度だって意識障害のような兆候を示したことはありませんでした」&lt;BR&gt;　スコールの言葉に、カドワキも真剣な顔で頷く。&lt;BR&gt;「あぁ、確かにね。あの子の症状はまだ不適合症とよべるほどのものじゃない。……むしろあの子の場合は、過剰適合症とでも呼ぶべきかな」&lt;BR&gt;「過剰適合？」&lt;BR&gt;「相性がよすぎるんだよ。普通の不適合症ってのは、脳がＧ．Ｆ．に対して拒絶反応を示してはじき出そうとする動きから様々な症状が引き起こされることを言う。あの子の場合は、Ｇ．Ｆ．と適合しすぎたために、脳がＧ．Ｆ．の能力を限界以上に引き出させようとしてしまい、結果的に自分の脳の許容量を超えてしまい、脳の方が破壊されてしまう。まぁ、まだ危険性があるというだけで、実際にそういう症状が出ているわけじゃないんだけどね、とりあえずは要経過観察ってところだ。任務から戻ったら、きちんと精密検査が必要だね」&lt;BR&gt;　そこでカドワキは一度言葉を切り、腕を組んで嘆息した。&lt;BR&gt;「……あの子はどうやら、トラビアに行った後もずっと、Ｇ．Ｆ．をジャンクションし続けてたみたいだね」&lt;BR&gt;「……え？」&lt;BR&gt;　スコールが顔を上げると、カドワキは小さく苦笑して肩をすくめた。&lt;BR&gt;「向こうではＳｅｅＤがあの子一人だろう？　生徒達もあんなことになっちまってほとんど戦えない状態だったみたいだし。ガーデン内に侵入しようとするモンスターを一掃するには、Ｇ．Ｆ．の力に頼らざるをえなかったんだろうね」&lt;BR&gt;「……」&lt;BR&gt;　アルティミシアを倒した後、バラムガーデンでは、継続的なＧ．Ｆ．のジャンクションを禁止することが決定した。&lt;BR&gt;　今の時代に、もう倒すべき魔女はおらず、未来の魔女が侵攻してくる危険性も断ち切られている。人との戦いに100％Ｇ．Ｆ．を必要とするようなことは、ほとんどないのだ。&lt;BR&gt;　Ｇ．Ｆ．の使用は必要最低限に、またジャンクションは必ずガーデン、もしくはガーデンから任じられたチームリーダーの判断を仰ぎ、許可を得ることを、バラムガーデンは義務付けたのである。&lt;BR&gt;　トラビアにいるモンスターは、一匹一匹であれば、Ｇ．Ｆ．の力など借りずともセルフィなら倒せるだろう。&lt;BR&gt;　だが、戦闘能力のほとんどない子供達を庇い、ほとんど足手まといにしかならない数少ない生徒達と連携して、彼女達を餌にしか見ていない飢えたモンスターの大群を相手にするには、どうしてもＧ．Ｆ．を使う必要があったのだ。&lt;BR&gt;『でしょ？　でしょ？　たいへーんなのだ～！』&lt;BR&gt;　そう言った無邪気なセルフィの笑顔を思い出し、スコールは苦い思いで足元に視線を落とした。&lt;BR&gt;　いつだって、まわりの人間は彼女のあの笑顔にだまされてしまう。&lt;BR&gt;「……まあ、そんな深刻になることじゃないさ。相手がそこらのモンスターなら、Ｇ．Ｆ．の力を極限まで引き出す必要もないんだし。ただ、今度の任務には大物が絡んでいるんだろ、そんなの相手にしたらまさに危惧していた事態を引き起こさないとも限らないからね。&lt;BR&gt;　だから、リーダーのあんたにはそこのところを理解してもらって、事態に備えてもらいたいんだよ」&lt;BR&gt;　スコールは、ごくわずかに嫌な顔をした。&lt;BR&gt;　どうして周囲の人間はいつもいつもこういう嫌な役割をスコールに求めてくるのだろう。&lt;BR&gt;　リーダーリーダーと二言目には皆言うが、別にスコールが志願してなったわけではないし、そもそもリーダーだからという理由でこんなふうに他人の人生を左右するような決定権を委ねられてはたまらない。&lt;BR&gt;　たとえば今回の黒幕の大物が、凶悪なＧ．Ｆ．を扱って攻撃してきた場合、こちらもどうしてもＧ．Ｆ．に頼らざるを得ない局面も出てくるだろう。&lt;BR&gt;　そんな事態になって、セルフィがＧ．Ｆ．を使ったために意識障害などを引き起こしても、スコールにはどうしてやることもできないのである。&lt;BR&gt;　無論、副作用を恐れてＧ．Ｆ．を使わずにいて、そのまま殺されては話にならないのだが。&lt;BR&gt;「……セルフィにその話は？」&lt;BR&gt;　溜息まじりにスコールがたずねると、カドワキは頷いた。&lt;BR&gt;「もちろん、話したさ。詳細な検査結果はまだ先になるけど、危険性は危険性として認識してもらわないとならないからね。一応本人も気をつけまーすとは言ってたけど、どこまでちゃんと気をつけてくれるかねぇ……」&lt;BR&gt;　おそらく、戦闘になればまったく自身を省みないだろうことが双方ともに予測がつき、スコールは再度溜息をついてしまった。&lt;BR&gt;　いっそもう一人で任務に向かいたい気分になったが、まさかそんなことを言うわけにはいかず、先行きの不安にスコールは、重い気分で宙を仰いだ。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　荷造りを終えたスコールが朝食をとるため食堂に入ると、すでに中にいたセルフィがお気楽そうな笑顔でひらひらと手を振った。&lt;BR&gt;「あ、スコール～、おっはよ～」&lt;BR&gt;「……早いな」&lt;BR&gt;　複雑な表情になりながら、スコールは食事を受け取ってセルフィの座るテーブルにまっすぐ歩み寄った。&lt;BR&gt;「そうでもないよ～。なんかもう超寝不足ってかんじ～」&lt;BR&gt;　肩をすくめてセルフィは笑うと、空いた食器を脇にどけて頬杖をついた。&lt;BR&gt;　スコールが黙ったまま椅子に座り食事をとりはじめるのを眺め、何気ない調子で口を開く。&lt;BR&gt;「ね、はんちょ。カドワキ先生、なんか言ってた～？」&lt;BR&gt;「………………まぁな」&lt;BR&gt;　低い声で答えたスコールに、セルフィはちょっと息をついた。&lt;BR&gt;「そっかぁ～。でも、そんなに深刻になんなくても平気だよ～。あたし、全然今までＧ．Ｆ．使ってて変な症状出たことなかったし。だからあんまし気使ったりしなくていいからね～。あたし、ＳｅｅＤだもん」&lt;BR&gt;　いつも元気いっぱいのセルフィにとって、今回の健康診断再検はさすがにショックな出来事だったらしい。&lt;BR&gt;　めずらしく落ち込んで見えるセルフィの姿に、スコールはどう反応していいのかよくわからず、ただ不器用に頷くだけだった。&lt;BR&gt;「ありがと」&lt;BR&gt;　もちろんセルフィは、スコールに慰めの言葉をもらおうなどとは考えていない。ＳｅｅＤとして適切な判断を下すことを約束してくれたことについて礼を言う。&lt;BR&gt;「……そういえば～、あたし、さっきからみんなにこっちの制服の方が似合うって言われまくってるんだよ～。しっつれーしちゃうよねぇ？」&lt;BR&gt;　トラビアに行く時はＳｅｅＤとして派遣されているのでＳｅｅＤの制服を身につけているセルフィだが、今回はバラムガーデンの一般生の制服姿である。&lt;BR&gt;　大人っぽいタイトスカートのＳｅｅＤの制服よりも、本人には悪いが黄色いリボンの一般制服のほうが似合っているのは事実である。&lt;BR&gt;「でもトラビアにいる間はあんまし制服って着たことなかったんだよね～。だから、ＳｅｅＤ服でもこっちのでも、制服ってなんか、着るとわくわくするんだ～」&lt;BR&gt;　くるくると表情を変えて勢いよくしゃべり、それからスコールのほうをひょいとのぞきこむ。&lt;BR&gt;「でも～、スコールはＳｅｅＤ服の方が似合ってるみたいだねぇ～」&lt;BR&gt;「……悪かったな」&lt;BR&gt;　それこそ余計なお世話だとスコールがセルフィを睨むと、セルフィは楽しそうにくすくすと笑った。&lt;BR&gt;「いちお、ほめたんだよ～。スコールそろそろ台詞のバリエーション、増やしたら～？」&lt;BR&gt;「………………」&lt;BR&gt;　ますますむぅっと黙り込んでしまったスコールに、セルフィはますますおもしろそうに笑い転げる。&lt;BR&gt;　めずらしくスコールの周りがにぎやかだと、食堂に訪れた生徒達が眼をまるくしてのぞき込むのを、まったくもって面白くないと、スコールはふてくされて頬杖をついた。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　スコール達が食堂で束の間の平和を満喫している頃、何もかも半透明に透ける機械仕掛けの国エスタでは。&lt;BR&gt;「おーい、エル知らねえ？」&lt;BR&gt;　エスタ大統領ラグナ・レウァールは、可愛い可愛い愛娘同然のエルオーネと朝の挨拶をかわすため、広い大統領官邸をあちこち探し回っていた。&lt;BR&gt;「…………部屋じゃないのか？」&lt;BR&gt;　朝から執務に追われて大変に忙しいキロスは、相変わらずの無表情でぼそりと答えた。&lt;BR&gt;　ラグナはむーっと顔をしかめ、大げさな仕草で両手をぶんと振った。&lt;BR&gt;「いたら探してるわけねーだろー！」&lt;BR&gt;「…………部屋にいないのか……？　ＳｅｅＤ達には聞いたのか？」&lt;BR&gt;「おぉ、そういやあいつらの姿も見てねーな」&lt;BR&gt;　ぽん、とラグナは手を叩き、今度は白いＳｅｅＤの姿を見なかったかと聞いて回りはじめた。&lt;BR&gt;「………………親バカというんだな、あれは……」&lt;BR&gt;　キロスはぼそりと呟き、隣に立つウォードにちらりと視線を送る。&lt;BR&gt;「…………」&lt;BR&gt;　それに対し視線で答えたウォードに、キロスは溜息混じりに肩をすくめた。&lt;BR&gt;「襲撃がなかったところで、あいつはいつでもあの調子だ」&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　そしてラグナが散々探し回ったエルオーネは、もしやと再度のぞいた部屋の中にちょこんと座っていた。&lt;BR&gt;「エル！？　おまえ、どこ行ってたんだよ」&lt;BR&gt;　驚きに声を大きくするラグナに、いきなりノックもなく部屋を開けられたエルオーネは、さしてそれを気にしたふうでもなく小さく首をかしげた。&lt;BR&gt;「ラグナおじさん？　どうしたの、なんかあったの？」&lt;BR&gt;　不思議そうな眼差しに、ラグナはなんとなく変な違和感を感じてちょっと口をつぐんだ。&lt;BR&gt;「？」&lt;BR&gt;　エルオーネがさらに不可思議な表情になっていると、彼女の横にまるで影のように立っていた青年が静かに口を開いた。&lt;BR&gt;「おはようございます、大統領」&lt;BR&gt;　紺色の髪を揺らして敬礼をとる青年は、白いＳｅｅＤの制服を身につけている。&lt;BR&gt;「お？　おぉ……なんだおまえ、エルについてたのか？　散歩でもしてたのか？」&lt;BR&gt;　その存在に全然気づいていなかったラグナは驚き、エルオーネと青年──白いＳｅｅＤとを見比べた。&lt;BR&gt;「……散歩……？」&lt;BR&gt;　ぼんやりとエルオーネが呟いた言葉を引き継ぐようにして、ＳｅｅＤの青年は頷いて言った。&lt;BR&gt;「えぇ、気分転換になればと、自分がお連れしました。先にご連絡するべきでしたね。ご心配をおかけしたようで、申し訳ありません」&lt;BR&gt;　にこっと笑う青年の表情に邪気はない。ラグナは首を横に振った。&lt;BR&gt;「いーや、かまわねーよ。おまえらがついてたんなら心配いらねーしな。何もなきゃそれでいいさ」&lt;BR&gt;　言って、ズボンのポケットに両手を突っ込み、退室するためドアを大きく開きながら、言葉少ないエルオーネを振り返って声をかけた。&lt;BR&gt;「とりあえず、朝メシ食おーぜ。今日の昼頃にはスコールとセルフィも着くからよ、メシ食って元気よく迎えてやろーぜ。心配してるかもしれねーからよ」&lt;BR&gt;「……」&lt;BR&gt;　ラグナは、何の気なしにかけた言葉だった。&lt;BR&gt;　だがその言葉に、エルオーネは大きく眼をみはり、眉根を寄せてラグナを振り仰いだ。&lt;BR&gt;「……スコール？　セルフィ……？　……スコール達が、エスタに来るの？」&lt;BR&gt;「おいおい、何言ってんだよ～」&lt;BR&gt;　苦笑してラグナは肩をすくめた。&lt;BR&gt;「こないだちゃんと、こいつらとスコール達とが共同作戦はって、例の襲撃者をとっつかまえるって、話しといたろ？&lt;BR&gt;　そもそも、スコールとセルフィなら信頼できるから呼ぶんならあの二人をエスタに呼んでくれって言ったのはエル本人じゃねーか」&lt;BR&gt;「……私、が……？」&lt;BR&gt;　愕然としたようなエルオーネに、さすがのラグナも表情を厳しくした。&lt;BR&gt;「……覚えてねーのか、エル？」&lt;BR&gt;「覚えてない……私、そんなこと言ったの？」&lt;BR&gt;「おいおい～！　しっかりしてくれよ～！」&lt;BR&gt;　額に手を当て、ラグナは背を預けていたドアから身を起こし、つかつかと小さな椅子に腰かけているエルオーネの前まで歩みより、膝を折って目線を同じにすると、不安そうな可憐な顔をのぞきこんだ。&lt;BR&gt;「襲撃のショックでどうにかなっちまったのか？　医者かなんか、呼んだ方がいいか？」&lt;BR&gt;「…………おじさん……」&lt;BR&gt;　エルオーネはラグナの深い色の瞳を間近にのぞいて、必死で記憶を探ろうとした。&lt;BR&gt;　……そう、確かに、聞いたはずだった。白い船のＳｅｅＤたちとスコールたちとの共同作戦のことは。&lt;BR&gt;　けれど、その前後の記憶は完全に消し飛んでしまっている。エルオーネはますます呆然として、思わず両手を頬に当ててしまった。&lt;BR&gt;「……ごめんなさい、ラグナおじさん。私……なんかおかしいのかしら」&lt;BR&gt;　確かにおかしなエルオーネの様子に、ラグナも小さく溜息をつくと、腕を伸ばしその大きな手で、エルオーネの頭をわしゃわしゃとなでた。&lt;BR&gt;「気にすんな。ちょっと、いろいろあって頭ん中ぐちゃぐちゃになっちまってるだけだって」&lt;BR&gt;「……」&lt;BR&gt;　エルオーネは、なおも不安そうな表情をしていたが、ややして小さく頷いた。&lt;BR&gt;　ラグナはそんな彼女を安心させるように、にっと人好きのする豪快な笑顔になり、両手でエルオーネの頬を包む。&lt;BR&gt;「よし、いい子だ。じゃ、仲良く朝メシ食いに行こうぜ」&lt;BR&gt;「……うん」&lt;BR&gt;　もう一度エルオーネは頷くと、ラグナの手を借りて優雅な仕草で立ち上がった。&lt;BR&gt;　立ち上がり、自分についててくれている紺色の髪の白いＳｅｅＤを振り返り、かすかに小さく微笑んだ。&lt;BR&gt;「……ね、一緒に行きましょ」&lt;BR&gt;　言葉に続けて彼の名を呼ぼうとし、エルオーネはちょっと言葉につまってしまった。&lt;BR&gt;　白い船のＳｅｅＤたちは、自分と一緒に育った子達だけのはずだ。知らない者などいない。&lt;BR&gt;　にも関わらず、彼女は今眼の前にいる彼の名前をまったく思い出せなかった。&lt;BR&gt;（やだわ……本当に私、どこかおかしいのかしら）&lt;BR&gt;　息をのむ彼女の前で、ＳｅｅＤの青年はにっこりと笑って頷いた。&lt;BR&gt;「お邪魔でなければ」&lt;BR&gt;　その優しい笑顔を眺めながら、エルオーネはつとめて通常通りの笑顔を維持しつつ、動揺する自分に懸命に言い聞かせる。&lt;BR&gt;　この顔はちゃんと見覚えがある。多分自分が度忘れをしているだけなのだろう。落ち着いてゆっくり考えれば思い出せるはずだ。&lt;BR&gt;「もちろんよ。ご飯は、大勢で食べた方が楽しいもの」&lt;BR&gt;　そう、今は少し、驚いて、混乱しているだけなのだ。&lt;BR&gt;　自分をそう納得させようとしているエルオーネは、だから気づかなかった。&lt;BR&gt;　幼い頃から継続的に魔女に狙われつづけ、眼の前で両親を殺害され自らも命の危険を常に感じ続けてきた自分が、ただ一度正体不明のＧ．Ｆ．に襲われたくらいで記憶をなくすほどの衝撃を受けるはずなどないことを。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　日は高くのぼっていた。&lt;BR&gt;　当然気温も、それに比例して上昇していた。&lt;BR&gt;「ねぇ～」&lt;BR&gt;　背後から何度目かの呼びかけがあったが、スコールは無視して黙々と足を運んだ。&lt;BR&gt;「ねぇ～！　スコールってばっ！」&lt;BR&gt;　スコールの態度はすっかり慣れっこになっているためか、全然めげずに呼びかけは続く。&lt;BR&gt;「スコールスコールスコールスコールスコー……」&lt;BR&gt;「なんだ」&lt;BR&gt;　ついに大声で名前を延々と連呼され、たまりかねて足を止めたスコールが振り返った。&lt;BR&gt;　ようやく視線を合わせることに成功し、セルフィは満足げににっこりと微笑んだ。&lt;BR&gt;「や～っと振り向いてくれた～」&lt;BR&gt;　言って、背中にしょった大きなリュックを背負いなおし、とんとんと身軽い仕草でスコールの傍まで走り寄る。&lt;BR&gt;　ストライドの差で、スコールの早足についていくのは実はけっこう大変なのだが、セルフィはそのことについては過去の旅の間も一言も文句を言ったことはない。&lt;BR&gt;　ぼんやりとそんなことを考えながら、同時に唯一文句をつけてきた少女がいたことも思い出し、かすかにスコールが顔をしかめていると、眼の前までやって来たセルフィがぴょこんと手を挙げた。&lt;BR&gt;「はんちょ！　てーあ～ん！」&lt;BR&gt;「…………なんだ」&lt;BR&gt;「休憩とろう！　も～さすがに暑くて死んじゃうよ～！」&lt;BR&gt;「…………」&lt;BR&gt;　予定では昼過ぎにはエスタに着かなくてはいけない。休憩など取っている暇はないのだが……。&lt;BR&gt;「わかった。十分だけ小休止する」&lt;BR&gt;「やった～！」&lt;BR&gt;　セルフィに下手に逆らってもムダであることを経験として熟知していることと、自分自身、延々と続く線路の上で天日干しにされていい加減うんざりしていたこともあって、スコールは素直にセルフィの提案を受け入れることにした。&lt;BR&gt;　セルフィは嬉しそうに笑うと、線路の端にとことこと歩いてすとんと腰をおろし、スコールを見上げてぱたぱたと手招きした。&lt;BR&gt;「…………」&lt;BR&gt;　スコールは複雑そうな顔でセルフィを見下ろしたが、あえて何も言わず、長い足をさばいて彼女の傍に行くと隣にどさりと座り込む。&lt;BR&gt;　自覚はしていないが、スコールは実はセルフィにけっこう甘かったりする。&lt;BR&gt;「な～んか、おかしいよね～。あたし、今、全然緊張してないんだよ～」&lt;BR&gt;　くすくすと笑ってセルフィが口を開いた。&lt;BR&gt;「行き先がエスタだからかなぁ～？　すっごく強い敵、待ってるのにね～」&lt;BR&gt;「……油断は禁物だぞ」&lt;BR&gt;　無邪気なセルフィの声に、スコールはぼそりと水を差す。&lt;BR&gt;「はいはい！　わかってま～すだいじょ～ぶ！」&lt;BR&gt;　まったく気にするふうでもなくセルフィは大きく頷いた。&lt;BR&gt;　健康診断のことなどすっかり忘れてしまったかのような陽気ぶりに、それなりに心配していたスコールはなんだかバカを見たような気分になる。&lt;BR&gt;　と、突然セルフィが前触れなくスコールに訊ねた。&lt;BR&gt;「……ね、スコールは、あれからずっとエスタには行ってないの～？」&lt;BR&gt;「…………」&lt;BR&gt;　スコールはじろりとセルフィを睨んだが、今度はセルフィはかまわず言葉を続けた。&lt;BR&gt;「ラグナ様、さびしがってたよ～。レインのお墓参り、一緒に行きたいって」&lt;BR&gt;「……墓参りならエルオーネと行った」&lt;BR&gt;　無表情な声にわずかに不機嫌さをにじませてスコールが答える。&lt;BR&gt;　セルフィは小さく苦笑した。&lt;BR&gt;「ラグナ様が一緒に行きたいんだよ～」&lt;BR&gt;「……あんたには関係ないだろ」&lt;BR&gt;　そっけなく突き放され、セルフィはもっともだと言うように頷いた。&lt;BR&gt;「そ～だね。でも、お話、してあげてね」&lt;BR&gt;　それだけ言うと、セルフィは口を閉じ、そのまま黙り込んでしまった。&lt;BR&gt;　長い沈黙が続き、スコールは思わず横目でセルフィの様子をうかがった。&lt;BR&gt;　日頃、セルフィの方から話しかけられることに慣れすぎているせいか、彼女と二人でいる時に沈黙が続くとどうにも居心地が悪くて仕方がない。&lt;BR&gt;　言い方が悪くて怒らせたのだろうか、もっと他に言いようはなかったか、でも自分とラグナのことに他人からとやかくは言われたくないし……とあれこれあれこれ思考をめぐらせていると、スコールの視線に気づいたセルフィが顔を上げ、翠色の瞳を優しく細めてにこっと笑った。&lt;BR&gt;「もう行く～？　スコール」&lt;BR&gt;　こだわりのない笑顔にスコールは内心ほっとしつつ、ようやく居心地の悪い思いから解放されて、頷きながら立ち上がった。&lt;BR&gt;「……そうだな。昼過ぎにはあっちに着いている約束だ」&lt;BR&gt;「は～い……あ」&lt;BR&gt;　スコールに続いて立ち上がりかけたセルフィが、ふっと気配を感じて動きを止めた。&lt;BR&gt;　同時にスコールもまた、鋭い視線で周囲を見回す。&lt;BR&gt;「…………」&lt;BR&gt;　肌に突き刺さるように感じるのは、まぎれもない殺気。&lt;BR&gt;　モンスターか、あるいは例のＧ．Ｆ．か……と、二人は全身を緊張させ臨戦体勢に入ったが。&lt;BR&gt;「…………あれ～？」&lt;BR&gt;　突然、気配が嘘のように消え去り、セルフィは思わず辺りをきょろきょろと見回した。&lt;BR&gt;　スコールもまた訝しげに周囲に視線を向ける。&lt;BR&gt;「……なんだったんだ？」&lt;BR&gt;「わかんない。でも絶対、なんかいたよね」&lt;BR&gt;　バラムガーデンが誇るＳｅｅＤの、それも最強と評される二人が同時に感じ取ったのだから、気のせいなどではない。&lt;BR&gt;「……嫌な予感がするな。早くエスタに入ろう」&lt;BR&gt;「りょ～かい」&lt;BR&gt;セルフィは膝立ちの姿勢からひょいと立ち上がり、荷物を背負い直すと、スコールの後に続いて早足で歩き始めた。&lt;BR&gt;&lt;BR&gt;　二人が去った、線路の上。&lt;BR&gt;　ふわりと、天から舞い降りたものがあった。&lt;BR&gt;　それは──深い蒼い色の、鳥の羽だった。

<script data-viewer-zoom-script>
(() => {
  const stage = document.querySelector('.viewer-stage-image');
  const image = stage ? stage.querySelector('.viewer-image') : null;
  if (!stage || !image) {
    return;
  }

  const setZoom = (enabled) => {
    stage.classList.toggle('is-zoomed', enabled);
    image.setAttribute('aria-pressed', enabled ? 'true' : 'false');
    if (enabled) {
      const naturalWidth = image.naturalWidth || image.clientWidth || 0;
      const targetWidth = naturalWidth > 0
        ? Math.max(naturalWidth, Math.min(Math.round(stage.clientWidth * 0.92), naturalWidth * 4))
        : Math.round(stage.clientWidth * 0.92);
      image.style.width = `${targetWidth}px`;
      image.style.maxWidth = 'none';
      image.style.maxHeight = 'none';
      requestAnimationFrame(() => {
        stage.scrollTop = 0;
        stage.scrollLeft = Math.max(0, Math.round((image.scrollWidth - stage.clientWidth) / 2));
      });
    } else {
      image.style.removeProperty('width');
      image.style.removeProperty('max-width');
      image.style.removeProperty('max-height');
      stage.scrollTop = 0;
      stage.scrollLeft = 0;
    }
  };

  const toggleZoom = () => {
    setZoom(!stage.classList.contains('is-zoomed'));
  };

  image.setAttribute('tabindex', '0');
  image.setAttribute('role', 'button');
  image.setAttribute('aria-label', '逕ｻ蜒上ｒ諡｡螟ｧ縺ｾ縺溘・邵ｮ蟆・);
  image.setAttribute('aria-pressed', 'false');

  image.addEventListener('click', toggleZoom);
  image.addEventListener('keydown', (event) => {
    if (event.key === 'Enter' || event.key === ' ') {
      event.preventDefault();
      toggleZoom();
    }
  });

  stage.addEventListener('click', (event) => {
    if (event.target === stage && stage.classList.contains('is-zoomed')) {
      setZoom(false);
    }
  });

  window.addEventListener('keydown', (event) => {
    if (event.key === 'Escape' && stage.classList.contains('is-zoomed')) {
      setZoom(false);
    }
  });
})();
</script>
</body>
</html>
