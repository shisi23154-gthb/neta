      width=537&gt;&lt;SPAN&gt;&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　機械仕掛けの国エスタはいつ見ても透明に透けて不可思議な印象を持つ。&lt;BR&gt;　自分がきちんと地面に立っているのかどうか、不安になるのだ。&lt;BR&gt;「……スコール？」&lt;BR&gt;　微妙な表情であたりを見回したスコールに、わずかに疲れを表情ににじませたセルフィが声をかけた。&lt;BR&gt;「つかれた～？」&lt;BR&gt;　スコールは彼女を見下ろし、仲間以外にはまずそう認識されることはないだろう微かな苦笑を唇に浮かべて首を振った。&lt;BR&gt;「いや……」&lt;BR&gt;　官邸に入るには自動で動くエレベータに乗って移動する。もちろんすべてコンピュータ制御されているので、賊が侵入すれば一発でわかる。&lt;BR&gt;　以前はエスタ入った時点で監視システムが作動して、どこに誰がどんな形でエスタに入ったかがわかるシステムになっていたのだが、現在そのシステムは月の涙のおかげで休止状態にある。沈黙を破って各国と国交回復に取り組んでいるというのもある上、爆発的に増えたモンスターがいちいちシステムに引っかかって、人が侵入したのかモンスターが侵入したのか、訳のわからない状態になったためでもある。&lt;BR&gt;（あのシステムがあれば、調査も楽だったんだけどな……）&lt;BR&gt;　とりあえずは、官邸の警備は多少は楽だろうとスコールは判断する。&lt;BR&gt;　官邸ホールに入ると、そこに白いSeeDたちが待っていて、特に言葉をかわすこともなく大統領の部屋に続く廊下に出、スコールたちはそれに従った。&lt;BR&gt;「……ここ来るの、久しぶり」&lt;BR&gt;　ほっと息をついて、セルフィが懐かしそうに笑った。&lt;BR&gt;　彼女がラグナに懐いて、暇を見つけてはエスタに入り浸っていたのは誰もが知る事実だったので、スコールはあえて何もコメントしないでおいた。&lt;BR&gt;　長い廊下をただ黙々と歩み続ける。と、&lt;BR&gt;「いよーーーう！！」&lt;BR&gt;　ひどく脳天気な声が響いた。&lt;BR&gt;　それだけで苦虫をかみつぶしたような顔になってしまったスコールとは対照的に、ぱっとセルフィが破顔した。&lt;BR&gt;「ラグナ様！」&lt;BR&gt;　スコールの脇をすり抜けるようにして、まっすぐラグナに走り寄りそのまま飛びつく。&lt;BR&gt;　相変わらずラフな服装のエスタ大統領・ラグナは、笑顔全開でそんなセルフィを両腕広げて受け止め、ついでに彼女の髪をわしゃわしゃとなでた。&lt;BR&gt;「ひっさしぶりだなあ、セルフィ！　元気してたかー！？」&lt;BR&gt;「うん！　ラグナ様は？　怪我、大丈夫～？」&lt;BR&gt;「おぅ、心配ねえぞ、この通りぴんぴんしてるって！」&lt;BR&gt;　負傷したと聞いた気がしたが、見る限りラグナは非常に元気そうだった。&lt;BR&gt;　これもエスタの発達した科学のたまものなのだろうが、そんなことよりスコールは、ラグナに飛びついているセルフィの、その無邪気な仕草があまりに自然で思わずあっけにとられてしまっていた。&lt;BR&gt;　……なんだか、非常に、『親子』のように見えた。&lt;BR&gt;　そんなことを思っていると、セルフィを抱いたままラグナがすいっと顔を上げ、スコールの方を見た。&lt;BR&gt;　突然眼が合ってしまい、無表情のまま動揺したスコールに、ラグナは人懐っこい笑顔を見せる。&lt;BR&gt;「よぅ、元気そうじゃねぇか」&lt;BR&gt;「……あんたもな」&lt;BR&gt;　無愛想にスコールが答える。未だに、スコールはラグナとどんな風に会話してよいのかがわからない。&lt;BR&gt;　そこに新たな声がその場に加わった。&lt;BR&gt;「……スコール、セルフィ……元気そうね」&lt;BR&gt;　耳ざわりの良い、静かで優しい声。&lt;BR&gt;　姿を見るまでもなく、誰の声かがわかった。&lt;BR&gt;「…………エルオーネ」&lt;BR&gt;　大統領の部屋から、ひとりの紺色の髪をした白いSeeDを伴い姿を見せたのは、スコールの義理の『姉』エルオーネだ。&lt;BR&gt;　彼女の姿を眼にし、スコールはごくごくわずかではあるが、ほっと表情をくつろげた。&lt;BR&gt;　昔から変わらない。エルオーネの傍は、いつでも絶対的な安心感がある。&lt;BR&gt;「ごめんなさい、こんな遠くまで、わざわざ歩いてなんて……疲れたでしょう？」&lt;BR&gt;　微笑みながらエルオーネはラグナの横まで歩み寄り、セルフィはラグナの腕の中から身を起こしてにこにこと笑った。&lt;BR&gt;「ぜーんぜん、へーきだよ～！　SeeDの体力をなめてはいけな～い！」&lt;BR&gt;「………………セルフィ」&lt;BR&gt;　はしゃいでいるセルフィの背後から、怖い声を出したのはスコールだ。&lt;BR&gt;　その声にはっとしたようにセルフィが眼を大きく見開き、両手で口を押さえる。&lt;BR&gt;「あちゃ～……」&lt;BR&gt;　エスタにはSeeDではなくSeeDの補佐のガーデン生として入ったことを一瞬失念していたセルフィは、頬を赤らめてスコールを振り返る。&lt;BR&gt;「……以降、気をつけろ」&lt;BR&gt;　とりあえずは変な気配もないし、ここは大統領の部屋の真ん前だ。大丈夫だろうが、用心するに越したことはない。&lt;BR&gt;　セルフィはぺろっと舌を出して恥ずかしそうに笑い、無言で敬礼だけとった。&lt;BR&gt;「まぁ……なんだ、廊下で立ち話もねぇし、部屋入ろうや」&lt;BR&gt;　気を取り直すようにラグナが提案し、もちろん異を唱える者など誰もいなかった。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;「とりあえず、おまえたちには別行動してもらうことになる」&lt;BR&gt;　人数分用意された椅子に腰掛けると、ラグナはおもむろにそう切り出した。&lt;BR&gt;　以前はこの部屋に椅子などと気の利いたものは見あたらなかったから、格段の進歩だ。&lt;BR&gt;　……もっとも、椅子もスケルトンなので、妙に安定感がなく落ち着かないものではあるのだが。&lt;BR&gt;「今までは警護しやすいようにオレとエルは同一行動をとってたんだが、それだとどっちが相手の狙いかわからねぇからな。オレ担当とエル担当、それぞれ分かれてつかず離れず警護しつつ情報収集。&lt;BR&gt;　まぁ、警護はこいつらがやってくれてるし、おまえらはなるべく派手に情報収集に励んでくれ。一応おまえらはSeeDじゃねぇってことになってるから、警護に力入れてちゃ変だろ？」&lt;BR&gt;　スコールは頷き、隣に姿勢良く座るセルフィを見た。&lt;BR&gt;　背もたれがあるのに寄りかからず背筋を伸ばして座っているのが、彼女らしい。&lt;BR&gt;「じゃぁ、はんちょがラグナ様で、あたしがおねえちゃんかな」&lt;BR&gt;　スコールの視線を受け、あっさりした笑顔で彼女が言ってのけ、スコールはあからさまに嫌な顔をした。&lt;BR&gt;「……なんでだよ」&lt;BR&gt;　スコールは、ラグナが苦手だ。&lt;BR&gt;　おちゃらけた口調も、いい加減に見える態度も、それだけが彼の本質でないことは理解しているつもりだが、それとは別に、自分にその彼の血が流れていること、彼がそれを知りつつ何も語ろうとしないこと、行方を捜そうとせずずっと放置されていたこと……などが複雑な思いを生み出し彼に対してどう接してよいのかがわからないのだ。&lt;BR&gt;「だって、これから２４時間一緒ってことは、かな～りプライベートなとこまで踏み込むってことだよね？&lt;BR&gt;　そしたら同性同士の方が何かと都合いいんじゃないの？&lt;BR&gt;　姿が見えなくなったら女子トイレまで探しに行かなくちゃいけないし～」&lt;BR&gt;「………………女性の要人警護なら経験済みだが」&lt;BR&gt;「でもど～してもおねえちゃんを警護しなくちゃいけない理由はないでしょ。適材適所でしょ～？」&lt;BR&gt;　言い負かされて、スコールはぐっと黙り込んだ。&lt;BR&gt;　ちらっとエルオーネに視線を向ければ、彼女は困ったような顔で懸命に苦笑をこらえている。&lt;BR&gt;　ますますもって、面白くない。&lt;BR&gt;「……えーっと、決まったか？」&lt;BR&gt;　かりかりと頭をかいて、ラグナがスコールを見た。&lt;BR&gt;「ま、なんだ。オレも戦えないってわけじゃねぇから、四六時中くっついてもらうこともねぇし、おまえは気にせず情報収集に励んでくれてかまわねぇから、な」&lt;BR&gt;「………………了解」&lt;BR&gt;　自分の顔が感情を表に出さないことを内心感謝しつつ、スコールは低くつぶやいた。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　その後白いSeeDたちに大統領官邸を案内され、エルオーネ・ラグナのそれぞれの私室と非常時の避難経路の位置関係や警備上の穴となりそうな建物の構造などを二人は頭にたたき込んだ。&lt;BR&gt;　が、数十階にも及ぶ超巨大施設である大統領官邸である。その中をいくつも走っているエレベータで乗り継いだりして移動するわけだが、地図があっても慣れない者は迷子になること確実といった状況である。エスタに入り浸っていたセルフィでさえ、ラグナの行動範囲内に関しては詳しいが、他の階や部屋などは何がどうなっているのか、さっぱりわからない。&lt;BR&gt;　人と機械、そしてオダインの研究の成果である魔法を組み合わせた警備は見る限りはほぼ完璧で、賊が侵入できそうな隙は特に見あたらない。さすがはエスタである。&lt;BR&gt;　それからキロスとウォードに再会し、エスタにおける要人のリストやらラグナ大統領に反抗する組織と目されてる人間のリストなどが入ったディスクデータを手渡された。&lt;BR&gt;「……一晩で暗記」&lt;BR&gt;　スコールに命じられ、セルフィは小さく息をついた。&lt;BR&gt;「りょ～か～い……って言っても、要人リストならもう暗記済みだけどね～」&lt;BR&gt;　もちろん、ここ最近は出入りしてないから覚え直すけどね～、とセルフィが付け加え、スコールは改めて彼女が少し前までエスタによくいたということの意味を考え直した。&lt;BR&gt;「……セルフィ」&lt;BR&gt;「ん、なに～？」&lt;BR&gt;　早くディスクの中を見たいセルフィは上の空だ。&lt;BR&gt;　スコールは気にせず、彼女の腕をとって自分の傍に引き寄せた。&lt;BR&gt;「……え？」&lt;BR&gt;　いきなりの急接近に、セルフィがぎょっと目を見開く。&lt;BR&gt;「な、なに～？？」&lt;BR&gt;　驚きのあまりディスクを落としそうになる彼女を自分の胸の中にぴったり抱き寄せ、身をかがめるようにしてその耳に唇を寄せた。&lt;BR&gt;　もうセルフィの心臓は破裂寸前である。と、スコールの響きの良い低音の声が耳に入り込んだ。&lt;BR&gt;「誰かヤバそうな奴はいたか？」&lt;BR&gt;「…………は？」&lt;BR&gt;　甘いムードとはほど遠い内容に、セルフィは眼をぱちくりとさせる。&lt;BR&gt;　背の低い彼女に合わせるために、かなりの低姿勢になっているスコールが、根気よく繰り返した。&lt;BR&gt;「あんたは一年前まではよく出入りしていたんだろう。顔見知りはいないのか」&lt;BR&gt;「……あ、え、あ、そゆこと？」&lt;BR&gt;　やっとセルフィもスコールの真意をくみとる。&lt;BR&gt;　これだけ完璧な警護を敷くエスタ大統領を狙う存在、それは内部にいる可能性も高く、スコールはそれを考慮にいれて声高に話をしないようこんな体勢をとっているのだ。&lt;BR&gt;（そ、そらそうやね～……び、びっくりした……）&lt;BR&gt;　男女でスパイ目的に他国に入ったSeeDが恋人同士を装うことなど珍しくもなんともない。期待する方が馬鹿である。&lt;BR&gt;（…………期待……？）&lt;BR&gt;　そこまで考えてセルフィはちょっと顔をしかめる。期待なんてするはずがない。&lt;BR&gt;　自分にとってスコールは大切な幼なじみでSeeDの仲間。それ以上でもそれ以下でもない。&lt;BR&gt;「セルフィ？」&lt;BR&gt;「……あたしが」&lt;BR&gt;　怪訝な声を出すスコールに、セルフィは慌てて口を開いた。&lt;BR&gt;「あたしがここに出入りしてた時は～、特に変な動きはなかったよ～。大統領選挙もその頃はまだまだだったから、対抗勢力も大人しかったし、何よりエスタが復興中でそれどこじゃなかったし……。&lt;BR&gt;　顔を知っている人はいないわけじゃないけど、向こうがあたしを知ってるかどうかはわかんないな～」&lt;BR&gt;「……ってことは、ここの要人クラスの奴らにはセルフィの面が割れている可能性が高いってわけだな。あとでラグナの方に確認した方がいいだろうな、セルフィがSeeDであることを知っていたら、今回の計画は意味を成さない」&lt;BR&gt;　セルフィはこくこくと頷いた。スコールはそれを確認し、腕を開いて彼女を解放する。&lt;BR&gt;「でも、そのデータは全部覚えろよ」&lt;BR&gt;「うぇ～……りょーかい～」&lt;BR&gt;　冗談めかして笑いながらセルフィが頷いた。&lt;BR&gt;　丸暗記は彼女の特技のひとつだったりするので、実を言えばそれほど苦でもない作業である。&lt;BR&gt;「――……」&lt;BR&gt;　セルフィの腕から、スコールの手が離れた。&lt;BR&gt;　セルフィは笑顔をそのままに、彼の手の動きをじっと見守ってしまっていた。&lt;BR&gt;「……？」&lt;BR&gt;　そんなセルフィの視線に気づいたスコールは、怪訝に思いながら自分の手と彼女の腕を見比べる。&lt;BR&gt;　何かついているのかと思ったが、そういうわけでもないらしい。&lt;BR&gt;「セル……」&lt;BR&gt;「スコール」&lt;BR&gt;　スコールが口を開くより一瞬早く、セルフィが小さな声で呼んだ。&lt;BR&gt;　大きな翠色の瞳で、スコールの大きな手を見つめたままで。&lt;BR&gt;「どうして、リノアと離れたの？」&lt;BR&gt;　唐突で、単刀直入な質問。&lt;BR&gt;　面食らって、スコールは眼を瞬いた。&lt;BR&gt;　冷やかに拒絶することもできたのに、あまりに意表をついた質問で、完全に言葉を失ってしまっていた。&lt;BR&gt;　セルフィがゆっくりと眼を上げて、スコールのそんな表情を見る。&lt;BR&gt;　一瞬後、はっとしたようにセルフィは息をのみ、慌てたように笑顔を取り繕った。&lt;BR&gt;「あ、あ、ごめん！　何でもない！」&lt;BR&gt;　無意識に右手でスコールのつかんでいた左腕をぎゅっと握り、セルフィは引きはがすようにして彼から顔をそらした。&lt;BR&gt;「あ、あたし部屋、行くね！　これ覚えなくちゃいけないし！　じゃ、またね！」&lt;BR&gt;　早口で叫ぶように言って、スコールが何を言う間もなくその場を走り去って行く。&lt;BR&gt;（………………な、なんだ？）&lt;BR&gt;　いつも不思議なくらい余裕をもった態度のセルフィらしくない。&lt;BR&gt;　廊下にひとり取り残され、スコールはしばし考え込んだ。&lt;BR&gt;　よく考えたら、セルフィの言動が突拍子もないのは今にはじまったことでもない。&lt;BR&gt;　Ｇ．Ｆ．の適合症のことや、離れたトラビアのことなど、精神的に安定した状態でなかったのも知っている。&lt;BR&gt;（疲れてたのか？）&lt;BR&gt;　何となく釈然としないながらもスコールはそう結論づけて、自分もとりあえずあてがわれた自室に入ろうと歩き出しかけて、ふと自分の手に視線を落とした。&lt;BR&gt;　つかんだセルフィの腕の感触がまだ残っていた。&lt;BR&gt;　鍛えているにも関わらず、折れてしまいそうに細い腕。&lt;BR&gt;　リノアのように、女性らしい丸みを帯びているでもない、ただただ細いだけの、腕。&lt;BR&gt;　抱きしめた身体も女性らしいとは言い難かった。無駄なくついた筋肉と骨でできた、戦うための身体。&lt;BR&gt;　腕の中にいた彼女の、表情だけがひどく女だった。&lt;BR&gt;（…………）&lt;BR&gt;　そこまで考えて、ぶんぶんとスコールは大きく首を振った。&lt;BR&gt;　どうやら自分も疲れているらしい。思考がおかしい。&lt;BR&gt;　――――どうしてリノアと離れたの？&lt;BR&gt;　振り回している頭の中で、セルフィがつぶやくように言った言葉がリピートする。&lt;BR&gt;　脳裏に、最後に見た時の黒髪の少女の姿がふとよみがえる。&lt;BR&gt;　冷たい熱を爆発させそうな眼差しで自分を見て、溜め込んだ言葉をたたきつけた美しい少女。&lt;BR&gt;「………………」&lt;BR&gt;　片手でそっと顔を覆い、スコールはその残像を記憶の奥に無理矢理押し込め、短く息をついた。&lt;BR&gt;　静かすぎる廊下に、悲しく響いた。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　その後夕食の席に現れたセルフィは、すっかりいつも通りの明るい笑顔のセルフィで、ほんの少しだけどういう態度をとれば良いか考えていたスコールを安堵させた。&lt;BR&gt;　夕食といってももちろんスコールとセルフィはラグナ達と共に食べるわけではない。彼らは一介のガーデンの生徒という触れ込みなのだ、過剰な接触は控えなくてはならない。&lt;BR&gt;　エルオーネは非常に残念がったが、そればかりはどうにもならなかった。&lt;BR&gt;「……ね、セルフィ。あとで、お散歩に行かない？」&lt;BR&gt;　夕食を終え、自室に戻る際、エルオーネがふと小さな声でセルフィに声をかけた。&lt;BR&gt;「色々、話したいこともたくさんあるし。ホールで待っているから」&lt;BR&gt;　セルフィはきょとんと眼をまるくし、それから少し考えてから頷いた。&lt;BR&gt;「うん、いいよ～！　あたしもおねえちゃんと色々話したいな～！」&lt;BR&gt;「良かった。じゃぁ、またあとでね」&lt;BR&gt;　いつもと変わらない穏やかな微笑を残し、エルオーネはゆっくりと紺色の髪をした白いSeeDをひとり伴い部屋に戻っていった。&lt;BR&gt;　そんな愛娘の姿を見ながら、スコール達が来て以来おかしな様子を見せない彼女にラグナは内心ひそかに安堵する。&lt;BR&gt;　やはり一時のエルオーネの異変は、精神的ショックによるものだったのだろう。&lt;BR&gt;　そう心の中でひとりごち、椅子をひいて立ち上がりながら、ラグナはふっと息をつき、スコールの方へ視線を向けた。&lt;BR&gt;「……デートってわけにゃいかねえけど、あとでオレの部屋まで来てくれ。話がしたい」&lt;BR&gt;　スコールは一瞬思い切り顔をしかめ、それから無表情に戻りつつ敬礼をとった。&lt;BR&gt;　こんなつまらない冗談にいちいち反応しているようでは、修行が足りない。&lt;BR&gt;「了解」&lt;BR&gt;　冷やかな一言に、部屋を出ようとしていたラグナはごくかすかに苦笑した。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　街中にはりめぐらされているリフターに乗って、セルフィとエルオーネはショッピングモールまで遠出することにした。&lt;BR&gt;　白いSeeDたちはつかず離れずで彼女たちの後を追っているはずだ。むろんセルフィも、いざという時のために武器と、Ｇ．Ｆ．のデータが入ったミニコンピュータを携行する。&lt;BR&gt;　他愛ない近況報告と、懐かしい昔話に花を咲かせながら、市街を歩くエルオーネはひどく楽しそうだった。&lt;BR&gt;「ひさしぶりなの、街に出るの。今まで私、こういうにぎやかな所に縁がなかったでしょう。ひとりで出るのは緊張するし、まさかラグナおじさんやキロさんたちについてきてもらうわけにもいかないし……」&lt;BR&gt;　もちろん、ラグナは可愛い愛娘のためなら政務など放り出してどの街にだってついて行っただろうが、街の中にすらモンスターが出る有様のエスタにおいて、たったひとり希望の光と慕われる大統領が護衛のひとりもつけずに街に降りようものなら、大変な騒ぎになるのは眼に見えている。&lt;BR&gt;　謎の襲撃者に襲われるまでは白いSeeDたちはエスタにいなかったし、襲撃後は危なくてとても外になど出られなかった。&lt;BR&gt;　セルフィという、SeeDの中でも指折りの精鋭が共にいて、はじめて叶った外出だった。&lt;BR&gt;「だから、お部屋じゃなくて、お散歩しながらお話、なんだ～？」&lt;BR&gt;　目立たないよう私服に着替えたセルフィが、エルオーネの先を歩きながら笑顔で振り返る。&lt;BR&gt;「えぇ、そう……。ごめんね」&lt;BR&gt;「？？　なんであやまってるの？」&lt;BR&gt;　本気で疑問の表情を浮かべ、セルフィはくるんと眼をまるくする。&lt;BR&gt;「あたしはおねえちゃんとお散歩楽しいし、おねえちゃんが喜んでくれるならもっと嬉しいよ～。それって、なんか、悪いこと、なのかな～？」&lt;BR&gt;　邪気のない眼差しをまっすぐに受けて、エルオーネの頬に微笑が戻った。&lt;BR&gt;　妹同然の彼女の優しい気持ちが、温かく嬉しい。&lt;BR&gt;　エルオーネの笑顔に、ぱっと明るく笑ったセルフィは、ひょこひょこと楽しげな足取りで街を歩いていく。&lt;BR&gt;　その背中を見つめていたエルオーネは、ややしてふと気配を感じて振り返った。&lt;BR&gt;「……？」&lt;BR&gt;　いぶかしげな表情が、自分を見据える蒼い瞳に眼をとめ凍り付く。&lt;BR&gt;　棒を飲んだように、彼女はその場で立ちつくした。&lt;BR&gt;　知らないはずの瞳に、射すくめられて動けない。&lt;BR&gt;　蒼い瞳以外のすべての景色が消え去っていた。&lt;BR&gt;&lt;BR&gt;「……ちゃん……おねえちゃん……？」&lt;BR&gt;　どれほどそうして自失していたのか、エルオーネは自分を呼ぶ気づかわしげな声に我に返った。&lt;BR&gt;　まるで明け方見た夢から覚めたように、前後の記憶がさっくりと抜け落ちていた。&lt;BR&gt;「……セルフィ……」&lt;BR&gt;　心配そうに顔をのぞき込んでいる、歳下の少女にようやく気がついた。&lt;BR&gt;「おねえちゃん、どうしたの～？　具合でも、悪いの？」&lt;BR&gt;　だったらもう官邸に戻ろうかとたずねる少女に、エルオーネは静かに微笑して首を振った。&lt;BR&gt;「いいえ……大丈夫。少し、ぼんやりしてしまっただけだから」&lt;BR&gt;「……そ～う？」&lt;BR&gt;　首をかしげながら、セルフィはエルオーネの微笑に何か引っかかりを覚えていた。&lt;BR&gt;　いつものエルオーネの笑顔と少し違う。……何か……そう、「温度」が違う。&lt;BR&gt;　決して冷笑しているわけではないのに、いつも感じる温かさが感じられない。温度のない、ただ静かなだけの、微笑。&lt;BR&gt;　それはいつものエルオーネの笑顔を知るセルフィにとって、異質にしか感じられなかった。&lt;BR&gt;「でも、やっぱり今日は帰ろうよ～。時間は、まだあるんだし、ね？」&lt;BR&gt;　おかしいのが自分なのか、エルオーネなのかがわからず、セルフィはとにかく気分を変えたい一心でそう提案した。&lt;BR&gt;　エルオーネが小首をかしげてくすくすと笑う。&lt;BR&gt;「セルフィはせっかちなのね。それとも、スコールと一緒の方が良かった？」&lt;BR&gt;「？」&lt;BR&gt;　突然スコールの名を出され、セルフィは一瞬きょとんとする。&lt;BR&gt;　別に自分はスコールがここにいないからという理由で、早く帰りたがっているわけではない。&lt;BR&gt;　エルオーネは、自分とリノアを間違ってでもいるのだろうか？&lt;BR&gt;　そんな疑問を顔に浮かべるセルフィを、今度はエルオーネがいたずらっぽく笑いながらのぞきこんだ。&lt;BR&gt;「ねぇ、セルフィ。どうして、今回の任務にあなたが選ばれたか、わかる？」&lt;BR&gt;「……え？」&lt;BR&gt;　唐突な質問に首をかしげた瞬間、頭の中が一瞬ざわつき、直後くらりと視界が揺れた。&lt;BR&gt;（え？）&lt;BR&gt;　眼の前にはエルオーネがいる。エルオーネの冷えた蒼い瞳がじっと自分に向けられている。&lt;BR&gt;　温度の感じない、無機質な眼差しでまっすぐ見ている。&lt;BR&gt;（な、なに～…？）&lt;BR&gt;　エルオーネの瞳以外のすべての景色が白い闇に染め上げられていく。&lt;BR&gt;「……セルフィ？　……ねぇ、聞いている？」&lt;BR&gt;　静かなエルオーネの問いかけに、答える余裕もなかった。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　その頃、大統領官邸では、スコールが相変わらずの仏頂面のまま、ラグナの前で直立不動の姿勢を保っていた。&lt;BR&gt;　もちろんラグナは私室に入るなり椅子を勧めたのだが、あくまでもSeeDとして以外の態度で接するつもりのないスコールはにべもなくそれを断り、ラグナを非常に落胆させたのだった。&lt;BR&gt;「セルフィのことは、オレは心配ねーとは思ってるよ。確かに一時期よく来ていたけど、オレは他の奴らにセルフィをSeeDだと紹介したことは一度もねーし。SeeDの制服で来たことも一度もなかったし」&lt;BR&gt;　ここでラグナは、覚えていたのはキロスだけどな、と付け加えた。&lt;BR&gt;　ラグナ自身は他人が何を着ていようとまったく気にしない性質なので、覚えていようはずがない。&lt;BR&gt;「それによ、もし敵が複数人数の組織だとして、そいつらが官邸の中をウロウロしてるような事態だったら……こんな小細工が、ハナから通用するはずもねーだろ？」&lt;BR&gt;　あっさりと言い切られ、スコールは思わず嘆息した。&lt;BR&gt;　表向きの作戦は、敵が外部の人間であることを想定した囮作戦。それは保険にすぎず、万が一内部の人間が絡んでいた場合は正攻法で戦えと言っているわけだ。&lt;BR&gt;　そして、事態はそうなった場合の方がより深刻であり、エスタ側としては囮作戦が見破られる危険性よりも戦闘能力において優れた戦闘要員を手元に置いておく方が有利であると判断したのだ。&lt;BR&gt;　高い戦闘能力を保持し、プラス諜報活動においても優秀で、大統領と面識があり、年若く一見して傭兵にはとても見えない外見を持ち、比較的すぐに動くことのできる人間。&lt;BR&gt;　バラムに優秀なSeeDは多くいるが、これだけの条件を兼ねそろえた人材はそうはいない。スコールの外見がただのガーデン生に見えるかどうかは疑問が残るものの、大統領の息子であり、不思議の力を持つエルオーネの『弟』であるスコールは、やはり手元にほしいだろう。&lt;BR&gt;「んな、小難しいこと考えてんなって～！」&lt;BR&gt;　スコールの無表情から何を読みとったか、ラグナが盛大に苦笑して大きな手をひらひらと振った。&lt;BR&gt;「囮作戦にしろ、正攻法で行くにしろ、要は敵さんが誰かを見つけて、とっ捕まえるなりぶっつぶすなりすりゃいいってだけなんだからな、もっと明るくシンプルに考えようぜぇ～！」&lt;BR&gt;「……君の単純すぎる思考回路を人に押しつけるな」&lt;BR&gt;　ボソっとキロスが入れた突っ込みに、スコールは内心深々と同意した。&lt;BR&gt;　……一応事実として認識はしているが、果たしてこの男の遺伝子が自分に入っているものなんだろうか。&lt;BR&gt;　エルオーネの能力なんかより、スコールにはそのことの方がよっぽど不思議な現象に思えてならない。&lt;BR&gt;「うるっせえな～！　でもよ、うまくおまえら両方とも来てくれてホント良かったぜ。他の任務に出かけちまってたら、いくらエルの頼みでもどうしようもねぇもんなぁ～！」&lt;BR&gt;　あっけらかんと放たれたラグナの言葉に、スコールは形の良い眉を片方だけぴくりと上げた。&lt;BR&gt;「…………俺たちをエスタに呼んだのはエルオーネなのか？」&lt;BR&gt;「おう、呼ぶならスコールとセルフィをってな。で、それを聞いてキロスが今回の作戦を考えたってわけだ」&lt;BR&gt;　言いながら、ラグナはふと、エルオーネの不自然な言動を思い出していた。&lt;BR&gt;　スコールとセルフィをエスタに派遣してもらおうと提案したエルオーネ。&lt;BR&gt;　セルフィはともかくスコールは嫌がるだろうと笑ったラグナに、駄目で元々、スコールはSeeDとしても頼りになるし何より自分と接する時間を少しでも多く持った方が良いのだとむきになって言い募り説得した。&lt;BR&gt;　そこまでしたというのに、エルオーネは突然そのことを忘れてしまったような言動を取り始めたのだ。&lt;BR&gt;　疲れていたとか、精神的ショックを受けたからとか、色々と理由は考えられるが、どうも引っかかって仕方がない。&lt;BR&gt;　もちろん、多分にエルオーネに対して過保護な面がそう感じさせている感も否めないのだが。&lt;BR&gt;「……エルオーネに、気をつけてやってくれねえか？」&lt;BR&gt;　あれこれと考えながら、ラグナは視線を上げスコールにそう言っていた。&lt;BR&gt;　どうしても、エルオーネが気にかかる。何に気にかかるのか、明確にならないから尚更もどかしい。&lt;BR&gt;「……」&lt;BR&gt;　対して、スコールはわずかに怪訝そうな表情を見せただけで、特には何も返答しなかった。&lt;BR&gt;　もしかしたらただの過保護親父のたわごとと受け取られているのかもしれない。&lt;BR&gt;　考えて、ラグナは苦笑いを唇に浮かべた。&lt;BR&gt;　なんとなく会話が途切れ、スコールが自分から会話を振るわけもなく、妙に居心地の悪い沈黙が部屋を満たした。&lt;BR&gt;「……それじゃ……俺はこれで……」&lt;BR&gt;　ついに音を上げたのはスコールで、聞きたいことも聞けたし当面の動き方も把握したし退室しようと口を開きかけたその時、前触れなく扉が大きく開いた。&lt;BR&gt;　大統領の自室は許可のない者は簡単に開けないようになっている。驚いて振り向いたスコール達の前に飛び込んできたのは、部屋の前に立っていたはずのウォードと、ラグナに付いている白いSeeD２名だった。&lt;BR&gt;「大統領、街で例のＧ．Ｆ．が……！」&lt;BR&gt;　青ざめた彼らが叫んだ一言に、スコール達の表情が一瞬にして険しくなった。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　……夢を見ていた。&lt;BR&gt;　とても幸せな、懐かしい夢を見ていたような気がした。&lt;BR&gt;　眼を覚ました瞬間に、広がっていたはずの光景は霧が晴れるように消え去り、余韻すらも残らなかったけれど。&lt;BR&gt;「……あれえ～……？」&lt;BR&gt;　眼を開くと、いきなり見慣れない透けた床が一面に広がっていて、セルフィは寝ぼけた声をあげた。&lt;BR&gt;　もそもそと床に腕をつき身を起こす。ここがどこだかもよくわからない。&lt;BR&gt;「……えぇと……あ、ここ、エスタ……？」&lt;BR&gt;　スケルトンの、どこか有機的なデザインの部屋は、エスタ独特のものだ。&lt;BR&gt;　ようやく頭が回転しはじめる。そう、自分はスコールと共に任務のためにエスタに入ったのだ。この部屋は官邸の中で自分にあてがわれた部屋。ちゃんと覚えている。&lt;BR&gt;「で、なんであたし、床に寝てるの～？」&lt;BR&gt;　どこへともかく問いかけてしまう。床で寝た記憶はない。&lt;BR&gt;　たしか……そう、エルオーネと一緒に街に出たのだ。市街に降りて……それからどうしただろう？&lt;BR&gt;（あれ？　あれ？　あれれ～？？）&lt;BR&gt;　市街に降りたところまでは覚えている。エルオーネと何か話をしたことも。&lt;BR&gt;　けれど何を話したのか。いつ官邸に戻りいつ部屋に入ったのか。そのあたりがはっきりしない。&lt;BR&gt;　酔っぱらったわけでもないのに、こんなふうに記憶が飛んでしまうなんてこと、あるんだろうか。&lt;BR&gt;　にわかに慌てて、セルフィは立ち上がろうとして、自分の服に改めて視線を向けさらに驚いた。&lt;BR&gt;　黄色いワンピースに、赤い花が咲いていた。&lt;BR&gt;（これ、多分……ていうか間違いなく、血、やね……？　ど、どこでついたんやろ～？）&lt;BR&gt;　とりあえず自分の身体を手で触って確認する。どこも怪我はしていないようだった。&lt;BR&gt;　あるいは、怪我をして、誰かに（もしくは自分で？）ケアルをかけられ回復したか。&lt;BR&gt;「あっ、エルおねえちゃん……」&lt;BR&gt;　混乱した頭がはたと最後に一緒にいたはずの女性の存在を思い出した。&lt;BR&gt;　自分がこんな血糊を服につけて床で寝ているなんて、エルオーネの身に何かあったのではないだろうか。&lt;BR&gt;　そう考えて、セルフィはわたわたと飛び起きて、一挙動でヌンチャクを手に取り部屋を飛び出した。&lt;BR&gt;　――と。&lt;BR&gt;「うわっ」&lt;BR&gt;　今まさに部屋の呼び鈴を押そうとしていたスコールと、ドアの前で正面衝突してしまった。&lt;BR&gt;「きゃっ」&lt;BR&gt;　勢いがついていた上に体重が軽いため、びくともしないスコールと対照的に、セルフィは思い切り床に尻餅をついてしまう。&lt;BR&gt;「大丈夫か？」&lt;BR&gt;　なんだか以前にも似たようなことがあったな、と思いながらスコールはセルフィを案じ、彼女を見下ろして眉をひそめた。&lt;BR&gt;「……何かあったのか」&lt;BR&gt;　黄色のワンピースに飛び散っている、血痕。&lt;BR&gt;　ふつうの状態で、つくはずのないそれ。&lt;BR&gt;　セルフィはスコールを見上げ、なんと返答したものか言葉に迷い、それからはたと違うことに気が付いた。&lt;BR&gt;「スコールこそ、なんかあったの？」&lt;BR&gt;　腕時計を見てみれば、真夜中をすぎている。&lt;BR&gt;　そんな時間にいきなりセルフィを訪ねてくることが、そもそも尋常なことではない。&lt;BR&gt;「……街で市民が襲われた。例のＧ．Ｆ．らしい」&lt;BR&gt;　険しい表情のままで短くスコールが答える。セルフィが大きく眼をみはった。&lt;BR&gt;　うそ、と小さく唇が震え、次の瞬間、彼女は猛然と飛び起き走り出していた。&lt;BR&gt;「セルフィ！？」&lt;BR&gt;　唐突な動きに、一瞬出遅れたスコールが慌てて後を追う。&lt;BR&gt;　街で起きた事件といい、セルフィの様子といい、何もかもがおかしい。&lt;BR&gt;　もちろん、セルフィの頭の中はエルオーネの安否でいっぱいで、スコールの声に返事をする余裕などかけらもなかった。&lt;BR&gt;　市街に降りた自分とエルオーネ。血痕のついた服をきて部屋の床で倒れていた自分。そして街で起きたＧ．Ｆ．の市民襲撃。&lt;BR&gt;　思考が最悪の事態をどうしても考えてしまって、いても立ってもいられなかった。&lt;BR&gt;「あっそうだ……！」&lt;BR&gt;　焦っていて失念していたが、セルフィの部屋はエルオーネの部屋と真裏に位置し、壁についている装置を動かせば直接入ることができる。&lt;BR&gt;　今更ながらにそのことに気がつき、慌てて部屋の中にとって返したセルフィは壁を動かし、エルオーネの部屋に飛び込んだ。&lt;BR&gt;「おねえちゃん！！」&lt;BR&gt;「……なぁに？」&lt;BR&gt;　予想に反して、少しだけ驚いたようなエルオーネの声がセルフィを出迎える。&lt;BR&gt;　ベッドに腰掛けくつろいでいたらしいエルオーネの姿に、きょとんとしてセルフィが立ち止まった。&lt;BR&gt;「あ、あれ～？」&lt;BR&gt;「やだ、セルフィ。どうしたの、怪我でもしたの？」&lt;BR&gt;　エルオーネがベッドから立ち上がり、セルフィの服についた血痕に顔色を変える。&lt;BR&gt;　セルフィは慌てて首を振った。&lt;BR&gt;「怪我はしてないよ～。……気が付いたら、ついてたの～」&lt;BR&gt;「気が付いたら？　別れた時にそんな血、ついていなかったわよ？」&lt;BR&gt;「え？」&lt;BR&gt;　大丈夫という言葉にも簡単に安心せず、手で直接触れてセルフィの怪我の有無を確認するエルオーネに、セルフィは驚いて言った。&lt;BR&gt;「あ、あのね、おねえちゃん、あたし、いつ部屋に帰ってきたの？」&lt;BR&gt;　その言葉に、エルオーネは手を止めてセルフィの顔をのぞきこんだ。&lt;BR&gt;「覚えていないの？」&lt;BR&gt;　セルフィが頷くと、エルオーネはますます心配そうな顔になって首をかしげた。&lt;BR&gt;「市街で話をしていたら、セルフィが突然具合が悪くなったって言って、それで急いで官邸に戻ってきて、私が部屋まで送ってベッドに寝かせたのよ。ね？」&lt;BR&gt;　言ってエルオーネは、ベッドの傍らに立つ白いSeeDに向けて同意を求めた。&lt;BR&gt;　さらりと紺色の髪を揺らして頷く長身の彼は、エルオーネに付いている護衛のSeeDだ。&lt;BR&gt;　街に出たときも、このSeeDが付かず離れず付いてきていたことを、セルフィも覚えている。&lt;BR&gt;　エルオーネは彼が頷くのを確認して、またセルフィに視線を戻した。&lt;BR&gt;「意識はしっかりしてるようだったのに……本当に何も覚えていない？」&lt;BR&gt;　セルフィは、もう一度強く頷いた。&lt;BR&gt;　エルオーネの話からすると、どうやら一度部屋に戻りベッドに入ったにも関わらず、また起きて歩いてどこかで血痕をつけた挙げ句床に倒れていたということらしい。&lt;BR&gt;（……あたし……夢遊病やったりしたんかなぁ～？）&lt;BR&gt;　首をひねりつつ、セルフィはとにかくエルオーネを安心させようと、とびきりの笑顔を作ってみせた。&lt;BR&gt;「えへへ、あたしちょっと寝ぼけてたみたい！　きっと寝ぼけてベッドから落ちて怪我して、自分でケアルかけたのかな。もう頭起きてるからだいじょ～ぶ！　怪我もしてないし！」&lt;BR&gt;　そうして笑顔のままスコールを振り返った。&lt;BR&gt;「はんちょ、あたし着替えて街おりてみる。うわさ話とか色々、拾ってくるね～！　もしかしたら、まだ街のどこかにいるかもしれないし～……はんちょは、ラグナ様とおねえちゃんをよろしく～！」&lt;BR&gt;　人々から上手に話を聞き出すのは、人懐っこく警戒心を呼ばない外見を持つセルフィが適任だ。&lt;BR&gt;　スコールもそう思ってセルフィを呼びに来たのだが、肝心のセルフィがなんだか訳のわからない状態なので不安要素が大きい。&lt;BR&gt;「……本当に大丈夫なのか？」&lt;BR&gt;「うん！　だいじょ～ぶだいじょ～ぶ！」&lt;BR&gt;　言い切れる要素などかけらもなかったが、セルフィはとにかく明るく笑って大きく何度も頷いた。&lt;BR&gt;　そう言い切られてしまえば、スコールも強硬に反対するわけにもいかない。&lt;BR&gt;「……わかった。行って来てくれ。何かあったら連絡する」&lt;BR&gt;　言いながら小さな通信機をセルフィに手渡す。セルフィがにこっと笑った。&lt;BR&gt;「じゃ、ちょっと着替えて行ちきます！」&lt;BR&gt;　ぴしっと敬礼をして、セルフィは壁の装置を動かし自分の部屋へと戻っていった。&lt;BR&gt;「……」&lt;BR&gt;　後に残されたスコールは、複雑な表情でエルオーネを見る。&lt;BR&gt;　視線を受けたエルオーネは、少し困ったような不安げな顔で、そんなスコールを見返した。&lt;BR&gt;「で……何があったの？」&lt;BR&gt;　今更ながらおもむろにそう尋ねたエルオーネに、スコールは吐息をつきながら手を差し出した。&lt;BR&gt;「……ラグナの部屋で話そう」&lt;BR&gt;　なんだか訳のわからないことばかりが起きている。眼に見える形であれ、見えない形であれ。&lt;BR&gt;　面倒ごとになりそうな予感を抱え深刻そうな顔つきのスコールに、エルオーネはかけるべき言葉も見つけられずそっと自分の手を彼にゆだねた。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　ガーデンの制服に着替えたセルフィは、白いSeeDとスコールに官邸を任せ、市街へと降りた。&lt;BR&gt;　官邸を出る際にあたりの気配を探ってみたが、殺気などは感じられなかった。&lt;BR&gt;（そやけど、なんで市街を狙ったんやろ～？）&lt;BR&gt;　敵の目標はラグナとエルオーネだと思っていたのだが。&lt;BR&gt;　あれこれ考えながら、事件現場の近くまで行ってみると、大事件が勃発したというわりには野次馬がほとんどいず、警備隊とエスタの軍人がいるのみだった。&lt;BR&gt;　半透明の地面には、まだ生々しくおびただしい量の血痕が残っていた。&lt;BR&gt;　セルフィはそっと吐息をつきながら、誰にともなくぽつりと呟く。&lt;BR&gt;「……生きてる人、いるのかなぁ～？」&lt;BR&gt;『残念ながら、全員即死状態だったらしい』&lt;BR&gt;　耳につけた小さなピアス状の通信機から、スコールの冷静な声がすぐに返ってくる。&lt;BR&gt;　セルフィはまた小さく息をつき、それから気を取り直してぐるりとあたりを見回した。&lt;BR&gt;「はんちょ、どうしよう？　誰もいないよ～」&lt;BR&gt;『……月の涙以降、不穏な気配を感じたら戸締まりする癖がついているのかもな』&lt;BR&gt;　溜息まじりのスコールの声に、セルフィも短く嘆息した。&lt;BR&gt;『街の方に気配はあるか？』&lt;BR&gt;「ううん、全然。すご～く静かだよ。ね、犠牲者って何人～？」&lt;BR&gt;『３人らしい』&lt;BR&gt;　血痕の量から３～４人と見当をつけていたセルフィは、やれやれと首をふった。&lt;BR&gt;　一体何が目的でこんなことをしているのやら。&lt;BR&gt;　今夜はこれ以上の収穫は望めそうもなかったが、セルフィはとりあえず街を一回りしてから官邸に戻ることにした。途中数人エスタ市民に出会えればしめたもの、現場を見てきたとリポートのひとつもして、Ｇ．Ｆ．を操っている人間がいるらしいとでも吹き込んでおけば、放っておいても官邸に保護してもらおうと目撃者がやってくるはずだ。&lt;BR&gt;「んじゃはんちょ、とりあえず街一周してから戻ります！」&lt;BR&gt;『了解。気をつけて帰ってこい』&lt;BR&gt;「らじゃ！」&lt;BR&gt;　無愛想なスコールの声に明るく答え、セルフィは半透明の街を軽やかに走った。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;「街に異常はないらしい」&lt;BR&gt;　セルフィの通信を受け、ごく静かな声でスコールが部屋の中央に立つラグナに報告する。&lt;BR&gt;　さすがに厳しい眼差しのラグナは何も答えず、代わりにキロスが息をついた。&lt;BR&gt;「被害者が全員死亡しているのが……辛いな」&lt;BR&gt;　重傷であっても、せめて生きてさえいれば、エルオーネが被害者に面会し過去に誰かを送って調査する方法もとれたのだが。&lt;BR&gt;　エスタに足を踏み入れてからずっと官邸にばかりいたエルオーネが、街に知り合いなどいるはずもなく、被害者と面識がある可能性は万に一つもなかった。&lt;BR&gt;「エルオーネ……」&lt;BR&gt;　キロスの言葉に、スコールはふと口を開いていた。&lt;BR&gt;「さっき街におりた時、様子とかおかしく感じたりはしなかったか？」&lt;BR&gt;　部屋の隅で椅子に座っていたエルオーネが、スコールの声に顔を上げた。&lt;BR&gt;　繊細な美貌に色濃い疲労を浮かべ、彼女は申し訳なさそうに首を横に振った。&lt;BR&gt;「ごめんなさい……セルフィのこともあって、あまり周りもよく見ていなかったから……」&lt;BR&gt;「あまり長い時間いなかったしな」&lt;BR&gt;　紺色の髪の白いSeeDがエルオーネに同意する。&lt;BR&gt;「そうか……そうだよな」&lt;BR&gt;　構わないと頷いてみせ、スコールはそっと眉を険しくした。&lt;BR&gt;「しかし、何が狙いなんだろう……？」&lt;BR&gt;　敵の狙いは大統領ラグナの命ではなかったのか。&lt;BR&gt;　独白したスコールに、キロスが冷静な声で答える。&lt;BR&gt;「ラグナではなく大統領を狙っているのなら、わからなくもないだろう。&lt;BR&gt;　信用も、大統領の命のひとつだ」&lt;BR&gt;　ラグナを英雄視するエスタ国民の信用を失墜させ、ラグナを大統領の座から引きずり落としたい者、事件の多発で国力が完全回復していないと他国に認識させ、国際的なエスタの位置をおとしめたい者。まったくいないとは限らない。&lt;BR&gt;「恨まれやすい商売だよなあ～大統領って苦労多いのによ～」&lt;BR&gt;「苦労しているのは君ではなくむしろ我々なんだがね」&lt;BR&gt;　大きくのびをして言葉と裏腹に平和そうな口調で愚痴をこぼす大統領に、キロスが横目でじろりと睨んだ。&lt;BR&gt;「へいへい……」&lt;BR&gt;　肩をすくめてラグナは苦笑し、ゆっくりと視線を窓の外へと向けた。&lt;BR&gt;「……明日は忙しくなりそうだな」&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　日が昇り、エスタの国民がその事件を知るところとなると、ラグナの予言通り官邸には不安を覚えたエスタ市民達が押し掛けてきててんやわんやの騒ぎとなってしまった。&lt;BR&gt;　一応名目上はガーデン生のスコールとセルフィはもちろんその対応にかり出され、膨大な噂話と目撃証言に耳を傾け続け、情報処理に頭をフル回転させる羽目になっていた。&lt;BR&gt;「……一体、何人に会って何を言ったんだ？」&lt;BR&gt;　集団ヒステリーの様相を呈しているその有様に、うんざり顔でスコールがセルフィに問いかける。&lt;BR&gt;「ないしょ～」&lt;BR&gt;　ぺろっと舌を出し、セルフィはいたずらっぽく笑うだけで何も答えなかった。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;&lt;/SPAN&gt;

<script data-viewer-zoom-script>
(() => {
  const stage = document.querySelector('.viewer-stage-image');
  const image = stage ? stage.querySelector('.viewer-image') : null;
  if (!stage || !image) {
    return;
  }

  const setZoom = (enabled) => {
    stage.classList.toggle('is-zoomed', enabled);
    image.setAttribute('aria-pressed', enabled ? 'true' : 'false');
    if (enabled) {
      const naturalWidth = image.naturalWidth || image.clientWidth || 0;
      const targetWidth = naturalWidth > 0
        ? Math.max(naturalWidth, Math.min(Math.round(stage.clientWidth * 0.92), naturalWidth * 4))
        : Math.round(stage.clientWidth * 0.92);
      image.style.width = `${targetWidth}px`;
      image.style.maxWidth = 'none';
      image.style.maxHeight = 'none';
      requestAnimationFrame(() => {
        stage.scrollTop = 0;
        stage.scrollLeft = Math.max(0, Math.round((image.scrollWidth - stage.clientWidth) / 2));
      });
    } else {
      image.style.removeProperty('width');
      image.style.removeProperty('max-width');
      image.style.removeProperty('max-height');
      stage.scrollTop = 0;
      stage.scrollLeft = 0;
    }
  };

  const toggleZoom = () => {
    setZoom(!stage.classList.contains('is-zoomed'));
  };

  image.setAttribute('tabindex', '0');
  image.setAttribute('role', 'button');
  image.setAttribute('aria-label', '逕ｻ蜒上ｒ諡｡螟ｧ縺ｾ縺溘・邵ｮ蟆・);
  image.setAttribute('aria-pressed', 'false');

  image.addEventListener('click', toggleZoom);
  image.addEventListener('keydown', (event) => {
    if (event.key === 'Enter' || event.key === ' ') {
      event.preventDefault();
      toggleZoom();
    }
  });

  stage.addEventListener('click', (event) => {
    if (event.target === stage && stage.classList.contains('is-zoomed')) {
      setZoom(false);
    }
  });

  window.addEventListener('keydown', (event) => {
    if (event.key === 'Escape' && stage.classList.contains('is-zoomed')) {
      setZoom(false);
    }
  });
})();
</script>
