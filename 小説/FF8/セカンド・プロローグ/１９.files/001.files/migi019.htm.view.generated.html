      width=537&gt;&lt;SPAN&gt;&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　穏やかな昼下がり、ガルバディア領の田舎町ウィンヒルに、巨大な飛空挺が着陸した。&lt;BR&gt;　よそ者を極端に嫌う村人達は当然警戒したが、それが赤い機体のラグナロクであることを知り、皆一様に安堵して家の中に入っていく。&lt;BR&gt;　あの赤いラグナロクに乗ってウィンヒルにやってくるのが、今は亡きレインの忘れ形見である青年か、その義姉であることを知っていたからだ。&lt;BR&gt;　他人に干渉することを好まない村人達は、だから家にこもる。&lt;BR&gt;　誰の眼も気にすることなく、あの二人がこのウィンヒルを自由に歩くことができるように。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　ウィンヒルのはずれに着陸したラグナロクから出てきたのは、村人の予想通り、レインの実子スコールだった。&lt;BR&gt;　いつもと様子が違うのは、彼が押している車椅子だ。&lt;BR&gt;　エスタ独特のデザインを持つ車椅子にちょこんと座って、翠の瞳をきらきら輝かせてセルフィは辺りを見回している。&lt;BR&gt;　多忙な彼女がウィンヒルを訪れるのは、実に一年ぶりのことだった。&lt;BR&gt;&lt;BR&gt;　にこにことご機嫌で辺りを見回すセルフィを見下ろしながら、スコールはやれやれと内心で溜息をつく。&lt;BR&gt;　直滑降になった彼女のご機嫌を回復させるために、新たにかわされた約束は、エスタで評判になっているという有名なケーキ屋のケーキバイキングご招待（なぜかリノア達も一緒にという条件だった）と、レインのお墓参りだった。&lt;BR&gt;　どうしても、絶対、何がなんでもすぐにお墓参りに行くのだと強硬に主張し、Ｇ．Ｆ．適合症精密検査終了後、強引に主治医から外出許可まで取り付けてしまったセルフィの行動力には、毎度頭が下がる思いだが。&lt;BR&gt;（なんで墓参りなんだ？）&lt;BR&gt;　別にレインの命日が迫っているというわけでもないし、体力が完全に戻っていない身体をおしてまで、早急に来なければならない理由があるようにも思えない。&lt;BR&gt;　それでも、分が悪いのは当然スコールなので、セルフィを押しとどめることなどできずに、こうして来てしまった訳なのだが。&lt;BR&gt;（……考えてみたら、墓参りなんて久しぶりだな）&lt;BR&gt;　考えて、車椅子を押している自分の手をちょっと見つめる。&lt;BR&gt;　そこにはあの日、ラグナから借りたままの銀色の指輪が静かに光っていた。&lt;BR&gt;（なぁレイン……俺、あんたに聞きたいことがあったんだ……）&lt;BR&gt;　もし彼女が生きているなら。&lt;BR&gt;　たったひとつ、どうしても彼女の言葉で、教えてほしいことが。&lt;BR&gt;&lt;BR&gt;「えっと、お墓ってあっちの方なんだよね～」&lt;BR&gt;　途中で寄った花屋で購入した花束を大事に膝に置いたセルフィが、草原の方を指さした。&lt;BR&gt;　レインが愛したという花咲く草原に、彼女の墓がある。&lt;BR&gt;「車椅子で行ったら危険かな～？」&lt;BR&gt;　丈高い草なども多いし、何より花をひきちぎってしまうかもしれない。&lt;BR&gt;　思案して、セルフィはスコールの返事を待たずによいしょと車椅子から立ち上がった。&lt;BR&gt;　まだ少しふらつくこともあるが、セルフィ本人の努力の甲斐もあってだいぶ以前の調子は取り戻しつつある。車椅子だって、過保護で心配性のどこかの誰かさんが強硬に乗れと主張したから仕方なく乗っていただけのことだ。&lt;BR&gt;「……だめだ」&lt;BR&gt;　だが、草に足をとられて転ぶようなことがあってはならないと、スコールが冷静に彼女を止めた。&lt;BR&gt;　慎重に歩いてくれるならともかく、ちょっと眼を離すとすぐに飛んだり跳ねたりする少女だけに、スコールとしては過剰なくらい心配して丁度だという考えもある。&lt;BR&gt;　つまらなさそうにセルフィが振り返った。&lt;BR&gt;「えぇ～？　ダメ～？　じゃあどうするの～？」&lt;BR&gt;　まさかこんな所からお参りしろなんて言うんじゃないよね？　と言外に語っている翠の瞳に、スコールはちょっと苦笑を返して思案した。&lt;BR&gt;「……そうだな」&lt;BR&gt;　言って、セルフィの細い腕をつかんで引き寄せる。&lt;BR&gt;「え？　……わぁ！」&lt;BR&gt;　引き寄せられ、一瞬のうちにスコールの両腕に抱き上げられてしまったセルフィが、びっくりしたように声を上げた。&lt;BR&gt;　よいしょと両腕の位置を変えて上手に抱き直し、スコールはセルフィを見つめてにやりと笑った。&lt;BR&gt;「落ちるなよ」&lt;BR&gt;　両腕二本のみで身体を支えるのだから、抱えられ慣れていないとなかなか体勢を安定させるのは難しい。&lt;BR&gt;　とりあえず、自分の方でも身体を支える努力は必要らしいと、セルフィはおずおずとスコールの首に腕を回し身体を支えてみる。&lt;BR&gt;「重くない～？」&lt;BR&gt;　歩き出したスコールに、思い出したようにセルフィが訊ねる。&lt;BR&gt;　入院生活でさらに体重が軽くなったセルフィの問いかけに、スコールは小さく肩をすくめた。&lt;BR&gt;「……もう少し太れ」&lt;BR&gt;　これではＧ．Ｆ．適合症検査をクリアしたとしても、ＳｅｅＤ復帰には長い道のりになりそうだ。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　見えない足下に注意を払いながら進んでいたスコールは、そのため墓のところに人影があることに気づくのが遅れた。&lt;BR&gt;　自分たちを待っているらしいその人物の姿を眼に留め、むっとスコールが眉を寄せる。&lt;BR&gt;　くたびれたシャツにズボンと、相変わらずラフな服装をした黒髪の男が、スコールの視線を受けて人懐こく笑った。&lt;BR&gt;（これか……）&lt;BR&gt;　セルフィがあれほど強硬に墓参りを主張した理由。&lt;BR&gt;　身体が回復していないのに、強引に自分を連れだした理由。&lt;BR&gt;「ラグナ様」&lt;BR&gt;　にこりと微笑んでセルフィが声を上げる。&lt;BR&gt;　回れ右して帰りたいスコールだが、腕にセルフィがいるのでそうも行かない。&lt;BR&gt;　……もちろん、セルフィの狙いはそこにあったに違いない。&lt;BR&gt;「よぅ」&lt;BR&gt;　手を挙げてラグナがセルフィに応える。&lt;BR&gt;　ひらひらと手を振ってから、セルフィがゆっくり翠の瞳をスコールに向け、いたずらっぽく笑いかけた。&lt;BR&gt;　逃げたりしないでね――と、その瞳が語りかけている。&lt;BR&gt;　エルオーネはここにはいない。セルフィは絶対的なスコールの味方だが、常に対等であり続ける存在であって彼の庇護者ではない。&lt;BR&gt;「…………」&lt;BR&gt;　見上げる翠の瞳から視線を外し、スコールは無言で自分たちを待ち受ける男を見た。&lt;BR&gt;　相変わらず何を考えているのかわからない、深い色の瞳。&lt;BR&gt;　視線を下げる。彼の足下にある、花に飾られた小さな墓石を見る。&lt;BR&gt;（……レイン）&lt;BR&gt;　たったひとつだけ。&lt;BR&gt;　貴女に聞くことができたなら――&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　精神力を総動員して、スコールはゆっくりと歩を進めた。&lt;BR&gt;「久しぶりだなぁ」&lt;BR&gt;　にこりと笑んでラグナがスコールとセルフィを見つめる。&lt;BR&gt;　無邪気に笑い返すセルフィの髪に手を伸ばして触れながら、愛娘を見るような眼差しで言葉を続けた。&lt;BR&gt;「だいぶ元気になったようだな」&lt;BR&gt;「うん！　元気になったよ～！」&lt;BR&gt;　くしゃくしゃっと頭をなでられ、くすぐったそうにセルフィが笑う。&lt;BR&gt;　そんな他愛のないふれあいを間近で見つめながら、スコールは唐突に、以前垣間見たセルフィの過去の光景を思い出す。――セルフィがひっそりと抱えていた孤独の正体を見破った数少ない一人が、このラグナだった。&lt;BR&gt;　セルフィが視線で地面に立つと主張したので、スコールは身をかがめてセルフィを下ろしてやり、勝手に歩き回らないように細い手首をつかんで引き寄せる。手首に光ったものに、ラグナがふと視線を止めた。&lt;BR&gt;「お、それがオダインのバングルか～」&lt;BR&gt;『ハインの遺産』の暴走すら止めることができる特別製のオダインバングル。&lt;BR&gt;　セルフィはにこにこと頷き、手首をつかんでいるスコールの手ごと、ラグナの眼の前に持ち上げて見せた。&lt;BR&gt;「実物ちゃんと見る暇なくってな～、なかなかいいじゃねーか。そのデザイン、エルが半分考えたんだぜ～」&lt;BR&gt;「おねえちゃんが？」&lt;BR&gt;「女の子がつけるもんなんだから、デザイン可愛くしてやらねーとって、前から考えてたらしいんだよな」&lt;BR&gt;　以前からこのバングルをつけていたのはセルフィではなくリノアの方だから、エルオーネはあまり面識のないリノアのためにバングルデザインを考えていたということになる。&lt;BR&gt;　それでリノアのバングルも新調されていたのかと納得しながら、スコールはふとあることを思い出し、セルフィの手を解放して自分の左中指にはめていた銀色の指輪を抜き取った。&lt;BR&gt;「……これ」&lt;BR&gt;　左手に指輪を乗せ、また右手でセルフィの手を取りながらスコールはラグナに指輪を差し出す。&lt;BR&gt;　意図したわけではなかったが、ラグナの『セルフィと一緒に返しに来い』という約束は果たすことができたことになる。&lt;BR&gt;「おっ、そうだったそうだった」&lt;BR&gt;　頭をかきながらラグナが笑う。手首を握ろうとするスコールの手を上手くかわしてきちんと手を繋ぎながら、セルフィが眼をまるくして指輪をのぞきこんだ。&lt;BR&gt;「？　これなに～？」&lt;BR&gt;　ラグナから指輪を渡されたことを、セルフィはもちろん知らない。&lt;BR&gt;　邪気のないセルフィの問いかけに、ラグナが人懐っこい笑顔で応える。&lt;BR&gt;「オレの結婚指輪」&lt;BR&gt;　簡潔なその答えに、セルフィがくるんと眼をまるくし、銀色の指輪に視線を向ける。&lt;BR&gt;　ラグナはまだその指輪を受け取ろうとせず、花畑をぐるりと見回した。&lt;BR&gt;「懐かしいな～、それ渡したのってさ、この花畑だったんだぜ」&lt;BR&gt;　……言葉の意味を心が取り込むのに、数秒のタイムラグがあった。&lt;BR&gt;　かすかに眉をひそめたスコールにはかまわず、ラグナはどこか遠くに視線を向けて言葉を続けた。&lt;BR&gt;「当時はオレ、そんなに金とか持ってなくってなぁ……指輪なんて買ったこともねえし、店行って値段見て腰が飛び出るかと思ったもんだぜ～」&lt;BR&gt;　それを言うなら「眼が飛び出る」もしくは「腰が抜ける」だろうと心の中で突っ込みを入れつつ、スコールはラグナの言葉の真意をくみ取ろうと懸命になる。&lt;BR&gt;　繋いでいるセルフィの手を無意識にぎゅっと強く握ってしまう。握り返してくる小さな手が、温かかった。&lt;BR&gt;「……あんたは」&lt;BR&gt;　慎重に言葉を選びながら、スコールがゆっくりと口を開いた。&lt;BR&gt;「本当は……ここにずっと……？」&lt;BR&gt;　訊ねた声に、ラグナがちょっと片眉を上げてスコールを振り返る。&lt;BR&gt;　言葉足らずの質問を頭の中でしばらく反芻し、意味を考えてるような沈黙があった。&lt;BR&gt;　何かもう少し言葉を重ねるべきだったかと少し思い、スコールが自分の内に適切な言葉を探していると、先にラグナの声が響いた。&lt;BR&gt;「どうだったかな……オレ自身、本気でここに永住する気だったかなんてわかんね～よ」&lt;BR&gt;　また頭をかいて、レインの墓の前に座り込む。&lt;BR&gt;　そっと手を伸ばして墓石に触れる仕草が、ひどく優しい光景に見えた。&lt;BR&gt;「幸せにさ、したいとは思ったし、傍にいたいとも思ったよ。けど、おんなじくらい……世界に出てみてえって気持ちも、オレの中にずっとあったからさ……」&lt;BR&gt;　そしてその想いはきっと、レインにも伝わっていた。&lt;BR&gt;　エルオーネがエスタにさらわれてしまってもしまわなくても、ラグナがいつか、ウィンヒルから出ていってしまっただろうこと。&lt;BR&gt;「でも帰る場所はここだって思ってた。どこに行って何をしてても、オレの帰る場所はいつでもウィンヒルだ。&lt;BR&gt;　だから……そういう約束をしたいって思ったんだろうな」&lt;BR&gt;　ふわりと風が吹いた。&lt;BR&gt;　ラグナとスコール達の間を優しくすり抜けて、色とりどりの花びらを連れて空へと舞い上がっていく。&lt;BR&gt;「約束？」&lt;BR&gt;　鈴を振るようなセルフィの声が、風にさらわれることなく凛と響いた。&lt;BR&gt;　ラグナがセルフィを見上げて、深い色の瞳を優しくした。&lt;BR&gt;「結婚ってのはさ、一種の約束だろ？」&lt;BR&gt;　ラグナの指先が静かにレインの墓石に刻まれた名をなぞった。&lt;BR&gt;「……どこ行って何しても、絶対こいつのとこに帰ります……っていう、さ」&lt;BR&gt;　ぴくんとスコールの身体が一瞬こわばった。&lt;BR&gt;　無言でセルフィがスコールを見上げた。握り返す手に、またわずかに力がこもった。&lt;BR&gt;　視線を向けると、見上げるセルフィがにこりと微笑む。&lt;BR&gt;　その笑顔に背中を押されるようにして、スコールはラグナに顔を向けて口を開いていた。&lt;BR&gt;「じゃあ……なんで…………帰らなかった？」&lt;BR&gt;　言ってから、なぜか背中から脳髄まで何か電流を流されたような痛みが走った。&lt;BR&gt;　一番言いたかった言葉だとわかった。&lt;BR&gt;　ずっとずっと、訊ねたくてけれど口にすることがどうしてもできない、言葉だった。&lt;BR&gt;　背中が痛い。頭の後ろに変な熱を感じた。&lt;BR&gt;　頭の半分で、奇妙に冷静なスコールが緊張している自分を観察している。もう半分の緊張しているスコールが、またぎゅっと強く手を握りしめていた。&lt;BR&gt;　手を握るだけ。&lt;BR&gt;　寄りかかることも抱きしめることも許さず、ただ手を握るだけの彼女がすぐ隣で、静かに見守っている。&lt;BR&gt;「……そうだな」&lt;BR&gt;　ラグナが苦く笑んで立ち上がった。&lt;BR&gt;「なんでだろうな……」&lt;BR&gt;　囁くように呟く。&lt;BR&gt;　それはスコールの求める答えではない。&lt;BR&gt;　じりっと身の内を苛立ちが灼いた。&lt;BR&gt;「はぐらかすなよ」&lt;BR&gt;　わずかに語気の荒い言葉が口をついて出る。&lt;BR&gt;　ラグナが深い色の瞳をスコールに向けた。&lt;BR&gt;　しばらくそうして視線を結び合う。他人と眼を合わせることに慣れていないスコールは、それでもじっとそこから眼をそらさなかった。&lt;BR&gt;　短いような長いような沈黙の末、やがてラグナが小さく吐息をついた。&lt;BR&gt;「エルを連れてウィンヒルに戻らなかった理由は、前に話したよな」&lt;BR&gt;　スコールは頷いた。&lt;BR&gt;　魔女アデルを倒した英雄として祭り上げられてしまったラグナを、皆が大統領に推薦し、ラグナはその期待と恩義に応えざるを得なかった。それは理解している。&lt;BR&gt;　スコールが言いたいのは、その次。なぜ落ち着いてからでも、会いに来られなかったのか。なぜレイン亡き後、エルオーネと自分を一度たりとも捜そうとしなかったのか。&lt;BR&gt;「レインが死んだのは、お前を産んですぐだった」&lt;BR&gt;　視線をそらさずに、ラグナが言った。&lt;BR&gt;「お前が産まれたのは、エルがウィンヒルに戻る少し前のことだった」&lt;BR&gt;「…………」&lt;BR&gt;　視線をそらしたくて、けれど懸命に奥歯を噛みしめてスコールはこらえる。&lt;BR&gt;　ラグナの唇に自嘲的な笑みが浮かんだ。ジャーナリストを目指していたあの頃には決して見られなかった笑みを浮かべて、静かに言葉を続けた。&lt;BR&gt;「レインがオレの子供を身ごもっていたことを、オレが知ったのは……ずっとずっと後のことだ」&lt;BR&gt;　すでにレインは亡くなり、エルオーネとスコールは孤児院へと送られてしまった後だった。&lt;BR&gt;「後悔はしてねぇよ。……たとえあの時レインが妊娠してるって知ってても、オレはエルを見捨てるなんてこと、できっこなかったはずだからな。どんな結果もオレが選んだことだし、オレの責任だ」&lt;BR&gt;　スコールはゆっくりとラグナから墓石へと視線を移した。&lt;BR&gt;　今のラグナの言葉が真実なら、レインはエルオーネを取り戻しに旅に出るラグナに、妊娠の事実を口にしなかったということになる。&lt;BR&gt;　単純にその時点でレイン自身、妊娠していることに気づいていなかったのか、気づいていてあえて黙っていたのか、それはもう誰にもわからない。&lt;BR&gt;　それを今取りざたしても詮ないこと。ラグナの言うとおり、自分で選んだ結果であれば、受け止めるしかないのだろう。&lt;BR&gt;「……も～、違うでしょ～？」&lt;BR&gt;　言葉を失ったスコールのかわりに、口を開いたのはセルフィだった。&lt;BR&gt;　驚くスコールの視線にかまわず、少しだけ怒った顔でセルフィはラグナを見つめている。&lt;BR&gt;「違うでしょ～？　スコールが聞きたいのは、そんなことじゃないって、わかってるはずでしょ？」&lt;BR&gt;　セルフィのまっすぐな視線に、ラグナの瞳がわずかに揺らいだのをスコールは確かに見た。&lt;BR&gt;「ラグナ様の後悔なんてど～でもい～の！　スコールが知りたいのは、事実と、気持ちだよ～！」&lt;BR&gt;　セルフィのその言葉は、意外なほどまっすぐにラグナの胸を貫いたようだった。&lt;BR&gt;　ぐっと唇を引き結んだラグナに、スコールは眉根を寄せてセルフィとラグナを交互に見比べた。&lt;BR&gt;「……事実？」&lt;BR&gt;　なにかまだ、自分が知らされていない事実が存在していたのだろうか。&lt;BR&gt;　ラグナがエスタ大統領になり、仕事に忙殺されている内にレインが死にエルオーネとスコールが孤児院に送られ、ラグナはエルオーネ達を捜しにくる気配もなく、結果１８年という歳月が流れてしまったという、その事実以外に。&lt;BR&gt;　ラグナはセルフィの視線から逃れるように顔をそむけ、セルフィは癇癪を起こした子供のように声を上げた。&lt;BR&gt;「ラグナ様！」&lt;BR&gt;　彼女らしくもないその声に、スコールの方が驚いてしまう。&lt;BR&gt;「セルフィ？」&lt;BR&gt;　驚愕と困惑のまざった声音で呼ばれ、セルフィがはっと瞳を震わせてスコールを見つめ、それからラグナへと視線を戻した。一度大きく息をつき、いつもの落ち着きを取り戻す。&lt;BR&gt;「ねぇラグナ様……スコールは、逃げてないよ」&lt;BR&gt;　強く振った鈴の音のような、凛とした声でセルフィが告げた。&lt;BR&gt;「逃げてないんだよ」&lt;BR&gt;　強い強い声だった。語気を荒げている強さではなくて、何か一本芯が通っている強さだった。強くて綺麗な声。&lt;BR&gt;　セルフィを強いと思ったことなど一度もなかったはずなのに、なぜかスコールはその時ひどく素直にそう感じていた。&lt;BR&gt;「誰かのせいにする言葉がどんなにみっともなくたって、スコールが聞きたいことなら逃げずに答えなくっちゃダメだよ～！」&lt;BR&gt;　精一杯の力をこめて、セルフィは言いきった。&lt;BR&gt;（逃げないで）&lt;BR&gt;　祈りにも似た気持ちでセルフィは願う。&lt;BR&gt;　こうして今、セルフィの手を握りしめて懸命に逃げずに立っている、そのスコールの気持ちから。&lt;BR&gt;　なぜラグナがスコール達を捜さなかったのか、セルフィは知っている。エルオーネだって、きっと知っているはずだ。&lt;BR&gt;　けれどそれは、ラグナがきちんと、自分の言葉で伝えなくては意味がない。&lt;BR&gt;（逃げないで、伝えてあげて）&lt;BR&gt;　スコールが一番欲しい言葉は、きっとただひとつだけのはずなのだから。&lt;BR&gt;　そんな願いはどんなふうにラグナに届いたのだろう。&lt;BR&gt;　長い長い沈黙の末、ラグナはふっと笑った。降参だと、深い色の瞳がセルフィに語った。&lt;BR&gt;　それから視線がゆっくりスコールを捉える。&lt;BR&gt;　ぴりっとスコールの手から伝わった緊張に、セルフィはぎゅっとまた強く握り返して応えた。&lt;BR&gt;　大丈夫。&lt;BR&gt;　ここにいる。&lt;BR&gt;（聞いてあげて）&lt;BR&gt;　色々な気持ちをこめて、ぎゅっと手を握った。言葉なんてなくても、伝わることを知っていた。&lt;BR&gt;「……捜したんだ」&lt;BR&gt;　少しだけかすれた声で、ラグナが打ち明けた。&lt;BR&gt;「オレがエスタを飛び出して探し回る訳にいかねぇから……人を使ってだけどよ……捜したんだ」&lt;BR&gt;　スコールがわずかに眼をみはった。&lt;BR&gt;「最初はさ……すぐオレもウィンヒルに帰るつもりだったんだ。ある程度エスタが落ち着いたら、次の選挙戦あたりでオレはとっととお役御免になって、ウィンヒルに戻れるって思ってた。&lt;BR&gt;　オレが、レインの死んじまったことを知ったのは、その選挙戦の直前だ。びっくりして聞いてみりゃ、エルがウィンヒルに戻ってすぐ死んじまって、引き取り手もねぇからエルは孤児院に送られたらしいって言うじゃねぇか。&lt;BR&gt;　オレはエスタを飛び出してエルをまた捜しに行こうとした。……けど、エスタって国がそれを許さなかった。&lt;BR&gt;　エスタはまだまだ魔女の支配から抜けたばっかで、全然立ち直ってなくて、オレがいねぇとすぐバラバラになる状態だって言われてよ……。&lt;BR&gt;　でもよ、どうして放っておける？　あのちっこいエルが、オレがレインを置き去りにしても捜しだして取り戻したエルが、孤児院なんかに送られたって聞いて、オレに放っておけって方が無理だ。&lt;BR&gt;　だから絶対、何がなんでもエルを捜しだして、エスタに連れてこようとしたんだよ。&lt;BR&gt;　でも、どんなに捜させても捜させても見つからなかった」&lt;BR&gt;　レインとエルオーネのいるウィンヒル。それはラグナが描いた理想郷だが、レインがいない以上、その夢は永遠に叶わない。だから、せめてエルオーネだけでも手元に取り戻そうと。&lt;BR&gt;「…………」&lt;BR&gt;　スコールがかすかに眉をひそめた。&lt;BR&gt;　言わんとしていることを読みとって、ラグナが少し痛そうな笑みを向けた。&lt;BR&gt;「お前の言いたいことはわかるぜ」&lt;BR&gt;　いいながらレインの墓石に視線を向ける。やわらかな風にあおられて、漆黒の髪がふわりと揺れた。&lt;BR&gt;「……レインの腹の子の存在を知らされたのは……数年後のことだ」&lt;BR&gt;「数……年後？」&lt;BR&gt;　訝しげなスコールの声に、ラグナは振り向かず静かに頷いた。&lt;BR&gt;「レインは病死だって聞かされてたんだけどな……一向にエルの捜索が進まなくて、オレは自分でも何か調べようとして、調査室をこっそりあさって……偶然見つけちまった」&lt;BR&gt;　言いながらシャツの胸ポケットを探り、ラグナはそこから皺になった小さな封筒を取り出して、スコールに差し出した。&lt;BR&gt;　かなり年月を経ているらしく、元は白かったのだろうその封筒は黄ばんであちこち破けかけていた。&lt;BR&gt;　差出人の名前はない。宛先を見ると、たどたどしい子供の字で『ラグナおじちゃんへ』と書いてあるのが読めた。&lt;BR&gt;「……！」&lt;BR&gt;　どきりと胸が鳴る。&lt;BR&gt;　眼を見開くスコールに、視線を向けてラグナがかすかに微笑んだ。&lt;BR&gt;「中開けてみな」&lt;BR&gt;　促され、スコールはセルフィと繋いでいた手を離すと、恐る恐る封筒を開けて中に入っていた手紙を取り出す。&lt;BR&gt;　薄い紙は、少しでも乱暴に扱えば簡単に破けてしまいそうに儚げだった。&lt;BR&gt;　中の手紙もやはり、子供のたどたどしい文字でつづられていた。&lt;BR&gt;&lt;BR&gt;『ラグナおじちゃん、げんきですか。&lt;BR&gt;　おじちゃん、ごめんなさい。こないだ、レインが、いなくなってしまいました。&lt;BR&gt;　おとなりのサウスおばちゃんが、レインはしんじゃったんだよって、おしえてくれました。&lt;BR&gt;　しんじゃうって、ずっとねむったまま、おきなくなっちゃうことだよっていってました。&lt;BR&gt;　しんじゃったレインは、おおきなはこにはいって、いなくなってしまいました。&lt;BR&gt;　レインといっしょに、おじちゃんまつってやくそくしたのに、ごめんなさい。&lt;BR&gt;　レインはさいごに、ラグナおじちゃんのなまえをいっぱいよんでました。&lt;BR&gt;　うまれたばっかりのあかちゃんを、ラグナおじちゃんにみせたいっていってました。&lt;BR&gt;　あかちゃんのなまえは、スコールです。わたしのおとうとです。&lt;BR&gt;　スコールといっしょに、レインのおうちでおじちゃんをまちたいのに、だめだっていわれました。&lt;BR&gt;　あした、あたらしいおうちにいくんだよっていわれました。&lt;BR&gt;　だからおてがみかいています。おじちゃん、エルとスコールのこと、さがしにきてね。&lt;BR&gt;　それまでスコールとまってます。ぜったいさがしにきてね。&lt;BR&gt;　だいすきなラグナおじちゃんへ。エルより』&lt;BR&gt;&lt;BR&gt;「……オレがお前の名前を知ったのは、それを読んだのが最初なんだ」&lt;BR&gt;　文面を眼で追ったきり動きを止めたスコールの耳に、静かな声が響いた。&lt;BR&gt;「エスタって国は知ってたんだよな……オレがいつでも、帰る場所はウィンヒルだと思ってたってことをさ」&lt;BR&gt;　顔を上げる。&lt;BR&gt;　奔放な翼を透明な糸でからめとろうと、意図的に真実から遠ざけられ縛られた男がそこにいた。&lt;BR&gt;「誰が悪いって訳でもねぇよ。そういう時代だったんだって言うしかねぇんだろうな。&lt;BR&gt;　オレが真実を知ったところで、お前はすでに孤児院を卒業する年齢になっていたからイデアの孤児院にはいなかったろうし、エルは船に乗せられて世界中を放浪してた。結局、捜しようがなかったんだ」&lt;BR&gt;　当時沈黙を続けていたエスタがガーデンに接触することはできない。個人でガーデンの入学生データを入手するなど不可能だ。何しろガーデンの生徒は、そのままガーデンの財産でもあるのだから。&lt;BR&gt;「バカだ、あんた……」&lt;BR&gt;　食いしばった歯の間から呻くような声で、ぽつりとスコールが呟いた。&lt;BR&gt;　手にしたエルオーネの手紙がぶるぶると震えた。&lt;BR&gt;　あまりの憤りに眼の前が真っ赤になった。&lt;BR&gt;「こんなふうに縛られて……それで……なんで……」&lt;BR&gt;　国にとって必要だからと。&lt;BR&gt;　ただそれだけの理由のどこに、ラグナ個人の意志を踏みにじる権利が発生するのだろう。&lt;BR&gt;　エスタにとってラグナが必要だったのはわかる。最愛の妻の死の事実を告げることで、ラグナが溺愛する娘のために飛び出して行くかもしれないと危惧するのもわかる。&lt;BR&gt;　けれど、だからといって、踏みにじっていいはずはない。&lt;BR&gt;　ラグナを待ち続けて死んだレインの想いが、ラグナの迎えをひたすら夢見ながら運命に翻弄され続けたエルオーネの想いが、ラグナを必要とするエスタ国民の想いより軽いなどと、誰が言えるだろう。&lt;BR&gt;「バカなのかもなぁ」&lt;BR&gt;　いつもの人懐っこい笑顔を取り戻し、ラグナがちょっと頭をかいた。&lt;BR&gt;「けどよ、そうやってずるずると大統領の仕事やってたおかげで、お前達の力になれることもあったわけだから……ま、全部が全部悪いことばっかなわけじゃねーよ」&lt;BR&gt;　リノアを魔女記念館の封印施設から解放させることができたのも、時間圧縮を逆利用したアルティミシア討伐作戦をスコール達に依頼することができたのも、そして今回の事件でセルフィのエスタでの立場を悪くさせずにすんだのも、大統領という肩書きがあったからに他ならない。&lt;BR&gt;「だから後悔はしてねぇんだ。お前には悪いことしたと思ってるし、今さら父親ヅラする気も権利もオレにはねぇよ。お前がオレを許せなくてもそりゃ当然ってもんだ。恨まれたって仕方のないことはしてるんだからな。&lt;BR&gt;　でも、オレは後悔はしねぇ。エルにもお前にも会えたからな」&lt;BR&gt;　え？　と言ったように眉をひそめたスコールに、ラグナがもう一度ゆっくりと繰り返した。&lt;BR&gt;「ずっと会いたかったお前達に会えたんだから、オレの人生はそう捨てたもんじゃねぇよ」&lt;BR&gt;　静かに言いきり、ラグナはまた視線を墓石に落とす。&lt;BR&gt;　思わず言葉を失い、スコールは歳を経てもどこか若々しいその横顔を見つめた。&lt;BR&gt;　手の中にある指輪と手紙が、ずしりと重く感じた。&lt;BR&gt;「――あ」&lt;BR&gt;　ふとセルフィが声を上げる。その声に誘われて空を見上げたスコールの視線の先に、小さなヘリが旋回していた。&lt;BR&gt;「あ、わりぃわりぃ……もう迎えが来たみてーだ」&lt;BR&gt;　頭をかいてラグナがスコールとセルフィを振り返り、人懐っこくにっと笑った。&lt;BR&gt;「もうちっとゆっくり話したかったんだが、ま、仕方ねーな。こないだの事件で事後処理がわんさかだ」&lt;BR&gt;　言いながらスコールの眼の前に歩み寄り、その手からエルオーネの手紙だけをそっと受け取る。&lt;BR&gt;「近い内、また官邸にも遊びに来いよ。そん時まで、そっちは預けとくからよ」&lt;BR&gt;　スコールの手の中に残った指輪を示して軽く笑い、それからラグナは手を伸ばしてセルフィの髪をくしゃりとなでた。&lt;BR&gt;「じゃな。次会う時は元気なセルフィに戻ってるんだぞ～」&lt;BR&gt;「うん」&lt;BR&gt;　にこっと無邪気な笑顔でセルフィが頷く。&lt;BR&gt;　セルフィに笑い返し、ラグナはひらりと手を振りゆっくりその場から歩き出した。&lt;BR&gt;　あっけないほど簡単に歩き去っていくその背中を、スコールは指輪を握りしめたまま呆然と見送る。&lt;BR&gt;　一瞬、自分が今何をすべきなのか、頭の中が空白になっていた。&lt;BR&gt;「――――」&lt;BR&gt;　とん、と。&lt;BR&gt;　何かが背中を押した。&lt;BR&gt;　触れるといったほうが正しいような、ごく軽い力で、背を押された。&lt;BR&gt;　それが何かを考える余裕はなかった。手の内の指輪の重みが、またずしりと増える感触があった。&lt;BR&gt;「………っ」&lt;BR&gt;　気がつくと、足が前に出ていた。&lt;BR&gt;　自分でも驚くほどの勢いで、地面を蹴っていた。&lt;BR&gt;　やわらかな風が頬に当たる。視線の先にいるラグナの背中が、近づく足音に驚き動きを止めた。&lt;BR&gt;　黒髪が揺れて、ラグナが振り返る。驚いたように深い色の瞳が見開かれた。&lt;BR&gt;　スコールは足を止めない。&lt;BR&gt;　全速力で駆けて、追いついた。手を伸ばしてラグナの腕をつかむ。すでに右手は拳になっていた。&lt;BR&gt;　がつり、といい音がした。&lt;BR&gt;　走ってきた勢いそのままに、唐突に物も言わずに殴られ、ラグナが勢いよく花の中に吹っ飛んで転がる。&lt;BR&gt;　眼の前に火花を散らして倒れこみ、ラグナはくらくらする頭を振ってよろりと上体を起こした。&lt;BR&gt;「～～ったぁぁ……」&lt;BR&gt;　何がなんだかわからずに頬を押さえているラグナの前で、未だ拳を握りしめたまま、スコールは肩で大きく呼吸を繰り返していた。&lt;BR&gt;　呆然とラグナが眼を上げてスコールを見る。凄絶な怒りを宿した群青色の瞳がそれを睨み下ろした。&lt;BR&gt;「恨んでいるだと……？」&lt;BR&gt;　押し殺したように、ぼそりとスコールが呟くように言う。&lt;BR&gt;　激情のあまり震えるその声に、ラグナは驚きを隠せずぱちぱちとまばたきをした。&lt;BR&gt;「俺があんたを許さない？　それでもあんたは後悔しない？　……俺はそんなことを問題にしてるんじゃないんだ！！」&lt;BR&gt;　ぶん、と左手が大きく振り回され風をきった。&lt;BR&gt;「知らなかったんならそれでもいい。事実を隠されて利用されることなんてこの世にはいくらだってある。&lt;BR&gt;　だから俺のことなんかどうだっていいんだ。俺が知りたいのは」&lt;BR&gt;　知りたいのは――聞きたいのは、ただひとつ。&lt;BR&gt;　たったひとつ、彼女に。&lt;BR&gt;「あんたが……レインが……幸せだったのか、それだけなんだ……！！」&lt;BR&gt;　ラグナに置き去りにされて。&lt;BR&gt;　日に日に腹の中で育つ子を抱えて、ただひとりラグナを待ち続けて。&lt;BR&gt;　――エルオーネだけがウィンヒルに帰ってきたことが、彼女に失望を与えはしなかっただろうか。&lt;BR&gt;　失意の中、彼女はラグナの名を呼びながら死んでいったのではないだろうか。&lt;BR&gt;（産まなかったらよかったんじゃないのか？）&lt;BR&gt;　エルオーネにレインの最期を聞いた時からずっと、スコールの脳裏に焼き付いて離れなかったひとつの想い。&lt;BR&gt;（俺を産みさえしなければ、あんたは――）&lt;BR&gt;　ずっと生きて、ウィンヒルにいられたんじゃないのか。&lt;BR&gt;　エルオーネとふたりで、ラグナを待てたんじゃないのか。&lt;BR&gt;（ラグナだって帰れたんじゃないのか？）&lt;BR&gt;　ただひとつ、ラグナが最後に帰る場所だと思い定めたウィンヒルに、レインとエルオーネがいるなら。&lt;BR&gt;　どんな思惑だって、ラグナの羽を絡め取ることなど決してできなかった。&lt;BR&gt;　ずっと抱いていた疑念は、今こうしてラグナから打ち明けられた話を聞いて、すっかり確信に変わってしまっていた。&lt;BR&gt;　幼いエルオーネに生まれたばかりのスコールを押しつけて、死んでいくことが彼女をどれほど苦しめただろう。&lt;BR&gt;「問題にすべきは……俺じゃないだろう……？」&lt;BR&gt;　ラグナの言葉通り、恨んだり憎んだりすることなんて、スコールにはとてもできなかった。&lt;BR&gt;　ただ、事実に対し心がついてゆけずに当惑し続けていただけだった。&lt;BR&gt;　エルオーネが以前見せてくれた過去のラグナ。あの姿を見れば、彼がレインを、そしてエルオーネや自分を見捨てて、のうのうと大統領職に就いていることがどれほど不自然であるか、容易にわかる。&lt;BR&gt;　だがその理由を深く詮索することはできなかった。自分が彼らの不幸の元凶であると、知りたくなかった。&lt;BR&gt;「…………」&lt;BR&gt;　眼を見開いたまま、ラグナはそんなスコールを見上げ、呆然と動きを止めていた。&lt;BR&gt;　ずっと心を開くことのなかったスコールが、ただ不甲斐ない父親に対する怒りを抱いていたのではないことを初めて知り、驚愕していた。&lt;BR&gt;「！」&lt;BR&gt;　ふいに、強い風が吹いた。&lt;BR&gt;　強く吹き上げられた花びらが空気を一瞬色とりどりに染め、勢いを失ってはらはらとこぼれ落ちる。&lt;BR&gt;　思わずその美しい光景に眼を奪われ、ラグナとスコールの視線の呪縛がほどけた。&lt;BR&gt;　ゆるゆると視線を戻す。ラグナを睨んでいたスコールの瞳は、陰を宿して空を踊る花びらを追っていた。&lt;BR&gt;　整いすぎて冷たく見えるほどの美貌。最愛の女性の面影を色濃く残すその横顔を、ラグナは無言でじっと見つめた。&lt;BR&gt;　見つめながら、以前レインの最期を語ってくれたエルオーネの言葉を思い出す。&lt;BR&gt;　淡々と事実のみを口にした最後に、優しく告げてくれたエルオーネの言葉。&lt;BR&gt;&lt;BR&gt;　――――でもね、ラグナおじさん。レインは幸せだったはずなのよ……&lt;BR&gt;&lt;BR&gt;「……幸せだったはずだ」&lt;BR&gt;　ぽつりと呟く自分の声に、かすかに瞳を震わせてスコールが顔を向ける。&lt;BR&gt;　きっとあの日の自分も同じような顔でエルオーネを見つめていたのだろう。&lt;BR&gt;　だからラグナは淡く微笑む。あの日のエルオーネと同じように。&lt;BR&gt;&lt;BR&gt;　――――幸せだったから、レインはラグナおじさんを待てたのよ。&lt;BR&gt;&lt;BR&gt;「オレがエルを捜しにウィンヒルを飛び出しても……レインはお前と一緒だったんだからさ……」&lt;BR&gt;　日に日に身の内で育っていく命。&lt;BR&gt;　それはレインに不安をもたらしたかもしれない。&lt;BR&gt;　けれどそれ以上に、ひとりではないという安心感も与えたはずだ。&lt;BR&gt;「心残りだったろうとは思うさ……けど、お前が不幸の元凶だなんて、レインは絶対に思ったりしてねえよ。&lt;BR&gt;　レインはちゃんとお前を愛してた。オレの代わりとかそんなんでもねえよ、純粋にお前のことを愛してたはずだ。&lt;BR&gt;　だからエスタにオレがいるってわかっても、お前のことを知らせようとしなかったんだろ」&lt;BR&gt;　もしレインが子供の存在でラグナをウィンヒルに呼び戻そうとするなら、それはきっと不可能ではなかったはずだ。&lt;BR&gt;　エルオーネを送り届けたエスタの兵士にでも、言付けすればすんだことだ。あの時はまだラグナは大統領に就任しておらず、ラグナの耳にもちゃんと、その言付けは届いたはずだった。&lt;BR&gt;　けれどレインはそうしなかった。&lt;BR&gt;　兵士の話では、エルオーネをウィンヒルに届けた時、レインは決して家に兵士を上げようとはしなかったと言う。&lt;BR&gt;「最初にエルを迎えに出たのは隣ん家に住んでた老夫婦だったってよ。&lt;BR&gt;　途中でレインが、すげえ具合悪そうにして外に出てきて……エルを届けた奴に礼を言って、オレがエスタにいるって聞いても、そうですかってだけ言って……具合悪いのか聞かれても、風邪ひいてるからって答えたってよ……」&lt;BR&gt;　本来ならベッドに横になっていなくてはならないはずなのに、最後まで自力で立っていたレイン。&lt;BR&gt;「なんかオレに言付けはって聞かれてさ……『いつでも帰っていらっしゃい』なんて言ったって言うんだぜ……参るよな」&lt;BR&gt;　それは意地っ張りのレインらしい、強気な言葉で。&lt;BR&gt;　最後の最後まで、レインはスコールのことを口にはしなかった。&lt;BR&gt;　スコールの存在で、ラグナをウィンヒルに呼び戻そうなどとはしなかった。&lt;BR&gt;&lt;BR&gt;　――――道具にしたくなかったのね。スコールのことを……&lt;BR&gt;&lt;BR&gt;「お前を大事に思ってたからさ……だから道具になんてできなかったんだよな……」&lt;BR&gt;　ラグナに父親の責任を押しつけることなく、男を繋ぎ止めるための道具にスコールを使うこともしなかったレイン。&lt;BR&gt;　ラグナが自分の意志でウィンヒルに戻ってくるのでなければ意味がないと、レインにはちゃんとわかっていた。&lt;BR&gt;　スコールを産んだのはレインの意志だ。ラグナを繋ぎ止めたくて産んだわけではない。&lt;BR&gt;　身の内に育んだ命が愛しかったからスコールを産んだのだ。&lt;BR&gt;&lt;BR&gt;　――――だからレインは言っていたわ。ベッドの上でスコールを抱いて、私にはっきり言ったのよ。&lt;BR&gt;&lt;BR&gt;「……『好きな人の子供を産めて、幸せでない女なんていないのよ』……」&lt;BR&gt;　エルオーネの優しい声が告げた一言を、ゆっくりラグナは口にする。&lt;BR&gt;　立ちすくんだままラグナを見下ろしているスコールの表情は動かない。&lt;BR&gt;　けれど、群青色の瞳の奥で、無防備な感情が透けて見えた。&lt;BR&gt;「レインが死ぬ前に、エルに言った言葉だよ」&lt;BR&gt;　腕を伸ばしてみる。&lt;BR&gt;　レインが残した忘れ形見。&lt;BR&gt;　かっちりとした筋肉に覆われたたくましい腕をつかんだ。&lt;BR&gt;　きっと１８年前は、レインのあの細腕の中におさまるほど小さかったはずの命。&lt;BR&gt;　ラグナの知らない１８年という歳月の中で、自分を殴り飛ばせるほどの力を手に入れた腕を、ぐっとつかんだ。&lt;BR&gt;「他人から見りゃ……確かに幸せに見えるような人生じゃなかったかもしんねえよ」&lt;BR&gt;　エルオーネと同様に。もっともっと平凡で穏やかな、普通の幸せだって、手に入るはずだったのだから。&lt;BR&gt;「でも……少なくとも、レインは……不幸なんかじゃなかった」&lt;BR&gt;　レインは間違いなくラグナを愛してくれていたし――スコールのことを愛していた。&lt;BR&gt;（伝わってほしい）&lt;BR&gt;　腕をつかんだまま、心をよぎるのはただひとつの願い。&lt;BR&gt;「お前が……不幸じゃなくしてくれたんだな……」&lt;BR&gt;　どうか伝わってほしい。知ってほしい。不幸の元凶なんかじゃなかったことを。&lt;BR&gt;　スコールを産んだからこそ、レインは幸せだったのだと。&lt;BR&gt;「……ありがとな」&lt;BR&gt;　囁く声を耳にして、スコールが愕然と凍りつく。&lt;BR&gt;　それ以上語る言葉を、ラグナはもう持っていなかった。&lt;BR&gt;&lt;BR&gt;　さくさくと、草を踏む音が近づいてくる。&lt;BR&gt;　言葉を失ったままのラグナとスコールの耳にも、それは届いた。&lt;BR&gt;　足音は軽快に近づき、そして止まる。&lt;BR&gt;「どうしたの？」&lt;BR&gt;　まろやかな響きを帯びた優しい声が、凍えた時を静かに動かした。&lt;BR&gt;　顔を上げて振り返る。白いワンピースの裾を軽やかに風に泳がせて、エルオーネが立っていた。&lt;BR&gt;　どうやらエスタがよこした迎えのヘリに乗っていたらしい。&lt;BR&gt;「……いや、何でもねぇよ」&lt;BR&gt;　にっと笑って、ラグナはよいしょと身を起こす。エルオーネが驚いたように眼を見はった。&lt;BR&gt;「どうしたの……？」&lt;BR&gt;　二度目の問いかけは、ラグナの頬に残る腫れと切れた唇に対するものだ。&lt;BR&gt;　温かみのある栗色の瞳が、とっさにスコールに向けられる。&lt;BR&gt;　エルオーネの方を振り向きもしない端整な横顔は、あふれる感情を懸命に押しとどめているように見えた。&lt;BR&gt;「何でもねぇよ。そろそろ帰ろうかって思ってたんだ」&lt;BR&gt;　もう一度ラグナがそう言って笑う。エルオーネは困惑の色を浮かべて、少し離れたところにいるセルフィを見た。&lt;BR&gt;　エルオーネの視線を受けて、セルフィがにっこりと笑う。&lt;BR&gt;　大丈夫だから気にするなと翠の瞳で言われ、エルオーネはちょっと息をついた。&lt;BR&gt;「それじゃ……帰るわね。スコール」&lt;BR&gt;　本当はレインの墓参りもするつもりだったが、何となく長居はしない方が良い感じがして、エルオーネはそう告げる。&lt;BR&gt;　スコールはやはりエルオーネの方を振り向かなかったが、かすかに頷いたのがわかった。&lt;BR&gt;　もう一言声をかけようとして、エルオーネは結局口を閉ざした。&lt;BR&gt;　代わりに、自分のすぐ傍まで歩み寄ってきたラグナを振り仰いで微笑んだ。&lt;BR&gt;「……戻りましょう？」&lt;BR&gt;　誘いかけた言葉に、ラグナは静かに微笑み返した。&lt;BR&gt;　背中にスコールの存在を、そしてその向こうにレインを感じながら、ゆっくり頷いた。&lt;BR&gt;「あぁ……戻ろう」&lt;BR&gt;　手を伸ばして、くしゃりと黒い髪をなでてやる。&lt;BR&gt;　その手を下ろして、くすぐったそうに笑うエルオーネの白い手を軽く握った。&lt;BR&gt;　エルオーネの手を引いて歩き出す。&lt;BR&gt;　残されたスコールは、何も言わなかった。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;「……ちゃんと、話せた？」&lt;BR&gt;　手を引いて歩いていくラグナの背中を見ながら、エルオーネが訊ねた。&lt;BR&gt;　セルフィからきちんとラグナとスコールを真向かわせたいと聞いた時から、エルオーネはずっと心配していたのだ。&lt;BR&gt;　本当は一緒に立ち会いたかった。けれど自分が同じ場所にいれば、それはラグナとスコールに逃げ場所を与えることになってしまう。今まで通りに二人を抱きしめて守り庇ってしまうのでは、今の場所から二人は前進できない。&lt;BR&gt;　だから、遠い場所で見守っていた。戦って、自分の答えを二人が出してくれることを祈って待っていた。&lt;BR&gt;「言わなきゃなんねぇことは、バッチシ言ったぜ～」&lt;BR&gt;　肩越しにエルオーネを振り返ってラグナが照れたように笑う。&lt;BR&gt;　その笑顔が明るいものだったことに、エルオーネは嬉しくなった。&lt;BR&gt;「良かったね、ラグナおじさん」&lt;BR&gt;　握った手にかすかに力をこめて、エルオーネが微笑する。&lt;BR&gt;　歩きながら、そっと背後を振り返った。スコールと、セルフィと、そしてその奥にあるレインの墓をそっと見る。&lt;BR&gt;　血の繋がらないエルオーネを、本当の娘として慈しみ育ててくれた人。&lt;BR&gt;　愛しい男の背中を見送って、ただひとりウィンヒルに残されながら強靱にラグナを愛し抜いた人。&lt;BR&gt;　押し寄せる不安の中、帰ってこない男の子供を産み落とし、一片の後悔もせず幸せだと微笑んでいた人。&lt;BR&gt;「……いつか、ウィンヒルに帰ることはできるのかしら……」&lt;BR&gt;　視線をラグナに戻してそっと呟いたエルオーネの声に、ラグナはちょっと歩く速度をゆるめて彼女を見下ろした。&lt;BR&gt;「どうかな……まだまだラグナ大統領はエスタにゃ必要らしいから、わかんねーな」&lt;BR&gt;　言いながらふと思いついたように、深い色の瞳を揺らめかせて小さく微笑む。&lt;BR&gt;「でもよ、エルがウィンヒルに帰りてぇってんなら、もちろん好きにしてかまわねーんだぞ」&lt;BR&gt;「まさか」&lt;BR&gt;　エルオーネは涼やかな笑い声を聞かせ、いたずらっぽく瞳を輝かせてラグナをのぞきこんだ。&lt;BR&gt;「私がウィンヒルに帰る時は、今度こそラグナおじさんと一緒だって、決めているのよ」&lt;BR&gt;　今度こそ。&lt;BR&gt;　さらりと口にしたその言葉に、ラグナがちょっと眉を上げ、懐かしそうな遠い瞳になって淡く笑んだ。&lt;BR&gt;「…………そうだな………」&lt;BR&gt;　きっとその日が来るまで、彼女は待ち続けてくれるだろう。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　足音が遠ざかっていくのを、スコールは何も言えずに聞いていた。&lt;BR&gt;　ともすれば身体の中で膨れあがった感情が弾け飛んでしまうような気がして、身動きすらできなかった。&lt;BR&gt;　別の足音が近づいてくる。どこか不安定さを持ったその音は、けれど危なげなくスコールの傍に来てそっと止まった。&lt;BR&gt;「……スコール」&lt;BR&gt;　鈴の音のような声が優しく名を呼んだ。&lt;BR&gt;「おつかれさま～」&lt;BR&gt;　邪気のない笑顔が視界に入る。細い腕が伸ばされ、指先がそっと頬に触れた。&lt;BR&gt;　温もりが頬に触れた瞬間、ぱちんと心の中で何かが弾ける。&lt;BR&gt;　がくんと突然地面に膝をついたスコールに、セルフィが驚いたように合わせて地面に膝を落とした。&lt;BR&gt;「……悪い、俺……」&lt;BR&gt;　自分でも何が起きているのか驚愕しながら、スコールが呆然と額に手を当てる。&lt;BR&gt;　セルフィに見られないように顔をそむけようとした途端、彼女の両手がスコールの頭をぐいと引き寄せた。&lt;BR&gt;　薄い肩に顔を埋める形になったスコールが、身体のバランスを崩す。引き寄せられるまま前のめりに倒れるスコールを受け止めきれず、スコールの下敷きになるような形で、花の上に仰向けにセルフィが倒れた。&lt;BR&gt;「……！」&lt;BR&gt;　とっさにスコールが慌てて身を起こそうとする。――しかし、それを細い両腕が儚い力で阻んだ。&lt;BR&gt;　ぎゅっと抱きしめられ、肩口に埋めた顔を上げることができず、スコールが驚き眼を見開く。&lt;BR&gt;「スコール、がんばったねぇ」&lt;BR&gt;　密着した身体から直接、のんびりとした響きを持つ声が聞こえてくる。&lt;BR&gt;「がんばったね……」&lt;BR&gt;　戦い抜いた戦士をねぎらうように優しく、セルフィが囁く。&lt;BR&gt;　なめらかな亜麻色がかった焦茶の髪を、母親が子供にするように優しくなでて、セルフィはスコールの顔を見ないようにして、抱きしめていた。&lt;BR&gt;　ずっと長く。スコールの瞳から流れ続ける、涙が止まるまで。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;「……あのさ」&lt;BR&gt;　どれほどの時間が経ったのか。&lt;BR&gt;　陽もだいぶ傾き始めた花畑で、セルフィの声がゆっくり響いた。&lt;BR&gt;「ん？」&lt;BR&gt;　きちんと座ってレインの墓を眺めているセルフィの顔を見上げて、スコールは言葉の続きを待つ。&lt;BR&gt;　セルフィは膝上の焦茶の髪を指先で弄びながら、瞳を伏せて淡く微笑んだ。&lt;BR&gt;「前にスコール、守れないと嫌だから、約束はしないって言ったよね」&lt;BR&gt;　夢の中で。&lt;BR&gt;　言ったことは事実なので、スコールは黙って静かに頷く。&lt;BR&gt;「スコールがそう思う気持ちはすご～くわかったんだけど……でも、やっぱり人間って、約束が必要なんだよね」&lt;BR&gt;「…………？」&lt;BR&gt;「たとえ果たせないってわかりきった約束でも、生きていくのに約束が必要なことって、すごくあると思うんだ～」&lt;BR&gt;　指輪を握ったままのスコールの手に、セルフィの手がそっと触れた。&lt;BR&gt;「たとえばね、あたしがレインさんの立場だったとして、おねえちゃんを捜しに出かけたラグナ様を待つのに、ラグナ様と約束をしてたかしてないかって、すごく大きい違いだと思うんだ～」&lt;BR&gt;　結婚というのは、一種の約束。&lt;BR&gt;　ラグナのその言葉を思い出しながら、スコールは自分の手の内にある指輪を意識した。&lt;BR&gt;「約束があったから、レインさんはラグナ様を待てたんだし、スコール産めたんだと思うんだ～」&lt;BR&gt;　結局約束はレインが死ぬことで果たされずに終わったが、それでも間違いなくレインにとって約束は必要なものだったのだとセルフィは思う。&lt;BR&gt;　自分にとって、忘れてしまっていてもスコールとの約束が何より大切であったのと同じように。&lt;BR&gt;「あのさ。もし、レインさんがスコール産んでなかったら、あたしスコールに会えなかったんだよね～」&lt;BR&gt;「……当たり前だろ」&lt;BR&gt;　何を今さらと呆れた声を上げたスコールに、セルフィはくすくすと笑った。&lt;BR&gt;「当たり前だけど～、でもすっごく、それって大事なことだよね～！」&lt;BR&gt;　視線を落とす。翠の瞳がスコールをまっすぐ見つめた。&lt;BR&gt;「良かったぁ……スコールに会えて」&lt;BR&gt;　言った途端に、涙が出た。&lt;BR&gt;　突然大きな瞳から珠を結んでこぼれ落ちた雫に、スコールがびっくりして眼を見開く。&lt;BR&gt;　今度はセルフィの涙の栓がおかしくなってしまったようだった。&lt;BR&gt;　涙をいくつもこぼして、それでもセルフィがくすくすと笑う。&lt;BR&gt;「会えてよかった……」&lt;BR&gt;　ぽろぽろこぼれる涙が、スコールの頬にいくつも落ちた。&lt;BR&gt;　ややためらいがちに持ち上げた手で、不器用に涙を拭ってやると、セルフィがくすぐったそうな笑顔になる。&lt;BR&gt;　少しスコールが手に力をこめると、抵抗なくセルフィが身をかがめ、小鳥がついばむようなキスを落とす。&lt;BR&gt;　はらはらと明るい栗色の髪がスコールの頬の上にこぼれ落ちる。唇をはずして、今度は恥ずかしそうに笑った。&lt;BR&gt;「涙の味がする～」&lt;BR&gt;　自分の頬に当てられたスコールの大きな手を両手で包んで、セルフィはゆっくり上体を起こす。&lt;BR&gt;　顔にかかった髪をちょっと首を振って払いながら、視線をレインの墓へと向けた。&lt;BR&gt;　何となくスコールもそれにならい、首を曲げて同じようにレインの墓を見た。&lt;BR&gt;　しばらく穏やかな沈黙が流れた。&lt;BR&gt;「……聞きたかったんだ」&lt;BR&gt;　やがてぽつんと、スコールが呟くように言った。セルフィは何も言わず、続く言葉を待つ。&lt;BR&gt;　スコールはレインの墓にまっすぐ瞳を向けたまま、叶わぬ願いを口にする。&lt;BR&gt;「幸せだったのかって……それだけ……」&lt;BR&gt;「…………」&lt;BR&gt;　セルフィは一瞬わずかに眼を見はったようだった。&lt;BR&gt;　それから両手で包んだスコールの手に唇をそっと押しつけて、レインの墓を見つめる瞳を優しく細めた。&lt;BR&gt;「……あのさ、あたしは子供産んだことなんてないから、よくわかんないんだけど」&lt;BR&gt;　あったらそれはそれで恐ろしい。考えながら、スコールは無言で小さく頷く。&lt;BR&gt;「レインさんもね、おんなじふうに思ったと思うんだ～」&lt;BR&gt;　いったん言葉を切り、それから吐息のような声で、セルフィは言葉を続けた。&lt;BR&gt;「……会えてよかった～、って」&lt;BR&gt;　会えてよかった。&lt;BR&gt;　産んでよかった。&lt;BR&gt;「幸せってさ～、『こう』ってものじゃ、ないんだよね～。その人が、『幸せだな～』って気持ちになれるんだったら、他人にどう見えたって、それは絶対絶対、幸せなんだよ」&lt;BR&gt;　ラグナに置き去りにされて、ひとりぼっちで子供を産んで、その子供の成長を見届けることのないまま死んだレインは、他人から見たらきっと不幸の代名詞に見えるような人生だっただろう。&lt;BR&gt;　けれど、レインは絶対に不幸なんかじゃなかったと、セルフィは思う。&lt;BR&gt;　死の瞬間までラグナの名を呼んでいたというレインは、最期までラグナを愛してた。彼女はきっとラグナが帰ってくると信じていたし、帰ってくるラグナを待てないことこそが彼女の不幸で、スコールを産んだことが彼女の不幸には、絶対にならなかったはずだ。――信じて待っている、最愛の男の子供を産んだのだから。&lt;BR&gt;　幸せと断言することは、できないかもしれない。けれど彼女は不幸なんかじゃなかったはずだ。&lt;BR&gt;「レインさんだけじゃないよ。ラグナ様も、おねえちゃんも、ママ先生やリノアやゼル達みんな、絶対そう思ってるよ」&lt;BR&gt;　会えてよかったと思える人に出会えること。&lt;BR&gt;　それ以上に幸せなことなんて、きっとない。&lt;BR&gt;　セルフィは心の中に残されたハインの言葉を思い出しながら、瞳を伏せて静かに訊ねた。&lt;BR&gt;「スコールにもいるでしょ？　会えてよかった～って思える人。&lt;BR&gt;　その人に、会えてよかった～って思えて、幸せじゃない？」&lt;BR&gt;　スコールはゆっくり視線をセルフィに戻した。&lt;BR&gt;（会えてよかった）&lt;BR&gt;　言葉をゆっくり胸に取り込んで、スコールはセルフィの瞳を凝視する。&lt;BR&gt;　うるんでいても凛とした光を失わないその瞳は、スコールの良く知るそれ。&lt;BR&gt;（レイン――）&lt;BR&gt;　ラグナの内からレインを見つめたあの瞬間の記憶がよみがえる。&lt;BR&gt;　凛と瞳を輝かせて、まっすぐラグナを見つめていたレインの瞳が伝えていた、真摯な想い。&lt;BR&gt;&lt;BR&gt;　――――あなたに会えてよかった&lt;BR&gt;&lt;BR&gt;　たったそれだけ。&lt;BR&gt;　それだけの想いが、レインにラグナを待ち続けさせた。&lt;BR&gt;「ね？」&lt;BR&gt;　にこりと笑んでセルフィが小首をかしげる。&lt;BR&gt;「あぁ……」&lt;BR&gt;　ふっと苦笑めいた笑みを唇に刻み、スコールは眼を閉じる。&lt;BR&gt;　頬に降りかかった髪を払う華奢な指先を感じた。&lt;BR&gt;「今までも、これから先も、ラグナ様の帰る場所は、ず～っとず～っとここだけなんだよね」&lt;BR&gt;　鈴の音のような声が優しく響く。&lt;BR&gt;「住んでるとこと、帰る場所って、違っててもいいんだよね……」&lt;BR&gt;　たとえ今どこに住み暮らしていても。&lt;BR&gt;　最後の最後に心が思い描く、帰る場所があったっていい。&lt;BR&gt;　優しい約束に守られて、どこにいても心だけは帰っていくような、そんな場所があったっていい。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　――――おかえり、セルフィ……&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　一年前、死地から帰還した自分に向かって、スコールが言ってくれた言葉がふとよみがえった。&lt;BR&gt;　おかえり、会えてよかったと、本当に優しい声で告げてくれたあの日のスコール。&lt;BR&gt;　あの日からずっと、セルフィにとってスコールがいる場所はいつだって『自分の帰る場所』だった。&lt;BR&gt;　スコールの隣に誰がいても。スコールの帰る場所が、全然違うところでも、かまわなかった。&lt;BR&gt;　あの言葉が、きっとセルフィの恋の出発点だった。自覚すらできなかったけれど、間違いなくそうだった。&lt;BR&gt;（あたしは、スコールの帰る場所になれるかなぁ？）&lt;BR&gt;　何も言わないスコールの髪を指先でそっと弄びながら、セルフィは考える。&lt;BR&gt;　この先どれほど過酷な戦いの日々が待っていても、スコールがいつだって、心のどこかで帰りたいと思い描いてくれるような、そんな存在に。&lt;BR&gt;「なれるといいなぁ……」&lt;BR&gt;「……何だ？」&lt;BR&gt;「ううん……」&lt;BR&gt;　薄く眼を開けて自分を見上げるスコールに、セルフィは淡い微笑みを浮かべて首を振った。&lt;BR&gt;　何も言わないセルフィに、スコールはまた眼を閉じる。膝上の温かな重みが幸せで、セルフィは眼を細めてそんなスコールを見下ろしながら焦茶の髪を指で梳く。&lt;BR&gt;　少しだけ強い風が、二人の横を通り抜けてまた花びらをくるくると踊らせた。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　それは胸にしみるほど、綺麗な光景だった。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;&lt;/SPAN&gt;

<script data-viewer-zoom-script>
(() => {
  const stage = document.querySelector('.viewer-stage-image');
  const image = stage ? stage.querySelector('.viewer-image') : null;
  if (!stage || !image) {
    return;
  }

  const setZoom = (enabled) => {
    stage.classList.toggle('is-zoomed', enabled);
    image.setAttribute('aria-pressed', enabled ? 'true' : 'false');
    if (enabled) {
      const naturalWidth = image.naturalWidth || image.clientWidth || 0;
      const targetWidth = naturalWidth > 0
        ? Math.max(naturalWidth, Math.min(Math.round(stage.clientWidth * 0.92), naturalWidth * 4))
        : Math.round(stage.clientWidth * 0.92);
      image.style.width = `${targetWidth}px`;
      image.style.maxWidth = 'none';
      image.style.maxHeight = 'none';
      requestAnimationFrame(() => {
        stage.scrollTop = 0;
        stage.scrollLeft = Math.max(0, Math.round((image.scrollWidth - stage.clientWidth) / 2));
      });
    } else {
      image.style.removeProperty('width');
      image.style.removeProperty('max-width');
      image.style.removeProperty('max-height');
      stage.scrollTop = 0;
      stage.scrollLeft = 0;
    }
  };

  const toggleZoom = () => {
    setZoom(!stage.classList.contains('is-zoomed'));
  };

  image.setAttribute('tabindex', '0');
  image.setAttribute('role', 'button');
  image.setAttribute('aria-label', '逕ｻ蜒上ｒ諡｡螟ｧ縺ｾ縺溘・邵ｮ蟆・);
  image.setAttribute('aria-pressed', 'false');

  image.addEventListener('click', toggleZoom);
  image.addEventListener('keydown', (event) => {
    if (event.key === 'Enter' || event.key === ' ') {
      event.preventDefault();
      toggleZoom();
    }
  });

  stage.addEventListener('click', (event) => {
    if (event.target === stage && stage.classList.contains('is-zoomed')) {
      setZoom(false);
    }
  });

  window.addEventListener('keydown', (event) => {
    if (event.key === 'Escape' && stage.classList.contains('is-zoomed')) {
      setZoom(false);
    }
  });
})();
</script>
