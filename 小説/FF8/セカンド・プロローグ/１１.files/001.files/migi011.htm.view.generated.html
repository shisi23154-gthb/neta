      width=537&gt;&lt;SPAN&gt;&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　ガンブレード片手にエアステーションから飛び出し、リフターのチューブの上に飛び乗ったスコールは、かすかに眼を細めてぐるりと市街を見渡した。&lt;BR&gt;　足下の透明なチューブの中で、兵士が２名、折り重なるようにして倒れている。生きているのか死んでいるのか、チューブの上にいるスコールからでは判別しづらい。また、かわいそうなようだが、助けている余裕もない。&lt;BR&gt;　あちこちで煙をあげているエスタを見回していたスコールの眼に、やがて飛び跳ねている青い光のかたまりが飛び込んできた。人にはありえない高速移動を行い、内周道路あたりを駆け抜けている小さな影。&lt;BR&gt;　今、エスタは国力・兵力共にかなり低下した状態にある。あの少女を止めることができるような者は、このエスタにはいない。&lt;BR&gt;「セルフィ……」&lt;BR&gt;　ぎゅっと眉を寄せ、強い眼差しで青い光を睨みつけたスコールは、ガンブレードを握りしめたままチューブの上を走り始めた。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;「セルフィが……！？」&lt;BR&gt;　スコールの指示を受け、官邸に戻ったアーヴァインから事情を聞いたリノアは、真っ青になって立ち上がった。&lt;BR&gt;「それで、とりあえず今は市街を荒らし回っているだけなんだけど、いつこっちに来るかわからないから、リノアと大統領にはエルおねえちゃんの部屋に来てもらいたいんだ」&lt;BR&gt;　守るべき対象は、ひとつところにまとまっていてもらったほうが警護しやすい。眠っているエルオーネを動かすよりは健康な者が移動した方が効率的と提案するアーヴァインに、ラグナが素早く頷いた。&lt;BR&gt;「わかった。セルフィの方は？」&lt;BR&gt;「スコールが行ってます」&lt;BR&gt;　短く答え、アーヴァインは先導するため先に大統領私室を出た。ドアの外にはガーデンから派遣されてきた、リノアの護衛のためのSeeDがいた。&lt;BR&gt;「待って……ねぇ、アーヴァインは行かなくていいの？」&lt;BR&gt;　慌てて透明な廊下に飛び出したリノアが長身の背中に声をかけた。&lt;BR&gt;　振り返り、にこりと微笑んだアーヴァインは両手を腰に当てる。&lt;BR&gt;「前にスコールが言ってたろ？　僕の最優先は常にリノアだって。もちろん、こっちの状況が整えば応援に行くつもりでいるけどね～。だから、リノアも協力して」&lt;BR&gt;　リノアの護衛という名目でエスタに入ったアーヴァインが、肝心な時にリノアを放り出してセルフィの元に走るような真似は許されない。&lt;BR&gt;　きっぱり言い切ったアーヴァインに、こういう奴だったかとリノアはちょっと溜息をつく。&lt;BR&gt;　そう言えば一年前、この男は刑務所にリノア達が放り込まれた際、カーウェイ大佐からの依頼だからとリノアだけを連れて逃げたのだ。中に置いてきたセルフィが、初恋の少女であることなど百も承知で。&lt;BR&gt;　SeeDではないくせに、アーヴァインの行動は常にドライで合理的だ。&lt;BR&gt;「……あなたって、SeeDを目指さなかったくせに、考え方だけはSeeDそのものね」&lt;BR&gt;　リノアを先導するように歩き始めたアーヴァインに、溜息まじりに感想を述べる。&lt;BR&gt;　あの孤児院で育った子供達の中、唯一SeeDを目指さなかったのはこの男だけだ。万年候補生のサイファーだって、当たり前のように目指したもの。誇りであり、基盤であり、絶対のものである『SeeD』を、彼だけは必要としていない。&lt;BR&gt;　歩く速度を緩めることなく肩越しに振り返ったアーヴァインが、リノアの言葉に答えるべく口を開く。&lt;BR&gt;　だが次の瞬間炸裂した蒼い閃光に、その言葉はリノアの耳には届かなかった。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　エスタ市街は、阿鼻叫喚の地獄絵図と化していた。&lt;BR&gt;　少女が駆け抜けていった後は蒼い炎が道をなめ、少女が手を振るたびに蒼い光が走って建物を突き崩し、血しぶきが飛ぶ。&lt;BR&gt;　軽やかに空を飛び、細い右手の一振りで逃げ遅れる幼い子供を吹き飛ばし、理不尽きまわりない破壊と暴力の限りをつくす少女は、ふいに空気をこする異音を耳にし、ぴたりと足を止めた。&lt;BR&gt;　一瞬後、緑色の光が少女の眼の前を走り抜け、右手にあったリフター乗り場を吹き飛ばした。&lt;BR&gt;「！」&lt;BR&gt;　同時に突っ込んできた銀色の軌跡を軽やかに宙を飛んで避け、空中で一回転してチューブの上に着地しながら少女が振り返る。&lt;BR&gt;　無謀にも破壊神さながらの彼女に刃を向けた者が、素早く体勢を立て直して彼女の方に顔を向けた。&lt;BR&gt;「セルフィ……」&lt;BR&gt;　張りつめた緊張を浮かべる群青色の瞳が、まっすぐにセルフィを見つめていた。&lt;BR&gt;「…………」&lt;BR&gt;　予想通り現れた青年の姿に、蒼く輝く瞳を細め、にっこりとセルフィが微笑む。&lt;BR&gt;　黄色いリボンの制服に返り血を浴び、凄惨な姿で笑うセルフィを、絶望的な気分でスコールは見つめた。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　大統領私室からエレベータまで続く廊下が、すべて蒼い光に包まれた。&lt;BR&gt;　とっさに腕を伸ばしてリノアを抱き寄せ、背中にラグナをかばう体勢になったアーヴァインは、灼かれた眼を懸命にこらして辺りの様子をうかがう。殺気はないが、すさまじい力の奔流がある。&lt;BR&gt;「……なんだ！？」&lt;BR&gt;　戦闘態勢に入っているらしい、SeeDの声がする。アーヴァインの腕の中でリノアが身じろぎした。&lt;BR&gt;「リノア？」&lt;BR&gt;「わたしを……呼んでる……！」&lt;BR&gt;　呆然としたようにリノアが呟き、するりとアーヴァインの腕をすり抜け自力で立つ。光の中、黒髪が風にあおられるようにして舞った。&lt;BR&gt;　一瞬後。&lt;BR&gt;「リノア……！？」&lt;BR&gt;　ぎょっと眼を見開き、アーヴァインが手を伸ばす。&lt;BR&gt;　すぐつかまえられる位置にいたはずだったのに、その手はリノアの身体に届かなかった。&lt;BR&gt;「リノア！　どこに行ったんだい！？」&lt;BR&gt;　慌てて呼びかけるのと同時に、急速に蒼い光の奔流がおさまっていく。&lt;BR&gt;　開けた視界に映る廊下の上に、黒髪の美少女の姿はどこにもなかった。&lt;BR&gt;（やられた――！）&lt;BR&gt;　まんまと魔女リノアを奪われたアーヴァインの顔から、音を立てて血の気が引いた。&lt;BR&gt;「大統領！　エルオーネの部屋に行ってて下さい！」&lt;BR&gt;　叩きつけるようにラグナに叫び、アーヴァインが床を蹴って走り出した。状況を一瞬で把握したリノアの護衛のSeeDも、アーヴァインに続き走り始める。ラグナには大統領警護の白いSeeDがいるので、問題はない。&lt;BR&gt;「あ？　え？　お、おい……！」&lt;BR&gt;「僕はリノアを捜してきます……！」&lt;BR&gt;　振り返りもせずに言葉を残し、常にない勢いでアーヴァインは廊下をかけぬける。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　蒼い光が視界を染めた。&lt;BR&gt;「！」&lt;BR&gt;　間一髪のところでそれを避け、地面に転がったスコールが顔を上げると、その時すでにセルフィは軽やかに走り出していくところだった。&lt;BR&gt;「待て！！」&lt;BR&gt;　ガンブレードを一振りし、怒号をあげてスコールがそれを追う。&lt;BR&gt;　セルフィには申し訳ないが、ある程度ダメージを与えれば『分離』させられるかと攻撃魔法をいくつか放ってみたが、効果があるようには見えなかった。連続剣でも用いればダメージは与えられるかもしれないが、セルフィの命まで奪ってしまっては元も子もない。&lt;BR&gt;「セルフィ！　起きろ！　戻ってこい！！」&lt;BR&gt;　怒鳴りながらスコールが追いすがる。セルフィは振り返りもせずに腕を振り、蒼い光を放った。&lt;BR&gt;　大した殺気もこもらないそれを、首を少し傾けるだけで避け、スコールはすぅっと眼を細める。&lt;BR&gt;　明らかにセルフィはスコールに対して攻撃を仕掛けてこない。一定距離を保っている限りは、追ってくることもかまわないようだった。ある程度近づけば今のように攻撃魔法を放ってくるが、牽制以上の意味を持たないものだ。&lt;BR&gt;（なんだ……何が目的なんだ……！？）&lt;BR&gt;　エスタ市民はためらいなく殺していくのに、スコールにだけは手を出さない。&lt;BR&gt;　しかも攻撃方法が魔法一辺倒だ。&lt;BR&gt;（セルフィじゃない……？）&lt;BR&gt;　セルフィの姿を模した別人なのだろうか。それともセルフィの身体は奪ったものの、彼女の攻撃法を使うことができないだけなのだろうか。&lt;BR&gt;　当惑しながら、セルフィの放つ蒼い光に貫かれそうになる市民をかばい、破壊される建物の破片が人々を襲わないよう魔法で粉砕しながら、スコールは考える。&lt;BR&gt;「セルフィ！！」&lt;BR&gt;　走るセルフィの行く先は、明らかに大統領官邸だ。&lt;BR&gt;「セルフィ、もうやめろ！！」&lt;BR&gt;　それに気づき、スコールはぎりっと歯がみし、召喚魔法を口にする。&lt;BR&gt;「エデン！」&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　蒼い光の向こうから、誰かが呼んだ気がした。&lt;BR&gt;　抗えない力に満ちたその声に、思わず一歩踏み出したとたん、空間が揺らぎ立っている場所がいっきに変わった。&lt;BR&gt;「え……？」&lt;BR&gt;　呆然とリノアは呟く。一瞬前まで官邸内にいたはずだったのに、彼女は今官邸前に立っていた。破壊の限りをつくされたエスタ市街が見渡せる。&lt;BR&gt;「アーヴァイン？」&lt;BR&gt;　背後を振り返って呼びかけてみたが、長身の彼のキザな笑顔は見られなかった。&lt;BR&gt;　何が起こっているのかと途方に暮れ、天を仰いだリノアは、空に描かれている見慣れた魔法陣を見つけ大きく眼を見開いた。&lt;BR&gt;「エデン……！」&lt;BR&gt;　エデンは、一年前大海のよどみで手に入れた、最強のＧ．Ｆ．だ。&lt;BR&gt;　あんなものが呼び出されているということは……。&lt;BR&gt;「スコール！　セルフィ！」&lt;BR&gt;　悲鳴のような声をあげ、リノアは凄まじい光が渦巻く方へと走り始める。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　エデンの口から放たれた光をまともに受けたセルフィは、大きく跳ね飛ばされ、地面に叩きつけられた。&lt;BR&gt;「セルフィ！！」&lt;BR&gt;　その間に官邸への道をふさぐ形で先回りしたスコールが、油断なくガンブレードを構えて叫んだ。&lt;BR&gt;　普通の人間であれば大打撃をこうむり起きあがることも至難の業であるはずなのに、セルフィはぱっと飛び起き、何事もなかったようにスコールを振り返る。&lt;BR&gt;　血と埃にまみれた顔の中、翠のはずの瞳が、冷たい蒼に輝いていた。&lt;BR&gt;「セルフィを返せ！！」&lt;BR&gt;　鬼気迫る形相で叫ぶスコールに、セルフィが酷薄に瞳を細める。&lt;BR&gt;　突然、足下の地面が大きく揺れた。&lt;BR&gt;「！」&lt;BR&gt;　ぎょっと息をのむスコールを突き上げるように、地面が大きく盛り上がり、破裂するように爆発する。&lt;BR&gt;「うぁっ……！」&lt;BR&gt;　かろうじて地面に叩きつけられる前に受け身をとったスコールに、続けざまに蒼い光が衝撃となって襲いかかった。&lt;BR&gt;「――――――――！」&lt;BR&gt;　鋭利な刃物で全身をずたずたに引き裂かれる激痛に、声にならない絶叫をあげるスコールを、淡々とした眼差しでセルフィが見下ろし、すいと腕を振り上げた。&lt;BR&gt;「っ……！」&lt;BR&gt;　ぎりっと歯がみし、スコールはすばやく身体を反転させると、地面を蹴りつけて跳ぶ。&lt;BR&gt;　無理な姿勢から強引に、ガンブレードを一閃させた。&lt;BR&gt;「……」&lt;BR&gt;　ひょいと上体をそらし、セルフィがその剣先を避ける。一瞬後、スコールのいた場所に、地面から蒼い光が天まで届く勢いで吹き上がった。&lt;BR&gt;「セルフィ！！　戻ってこい！！」&lt;BR&gt;　怒鳴りながら、スコールは勢いのついたまま、左腕でセルフィのリボンをつかみ、押し倒す。&lt;BR&gt;　と、蒼い光が眼の前に炸裂し、凄まじい勢いで宙に飛ばされた。&lt;BR&gt;「…………」&lt;BR&gt;　押し倒されたセルフィはひょいと立ち上がり、ぱたぱたと制服の埃を払った。&lt;BR&gt;　遙かかなたまで吹き飛ばされたスコールの行方を蒼い眼で追い、それから小さく肩をすくめると、官邸に向かって足を進めた。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　激しい蒼い光に錐揉み状態にされ、大きく飛ばされたスコールは、道路を超えてエアステーション近くの道路に落下した。&lt;BR&gt;　落ちる瞬間、衝撃と共にパシン！と硬質な音が響く。&lt;BR&gt;　全身に激痛が走ったが、致命傷とはならなかったことに、驚いてスコールは身体を起こした。&lt;BR&gt;「何……」&lt;BR&gt;　かけた覚えのない防御魔法がかけられていたことに、驚きながらスコールは立ち上がる。ケアルをかけて一息つき、急いで走り始めた。&lt;BR&gt;（誰が……？）&lt;BR&gt;　走りながら、考える。一体何が起こっているのか、本質の部分が見えていない――そんな気がした。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　一方リノアは、内周道路を走り始めて間もなく、進行方向先から見覚えのある人影がこちらに向かってくるのを見つけて眼をむいた。&lt;BR&gt;「セルフィ！？」&lt;BR&gt;　破壊と暴力の化身のような有様の友の姿に、悲鳴のような声を上げてリノアは立ちつくす。&lt;BR&gt;　軽やかに走っていたセルフィは、リノアの姿を眼に止めるとおやと言ったような顔になり、ぴたりと足を止めた。&lt;BR&gt;　蒼い瞳がひたとリノアを見すえる。その冷たさに、リノアは身動きかなわなくなっていた。&lt;BR&gt;（何……この感覚……？）&lt;BR&gt;　激しい既視感に襲われ、リノアは眼を見開いたままセルフィを見つめる。&lt;BR&gt;　以前、セルフィではない誰かに、これと同じ感覚を味わったことが、ある……？&lt;BR&gt;「リノア！！」&lt;BR&gt;　叫ぶ声が背後で聞こえ、凍り付いていたリノアがはっと顔を上げた。&lt;BR&gt;「リノア、後ろに……！」&lt;BR&gt;　官邸から走ってきたアーヴァインは、セルフィと真正面から対峙しているリノアにようやく追いつき、細い腕を引き寄せ背後にかばった。&lt;BR&gt;「セフィ……」&lt;BR&gt;　冷めた眼差しを向けてくるセルフィの瞳は、冷たい蒼。&lt;BR&gt;　息をのんで立ちつくす二人を眺め、セルフィはふいに、にっこりと笑った。&lt;BR&gt;　返り血を浴び血みどろの姿で、常と変わらない屈託ない笑顔を向けられ、アーヴァインとリノアの肌がいっきに粟立ち、全身がそそけ立った。&lt;BR&gt;「お前が、当代の魔女？」&lt;BR&gt;　耳障りの良い澄んだ声。けれどやはりどこまでも温度を感じさせることのない、声。&lt;BR&gt;　セルフィ本来の声が持つ、強く振った鈴の音を思わせる、凛とした響きはどこにもない。&lt;BR&gt;　音だけは同じセルフィの声が、朗らかにアーヴァインに向けて発せられる。&lt;BR&gt;「お前は、その騎士？」&lt;BR&gt;　くすくすと楽しそうに笑ってたずねられ、アーヴァインはがくがくと震えながら、小刻みに首を振る。&lt;BR&gt;「ふぅん……」&lt;BR&gt;　不思議そうにセルフィは首をかしげる。そんな仕草も、見慣れた可愛らしい動きの再現で――。&lt;BR&gt;　なんだか悪夢でも見ている気分の二人の前で、セルフィは小首を傾げたまま、ひょいと背後を振り返った。&lt;BR&gt;　首だけ振り返ったセルフィに、ぱらぱらぱらと軽い音と共に、無数の銃弾が浴びせかけられる。&lt;BR&gt;「セ、セフィ……！」&lt;BR&gt;　青ざめたアーヴァインが悲鳴のような声で名を呼んだが、セルフィは微動だにせず、そんな彼女の前で無数の銃弾は、キン、と金属質の音を立てて不可視の壁にぶち当たり、ばらばらと地面に落ちる。&lt;BR&gt;「ひっ……！」&lt;BR&gt;　隙を突いたつもりでいたエスタ兵３名が、同時に息をのんだ。&lt;BR&gt;　はっとアーヴァインが眼を見開く。&lt;BR&gt;「逃げろ！！」&lt;BR&gt;　とっさに叫んだアーヴァインの声もむなしく、セルフィが無造作に右手を上げた。&lt;BR&gt;「きゃあぁ！」&lt;BR&gt;　セルフィの小さな手のひらから生まれた蒼い光が、刃となり次々にエスタ兵の身体を貫いてゆくのを目の当たりにし、リノアが悲鳴を上げてアーヴァインにしがみついた。&lt;BR&gt;　どうと倒れた３人の上に、光はいくつもいくつも襲いかかり、動かぬ躯にさらなる穴を穿ち、ただの肉塊に変えていく。&lt;BR&gt;「やめて……！」&lt;BR&gt;　死体を見たことがないわけではなく、人を殺したことだってあるリノアだが、こんな悲惨な姿を見たことはない。眼にしたものの衝撃の大きさに、身を震わせるリノアを背後にかばったまま、アーヴァインも呆然と息をのむ。&lt;BR&gt;　ついでに周辺の建物のいくつかも塵芥に変えさっぱりし、セルフィはくるりとリノアとアーヴァインに向き直る。にこにこと微笑むセルフィに、アーヴァインとリノアは息をのみ立ちつくした。&lt;BR&gt;　銃弾ごときでは太刀打ちできないのは、たった今見たばかりである。この様子では話し合いなどという穏やかな方法を選択することなど不可能に近い。&lt;BR&gt;「セ、セフィ……！」&lt;BR&gt;　じわりとセルフィが細い腕を上げる。指先に蒼い光が宿る。&lt;BR&gt;「来る……！」&lt;BR&gt;　リノアが小さな声を上げ、オダインバングルをむしり取るようにはずした。&lt;BR&gt;　にっこりとセルフィがそんなリノアを見つめて笑った。&lt;BR&gt;（セルフィじゃない……）&lt;BR&gt;　スコールが幾度となく言っていたことを思い出し、慄然となりながら、リノアも確信する。&lt;BR&gt;　セルフィと同じ顔を持ち、無邪気で屈託ない笑顔を浮かべるこの少女は、だが明らかにセルフィとは違う。&lt;BR&gt;　瞳の色もそうだが、そこに宿る光が違う。&lt;BR&gt;　セルフィはこんなふうに、冷たい氷のような眼差しを向けたりはしない……！&lt;BR&gt;&lt;BR&gt;「おやすみ」&lt;BR&gt;　無邪気な笑顔を向けたまま、指先に巨大な蒼い光を灯し、セルフィが囁いた。&lt;BR&gt;「そんなの許さない……！」&lt;BR&gt;　オダインバングルを地面に投げ捨て、リノアがアーヴァインの前に飛び出す。&lt;BR&gt;　すいっとセルフィが腕を振った。&lt;BR&gt;　ぎゅっと眼を閉じリノアが両腕を突きだした。&lt;BR&gt;　巨大な蒼の力と、加減を知らない魔女の力が、空気中で轟音を立ててぶつかり合った。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;「なんだ……！？」&lt;BR&gt;　力と力の衝突は、必死で官邸に向かうスコールからも、はっきりと光の奔流として眼に映った。&lt;BR&gt;　今、このエスタでこんな力を放つことのできるのは……。&lt;BR&gt;「リノア……！？」&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;「セルフィ！！」&lt;BR&gt;　襲い来る蒼い力を、力をぶつけて何とかくい止めたリノアは、懸命に放出する力を維持しながら大きな声で叫んだ。&lt;BR&gt;「セルフィ！　ねぇ、わたしよ！　リノアよ！　戻ってきて！！　しっかりして！！」&lt;BR&gt;　黒髪が光の奔流の中で大きく舞い上がり、揺れて視界を遮る。真正面から対峙しているはずなのに、光と自分の髪のせいで、リノアからセルフィの顔は見えない。&lt;BR&gt;　だが、顔は見えずとも、ぶつけてくる殺気のすさまじさから、相手がまだセルフィ以外の者であることは明白だった。&lt;BR&gt;（本当にセルフィなの……？）&lt;BR&gt;　必死に力を押し戻そうと努力を続けながら、リノアは泣き出したい気分で唇を噛む。&lt;BR&gt;　リノアの知るセルフィは、もっともっと精神的に強くて、天然ボケに見えるくせに誇り高くて、子供っぽいくせに誰より優しい少女だった。こんな風に、誰かに操られ、屈するような少女ではなかった。&lt;BR&gt;　もしセルフィでないのなら、セルフィの姿を模しただけの殺人者なら、自分もスコールも遠慮なんかせずにすむ。戦えないと明言した自分だけど、何かの役にはきっと立てる。&lt;BR&gt;　だけど……。&lt;BR&gt;「ねぇ、セルフィ……！！」&lt;BR&gt;　ググ……ッと抵抗が強くなり、必死で踏ん張る足がわずかに後退した。&lt;BR&gt;「リ、リノア……」&lt;BR&gt;　肩を押さえアーヴァインが動揺した声を上げる。&lt;BR&gt;　アーヴァインは射撃手だ。一撃必殺といった場面では最適の人材だが、殺してはならない相手とぎりぎりの命のやりとりをするようなこんな場面では、どうすることもできない。疑似魔法はストックしてあるが、ガルバディアガーデンの生徒であるアーヴァインは、Ｇ．Ｆ．をジャンクションしていない。アーヴァイン自身の力だけで、魔女リノアと互角以上の力をふるうような少女に対抗できる魔法力なんて、出せるはずがない。&lt;BR&gt;「セルフィ……きゃっ」&lt;BR&gt;　叫んだ瞬間、リノアの身体ががくりと揺れた。&lt;BR&gt;　ぎょっと眼を見開き、その身体を支えながらアーヴァインがとっさに防御魔法を唱える。&lt;BR&gt;　懸命に眼の前でリノアがくい止めている強大な蒼い力の前に、シェルのバリアは何とも頼りなく、ないよりはマシかと言った程度のものだった。&lt;BR&gt;「あぁ、一番好きな女の子の手にかかるなんて……！」&lt;BR&gt;　思わず嘆いたアーヴァインの声を耳にし、全精力を傾けて力比べをしているリノアが、むっとして柳眉を険しくした。&lt;BR&gt;「何バカなこと言ってんのよ！　セルフィに、仲間を殺させるなんて、絶対絶対させちゃいけないんだからねっ！！」&lt;BR&gt;　もちろんわたしだってまだまだ死にたくないのよと怒鳴りつけられ、リノアの身体を必死で支えながらアーヴァインはぱちぱちと眼を瞬いた。&lt;BR&gt;　戦わないと言っていたリノアが、こんなふうに懸命に対抗している理由が、ようやくわかった。&lt;BR&gt;　戦う気はなくとも、襲い来る敵に対しては、力によって対抗しなくてはならない。セルフィに、リノアやアーヴァインといった彼女にとって大切な仲間を、殺させるようなことがあってはならない。セルフィを殺す気など毛頭ないリノアだが、反対にセルフィに殺されてしまうわけにもいかないのだ。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　睨み合い、力と力をぶつけ合っているのも、そろそろ飽きた。&lt;BR&gt;「……この程度ではまだ駄目ということか……」&lt;BR&gt;　懸命に蒼い光を食い止めているリノアの姿を退屈そうに眺め、小さく呟いたセルフィは、人差し指だけを向けていた右手首をくいっと動かし、手のひら全体をリノアに向ける。&lt;BR&gt;「殺すくらいでないとならぬらしい……」&lt;BR&gt;　囁きと共に蒼い光がぐんと膨れあがり、リノアの抵抗を突き破る勢いで二人に押し寄せた。&lt;BR&gt;（え、えぇっ！？）&lt;BR&gt;　ぎょっと眼を見開き、リノアは蒼い光を凝視する。確かにこちらはそろそろエネルギー切れではあるが、それにしても桁外れの勢いの光の渦が押し寄せてくる。&lt;BR&gt;（うそ、うそうそ……！）&lt;BR&gt;　光の渦はリノアの力をのみこみ、そのままリノアとアーヴァイン自身を――&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　光が爆発した。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　確実に死を予感し、全身を硬直させていたリノアとアーヴァインは、すぐ眼の前で炸裂した光の大爆発に眼を開けていられず顔をそむける。&lt;BR&gt;　力の均衡が崩れ、倒れ込んでくるリノアを抱きかばいながら、アーヴァインは必死で光の渦を薄目で見つめた。&lt;BR&gt;「……官邸に……」&lt;BR&gt;　光の渦の中、冷やかな低い声がぼそりと聞こえてくる。&lt;BR&gt;「いろって言ったのが、わからなかったか？」&lt;BR&gt;　遠くからＧ．Ｆ．とおぼしき咆吼。&lt;BR&gt;（この声……）&lt;BR&gt;　おそるおそる、アーヴァインの胸の中から身を起こし、リノアが顔を上げた。&lt;BR&gt;　光の中、ガンブレードを握りしめ、不機嫌そうな顔でスコールがリノア達を睨んでいた。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;「スコール！」&lt;BR&gt;　歓喜し、リノアが声をあげた。&lt;BR&gt;　たった今、エデンを召喚しセルフィの蒼い力そのものに強引に攻撃を加えて軌道をそらし、リノアとアーヴァインを窮地から救ったスコールは、言うことをまったく聞かないリノア達をじろりと睨み、それからセルフィの方へと視線を向けた。&lt;BR&gt;　蒼い眼差しをまっすぐにスコールに向けるセルフィは、先ほどと体勢はまったく変わっていない。&lt;BR&gt;　強引に軌道をそらされた蒼い光は、スコール達の左手にあった建物の残骸を跡形もなく吹き飛ばし、その細かな破片がその場にいた全員の肌を浅く切り裂いていったが、誰一人として動く者はいない。&lt;BR&gt;「セルフィ……」&lt;BR&gt;　スコールが顔をかすかにゆがめた。にっこりとセルフィが笑顔で応える。&lt;BR&gt;　その瞳が冷たく輝いているのでなかったら、きっと本当のセルフィなのだと思わずにいられなかっただろう、明るい笑顔。&lt;BR&gt;「なんで……あんたはこんなことを……？」&lt;BR&gt;　なぜ、セルフィの身体を使ってエスタを破壊しなければならないのか。&lt;BR&gt;　そしてセルフィを連れていたはずのサイファーはどこにいるのだろう。&lt;BR&gt;　まさかやられてしまったのかと、表情を曇らせるスコールに、セルフィはまたにっこりと笑った。&lt;BR&gt;「この程度で、滅びる世界でもあるまい？」&lt;BR&gt;　滅びようが滅びまいが、一向にかまわないといった調子でセルフィは朗らかに言い切り、とんと軽く地面を蹴った。&lt;BR&gt;「……セル……」&lt;BR&gt;　ふわりと、小さな身体が宙に浮かぶ。まるで、重さなど持たないかのように。&lt;BR&gt;「多少は目立つことをやらかさないと、目当てのものが出てこない」&lt;BR&gt;　宙に浮かんだまま、にっこりとそう呟くと、セルフィはかすかに背をそらすようにして天を仰いだ。&lt;BR&gt;　ぽう……っと小さな身体が蒼い光に包まれる。&lt;BR&gt;「……！」&lt;BR&gt;　次に何が起こるのかを予測し、素早くスコールはリノアを振り返った。&lt;BR&gt;「伏せろ！！」&lt;BR&gt;「えっ……」&lt;BR&gt;　大きくリノアが眼を見開き、アーヴァインがリノアを抱きしめて地面に押し倒す。&lt;BR&gt;　その上にスコールも飛びつくようにし、大きく腕を広げて地面に伏せた。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　伏せた３人の上に、凄まじい衝撃が襲いかかった。&lt;BR&gt;　セルフィの小さな身体から放たれた無数の蒼い光は、四方に飛び散り爆裂し、建物も建物内部にいた人々もろとも塵芥に変えた。地面が激しく揺れ、轟音が終末の足音のように響き渡る。&lt;BR&gt;　ある程度の攻撃はおさまったかとスコールは顔を上げ、空中に留まるセルフィの姿を見上げた。&lt;BR&gt;「……アーヴァイン、リノアを連れて官邸に戻れ」&lt;BR&gt;　低い声で呟き、スコールはガンブレードを手にゆっくりと身を起こした。&lt;BR&gt;　大統領官邸付近の建物は壊滅状態に近かったが、さすがというか何というか、官邸自体は堅牢なシステムによって保護され、一部破損が見えるが無事のようである。&lt;BR&gt;　おそらく今のエスタで一番安全であると断言できる場所にいるよう指示し、立ち上がったスコールに、アーヴァインはリノアを助け起こしながら顔を向けた。&lt;BR&gt;「スコールは？」&lt;BR&gt;「俺はセルフィを追う」&lt;BR&gt;　きっぱりと言うスコールに、リノアが震えながら声をかけた。&lt;BR&gt;「ね、大丈夫なの？」&lt;BR&gt;「……可能性は、ゼロではないさ」&lt;BR&gt;　かすかに頷いてスコールは答える。&lt;BR&gt;　張りつめた瞳に浮かぶ自虐的な光を認め、不安げに口をつぐんだリノアを置いて、スコールは地面を蹴るようにして走り始めた。&lt;BR&gt;&lt;BR&gt;　空中である程度建物を破壊したセルフィは、大統領官邸にくるりと背を向け、空中をまるで地面の上ででもあるように軽やかに走り始めた。&lt;BR&gt;　ついでに破壊活動も行っていく少女の背中を見ながら、スコールは距離を目測し、ガンブレードを握る手に力をこめて走り始める。&lt;BR&gt;（目当てのものって……言ってたな……）&lt;BR&gt;　先ほどのセルフィの言葉を反芻してスコールは考える。&lt;BR&gt;（『セルフィ』が破壊活動を行うことで……何かをおびき出そうとしている……？）&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;「どうしようか？」&lt;BR&gt;　リノアを助け起こし、アーヴァインが静かにたずねた。&lt;BR&gt;　大人しくこのまま官邸に戻るとは思えないお姫様に、諦め半分に意志をたずねたアーヴァインに。&lt;BR&gt;「……戻るわ」&lt;BR&gt;　意外にもリノアは、視線を伏せてそう答えた。&lt;BR&gt;　わがままお姫様の殊勝な様子に、おやとアーヴァインは眼をまたたく。圧倒的な力の差を見せつけられて、さしものリノアも手出しができないと観念したか。&lt;BR&gt;　何となく無言で立ちつくす二人の上で、何か轟音が聞こえてきた。&lt;BR&gt;「？」&lt;BR&gt;　視線を上げた二人の頭上に、どこかから吹き飛んできた半透明の破片が迫ってきていた。&lt;BR&gt;「えぇ！？」&lt;BR&gt;　恐らく遠くの方でセルフィが破壊した建造物の破片だろう。半透明で軽そうに見えるが、けっこうな重量と破壊力を持っていることは身をもって知っている。&lt;BR&gt;　魔女の力を持って砕いてしまおうか、しかし加減を知らないリノアが使うと破片どころか周辺を吹き飛ばしてしまう可能性も――混乱した二人が身動き取れずに見つめていた時。&lt;BR&gt;&lt;BR&gt;　がつん。&lt;BR&gt;&lt;BR&gt;　重い音がして、空中で弾かれた破片が勢いをつけたまま、リノアとアーヴァインよりはるか左方の地面に突き刺さった。&lt;BR&gt;「え？」&lt;BR&gt;　きょとんと眼を見開く二人の前で、ヒュッと空気の鳴る音と共に、崩れ落ちたリフターの元チューブの残骸の上に身軽に飛び降りた影があった。&lt;BR&gt;「え？　……えぇ！？」&lt;BR&gt;　振り落ちてくる破片を手にした武器で打ち落とし、振り向きもせずスコールの走り去っていった方向へと駆け去っていくその姿。&lt;BR&gt;　呆然とその背を見送ってしまい、それからおもむろに眼をこすったアーヴァインとリノアは、無言で顔を見合わせお互いの頬をぎゅうとつねった。&lt;BR&gt;「いててててて！」&lt;BR&gt;「いったぁ～！」&lt;BR&gt;　痛い。ということは、夢ではない。&lt;BR&gt;「……どうする～？」&lt;BR&gt;　呆然としたまま、またスコール達が去っていった方角にアーヴァインが眼を向ける。&lt;BR&gt;　リノアはアーヴァインの頬をつねっていた手を下ろし、ぐっとそれを拳に握りしめた。&lt;BR&gt;「決まってるわ。スコールに知らせなくちゃ……！」&lt;BR&gt;　急がなければ大惨事になる。切羽詰まった眼差しを向けてくるリノアに、アーヴァインはにこりと微笑んだ。&lt;BR&gt;「意見が合ったね」&lt;BR&gt;　言うなり、アーヴァインはリノアの手を取り、走り始めた。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　空中を軽やかに走っていたセルフィは、しばらく破壊活動を楽しんでいた後、ふいにぴたりと足を止めた。&lt;BR&gt;「……………！」&lt;BR&gt;　眉をひそめて背後を振り返る。懸命に追ってきていたスコールと眼が合った。&lt;BR&gt;　ちらりとさらにその背後を見、かすかに唇をゆがめて笑う。狙い通りに事態が運んでいることに、満足するように。&lt;BR&gt;「セルフィを返せ！！」&lt;BR&gt;　よそ見をするセルフィに、ようやく追いついたスコールが、あがった息もそのままに地面を蹴った。&lt;BR&gt;　いくつかの残骸を踏み台に、高く高く跳びながらセルフィの前に素早く到達する。大きく伸ばした腕、その指先は、しかしセルフィには届かなかった。&lt;BR&gt;　軽く上体をそらしてスコールの手を避け、セルフィは小さな手を無造作に振る。&lt;BR&gt;　眼の前で弾けた蒼い光をガンブレードで防ぎ、地面に叩きつけられる前に空中で一回転して勢いを殺し、体勢を立て直して地面に着地する。&lt;BR&gt;　地面に足が触れた瞬間、バネのようにまた地面を蹴り、またセルフィのいる空中へと弾丸のように跳ぶ。&lt;BR&gt;　再度ガンブレードを下から薙ぐようにして繰り出す。本気の殺気のこもっていないそれを同じようにセルフィは上体をそらしてそれを避け――ぴくりと眉を上げて素早く右手に逃れた。&lt;BR&gt;　一瞬後にセルフィがいた場所に白い光が炸裂する。放ったホーリーを避けられたスコールは、しかしそのまま身体を空中で大きくねじった。&lt;BR&gt;「！」&lt;BR&gt;　尋常ではない反射神経で身をしずめて捕えようとする手をかわし、逆にスコールの懐深くセルフィの小柄な身体が飛び込んでくる。&lt;BR&gt;　鳩尾はかろうじてブロックしたが、腹部に強烈な膝蹴りを食らった。肺にあった空気すべてが押し出され、ぐっと喉を鳴らし垂直に飛ばされたスコールは、しかしその後を追って蒼い光の塊が複数飛んでくるのを知り、慌ててガンブレードを横に構える。&lt;BR&gt;　蒼い光が炸裂し、さらに上空へと飛ばされる。飛びかけた意識の片隅で、頭上に明確な殺気を感じた。&lt;BR&gt;（しまっ……！）&lt;BR&gt;　空中を自在に駆ける少女は、すでにスコールより上空に飛び、彼を待っていた。&lt;BR&gt;　にっこりと悪夢の笑顔を浮かべ、両腕に力を溜め、自分の方へと飛ばされてくるスコールを待ち受けて。&lt;BR&gt;「おやすみ」&lt;BR&gt;　可愛らしい声で楽しげに囁き、溜めた力を上から叩きつけた。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　落ちた瞬間の記憶はまったくない。&lt;BR&gt;　だが、全身を駆けめぐる激痛が、かろうじて意識をつなぎ止めた。&lt;BR&gt;（…………俺……）&lt;BR&gt;　ぼんやりと眼を上げる。視界が曇ってよく見えない。&lt;BR&gt;　ふいに喉の奥から何かがせり上がってきて、スコールはごふっと咳き込んだ。鮮血が霧のように散った。&lt;BR&gt;　咳き込むたびに、激痛が全身を駆けめぐる。吐いた血が気管をふさがないよう顔を横向けたが、スコールにできるのはそこまでだった。手足はほとんど感覚がない。&lt;BR&gt;　と、脇に何かが降り立つ気配がした。&lt;BR&gt;「…………」&lt;BR&gt;　見えない眼をこらすようにして、スコールはその人影を見上げた。&lt;BR&gt;　静かに地面に降り立ち、スコールを見下ろしているのは、蒼い眼をしたセルフィだった。&lt;BR&gt;「生きてるか？」&lt;BR&gt;　淡々とセルフィがたずねる。&lt;BR&gt;　スコールはそんな彼女を見上げた。&lt;BR&gt;「……セル……」&lt;BR&gt;　ごふっと咳き込みながら、スコールは彼女を呼んだ。&lt;BR&gt;　冷たい蒼い瞳ではなく、翠の瞳をした彼女の名を。&lt;BR&gt;「…………セフィ…………」&lt;BR&gt;　戻っておいで。&lt;BR&gt;　願いをこめて囁くスコールに、セルフィはにっこりと笑った。&lt;BR&gt;　血まみれのスコールを哀れむような眼差しで、可愛らしく微笑んだ。&lt;BR&gt;「……どのような姿で呼んでも、もうこれはお前には応えぬよ」&lt;BR&gt;　残酷なまでに優しい口調で、セルフィはきっぱりとそう言い切った。&lt;BR&gt;　はじめから、スコールのはかない望みなどすべてお見通しだとでも言うように。&lt;BR&gt;　――――以前のように、瀕死のスコールの姿を見たとしても、彼女は自分を取り戻せない。&lt;BR&gt;「セフィ……！」&lt;BR&gt;　無駄な努力だと嘲笑われ、ぎゅっと奥歯を噛みしめ悲痛な声音でスコールが呟く。&lt;BR&gt;　微笑んだままのセルフィは、可愛らしい仕草で小さく小首をかしげ、それからゆるりと背後を振り返った。&lt;BR&gt;「……お前のおかげで、どうやら私の目的は達せられるらしい」&lt;BR&gt;　破壊されつくした道の向こうを見つめたまま、淡々とセルフィが呟く。&lt;BR&gt;　何かを待ち受けているようなセルフィに、スコールは渾身の力を込め、腕を伸ばした。&lt;BR&gt;「――――？」&lt;BR&gt;　不思議そうにセルフィが首をめぐらせる。&lt;BR&gt;　上体を無理矢理ひきずり起こし、血まみれの手でセルフィの腕をつかんだスコールは、荒い息を噛み殺しながらセルフィを睨みつける。&lt;BR&gt;「……どう……あっても……返さない……だな……？」&lt;BR&gt;　怒りに満ちた眼差しを受け、セルフィは酷薄に眼を細めて笑った。&lt;BR&gt;「これは私のものだ」&lt;BR&gt;　確信をもって言いきるセルフィに、スコールの眦がさらに厳しくなる。&lt;BR&gt;　怒りに震えるスコールの手を見下ろし、次に道の向こうに眼を向け、小首をかしげてセルフィはしばらく何かを思案しているようだったが、やがてうんとひとつ頷いて、身体ごとスコールに向き直った。&lt;BR&gt;「そうだな……どうやらお前は死んだ方が、より私の目的には役立つだろう」&lt;BR&gt;　言いながら、腕をつかまれたまま静かに地面にひざまずく。&lt;BR&gt;　向ける無邪気な笑顔はそのままに、スコールがつかんでいる手にふわりと力が宿る。&lt;BR&gt;　一瞬眼を見はったスコールが、蒼く輝く細い腕を凝視した。&lt;BR&gt;　激しい逡巡が胸を走り抜ける。凶器と化した細い腕から視線を外し、セルフィの向ける蒼い瞳を見すえた。&lt;BR&gt;「セルフィ……」&lt;BR&gt;　間近く見つめ合いながら、セルフィがにこりと蒼い瞳を優しく細めた。&lt;BR&gt;「今度こそ、もうお眠り」&lt;BR&gt;　残酷に優しく囁き、セルフィがトンと指先をスコールの胸に当てた。&lt;BR&gt;　スコールがぎゅっと強く眼を閉じた。&lt;BR&gt;（セルフィ……）&lt;BR&gt;&lt;BR&gt;　――――信じてるからね……&lt;BR&gt;&lt;BR&gt;　夢の中、最後に聞こえた囁き声。&lt;BR&gt;&lt;BR&gt;　――――あたしを……殺していいよ……&lt;BR&gt;&lt;BR&gt;　凛として誇り高く輝く、翠の瞳。&lt;BR&gt;　……あきらめずにいることが、どうしてこれほどに困難なのだろう。&lt;BR&gt;（セルフィ……）&lt;BR&gt;　肺の痛みをこらえて大きく息を吸い、悲痛に顔をゆがめたスコールは、萎えた腕にぐっと力をこめた。&lt;BR&gt;　渾身の力をこめて、セルフィの肩を無理矢理引き寄せる。&lt;BR&gt;「！」&lt;BR&gt;　突然抱きすくめられ、予期しなかった動きにセルフィが驚きに眼を見はる。地面に叩きつけられ、即死してもおかしくない重傷を負った者の動きではなかった。&lt;BR&gt;　心臓に狙いを定めた指先がわずかにずれる。&lt;BR&gt;　が、多少心臓がずれたところでこの至近距離では結果に大差はない。それはスコールも承知のはずだ。&lt;BR&gt;「――――」&lt;BR&gt;　ちらりとセルフィが蒼い瞳でスコールを仰ぎ見る。スコールはセルフィを抱きすくめたまま、動かない。&lt;BR&gt;　ふっとセルフィは小さく笑った。スコールの最後のあがきなのだと思った。&lt;BR&gt;「かわいそうに……」&lt;BR&gt;　囁く。決して手に入らないものを、傷だらけになって追い求める姿を哀れんで、笑った。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　どん。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　衝撃が走った。&lt;BR&gt;　細い腕からほとばしる蒼い光に胸部を貫かれ、スコールがかっと大きく眼を見開く。&lt;BR&gt;　息をつまらせながら、それでも懸命に腕に力をこめた。固く固くセルフィを抱きしめる。&lt;BR&gt;「――――！！」&lt;BR&gt;　そしてセルフィも。&lt;BR&gt;　蒼い光を放った直後、自らを襲った衝撃に大きく眼を見開いていた。&lt;BR&gt;「セル……」&lt;BR&gt;　かはっと血を吐きながら、スコールが囁いた。&lt;BR&gt;「大……丈夫……」&lt;BR&gt;　ひとりにはしない。&lt;BR&gt;　言葉にならない囁きを唇に乗せ、スコールは眼を閉じた。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;「スコール……！」&lt;BR&gt;　残骸をかきわけ、ようやくスコールに追いついたリノアとアーヴァインが、スコールを呼んだ。&lt;BR&gt;　がしゃんと音を立て、スコールとセルフィが同時にくずおれる。&lt;BR&gt;　スコールの背に開いた大きな穴、セルフィの華奢な背からのぞくガンブレードの切っ先が、リノアとアーヴァインの眼に飛び込んできた。&lt;BR&gt;　張り裂けそうに大きく眼を見開き、叫びの形に開いた口をリノアが声もなく覆う。&lt;BR&gt;　二人の身体の下からゆるゆると流れ出すのは生々しい鮮血。&lt;BR&gt;「………ぁ…………」&lt;BR&gt;　がくがくと震えだし、走り出すことも座り込むこともできないまま、リノアが現実を拒否するように首を振った。&lt;BR&gt;「……いやあぁぁぁぁ！！」&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　悲痛な響きを持つ叫び声が、空間を支配した。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;&lt;/SPAN&gt;

<script data-viewer-zoom-script>
(() => {
  const stage = document.querySelector('.viewer-stage-image');
  const image = stage ? stage.querySelector('.viewer-image') : null;
  if (!stage || !image) {
    return;
  }

  const setZoom = (enabled) => {
    stage.classList.toggle('is-zoomed', enabled);
    image.setAttribute('aria-pressed', enabled ? 'true' : 'false');
    if (enabled) {
      const naturalWidth = image.naturalWidth || image.clientWidth || 0;
      const targetWidth = naturalWidth > 0
        ? Math.max(naturalWidth, Math.min(Math.round(stage.clientWidth * 0.92), naturalWidth * 4))
        : Math.round(stage.clientWidth * 0.92);
      image.style.width = `${targetWidth}px`;
      image.style.maxWidth = 'none';
      image.style.maxHeight = 'none';
      requestAnimationFrame(() => {
        stage.scrollTop = 0;
        stage.scrollLeft = Math.max(0, Math.round((image.scrollWidth - stage.clientWidth) / 2));
      });
    } else {
      image.style.removeProperty('width');
      image.style.removeProperty('max-width');
      image.style.removeProperty('max-height');
      stage.scrollTop = 0;
      stage.scrollLeft = 0;
    }
  };

  const toggleZoom = () => {
    setZoom(!stage.classList.contains('is-zoomed'));
  };

  image.setAttribute('tabindex', '0');
  image.setAttribute('role', 'button');
  image.setAttribute('aria-label', '逕ｻ蜒上ｒ諡｡螟ｧ縺ｾ縺溘・邵ｮ蟆・);
  image.setAttribute('aria-pressed', 'false');

  image.addEventListener('click', toggleZoom);
  image.addEventListener('keydown', (event) => {
    if (event.key === 'Enter' || event.key === ' ') {
      event.preventDefault();
      toggleZoom();
    }
  });

  stage.addEventListener('click', (event) => {
    if (event.target === stage && stage.classList.contains('is-zoomed')) {
      setZoom(false);
    }
  });

  window.addEventListener('keydown', (event) => {
    if (event.key === 'Escape' && stage.classList.contains('is-zoomed')) {
      setZoom(false);
    }
  });
})();
</script>
