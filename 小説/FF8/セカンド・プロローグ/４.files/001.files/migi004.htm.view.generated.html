      width=537&gt;&lt;SPAN&gt;&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　青い鳥の姿をしたＧ．Ｆ．が姿を消した頃、官邸では、スコールとセルフィ、両者と連絡が取れなくなったエスタ国首脳陣と白いSeeDたちが青くなって走り回っていた。&lt;BR&gt;　セルフィが行方不明になっていたのは最初からだが、そこへもってスコールの通信機までもが突然応答不能になってしまったため、最悪の状況を想定されたのだ（あとでわかったことだったが、スコールが持っていた通信機は、Ｇ．Ｆ．との戦闘中にどこかに飛んでいってしまっていたのだった）。&lt;BR&gt;　さらに、自室に護衛と共に待機中だったエルオーネが突然意識を喪失し、すわ何かの襲撃かと皆が慌て、官邸内は一時的なパニック状態となってしまっていた。&lt;BR&gt;「おい、エルはいつ意識を回復すんだよ～！？」&lt;BR&gt;　いつものんきなラグナも、さすがに青ざめてオロオロと部屋を歩き回って叫び散らしている。&lt;BR&gt;「そう焦ってはいけないでおじゃるよ。何事も落ち着いてどっしり構える気概が大事でおじゃる」&lt;BR&gt;　ピリピリした空気に、火に油を注ぐ口調でのんびり応えているのは、天才オダイン博士である。&lt;BR&gt;　天才だが人でなし、と、お人好しのラグナに言わしめた傑物だ。&lt;BR&gt;　エルオーネの様子が、病気というにはあまりに異常なため、魔力が働いたものかどうかを診断しにかり出されてきているのである。&lt;BR&gt;　毎度のことながら、何を言っても無駄でしかないオダインに、ラグナは何度目か忘れたががっくりと肩を落とし、それから気を取り直してキロスを振り返った。&lt;BR&gt;「スコールとセルフィはまだ見つかんね～のかぁ～！？」&lt;BR&gt;「残念だがまだだ。Ｇ．Ｆ．の姿が消えたようだから、ようやく本格的な捜索ができるだろうが……」&lt;BR&gt;　こちらは焦っているんだかどうでも良く思っているのか、やたら冷静な口調である。&lt;BR&gt;　ラグナはぶんぶんと大きく腕を振り回した。&lt;BR&gt;「だ～～～！！　なんでそんな冷静なんだよっ！！」&lt;BR&gt;「君が冷静さを失っているようだから、私が君の分まで冷静でいなくてはならないのだ」&lt;BR&gt;「なんなんだよ、そりゃ！！　なんでそんな水のツラなんだっ！！」&lt;BR&gt;　親バカ丸出しだな……と、キロスはその時心の中で呟いた。……口には出さなかったが。&lt;BR&gt;「……それを言うなら『蛙のツラに水』だと思うが、ラグナ君」&lt;BR&gt;「～～！！　いーんだよ、んなことはっ！！」&lt;BR&gt;　ラグナが悲鳴をあげた瞬間、部屋の扉がシュンと音を立てて開いた。&lt;BR&gt;　続けて叫ぼうとした声をのみこみ、ラグナは扉の方に顔を向け、次の瞬間絶句した。&lt;BR&gt;「？」&lt;BR&gt;　キロスがラグナの視線を追うように扉に視線を向け、同じように息をのむ。&lt;BR&gt;　開いた扉に寄りかかるようにして、探し求めていた青年が立ちつくしていた。&lt;BR&gt;「ス、スコール……」&lt;BR&gt;　息をのんでしまったのは、その姿が全身埃と血で汚れきっていたからだ。&lt;BR&gt;　右肩に荷物のように担がれたセルフィはぴくりとも動かず、彼女もまた同様に全身が血に染まっている。&lt;BR&gt;　左腕には、泣き疲れて眠っている子供がいたが、その子供も血まみれだった。&lt;BR&gt;「どうしたんだよ……！？」&lt;BR&gt;　驚きから立ち直り、ラグナが慌ててスコールに走り寄る。&lt;BR&gt;　スコールはひどく殺気立った眼差しで部屋の内部を見回し、それからのめりこむようにしてラグナを見つめた。&lt;BR&gt;「……エルオーネは……どうかしたのか」&lt;BR&gt;　低い声は、疲労のためにかすかに割れている。&lt;BR&gt;　ラグナは思わず立ち止まり、部屋の奥を振り返った。&lt;BR&gt;「あ、あぁ……さっき突然、倒れちまって……」&lt;BR&gt;「心配ないでおじゃるよ。特に魔力が動いた形跡はないでおじゃる」&lt;BR&gt;　さらりと答えたのはオダインだ。&lt;BR&gt;　スコールの鋭い眼差しを受け止めて、いつも通りの飄々とした調子で言葉を続ける。&lt;BR&gt;「エルオーネはおそらく、例の力を使っていたんでおじゃる。小さい頃から、力を限界以上に使いすぎると、オーバーヒートして寝込んでいたでおじゃる。今回も同じでおじゃろ」&lt;BR&gt;「力を……？」&lt;BR&gt;　呟いたスコールに、ラグナが視線をちらりと向ける。&lt;BR&gt;　その視線が意味するところに気づき、スコールは小さくかぶりを振った。&lt;BR&gt;　今回、戦闘中に意識を飛ばしかけたことはあったが、誰かの意識にジャンクションしたりはしなかった。&lt;BR&gt;「そうか……誰を飛ばしていたんだかな……」&lt;BR&gt;　独白めいて呟き、ラグナは少しだけ安堵の表情を浮かべた。&lt;BR&gt;　おそらく、度重なる襲撃に、エルオーネは自分にできる精一杯のことをしようと、前回前々回の襲撃時に誰かの意識を飛ばして手がかりをつかもうとしていたのに違いない。&lt;BR&gt;　誰の意識を使ったのかはわからないが、何にせよ、襲われたわけではないなら一安心だ。&lt;BR&gt;　心配事がひとつ消え、ほっと息を付くラグナの前で、スコールは事態を納得すると、左腕に抱いていた子供をぐいと近くの白いSeeDに押しつけた。&lt;BR&gt;「え……」&lt;BR&gt;「ケアルをかけたし大きな怪我はしていない。疲労は大きいだろうから念のため病院に連れて行ってやってくれ。母親が眼の前で殺されてたから、精神ショックを起こしているかもしれない」&lt;BR&gt;「あ、あぁ……」&lt;BR&gt;　言うだけ言って、スコールはセルフィを担いだままで、部屋を出ようとくるりと皆に背を向けた。&lt;BR&gt;「お、おい！　お前ら、その傷は……！」&lt;BR&gt;　慌てたようなラグナの声に、すたすた歩き出しかけていたスコールが、仕方なさそうに足を止める。&lt;BR&gt;　肩越しにラグナを振り返った表情は気だるげで、ひどく疲れているらしいことが見てとれた。&lt;BR&gt;「……例のＧ．Ｆ．とやり合っただけだ。傷はもう治したから心配いらない。２時間だけ休ませてくれ。２時間したら戻る」&lt;BR&gt;　短く答えて、また前を向き部屋を出る。&lt;BR&gt;　廊下に出たところで、スコールはふと思いついたように再度振り返った。&lt;BR&gt;「２時間……俺たちが休んでいる間、誰も官邸には入れないでくれ。目撃者も、被害者もだ」&lt;BR&gt;「え？」&lt;BR&gt;　眼をまばたいたラグナに、スコールは一瞬眼を伏せ、それからもう一度繰り返した。&lt;BR&gt;「……２時間だけ、官邸内に民間人を立ち入り禁止にしてほしい。理由は、２時間後に説明する。申し訳ないが、許可を願う」&lt;BR&gt;　言葉は途中からSeeDとしての言葉に変化していた。&lt;BR&gt;　冷静さを保っているようで、実のところスコールも混乱しているのだと、ようやくラグナ達にも理解できた。&lt;BR&gt;　眼の前にいる相手が誰であるかさえ、あまりスコールは認識できていなかったのかもしれない。&lt;BR&gt;　話してる途中で相手がクライアントのラグナであることを認識した、そんな感じだった。&lt;BR&gt;「……わかった。２時間たったら、ここに集合だ。……それでいいな？」&lt;BR&gt;「……了解」&lt;BR&gt;　静かに確認したラグナに、スコールが眼を上げ敬礼をとる。&lt;BR&gt;　合った視線の先で、豪快に笑ったラグナに、スコールの緊張がわずかにゆるんだ気がした。&lt;BR&gt;「それじゃ」&lt;BR&gt;　呟くように答え、スコールは重くはあったがしっかりとした足取りで、大統領私室を後にした。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　近いはずなのにひどく遠く感じた自分の部屋にようやくたどり着き、スコールは扉を閉め、ベッドの上にどさりとセルフィを投げ出すように横たえ、自分もベッドの脇にどっと腰を落とした。&lt;BR&gt;　セルフィのフルケアで傷は完全に治ってはいたが、身体能力を極限まで酷使した影響で綿のような疲労感が全身を苛んでいる。&lt;BR&gt;　首をねじ曲げるようにして、ベッドの上のセルフィを見る。規則正しい呼吸を繰り返し、セルフィは静かに眠っていた。&lt;BR&gt;「……なんだったんだか、な……」&lt;BR&gt;　腕を伸ばし、セルフィの頬にまつわる栗色の髪を指先でもてあそぶ。くるりと綺麗なカーブを描く髪は優しく指にからまった。&lt;BR&gt;　急速に強い眠気が襲ってきた。&lt;BR&gt;　スコールはセルフィの髪に触れたままの姿勢で、泥のような眠りに引きずり込まれていった。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　二時間と言い置いてスコール達は部屋に閉じこもってしまったが、一時間とたたないうちに官邸前にはエスタの人々が詰めかけて騒ぎとなっていた。&lt;BR&gt;「な、なんだぁ～？」&lt;BR&gt;　スコール達が休んでる内に、仮眠くらいは取れるかとのんきなことを考えていたラグナは、報告を受けて眼をまるくする。&lt;BR&gt;「それが、目撃者のようなんですが、……」&lt;BR&gt;　報告に来たエスタ兵は、困ったように口ごもる。&lt;BR&gt;　代わりに共に来た、白いSeeDが口を開いた。&lt;BR&gt;「どうやら、この官邸で見た顔を目撃したという者が多く出ているようです」&lt;BR&gt;「この官邸で？」&lt;BR&gt;　ラグナとキロスは思わず瞠目する。&lt;BR&gt;　とすると、彼らが一番恐れていた、内部犯行説が有力になるということなのだが……。&lt;BR&gt;「スコール君は、目撃者も被害者も、官邸には入れるな、と言っていたな」&lt;BR&gt;　慎重な声で、キロスが今にも目撃者の元に飛んでいこうとするラグナを抑えて呟いた。&lt;BR&gt;「だからなんだよ？」&lt;BR&gt;「……スコール君は、犯人が誰だか知っているのかもしれない」&lt;BR&gt;　ラグナは思わずキロスに向き直った。&lt;BR&gt;「なんだって～？」&lt;BR&gt;「もしこの官邸にＧ．Ｆ．の使い手がいたとしたら、そして目撃者や犠牲者の家族がその使い手に会ったら、どうなると思う？」&lt;BR&gt;　冷静なキロスの声に、ラグナはちょっと眉根を寄せた。&lt;BR&gt;　目撃者はともかく、犠牲者の家族が犯人にもし出会ったら……間違いなく、復讐・報復行動に出るに違いない。&lt;BR&gt;　だが相手はあのＧ．Ｆ．を召喚するほどの実力者だ。あっさり返り討ちにあうことは必至だが、そうなればこの官邸は間違いなく大混乱に陥る。正体がばれれば、見境なく自分や、エルオーネに襲いかかってくることだってあり得ない話ではない。&lt;BR&gt;「なるほどな……」&lt;BR&gt;　Ｇ．Ｆ．とやり合ったと言っていたスコールが、その使い手とまみえていたとしても不思議はない。官邸で見た顔だったなら、混乱を起こさずに事態を収拾したいと考えるはずだ。&lt;BR&gt;「とりあえず、臨時の捜査本部を設置しよう。リフターの運転を再開して、官邸に押し掛けてる市民はエアステーションにとりあえず移動させろ。今官邸内で動けるのは誰だ？」&lt;BR&gt;　ラグナが納得したのを見てとって、キロスは素早く兵や他の補佐官に指示を出しながら大統領室を出ていく。ウォードは少し考える仕草をして、結局部屋からは出て行かなかった。&lt;BR&gt;「……まったく、何が起こってるんだかなぁ！」&lt;BR&gt;　嘆かわしいと両腕を大きく広げ、ラグナはそんな親友に大仰に溜息をついてみせるのだった。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　一体どれほど眠ったのか、いつ眠ったのか、わからないほどの深い眠りから、唐突に目覚めが訪れた。&lt;BR&gt;　ぱちりと眼を開いた瞬間に、セルフィの意識は完全に覚醒していた。&lt;BR&gt;「…………あれぇ～？」&lt;BR&gt;　真っ先に飛び込んできたのは、エスタ独特の半透明の天井。&lt;BR&gt;　前後の記憶がいまいち曖昧で、あやふやだ。&lt;BR&gt;「？」&lt;BR&gt;　首をかしげたところで、視界の片隅に何かが入り、セルフィは首を傾けるようにしてそちらを見る。&lt;BR&gt;　やわらかいシーツに頬が触れ、自分がベッドにいるのだとそこで初めて認識した。&lt;BR&gt;　そして、シーツに落ち自分の髪に触れたまま動かない、大きな手のひら。&lt;BR&gt;「……スコール？」&lt;BR&gt;　手から腕、腕から肩と視線を移していって、ベッド脇に座り不自然な体勢で自分のすぐ傍に頭を落として眠っているスコールの姿を見、セルフィは驚いて眼をまるくした。&lt;BR&gt;「なんでこんなとこで寝てるの～？」&lt;BR&gt;　呼びかけても、スコールはぴくりとも動かない。全身が血みどろでますます驚いたが、怪我をしている様子はなく、呼吸も規則正しく寝息と呼べるものだった。&lt;BR&gt;　そういえば、意識を失う直前、同じように全身を血に染めたスコールを見た気がする。&lt;BR&gt;　セルフィだけが使える「スロット」魔法で、その傷を癒したことも、おぼろげながら覚えている。&lt;BR&gt;　あの場所がどこで、どうしてスコールが傷ついてしまったのか、まるでわからなかったが……。&lt;BR&gt;「……あ、れ～？」&lt;BR&gt;　半身を起こして、セルフィはそこで初めて自分の姿を見下ろして、思わず呆然と眼を見開いた。&lt;BR&gt;　着ているのはいつものガーデンの制服。けれど、その濃紺が、いつもより深い色に染まっていた。&lt;BR&gt;　鮮やかな黄色いリボンが、真っ赤なリボンに変化している。&lt;BR&gt;　数日前、ワンピースに血痕をつけて眠っていた夜のことを思い出し、にわかにセルフィの心の中が不安に覆われた。&lt;BR&gt;（これ、なに～？）&lt;BR&gt;　どきどきと心臓を高鳴らせながら、セルフィはスコールに手を伸ばし、とにかく起きてもらおうと肩を揺する。&lt;BR&gt;　――揺すろうとして、ぴたりとその手が止まった。&lt;BR&gt;「……！！」&lt;BR&gt;　眼にしたものの衝撃の大きさに、セルフィの翠の双眸が限界まで大きく見開かれる。&lt;BR&gt;　視線の先に伸ばしたセルフィの手、その小さな手に、乾いた血がべったりとついていた。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　泥のように眠っていたスコールは、突如耳元で起こった悲鳴ではっと眼を覚ました。&lt;BR&gt;　とっさに飛び起き、何が起こったかとあたりを素早く見回す。&lt;BR&gt;　こちらもセルフィ同様、目覚めた瞬間に覚醒していた。&lt;BR&gt;「……セル、フィ……？」&lt;BR&gt;　緊急事態かと緊張していたスコールは、ベッドの隅で小さくなっているセルフィの姿を眼に止め、いぶかしげに眉をひそめた。&lt;BR&gt;　部屋はとても静かで、自分とセルフィ以外の姿はどこにもない。&lt;BR&gt;「今の、セルフィか？」&lt;BR&gt;　先ほどの悲鳴が夢のものか現実のものか自信がなくなってきて、スコールはちょっと戸惑い気味にセルフィに問いかける。&lt;BR&gt;　セルフィは、その問いには答えずただ自分の手をじっと見つめて、動かなかった。&lt;BR&gt;「セルフィ？　どうした？」&lt;BR&gt;　もう一度声をかけてみる。エアステーションの前で会った時のようになってしまったかと危惧したスコールの前で、ゆるゆるとセルフィが顔を上げ、なんとも微妙な表情で口を開いた。&lt;BR&gt;「スコール……あたし……」&lt;BR&gt;　それは少し気弱に見えたがいつものセルフィで、スコールは内心で安堵しながら、ギシギシと今更ながらに痛む身体を動かし、ベッドの上に腰を乗せた。&lt;BR&gt;　変な格好で寝ていたので、筋肉が硬直してしまったらしい。&lt;BR&gt;　しかし今はそんなことに関わっている場合ではなかった。&lt;BR&gt;「どうした」&lt;BR&gt;　セルフィに近づいて、彼女の顔をのぞきこむ。&lt;BR&gt;　それからようやく、セルフィが手のひらを膝の上に置いていることに気が付いた。&lt;BR&gt;　乾いてしまった、暗赤色の血に染まった小さな手のひら。&lt;BR&gt;　視線を落としたスコールに、セルフィが囁きに近い声でそっとたずねた。&lt;BR&gt;「……また、Ｇ．Ｆ．出たんだ？」&lt;BR&gt;　スコールは黙って頷いた。&lt;BR&gt;「……また……あたし…………おんなじだ……」&lt;BR&gt;　今度も、スコールは黙って頷いた。&lt;BR&gt;　セルフィが途方に暮れたような眼差しになる。呆然と、小さな手を握りしめ、また開く、そんな仕草を繰り返す。&lt;BR&gt;　乾いた血がぱりぱりとはがれ、シーツの上に散っていくのを、スコールはどこか遠い感情で見つめていた。&lt;BR&gt;　セルフィは、あのエアステーション前での出来事を覚えていない。&lt;BR&gt;　青い鳥のようなＧ．Ｆ．のことも。眼の前で殺されていった哀れな母親のことも、すべて。&lt;BR&gt;　それがどういうことなのか――スコールの頭の中で、結論を言葉にすることを拒む感情がある。&lt;BR&gt;　長い沈黙が二人の間をすり抜け、やがてセルフィが、長いまつげを震わせるようにしてスコールの顔をじっと見つめた。&lt;BR&gt;「……あたし、なのかなぁ～？」&lt;BR&gt;　スコールは言葉を失い、セルフィの顔をまともに見れず眼を伏せた。&lt;BR&gt;（そうかもしれない）&lt;BR&gt;　そう分析する冷静な自分と、認めたがらない感情とがスコールの中でせめぎ合っていた。&lt;BR&gt;「……あたし……だよね……」&lt;BR&gt;　視線をそらせたスコールの前で、セルフィがかすれた声でそう呟く。&lt;BR&gt;「こないだの時から、少し思ってたんだ～。人死にが出た日に、返り血浴びてるなんて、どう考えたってそれしか思いつかないよね～？」&lt;BR&gt;　淡々としたセルフィの声。その言葉が、どんな顔で紡がれているのか、スコールには見えなかった。&lt;BR&gt;「まるで、あの時のママ先生みたいだね……」&lt;BR&gt;　セルフィの言葉に、スコールの脳裏にかつてガルバディア国に君臨していた魔女イデアの姿が甦る。&lt;BR&gt;　漆黒の衣を身にまとい、冷たい眼差しで大統領を血祭りにあげた美しい魔女。&lt;BR&gt;　本来の心を押しつぶされ、未来の魔女に操られ人を殺めた、哀れなひと。&lt;BR&gt;「……セルフィ」&lt;BR&gt;　眼を伏せたまま、彼女の腕をぎゅっとつかむ。セルフィの声は、あくまでも淡々としていた。&lt;BR&gt;「でもあたしには、あたしを使ったのが誰だかわかんないよ」&lt;BR&gt;「……」&lt;BR&gt;「誰かが、あたしの中にいたことも、わかんなかったんだ～」&lt;BR&gt;　ぽつり、と。&lt;BR&gt;　膝の上に置き去りにされたセルフィの手のひらに、雫がこぼれ落ちた。&lt;BR&gt;　茶褐色になっていたセルフィの手が、たちまち鮮やかな深紅に色を変える。&lt;BR&gt;　スコールは思わず息をつめ、眼を上げていた。&lt;BR&gt;　翠色の瞳が、鮮やかに輝いてスコールを見つめていた。&lt;BR&gt;「あたし、……あたし、SeeD失格かなぁ～？」&lt;BR&gt;　真実から眼をそらさないまっすぐな瞳から、ほんのひとしずくだけ涙をこぼし……セルフィは、にこっと笑った。&lt;BR&gt;　どこまでも明るい、笑顔になった。&lt;BR&gt;（――――！）&lt;BR&gt;　ずくん、とスコールの胸が大きく鳴った。&lt;BR&gt;　それは痛みだったのか、衝撃だったのか――。&lt;BR&gt;「あたし……」&lt;BR&gt;「セルフィじゃない」&lt;BR&gt;　気が付くとスコールは鋭い口調でセルフィの言葉を遮っていた。&lt;BR&gt;　たまらずにまた眼を伏せてしまったが、今見たセルフィの笑顔が、脳裏に焼き付いて離れなかった。&lt;BR&gt;「……スコール？」&lt;BR&gt;　小さく、セルフィが首をかしげてスコールを見る。&lt;BR&gt;「スコール……はんちょ」&lt;BR&gt;　いたずらっぽい声で、セルフィが優しく呼びかけた。&lt;BR&gt;　その声に宿るのは間違いなく自分に対する気遣いで……スコールの中で訳のわからない苛立ちがふくれあがる。&lt;BR&gt;「あたしを……殺していいよ」&lt;BR&gt;　そんな苛立ちを募らせるばかりのセルフィの言葉。&lt;BR&gt;「きっと、はんちょがあたしを捕まえるか、殺すかしなかったら、ガーデンが困るよね～？」&lt;BR&gt;　眼を上げて見れば、SeeDの誇りを宿した瞳がまっすぐにスコールを見すえている。&lt;BR&gt;「まだ……わからない」&lt;BR&gt;　けれどもスコールは、苦い表情でそう告げるのが精一杯だ。&lt;BR&gt;　前回の襲撃時に目撃情報を持って官邸にやってきた市民は、おそらくセルフィの顔を見ていただろう。&lt;BR&gt;　その中で、今日の夜起きた襲撃に、Ｇ．Ｆ．と共にあったセルフィの姿を見ていた者も皆無ではないはずだ。それほど今夜のＧ．Ｆ．は派手に動いて、人を襲っていた。&lt;BR&gt;　召喚したところを見たわけではなくとも、あの殺戮のただ中で、ただひとり襲撃を逃れＧ．Ｆ．の傍に立っていたセルフィが、まったくの無関係であるなどとは、誰も思わない。&lt;BR&gt;　記憶の中の顔と合致させて、官邸に人が押し寄せてきたところで、何の不思議もないのだ。&lt;BR&gt;「……はんちょは、わかってるよね～？」&lt;BR&gt;　笑顔のセルフィの問いかけに、スコールは首を力無く横に振る。&lt;BR&gt;「決まったわけじゃない」&lt;BR&gt;「でも、火種は消さなくちゃいけない……だよね～？」&lt;BR&gt;　セルフィはどこまでも自分に対して厳しい人間なのだと、スコールは改めて気づかされた。&lt;BR&gt;　意識があろうとなかろうと、自分の不始末は自分の罪なのだ。&lt;BR&gt;「セルフィ……少し落ち着いてくれ」&lt;BR&gt;「あたしは落ち着いてるよ～。落ち着かなきゃいけないのは、はんちょの方だよ～？」&lt;BR&gt;　くすくすとセルフィが笑った。&lt;BR&gt;　……その瞬間、嵐のように吹き荒れた衝動をなんと呼べばよいのだろう。&lt;BR&gt;「スコール？」&lt;BR&gt;　驚いたようなセルフィの声が耳元で聞こえたが、動く身体を制御することはできなかった。&lt;BR&gt;　いつの間に抱きしめたのか、自分自身でさえわからない内に、腕の中にセルフィを捕まえていた。&lt;BR&gt;「スコール～？　い、痛いよ～」&lt;BR&gt;　オロオロと、困惑するセルフィの声にも、きつく抱く腕をゆるめることができなかった。&lt;BR&gt;　自分の保身というものをまるで考えない、セルフィの思考回路が理解できてしまうことが苦しかった。&lt;BR&gt;　もしも理解することができなかったら、スコールはそんなことはできないと、セルフィのせいじゃないと、頑是ない子供のように主張しただろう。&lt;BR&gt;　一緒に逃げてしまおうとさえ言ったかもしれない。&lt;BR&gt;　けれど、それができないのは――スコールがSeeDだったからだ。&lt;BR&gt;　スコールがSeeDを誇りにするのと同じように、セルフィがどれほどSeeDを誇りにしているかわかるからだ。&lt;BR&gt;　きっと、同じ立場にあればスコールだって同じことを口にするだろう。&lt;BR&gt;　バラムガーデンのSeeDがエスタを襲う、そんな事実が露呈する前に、同じSeeDの手で捕らえられるか暗殺されることを選ぶだろう。&lt;BR&gt;　自分一人のために、バラムとエスタが全面対決するようなことになってはならないのだ。&lt;BR&gt;　……けれど。&lt;BR&gt;「セルフィ、まだ結論を出してしまわないでくれ」&lt;BR&gt;　こんなことを言うのは、SeeDの班長として失格だ。&lt;BR&gt;「……今回の事件には黒幕がいる。そいつの狙いは、エスタだけじゃない、多分バラムガーデンもなんだ」&lt;BR&gt;　最善の方法はわかっている。わかっていても……スコールにはできない。&lt;BR&gt;「それ、どういう、こ……」&lt;BR&gt;　腕の中で呟いたセルフィが、言葉尻をにごしてふと沈黙した。&lt;BR&gt;　彼女にもスコールの言わんとするところがわかったのだ。&lt;BR&gt;「…………ガーデンと、エスタの分断……？」&lt;BR&gt;「エスタの国力低下を狙っているのかガーデンの勢力拡大阻止なのかはわからないけどな」&lt;BR&gt;　常にないスピードでスコールの頭の中がフル回転していた。&lt;BR&gt;　後になって思い返してみても、この時のスコールは、とにかくセルフィの身の安全を確保することしか考えていなかった、と思う。&lt;BR&gt;　事件の首謀者として、セルフィが処刑されるなんてことに、するわけにはいかなかった。&lt;BR&gt;「最初のラグナとエルオーネを襲撃した奴……一番はじめにあのＧ．Ｆ．をジャンクションし召喚した人物、もしくは実行犯にＧ．Ｆ．を与え襲撃計画を立てた人物が、どこかにいる。&lt;BR&gt;　そいつが今回の黒幕で――セルフィを利用した張本人だ」&lt;BR&gt;「利用……」&lt;BR&gt;　抱いた小さな身体が、一瞬ぶるっと震えた。&lt;BR&gt;　それが緊張なのか、怒りなのかは、表情の見えないスコールにはわからなかった。&lt;BR&gt;「セルフィがどうして利用されるのに選ばれたかは、俺にもわからない。もしＧ．Ｆ．過適合症のことを知っていてそれも利用するつもりだったなら、バラムガーデンに近い存在か、内部に情報源を持つ奴なんだろう。&lt;BR&gt;　セルフィがエスタ入りしなければ、市街の襲撃は多分、黒幕か最初の実行犯が続けて行う予定だったと思う」&lt;BR&gt;「……どうして、あたしを簡単に利用なんてできたのかな～？」&lt;BR&gt;　ふっとセルフィの腕にかすかに力がこもり、それに応じて力をゆるめたスコールの腕の中から、彼女はゆっくりと身を起こし、至近距離から彼を見つめた。&lt;BR&gt;「あたし、ほんとに全然気づかなかったんだ～。確かに、おねえちゃんとショッピングモールに降りたあの日、途中で意識なくしたけど、精神操作みたいな気配は全然……」&lt;BR&gt;　そこまで言って、セルフィはきゅっと眉根を寄せた。&lt;BR&gt;「……ううん、違う、あたし、あたし、あの時一瞬だけ、頭の中がざわっとした……！」&lt;BR&gt;「え？」&lt;BR&gt;　セルフィは両手で口を覆い、スコールを見上げて言い募った。&lt;BR&gt;「ショッピングモールで意識なくなった時、頭の中ざわってしたよ～、スコール！　もしかしたら、あの時に誰かがあたしの中に入ったのかもしれないよ～！」&lt;BR&gt;「それは……」&lt;BR&gt;　驚きに眼を見開いて、スコールは息をのんだ。&lt;BR&gt;　その症状は……それは、かつてラグナが言っていた症状によく似ている。&lt;BR&gt;　エルオーネが誰かの意識を他人に接続しジャンクションさせた時の……被接続者が感じる症状に。&lt;BR&gt;（それじゃ、黒幕というのは……）&lt;BR&gt;　その瞬間、前触れなく部屋の扉がシュッと音を立てて開いた。&lt;BR&gt;　とっさにセルフィを背にかばったスコールの視界内に、キロスとウォードを連れたラグナの姿が見えた。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;「状況としては、かなりやばいことになっちまってんだ」&lt;BR&gt;　ラグナの先導で、スコール達は官邸の地下に降りていた。&lt;BR&gt;「……セルフィを見た奴が……？」&lt;BR&gt;　表情を険しい無表情に覆ったスコールが、低い声で確認する。&lt;BR&gt;　その後ろをついて歩くセルフィは、常になく心細げな表情だ。&lt;BR&gt;　ラグナが部屋に入ってきてから、二人は速攻でシャワールームに放り込まれ、全身にかぶった血糊を洗い流し、予備の制服に着替えさせられ、武器を含めた荷物を全部持たされた上で大統領の部屋にある隠しエレベーターで地下に降り、降りた場所から長く続く透明チューブの中を延々と歩かされていた。&lt;BR&gt;　武器を取り上げることもせず、ラグナはキロスとウォードを連れる以外は誰も部屋にすら近寄らせず、またどこへ行くのかも口にはしなかった。&lt;BR&gt;「あぁ、こないだの襲撃時、おまえらにも目撃者の事情聴取につき合ってもらってたろ？　そん時にセルフィに会ってた奴らが、顔をばっちり覚えてたみたいなんだな」&lt;BR&gt;　地下にはりめぐらされているらしい透明チューブは、足音を完璧に吸収する特殊素材でできている。&lt;BR&gt;　おそらく、不測の事態が発生した時に、要人が敵の眼をあざむき避難するためのものなのだろう。&lt;BR&gt;「一応、情報を確認しときてーんだが……誰かがセルフィにジャンクションしたってのは、確実なんだな？」&lt;BR&gt;　歩くスピードをゆるめずにラグナが尋ね、スコールはちらっと鋭い視線をその背中に向けてから、慎重な声で肯定した。&lt;BR&gt;「……おそらく」&lt;BR&gt;「エルが首謀者ってわけはありえねーから……するってーと敵はまた未来さんってことか～？」&lt;BR&gt;「……わからない」&lt;BR&gt;　溜息混じりにスコールは答えたが、おそらくその可能性がもっとも高いだろうとも思っていた。&lt;BR&gt;　エルオーネの能力は、相手がどれほど高い精神力を持っていても、何の抵抗も許さずに意識を接続させてしまうところに真の怖さがある。&lt;BR&gt;　力ずくで他人の意識を外側からコントロールするのは相手の精神力も関係するがひどく困難だ。しかし、意識のガードを破って内側にさえ入り込んでしまえば、相応の力を持つ者が相手の意識を乗っ取り操ることなどたやすいだろう。&lt;BR&gt;　魔女と呼ばれたイデアでさえ、エルオーネの能力で内側に入り込んだアルティミシアに、あれほど簡単に意識の制御を奪われていたのだ。&lt;BR&gt;　エルオーネの力はあまりにも自然に他人の意識を接続させてしまう。それがエルオーネの力の脅威。&lt;BR&gt;　その力を今の時代で自在に使うにはエルオーネの協力が必要になる。しかし、未来には、オダイン博士が開発したエルオーネの能力を発現させる機械が存在しているのだ。&lt;BR&gt;　ジャンクション・マシーン・エルオーネ。かつてアルティミシアがイデアとリノアを操るために使った機械。&lt;BR&gt;　いつの時代からそれが実用化されたのかをこの時代から推し量ることは不可能だが、アルティミシアの生きた時代に近い時代に生きている人間だったら、その機械を使い過去に来ることができる。&lt;BR&gt;「でも、もし未来の敵なら……狙いはエスタの国力なんかじゃないはずだ」&lt;BR&gt;「……あぁ、そりゃそうだな……」&lt;BR&gt;　政治が絡むのは、常に現在を生きている者達の間のみだ。&lt;BR&gt;　いっそう黒幕の正体が不透明になってしまい、ラグナが喉の奥で苛々とうなり声をあげた。&lt;BR&gt;「スコール君」&lt;BR&gt;　不意に、スコールとセルフィの後ろについていたキロスが声をかけてきた。&lt;BR&gt;　振り返ったふたりに、キロスが静かな眼差しを向ける。&lt;BR&gt;「君たちが今向かっている場所は、魔法研究所だ。緊急処置として、セルフィ君にはしばらく、研究所内に留まってもらう。市民達には参考人として調査中ということにする」&lt;BR&gt;「……」&lt;BR&gt;　厳しい表情でスコールは足を止め、セルフィは後ろを向いたまま歩いていたので、スコールの腕にどんとぶつかって慌てて止まった。&lt;BR&gt;「拘留、ということか？」&lt;BR&gt;　冷やかに確認するスコールを、セルフィは困惑気味に見上げた。&lt;BR&gt;「……軟禁状態にはなるかもしれないな。これ以上敵が彼女にジャンクションしないよう、防御室にしばらく入ってもらう」&lt;BR&gt;　スコールの脳裏に、宇宙で封印されていたアデルや魔女記念館で封じられようとしていたリノアの姿がよみがえり、いよいよ彼は本格的にセルフィの腕をぎゅっとつかみながら、キロスに向き直った。&lt;BR&gt;　険しい表情で口を開きかけたスコールに、その時腕をつかまれたセルフィが、慌てて飛びついて言った。&lt;BR&gt;「スコール、あたしいいよ、それで。だいじょ～ぶだよ～！」&lt;BR&gt;　突然脇から叫ばれて、気勢をそがれたスコールが言葉を失いセルフィを見下ろす。&lt;BR&gt;　セルフィはにこっと明るく笑って頷いた。&lt;BR&gt;「これ以上、あたし、自分の身体好きにされたくないもん。防止できるんなら、あたしはだいじょぶだよ？&lt;BR&gt;　それにとにかくいったんはあたしの身柄を拘束しなくちゃ、エスタのみんなも納得なんかできないよね～？&lt;BR&gt;　だから、いいよ」&lt;BR&gt;「……でも」&lt;BR&gt;　大きくスコールが首を振る。セルフィは何も言わずに、ただ明るく笑っていた。&lt;BR&gt;　どうしてこんな事態になってさえ笑うことができるのか、わからなくてスコールは何も言えなくなる。&lt;BR&gt;　その時、ラグナがあっけらかんとした口調で割って入った。&lt;BR&gt;「あ、お～いおい、誤解すんなよ。別に歴代の魔女みてーに封印しようってんじゃねーんだから」&lt;BR&gt;　スコールとセルフィは、同時にラグナを振り返った。&lt;BR&gt;　きょとんとした顔をいっせいに向けられ、ラグナは笑い出してしまう。&lt;BR&gt;「ちゃ～んと人の話聞けよ。防御室つったろ～？&lt;BR&gt;　防御室ってのは、最近オダインが試験的に作ったパッキング素材で作った部屋でな、電波やら思念波やらを一切シャットアウトする部屋なんだ。&lt;BR&gt;　まぁそっから出てもらっちゃ今はまずいから、ちと軟禁状態になっちまうけど、部屋の中でなら何やったって自由だし、通信機器は使えねぇけど部屋に他人入れて話するくらいは全然オッケーだ」&lt;BR&gt;　ラグナの言葉に、やたら悲観的になっていた二人は、少しだけ肩の緊張が解けるような気がした。&lt;BR&gt;「ま、でも一生その部屋にいるわけにもいかねーからな、早期解決めざしてがんばろ～ぜぇ！」&lt;BR&gt;　からからと笑ってラグナはばしばしとスコールとセルフィの背中を叩き、それから悠々とした足取りで、また通路を歩き始めた。&lt;BR&gt;　遠慮なく背を叩かれ、顔をしかめたスコールだったが、自分を見上げるセルフィと視線が合うと、ほんの少しだけ表情をやわらげて小さく笑った。&lt;BR&gt;　それはやっぱり仲間以外には察知しづらい笑顔だったが、セルフィはその笑顔を眼に止めると、にっこりと笑い返したのだった。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　朝になり、眼を覚ましたエルオーネは、夜に起きたことを聞かされ、花のような美貌を曇らせた。&lt;BR&gt;「防御室……？」&lt;BR&gt;　驚いたことに、エルオーネも昨夜の出来事は何も覚えていなかった。&lt;BR&gt;　襲撃があったと白いSeeDに聞かされたことも、何かを調べようと力を使っていた（らしい）ことも、目覚めたエルオーネの中から完全に消去されてしまっていた。&lt;BR&gt;　おそらく自分たちの足手まといになるまいと、無茶して力を使って精神的に負荷がかかったためだろうとスコールは無理矢理納得し、彼女が忘れてしまった事柄から現在の状況までを詳細に報告する。&lt;BR&gt;　黙ってスコールの言葉を聞いていたエルオーネだが、セルフィの身に起きたことを知らされると、色をなして椅子から立ち上がって声を上げてしまった。&lt;BR&gt;「それじゃまるで、隔離じゃないの」&lt;BR&gt;　きゅっと胸の前で両手を握りしめ、何故止めなかったのだと視線で訴えるエルオーネに、スコールは視線を伏せてぼそりと答えた。&lt;BR&gt;「……他に方法はなかった。首謀者として処刑されてしまうよりは、マシだと思ったんだ」&lt;BR&gt;「処刑？」&lt;BR&gt;　エルオーネが大きく眼を見開いているだろうことが、見なくてもわかった。&lt;BR&gt;「隔離……軟禁……それでも、時間稼ぎにはこの方法しかなかったんだ。……エルオーネ」&lt;BR&gt;　改めて呼びかけられ、エルオーネがはっとした。&lt;BR&gt;「頼みが……あるんだ」&lt;BR&gt;「わかっているわ」&lt;BR&gt;　素早く頷くエルオーネに、スコールが伏せた眼を上げる。&lt;BR&gt;　昔の面影を思い出させる、情けない顔をする「弟」に、エルオーネは思わず苦笑した。&lt;BR&gt;「私の力を使いたいんでしょう？　襲撃の日、セルフィに何が起こったのか……」&lt;BR&gt;「……無理はしない範囲で、頼みたい」&lt;BR&gt;　昨夜力の使いすぎで倒れた『姉』の身を案じるスコールに、エルオーネはくすくすと笑って頷く。&lt;BR&gt;「約束するわ。無茶はしない。だからあなたも、無茶しないで」&lt;BR&gt;　エルオーネもスコールも、過去を変えることはできないのだと身にしみて知っている。&lt;BR&gt;　それでも過去の光景を見れば暴走したくなってしまうことも、二人はよく知っていた。&lt;BR&gt;「……わかっている。俺は、セルフィに入り込んだ奴の正体が知りたいだけなんだ」&lt;BR&gt;　できることをする。できないことはしない。傭兵の絶対原則を口にするスコールに、エルオーネはもう一度力強く頷いてみせた。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　いきなり倒れて怪我をしないよう、エルオーネの部屋のソファにスコールは横たわり、準備が整ったことを確認してエルオーネがその脇に腰を下ろした。&lt;BR&gt;「じゃあ、行くわよ。セルフィの過去にあなたを送るわ」&lt;BR&gt;　言って、白い手のひらをすっとスコールの方へ向ける。&lt;BR&gt;　返事をする間もないうちに、ずしりとスコールの意識が重くなった。&lt;BR&gt;　本来の肉体から意識が引きはがされ、過去の時間に送られる。&lt;BR&gt;　闇が落ちた。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　……花の中を走っていた。&lt;BR&gt;　スピードを上げれば上げるほど、後ろに流れてゆく花たちの色が視界の端で溶けて混ざり、それが綺麗で嬉しくて、くすくす笑ってしまう。&lt;BR&gt;　走っているから、笑うと息が苦しくなったが、笑いはあとからあとからこみあげて、止まらなかった。&lt;BR&gt;（……？？）&lt;BR&gt;　花畑を抜けると、色の洪水がようやく途切れる。&lt;BR&gt;　開けた視界に、いつも暮らしている孤児院が見えた。&lt;BR&gt;　天気の良い日は外に出ることになっているから、一緒に暮らしている他の子供達が石柱の間を走り回ったり、石畳の上に座ってひなたぼっこをしていたりと、思い思いに遊んでいる。&lt;BR&gt;（……低いな……）&lt;BR&gt;　なんだか妙にその石柱やら石壁やらが高く見える。――見ているこちらの、視点が低い。&lt;BR&gt;『セフィ！』&lt;BR&gt;　花の中から飛び出してきた自分――ではなく、幼い頃のセルフィだ――に、男の子が頬を上気させ駆け寄ってきた。セルフィはにっこりと笑って声をかける。&lt;BR&gt;『アービン、一緒に遊ぶ～？』&lt;BR&gt;『うんっ！』&lt;BR&gt;　あぁ、アーヴァインだ。&lt;BR&gt;　あまり印象に残っていなかったが、セルフィビジョンで見るとやはり何やら懐かしい。&lt;BR&gt;　そんなことを思いながら、スコールは遠い未来にいるエルオーネに心の中で声をかけた。&lt;BR&gt;（エルオーネ、昔すぎだ）&lt;BR&gt;（……ごめん、スコール。制御がうまくいかないの……）&lt;BR&gt;　申し訳なさそうなエルオーネの声が届く。&lt;BR&gt;　溜息をついてしまったスコールを内に抱えていることも知らず、嬉しそうに頷いた男の子に頷き返し、セルフィは笑顔のままで、石柱の前に座っている男の子の方を見た。&lt;BR&gt;（……！）&lt;BR&gt;　見たことのある、ふてくされたような、拗ねた表情。&lt;BR&gt;　セルフィが笑顔のままで、小さく小首をかしげるようにして問いかけた。&lt;BR&gt;『スコールは？　一緒に遊ぶ～？』&lt;BR&gt;　スコールは呆然とした気分で、いつものように小さくかぶりを振る幼い自分をセルフィの中から見つめる。&lt;BR&gt;『そっか～』&lt;BR&gt;　視線すらまともに合わせない自分の態度にも、特にセルフィの内側で嫌な感情など起こりはしないようだった。&lt;BR&gt;（あっ、ゼルだ～！）&lt;BR&gt;　頭の中で幼いセルフィの思念が浮かぶ。&lt;BR&gt;　彼女の意識は少し離れた場所に立つ金髪の男の子たちにすでに向かっていた。&lt;BR&gt;　楽しくて、嬉しくて。セルフィの中には、プラスの気持ちがたくさん詰まっていて、おもちゃ箱のようにめまぐるしくそれらの気持ちが回っている。&lt;BR&gt;『ゼル、サイファ、一緒に遊ぶ～？』&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　……セルフィはいつでも、誰に対しても公平だったと、スコールは思い出す。&lt;BR&gt;　どれだけ拒絶しても、彼女はいつだってスコールを眼に止めれば遊びに誘ったし、笑い返したことなど一度もなくても、視線が合えばニコニコと笑った。&lt;BR&gt;　それは無愛想で排他的な自分だけにではなくて、セルフィにくっついて歩くアーヴァインにも、いじめられっこのゼルにも、怒ってばかりのキスティスにも、乱暴者のサイファーにだって、セルフィはいつも笑顔で、公平で、おおらかだった。&lt;BR&gt;　それは決してスコールにはできないことで……だからあの孤児院で育った幼なじみ達の印象の中でも、セルフィに対しては抜群に好印象が残っている。&lt;BR&gt;『スコールって、何気にセルフィには甘いんじゃない？』&lt;BR&gt;　そんなふうに、皮肉を言って笑ったのは誰だったか。&lt;BR&gt;『キスティスには反対にキツめ。エルオーネにはちょっと控えめ。わたしには……』&lt;BR&gt;　拗ねた眼差しで、冗談めかして笑いながら、だけど本音をにじませて。&lt;BR&gt;『わたしには、最近……ちょっと冷たいぞ～？』&lt;BR&gt;　そんなことはないと答え、そんなことあるよと彼女がふくれる。&lt;BR&gt;　傍目にはバカップルそのもののやり取りを、飽くほどに繰り返して。&lt;BR&gt;『どうしてエルオーネに会いに行く時間はあって、わたしの所に寄る時間はないの？』&lt;BR&gt;『どうして一緒に任務に行っちゃいけないの？　SeeDのフリしてっちゃえばわからないじゃない』&lt;BR&gt;『どうして任務先を教えてくれないの？　セルフィ達には教えるの？』&lt;BR&gt;『ねぇ、SeeDってそんなに必要なの？　未来の魔女はもう倒したじゃない！』&lt;BR&gt;　くるくると感情に合わせてよく変わる表情。いつからか怒った顔ばかり見るようになった。&lt;BR&gt;　誤解とすれ違いが距離を作り、誰かに相談するという発想自体がなかったスコールはどうすることもできなくて、ただ距離がどんどん遠くなるのを見ているばかりで。&lt;BR&gt;　彼女のことは大切だった。けれど、彼女の望む通りに愛してやることはできなかった。&lt;BR&gt;　自由奔放な彼女には理解できまいが、SeeDである自分というものは、スコールにとって彼女を愛する気持ちとはまったく別に、大切で重要だったのだ。&lt;BR&gt;『ねぇ、どうして……』&lt;BR&gt;　泣きながら訴える彼女と口論になるたびに、スコールは幼なじみの少女を思い出す。&lt;BR&gt;　――――あたしもSeeDだからね。覚悟は、できてるよ。&lt;BR&gt;　そう言って、彼女の罵倒も気にせず笑った、誇り高いSeeDの少女を。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;『あっキスティ！　一緒に遊ぶ～？』&lt;BR&gt;　また、小さなセルフィの声。&lt;BR&gt;　自分の思考に入り込んでいたスコールが意識を向けると、セルフィの眼を通して、幼い頃のキスティスがちょっと怒った顔でこちらを見ているのがわかった。&lt;BR&gt;『セフィ、またお花畑走り回ったでしょ！　お花が踏んづけられて、折れちゃってたわよ』&lt;BR&gt;　金色の髪が陽に輝いてキラキラしていたが、怒っているキスティスは……ちょっと怖かった。&lt;BR&gt;　思えばキスティスは、笑った顔より厳しい顔の方が印象に残っているなと、スコールは思う。&lt;BR&gt;　けれど、眼の前にいる相手を、いつもきちんと理解しようと努めてくれる女だった、とも。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　キスティスは、常にスコールを理解しようとしていた。&lt;BR&gt;　リノアがスコールの理解不能な部分を、理解できるように変化させようと働きかけたのに対し、キスティスはいつだって、懸命に理解する努力を怠ることがなかった。理解したその先に、受け止める気概を持っていたかは不明だったが。&lt;BR&gt;　そして自身を嫌い、無意識下で変わりたいと願っていたスコールは――リノアを選んだのだ。&lt;BR&gt;『えへへ～、ごめんね』&lt;BR&gt;　そして悪びれずに笑うセルフィは。&lt;BR&gt;　相手を理解できようとできまいと、眼に映る相手をそのまま受け入れる女だ。&lt;BR&gt;　もちろんそこに好悪の感情は付随するが、理解できなければできないなりに、そんな相手を尊重した。&lt;BR&gt;　だからかもしれない。&lt;BR&gt;　リノアと気持ちがすれ違うたび、傷つけ合うたびに、セルフィの存在を懐かしく思い出したのは。&lt;BR&gt;（……スコール）&lt;BR&gt;　自分の身体を離れると、意識は際限なく思考の迷路に入り込むものなのか。&lt;BR&gt;　深く考え込んでしまったスコールに、彼と意識を接続しているエルオーネが気づかわしげに呼んだ。&lt;BR&gt;（ごめんね、今よりもう少し未来に接続してみるから……いい？）&lt;BR&gt;（あ、……あぁ、頼む）&lt;BR&gt;　スコールは慌てて我に返り、頷いた。&lt;BR&gt;（じゃぁ……行くわよ）&lt;BR&gt;　エルオーネの声とともに、意識がセルフィから切り離された。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　次に意識を接続したセルフィは、雪の中にいた。&lt;BR&gt;（……雪？）&lt;BR&gt;　花畑の中から突然の雪景色に、スコールは面食らう。&lt;BR&gt;　目線の高さからしても、どうやら十代前半といった様子の少女時代のセルフィの中に彼はいた。&lt;BR&gt;（やっぱり、エルオーネ調子悪いんじゃないのか？）&lt;BR&gt;（ご、ごめん……もう少し未来に接続するから、少し待って）&lt;BR&gt;　非常に申し訳なさそうなエルオーネの声が聞こえた。&lt;BR&gt;　身体があるなら頭を抱えたい気分のスコールの存在にも気がつかず、雪の中をセルフィがざくざくと音を立てて歩いている。&lt;BR&gt;　淡い灰色の服は、記憶に間違いがないなら、トラビアガーデンの制服だ。&lt;BR&gt;（そういえば、この制服姿のセルフィは見たことがなかったな……）&lt;BR&gt;　そんなことを思っていると、セルフィが楽しげに鼻歌を歌い始めた。&lt;BR&gt;　セルフィの周囲には誰もいない。それは珍しい光景だったが、彼女は誰もいなくても、妙に楽しげに見えた。&lt;BR&gt;　不意に、背後に殺気が立ち上った。&lt;BR&gt;　セルフィが歌をのみこむようにして、素早く振り返る。&lt;BR&gt;　緑色の巨体をのけぞらせるようにして、二足で立った竜がセルフィを睨みおろしていた。&lt;BR&gt;（ドラゴンイゾルテ！？）&lt;BR&gt;　SeeDになってからでさえ、一撃で倒すには至らなかった敵の出現に、スコールはまだ子供のセルフィの戦闘能力を思って慄然とする。&lt;BR&gt;　こんな雪原で、避難できる場所もないのに、たったひとりしかいない――！&lt;BR&gt;「……んもう」&lt;BR&gt;　だが、ドラゴンイゾルテの巨体を見ても、セルフィの内には恐怖の感情はかけらも浮かび上がらなかった。&lt;BR&gt;　肩をすくめて敵を眺め、それから無造作に右手をひょいとドラゴンイゾルテの方に向ける。&lt;BR&gt;　ばさりと、鳥の羽音が空気を切った。&lt;BR&gt;（……！？）&lt;BR&gt;　そして次の瞬間、セルフィの小さな手のひらから緑色の光が迸り、ドラゴンイゾルテをまっすぐに貫き爆発したのだった。&lt;BR&gt;（な……！）&lt;BR&gt;　驚愕するスコールの見守る中、アルテマをまともに食らったドラゴンイゾルテが大きく巨体を揺らし、その隙を逃すことなく少女の足がトンと地面を蹴った。&lt;BR&gt;　軽やかに跳びながら、腰につけたヌンチャクを素早く抜く。&lt;BR&gt;　ガツリ、と音を立て、細身だが破壊力のあるヌンチャクに頭部を殴打されたドラゴンイゾルテは、脳漿をまき散らし断末魔の叫びをあげながらどっと雪原に巨体を埋める。&lt;BR&gt;「おさんぽのじゃまするからだよ～」&lt;BR&gt;　体液をかぶらないよう、上手に身をひねって着地したセルフィは、何事もなかったようにヌンチャクをベルトにはさみ、さらりと呟いた。&lt;BR&gt;　……どう考えても、十代に入ったばかりの少女の技ではなかった。&lt;BR&gt;　パタパタと、羽音がする。&lt;BR&gt;　ぱっと顔を輝かせたセルフィが、空を見上げた。&lt;BR&gt;　薄暗く雲のたちこめる空に、雲の上から空を切り取ったように真っ青な小鳥が、楽しげに飛んでいた。&lt;BR&gt;（……青い……鳥……！？）&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　瞬間、ぐらりと視界が揺れた。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;（ま、待てエルオーネ、今……！）&lt;BR&gt;　叫んだ時には、もうスコールは違う時間軸のセルフィの中に接続されていた。&lt;BR&gt;（え？　どうかした？）&lt;BR&gt;　きょとんとしたエルオーネの声。&lt;BR&gt;　脱力しかけながらも、とにかく先ほどの時間軸に戻してくれと言おうとしたスコールは、その時甲高い悲鳴を聞いた。&lt;BR&gt;（！？）&lt;BR&gt;　意識を外に向けると、今まさに、青く巨大な鳥系のＧ．Ｆ．の嘴に、ひとりの男性が貫かれるところだった。&lt;BR&gt;　腹部から血がしぶき、絶叫がまたあがる。&lt;BR&gt;　転げるようにして、血にそまった男がセルフィの元に逃げこんでくる。&lt;BR&gt;　……セルフィは、静かに立ちつくし血の饗宴を見つめていた。&lt;BR&gt;（エスタ……この間の、襲撃の夜だ……）&lt;BR&gt;『た、たす……け……』&lt;BR&gt;　死の恐怖と激痛に血の涙を流した男が、地面に転がりながらセルフィに手を伸ばす。&lt;BR&gt;　セルフィが静かな視線を男に向けた。&lt;BR&gt;（…………愚か者）&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　その時、セルフィの内側から聞こえた冷やかな声は、スコールの意識にはっきり届いた。&lt;BR&gt;　いつだって、楽しい気持ちでいっぱいに自分を満たしていたセルフィの中、ありえるはずのない声で。&lt;BR&gt;　セルフィの意識はまるで感じない。眠りに落ちている時のように、表層に意識がない。&lt;BR&gt;　そして不在の彼女の意識の表層を支配しているのは……見知らぬ存在。&lt;BR&gt;　氷のように冷たい意識をまとった……人なのかさえわからない、巨大な存在感を持つ存在。&lt;BR&gt;　すい、と、巨大な意識の望むとおりに、セルフィが右腕を水平に動かす。&lt;BR&gt;　彼女の動きに応じて、Ｇ．Ｆ．が巨大な前脚で地面に転がる男の首をはねた。&lt;BR&gt;　また血しぶき。頭からかぶったが、セルフィの内にいる『それ』は気に止めない。&lt;BR&gt;（……やめろ……）&lt;BR&gt;　以前も同じ経験をした。アルティミシアに意識の制御を奪われたリノアの内で、変えることのできない過去を見た。&lt;BR&gt;　怒りがふつふつとスコールの意識を沸騰させていく。&lt;BR&gt;　SeeDであることを誇りに戦うセルフィを踏みにじり、傷つける存在が許せない。&lt;BR&gt;　セルフィを支配するのは、常にセルフィ自身でなくてはならないのに――！&lt;BR&gt;（セルフィの中から出ていけ！！）&lt;BR&gt;（――！）&lt;BR&gt;　セルフィを支配している存在が、スコールに気づく。あの日のアルティミシアのように。&lt;BR&gt;　だが――&lt;BR&gt;（……『スコール』……）&lt;BR&gt;　冷やかな意識が、淡々と名を呼んだことに、スコールの意識はぎょっとする。&lt;BR&gt;　まるでスコールがこうして過去のセルフィに接続してくることなど、端から承知してたかのように、セルフィを動かす意識は冷静だった。&lt;BR&gt;　そして次の瞬間、スコールの本能に警告が走った。&lt;BR&gt;（スコール！）&lt;BR&gt;　それはエルオーネも感じたのだろう、切羽詰まった声をあげスコールの意識を未来へと引き戻そうとする。&lt;BR&gt;　だが遅かった。&lt;BR&gt;&lt;BR&gt;（――邪魔だ）&lt;BR&gt;&lt;BR&gt;（……！！！）&lt;BR&gt;　激しい精神波がスコールの意識をのみこんだ。&lt;BR&gt;　セルフィの中にいる『それ』が、スコールの精神を消滅させようと放った、悪意の固まり。&lt;BR&gt;　本来の肉体を離れているスコールに、それを防ぐ手だてはない。&lt;BR&gt;　叫び声をあげたつもりだったが、意識だけのスコールに出せる声などどこにもなかった。&lt;BR&gt;　遙か彼方でエルオーネが呼んでいる。けれどどこから聞こえているのかがわからない。&lt;BR&gt;　耳障りなノイズがスコールの意識を、精神を乱暴にかき回す。かき回され、引きちぎられ、ばらばらに砕けていく。&lt;BR&gt;　すぐ傍にある巨大な精神力に――のみこまれていく。&lt;BR&gt;　このままではいけない――そんな思考のかけらすら、闇の中に飛び散っていく。&lt;BR&gt;　――何もかも、のまれて、はじけて――&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;「これ、あげる～」&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　突然、飛び散る寸前の意識の隅で、小さな女の子の声がした。&lt;BR&gt;　意識のすべてを満たしていたノイズの隙間から、すべりこんできた優しい声。&lt;BR&gt;　なぜかひどく懐かしいそれに、消えかけた意識が反応する。何もかもが曖昧になりかけた感覚を総動員させて、声の方に意識を向ける。&lt;BR&gt;　小さな手が、スコールに向けて黄色い花をそっと差し出していた。&lt;BR&gt;　蕾からようやく花ひらいたばかりの、太陽によく似た黄色い花。&lt;BR&gt;（あ……）&lt;BR&gt;　精神を苛む苦痛が、ふっと軽くなったような気がした。&lt;BR&gt;　陽光色の花を差し出した少女は、翠色の瞳で静かにスコールを見つめている。&lt;BR&gt;　太陽そのものの笑顔を浮かべて。&lt;BR&gt;（…………俺に？）&lt;BR&gt;　たずねれば、少女は笑顔でこくりと頷く。&lt;BR&gt;　いっぱいに伸ばされた手が、スコールの手に花を握らせる。&lt;BR&gt;　手の中に花を受け取った瞬間、意識を砕いていた激しいノイズがぴたりと止んだ。&lt;BR&gt;（！）&lt;BR&gt;　奇跡としか思えないそれに、スコールは驚愕する。&lt;BR&gt;　驚くスコールの眼差しに、少女ははにかんだようにうつむいて微笑み、小さな口をそっと開いた。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;「スコール！！」&lt;BR&gt;　はっと眼を開いた。&lt;BR&gt;　すぐ間近で、泣き出しそうな顔をしたエルオーネがのぞきこんでいる。&lt;BR&gt;　何が起きたのか、ここがどこで今がいつなのか、記憶が混乱したままスコールは、かすれた声を押し出した。&lt;BR&gt;「おねえちゃん……？」&lt;BR&gt;「あぁ、スコール！　よかった、無事で……！」&lt;BR&gt;　普段の彼からは想像もつかないほどひび割れた声だったが、エルオーネはスコールの声に感極まったようにしがみついた。&lt;BR&gt;「お……エルオーネ……？　俺は一体」&lt;BR&gt;「セルフィの中にいた意識に、攻撃されたのよ。相手はＧ．Ｆ．みたいな自律エネルギー体だったから、精神だけで巨大な力を操れるんだわ。……スコールは普通の人間だから、肉体の防御がなかったらまともに攻撃を受ければ精神が死んでしまう。精神が死んでしまったら、身体だけ生きていても廃人になってしまうところだったわ」&lt;BR&gt;　早口で話すエルオーネは普段の彼女らしくなかったが、それだけスコールの身が危険な状態であったのだろうことが容易に想像できた。&lt;BR&gt;「本当に、よく無事で……私の干渉も防がれてしまったから、もうだめかと思ったわ……」&lt;BR&gt;　あの状況で、精神力だけでよくぞ逃げ切ったと涙をにじませるエルオーネに、スコールははっと自分の右手を見た。&lt;BR&gt;　もちろん、そこには何もない。だが……&lt;BR&gt;「……花をもらった」&lt;BR&gt;「え？」&lt;BR&gt;　エルオーネが小首をかしげてスコールの手のひらに眼を落とす。&lt;BR&gt;　スコールは何もない右手を、ぎゅっと強く握った。&lt;BR&gt;「俺も、正直言ってもうだめだと思った。……その時に、花をもらったんだ」&lt;BR&gt;　陽溜りのような笑顔をした少女。&lt;BR&gt;「花をもらったら、苦しくなくなって……戻ってこれた。……小さい頃の、セルフィだった」&lt;BR&gt;　くるりと楽しげにカーブを描いた栗色の髪も、きらきら輝いていた翠の瞳も、全部記憶の中にある。&lt;BR&gt;　エルオーネがスコールの言葉を聞き、ちょっとだけ眼を見開いた。&lt;BR&gt;「セルフィの意識は……自由だったの？」&lt;BR&gt;　巨大な力をふるう意識体に精神を占拠されて、力ずくで抑え込まれるでもなく、意識を眠らせるわけでもなく、なぜスコールの意識に声をかけ思念を送ることができるのか、理解できないとエルオーネは首を振る。&lt;BR&gt;　リノアの時と状況はまったく同じだったはずなのに、あの時のリノアは完全に抑え込まれ、セルフィはスコールの意識をすくい上げ未来へと返した――。&lt;BR&gt;　確かにセルフィはSeeDとして訓練され、精神力という点ではリノアより強固だったかもしれない。&lt;BR&gt;　だが精神を乗っ取られているにしては、あの笑顔はあまりにも明るかった。&lt;BR&gt;「わからないけど……あれは確かにセルフィだった。それだけは、確かだったと思う」&lt;BR&gt;　スコールの見た夢などではないと、はっきりと言い切れた。&lt;BR&gt;「それに、……セルフィの中には、ひとつの気配しか感じなかったんだ」&lt;BR&gt;　はじめは、誰かの意識体がセルフィの意識を乗っ取って、Ｇ．Ｆ．をジャンクションさせ召喚しているのだと思っていた。&lt;BR&gt;　だが、セルフィの中に送り込まれたスコールは、セルフィ以外にはあの巨大な意識体の存在しか感じることができなかったのだ。&lt;BR&gt;　エルオーネがかすかに眉を寄せ、細い手を胸の前でぎゅっと握りしめる。&lt;BR&gt;「相手はなんなの……？」&lt;BR&gt;　呟かれた小さな声に、スコールは答えられずに唇を噛んだ。&lt;BR&gt;　先ほどのセルフィの中にいた意識体、あの波動は……よく知る気配によく似ていた。&lt;BR&gt;　よく考えなくたって、あれほどの巨大な意識を有する存在など、この世にいるはずがない。&lt;BR&gt;　魔女の意識なら人の気配がするだろう。アルティミシアをリノアの中に感じたことのあるスコールに、魔女の意識がわからないはずがない。&lt;BR&gt;　けれどセルフィの中にいたあの気配は……間違いなく、人以外のそれだった。&lt;BR&gt;　Ｇ．Ｆ．と言い切ってしまうには、意識が莫大すぎた気もしないではないのだが……。&lt;BR&gt;「スコール……」&lt;BR&gt;　エルオーネがそっと呼びかける。&lt;BR&gt;　懸命に自分の考えを追うスコールからの、返答はなかった。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;&lt;/SPAN&gt;

<script data-viewer-zoom-script>
(() => {
  const stage = document.querySelector('.viewer-stage-image');
  const image = stage ? stage.querySelector('.viewer-image') : null;
  if (!stage || !image) {
    return;
  }

  const setZoom = (enabled) => {
    stage.classList.toggle('is-zoomed', enabled);
    image.setAttribute('aria-pressed', enabled ? 'true' : 'false');
    if (enabled) {
      const naturalWidth = image.naturalWidth || image.clientWidth || 0;
      const targetWidth = naturalWidth > 0
        ? Math.max(naturalWidth, Math.min(Math.round(stage.clientWidth * 0.92), naturalWidth * 4))
        : Math.round(stage.clientWidth * 0.92);
      image.style.width = `${targetWidth}px`;
      image.style.maxWidth = 'none';
      image.style.maxHeight = 'none';
      requestAnimationFrame(() => {
        stage.scrollTop = 0;
        stage.scrollLeft = Math.max(0, Math.round((image.scrollWidth - stage.clientWidth) / 2));
      });
    } else {
      image.style.removeProperty('width');
      image.style.removeProperty('max-width');
      image.style.removeProperty('max-height');
      stage.scrollTop = 0;
      stage.scrollLeft = 0;
    }
  };

  const toggleZoom = () => {
    setZoom(!stage.classList.contains('is-zoomed'));
  };

  image.setAttribute('tabindex', '0');
  image.setAttribute('role', 'button');
  image.setAttribute('aria-label', '逕ｻ蜒上ｒ諡｡螟ｧ縺ｾ縺溘・邵ｮ蟆・);
  image.setAttribute('aria-pressed', 'false');

  image.addEventListener('click', toggleZoom);
  image.addEventListener('keydown', (event) => {
    if (event.key === 'Enter' || event.key === ' ') {
      event.preventDefault();
      toggleZoom();
    }
  });

  stage.addEventListener('click', (event) => {
    if (event.target === stage && stage.classList.contains('is-zoomed')) {
      setZoom(false);
    }
  });

  window.addEventListener('keydown', (event) => {
    if (event.key === 'Escape' && stage.classList.contains('is-zoomed')) {
      setZoom(false);
    }
  });
})();
</script>
