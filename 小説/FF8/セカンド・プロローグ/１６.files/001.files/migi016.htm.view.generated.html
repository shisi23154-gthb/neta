      width=537&gt;&lt;SPAN&gt;&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　――――バイバイだね、スコール&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　接続が切れたその瞬間を、スコールもはっきりと感じ取っていた。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　――――…………ありがとう…………&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;（…………！）&lt;BR&gt;　ほんの一瞬、気のせいかと思えるほどの、一刹那。&lt;BR&gt;　ぎゅっと自分を強く抱きしめ、そしてすぐに離れた細い腕の感触があった。&lt;BR&gt;　姿が見えたわけではない。彼女の身体は、離れた位置に瓦礫に埋もれて倒れている。&lt;BR&gt;　けれど間違いなく、最後の抱擁を与えて消え去った腕が、彼女のものだったと理解していた。&lt;BR&gt;「セル……」&lt;BR&gt;　美しい花園が眼の前に広がり始める。咲き乱れ、優しい花嵐が空気に巻き上がる。&lt;BR&gt;　死に誘うその夢の向こうに、彼女は自らの意志で戻って行ってしまった。&lt;BR&gt;「……セルフィ……！！」&lt;BR&gt;　あまりに莫大な喪失感と衝撃に、涙すら流せずスコールは呆然と立ちつくす。&lt;BR&gt;　最後に残る、一瞬だけ自分を抱きしめた腕の感覚だけが、ひどく胸に痛んだ。&lt;BR&gt;（こんな、ことが……）&lt;BR&gt;　ちかりと眼の奥で瞬いたのは、かすかな既視感。&lt;BR&gt;（前にも……同じ事が、あった……？）&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;『これ、あげる～』&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　ふいに、いつかセルフィの精神世界で聞いた声がよみがえった。&lt;BR&gt;（いや……）&lt;BR&gt;　ちがう。&lt;BR&gt;　あの日よりもずっと昔……遠い、遠い昔に……同じ言葉を聞き、彼女に抱きしめられたことがあった。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　記憶の底に眠るほどの遠い昔――月明かりの中で静かに咲き誇る、太陽色の花の中で。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　花が咲き乱れていた。&lt;BR&gt;　夢を操るセルフィが見せるその光景は、確かに夢以外に有り得ないほど、美しかった。&lt;BR&gt;『ハイン』を対象に放たれたその魔法は、存在そのものに作用するものであるが故に、決して逃れられるものではない。この華奢な肉体を振り捨てて飛び逃げたとしても、夢は必ずハインを捉え、死に誘う。&lt;BR&gt;「ふ……」&lt;BR&gt;　飛び起きてはみたものの、逃げても無駄と悟り、ハインは小さく笑った。&lt;BR&gt;　おとぎ話になるほどの長い年月を過ごし、生きているなどという実感にも乏しかったこの自分にも、やはり『死』というものがあったらしい。&lt;BR&gt;　くっくっと喉の奥から笑いがこみ上げてくる。地面に座ったまま、ハインは身を折り声を上げて自らを嘲り笑った。&lt;BR&gt;　たったひとりの人間に執着した結果が、この有様だ。&lt;BR&gt;　６年前、離れることなく傍にいて力を貸そうと契約を交わした少女自身の力で、ハインの命は終焉を迎えるのだ。&lt;BR&gt;　契約の元彼女と共に過ごした短い日々。その間に交わされた約束をかけらすら果たせずに、美しい夢に屠られる自分の存在が惨めで愚かで哀れだった。&lt;BR&gt;　一体この身の何が『神』だと言うのだろう。&lt;BR&gt;　結局ハインが手に入れることができたのは、この華奢な肉体ともうすぐ散るだろう儚い命のみではないか。&lt;BR&gt;　止められない哄笑に身を震わせていたハインは、しかしふいに内に戻り来た意識を察知し、驚愕に眼を見開いた。&lt;BR&gt;　有り得るはずのないことだった。&lt;BR&gt;　６年前のあの少女ならともかく、今の彼女なら、死ぬその瞬間まで、愛した男と共にあることを選ぶはずだった。&lt;BR&gt;「なぜ……」&lt;BR&gt;　呆然と呟くハインに、自らの意志で戻り来たセルフィが、あっけらかんと笑って答えた。&lt;BR&gt;（なんでかなぁ～？）&lt;BR&gt;　ゆっくりと、セルフィの中で意識の主導権が取って代わる。本来の身体の持ち主、セルフィの意識が表に出た。&lt;BR&gt;　一度眼を閉じ、呼吸を整えて、セルフィはぱちりと翠の瞳を大きく開く。&lt;BR&gt;　いつも通りにぴんと背筋を伸ばし、自らが作り出した美しい花園に眼を向け、それから胸にかけられた銀鎖のペンダントに視線を落とすと、やわらかく微笑んでセルフィは続きを口にした。&lt;BR&gt;「……寂しいのは、嫌だもんね」&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;「おい！」&lt;BR&gt;　ジエンドを発動させてしまったことに気づき、サイファーが苛立たしげにスコールの背に怒鳴りつけた。風神のアレイズで吹き飛ばした左腕と左足が治癒され、よろめきながら立ち上がる。&lt;BR&gt;　一体何をやっているのかと、怒りに満ちた声を背中に受けながら、スコールはぴくりとも反応せずに眼の前の花園を見つめていた。&lt;BR&gt;（なんで忘れていたんだ――）&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　太陽色の花の中、花に抱きしめられるようにして泣いていた小さな背中。&lt;BR&gt;『これ、あげる～』&lt;BR&gt;　涙をぬぐい、花を差し出した、陽溜りのような愛くるしい笑顔。&lt;BR&gt;　そして、幼さゆえに真剣にかわした、あの約束――。&lt;BR&gt;（約束……）&lt;BR&gt;　大きく眼を見開いたまま、スコールは魔法により吹き荒れる花嵐に視線を向けた。&lt;BR&gt;　――――ね、スコール。この花のこと、覚えてる？&lt;BR&gt;　夢の中で訊ねきた、セルフィの声がよみがえった。&lt;BR&gt;（まだ果たしてない）&lt;BR&gt;　覚えていないと表情で答えた自分に、落胆の色を浮かべた翠の瞳。&lt;BR&gt;　偶然に偶然を重ね、結果的に約束の成就を見たとしても。それはあの幼い約束を、本当の意味で果たしたということにはならない――。&lt;BR&gt;「セルフィ……」&lt;BR&gt;　ふと、スコールは指にはめた銀色の指輪に視線を落とす。何年もずっと、はずされることなどなかっただろう、優しい記憶を秘めた銀の指輪。&lt;BR&gt;　――――後悔するなよ&lt;BR&gt;　耳元で、真摯な声がよみがえる。&lt;BR&gt;（……後悔……）&lt;BR&gt;　ゆっくりと眼を上げる。花嵐は勢いを増していた。&lt;BR&gt;　ひたと群青の瞳でそれを見すえ、地面を蹴りつけ走り出すのに、大した時間はかからなかった。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;（あれぇ？）&lt;BR&gt;　ぼんやりと花畑を眺めていたセルフィは、頬に当たった固い地面の感触にゆっくりとまばたきをした。&lt;BR&gt;　いつの間にか四肢に力が入らず、地面に倒れていたらしい。&lt;BR&gt;　痛みも苦しみもない。夢の中のように漠然とした感覚だけが身を取り巻いている。&lt;BR&gt;　ゆるゆると力萎えた手を動かし、セルフィは胸にかけていた銀鎖のペンダントにそっと触れ、獅子をかたどったトップを握りしめ、それから視線をめぐらせて広がった花園を見つめた。&lt;BR&gt;（綺麗やなぁ……）&lt;BR&gt;　赤に黄に白に。咲き乱れる花々は、本当に胸が痛くなるほど、綺麗だった。&lt;BR&gt;　セルフィにとって、死の象徴である花。&lt;BR&gt;　地面に横たわったまま、セルフィはこれまで自分が殺してきた人々のことを思った。&lt;BR&gt;（死んだらどうなるんやろ？）&lt;BR&gt;　ぼんやりとそんなことを思っていたセルフィの眼に、花嵐の向こうから飛び込んでくる人影が見えた。&lt;BR&gt;　ガーデンの制服に身を包み、怖いくらい真剣な表情でぐるりと辺りを見回している青年。&lt;BR&gt;　鋭い光を帯びた群青の瞳が、やがて倒れているセルフィを捉えた。&lt;BR&gt;（スコール……？）&lt;BR&gt;　ぱちぱちとセルフィは数回まばたきを繰り返す。スコールが飛び込んでくるなんて有り得るはずがない。&lt;BR&gt;（これも、ジエンドの夢？）&lt;BR&gt;　考えて、セルフィは納得する。&lt;BR&gt;　死にゆく者に夢を見せるジエンドの魔法。かけた側からは花畑しか見えなくても、当人だけに見える夢が映し出されていたとしても不思議はない。&lt;BR&gt;（なんや、サービスええ夢やなぁ……）&lt;BR&gt;　近づいてくる夢のスコールに、セルフィはふわりと微笑んだ。&lt;BR&gt;　長い脚を折り、地面に膝をついてスコールがセルフィをのぞきこむ。&lt;BR&gt;「……セルフィ」&lt;BR&gt;　低く響きのよい声が、そっと名を呼びかけた。&lt;BR&gt;　セルフィがずっと好きだった、スコールの声。&lt;BR&gt;　なんだかふいに泣きたくなったセルフィに、スコールが静かに言葉を続けた。&lt;BR&gt;「すまない……約束、忘れていて……」&lt;BR&gt;（約……束……？）&lt;BR&gt;　ぐらりと視界が揺れ、五感のすべてが遠くなる。&lt;BR&gt;　消失しそうな意識を懸命につなぎとめ、セルフィはよく見えなくなった瞳をこらしてスコールを見上げた。&lt;BR&gt;　声を出そうと唇を動かしたが、かすかな吐息がこぼれただけだった。&lt;BR&gt;　そんなセルフィの前で、スコールはまっすぐに、ひたすらまっすぐに、セルフィの瞳を見つめていた。&lt;BR&gt;　セルフィがずっと好きだった、あの眼差しで。&lt;BR&gt;「……果たしにきたんだ」&lt;BR&gt;　囁いて、スコールは静かに、優しく笑った。&lt;BR&gt;　やっぱりこれは夢なんだとセルフィが改めて思うほど、優しく微笑んだスコールが、ゆっくりとセルフィの上に身をかがめ、精悍な頬を傾ける。&lt;BR&gt;　潔癖な感じのする唇が、そっと、けれど確かにセルフィの唇に触れた。&lt;BR&gt;　驚きのあまり、消えかけた意識がいっきに引き上げられる思いで、呆然とセルフィが眼をまたたく。&lt;BR&gt;　見開いた瞳、その視界内で、何かがぱちんとはじけた。&lt;BR&gt;（え……？）&lt;BR&gt;　どうして、と呟いたセルフィの言葉は、声にはならなかった。&lt;BR&gt;　これは一体誰の夢なのだろう。&lt;BR&gt;　視界内を埋めつくしていた色とりどりの花たち、その色彩が一瞬にしてひとつの色に変化する。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　――――陽光色に。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;『ホンマに綺麗なんやねんで』&lt;BR&gt;&lt;BR&gt;　陽光色に輝く花たちを、ハインは呆然とセルフィの内から見つめていた。&lt;BR&gt;　よみがえってくるこの思い出はなんだろう。&lt;BR&gt;　ハインが執着したあの記憶と少しずつ異なる、この優しい思い出は誰が抱いていたものなのだろう。&lt;BR&gt;&lt;BR&gt;『おひさまの色が、い～っぱい、一面に咲いてるんやわ。ハインにも見せてあげたいな～』&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　さくさくと白い雪原を歩みながら、陽溜りのような笑顔で少女が語った言葉のすべて。&lt;BR&gt;　６年の歳月が都合良くねじ曲げた記憶ではない、なんの執着も絡まない純粋な思い出。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;『いつか、あたし、スコールと一緒にまたあのお花畑に行くって約束してんねん。&lt;BR&gt;　もう咲いてへんかもしれへんけど、またいっぱいい～っぱい、お花咲かせるって決めてるんや～。&lt;BR&gt;　そしたら、ハインも一緒に行こうね』&lt;BR&gt;　期限も場所も定めない、幼い約束を信じていた少女。&lt;BR&gt;　大切なはずのその約束に、ためらいもなくハインも共に行こうと誘って。&lt;BR&gt;『スコールは、あたしならええってゆうてたんやけど……でも大丈夫やからね。ハインはあたしの中におるんやもんね。&lt;BR&gt;　せやから一緒でも大丈夫や。一緒に見に行けるんやからね』&lt;BR&gt;　青い小鳥の姿でセルフィの内に留まり、力を貸す。&lt;BR&gt;　それが初めて出会った時の契約だったから、少女は自信たっぷりに笑って言った。&lt;BR&gt;『スコールと、おねえちゃんと、あたしと……それからハインも、みんなで一緒に見に行くんやからね……』&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　それが、彼女とハインがかわした約束。&lt;BR&gt;　はじめから、ハインが彼女を独占する約束など、ありえなかったのだ。&lt;BR&gt;　ハインが抱いた執着が、６年の歳月の中で都合良く記憶の中で約束をねじまげ、意味を変えてしまった。&lt;BR&gt;　……あの時ハインは間違いなく、彼女と彼の約束の成就を願ったはずなのに。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　そして、今。&lt;BR&gt;　ハインの眼の前に、彼女が愛した陽光色の花が一面に咲き誇っていた。&lt;BR&gt;　彼女の内から見たそれは、過去に見た花のどれよりも、綺麗だった。&lt;BR&gt;　なぜならこの花は……&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　――――彼女と彼の命と引き替えに、生み出された夢なのだから。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　突如として姿を変えたジエンドの幻影は、その場にいたすべての者達の眼にもはっきりと映った。&lt;BR&gt;　いつものジエンドと様子が違う。花の数は限りなく増え、官邸内を埋め尽くしさらに外にまで広がっていく。&lt;BR&gt;　それが死を誘う幻影であると知りながら、太陽の光を受けて輝くその花の美しさには眼を奪われずにいられない。&lt;BR&gt;　容赦ない力に傷つけられ、倒れていた者達もまた、魅入られたように陽光色の花を見つめる。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　がくんと、全身から力が抜けた。&lt;BR&gt;（！）&lt;BR&gt;　一瞬後、セルフィの横に倒れ込んでいる自分に気づく。&lt;BR&gt;　地面に倒れ込んだにも関わらず、なんの衝撃も感じなかった。&lt;BR&gt;　眼の前が暗闇になりかけたが、数度のまばたきで視界を取り戻し、スコールはセルフィに視線を向ける。&lt;BR&gt;　翠色の澄んだ瞳が、ぼんやりとスコールの姿を映していた。&lt;BR&gt;　視線が合うと、ほんのかすかにセルフィが笑った。&lt;BR&gt;　スコールが愛した、太陽のように明るく、幸せそうな笑顔になった。&lt;BR&gt;　固くペンダントを握りしめていたセルフィの手にそっと指先を伸ばしてみる。応えるように小さな手がゆっくり動き、触れてきたスコールの手を握った。&lt;BR&gt;　萎えた手に力をこめ、握り返すと、セルフィはもう一度嬉しそうに笑い、翠の瞳を静かに閉じた。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　その花は、セルフィにとって、たったひとつの例外だった。&lt;BR&gt;　セルフィにとって、花はいつでも死の象徴。けれど、その花だけは、未来の象徴だった。&lt;BR&gt;　幼い約束を結び、未来を信じる礎となる、その象徴だった。&lt;BR&gt;（ハイン……）&lt;BR&gt;　自分の中にいるハインに、セルフィは小さく呟いた。&lt;BR&gt;（ハイン、あたしがスコールだけを愛してるって思ってる？）&lt;BR&gt;　スコールだけを選んだと、ハインを愛さなかったと、そんなふうに。&lt;BR&gt;（あのね、ハイン……あたしは確かに、スコールのことが大好きで大事だけど……）&lt;BR&gt;　自分の命よりも大切で愛しいと、そう思ったのは確かに事実。&lt;BR&gt;　けれど人の気持ちがそれだけで成立するほど単純ではないことを、セルフィは知っている。&lt;BR&gt;（心はね、色々な「好き」って気持ちを持てるんだよ）&lt;BR&gt;　恋とはまったく別々の、それでも大切でかけがえのない想いを抱くことができる。&lt;BR&gt;（ハインはそれを知らなかった――だから、ハインは、人間に勝つことができなかったんだよね？）&lt;BR&gt;　心を持っているのは、神と呼ばれたハインも人間も、どちらも同じ。&lt;BR&gt;　違うのは、ただ――ハインにはそんな自分のありように、気づくことができなかっただけ。&lt;BR&gt;　心があるのは同じなのに、守るものが何もなかったハインと、守りたい誰かのために戦った人間達。&lt;BR&gt;　ハインの力はとても強くて、決して人間達がかなうものではなかったけれど、人間達を滅ぼすこともできなかった。&lt;BR&gt;（ねぇ、ハインは、まだ誰にも愛されてないって思ってる？）&lt;BR&gt;　この星に生まれて、おとぎ話になるほどの長い時間をひとりで過ごして。&lt;BR&gt;（守りたい誰かなんていないって思ってる？）&lt;BR&gt;　夢に墜ちてゆくセルフィは意識の片隅で、ハインの声を聞いたような気がした。&lt;BR&gt;　何を言っているのかはわからなかった。けれど、セルフィは夢の中で小さく微笑んだ。&lt;BR&gt;（あたしは、ハインのことが大好きだったよ……）&lt;BR&gt;　遠いあの日。セルフィの孤独を癒してくれたのは、間違いなくハインだったのだ。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　――――ハインは、あたしが好きだった？&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　鳥の羽音が、遠くで聞こえた。&lt;BR&gt;　セルフィは薄く眼を開き、ゆるりと頭上を見上げる。&lt;BR&gt;　どこまでも深い緑と、陽光色に輝く花たちの遙か彼方に、蒼い光が凝っていた。&lt;BR&gt;　見つめるセルフィの視線を感じているように、蒼い光はゆっくりと上昇しながら、その形を変える。飛び散る光が、羽根の形になってきらめいた。&lt;BR&gt;「………………ハイン…………」&lt;BR&gt;　囁くセルフィの声は、届いただろうか。&lt;BR&gt;　ふいに陽光色に輝く花たちが、光の粒子に姿を変え始めた。&lt;BR&gt;　セルフィの魔法のすべてが、光となって遙か上空にいるハインを取り囲む。囲んで、光の繭になる。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　多くの人々が注視する中、光の繭は一瞬強く輝き、自然の光となって世界中に降り注いだ。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　世界中を明るく照らし包み込んだ光は、やがてゆっくりと陽光にまぎれ、世界は落ち着きを取り戻した。&lt;BR&gt;　荒れたエスタ国土を覆っていた花も消えた。残されたのは破壊され、積み上げられた瓦礫の山だけだ。&lt;BR&gt;　呆然と、眼の前に起きている出来事を見つめるばかりだった者達は、ゆっくりと我に返っていく。どれほどの破壊の爪痕が眼の前に広がろうと、彼らは間違いなく生きていた。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;「スコール！　セルフィ……！」&lt;BR&gt;　よろめきながら戻り来たエルオーネが、誰より先に現実に立ち返り愛しい弟妹の名を呼んだ。&lt;BR&gt;　事態を把握しきれずにいる者達を後目に、裸足のまま瓦礫を踏み越え、普段の彼女らしからぬ勢いで二人の傍に走り寄る。&lt;BR&gt;「スコール！　セルフィ！！」&lt;BR&gt;　ぐったりと倒れている二人の傍らに膝をつき、震えわななきながら、エルオーネは二人の身体を揺さぶった。&lt;BR&gt;　揺さぶられ、かくんと頭を大きく動かしたスコールが、かすかに睫毛を震わせる。&lt;BR&gt;　はっとして、眼にしたものが現実のものであるのか確かめるように、エルオーネはその顔をのぞきこんだ。&lt;BR&gt;「……スコール……？」&lt;BR&gt;　呼びかけた優しい声に、かすかに呻いたスコールの瞳がぱちりと開かれた。&lt;BR&gt;　群青色の瞳が、緩慢にまばたきを繰り返しながらぼんやりとエルオーネの姿を映す。&lt;BR&gt;　ぼんやりと戻った意識が思うのはただひとつ。&lt;BR&gt;「セル……フィは……？」&lt;BR&gt;　訊ねたかすれた声に、エルオーネの両眼から涙があふれた。涙ぐみながら、懸命に微笑んで大きく頷く。&lt;BR&gt;「……大丈夫よ。生きているわ」&lt;BR&gt;　言って、意識のないセルフィを細腕に抱き起こす。&lt;BR&gt;　昏睡状態ではあったが、セルフィは確かに呼吸をしていた。&lt;BR&gt;「……そうか……」&lt;BR&gt;　エルオーネの言葉と、眼にしたセルフィの姿に、スコールが安堵に表情をゆるめる。&lt;BR&gt;　そのまま幼い子供のような表情で眠りに落ちるスコールを、エルオーネはセルフィごとぎゅっと抱きしめた。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　エルオーネの様子から無事らしいと判断し、サイファーはふんと鼻を鳴らした。&lt;BR&gt;「悪運の強い奴だぜ」&lt;BR&gt;　つまらなさそうにサイファーは呟き、ガンブレードを収めてリノア達の方へ視線を移す。&lt;BR&gt;　全身傷だらけのアーヴァインと全力を使い果たしたリノアは、地面に倒れていた。&lt;BR&gt;　二人とも意識はちゃんとあるようで、アーヴァインは地面に寝転がったままケアルをかけて傷の治療を行っている。その横でやはり寝転がったまま、アーヴァインと何事か言葉をかわしているリノアがいた。&lt;BR&gt;「…………」&lt;BR&gt;　ふと、視線に気づいたのか、リノアの頭がかすかに揺れてサイファーの方へと顔を横向けた。&lt;BR&gt;　もっと落ち込んだ顔でもするかと思ったが、予想外に爽やかな表情で勝ち気に微笑まれ、サイファーは毒気を抜かれてそっぽを向いた。体力は底をついているだろうが、あれなら殺しても死にそうにない。&lt;BR&gt;「大統領室、行？」&lt;BR&gt;　落ち着いた声音で風神がそんなサイファーに声をかける。&lt;BR&gt;　そういえばイデアたちがいないと気がつき、サイファーはエルオーネ達に視線を向け、すっかりこちらのことなど忘れているらしいその様子に、不機嫌な顔でふんと鼻を鳴らした。&lt;BR&gt;「行くぞ」&lt;BR&gt;　恩のひとつも売っておいて、損にはなるまい。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　向かった大統領室では、ちょうど危険が去ったことを察知して、防御装置の解除が行われているところだった。&lt;BR&gt;「……大したモンだ」&lt;BR&gt;　呆れ顔でサイファーは肩をすくめる。幾重にも厳重に魔法と扉で囲われたその部屋は、そのままシステム開発者の性格を表しているようだ。&lt;BR&gt;　まぁせいぜい長生きしてくれと心の内で呟くサイファーと風神の前で、ようやく最後の扉が開き、中から真っ先に漆黒の女性が飛び出してくる。&lt;BR&gt;「あぁサイファー、無事だったのですね。他の子供達は大丈夫なのですか？」&lt;BR&gt;　真っ先にサイファーの姿を眼に止め、不安げな表情でイデアが問いかける。&lt;BR&gt;　サイファーはにやりと口の端をゆがめるように笑って見せ、風神が静かにこくりと頷いた。&lt;BR&gt;「死人、無」&lt;BR&gt;「そう……」&lt;BR&gt;　スコールとセルフィもどうやら無事らしいとわかり、イデアはほっと息をついて微笑んだ。&lt;BR&gt;「雷神？」&lt;BR&gt;　その時、イデアに気を取られているサイファーの背後で、イデアに続いて出てきた大柄な人影を眼にした風神が訝しげに声を上げた。&lt;BR&gt;　あん？と首を曲げて扉を見たサイファーは、大きな身体を本人なりに小さく縮めて出てきた雷神に眉を寄せる。&lt;BR&gt;「何やってたんだ、お前？」&lt;BR&gt;　呆れ半分のサイファーの質問に、雷神はこれ以上ないほど恐縮しながらぼそぼそと口を開く。&lt;BR&gt;「サ、サイファーがオダインとイデアを守れって言ったんだもんよ……！」&lt;BR&gt;「………………」&lt;BR&gt;　サイファーと風神は同時に沈黙する。確かに研究室を出る際、オダインとイデアの護衛を雷神に任せていったのは事実である。だが……。&lt;BR&gt;「大人しく一緒に部屋で守られてどうすんだよてめえは！　馬鹿か！？」&lt;BR&gt;「無能！」&lt;BR&gt;「い、いたたたたた……痛いもんよ……！」&lt;BR&gt;　サイファーの罵声と同時に風神から蹴りをくらってしまい、情けない顔で雷神はその場を飛び跳ねた。&lt;BR&gt;　手足を吹っ飛ばされるような死闘を繰り広げている間、のうのうとシェルターと化した大統領室に避難する形となってしまった雷神である。サイファーと風神にすれば、蹴っても蹴り足りない。&lt;BR&gt;「おいおい、何やってんだよお前ら」&lt;BR&gt;　サイファー達の後に続いて大統領室に戻ってきたラグナが、騒々しいその様子に呆れた声を上げた。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;「よかったね、みんな無事みたいで」&lt;BR&gt;　自分で自分にケアルをかけ、どうにか半身を起こして地面に座ったアーヴァインが、すぐ傍に横たわっているリノアに優しく囁いた。&lt;BR&gt;「……そうだね」&lt;BR&gt;　全力を出し切り、体力・生命力まで魔法力に変換してしまったリノアは、頭を上げることもできない。&lt;BR&gt;　けれど視線の先にエルオーネに抱かれたスコールとセルフィの姿を捉え、ほっと表情をくつろげていた。&lt;BR&gt;　乱れて頬に散る黒髪を、アーヴァインは指先で軽く払う。勝気な黒い瞳が、アーヴァインをまっすぐ見上げた。&lt;BR&gt;「……おつかれ」&lt;BR&gt;　ふわりと微笑んで、いたずらっぽくリノアが囁いた。&lt;BR&gt;「……お疲れさま」&lt;BR&gt;　そういって微笑み返すアーヴァインは、リノアと同じ笑顔をしていた。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　スコールが眼を覚ましたのは、ハインが消滅した三日後だった。&lt;BR&gt;&lt;BR&gt;　透ける素材でできた天井を見上げ、スコールはしばらく何が起きたかわからずそのままの体勢でぼんやりとしていた。&lt;BR&gt;「おっ、スコール起きたのか？」&lt;BR&gt;　覚醒に気づき、賑やかな声が名前を呼ぶ。&lt;BR&gt;　のぞきこんだ見覚えのある顔に、スコールは不思議そうな声を出した。&lt;BR&gt;「……ゼル……？」&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;「ったく、やってらんねぇよなぁ！　スコールがオレに頼み事したんじゃねぇかって、疑惑かかった瞬間デリングシティに長期任務だぜ？　でもってようやく帰ってきたと思ったら、お前らが大怪我して強制入院とか聞かされてよ……ったくマジでやってらんねーと思ったぜ」&lt;BR&gt;　ぶつぶつと愚痴めいて呟くゼルは、相変わらず元気いっぱいである。&lt;BR&gt;　面食らった顔をしているスコールに、ゼルはふうと息をついた。&lt;BR&gt;「ここは、エスタの国立病院だぜ。詳しい話はエルねえちゃんから大体聞いたけどよ……大変だったんだってなぁ？&lt;BR&gt;　学園長はお前らをバラムに連れ帰れっつってたんだけどよ、お前ら全員衰弱しまくってたし、バラムよりこっちのが医療技術進んでるからって、結局ここに入院することになったんだ」&lt;BR&gt;　簡潔に説明され、半覚醒状態のスコールにもようやく事態がのみこめた。&lt;BR&gt;　それから、ゼルを見上げて気になっていたことを訊ねる。&lt;BR&gt;「……セルフィは……？」&lt;BR&gt;　あの花嵐の中で見た彼女は、確かにセルフィだった。&lt;BR&gt;　けれどその後どうなったのか、わからない。ここにこうして自分が生きているということは、セルフィも無事ということなのだろうか……。&lt;BR&gt;「無事だよ」&lt;BR&gt;　ゼルはきっぱり頷き、ひょいっと視線をドアの方へと向けた。&lt;BR&gt;「さらに言うならリノアも無事だぜ。限界超えて力使っちまったから、当分は入院生活らしいけどよ、見舞い行ったらベッドの上で元気に騒いでた」&lt;BR&gt;　そのお相手をアーヴァインがしているだろうことは、想像に難くなかった。&lt;BR&gt;「セルフィは……無事は無事なんだけどよ……」&lt;BR&gt;　ちょっと言いづらそうな口調になり、ゼルは眼を伏せた。&lt;BR&gt;「けど、ずっと昏睡状態のまま、眼を覚まさねーんだよ。ジエンドの影響ももちろんあるんだろうけど、それ以上にセルフィは長くハインを受け入れちまってたからな」&lt;BR&gt;　あれほど巨大な意識体をジャンクションし続け、しかも意識の主導権まで奪われてしまったのだ。その負担は計り知れない。&lt;BR&gt;　かすかに眉をひそめたスコールに、ゼルは眼をそらしたまま言葉を続ける。&lt;BR&gt;「お前らはジエンドの影響で手足が麻痺した上に、身体機能が急激に低下して超衰弱したために昏睡状態になったらしい。けどお前は基礎体力あるから、しばらく休んでりゃ回復するらしいぜ。SeeDに復帰することも可能ってオレは聞いたけどよ……まぁもちろん、今回の件でなんらかの処分はあるだろうな」&lt;BR&gt;　セルフィの異変を依頼主と結託してガーデン側にひた隠しにし、報告を怠ったばかりかSeeDのゼルやらSeeDではないサイファーやらをこっそり動かしたなどとは、SeeDのあるまじき行為である。&lt;BR&gt;　しかもスコールは今回の任務でリーダーに指名されている。厳罰は免れそうもない。&lt;BR&gt;　一瞬難しい顔になったスコールに、ゼルはくっと肩をゆすって笑った。&lt;BR&gt;「まぁでも、資格剥奪なんてことにはならねーだろ。お前らは完璧に任務を完遂したんだし、ママ先生が学園長に取りなしたりもしてくれたしな」&lt;BR&gt;　ガーデンの基本方針は、結果がすべてである。&lt;BR&gt;　まして今回の一件にはイデアも深く関わっていることもあり、イデアの意見にはシドも耳を傾けざるを得ないはずだ。&lt;BR&gt;「問題は、セルフィだな。ガーデン側としては、セルフィの意識が戻り次第Ｇ．Ｆ．の適合検査を行って、その結果が出るまでSeeDの資格は留保するって決定したらしい」&lt;BR&gt;「……留保……」&lt;BR&gt;「あぁ。検査結果に異常なければ、今回の件に関しては特に処罰はなしみたいだけどよ……肝心のセルフィが、いつ眼を覚ますのかが誰にもわからねーんだよな」&lt;BR&gt;　苦い顔で眼を伏せたゼルに、スコールが厳しい表情を向けた。&lt;BR&gt;「セルフィはハインなんて、すげぇでかい意識に長い時間支配されてたんだろ？&lt;BR&gt;　強制であれ任意であれ、他の意識体に身体のっとられて好き勝手動かされたら、肉体の消耗は著しいんだって医者が言ってたぜ。セルフィは魔女でもなんでもねーんだから、なおさら脳の負担はでかいだろうって」&lt;BR&gt;　イデアが長期間に渡ってアルティミシアの意識を内包していられたのは、アルティミシアがイデアと同じ力を継ぐ『魔女』だったからだ。&lt;BR&gt;　サイファーに言わせればセルフィだって立派な『新たな魔女』ということだったが、ハインの持つ力とは系統がまったく違う。異質な力と存在を長期間脳に宿していれば、Ｇ．Ｆ．障害と同じ結末が待っている。&lt;BR&gt;「……いつ眼を覚ますのか、眼を覚ました後どんくらい記憶が残っているのか……誰にもわからねぇ。&lt;BR&gt;　たとえ記憶障害がなかったとしても、ジエンドの影響を長く受けた障害が、どんな形でセルフィに残るのかもわかんねぇって話だぜ」&lt;BR&gt;　スコールなどよりずっと長く、神経を麻痺させ細胞のひとつひとつを破壊する死の魔法を受けたセルフィだ。&lt;BR&gt;　ケアルは怪我を治癒させることはできても、身体の衰弱や病気を治すことはできないのだ――。&lt;BR&gt;&lt;BR&gt;　説明を終えたゼルの前で、スコールは厳しい無表情でしばし沈黙していた。&lt;BR&gt;　長い、長い沈黙の末、ようやくゆっくりと口を開く。&lt;BR&gt;「……セルフィは？」&lt;BR&gt;　今どうしているのかと訊ねたスコールに、ゼルは小さく肩をすくめた。&lt;BR&gt;「エルねえちゃんがついてるよ」&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　ふと気配を感じて、エルオーネが顔を上げた。&lt;BR&gt;「…………」&lt;BR&gt;　温かみのある栗色の瞳を静かに閉じ、意識を集中させる。&lt;BR&gt;　気づかれないようにそっと『接続』して様子をうかがうと、彼女の『弟』が目覚めたらしいことがわかった。&lt;BR&gt;　大方セルフィの病室に行こうとしてゼルを困らせているのだろう。激しく衰弱し足萎えた身体で、いきなり動くことなどできるはずがないのに。&lt;BR&gt;　くすりとエルオーネは小さく笑う。『接続』を維持したまま、眼を開いてそっとベッドの上へと視線を向けた。&lt;BR&gt;　ほんの数秒差で死の淵から帰還した少女が、静かに眠りについている。&lt;BR&gt;　いつ目覚めるか誰にもわからないほど、深い深い眠りの底にいる。&lt;BR&gt;　細い首にかけられた銀鎖のペンダントを見つめながら、エルオーネはまたゆっくりと瞳を閉ざした。&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;　エルオーネの想像に違わず、立ち上がろうとしたスコールはそのまま床にくずれ落ちる結果となっていた。&lt;BR&gt;「だーもー！　だから無茶だっつったろ～！？」&lt;BR&gt;　困惑しきった大声を上げるゼルに、意のままに身体を動かせないことに呆然とした顔でスコールがのろのろと眼を上げる。&lt;BR&gt;　なんで動かないのかと眼で問われ、ゼルが呆れ顔のまま溜息をついた。&lt;BR&gt;「オレがさっき言っただろ、セルフィのジエンドは神経を全部麻痺させて細胞を殺してく魔法だって。セルフィほど長時間じゃないにしろ、魔法の効果範囲内にいたお前だって例外じゃねーんだよ。&lt;BR&gt;　リハビリもまともにしねーで、いきなり起きて歩けるわけねーだろーが！」&lt;BR&gt;　だからこそ、あの魔法をかけられた者は皆苦痛を感じることなく死に至るのだ。&lt;BR&gt;　怒るゼルを見上げ、スコールはぐっと唇を噛みしめる。&lt;BR&gt;　どこか拗ねたような表情に、ゼルは珍しいものでも見たようにちょっと眼をまたたき、それから眼を伏せて小さく溜息をついた。&lt;BR&gt;「それによ……スコールが無理して病室行ったところで、どうにもなんねーだろ……？」&lt;BR&gt;「…………」&lt;BR&gt;　意識のないセルフィにどう呼びかけたところで、脳に障害が残ったかもしれない彼女に届く保証はほとんどない。&lt;BR&gt;　諭すようなゼルの声に、スコールはゆっくりと口を開いた。&lt;BR&gt;「でも……俺はセルフィを探さないと……」&lt;BR&gt;「探す？」&lt;BR&gt;　怪訝そうなゼルにかまわず、スコールはうまく動かない手に力をこめ、ぐっと自力で半身を起こした。&lt;BR&gt;「そういう約束なんだ……」&lt;BR&gt;　どれほど時がたってしまっても。たとえ何年もその約束を忘れてしまっていても。&lt;BR&gt;　必ず果たされなければならない、大切な約束なのだ。&lt;BR&gt;「約束って……」&lt;BR&gt;　困惑したようなゼルの声が、ふいに遠くに聞こえた。&lt;BR&gt;（？）&lt;BR&gt;　顔を上げた瞬間、ふっと視界が暗くなる。&lt;BR&gt;　何度も体験してよく知った予兆。&lt;BR&gt;&lt;BR&gt;（エルオーネ……？）&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;　意識が闇に落ちた。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;***&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;『スコール……聞こえる？』&lt;BR&gt;　優しい声が聞こえた。&lt;BR&gt;　意識の底に落ち、闇としか認識されない状況の中聞こえるその声は、紛れもなくエルオーネのものだ。&lt;BR&gt;（なんだよ……）&lt;BR&gt;　答えるスコールに、エルオーネがくすりと笑う気配がした。&lt;BR&gt;『あなたに教えなくてはならないことがあるの』&lt;BR&gt;（教えること？）&lt;BR&gt;　おうむ返しにスコールが問い返す。わざわざ『接続』状態で話さなければならないことなのだろうか。&lt;BR&gt;　不思議そうなスコールに、またくすくすとエルオーネが笑った。&lt;BR&gt;『スコール、セルフィが行方不明になってしまった時のことを覚えている？』&lt;BR&gt;（え？）&lt;BR&gt;　エルオーネが問いかけるのは、彼女が昏睡状態に陥り、セルフィが姿を消した時のこと――。&lt;BR&gt;『あの時、私の中にはハインの一部がいたわ。私はハインに意識を明け渡すことが許せずに、私の身体だけをハインに明け渡したの。……かつてのママ先生と同じようにね』&lt;BR&gt;（あぁ……）&lt;BR&gt;　わかっていると頷くスコールに、エルオーネの言葉は続く。&lt;BR&gt;『けれど私は、意識は封じても眠っているわけではなかったの。封じた意識のほんの隙間から、あなたの心にずっと接続し続けていた』&lt;BR&gt;（俺の？）&lt;BR&gt;　まったくそんな気配など感じていなかったスコールは驚き、エルオーネが朗らかな笑い声で肯定する。&lt;BR&gt;『私の能力は意識を過去に送るだけじゃないわ。こうして誰かの意識に『接続』して私の声を届けることも、私の力のひとつよ。……もっとも、過去の人に声を届けることだけは、どうしてもできなかったけれど』&lt;BR&gt;　エルオーネが意識に『接続』し声を届けられるのは、常に彼女と同じ時間軸に生きる者だけである。&lt;BR&gt;『そしてあなたは、私の力を無意識に欲した。あなたは私の力で、眠るセルフィの意識に入ったのね』&lt;BR&gt;（セルフィの……意識……？　……！？）&lt;BR&gt;　何を言っているのかと訝しく考えたスコールは、あの不思議な夢を思い出しはっとする。&lt;BR&gt;　二人で同じ夢を見、言葉を交わし触れ合った、あの謎の夢の世界。&lt;BR&gt;（あれは……じゃあ、やっぱりセルフィが見ていた夢……？）&lt;BR&gt;『そう。あなたは一年前の宇宙の時と同じに、今の時間に一番近い『一瞬前のセルフィ』の中に入り込んだの。&lt;BR&gt;　けれどその時のセルフィは眠っていた。だからあなたはセルフィの見ている夢を共有することができたのよ』&lt;BR&gt;　セルフィの行方を懸命に追っていたスコールが無意識に強く望んだことが、知らず意識を接続していたエルオーネの力を、強引に引き出す結果となった。&lt;BR&gt;『――ハインがセルフィの意識を乗っ取った時、ハインが私の中に残していた力の一部を解放したあの時、私はセルフィの意識に触れたわ。&lt;BR&gt;　セルフィは、私の力を求めていた。&lt;BR&gt;　だから戦いの中、私はハインに気づかれないようにセルフィに接続して声をかけたの。&lt;BR&gt;　……セルフィ、私の力はあなたの役に立つ？　って』&lt;BR&gt;（――――）&lt;BR&gt;　そしてセルフィは、エルオーネの力を使いスコールに意識を移した……。&lt;BR&gt;『……同じ質問をスコール、あなたにもしたくて、私はこうして意識を接続しているのよ。&lt;BR&gt;　スコール、私の力は、あなたの役に立つかしら？』&lt;BR&gt;　どきりと、心臓が震えた。&lt;BR&gt;　あの不思議な夢の真実と、今提示された『力』が、ただひとつ残された可能性をスコールに指し示す。&lt;BR&gt;　遠回りしてずっと果たされずにいた約束を、成就させることができるかもしれないと――。&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;&lt;BR&gt;『でも、これだけは覚えていて』&lt;BR&gt;　頷きかけたスコールを、エルオーネが静かに言葉で遮った。&lt;BR&gt;『あなたがあの時セルフィと夢を共有できたのは、セルフィがあなたを心の底で望んでいたからよ。&lt;BR&gt;　セルフィがあなたを受け入れたから、あなたはセルフィの中で実体を保っていられた。&lt;BR&gt;　夢の隙間に迷い込むこともなく、セルフィに会うことができた。&lt;BR&gt;　今のセルフィに、あなたに関する記憶がどれほどあるのかは、私には保証することができないわ。&lt;BR&gt;　もしあなたに関する記憶がすべて失われているとしたら……あなたは自力でセルフィを探し出さなくてはならないの。&lt;BR&gt;　夢の世界が形成されていない状態であれば、あなたはセルフィの精神世界の一部に紛れ込んで、戻ってこられなくなるかもしれない。&lt;BR&gt;　……それでもいいなら、私の手を取りなさい』&lt;BR&gt;（…………）&lt;BR&gt;　意識だけの接続なのに、スコールにはその時見えた気がした。&lt;BR&gt;　闇の中、決断を促す白い腕が。&lt;BR&gt;（……決まっている）&lt;BR&gt;　答えなど、はじめから。&lt;BR&gt;（そういう、約束なんだ）&lt;BR&gt;　囁いて。&lt;BR&gt;　ためらうことなく、スコールはその腕に身をゆだねた。&lt;BR&gt;&lt;BR&gt;&lt;/SPAN&gt;

<script data-viewer-zoom-script>
(() => {
  const stage = document.querySelector('.viewer-stage-image');
  const image = stage ? stage.querySelector('.viewer-image') : null;
  if (!stage || !image) {
    return;
  }

  const setZoom = (enabled) => {
    stage.classList.toggle('is-zoomed', enabled);
    image.setAttribute('aria-pressed', enabled ? 'true' : 'false');
    if (enabled) {
      const naturalWidth = image.naturalWidth || image.clientWidth || 0;
      const targetWidth = naturalWidth > 0
        ? Math.max(naturalWidth, Math.min(Math.round(stage.clientWidth * 0.92), naturalWidth * 4))
        : Math.round(stage.clientWidth * 0.92);
      image.style.width = `${targetWidth}px`;
      image.style.maxWidth = 'none';
      image.style.maxHeight = 'none';
      requestAnimationFrame(() => {
        stage.scrollTop = 0;
        stage.scrollLeft = Math.max(0, Math.round((image.scrollWidth - stage.clientWidth) / 2));
      });
    } else {
      image.style.removeProperty('width');
      image.style.removeProperty('max-width');
      image.style.removeProperty('max-height');
      stage.scrollTop = 0;
      stage.scrollLeft = 0;
    }
  };

  const toggleZoom = () => {
    setZoom(!stage.classList.contains('is-zoomed'));
  };

  image.setAttribute('tabindex', '0');
  image.setAttribute('role', 'button');
  image.setAttribute('aria-label', '逕ｻ蜒上ｒ諡｡螟ｧ縺ｾ縺溘・邵ｮ蟆・);
  image.setAttribute('aria-pressed', 'false');

  image.addEventListener('click', toggleZoom);
  image.addEventListener('keydown', (event) => {
    if (event.key === 'Enter' || event.key === ' ') {
      event.preventDefault();
      toggleZoom();
    }
  });

  stage.addEventListener('click', (event) => {
    if (event.target === stage && stage.classList.contains('is-zoomed')) {
      setZoom(false);
    }
  });

  window.addEventListener('keydown', (event) => {
    if (event.key === 'Escape' && stage.classList.contains('is-zoomed')) {
      setZoom(false);
    }
  });
})();
</script>
